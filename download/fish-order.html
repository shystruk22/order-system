<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ рыбы</title>
    <!-- Version: 3.15 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="shared-utils.js"></script>
    <script src="shared-data.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
        .btn { transition: all 0.2s; }
        .btn:hover { opacity: 0.9; }
        input:focus, select:focus { outline: none; }
        .input { padding: 0.35rem 0.4rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.75rem; background: white; }
        .input:focus { border-color: #0ea5e9; }
        .table-container { overflow: auto; max-height: 75vh; border-radius: 0.5rem; border: 1px solid #e5e7eb; }
        .table-modern { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .table-modern thead { position: sticky; top: 0; z-index: 30; }
        .table-modern th { padding: 0.46rem 0.5rem; text-align: center; font-weight: 600; color: #374151; background: #f3f4f6; border: 1px solid #d1d5db; white-space: nowrap; font-size: 0.7rem; }
        .table-modern th.text-left { text-align: left; }
        .table-modern td { padding: 0.35rem 0.4rem; border: 1px solid #e5e7eb; text-align: center; }
        .table-modern td.text-left { text-align: left; }
        .col-header { min-width: 70px; height: 60px; white-space: normal !important; word-wrap: break-word; line-height: 1.3; vertical-align: middle; padding: 0.5rem 0.4rem !important; font-size: 0.7rem !important; font-weight: 600 !important; text-align: center !important; }
        .col-code { min-width: 45px; max-width: 55px; }
        .col-group { min-width: 70px; max-width: 90px; }
        .col-name { min-width: 160px; }
        .cell-wrap { white-space: normal; word-wrap: break-word; }
        .group-header { background: #e0f2fe; font-weight: 600; color: #0c4a6e; }
        .store-header { height: auto; max-width: 80px; white-space: normal; word-wrap: break-word; word-break: break-word; font-size: 9px; line-height: 1.2; padding: 2px 3px; text-align: center; }
        .abc-a { background: #dcfce7; color: #166534; }
        .abc-b { background: #fef9c3; color: #854d0e; }
        .abc-c { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="min-h-screen bg-gray-100">
    <div class="bg-white border-b border-gray-200">
        <div class="px-3 py-2">
            <div class="flex items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span>Назад</span>
                </a>
                <div class="flex items-center gap-2 px-2">
                    <div class="p-1.5 bg-sky-100 rounded-lg text-sky-600">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                    </div>
                    <h1 class="text-base font-semibold text-gray-900">Заказ рыбы</h1>
                </div>
                <div class="flex gap-0.5 ml-2 bg-gray-100 rounded-lg p-0.5" id="tabs"></div>
                <div class="ml-auto flex gap-2">
                    <span class="bg-purple-100 text-purple-800 rounded-lg px-2 py-1 text-xs" id="statsProducts">0 тов.</span>
                    <span class="bg-blue-100 text-blue-800 rounded-lg px-2 py-1 text-xs" id="statsStores">0 ТТ</span>
                </div>
            </div>
        </div>
    </div>
    <div class="px-3 py-3" id="content"></div>

    <script>
        let tab = 'upload';
        let matrix = {}; // Ассортимент (каталог): {code, nomenclature, group, packaging, supplier, price, shelf, quant, inPrice, markup}
        let matrixMarks = {}; // Отметки матрицы: {[code]: {[tt]: 'ДА'/'НЕТ', ...}}
        let sales = []; // {tt, name, quantity, group} - продажи С ТТ
        let stocks = []; // {tt, name, code, currentStock, daysPresent, totalDays}
        let stores = []; // [{tt}]
        let period = 3;
        let defaultMarkup = 25;

        let searchAssort = '';
        let searchResults = '';
        let searchMatrix = '';
        let filterTT = '';
        let filterStatus = '';
        let filterGroup = '';
        let collapsedG = {};
        let collapsedTT = {};
        let collapsedInTransit = {};
        let savedOrderResults = null; // Сохранённые результаты расчёта заказа
        let savedOrderStats = null;   // Сохранённая статистика заказа
        let orderEdits = {};          // Ручные правки заказа: {"tt_code": value}

        // Новые глобальные переменные для fish-order
        let deliverySchedule = {}; // {"supplierName": {"storeName": [mon,tue,wed,thu,fri,sat,sun]}}
        let selectedScheduleSupplier = ''; // текущий выбранный поставщик в графике
        let inTransitOrders = [];  // [{id, createdAt, supplier, store, expectedDate, items: [{code,name,qty,sum}], status}]
        let supplierAssortment = {}; // {"code": ["supplier1", "supplier2"]}
        let supplierPrices = {}; // {"code": {"Supplier1": 150, "Supplier2": 200}}
        let weekendSales = {};     // {"tt_code": totalWeekendQty}
        let weekdaySales = {};     // {"tt_code": totalWeekdayQty}
        let weekendDays = {};      // {"tt_code": countOfWeekendDays}
        let weekdayDays = {};      // {"tt_code": countOfWeekdayDays}
        let stockConsumptionData = {}; // {"tt_code": {weekendSales, weekendDays, weekdaySales, weekdayDays}} — из файла остатков (постоянное)
        let savedOrderDate = null; // Дата сохранённого заказа (для отображения в заголовке)

        function resetSavedOrders() { savedOrderResults = null; savedOrderStats = null; orderEdits = {}; weekendSales = {}; weekdaySales = {}; weekendDays = {}; weekdayDays = {}; /* stockConsumptionData НЕ очищаем — постоянные данные из остатков */ }

        const KEYS = {
            ASSORTMENT: 'fish_assortment_v1',
            MATRIX_MARKS: 'fish_matrix_v1',
            SALES: 'fish_sales_v1',
            STOCKS: 'fish_stocks_v1',
            STORES: SharedUtils.STORAGE_KEYS.STORES,
            SCHEDULE: 'fish_schedule_v1',
            INTRANSIT: 'fish_intransit_v1',
            SUPPLIER_ASSORTMENT: 'fish_supplier_assortment_v1',
            SUPPLIER_PRICES: 'fish_supplier_prices_v1',
            STOCK_CONSUMPTION: 'fish_stock_consumption_v1',
            SAVED_ORDER: 'fish_saved_order_v1'
        };

        // Поля каталога товаров (не ДА/НЕТ)
        const CATALOG_FIELDS = ['code','nomenclature','name','group','packaging','supplier','weightCode','quant','volume','price','inPrice','shelfPrice','shelf','markup'];

        const normCode = (code) => String(code || '').trim().replace(/^0+/, '') || '0';

        const load = (key, def) => SharedUtils.load(key, def);

        const save = (key, data) => {
            try {
                SharedUtils.save(key, data);
            } catch (e) { console.error('Save error:', e); }
        };

        const esc = SharedUtils.esc;

        // === ЗАГРУЗКА СОХРАНЁННЫХ АССОРТИМЕНТОВ И МАТРИЦ ===
        const ASSORTMENTS_KEY = SharedUtils.STORAGE_KEYS.SAVED_ASSORTMENTS;
        let currentLoadedAssortment = null;

        function syncToSavedAssortment() {
            if (!currentLoadedAssortment) return;
            const saved = getSavedAssortments();
            const idx = saved.findIndex(s => s.name === currentLoadedAssortment);
            if (idx < 0) return;
            saved[idx] = {
                ...saved[idx],
                date: new Date().toISOString(),
                count: Object.keys(matrix).length,
                data: Object.values(matrix).map(p => ({
                    code: p.code, nomenclature: p.nomenclature || '',
                    group: p.group || '', packaging: p.packaging || 'ШТ',
                    supplier: p.supplier || '', price: p.price || 0,
                    inPrice: p.inPrice || 0, shelfPrice: p.shelfPrice || 0,
                    shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0, markup: p.markup || 0,
                    mandatory: p.mandatory || false
                }))
            };
            SharedUtils.save(ASSORTMENTS_KEY, saved);
        }
        const MATRICES_KEY = SharedUtils.STORAGE_KEYS.SAVED_MATRICES;
        const OLD_ASSORTMENTS_KEY = 'matrixcalc_saved_assortments_v2';
        const OLD_MATRICES_KEY = 'matrixcalc_saved_matrices_v1';

        function getSavedAssortments() {
            try {
                let data = SharedUtils.load(ASSORTMENTS_KEY, null);
                if (!data || !Array.isArray(data) || data.length === 0) {
                    data = SharedUtils.load(OLD_ASSORTMENTS_KEY, []);
                    if (data && data.length > 0) {
                        SharedUtils.save(ASSORTMENTS_KEY, data);
                    }
                }
                return data || [];
            } catch { return []; }
        }

        function getSavedMatrices() {
            try {
                let data = SharedUtils.load(MATRICES_KEY, null);
                if (!data || !Array.isArray(data) || data.length === 0) {
                    data = SharedUtils.load(OLD_MATRICES_KEY, []);
                    if (data && data.length > 0) {
                        SharedUtils.save(MATRICES_KEY, data);
                    }
                }
                return data || [];
            } catch { return []; }
        }

        function loadAssortmentByName(name) {
            resetSavedOrders();
            const saved = getSavedAssortments();
            const record = saved.find(s => s.name === name);

            if (!record) {
                alert('Ассортимент не найден');
                return;
            }

            const count = Object.keys(matrix).length;
            if (count > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count} товаров)?\nТекущий ассортимент будет заменен.\nОтметки матрицы (ДА/НЕТ) останутся.`)) {
                    return;
                }
            }

            matrix = {};
            record.data.forEach(p => {
                if (p.code) {
                    matrix[normCode(p.code)] = {
                        code: p.code,
                        nomenclature: p.nomenclature || p.name || '',
                        group: p.group || '',
                        packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '',
                        price: p.price || 0,
                        inPrice: p.inPrice || p.price || 0,
                        shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0,
                        quant: p.quant || 1,
                        volume: p.volume || 0,
                        markup: defaultMarkup
                    };
                }
            });

            syncFishAssortment();
            currentLoadedAssortment = name;
            // Синхронизация: подтянуть поставщиков из ассортимента
            ensureSupplierAssortment();
            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
            save(KEYS.SUPPLIER_PRICES, supplierPrices);
            save(KEYS.SCHEDULE, deliverySchedule);
            // Sync to SharedData
            if (window.SharedData) { try { SharedData.saveProducts(Object.values(matrix).filter(p => p && p.code), 'fish-order'); } catch(e) {} }
            render();
            alert(`Загружено: ${Object.keys(matrix).length} товаров из "${name}"\nОтметки матрицы: ${Object.keys(matrixMarks).length} товаров`);
        }

        function loadSavedMatrixByName(name) {
            resetSavedOrders();
            const saved = getSavedMatrices();
            const record = saved.find(s => s.name === name);

            if (!record) {
                alert('Матрица не найден');
                return;
            }

            const md = record.matrixData || {};
            let merged = 0;
            let added = 0;
            Object.entries(md).forEach(([code, item]) => {
                if (!code) return;
                const nc = normCode(code);

                const marks = {};
                Object.entries(item).forEach(([k, v]) => {
                    if (!CATALOG_FIELDS.includes(k) && k !== 'inMatrix' && (v === 'ДА' || v === 'НЕТ')) {
                        marks[k] = v;
                    }
                });

                if (Object.keys(marks).length > 0) {
                    if (!matrixMarks[nc]) matrixMarks[nc] = {};
                    Object.assign(matrixMarks[nc], marks);
                }

                if (!matrix[nc]) {
                    matrix[nc] = {
                        code: item.code || code,
                        nomenclature: item.nomenclature || '',
                        group: item.group || '',
                        packaging: 'ШТ',
                        inPrice: 0,
                        quant: 1,
                        markup: defaultMarkup
                    };
                    added++;
                } else {
                    merged++;
                }
            });

            syncFishAssortment();
            save(KEYS.MATRIX_MARKS, matrixMarks);

            const modal = document.getElementById('matrixSelectModal');
            if (modal) modal.remove();

            render();
            alert(`Матрица применена: ${merged} обновлено, ${added} добавлено в каталог\nОтметок матрицы: ${Object.keys(matrixMarks).length} товаров\nВсего в ассортименте: ${Object.keys(matrix).length} товаров`);
        }

        function showMatrixSelectModal() {
            const saved = getSavedMatrices();

            if (saved.length === 0) {
                alert('Нет сохранённых матриц.\nСначала сохраните матрицу в matrix-calc.html');
                return;
            }

            const existing = document.getElementById('matrixSelectModal');
            if (existing) existing.remove();

            const modal = document.createElement('div');
            modal.id = 'matrixSelectModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg border border-gray-200 p-6 w-full max-w-md shadow-lg" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-900">${icons.grid} Выберите матрицу</h3>
                        <button onclick="document.getElementById('matrixSelectModal').remove()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
                    </div>
                    <div class="max-h-80 overflow-y-auto border rounded-lg divide-y">
                        ${saved.map(s => `
                            <div class="p-3 hover:bg-violet-50 cursor-pointer flex justify-between items-center" onclick="loadSavedMatrixByName('${esc(s.name)}')">
                                <div>
                                    <div class="font-medium text-gray-900">${s.name}</div>
                                    <div class="text-xs text-gray-500">${s.products || 0} товаров • ${s.inMatrix || 0} в матрице • ${new Date(s.date).toLocaleDateString('ru-RU')}</div>
                                </div>
                                <span class="text-violet-600 font-medium">Загрузить →</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 text-xs text-gray-400 text-center">
                        Матрицы сохраняются в matrix-calc.html
                    </div>
                </div>
            `;
            modal.addEventListener('click', () => modal.remove());
            document.body.appendChild(modal);
        }

        function showAssortmentSelectModal() {
            const saved = getSavedAssortments();

            if (saved.length === 0) {
                alert('Нет сохранённых ассортиментов.\nСначала сохраните ассортимент в matrix-calc.html');
                return;
            }

            const existing = document.getElementById('assortmentSelectModal');
            if (existing) existing.remove();

            const modal = document.createElement('div');
            modal.id = 'assortmentSelectModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg border border-gray-200 p-6 w-full max-w-md shadow-lg" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-900">${icons.list} Выберите ассортимент</h3>
                        <button onclick="document.getElementById('assortmentSelectModal').remove()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
                    </div>
                    <div class="max-h-80 overflow-y-auto border rounded-lg divide-y">
                        ${saved.map(s => `
                            <div class="p-3 hover:bg-teal-50 cursor-pointer flex justify-between items-center" onclick="loadAssortmentByName('${esc(s.name)}')">
                                <div>
                                    <div class="font-medium text-gray-900">${s.name}</div>
                                    <div class="text-xs text-gray-500">${s.count} товаров • ${new Date(s.date).toLocaleDateString('ru-RU')}</div>
                                </div>
                                <span class="text-teal-600 font-medium">Загрузить →</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 text-xs text-gray-400 text-center">
                        Ассортименты сохраняются в matrix-calc.html
                    </div>
                </div>
            `;
            modal.addEventListener('click', () => modal.remove());
            document.body.appendChild(modal);
        }

        const icons = {
            upload: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
            list: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>`,
            grid: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
            dollar: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
            order: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`,
            download: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            search: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
            check: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
            x: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            chevronRight: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>`,
            chevronDown: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="6 9 12 15 18 9"/></svg>`,
            trash: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            db: `<svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
            mapPin: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
            package: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`,
            sales: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
            stock: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`,
            chart: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
            plus: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
            save: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`,
            refresh: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
            import: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            export: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M16 10l4-4-4-4"/><line x1="20" y1="6" x2="12" y2="6"/><path d="M20 6h-8v12"/></svg>`,
            calendar: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
            truck: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
            suppliers: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`
        };

        function init() {
            loadStoresFromHTML();
            sales = load(KEYS.SALES, []);
            stocks = load(KEYS.STOCKS, []);
            deliverySchedule = load(KEYS.SCHEDULE, {});
            const supplierKeys = Object.keys(deliverySchedule);
            selectedScheduleSupplier = supplierKeys.length > 0 ? supplierKeys[0] : '';
            inTransitOrders = load(KEYS.INTRANSIT, []);
            supplierAssortment = load(KEYS.SUPPLIER_ASSORTMENT, {});
            supplierPrices = load(KEYS.SUPPLIER_PRICES, {});
            stockConsumptionData = load(KEYS.STOCK_CONSUMPTION, {});
            // Загрузка сохранённого заказа (автоудаление после 14 дней)
            var saved = load(KEYS.SAVED_ORDER, null);
            if (saved && saved.createdAt && (Date.now() - new Date(saved.createdAt).getTime()) < 14 * 86400000) {
                savedOrderResults = saved.items;
                savedOrderStats = saved.stats;
                orderEdits = saved.orderEdits || {};
                savedOrderDate = saved.date;
            } else {
                // Протух — удаляем
                if (saved) SharedUtils.save(KEYS.SAVED_ORDER, null);
                savedOrderResults = null;
            }
            autoCloseDeliveredOrders();

            // Загрузка с миграцией: старый формат (всё в matrix) → новый (matrix + matrixMarks)
            const savedAssort = load(KEYS.ASSORTMENT, null);
            const savedMarks = load(KEYS.MATRIX_MARKS, null);

            if (savedAssort !== null && savedMarks !== null) {
                // Новый формат
                matrix = savedAssort;
                matrixMarks = savedMarks;
            } else {
                // Старый формат — мигрируем
                const oldData = load('univ_matrix_v8', {});
                if (Object.keys(oldData).length > 0) {
                    console.log('Миграция: разделение matrix на assortment + matrixMarks...');
                    matrix = {};
                    matrixMarks = {};
                    Object.entries(oldData).forEach(([code, item]) => {
                        const catalog = {};
                        CATALOG_FIELDS.forEach(f => {
                            if (item[f] !== undefined && item[f] !== null) catalog[f] = item[f];
                        });
                        if (Object.keys(catalog).length > 0) matrix[code] = catalog;

                        const marks = {};
                        Object.entries(item).forEach(([k, v]) => {
                            if (!CATALOG_FIELDS.includes(k) && (v === 'ДА' || v === 'НЕТ')) {
                                marks[k] = v;
                            }
                        });
                        if (Object.keys(marks).length > 0) matrixMarks[code] = marks;
                    });
                    syncFishAssortment();
                    save(KEYS.MATRIX_MARKS, matrixMarks);
                    console.log(`Миграция: ${Object.keys(matrix).length} каталог, ${Object.keys(matrixMarks).length} marks`);
                }
            }

            // Автозаполнение supplierPrices из inPrice при загрузке
            ensureSupplierAssortment();
            save(KEYS.SUPPLIER_PRICES, supplierPrices);
            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);

            window.addEventListener('storage', (e) => {
                if (e.key === KEYS.STORES) loadStoresFromHTML();
            });

            // SharedData: cross-tab real-time sync
            if (window.SharedData) {
                // Push local data to SharedData on init
                try {
                    const arr = Object.values(matrix).filter(p => p && p.code);
                    if (arr.length > 0) SharedData.saveProducts(arr, 'fish-order');
                } catch(e) { console.warn('SharedData sync error:', e); }

                // Listen for changes from other tabs (assortment.html, sneki.html)
                SharedData.onChange(function(info) {
                    if (info.source !== 'fish-order') {
                        const fresh = SharedData.getProducts();
                        if (fresh && fresh.length > 0) {
                            // Convert array to object format and merge
                            fresh.forEach(function(p) {
                                if (!p.code) return;
                                const nc = SharedUtils.normCode(p.code);
                                if (!matrix[nc]) {
                                    matrix[nc] = {
                                        code: nc, nomenclature: p.nomenclature || p.name || '',
                                        group: p.group || '', packaging: p.packaging || 'ШТ',
                                        supplier: p.supplier || '', price: p.price || 0,
                                        inPrice: p.inPrice || p.price || 0, shelfPrice: p.shelfPrice || 0,
                                        shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                                        markup: p.markup || 0
                                    };
                                }
                            });
                            syncFishAssortment();
                            render();
                            console.log('[FishOrder] Synced from ' + info.source + ': ' + Object.keys(matrix).length + ' products');
                        }
                    }
                });
            }

            render();
        }

        function loadStoresFromHTML() {
            try {
                const data = load(KEYS.STORES, []);
                if (Array.isArray(data) && data.length > 0) {
                    stores = data;
                    console.log(`[FishOrder] Загружено ${stores.length} магазинов`);
                    return;
                }
            } catch (e) { console.error('Load stores error:', e); }
            stores = [];
        }

        // === SharedData sync helper ===
        function syncFishAssortment() {
            save(KEYS.ASSORTMENT, matrix);
            if (window.SharedData) {
                try {
                    const arr = Object.values(matrix).filter(p => p && p.code);
                    if (arr.length > 0) SharedData.saveProducts(arr, 'fish-order');
                } catch(e) {}
            }
        }

        function render() {
            const content = document.getElementById('content');
            const scrollTop = content.scrollTop;
            const tableContainer = document.querySelector('.table-container');
            const tableScrollTop = tableContainer ? tableContainer.scrollTop : 0;

            renderTabs();
            renderContent();
            updateStats();

            content.scrollTop = scrollTop;
            const newTableContainer = document.querySelector('.table-container');
            if (newTableContainer && tableScrollTop > 0) {
                newTableContainer.scrollTop = tableScrollTop;
            }
        }

        function updateStats() {
            document.getElementById('statsProducts').textContent = Object.keys(matrix).length + ' тов.';
            document.getElementById('statsStores').textContent = stores.length + ' ТТ';
        }

        function renderTabs() {
            const tabs = [
                { id: 'upload', label: 'Загрузка', icon: icons.upload },
                { id: 'assortment', label: 'Ассортимент', icon: icons.list },
                { id: 'prices', label: 'Цена', icon: icons.dollar },
                { id: 'matrix', label: 'Матрица', icon: icons.grid },
                { id: 'suppliers', label: 'Поставщики', icon: icons.suppliers },
                { id: 'order', label: 'Заказ', icon: icons.order },
                { id: 'intransit', label: 'В пути', icon: icons.truck }
            ];
            document.getElementById('tabs').innerHTML = tabs.map(t => `
                <button onclick="tab='${t.id}';render()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${tab === t.id ? 'bg-sky-600 text-white shadow-sm' : 'text-gray-600 hover:bg-white hover:text-gray-900'}">
                    ${t.icon}<span>${t.label}</span>
                </button>
            `).join('');
        }

        function renderContent() {
            const el = document.getElementById('content');
            switch(tab) {
                case 'upload': el.innerHTML = renderUpload(); break;
                case 'assortment': el.innerHTML = renderAssortment(); break;
                case 'prices': el.innerHTML = renderPrices(); break;
                case 'matrix': el.innerHTML = renderMatrix(); break;
                case 'suppliers': el.innerHTML = renderSuppliers(); break;
                case 'order': el.innerHTML = renderOrder(); break;
                case 'intransit': el.innerHTML = renderIntransit(); break;
            }
        }

        // === ГРАФИК ДОСТАВОК (Schedule Tab) ===
        const DAY_NAMES = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

        function saveSchedule() {
            save(KEYS.SCHEDULE, deliverySchedule);
            // Green flash indicator
            const indicator = document.getElementById('scheduleSaveIndicator');
            if (indicator) {
                indicator.textContent = '✓ Сохранено';
                indicator.className = 'text-xs text-emerald-600 font-medium transition-opacity';
                indicator.style.opacity = '1';
                setTimeout(() => { indicator.style.opacity = '0.4'; }, 1500);
            }
        }

        function ensureScheduleStores() {
            // Add any missing stores to all suppliers
            if (!stores || stores.length === 0) return;
            const emptyWeek = [false, false, false, false, false, false, false];
            Object.keys(deliverySchedule).forEach(supplier => {
                if (!deliverySchedule[supplier]) deliverySchedule[supplier] = {};
                stores.forEach(s => {
                    if (!deliverySchedule[supplier][s.tt]) {
                        deliverySchedule[supplier][s.tt] = [...emptyWeek];
                    }
                });
            });
        }

        function addSupplier() {
            const name = prompt('Введите название поставщика:');
            if (!name) return;
            if (deliverySchedule[name]) { alert('Поставщик уже существует'); return; }
            deliverySchedule[name] = {};
            stores.forEach(s => {
                deliverySchedule[name][s.tt] = [false, false, false, false, false, false, false];
            });
            selectedScheduleSupplier = name;
            saveSchedule();
            render();
        }

        function deleteSupplier(name) {
            if (!confirm(`Удалить поставщика "${name}"?`)) return;
            delete deliverySchedule[name];
            const remaining = Object.keys(deliverySchedule);
            selectedScheduleSupplier = remaining.length > 0 ? remaining[0] : '';
            saveSchedule();
            render();
        }

        function renameSupplier(oldName) {
            const newName = prompt('Новое название поставщика:', oldName);
            if (!newName || newName === oldName) return;
            if (deliverySchedule[newName]) { alert('Поставщик с таким названием уже существует'); return; }
            deliverySchedule[newName] = deliverySchedule[oldName];
            delete deliverySchedule[oldName];
            selectedScheduleSupplier = newName;
            saveSchedule();
            render();
        }

        function toggleDeliveryDay(supplier, store, dayIndex) {
            if (!deliverySchedule[supplier]) deliverySchedule[supplier] = {};
            if (!deliverySchedule[supplier][store]) deliverySchedule[supplier][store] = [false,false,false,false,false,false,false];
            deliverySchedule[supplier][store][dayIndex] = !deliverySchedule[supplier][store][dayIndex];
            saveSchedule();
            // Update just this checkbox without full re-render to avoid losing focus
            const cb = document.getElementById(`sched_${CSS.escape(supplier)}_${CSS.escape(store)}_${dayIndex}`);
            if (cb) {
                const isChecked = deliverySchedule[supplier][store][dayIndex];
                cb.className = isChecked
                    ? 'w-7 h-7 rounded bg-emerald-500 text-white border-0 cursor-pointer flex items-center justify-center transition-colors'
                    : 'w-7 h-7 rounded bg-white border-2 border-gray-300 cursor-pointer flex items-center justify-center transition-colors';
                cb.innerHTML = isChecked
                    ? '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
                    : '';
            }
            // Update Итого cell
            const totalEl = document.getElementById(`total_${CSS.escape(supplier)}_${CSS.escape(store)}`);
            if (totalEl) {
                const activeCount = deliverySchedule[supplier][store].filter(Boolean).length;
                totalEl.textContent = activeCount > 0 ? activeCount + ' дн.' : '—';
                totalEl.style.color = activeCount > 0 ? '#374151' : '#9ca3af';
            }
        }

        function renderScheduleCards() {
            const supplierNames = Object.keys(deliverySchedule);
            if (supplierNames.length === 0) return '';

            // Если выбранный поставщик не найден — берём первого
            if (!selectedScheduleSupplier || !deliverySchedule[selectedScheduleSupplier]) {
                selectedScheduleSupplier = supplierNames[0];
            }

            const current = selectedScheduleSupplier;
            const supplierData = deliverySchedule[current] || {};

            // Боковая панель с переключением поставщиков
            const sidebar = supplierNames.map(name => {
                const isActive = name === current;
                return `<button onclick="selectedScheduleSupplier='${esc(name)}';render()" class="w-full text-left px-3 py-1.5 text-xs font-medium rounded-lg transition-colors cursor-pointer ${isActive ? 'bg-sky-600 text-white shadow-sm' : 'text-gray-600 hover:bg-gray-100 border border-gray-200'}" title="${esc(name)}">${esc(name)}</button>`;
            }).join('');

            // Подсчитаем Итого по дням (сколько магазинов имеют доставку в каждый день)
            const totalsByDay = [0, 0, 0, 0, 0, 0, 0];
            let totalActiveCells = 0;

            // Таблица доставки для выбранного поставщика
            const storeRows = stores.map(s => {
                const days = supplierData[s.tt] || [false,false,false,false,false,false,false];
                const cells = days.map((checked, di) => {
                    if (checked) {
                        totalsByDay[di]++;
                        totalActiveCells++;
                    }
                    const isWeekend = di >= 5;
                    const cbId = `sched_${CSS.escape(current)}_${CSS.escape(s.tt)}_${di}`;
                    const cbClass = checked
                        ? 'w-5 h-5 rounded bg-emerald-500 text-white border-0 cursor-pointer flex items-center justify-center transition-colors'
                        : 'w-5 h-5 rounded bg-white border-2 border-gray-300 cursor-pointer flex items-center justify-center transition-colors';
                    const inner = checked
                        ? '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
                        : '';
                    return `<td class="px-0.5 py-0.5 ${isWeekend ? 'bg-red-50' : ''}"><div class="flex justify-center"><button id="${cbId}" class="${cbClass}" onclick="toggleDeliveryDay('${esc(current)}','${esc(s.tt)}',${di})">${inner}</button></div></td>`;
                }).join('');
                const activeCount = days.filter(Boolean).length;
                return `<tr class="hover:bg-gray-50">
                    <td class="text-left px-2 py-1 font-medium text-gray-700 text-xs whitespace-nowrap max-w-[200px] truncate" title="${esc(s.tt)}">${esc(s.tt)}</td>
                    ${cells}
                    <td class="px-1.5 py-1 text-xs font-medium" id="total_${CSS.escape(current)}_${CSS.escape(s.tt)}" style="color:${activeCount > 0 ? '#374151' : '#9ca3af'}">${activeCount > 0 ? activeCount + ' дн.' : '—'}</td>
                </tr>`;
            }).join('');

            // Строка Итого
            const totalCells = DAY_NAMES.map((d, i) => {
                const isWeekend = i >= 5;
                const cnt = totalsByDay[i];
                return `<td class="px-0.5 py-1 text-xs font-bold ${isWeekend ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700'}">${cnt > 0 ? cnt : ''}</td>`;
            }).join('');
            const totalRow = `<tr class="bg-gray-50 font-bold">
                <td class="text-left px-2 py-1 text-xs font-bold text-gray-800 sticky left-0 bg-gray-50 z-10">Итого</td>
                ${totalCells}
                <td class="px-1.5 py-1 text-xs font-bold text-gray-800 bg-gray-100">${totalActiveCells > 0 ? totalActiveCells + ' дн.' : '—'}</td>
            </tr>`;

            return `
                <div class="flex gap-3">
                    <div class="w-40 flex-shrink-0 space-y-1">
                        <div class="text-[10px] font-semibold text-gray-400 uppercase px-1 mb-1.5">Поставщики</div>
                        ${sidebar}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <h3 class="text-sm font-semibold text-gray-800 cursor-pointer hover:text-sky-600 transition-colors" onclick="renameSupplier('${esc(current)}')" title="Нажмите для переименования">${icons.truck} ${esc(current)}</h3>
                            </div>
                            <button onclick="deleteSupplier('${esc(current)}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors cursor-pointer">
                                ${icons.trash} Удалить
                            </button>
                        </div>
                        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full border-collapse text-center">
                                    <thead>
                                        <tr class="bg-gray-50">
                                            <th class="text-left px-2 py-1 text-[10px] font-semibold text-gray-500 border-b border-gray-200 sticky left-0 bg-gray-50 z-10">Магазин</th>
                                            ${DAY_NAMES.map((d, i) => `<th class="px-0.5 py-1 text-[10px] font-semibold border-b border-gray-200 w-8 ${i >= 5 ? 'text-red-500 bg-red-50' : 'text-gray-500'}">${d}</th>`).join('')}
                                            <th class="px-1.5 py-1 text-[10px] font-semibold text-gray-400 border-b border-gray-200">Итого</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${storeRows}
                                        ${totalRow}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderSchedule() {
            ensureScheduleStores();

            const supplierNames = Object.keys(deliverySchedule);
            const hasStores = stores && stores.length > 0;

            if (!hasStores) {
                return `
                    <div class="bg-white rounded-lg border border-gray-200 p-6">
                        <div class="text-center">
                            <div class="p-3 bg-amber-50 rounded-lg text-amber-500 inline-flex mb-3">${icons.calendar}</div>
                            <p class="text-gray-500 text-sm">Сначала добавьте магазины на главной странице</p>
                        </div>
                    </div>`;
            }

            if (supplierNames.length === 0) {
                return `
                    <div class="bg-white rounded-lg border border-gray-200 p-6">
                        <div class="text-center">
                            <div class="p-3 bg-sky-50 rounded-lg text-sky-500 inline-flex mb-3">${icons.calendar}</div>
                            <h3 class="text-gray-700 font-medium mb-1">График доставок</h3>
                            <p class="text-gray-400 text-sm mb-4">Настройте дни доставки по поставщикам и магазинам</p>
                            <button onclick="addSupplier()" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700 transition-colors cursor-pointer">
                                ${icons.plus} Добавить поставщика
                            </button>
                        </div>
                    </div>`;
            }

            return `
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-medium text-gray-700">График доставок</span>
                            <span class="text-xs text-gray-400">${supplierNames.length} поставщик(ов) • ${stores.length} магазин(ов)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span id="scheduleSaveIndicator" class="text-xs text-gray-300 transition-opacity" style="opacity:0"></span>
                            <button onclick="addSupplier()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700 transition-colors cursor-pointer">

                        </div>
                    </div>
                    ${renderScheduleCards()}
                </div>`;

        // === ПОСТАВЩИКИ (Suppliers Tab) ===
        function ensureSupplierAssortment() {
            // Добавить новые товары из matrix в supplierAssortment
            // Поставщики подтягиваются ТОЛЬКО если они УЖЕ есть в deliverySchedule (графике доставок рыбы)
            // Это предотвращает попадание поставщиков из Универсального расчёта
            const matrixCodes = Object.keys(matrix);
            const knownFishSuppliers = Object.keys(deliverySchedule);
            let newSuppliersAdded = false;

            matrixCodes.forEach(code => {
                if (!supplierAssortment[code]) {
                    supplierAssortment[code] = [];
                }
                // Подтягиваем поставщика из ассортимента ТОЛЬКО если это рыбный поставщик
                const supplier = (matrix[code] && matrix[code].supplier) || '';
                if (supplier && knownFishSuppliers.includes(supplier)) {
                    if (!supplierAssortment[code].includes(supplier)) {
                        supplierAssortment[code].push(supplier);
                    }
                    // Добавляем все магазины в график для поставщика
                    const emptyWeek = [false, false, false, false, false, false, false];
                    if (stores && stores.length > 0) {
                        stores.forEach(s => {
                            if (!deliverySchedule[supplier][s.tt]) {
                                deliverySchedule[supplier][s.tt] = [...emptyWeek];
                            }
                        });
                        newSuppliersAdded = true;
                    }
                    // Заполняем supplierPrices из inPrice
                    const inPrice = matrix[code].inPrice || 0;
                    if (inPrice > 0) {
                        if (!supplierPrices[code]) supplierPrices[code] = {};
                        if (!supplierPrices[code][supplier] || supplierPrices[code][supplier] === 0) {
                            supplierPrices[code][supplier] = inPrice;
                        }
                    }
                }
            });

            // Очистить supplierAssortment от поставщиков которых НЕТ в deliverySchedule
            matrixCodes.forEach(code => {
                if (supplierAssortment[code]) {
                    supplierAssortment[code] = supplierAssortment[code].filter(s => knownFishSuppliers.includes(s));
                    if (supplierAssortment[code].length === 0) delete supplierAssortment[code];
                }
            });

            if (newSuppliersAdded) {
                save(KEYS.SCHEDULE, deliverySchedule);
            }
            // Обновляем selectedScheduleSupplier если текущий не найден
            const existing = Object.keys(deliverySchedule);
            if (!selectedScheduleSupplier || !deliverySchedule[selectedScheduleSupplier]) {
                selectedScheduleSupplier = existing.length > 0 ? existing[0] : '';
            }
        }

        function toggleSupplierProduct(code, supplierName) {
            if (!supplierAssortment[code]) supplierAssortment[code] = [];
            const idx = supplierAssortment[code].indexOf(supplierName);
            if (idx >= 0) {

                    : 'w-6 h-6 rounded bg-white border-2 border-gray-300 cursor-pointer flex items-center justify-center transition-colors';

                    ? '<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
                    : '';

        function selectAllForSupplier(supplierName) {

                if (!supplierAssortment[code]) supplierAssortment[code] = [];
                if (!supplierAssortment[code].includes(supplierName)) {
                    supplierAssortment[code].push(supplierName);

            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
            render();

        function clearAllForSupplier(supplierName) {
            Object.keys(supplierAssortment).forEach(code => {
                const idx = supplierAssortment[code].indexOf(supplierName);
                if (idx >= 0) supplierAssortment[code].splice(idx, 1);

            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
            render();

        // === В ПУТИ (Intransit Tab) ===
        function renderIntransit() {
            const allOrders = inTransitOrders || [];
            const inTransit = allOrders.filter(o => o.status === 'in_transit');
            const delivered = allOrders.filter(o => o.status === 'delivered');
            const totalInTransitItems = inTransit.reduce((s, o) => s + (o.items || []).reduce((s2, i) => s2 + (i.qty || 0), 0), 0);
            const totalInTransitSum = inTransit.reduce((s, o) => s + (o.items || []).reduce((s2, i) => s2 + (i.sum || 0), 0), 0);

            // Find next delivery date
            let nextDeliveryStr = '—';
            let minDays = Infinity;
            inTransit.forEach(o => {
                if (o.expectedDate) {
                    const exp = new Date(o.expectedDate);
                    exp.setHours(0,0,0,0);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const diff = Math.ceil((exp - today) / 86400000);
                    if (diff >= 0 && diff < minDays) {
                        minDays = diff;
                        nextDeliveryStr = o.expectedDate + (diff === 0 ? ' (сегодня)' : diff === 1 ? ' (завтра)' : ` (через ${diff} дн.)`);
                    }
                }
            });

            const ordersHTML = inTransit.length === 0 && delivered.length === 0
                ? `<div class="text-center py-12">
                    <div class="p-3 bg-gray-100 rounded-lg text-gray-400 inline-flex mb-3">${icons.truck}</div>
                    <p class="text-gray-500 text-sm">Нет заказов в пути</p>
                    <p class="text-gray-400 text-xs mt-1">Сформируйте заказы во вкладке "Заказ"</p>
                </div>`
                : inTransit.map(o => {
                    const itemsTotal = (o.items || []).reduce((s, i) => s + (i.qty || 0), 0);
                    const itemsSum = (o.items || []).reduce((s, i) => s + (i.sum || 0), 0);
                    let daysRemaining = '';
                    if (o.expectedDate) {
                        const exp = new Date(o.expectedDate);
                        exp.setHours(0,0,0,0);
                        const today = new Date();
                        today.setHours(0,0,0,0);
                        const diff = Math.ceil((exp - today) / 86400000);
                        if (diff < 0) daysRemaining = `<span class="text-red-600 font-medium">Просрочено на ${Math.abs(diff)} дн.</span>`;
                        else if (diff === 0) daysRemaining = `<span class="text-amber-600 font-medium">Сегодня</span>`;
                        else daysRemaining = `<span class="text-sky-600">через ${diff} дн.</span>`;
                    }
                    return `
                    <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                        <div class="flex items-center justify-between px-4 py-3 bg-blue-50 border-b border-blue-100">
                            <div class="flex items-center gap-3">
                                <span class="bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">В пути</span>
                                <div>
                                    <div class="text-sm font-semibold text-gray-800">${esc(o.supplier || '')} → ${esc(o.store || '')}</div>
                                    <div class="text-[10px] text-gray-500">Создан: ${o.createdAt || '—'}${o.expectedDate ? ' • Доставка: ' + o.expectedDate : ''} ${daysRemaining}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500">${itemsTotal} шт • ${itemsSum.toFixed(0)} ₽</span>
                                <button onclick="markDelivered(${o.id})" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-emerald-700 bg-emerald-50 rounded-lg hover:bg-emerald-100 transition-colors cursor-pointer">${icons.check} Доставлено</button>
                                <button onclick="deleteInTransitOrder(${o.id})" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors cursor-pointer">${icons.trash} Удалить</button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full border-collapse text-xs">
                                <thead><tr class="bg-gray-50">
                                    <th class="text-left px-3 py-1.5 text-gray-500 font-medium border-b">Код</th>
                                    <th class="text-left px-3 py-1.5 text-gray-500 font-medium border-b">Наименование</th>
                                    <th class="text-center px-3 py-1.5 text-gray-500 font-medium border-b">Кол-во</th>
                                    <th class="text-center px-3 py-1.5 text-gray-500 font-medium border-b">Сумма</th>
                                    <th class="text-center px-3 py-1.5 text-gray-500 font-medium border-b w-10"></th>
                                </tr></thead>
                                <tbody>
                                    ${(o.items || []).map((item, idx) => `<tr class="hover:bg-gray-50">
                                        <td class="text-left px-3 py-1 font-mono text-gray-600">${item.code || ''}</td>
                                        <td class="text-left px-3 py-1 text-gray-700">${esc(item.name || '')}</td>
                                        <td class="text-center px-3 py-1 font-medium">${item.qty || 0}</td>
                                        <td class="text-center px-3 py-1 text-gray-600">${(item.sum || 0).toFixed(2)} ₽</td>
                                        <td class="text-center px-3 py-1"><button onclick="deleteInTransitItem(${o.id}, ${idx})" class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded p-1 transition-colors cursor-pointer" title="Удалить позицию">${icons.trash}</button></td>
                                    </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                }).join('') + (delivered.length > 0 ? `
                <div class="mt-3">
                    <div class="text-xs font-medium text-gray-500 mb-2 px-1">Доставленные (${delivered.length})</div>
                    ${delivered.map(o => {
                        const itemsTotal = (o.items || []).reduce((s, i) => s + (i.qty || 0), 0);
                        const itemsSum = (o.items || []).reduce((s, i) => s + (i.sum || 0), 0);
                        const arrivedCount = (o.items || []).filter(i => i.arrived !== false).length;
                        const notArrivedCount = (o.items || []).filter(i => i.arrived === false).length;
                        const collapsed = collapsedInTransit[o.id];
                        return `
                        <div class="bg-white rounded-lg border border-gray-200 mb-2 opacity-60 hover:opacity-80 transition-opacity">
                            <div class="flex items-center justify-between px-4 py-2 bg-green-50 border-b border-green-100 cursor-pointer" onclick="collapsedInTransit[${o.id}]=!collapsedInTransit[${o.id}];render()">
                                <div class="flex items-center gap-2">
                                    <span class="bg-green-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">✓ Доставлено</span>
                                    <div class="text-xs text-gray-600">${esc(o.supplier || '')} → ${esc(o.store || '')} • ${itemsTotal} шт • ${itemsSum.toFixed(0)} ₽</div>
                                    ${notArrivedCount > 0 ? `<span class="bg-red-100 text-red-700 text-[10px] px-1.5 py-0.5 rounded-full font-medium">! ${notArrivedCount} не приехало</span>` : ''}
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] text-gray-400">${o.expectedDate || ''}</span>
                                    <span class="text-gray-400 text-xs">${collapsed ? '▶' : '▼'}</span>
                                    <button onclick="event.stopPropagation();deleteInTransitOrder(${o.id})" class="btn inline-flex items-center justify-center w-7 h-7 text-xs text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition-colors cursor-pointer" title="Удалить">${icons.trash}</button>
                                </div>
                            </div>
                            ${collapsed ? '' : `
                            <div class="overflow-x-auto">
                                <table class="w-full border-collapse text-xs">
                                    <thead><tr class="bg-gray-50">
                                        <th class="text-left px-3 py-1 text-gray-500 font-medium border-b">Код</th>
                                        <th class="text-left px-3 py-1 text-gray-500 font-medium border-b">Наименование</th>
                                        <th class="text-center px-3 py-1 text-gray-500 font-medium border-b">Заказано</th>
                                        <th class="text-center px-3 py-1 text-gray-500 font-medium border-b">Статус</th>
                                        <th class="text-center px-3 py-1 text-gray-500 font-medium border-b w-10"></th>
                                    </tr></thead>
                                    <tbody>
                                        ${(o.items || []).map((item, idx) => `
                                        <tr class="hover:bg-gray-50 ${item.arrived === false ? 'bg-red-50' : ''}">
                                            <td class="text-left px-3 py-1 font-mono text-gray-600">${item.code || ''}</td>
                                            <td class="text-left px-3 py-1 text-gray-700">${esc(item.name || '')}</td>
                                            <td class="text-center px-3 py-1 font-medium">${item.qty || 0}</td>
                                            <td class="text-center px-3 py-1">
                                                ${item.arrived === false
                                                    ? `<span class="text-red-600 font-medium cursor-pointer hover:underline" onclick="toggleItemArrived(${o.id}, ${idx})">✗ Не приехало</span>`
                                                    : `<span class="text-green-600 cursor-pointer hover:underline" onclick="toggleItemArrived(${o.id}, ${idx})">✓ Приехало</span>`
                                                }
                                            </td>
                                            <td class="text-center px-3 py-1"><button onclick="deleteInTransitItem(${o.id}, ${idx})" class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded p-1 transition-colors cursor-pointer" title="Удалить позицию">${icons.trash}</button></td>
                                        </tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>`}
                        </div>`;
                    }).join('')}
                </div>` : '');

            return `
                <div class="space-y-3">
                    <div class="bg-white rounded-lg border border-gray-200 p-3">
                        <div class="flex justify-between items-center flex-wrap gap-3">
                            <div class="flex gap-3 items-center flex-wrap">
                                <div class="bg-blue-100 text-blue-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">В ПУТИ</div><div class="text-lg font-bold">${inTransit.length}</div></div>
                                <div class="bg-sky-100 text-sky-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">ТОВАРОВ</div><div class="text-lg font-bold">${totalInTransitItems}</div></div>
                                <div class="bg-violet-100 text-violet-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">СУММА</div><div class="text-lg font-bold">${totalInTransitSum.toFixed(0)} ₽</div></div>
                                <div class="bg-amber-100 text-amber-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">БЛИЖ. ДОСТАВКА</div><div class="text-sm font-bold">${nextDeliveryStr}</div></div>
                            </div>
                            <div class="flex gap-2">
                                ${delivered.length > 0 ? `<button onclick="clearDeliveredOrders()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-orange-500 rounded-lg hover:bg-orange-600 cursor-pointer">${icons.trash} Очистить доставленные (${delivered.length})</button>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${ordersHTML}
                    </div>
                </div>`;
        }

        function markDelivered(orderId) {
            const order = inTransitOrders.find(o => o.id === orderId);
            if (!order) return;
            order.status = 'delivered';
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function deleteInTransitOrder(orderId) {
            if (!confirm('Удалить заказ?')) return;
            inTransitOrders = inTransitOrders.filter(o => o.id !== orderId);
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function deleteInTransitItem(orderId, itemIdx) {
            const order = inTransitOrders.find(o => o.id === orderId);
            if (!order || !order.items || !order.items[itemIdx]) return;
            const item = order.items[itemIdx];
            if (!confirm('Удалить позицию "' + (item.name || item.code || '') + '" (' + (item.qty || 0) + ')?')) return;
            order.items.splice(itemIdx, 1);
            // Если все позиции удалены — удаляем заказ целиком
            if (order.items.length === 0) {
                inTransitOrders = inTransitOrders.filter(o => o.id !== orderId);
            } else {
                // Пересчитываем итоги заказа
                save(KEYS.INTRANSIT, inTransitOrders);
            }
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function clearDeliveredOrders() {
            const delivered = inTransitOrders.filter(o => o.status === 'delivered');
            if (delivered.length === 0) { alert('Нет доставленных заказов'); return; }
            if (!confirm(`Удалить ${delivered.length} доставленных заказов?`)) return;
            inTransitOrders = inTransitOrders.filter(o => o.status !== 'delivered');
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        // Переключение статуса товара в доставленном заказе (приехало / не приехало)
        function toggleItemArrived(orderId, itemIdx) {
            const order = inTransitOrders.find(o => o.id === orderId);
            if (!order || !order.items || !order.items[itemIdx]) return;
            order.items[itemIdx].arrived = !order.items[itemIdx].arrived;
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        // === ЗАГРУЗКА (Upload Tab) ===
        function renderUpload() {
            const savedAssortments = getSavedAssortments();
            const savedMatrices = getSavedMatrices();

            const matrixCount = Object.keys(matrix).length;
            const marksCount = Object.keys(matrixMarks).length;
            const hasMatrix = matrixCount > 0;
            const hasStocks = stocks.length > 0;
            const hasSales = sales.length > 0;
            const hasStores = stores.length > 0;
            const hasMarks = marksCount > 0;
            const canOrder = hasMatrix && hasStocks && hasStores;

            return `
                <div class="space-y-2">
