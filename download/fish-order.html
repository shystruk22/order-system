                            <th class="text-right" style="min-width:80px">Цена полки</th>
                            <th class="text-right" style="min-width:70px">Доход</th>
                            <th class="text-right" style="min-width:70px">Наценка %</th>
                            <th class="text-right" style="min-width:70px">Маржа %</th>
                        </tr>
                    </thead>
                    <tbody>`;

            const sortedGroups = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'ru'));
            sortedGroups.forEach(gr => {
                const items = grouped[gr];
                // Групповые итоги
                let grIncome = 0;
                let grMarkupSum = 0;
                let grMarginSum = 0;
                let grPricedCount = 0;
                items.forEach(p => {
                    const maxInP = getSupplierMaxPrice(p.code) || p.inPrice || p.price || 0;
                    const shP = p.shelfPrice || 0;
                    if (maxInP > 0 && shP > 0) {
                        grIncome += (shP - maxInP);
                        grMarkupSum += (shP - maxInP) / maxInP * 100;
                        grMarginSum += (shP - maxInP) / shP * 100;
                        grPricedCount++;
                    }
                });
                const grAvgMarkup = grPricedCount > 0 ? grMarkupSum / grPricedCount : 0;
                const grAvgMargin = grPricedCount > 0 ? grMarginSum / grPricedCount : 0;

                html += `<tr class="bg-sky-50 cursor-pointer hover:bg-sky-100" onclick="collapsedG['price_${esc(gr)}']=!collapsedG['price_${esc(gr)}'];render()">
                    <td colspan="${colspanVal}" class="font-semibold text-sky-800 py-1 px-2">
                        <span class="flex items-center gap-2">
                            ${collapsedG['price_' + gr] ? icons.chevronRight : icons.chevronDown}
                            ${gr} (${items.length})
                            <span class="text-[10px] text-gray-500 ml-2">Наценка: ${grAvgMarkup.toFixed(1)}% • Маржа: ${grAvgMargin.toFixed(1)}% • Доход: ${grIncome.toFixed(0)} ₽</span>
                        </span>
                    </td>
                </tr>`;

                if (!collapsedG['price_' + gr]) {
                    items.forEach(p => {
                        const code = p.code;
                        const sp = supplierPrices[code] || {};
                        const maxInP = getSupplierMaxPrice(code) || p.inPrice || p.price || 0;
                        const shP = p.shelfPrice || 0;
                        const income = shP - maxInP;
                        const markup = maxInP > 0 ? (shP - maxInP) / maxInP * 100 : 0;
                        const margin = shP > 0 ? (shP - maxInP) / shP * 100 : 0;

                        // Цветовая индикация наценки
                        let markupClass = '';
                        if (markup > 0 && markup < 15) markupClass = 'text-amber-600';
                        else if (markup >= 15 && markup < 30) markupClass = 'text-emerald-600';
                        else if (markup >= 30) markupClass = 'text-blue-600';
                        else if (markup <= 0 && shP > 0) markupClass = 'text-red-600 font-semibold';

                        let marginClass = '';
                        if (margin > 0 && margin < 10) marginClass = 'text-amber-600';
                        else if (margin >= 10 && margin < 20) marginClass = 'text-emerald-600';
                        else if (margin >= 20) marginClass = 'text-blue-600';
                        else if (margin <= 0 && shP > 0) marginClass = 'text-red-600 font-semibold';

                        let incomeClass = '';
                        if (income < 0) incomeClass = 'text-red-600 font-semibold';
                        else if (income > 0) incomeClass = 'text-emerald-600';

                        // Определяем, есть ли другие поставщики с такой же ценой (отметка макс.)
                        const priceVals = Object.values(sp).filter(v => v > 0);

                        html += `<tr class="hover:bg-gray-50">
                            <td class="text-xs text-gray-600">${esc(p.group || '')}</td>
                            <td class="font-medium text-gray-700 text-left whitespace-nowrap max-w-[200px] truncate" title="${esc(p.nomenclature || '')}">${esc(p.nomenclature || '')}</td>
                            <td class="font-mono text-xs text-gray-600">${code}</td>
                            <td class="text-center text-gray-500">${p.packaging || 'ШТ'}</td>
                            ${supplierNames.map(s => {
                                const val = sp[s] || 0;
                                const isMax = val > 0 && val === maxInP && priceVals.filter(v => v === val).length <= 1;
                                const cellClass = isMax ? 'text-amber-700 font-semibold bg-amber-50' : '';
                                return `<td class="text-right"><input type="number" step="0.01" value="${val}" onchange="updateSupplierPrice('${esc(code)}','${esc(s)}', parseFloat(this.value)||0)" class="input w-20 text-right text-xs ${cellClass}" title="Цена от ${esc(s)}"></td>`;
                            }).join('')}
                            <td class="text-right text-xs font-bold text-amber-700 bg-amber-50">${maxInP > 0 ? maxInP.toFixed(2) : '—'}</td>
                            <td class="text-right"><input type="number" step="0.01" value="${shP}" onchange="updatePrice('${esc(code)}', 'shelfPrice', parseFloat(this.value)||0)" class="input w-20 text-right text-xs"></td>
                            <td class="text-right text-xs font-medium ${incomeClass}">${shP > 0 && maxInP > 0 ? (income > 0 ? '+' : '') + income.toFixed(2) : '—'}</td>
                            <td class="text-right text-xs font-medium ${markupClass}">${maxInP > 0 && shP > 0 ? markup.toFixed(1) + '%' : '—'}</td>
                            <td class="text-right text-xs font-medium ${marginClass}">${maxInP > 0 && shP > 0 ? margin.toFixed(1) + '%' : '—'}</td>
                        </tr>`;
                    });
                }
            });

            html += `</tbody></table></div>`;
            return html;
        }

        function updateSupplierPrice(code, supplierName, value) {
            const nc = normCode(code);
            if (!supplierPrices[nc]) supplierPrices[nc] = {};
            if (value > 0) {
                supplierPrices[nc][supplierName] = value;
            } else {
                delete supplierPrices[nc][supplierName];
                if (Object.keys(supplierPrices[nc]).length === 0) delete supplierPrices[nc];
            }
            // НЕ перезаписываем inPrice максимальной ценой!
            // inPrice — это входящая цена товара (основного поставщика), не максимум.
            // Сохраняем supplierPrices — они используются в расчёте заказа напрямую.
            const product = matrix[nc] || matrix[code];
            if (product) {
                // Обновляем inPrice ТОЛЬКО если он ещё не был установлен
                // (берём минимальную цену из поставщиков как базовую)
                if (!product.inPrice || product.inPrice === 0) {
                    const minP = getSupplierMinPrice(nc);
                    if (minP > 0) product.inPrice = minP;
                }
                syncFishAssortment();
            }
            save(KEYS.SUPPLIER_PRICES, supplierPrices);
            render();
        }

        function getSupplierMinPrice(code) {
            const prices = supplierPrices[code] || {};
            const vals = Object.values(prices).filter(v => v > 0);
            if (vals.length > 0) return Math.min(...vals);
            return 0;
        }

        function recalcInPricesFromSuppliers() {
            if (!confirm('Исправить входящие цены (inPrice) у всех товаров?\n\nСейчас inPrice = максимальная цена поставщика.\nПосле исправления: inPrice = минимальная цена поставщика.\n\nЭто повлияет на расчёт заказа и наценки.')) return;

            let fixed = 0;
            Object.entries(matrix).forEach(([code, p]) => {
                const supPrices = supplierPrices[code];
                if (!supPrices) return;
                const vals = Object.values(supPrices).filter(v => v > 0);
                if (vals.length === 0) return;
                const minP = Math.min(...vals);
                const maxP = Math.max(...vals);
                if (minP !== maxP && (p.inPrice || 0) === maxP) {
                    p.inPrice = minP;
                    p.price = minP;
                    fixed++;
                }
            });

            syncFishAssortment();
            save(KEYS.ASSORTMENT, matrix);
            save(KEYS.SUPPLIER_PRICES, supplierPrices);
            render();
            alert('Исправлено: ' + fixed + ' товаров\ninPrice теперь = минимальная цена из поставщиков\n(ранее была максимальная)');
        }

        function updatePrice(code, field, value) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            if (!product) return;
            product[field] = value;
            if (field === 'inPrice') product.price = value;
            syncFishAssortment();
            render();
        }

        function applyDefaultMarkup() {
            const mu = prompt(`Применить наценку ко всем товарам без цены на полке.\nРасчёт от максимальной цены поставщика.\nТекущая наценка: ${defaultMarkup}%\n\nВведите наценку (%):`, defaultMarkup);
            if (mu === null) return;
            const markupVal = parseFloat(mu);
            if (isNaN(markupVal)) { alert('Некорректное значение'); return; }
            defaultMarkup = markupVal;

            let updated = 0;
            Object.values(matrix).forEach(p => {
                const maxInP = getSupplierMaxPrice(p.code) || p.inPrice || p.price || 0;
                if (maxInP > 0) {
                    const newShelfPrice = Math.round(maxInP * (1 + markupVal / 100) * 100) / 100;
                    if (!p.shelfPrice || p.shelfPrice === 0) {
                        p.shelfPrice = newShelfPrice;
                        updated++;
                    }
                }
            });

            syncFishAssortment();
            render();
            alert(`Наценка ${markupVal}% применена (от макс. цены поставщика).\nОбновлено: ${updated}\n(только товары без цены на полке)`);
        }

        function exportPrices() {
            const items = Object.values(matrix);
            const supplierNames = Object.keys(deliverySchedule);
            if (items.length === 0) { alert('Нет данных для экспорта'); return; }

            const headers = ['Группа', 'Наименование', 'Код', 'Упак.', ...supplierNames.map(s => 'Цена ' + s), 'Макс. вх.', 'Цена полки', 'Доход', 'Наценка %', 'Маржа %'];
            const data = items.map(p => {
                const sp = supplierPrices[p.code] || {};
                const maxInP = getSupplierMaxPrice(p.code) || p.inPrice || p.price || 0;
                const shP = p.shelfPrice || 0;
                const income = shP - maxInP;
                const markup = maxInP > 0 ? (shP - maxInP) / maxInP * 100 : 0;
                const margin = shP > 0 ? (shP - maxInP) / shP * 100 : 0;
                return [
                    p.group || '', p.nomenclature || '', p.code, p.packaging || 'ШТ',
                    ...supplierNames.map(s => sp[s] || 0),
                    maxInP, shP,
                    Math.round(income * 100) / 100,
                    Math.round(markup * 100) / 100,
                    Math.round(margin * 100) / 100
                ];
            });

            const ws = SharedUtils.createStyledSheet(data, headers, [0, 1]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Цены');

            const d = new Date();
            XLSX.writeFile(wb, 'цены_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx');
        }

        function importPrices(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });

                    if (json.length < 2) { alert('Файл пуст или некорректный формат'); return; }

                    // Заголовки из файла
                    const headers = json[0].map(h => String(h || '').trim());
                    const supplierNamesInFile = headers
                        .filter(h => h.startsWith('Цена '))
                        .map(h => h.replace('Цена ', '').trim());

                    // Находим индексы колонок
                    const idxGroup = headers.indexOf('Группа');
                    const idxName = headers.indexOf('Наименование');
                    const idxCode = headers.indexOf('Код');
                    const idxMaxIn = headers.indexOf('Макс. вх.');
                    const idxShelfPrice = headers.indexOf('Цена полки');

                    // Индексы цен поставщиков
                    const supplierIdxMap = {};
                    supplierNamesInFile.forEach(s => {
                        const colIdx = headers.indexOf('Цена ' + s);
                        if (colIdx >= 0) supplierIdxMap[s] = colIdx;
                    });

                    if (idxCode < 0) {
                        alert('Не найдена колонка "Код" в файле. Проверьте что это файл экспорта цен.');
                        return;
                    }

                    // Если в файле есть поставщики, которых нет в deliverySchedule — создаём их
                    supplierNamesInFile.forEach(sName => {
                        if (!deliverySchedule[sName]) {
                            deliverySchedule[sName] = {};
                            if (stores && stores.length > 0) {
                                stores.forEach(st => {
                                    deliverySchedule[sName][st.tt] = [false, false, false, false, false, false, false];
                                });
                            }
                        }
                    });

                    let updatedProducts = 0;
                    let updatedSupplierPrices = 0;
                    let notFound = 0;
                    let newSuppliersFound = 0;

                    for (let i = 1; i < json.length; i++) {
                        const r = json[i];
                        if (!r || r.length < 2) continue;

                        const code = normCode(String(r[idxCode] || '').trim());
                        if (!code || code === '0') continue;

                        const product = matrix[code];
                        if (!product) { notFound++; continue; }

                        // Обновляем цену полки
                        if (idxShelfPrice >= 0 && r[idxShelfPrice] !== undefined && r[idxShelfPrice] !== '') {
                            const shP = parseFloat(String(r[idxShelfPrice]).replace(',', '.')) || 0;
                            if (shP > 0) {
                                product.shelfPrice = shP;
                                updatedProducts++;
                            }
                        }

                        // Обновляем inPrice из Макс. вх.
                        if (idxMaxIn >= 0 && r[idxMaxIn] !== undefined && r[idxMaxIn] !== '') {
                            const maxIn = parseFloat(String(r[idxMaxIn]).replace(',', '.')) || 0;
                            if (maxIn > 0) {
                                product.inPrice = maxIn;
                                product.price = maxIn;
                            }
                        }

                        // Обновляем цены поставщиков
                        Object.entries(supplierIdxMap).forEach(([sName, colIdx]) => {
                            if (r[colIdx] !== undefined && r[colIdx] !== '') {
                                const price = parseFloat(String(r[colIdx]).replace(',', '.')) || 0;
                                if (price > 0) {
                                    if (!supplierPrices[code]) supplierPrices[code] = {};
                                    supplierPrices[code][sName] = price;
                                    updatedSupplierPrices++;

                                    // supplierAssortment
                                    if (!supplierAssortment[code]) supplierAssortment[code] = [];
                                    if (!supplierAssortment[code].includes(sName)) {
                                        supplierAssortment[code].push(sName);
                                        newSuppliersFound++;
                                    }
                                }
                            }
                        });

                        // Обновляем группу/наименование если в файле есть
                        if (idxGroup >= 0 && r[idxGroup]) {
                            const g = String(r[idxGroup]).trim();
                            if (g) product.group = g;
                        }
                        if (idxName >= 0 && r[idxName]) {
                            const n = String(r[idxName]).trim();
                            if (n) product.nomenclature = n;
                        }
                    }

                    // Сохраняем всё
                    syncFishAssortment();
                    save(KEYS.SUPPLIER_PRICES, supplierPrices);
                    save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
                    save(KEYS.SCHEDULE, deliverySchedule);
                    ensureSupplierAssortment();
                    save(KEYS.SUPPLIER_PRICES, supplierPrices);
                    render();

                    const msg = `Импорт цен завершён:
• Обновлено товаров (цена полки): ${updatedProducts}
• Обновлено цен поставщиков: ${updatedSupplierPrices}
• Новых связей товар↔поставщик: ${newSuppliersFound}
• Не найдено в каталоге: ${notFound}`;
                    alert(msg);
                } catch (err) {
                    console.error('Import prices error:', err);
                    alert('Ошибка импорта: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        function updateProduct(code, field, value) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            if (!product) return;
            product[field] = value;
            syncFishAssortment();
            if (['inPrice', 'markup', 'group'].includes(field)) render();
        }

        function deleteProduct(code) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            const key = matrix[nc] ? nc : code;
            if (!product) return;
            if (confirm(`Удалить "${product.nomenclature || code}"?`)) {
                delete matrix[key];
                delete matrixMarks[nc];
                delete matrixMarks[code];
                syncFishAssortment();
                save(KEYS.MATRIX_MARKS, matrixMarks);
                syncToSavedAssortment();
                render();
            }
        }

        function showAddProductModal() {
            document.getElementById('addProductModal').classList.remove('hidden');
            document.getElementById('addProductModal').classList.add('flex');
            document.getElementById('newProductName').focus();
        }

        function hideAddProductModal() {
            document.getElementById('addProductModal').classList.add('hidden');
            document.getElementById('addProductModal').classList.remove('flex');
        }

        function addNewProduct() {
            const name = document.getElementById('newProductName').value.trim();
            const code = document.getElementById('newProductCode').value.trim();
            if (!name || !code) { alert('Введите наименование и код'); return; }
            const normC = normCode(code);
            if (matrix[normC]) { alert('Товар уже существует'); return; }
            matrix[normC] = {
                nomenclature: name, code: normC,
                group: document.getElementById('newProductGroup').value.trim(),
                packaging: document.getElementById('newProductPackaging').value.trim() || 'ШТ',
                quant: parseFloat(document.getElementById('newProductQuant').value) || 1,
                volume: parseFloat(document.getElementById('newProductVolume').value) || 0,
                inPrice: parseFloat(document.getElementById('newProductPrice').value) || 0,
                markup: defaultMarkup
            };
            syncFishAssortment();
            syncToSavedAssortment();
            hideAddProductModal();
            render();
        }

        function importAssortment(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            
            SharedUtils.importAssortmentUnified(file).then(function(result) {
                const items = result.items;
                if (items.length === 0) {
                    alert('Не найдено товаров в файле');
                    return;
                }
                
                const existingCount = Object.keys(matrix).length;
                if (existingCount > 0) {
                    if (!confirm('Загружено ' + items.length + ' товаров. Заменить текущий ассортимент (' + existingCount + ' товаров)?')) {
                        input.value = '';
                        return;
                    }
                }
                
                matrix = {};
                items.forEach(function(p) {
                    const code = normCode(p.code);
                    matrix[code] = {
                        code: code,
                        nomenclature: p.nomenclature || '',
                        group: p.group || '',
                        packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '',
                        price: p.price || p.inPrice || 0,
                        inPrice: p.inPrice || p.price || 0,
                        shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0,
                        quant: p.quant || 1,
                        volume: p.volume || 0,
                        markup: p.markup || defaultMarkup,
                        mandatory: p.mandatory || false
                    };
                });
                
                syncFishAssortment();
                syncToSavedAssortment();
                ensureSupplierAssortment();
                save(KEYS.SUPPLIER_PRICES, supplierPrices);
                save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
                render();
                alert('Импортировано товаров: ' + items.length);
            }).catch(function(err) {
                alert('Ошибка импорта: ' + err.message);
                console.error(err);
            });
            
            input.value = '';
        }

        function exportAssortment() {
            SharedUtils.exportAssortmentUnified(Object.values(matrix));
        }

        function exportSchedule() {
            const supplierNames = Object.keys(deliverySchedule);
            if (supplierNames.length === 0) { alert('Нет поставщиков для экспорта'); return; }

            const headers = ['Магазин', ...DAY_NAMES, 'Итого дней'];
            const data = [];
            supplierNames.forEach(supplier => {
                data.push([]); // пустая строка-разделитель
                data.push([supplier]); // название поставщика
                const supplierData = deliverySchedule[supplier] || {};
                stores.forEach(s => {
                    const days = supplierData[s.tt] || [];
                    const activeCount = days.filter(Boolean).length;
                    data.push([
                        s.tt,
                        ...days.map(d => d ? 'Да' : ''),
                        activeCount > 0 ? activeCount + ' дн.' : ''
                    ]);
                });
            });

            const ws = SharedUtils.createStyledSheet(data, headers, [0]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'График доставок');

            const d = new Date();
            XLSX.writeFile(wb, 'график_доставок_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx');
        }

        // === МАТРИЦА ===
        function renderMatrix() {
            if (Object.keys(matrix).length === 0) return `<div class="bg-white rounded-lg border border-gray-200 p-4"><div class="text-center py-12">${icons.db}<p class="text-gray-500 mt-3">Загрузите данные</p></div></div>`;

            const grouped = {};
            const q = (searchMatrix || '').toLowerCase().trim();
            let filteredCount = 0;
            Object.entries(matrix).forEach(([code, p]) => {
                // Фильтрация по поиску
                if (q && !code.includes(q) && !(p.nomenclature || '').toLowerCase().includes(q) && !(p.group || '').toLowerCase().includes(q)) return;
                const gr = p.group || 'Без группы';
                if (!grouped[gr]) grouped[gr] = [];
                grouped[gr].push({ code, ...p });
                filteredCount++;
            });

            return `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex justify-between items-center flex-wrap gap-2">
                    <div class="flex gap-2 items-center">
                        <div class="bg-sky-100 text-sky-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Товаров: </span><strong>${Object.keys(matrix).length}</strong>
                        </div>
                        <div class="bg-violet-100 text-violet-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">В матрице: </span><strong>${Object.keys(matrixMarks).length}</strong>
                        </div>
                        <div class="bg-blue-100 text-blue-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Магазинов: </span><strong>${stores.length}</strong>
                        </div>
                        ${q ? `<div class="bg-amber-100 text-amber-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Найдено: </span><strong>${filteredCount}</strong>
                        </div>` : ''}
                    </div>
                    <div class="flex gap-2">
                        <button onclick="document.getElementById('matrixImportInput').click()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700">${icons.import} Импорт</button>
                        <input type="file" id="matrixImportInput" accept=".xlsx,.xls" onchange="importMatrix(this)" class="hidden">
                        <button onclick="exportMatrix()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex gap-2 items-center">

                                    const inMatrix = !!matrixMarks[p.code];
                                    return `
                                    <tr class="hover:bg-gray-50 ${inMatrix ? '' : 'opacity-60'}">
                                        <td class="text-left text-[10px] sticky left-0 bg-white z-10">${p.group || ''}</td>
                                        <td class="text-left font-medium text-xs">${p.nomenclature || ''}</td>

                                            const mark = matrixMarks[p.code] ? matrixMarks[p.code][s.tt] : null;
                                            const isYes = mark === 'ДА';
                                            const isNo = mark === 'НЕТ';
                                            return `<td class="text-center cursor-pointer font-medium select-none ${isYes ? 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200' : isNo ? 'bg-rose-50 text-rose-600 hover:bg-rose-100' : 'bg-gray-50 text-gray-300 hover:bg-gray-100'}" onclick="toggleMatrixCell('${esc(p.code)}', '${esc(s.tt)}')">
                                                ${isYes ? icons.check : ''}
                                            </td>`;
                                        }).join('')}
                                        <td class="text-center"><button onclick="event.stopPropagation();deleteFromMatrix('${esc(p.code)}')" class="text-red-500 hover:text-red-700 p-1">${icons.trash}</button></td>
                                    </tr>`;
                                }).join('')}
                            `).join('')}

                    </table>
                </div>
            </div>`;
        }

        function toggleMatrixCell(code, tt) {
            if (!matrixMarks[code]) matrixMarks[code] = {};
            matrixMarks[code][tt] = matrixMarks[code][tt] === 'ДА' ? 'НЕТ' : 'ДА';
            save(KEYS.MATRIX_MARKS, matrixMarks);
            render();
        }

        function deleteFromMatrix(code) {
            if (confirm(`Удалить "${matrix[code]?.nomenclature || code}"?`)) {
                delete matrix[code];
                delete matrixMarks[code];
                syncFishAssortment();
                save(KEYS.MATRIX_MARKS, matrixMarks);
                render();
            }
        }

        function importMatrix(input) {
            resetSavedOrders();
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
                    const headers = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 })[0] || [];

                    json.forEach(row => {
                        const code = normCode(String(row['Код'] || ''));
                        if (!code) return;

                        if (!matrix[code]) {
                            matrix[code] = { nomenclature: String(row['Наименование'] || '').trim(), code, group: String(row['Группа'] || '').trim() };
                        } else {
                            if (!matrix[code].group) matrix[code].group = String(row['Группа'] || '').trim();
                            if (!matrix[code].nomenclature) matrix[code].nomenclature = String(row['Наименование'] || '').trim();
                        }

                        if (!matrixMarks[code]) matrixMarks[code] = {};
                        headers.forEach((h, i) => {
                            if (i > 2 && h) {
                                const ttName = String(h).trim();
                                if (stores.some(s => s.tt === ttName)) {
                                    const val = String(row[ttName] || Object.values(row)[i] || '').toUpperCase();
                                    matrixMarks[code][ttName] = val === 'ДА' || val === 'YES' || val === '1' ? 'ДА' : 'НЕТ';
                                }
                            }
                        });
                    });
                    syncFishAssortment();
                    save(KEYS.MATRIX_MARKS, matrixMarks);
                    render();
                    alert(`Ассортимент: ${Object.keys(matrix).length} товаров\nОтметки матрицы: ${Object.keys(matrixMarks).length} товаров`);
                } catch (err) { alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        function exportMatrix() {
            if (Object.keys(matrix).length === 0) { alert('Нет данных'); return; }
            const headers = ['Группа', 'Наименование', 'Код', ...stores.map(s => s.tt)];
            const data = [];
            Object.entries(matrix).forEach(([code, p]) => {
                const row = [p.group || '', p.nomenclature || '', code];
                stores.forEach(s => row.push((matrixMarks[code] && matrixMarks[code][s.tt] === 'ДА') ? 'ДА' : 'НЕТ'));
                data.push(row);
            });
            const ws = SharedUtils.createStyledSheet(data, headers, [0, 1]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Матрица');
            const d = new Date(); XLSX.writeFile(wb, `матрица_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        // === DEBOUNCE ПОИСКА ===
        function onOrderSearch(input) {
            const val = input.value;
            const pos = input.selectionStart;
            searchResults = val;
            render();
            const el = document.getElementById('orderSearchInput');
            if (el) { el.focus(); el.setSelectionRange(pos, pos); }
        }

        let searchTimeoutAssort = null;
        function debounceSearchAssort(input) {
            const val = input.value;
            const pos = input.selectionStart;
            clearTimeout(searchTimeoutAssort);
            searchTimeoutAssort = setTimeout(() => {
                searchAssort = val;
                render();
                setTimeout(() => {
                    const el = document.getElementById('assortSearchInput');
                    if (el) { el.focus(); el.setSelectionRange(pos, pos); }
                }, 10);

        }

        let searchTimeoutMatrix = null;
        function debounceMatrixSearch() {
            const input = document.getElementById('matrixSearchInput');
            if (!input) return;
            const val = input.value;
            const pos = input.selectionStart;
            clearTimeout(searchTimeoutMatrix);
            searchTimeoutMatrix = setTimeout(() => {

                render();
                setTimeout(() => {
                    const el = document.getElementById('matrixSearchInput');
                    if (el) { el.focus(); el.setSelectionRange(pos, pos); }

        // === ЗАКАЗ ===
        function roundOrderQty(rawOrder, quant) {
            if (rawOrder <= 2) return 0;
            return Math.max(quant, Math.round(rawOrder / quant) * quant);
        }

        function calcOrder(stock, avgDay, periodDays, quant, shelf, packaging) {
            const minStock = shelf || 0;
            const prelim = stock - (avgDay * periodDays) - minStock;

            if (prelim > 1) return 0;

            let rawOrder;
            if (prelim < 0) {
                rawOrder = Math.abs(prelim);
            } else {
                rawOrder = 1;
            }

            if (packaging === 'КГ') {
                return Math.ceil(rawOrder / quant) * quant;
            }

            return roundOrderQty(rawOrder, quant);
        }

        // === ХЕЛПЕРЫ ДЛЯ РЫБНОГО ЗАКАЗА ===

        // Автоматическое закрытие заказов, у которых expectedDate <= сегодня
        function autoCloseDeliveredOrders() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let closed = 0;
            inTransitOrders.forEach(o => {
                if (o.status === 'in_transit' && o.expectedDate) {
                    const exp = new Date(o.expectedDate);
                    exp.setHours(0, 0, 0, 0);
                    if (exp <= today) {
                        o.status = 'delivered';
                        o.deliveredAt = today.toISOString().split('T')[0];
                        // Инициализируем arrived для каждого товара
                        if (!o.items) o.items = [];
                        o.items.forEach(item => {
                            if (item.arrived === undefined) item.arrived = true; // по умолчанию всё приехало
                        });
                        closed++;
                    }
                }
            });
            if (closed > 0) {
                save(KEYS.INTRANSIT, inTransitOrders);
                console.log(`[FishOrder] Автозакрыто ${closed} заказ(ов) по графику доставок`);
            }
        }

        // Количество доставленных товаров для ТТ+код (для прибавки к остатку)
        function getDeliveredQty(tt, code) {
            let total = 0;
            inTransitOrders.forEach(o => {
                if (o.status === 'delivered' && o.store === tt) {
                    const item = (o.items || []).find(i => i.code === code && i.arrived !== false);
                    if (item) total += (item.qty || 0);
                }
            });
            return total;
        }

        function getNextDeliveryDate(supplier, storeName) {
            if (!deliverySchedule[supplier] || !deliverySchedule[supplier][storeName]) return null;
            const days = deliverySchedule[supplier][storeName];
            const today = new Date();
            today.setHours(0,0,0,0);
            // Check today + next 14 days
            for (let d = 0; d < 14; d++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + d);
                let dow = checkDate.getDay(); // 0=Вс
                // Convert: our array is [Пн=0, Вт=1, Ср=2, Чт=3, Пт=4, Сб=5, Вс=6]
                let arrIdx = dow === 0 ? 6 : dow - 1;
                if (days[arrIdx]) return checkDate;
            }
            return null;
        }

        function getDaysUntilDelivery(supplier, storeName) {
            const nextDate = getNextDeliveryDate(supplier, storeName);
            if (!nextDate) return 99; // No delivery scheduled
            const today = new Date();
            today.setHours(0,0,0,0);
            return Math.ceil((nextDate - today) / 86400000);
        }

        // Получить период доставки для поставщика → магазин:
        // Возвращает {firstDeliveryDate, secondDeliveryDate, period} если доставка ЗАВТРА,
        // или null если завтра нет доставки
        function getDeliveryPeriod(supplier, storeName) {
            if (!deliverySchedule[supplier] || !deliverySchedule[supplier][storeName]) return null;
            const days = deliverySchedule[supplier][storeName];
            const today = new Date();
            today.setHours(0,0,0,0);

            let firstDeliveryDate = null;
            let secondDeliveryDate = null;

            for (let d = 1; d < 14; d++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + d);
                let dow = checkDate.getDay();
                let arrIdx = dow === 0 ? 6 : dow - 1;
                if (days[arrIdx]) {
                    if (!firstDeliveryDate) {
                        firstDeliveryDate = new Date(checkDate);
                    } else {
                        secondDeliveryDate = new Date(checkDate);
                        break;
                    }
                }
            }

            if (!firstDeliveryDate) return null;

            const daysUntilFirst = Math.ceil((firstDeliveryDate - today) / 86400000);
            if (daysUntilFirst !== 1) return null; // Только завтра!

            const period = secondDeliveryDate
                ? Math.ceil((secondDeliveryDate - firstDeliveryDate) / 86400000)
                : 7; // По умолчанию 7 дней если нет следующей доставки

            return { firstDeliveryDate, secondDeliveryDate, period };
        }

        function getInTransitQty(tt, code) {
            let total = 0;
            inTransitOrders.forEach(order => {
                if (order.status === 'in_transit' && order.store === tt) {
                    const item = order.items.find(i => i.code === code);
                    if (item) total += item.qty;
                }
            });
            return total;
        }

        // Расчёт: подсчёт выходных/будних дней в периоде начиная с ЗАВТРА
        function countDaysTypesFromTomorrow(period) {
            let weekendCount = 0, weekdayCount = 0;
            const today = new Date();
            today.setHours(0,0,0,0);
            for (let d = 1; d <= period; d++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + d);
                let dow = checkDate.getDay(); // 0=Вс, 1=Пн, 6=Сб
                // ПН(1), СБ(6), ВС(0) = выходные для рыбы
                if (dow === 1 || dow === 6 || dow === 0) weekendCount++;
                else weekdayCount++;
            }
            return { weekendCount, weekdayCount };
        }

        function placeOrders() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для заказа. Сначала откройте вкладку Заказ.');
                return;
            }

            // Если уже есть сохранённый заказ — спрашиваем про перезапись
            if (savedOrderDate) {
                if (!confirm('Перезаписать сохранённый заказ от ' + savedOrderDate + '?')) {
                    return; // Пользователь нажал "Нет" — продолжаем работать
                }
            }

            // Сохраняем текущий заказ как снимок (БЕЗ создания записей «в пути»)
            saveCurrentOrder();
        }

        // Определить, доставляется ли сегодня в магазин от конкретного поставщика
        function hasSupplierDeliveryToday(supplier, storeName) {
            if (!deliverySchedule[supplier] || !deliverySchedule[supplier][storeName]) return false;
            const today = new Date(); today.setHours(0,0,0,0);
            const dow = today.getDay();
            const arrIdx = dow === 0 ? 6 : dow - 1;
            return deliverySchedule[supplier][storeName][arrIdx];
        }

        function renderOrder() {
            if (Object.keys(matrix).length === 0 || stores.length === 0) {
                const missing = [];
                if (Object.keys(matrix).length === 0) missing.push({ label: 'Ассортимент', tab: 'upload' });
                if (stores.length === 0) missing.push({ label: 'Магазины (ТТ)', tab: 'upload' });
                if (stocks.length === 0) missing.push({ label: 'Остатки на ТТ', tab: 'upload' });

                return `
                    <div class="bg-white rounded-lg border border-gray-200 p-4">
                        <div class="text-center py-12">
                            ${icons.order}
                            <h3 class="text-lg font-semibold text-gray-700 mt-4">Не хватает данных для расчёта заказа</h3>
                            <div class="flex flex-wrap justify-center gap-3 mt-4">
                                ${missing.map(m => `
                                    <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-center">
                                        <p class="text-sm font-medium text-red-700">❌ ${m.label}</p>
                                        <button onclick="tab='${m.tab}';render()" class="mt-1 text-xs text-blue-600 hover:underline">Загрузить →</button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex flex-wrap justify-center gap-3 mt-4">
                                ${Object.keys(matrix).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Ассортимент загружен</span>' : ''}
                                ${stores.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Магазины загружены</span>' : ''}
                                ${stocks.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Остатки загружены</span>' : ''}
                                ${sales.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Продажи загружены</span>' : ''}
                                ${Object.keys(matrixMarks).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Матрица загружена</span>' : ''}
                                ${Object.keys(deliverySchedule).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ График доставок</span>' : ''}
                            </div>
                            <button onclick="tab='upload';render()" class="mt-6 btn inline-flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700">
                                ${icons.upload} Перейти к загрузке данных
                            </button>
                        </div>
                    </div>`;
            }

            // Всегда показываем редактируемый расчёт заказа
            // (сохранённый заказ загружается как orderEdits и применяется в расчёте)

            // === НОВЫЙ РАСЧЁТ ЗАКАЗА ===
            const allStores = [...stores];
            const skippedTodayInfo = []; // Для информирования о пропущенных

            // Карта остатков по ТТ и коду
            const stockMap = new Map();
            stocks.forEach(s => stockMap.set(`${s.tt}_${s.code}`, s));

            // Карта продаж по ТТ и коду
            const salesByTTCode = {};
            const nameToCode = {};
            Object.entries(matrix).forEach(([code, p]) => {
                if (p.nomenclature) nameToCode[p.nomenclature.trim().toLowerCase()] = code;
            });
            sales.forEach(s => {
                if (!s.tt) return;
                if (s.code) {
                    const key = `${s.tt}_${normCode(s.code)}`;
                    salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                } else if (s.name) {
                    const normName = s.name.trim().toLowerCase();
                    let code = nameToCode[normName];
                    if (!code) {
                        const entry = Object.entries(nameToCode).find(([name, c]) => name.includes(normName) || normName.includes(name));
                        if (entry) code = entry[1];
                    }
                    if (code) {
                        const key = `${s.tt}_${code}`;
                        salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                    }
                }
            });

            const results = [];
            const allOrderSuppliers = new Set();
            const conflictSummary = []; // Конфликты пересечения продукции

            allStores.forEach(store => {
                Object.entries(matrix).forEach(([code, p]) => {
                    const key = `${store.tt}_${code}`;
                    const stockData = stockMap.get(key);
                    const codeInMatrix = !!matrixMarks[code];
                    const markForTT = codeInMatrix ? (matrixMarks[code][store.tt] || 'НЕТ') : null;
                    const matrixDA = markForTT === 'ДА';
                    const notInMatrix = !codeInMatrix; // Товар есть в каталоге, но НЕ в матрице

                    // Товары НЕ в матрице — обрабатываем отдельно (ниже)
                    if (!matrixDA && !notInMatrix) return;

                    // Получить всех поставщиков для товара
                    const suppliers = (supplierAssortment[code] && supplierAssortment[code].length > 0)
                        ? supplierAssortment[code]
                        : (p.supplier ? [p.supplier] : []);

                    // Для каждого поставщика проверить: доставка ЗАВТРА?
                    const supplierPeriodMap = {};
                    suppliers.forEach(sup => {
                        const dp = getDeliveryPeriod(sup, store.tt);
                        if (dp) {
                            supplierPeriodMap[sup] = dp.period;
                        } else {
                            // Если доставка сегодня — запомним для информации
                            if (hasSupplierDeliveryToday(sup, store.tt)) {
                                const infoKey = `${sup}→${store.tt}`;
                                if (!skippedTodayInfo.find(i => i.key === infoKey)) {
                                    skippedTodayInfo.push({ key: infoKey, supplier: sup, store: store.tt });
                                }
                            }
                        }
                    });

                    const periodArr = Object.values(supplierPeriodMap);

                    // Товар НЕ в матрице — показываем только если есть доставка завтра
                    if (notInMatrix) {
                        if (periodArr.length === 0) return; // Нет доставки завтра — пропускаем
                        // Для не-матричных товаров — минимальный заказ (0.5 кг)
                        const supplierOrders = {};
                        const primarySupplier = p.supplier || '';
                        const quant = p.quant || 1;
                        const inPrice = p.inPrice || 0;

                        suppliers.forEach(sup => {
                            if (!(sup in supplierPeriodMap)) return;
                            const editKey = `${store.tt}_${code}_${sup}`;
                            let supOrder = orderEdits[editKey] !== undefined ? orderEdits[editKey] : 0;
                            const supSpecificPrice = (supplierPrices[code] && supplierPrices[code][sup]) || p.inPrice || 0;
                            supplierOrders[sup] = { order: supOrder, inPrice: supSpecificPrice, sum: supOrder * supSpecificPrice, daysUntil: 1 };
                            if (supOrder > 0) allOrderSuppliers.add(sup);
                        });

                        results.push({
                            tt: store.tt, code, nomenclature: p.nomenclature || '',
                            group: p.group || '', supplier: primarySupplier,
                            currentStock: stockData ? (stockData.currentStock || 0) : 0,
                            deliveredQty: 0, effectiveStock: stockData ? (stockData.currentStock || 0) : 0,
                            sales: 0, daysPresent: 0, effectiveDays: 0,
                            weekendAvg: 0, weekdayAvg: 0, avgSalesPerDay: 0,
                            weekendCount: 0, weekdayCount: 0, daysUntil: 7,
                            estimatedSales: 0, inTransitQty: 0,
                            rawOrder: 0, order: 0, quant, inPrice, sum: 0, shelf: 0,
                            status: 'не в матрице',
                            statusType: 'notInMatrix',
                            supplierOrders, hasConflict: false,
                            notInMatrix: true
                        });
                        return;
                    }

                    // Товар В матрице — обычная логика
                    if (periodArr.length === 0) return; // Никто не доставляет завтра

                    // Берём минимальный период (самый частый цикл)
                    const forecastPeriod = Math.min(...periodArr);

                    const inTransitQty = getInTransitQty(store.tt, code);
                    const deliveredQty = getDeliveredQty(store.tt, code);
                    const currentStock = stockData ? (stockData.currentStock || 0) : 0;
                    const effectiveStock = currentStock + deliveredQty;
                    const totalSales = salesByTTCode[key] || 0;
                    const daysPresent = stockData ? (stockData.daysPresent || 0) : 0;
                    const effectiveDays = daysPresent > 0 ? daysPresent : (stockData ? (stockData.totalDays || 0) : 0);
                    const avgSalesPerDay = effectiveDays > 0 ? totalSales / effectiveDays : 0;

                    const { weekendCount, weekdayCount } = countDaysTypesFromTomorrow(forecastPeriod);
                    const weekendAvg = getWeekendAvg(store.tt, code);
                    const weekdayAvg = getWeekdayAvg(store.tt, code);

                    let estimatedSales;
                    if (weekendAvg > 0 || weekdayAvg > 0) {
                        estimatedSales = (weekdayCount * weekdayAvg) + (weekendCount * weekendAvg);
                    } else {
                        estimatedSales = avgSalesPerDay * forecastPeriod;
                    }

                    const quant = p.quant || 1;
                    const inPrice = p.inPrice || 0;
                    const shelf = p.shelf || 0;
                    // Заказ = прогноз продаж + полка (мин. остаток) — текущий остаток — в пути
                    let rawOrder = estimatedSales + shelf - effectiveStock - inTransitQty;

                    // Логика заказа:
                    // 1) Продажи=0 И остаток >= полка → НЕ заказываем (есть запас, товар не продаётся)
                    // 2) Продажи>0 → обычный расчёт (с учётом полки)
                    // 3) Остаток=0 (любые продажи) И товар в матрице → мин. заказ 0.5 кг
                    // 4) Остаток < полки → заказать до полки даже если продаж нет

                    const hasSales = totalSales > 0;
                    const hasStock = effectiveStock > 0;
                    const belowShelf = shelf > 0 && effectiveStock < shelf;

                    let order = 0;
                    let orderReason = '';

                    if (hasSales) {
                        // Есть продажи — обычный расчёт (полка уже в rawOrder)
                        order = rawOrder > 0 ? Math.ceil(rawOrder / quant) * quant : 0;
                        if (order > 0) {
                            orderReason = `заказ ${order} кг`;
                        } else if (rawOrder <= 0) {
                            orderReason = `хватает (${effectiveStock.toFixed(1)} кг)`;
                        } else {
                            orderReason = `достаточно`;
                        }
                    } else if (!hasStock) {
                        // Нет остатков — мин. заказ 0.5 кг (товар в матрице, значит нужен)
                        order = 0.5;
                        orderReason = `мин. заказ 0.5 кг (нет остатков)`;
                    } else if (belowShelf) {
                        // Продаж нет, но остаток ниже полки — дозаказ до полки
                        order = Math.ceil((shelf - effectiveStock) / quant) * quant;
                        if (order > 0) {
                            orderReason = `до полки (${shelf} кг), заказ ${order} кг`;
                        } else {
                            order = quant;
                            orderReason = `до полки (${shelf} кг), заказ ${order} кг`;
                        }
                    } else {
                        // Продаж нет, остаток >= полки — НЕ заказываем
                        order = 0;
                        orderReason = `остаток ${effectiveStock.toFixed(1)} кг, продаж нет`;
                    }

                    // Округляем чтобы убрать float ошибки (0.7000000000000001 → 0.7)
                    order = Math.round(order * 100) / 100;

                    // Build supplierOrders для поставщиков с доставкой ЗАВТРА
                    const supplierOrders = {};
                    const primarySupplier = p.supplier || '';

                    suppliers.forEach(sup => {
                        if (!(sup in supplierPeriodMap)) return;
                        const editKey = `${store.tt}_${code}_${sup}`;
                        let supOrder = 0;

                        if (hasSales) {
                            supOrder = rawOrder > 0 ? Math.ceil(rawOrder / quant) * quant : 0;
                        } else if (!hasStock) {
                            supOrder = 0.5;
                        } else if (belowShelf) {
                            supOrder = Math.ceil((shelf - effectiveStock) / quant) * quant;
                            if (supOrder <= 0) supOrder = quant;
                        }
                        // else: продаж нет, остаток >= полки → supOrder = 0

                        supOrder = Math.round(supOrder * 100) / 100;
                        if (orderEdits[editKey] !== undefined) supOrder = orderEdits[editKey];

                        // Цена конкретного поставщика (не максимальная из всех!)
                        const supSpecificPrice = (supplierPrices[code] && supplierPrices[code][sup]) || p.inPrice || 0;
                        const supSum = supOrder * supSpecificPrice;
                        // Всегда добавляем запись (даже при order=0), чтобы ячейка была редактируемой
                        supplierOrders[sup] = { order: supOrder, inPrice: supSpecificPrice, sum: supSum, daysUntil: 1 };
                        if (supOrder > 0) allOrderSuppliers.add(sup);
                    });

                    // hasConflict: >1 поставщик с заказом > 0
                    const activeSuppliersCount = Object.keys(supplierOrders).filter(s => supplierOrders[s].order > 0).length;
                    let hasConflict = activeSuppliersCount > 1;

                    // Статус
                    let statusText = orderReason;
                    if (hasConflict && order > 0) {
                        const supNames = Object.keys(supplierPeriodMap).join('/');
                        statusText += ` | пересечение: ${supNames}`;

                    if (hasConflict) {

                            tt: store.tt, code, name: p.nomenclature || code,

                        });

                    // Primary order for stats
                    const editKeyPrimary = `${store.tt}_${code}_${primarySupplier}`;

                    else if (orderEdits[`${store.tt}_${code}`] !== undefined) order = orderEdits[`${store.tt}_${code}`];

                    const weekendAvgDisplay = weekendAvg || 0;
                    const sum = order * inPrice;

                    results.push({
                        tt: store.tt, code, nomenclature: p.nomenclature || stockData?.name || '',
                        group: p.group || '', supplier: primarySupplier, currentStock, deliveredQty, effectiveStock,
                        sales: totalSales, daysPresent, effectiveDays,
                        weekendAvg: weekendAvgDisplay, weekdayAvg, avgSalesPerDay,
                        weekendCount, weekdayCount, daysUntil: forecastPeriod,
                        estimatedSales, inTransitQty,
                        rawOrder: rawOrder > 0 ? rawOrder : 0,
                        order, quant, inPrice, sum, shelf: p.shelf || 0,
                        status: statusText,
                        statusType: order > 0 ? 'order' : 'ok',
                        supplierOrders, hasConflict,
                        notInMatrix: false
                    });
                });
            });

            // Фильтрация
            let filtered = results;
            if (searchResults) {
                const s = searchResults.toLowerCase();
                filtered = filtered.filter(r => r.nomenclature?.toLowerCase().includes(s) || r.code?.includes(s) || r.group?.toLowerCase().includes(s) || (r.supplier || '').toLowerCase().includes(s));
            }
            if (filterTT) filtered = filtered.filter(r => r.tt === filterTT);
            if (filterGroup) filtered = filtered.filter(r => r.group === filterGroup);
            if (filterStatus === 'orders') filtered = filtered.filter(r => r.order > 0);

            // Группировка: ТТ → Группа товара → товары
            const groupedTT = {};
            filtered.forEach(r => {
                if (!groupedTT[r.tt]) groupedTT[r.tt] = {};

            // Сортировка внутри каждой группы
            Object.keys(groupedTT).forEach(tt => {
                const groups = groupedTT[tt];
                const sortedGroups = Object.entries(groups).sort(([gA], [gB]) => gA.localeCompare(gB, 'ru'));
                groupedTT[tt] = Object.fromEntries(sortedGroups);

            const stats = { total: filtered.length, toOrder: filtered.filter(r => r.order > 0).length, sum: filtered.reduce((s, r) => s + r.sum, 0) };
            const allGroups = getAllGroups();

            // Dynamic supplier columns — все поставщики с активными днями доставки + с ручными правками
            const allScheduledSuppliers = new Set();
            Object.entries(deliverySchedule).forEach(function(entry) {
                var sup = entry[0], storeMap = entry[1];

            // Добавляем поставщиков из ручных правок (даже если нет в графике)

            const supplierColumns = [...allOrderSuppliers].concat([...allScheduledSuppliers].filter(function(s) { return !allOrderSuppliers.has(s); })).sort();
            const colCount = 7 + supplierColumns.length;

                    const name = p.nomenclature || code;

                    // 1) Матрица
                    const inMatrix = !!matrixMarks[code];
                    const mark = inMatrix ? (matrixMarks[code][store.tt] || 'НЕТ') : 'не в матрице';
                    const matrixOk = mark === 'ДА' || !inMatrix;

                    // 2) Поставщики товара
                    const supList = (supplierAssortment[code] && supplierAssortment[code].length > 0)
                        ? supplierAssortment[code]
                        : (p.supplier ? [p.supplier] : []);
                    const supStr = supList.join(', ') || '(пусто)';

                    // 3) Для каждого поставщика — доставка завтра?
                    const supDetails = supList.map(sup => {
                        const dp = getDeliveryPeriod(sup, store.tt);
                        const dpToday = hasSupplierDeliveryToday(sup, store.tt);
                        const inSchedule = !!deliverySchedule[sup] && !!deliverySchedule[sup][store.tt];
                        const scheduleDays = inSchedule ? deliverySchedule[sup][store.tt].map((d, i) => d ? DAY_NAMES[i] : '').filter(Boolean).join(', ') : '(не найден в графике)';

                        // Проверяем совпадение имени
                        const nameMatch = scheduleKeys.includes(sup);

                        return '  ' + sup + ': dp=' + (dp ? dp.period + 'дн' : 'null') +
                            ', сегодня=' + dpToday +
                            ', вГрафике=' + inSchedule +
                            ', имяСовпадает=' + nameMatch +
                            ', дни=[' + scheduleDays + ']';
                    });

                    lines.push(name + ' (' + code + '): матрица=' + mark + (matrixOk ? ' ✓' : ' ✗') +
                        ', поставщики=[' + supStr + ']');
                    supDetails.forEach(d => lines.push(d));
                });
                lines.push('');
            });

            // Выводим в консоль И в alert
            const text = lines.join('\n');
            console.log(text);
            alert(text);
        }
