        function parseStocksLocal(json) {
            let lastCol = 0;
            for (let i = 0; i < json.length; i++) if (json[i]) lastCol = Math.max(lastCol, json[i].length - 1);

            const items = [];
            const foundTTs = new Set();
            let curTT = '';

            for (let i = 3; i < json.length; i++) {
                const r = json[i];
                if (!r || r.length < 3) continue;

                const c0 = String(r[0] || '').trim();
                const code = String(r[1] || '').trim();

                const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(code);
                const isProductCode = /^\d/.test(code) || code.length >= 5;

                if (isTT) {
                    curTT = c0;
                    foundTTs.add(curTT);
                } else if (isProductCode && curTT && c0) {
                    const normC = normCode(code);
                    const currentStock = parseFloat(String(r[lastCol])) || 0;

                    let daysPresent = 0, totalDays = 0;
                    for (let col = 2; col <= lastCol; col++) {
                        const val = r[col];
                        if (val !== undefined && val !== null && val !== '') {
                            totalDays++;
                            if ((parseFloat(String(val)) || 0) > 0) daysPresent++;
                        }
                    }

                    items.push({ tt: curTT, code: normC, name: c0, currentStock, daysPresent, totalDays });
                }
            }
            return items;
        }

        // === РАСЧЁТ ПОТРЕБЛЕНИЯ ИЗ ФАЙЛА ОСТАТКОВ ===
        // Парсим даты из строки 3 заголовков (json[2]) и вычисляем ежедневное потребление
        // по разнице остатков между соседними днями. Разделяем на выходные/будние.
        function parseStockConsumption(json) {
            stockConsumptionData = {};

            // Строка с датами — json[2] (3-я строка: 0=заголовок, 1=подзаголовок, 2=даты)
            const dateRow = json[2] || [];
            const dateInfos = []; // [{col, isWeekend, dow, date}]

            for (let c = 2; c < dateRow.length; c++) {
                const cellVal = String(dateRow[c] || '').trim();
                if (!cellVal) continue;

                let date = null;
                if (/^\d{4}-\d{2}-\d{2}/.test(cellVal)) {
                    date = new Date(cellVal);
                } else if (/^\d{2}\.\d{2}\.\d{2,4}/.test(cellVal)) {
                    const parts = cellVal.split('.');
                    const year = parts[2].length === 2 ? '20' + parts[2] : parts[2];
                    date = new Date(year, parts[1]-1, parts[0]);
                } else {
                    const numDate = parseFloat(cellVal);
                    if (numDate > 40000 && numDate < 60000) {
                        date = new Date((numDate - 25569) * 86400 * 1000);
                    }
                }

                if (date && !isNaN(date.getTime())) {
                    const dow = date.getDay();
                    const isWeekend = (dow === 1 || dow === 6 || dow === 0); // ПН, СБ, ВС = выходные
                    dateInfos.push({ col: c, isWeekend, dow, date });
                }
            }

            if (dateInfos.length < 2) {
                console.log(`[FishOrder] Недостаточно дат в файле остатков для расчёта потребления (найдено: ${dateInfos.length})`);
                return;
            }

            // Собираем данные по ТТ: {tt: [{code, values: {col: stock}}]}
            let curTT = '';
            const ttData = {};

            for (let i = 3; i < json.length; i++) {
                const r = json[i];
                if (!r || r.length < 3) continue;

                const c0 = String(r[0] || '').trim();
                const code = String(r[1] || '').trim();
                const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(code);

                if (isTT) {
                    curTT = c0;
                    if (!ttData[curTT]) ttData[curTT] = [];
                } else {
                    const isProductCode = /^\d/.test(code) || code.length >= 5;
                    if (isProductCode && curTT) {
                        const values = {};
                        dateInfos.forEach(di => {
                            const val = parseFloat(String(r[di.col] || ''));
                            if (!isNaN(val)) values[di.col] = val;
                        });
                        ttData[curTT].push({ code: normCode(code), values });
                    }
                }
            }

            // Вычисляем потребление: stock[prev] - stock[curr] (только положительное = реальные продажи)
            let totalProducts = 0;

            Object.entries(ttData).forEach(([tt, products]) => {
                products.forEach(prod => {
                    const key = `${tt}_${prod.code}`;
                    let wSales = 0, wDays = 0, wdSales = 0, wdDays = 0;

                    for (let di = 1; di < dateInfos.length; di++) {
                        const prevStock = prod.values[dateInfos[di-1].col];
                        const currStock = prod.values[dateInfos[di].col];

                        if (prevStock === undefined || currStock === undefined) continue;

                        const consumption = prevStock - currStock;
                        if (consumption <= 0) continue; // Остаток вырос (доставка) — пропускаем

                        if (dateInfos[di].isWeekend) {
                            wSales += consumption;
                            wDays++;
                        } else {
                            wdSales += consumption;
                            wdDays++;
                        }
                    }

                    if (wDays > 0 || wdDays > 0) {
                        stockConsumptionData[key] = {
                            weekendSales: wSales, weekendDays: wDays,
                            weekdaySales: wdSales, weekdayDays: wdDays
                        };
                        totalProducts++;
                    }
                });
            });

            // Сохраняем в localStorage
            save(KEYS.STOCK_CONSUMPTION, stockConsumptionData);

            console.log(`[FishOrder] Расчёт потребления из остатков: ${totalProducts} товаров, ${dateInfos.length} дней`);
            console.log(`[FishOrder] С выходными данными: ${Object.values(stockConsumptionData).filter(d => d.weekendDays > 0).length}, С будними: ${Object.values(stockConsumptionData).filter(d => d.weekdayDays > 0).length}`);
        }

        // === ПАРСИНГ ВЫХОДНЫХ ПРОДАЖ ИЗ ФАЙЛА ПРОДАЖ ===
        function parseWeekendSales(json) {
            weekendSales = {};
            weekdaySales = {};
            weekendDays = {};
            weekdayDays = {};
            
            // Формат 1: Кол 0 = ТТ/код, Кол 1 = Кол-во, возможна дата в других колонках
            // Ищем колонку с датой
            const headers = json[0] || [];
            const subHeaders = json[1] || [];
            
            // Ищем колонку с датой по заголовкам
            let dateColIdx = -1;
            for (let i = 0; i < Math.max(headers.length, subHeaders.length); i++) {
                const h = String(headers[i] || subHeaders[i] || '').toLowerCase();
                if (/дата|период|date|день/.test(h)) {
                    dateColIdx = i;
                    break;
                }
            }
            
            // Если нашли колонку с датами — парсим с разбивкой по дням недели
            if (dateColIdx >= 0) {
                let curTT = '';
                for (let i = 2; i < json.length; i++) {
                    const r = json[i];
                    if (!r || r.length === 0) continue;
                    
                    const c0 = String(r[0] || '').trim();
                    const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(c0);
                    const isProductCode = /^\d/.test(c0);
                    
                    if (isTT) {
                        curTT = c0;
                    } else if (isProductCode && curTT) {
                        const qty = parseFloat(String(r[1])) || 0;
                        if (qty <= 0) continue;
                        
                        const code = normCode(c0);
                        const key = `${curTT}_${code}`;
                        const dateStr = String(r[dateColIdx] || '');
                        
                        // Пытаемся определить день недели из даты
                        let dayOfWeek = -1;
                        if (dateStr) {
                            // Пытаемся распарсить дату (Excel numeric or string format)
                            let date;
                            if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) {
                                date = new Date(dateStr);
                            } else if (/^\d{2}\.\d{2}\.\d{4}/.test(dateStr)) {
                                const parts = dateStr.split('.');
                                date = new Date(parts[2], parts[1]-1, parts[0]);
                            } else {
                                const numDate = parseFloat(dateStr);
                                if (numDate > 40000 && numDate < 60000) {
                                    // Excel serial date
                                    date = new Date((numDate - 25569) * 86400 * 1000);
                                }
                            }
                            if (date && !isNaN(date.getTime())) {
                                dayOfWeek = date.getDay(); // 0=Вс, 1=Пн, 6=Сб
                            }
                        }
                        
                        // ПН(1), СБ(6), ВС(0) = выходные для рыбы
                        const isWeekend = (dayOfWeek === 1 || dayOfWeek === 6 || dayOfWeek === 0);
                        
                        if (isWeekend) {
                            weekendSales[key] = (weekendSales[key] || 0) + qty;
                            weekendDays[key] = (weekendDays[key] || 0) + 1;
                        } else if (dayOfWeek >= 0) {
                            weekdaySales[key] = (weekdaySales[key] || 0) + qty;
                            weekdayDays[key] = (weekdayDays[key] || 0) + 1;
                        }
                    }
                }
                console.log(`[FishOrder] Выходные продажи: ${Object.keys(weekendSales).length} товаров`);
            } else {
                // Если колонка дат не найдена — разбираем продажи если файл построчный (одна продажа = одна строка с датой)
                // Ищем дату в колонках 2+ 
                let curTT = '';
                let foundDates = 0;
                
                for (let i = 2; i < json.length; i++) {
                    const r = json[i];
                    if (!r || r.length === 0) continue;
                    
                    const c0 = String(r[0] || '').trim();
                    const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(c0);
                    const isProductCode = /^\d/.test(c0);
                    
                    if (isTT) {
                        curTT = c0;
                    } else if (isProductCode && curTT) {
                        const qty = parseFloat(String(r[1])) || 0;
                        if (qty <= 0) continue;
                        
                        const code = normCode(c0);
                        const key = `${curTT}_${code}`;
                        
                        // Ищем дату в любой колонке после кол-ва
                        let dayOfWeek = -1;
                        for (let c = 2; c < r.length; c++) {
                            const cellVal = String(r[c] || '').trim();
                            if (!cellVal) continue;
                            
                            // Проверяем форматы даты
                            let date = null;
                            if (/^\d{4}-\d{2}-\d{2}/.test(cellVal)) {
                                date = new Date(cellVal);
                            } else if (/^\d{2}\.\d{2}\.\d{2,4}/.test(cellVal)) {
                                const parts = cellVal.split('.');
                                const year = parts[2].length === 2 ? '20' + parts[2] : parts[2];
                                date = new Date(year, parts[1]-1, parts[0]);
                            } else {
                                const numDate = parseFloat(cellVal);
                                if (numDate > 40000 && numDate < 60000) {
                                    date = new Date((numDate - 25569) * 86400 * 1000);
                                }
                            }
                            
                            if (date && !isNaN(date.getTime())) {
                                dayOfWeek = date.getDay();
                                foundDates++;
                                break;
                            }
                        }
                        
                        if (dayOfWeek >= 0) {
                            const isWeekend = (dayOfWeek === 1 || dayOfWeek === 6 || dayOfWeek === 0);
                            if (isWeekend) {
                                weekendSales[key] = (weekendSales[key] || 0) + qty;
                                weekendDays[key] = (weekendDays[key] || 0) + 1;
                            } else {
                                weekdaySales[key] = (weekdaySales[key] || 0) + qty;
                                weekdayDays[key] = (weekdayDays[key] || 0) + 1;
                            }
                        }
                    }
                }
                
                if (foundDates > 0) {
                    console.log(`[FishOrder] Найдено ${foundDates} дат, выходные продажи: ${Object.keys(weekendSales).length} товаров`);
                } else {
                    console.log('[FishOrder] Даты не найдены в файле продаж. Выходные продажи не рассчитаны.');
                }
            }
        }

        function getWeekendAvg(tt, code) {
            const key = `${tt}_${code}`;
            // Сначала проверяем постоянные данные из файла остатков
            const sc = stockConsumptionData[key];
            if (sc && sc.weekendDays > 0) return sc.weekendSales / sc.weekendDays;
            // Fallback: данные из файла продаж
            const days = weekendDays[key] || 0;
            return days > 0 ? weekendSales[key] / days : 0;
        }

        function getWeekdayAvg(tt, code) {
            const key = `${tt}_${code}`;
            const sc = stockConsumptionData[key];
            if (sc && sc.weekdayDays > 0) return sc.weekdaySales / sc.weekdayDays;
            const days = weekdayDays[key] || 0;
            return days > 0 ? weekdaySales[key] / days : 0;
        }

        function exportOrder() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для экспорта. Сначала откройте вкладку Заказ.');
                return;
            }

            const rows = [['№ Маг.', 'ТТ', 'Код', 'Наименование', 'Группа', 'Поставщик', 'Продажи, кг', 'Среднее/день', 'Остаток, кг', 'Доставлено', 'В пути', 'Дн. до дост.', 'Заказ, кг', 'Сумма', 'Статус']];

            savedOrderResults.forEach(r => {
                const avgDay = (r.weekendAvg > 0 || r.weekdayAvg > 0)
                    ? ((r.weekdayCount * r.weekdayAvg + r.weekendCount * r.weekendAvg) / Math.max(1, r.weekdayCount + r.weekendCount))
                    : r.avgSalesPerDay;

                if (!r.supplierOrders) {
                    // Fallback for results without supplierOrders (single supplier)
                    const editKey = `${r.tt}_${r.code}`;
                    const orderQty = orderEdits[editKey] !== undefined ? orderEdits[editKey] : r.order;
                    rows.push([
                        r.tt || '', r.tt, r.code, r.nomenclature || '', r.group || '',
                        r.supplier || '',
                        (r.sales || 0).toFixed(2),
                        avgDay > 0 ? avgDay.toFixed(3) : '—',
                        (r.currentStock || 0).toFixed(2),
                        r.deliveredQty || 0,
                        r.inTransitQty || 0,
                        r.daysUntil >= 99 ? '∞' : r.daysUntil,
                        orderQty,
                        (orderQty * (r.inPrice || 0)).toFixed(2),
                        r.status || ''
                    ]);
                } else {
                    // Multi-supplier: one row per active supplier
                    Object.entries(r.supplierOrders).forEach(([sup, so]) => {
                        if (!so || so.order <= 0) return;
                        rows.push([
                            r.tt || '', r.tt, r.code, r.nomenclature || '', r.group || '',
                            sup,
                            (r.sales || 0).toFixed(2),
                            avgDay > 0 ? avgDay.toFixed(3) : '—',
                            (r.currentStock || 0).toFixed(2),
                            r.deliveredQty || 0,
                            r.inTransitQty || 0,
                            r.daysUntil >= 99 ? '∞' : r.daysUntil,
                            so.order,
                            (so.order * ((so.inPrice || 0))).toFixed(2),
                            'заказ'
                        ]);
                    });
                }
            });

            const headers = rows.shift();
            const ws = SharedUtils.createStyledSheet(rows, headers, [0, 1, 2, 3, 5]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Заказ рыбы');
            const d = new Date(); XLSX.writeFile(wb, `заказ_рыба_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        function saveCurrentOrder() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для сохранения.');
                return;
            }
            var supplierGroups = {};
            var totalOrderItems = 0, totalSum = 0;
            savedOrderResults.forEach(function(r) {
                if (!r.supplierOrders) return;
                Object.keys(r.supplierOrders).forEach(function(sup) {
                    var so = r.supplierOrders[sup];
                    if (!so || so.order <= 0) return;
                    if (!supplierGroups[sup]) supplierGroups[sup] = { count: 0, sum: 0 };
                    supplierGroups[sup].count++;
                    supplierGroups[sup].sum += so.sum;
                    totalOrderItems++;
                    totalSum += so.sum;
                });
            });
            var data = {
                createdAt: new Date().toISOString(),
                date: new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
                items: savedOrderResults,
                stats: savedOrderStats,
                supplierGroups: supplierGroups,
                totalOrderItems: totalOrderItems,
                totalSum: totalSum,
                orderEdits: Object.assign({}, orderEdits)
            };
            save(KEYS.SAVED_ORDER, data);
            savedOrderDate = data.date;
            render();
        }

                    storeSums[r.tt] = (storeSums[r.tt] || 0) + r.sum;
                    storeCounts[r.tt] = (storeCounts[r.tt] || 0) + 1;
                }
            });

            const sortedStores = Object.entries(storeSums).sort((a, b) => b[1] - a[1]);
            const totalSum = Object.values(storeSums).reduce((s, v) => s + v, 0);

            const popup = document.createElement('div');
            popup.className = 'store-sums-popup';
            popup.style.cssText = 'position:fixed;z-index:200;background:white;border:1px solid #e5e7eb;border-radius:12px;padding:0;box-shadow:0 12px 40px rgba(0,0,0,0.2);min-width:320px;max-width:420px;max-height:70vh;overflow:hidden;pointer-events:auto;font-family:system-ui,sans-serif;';

                </div>
                <div style="max-height:50vh;overflow-y:auto;padding:4px 0;">
                    ${sortedStores.map(([tt, sum], i) => `
                        <div style="display:flex;align-items:center;padding:8px 16px;gap:10px;${i % 2 === 0 ? 'background:#f9fafb;' : ''}border-bottom:1px solid #f3f4f6;">
                            <div style="width:24px;height:24px;border-radius:6px;background:#ede9fe;color:#6d28d9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">${i + 1}</div>

                                <div style="font-size:12px;font-weight:600;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${tt}</div>
                                <div style="font-size:10px;color:#6b7280;">${storeCounts[tt]} поз.</div>
                            </div>
                            <div style="font-size:13px;font-weight:700;color:#6d28d9;white-space:nowrap;">${sum.toFixed(0)} ₽</div>

                    `).join('')}

                <div style="background:#f3f4f6;padding:10px 16px;border-radius:0 0 12px 12px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;">

                    <span style="font-size:15px;font-weight:800;color:#4c1d95;">${totalSum.toFixed(0)} ₽</span>

                <div style="padding:4px 16px 8px;text-align:center;">
                    <span style="font-size:9px;color:#9ca3af;">Кликните вне чтобы закрыть</span>
                </div>
            `;
            document.body.appendChild(popup);

            const rect = el.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 160;
            let top = rect.bottom + 8;
            if (left < 8) left = 8;
            if (left + 420 > window.innerWidth) left = window.innerWidth - 428;
            if (top + 400 > window.innerHeight) top = rect.top - 400;
            if (top < 8) top = 8;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';

            setTimeout(() => {

                    if (!popup.contains(e.target) && e.target !== el) {
                        popup.remove();
                        document.removeEventListener('mousedown', close);
                        document.removeEventListener('touchstart', close);
                    }
                }
                document.addEventListener('mousedown', close);
                document.addEventListener('touchstart', close);
            }, 50);
        }

        function clearSalesAndStocks() {
            localStorage.removeItem(KEYS.SALES);
            localStorage.removeItem(KEYS.STOCKS);
            sales = [];
            stocks = [];
            resetSavedOrders();
            render();
            alert('Продажи и остатки очищены');
        }

        function clearAll() {
            [KEYS.ASSORTMENT, KEYS.MATRIX_MARKS, KEYS.SALES, KEYS.STOCKS, KEYS.SCHEDULE, KEYS.INTRANSIT, KEYS.SUPPLIER_ASSORTMENT].forEach(k => localStorage.removeItem(k));
            matrix = {}; matrixMarks = {}; sales = []; stocks = [];
            deliverySchedule = {}; inTransitOrders = []; supplierAssortment = {};
            currentLoadedAssortment = null;
            resetSavedOrders();
            render();
            alert('Данные очищены');
        }

        // Инициализация с ожиданием облачного хранилища
        if (window.CloudStorage && !window.CloudStorage.isReady()) {
            window.addEventListener('cloudStorageReady', () => { try { init(); } catch(e) { console.error('Init error:', e); document.getElementById('content').innerHTML = '<div class="p-4 text-red-600">Ошибка инициализации: ' + e.message + '</div>'; } });
        } else {
            try { init(); } catch(e) { console.error('Init error:', e); document.getElementById('content').innerHTML = '<div class="p-4 text-red-600">Ошибка инициализации: ' + e.message + '</div>'; }
        }

        // После загрузки из облака — перечитываем данные и перерисовываем
        window.addEventListener('cloudStorageReady', () => {
            loadStoresFromHTML();
            sales = load(KEYS.SALES, []);
            stocks = load(KEYS.STOCKS, []);
            deliverySchedule = load(KEYS.SCHEDULE, {});
            const sk = Object.keys(deliverySchedule);
            if (sk.length > 0 && !sk.includes(selectedScheduleSupplier)) selectedScheduleSupplier = sk[0];
            inTransitOrders = load(KEYS.INTRANSIT, []);
            supplierAssortment = load(KEYS.SUPPLIER_ASSORTMENT, {});
            render();
        });
    </script>
</body>
</html>
