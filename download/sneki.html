    const load = (key, defaultValue) => {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return defaultValue;
        if (raw.startsWith('{') || raw.startsWith('[')) {
          return JSON.parse(raw) || defaultValue;
        }
        if (typeof LZString !== 'undefined') {
          try { return JSON.parse(LZString.decompressFromUTF16(raw)) || defaultValue; } catch { return JSON.parse(raw) || defaultValue; }
        }
        return JSON.parse(raw) || defaultValue;
      } catch { return defaultValue; }
    };

    const save = (key, data) => {
      try {
        const json = JSON.stringify(data);
        if (typeof LZString !== 'undefined' && json.length > 500) {
          localStorage.setItem(key, LZString.compressToUTF16(json));
        } else {
          localStorage.setItem(key, json);
        }
      } catch (e) {
        console.error('Save error for', key, e);
      }

    function createStyledSheet(data, headers, leftAlignCols) {
        leftAlignCols = leftAlignCols || [];
        const allData = [headers, ...data];
        const ws = XLSX.utils.aoa_to_sheet(allData);

        const range = XLSX.utils.decode_range(ws['!ref']);
        const numRows = range.e.r + 1;
        const numCols = range.e.c + 1;

        // Вычисляем ширину колонок по содержимому (с учётом кириллицы)
        const colWidths = new Array(numCols).fill(0);
        for (let c = 0; c < numCols; c++) {
            for (let r = 0; r < numRows; r++) {
                const cellAddress = XLSX.utils.encode_cell({ r: r, c: c });
                const cell = ws[cellAddress];
                if (cell && cell.v !== undefined) {
                    const cellText = String(cell.v);
                    const cyrillicCount = (cellText.match(/[а-яА-ЯёЁ]/g) || []).length;
                    const otherCount = cellText.length - cyrillicCount;
                    const estimatedWidth = Math.ceil(cyrillicCount * 1.5 + otherCount * 1.0) + 2;
                    colWidths[c] = Math.max(colWidths[c], estimatedWidth);
                }
            }
            colWidths[c] = Math.max(colWidths[c], 8);
            colWidths[c] = Math.min(colWidths[c], 60);
        }
        ws['!cols'] = colWidths.map(w => ({ wch: w }));

        // Высота строк 15 пунктов
        ws['!rows'] = [];
        for (let r = 0; r < numRows; r++) {
            ws['!rows'][r] = { hpt: 15 };
        }

        // Форматирование ячеек
        for (let r = 0; r < numRows; r++) {
            for (let c = 0; c < numCols; c++) {
                const cellAddress = XLSX.utils.encode_cell({ r: r, c: c });
                const cell = ws[cellAddress];
                if (cell) {
                    if (r === 0) {
                        // Шапка — светло-голубой фон
                        cell.s = {
                            fill: { fgColor: { rgb: "B8CCE4" } },
                            font: { bold: true, sz: 10 },
                            alignment: { horizontal: "center", vertical: "center", wrapText: false },
                            border: {
                                top: { style: "dotted", color: { rgb: "808080" } },
                                bottom: { style: "dotted", color: { rgb: "808080" } },
                                left: { style: "dotted", color: { rgb: "808080" } },
                                right: { style: "dotted", color: { rgb: "808080" } }
                            }
                        };
                    } else {
                        // Данные
                        const isLeftAlign = leftAlignCols.includes(c);
                        cell.s = {
                            font: { sz: 10 },
                            alignment: {
                                horizontal: isLeftAlign ? "left" : "center",
                                vertical: "center",
                                wrapText: false
                            },
                            border: {
                                top: { style: "dotted", color: { rgb: "808080" } },
                                bottom: { style: "dotted", color: { rgb: "808080" } },
                                left: { style: "dotted", color: { rgb: "808080" } },
                                right: { style: "dotted", color: { rgb: "808080" } }
                            }
                        };
                    }
                }
            }
        }

        return ws;
    }

      const fileInputRefs = { assortment: useRef(null), sales: useRef(null), stocks: useRef(null), matrix: useRef(null) };

      // Load on mount — ждём завершения синхронизации с облаком
      useEffect(() => {

        const savedGroupDays = load(KEYS.GROUP_DAYS, {});

        const savedVatRate = load(KEYS.VAT_RATE, 22);
        
        // Загружаем и обновляем matrix - удаляем старый НДС (20)
        const savedMatrix = load(KEYS.MATRIX, {});
        let matrixNeedsUpdate = false;
        Object.keys(savedMatrix).forEach(code => {
          if (savedMatrix[code].vat === 20) {

            matrixNeedsUpdate = true;
          }
        });
        if (matrixNeedsUpdate) save(KEYS.MATRIX, savedMatrix);
        
        // Загружаем и обновляем products - удаляем старый НДС (20)
        const savedProducts = load(KEYS.PRODUCTS, []);
        let productsNeedUpdate = false;
        savedProducts.forEach(p => {
          if (p.vat === 20) {

        });
        if (productsNeedUpdate) save(KEYS.PRODUCTS, savedProducts);
        
        setProducts(savedProducts);
        setMatrix(savedMatrix);
        setStores(savedStores);
        setSales(savedSales);
        setStocks(savedStocks);
        setRcStocks(savedRcStocks);
        setShelfValues(savedShelfValues);
        setQuants(savedQuants);
        setGroupMarkups(savedGroupMarkups);
        setGroupQuants(savedGroupQuants);
        setManualPrices(savedManualPrices);
        setRcManualOrders(savedRcManualOrders);
        setGroupDays(savedGroupDays);
        setResults(savedResults);
        setRcResults(savedRcResults);
        setWarehouseMarkup(savedWarehouseMarkup);

        setMounted(true);

        initLoad();
      }, []);

      // Save on change
      useEffect(() => { if (mounted && products.length) save(KEYS.PRODUCTS, products); }, [products, mounted]);
      useEffect(() => { if (mounted && Object.keys(matrix).length) save(KEYS.MATRIX, matrix); }, [matrix, mounted]);

      useEffect(() => { if (mounted && Object.keys(rcStocks).length) save(KEYS.RC_STOCKS, rcStocks); }, [rcStocks, mounted]);
      useEffect(() => { if (mounted && Object.keys(shelfValues).length) save(KEYS.SHELF_VALUES, shelfValues); }, [shelfValues, mounted]);
      useEffect(() => { if (mounted && Object.keys(quants).length) save(KEYS.QUANTS, quants); }, [quants, mounted]);
      useEffect(() => { if (mounted && Object.keys(groupMarkups).length) save(KEYS.GROUP_MARKUPS, groupMarkups); }, [groupMarkups, mounted]);
      useEffect(() => { if (mounted && Object.keys(groupQuants).length) save(KEYS.GROUP_QUANTS, groupQuants); }, [groupQuants, mounted]);
      useEffect(() => { if (mounted && Object.keys(manualPrices).length) save(KEYS.MANUAL_PRICES, manualPrices); }, [manualPrices, mounted]);
      useEffect(() => { if (mounted && Object.keys(rcManualOrders).length) save(KEYS.RC_MANUAL_ORDERS, rcManualOrders); }, [rcManualOrders, mounted]);
      useEffect(() => { if (mounted) save(KEYS.WAREHOUSE_MARKUP, warehouseMarkup); }, [warehouseMarkup, mounted]);
      useEffect(() => { if (mounted) save(KEYS.VAT_RATE, vatRate); }, [vatRate, mounted]);
      useEffect(() => { if (mounted && results.length > 0) save(KEYS.RESULTS, results); }, [results, mounted]);
      useEffect(() => { if (mounted && rcResults.length > 0) save(KEYS.RC_RESULTS, rcResults); }, [rcResults, mounted]);
      useEffect(() => { if (mounted && Object.keys(groupDays).length) save(KEYS.GROUP_DAYS, groupDays); }, [groupDays, mounted]);

      // Parse assortment file
      // Структура: Да | Группа | Код | Упаковка | Номенклатура | Код(повтор) | Код весовой | Вход пивной | Вход РЦ | Цена | Полка
      const parseAssortment = useCallback((json) => {
        const items = [];
        const newShelf = {};
        const newQuants = {};
        let skipped = 0;
        
        for (let i = 2; i < json.length; i++) {
          const r = json[i];
          if (!r || r.length < 5) continue;
          
          const working = String(r[0] || '').trim().toLowerCase();
          if (working !== 'да') { skipped++; continue; }
          
          const code = normCode(r[2]);
          const name = String(r[4] || '').trim();
          if (!code || !name) continue;
          
          const group = String(r[1] || '').trim();
          const packaging = String(r[3] || 'ШТ').toUpperCase();
          // Код весового товара - колонка 6
          const weightCode = r[6] ? normCode(r[6]) : '';
          // Входная цена от РЦ - колонка 8
          const inPrice = parseFloat(String(r[8]).replace(',', '.')) || 0;
          // Выходная цена - колонка 9
          const outPrice = parseFloat(String(r[9]).replace(',', '.')) || 0;
          // Полка - колонка 10
          const shelf = parseFloat(String(r[10]).replace(',', '.')) || 0;
          const quant = 1;

          items.push({ code, nomenclature: name, group, packaging, weightCode, inPrice, outPrice, shelf, quant });
          if (shelf > 0) newShelf[code] = shelf;
        }
        
        console.log(`Парсинг ассортимента: ${items.length} товаров, пропущено ${skipped}`);
        return { items, newShelf, newQuants: {} };
      }, []);

      // Parse sales file
      const parseSales = useCallback((json) => {
        const items = [];
        const foundTTs = new Set();
        let curTT = '';
        
        for (let i = 2; i < json.length; i++) {
          const r = json[i];
          if (!r || r.length === 0) continue;
          
          const c0 = String(r[0] || '').trim();
          const qty = parseFloat(String(r[1])) || 0;
          
          const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(c0);
          const isProductCode = /^\d/.test(c0);
          
          if (isTT) { curTT = c0; foundTTs.add(curTT); }
          else if (isProductCode && curTT && qty > 0) { items.push({ tt: curTT, code: normCode(c0), quantity: qty }); }
        }
        
        console.log(`Парсинг продаж: ${items.length} записей, ${foundTTs.size} ТТ`);
        return { items, foundTTs };
      }, []);

      // Parse stocks file
      const parseStocks = useCallback((json) => {
        const items = [];
        const foundTTs = new Set();
        let curTT = '';
        let lastCol = 0;
        
        for (let i = 0; i < json.length; i++) { if (json[i]) lastCol = Math.max(lastCol, json[i].length - 1); }
        
        for (let i = 3; i < json.length; i++) {
          const r = json[i];
          if (!r || r.length < 3) continue;
          
          const c0 = String(r[0] || '').trim();
          const code = String(r[1] || '').trim();
          
          const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(code);
          const isProductCode = /^\d/.test(code) || code.length >= 5;
          
          if (isTT) { curTT = c0; foundTTs.add(curTT); }
          else if (isProductCode && curTT && c0) {
            let daysPresent = 0, totalDays = 0;
            for (let col = 2; col <= lastCol; col++) {
              const val = r[col];
              if (val !== undefined && val !== null && val !== '') { totalDays++; if ((parseFloat(String(val)) || 0) > 0) daysPresent++; }
            }
            items.push({ tt: curTT, code: normCode(code), productName: c0, currentStock: parseFloat(String(r[lastCol])) || 0, daysPresent, totalDays });
          }
        }
        
        console.log(`Парсинг остатков: ${items.length} записей, ${foundTTs.size} ТТ`);
        return { items, foundTTs };
      }, []);

      // File upload handler
      const handleFile = useCallback((file, type) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

            if (type === 'assortment') {
              const { items, newShelf, newQuants } = parseAssortment(json);
              if (items.length === 0) { alert('Не найдено товаров! Проверьте файл: в первой колонке должно быть "Да" для рабочих товаров.'); return; }
              
              setProducts(items);
              setShelfValues(prev => ({ ...prev, ...newShelf }));
              setQuants(prev => ({ ...prev, ...newQuants }));
              
              setMatrix(prev => {
                const storeList = stores.length > 0 ? stores.map(s => s.tt) : 
                  [...new Set(Object.values(prev).flatMap(p => Object.keys(p).filter(k => !['code','nomenclature','group','packaging','weightCode','inPrice','outPrice','vat','shelf','quant'].includes(k))))];
                
                const updated = {};
                items.forEach(p => {
                  if (prev[p.code]) { updated[p.code] = { ...prev[p.code], ...p }; }
                  else { updated[p.code] = { ...p }; storeList.forEach(tt => { updated[p.code][tt] = 'НЕТ'; }); }
                });
                return updated;
              });
              alert(`Загружено ${items.length} товаров`);
            }
            else if (type === 'sales') {
              const { items, foundTTs } = parseSales(json);
              setSales(items);
              // НЕ добавляем новые ТТ автоматически - используем только те, что есть в списке магазинов
              alert(`Загружено ${items.length} продаж, найдено ${foundTTs.size} ТТ\n(расчёт только по магазинам из списка)`);
            }
            else if (type === 'stocks') {
              const { items, foundTTs } = parseStocks(json);
              setStocks(items);
              // НЕ добавляем новые ТТ автоматически - используем только те, что есть в списке магазинов
              alert(`Загружено ${items.length} остатков, найдено ${foundTTs.size} ТТ\n(расчёт только по магазинам из списка)`);
            }
          } catch (err) { console.error('Parse error:', err); alert('Ошибка: ' + err.message); }
        };
        reader.readAsArrayBuffer(file);
      }, [stores, parseAssortment, parseSales, parseStocks]);

      // Parse RC input
      // Формат: Наименование \t Код \t Остаток (разделитель - табуляция)
      const parseRcInput = useCallback(() => {
        const lines = rcInputData.trim().split('\n');
        const newRc = {};
        const newProducts = [];
        let count = 0;
        let addedToMatrix = 0;
        
        lines.forEach(line => {
          // Разбиваем по табам, а не по пробелам
          const parts = line.split('\t').map(p => p.trim()).filter(p => p);
          
          // Пропускаем заголовки типа "Склад РЦ Крым"
          if (parts.length < 2) return;
          if (parts[0].toLowerCase().includes('склад') || parts[0].toLowerCase().includes('rc')) return;
          
          // Формат: Наименование | Код | Остаток
          if (parts.length >= 3) {
            const name = parts[0];
            const code = normCode(parts[1]);
            // Остаток может быть с запятой как десятичный разделитель
            const stock = parseFloat(parts[2].replace(',', '.').replace(/\s/g, '')) || 0;
            if (code && stock > 0) {
              newRc[code] = stock;
              count++;
              if (!matrix[code]) {
                const newProduct = { code, nomenclature: name, group: 'есть на РЦ', packaging: 'ШТ', weightCode: '', inPrice: 0, outPrice: 0, shelf: 0, quant: 1 };
                stores.forEach(s => { newProduct[s.tt] = 'НЕТ'; });
                newProducts.push(newProduct);
                addedToMatrix++;
              }
            }
          } else if (parts.length === 2) {
            // Формат: Код | Остаток (без наименования)
            const code = normCode(parts[0]);
            const stock = parseFloat(parts[1].replace(',', '.').replace(/\s/g, '')) || 0;
            if (code && stock > 0) { newRc[code] = stock; count++; }
          }
        });
        
        if (count > 0) {
          setRcStocks(newRc);
          if (newProducts.length > 0) {
            setMatrix(prev => { const updated = { ...prev }; newProducts.forEach(p => { updated[p.code] = p; }); return updated; });
            setProducts(prev => [...prev, ...newProducts]);
          }
          setShowRcModal(false);
          setRcInputData('');
          alert(`Загружено ${count} остатков РЦ${addedToMatrix > 0 ? `, добавлено в матрицу: ${addedToMatrix}` : ''}`);
        } else { alert('Ошибка формата. Используйте: Наименование(таб)Код(таб)Остаток'); }
      }, [rcInputData, matrix, stores]);

      // Create matrix
      const createMatrix = useCallback(() => {
        if (products.length === 0) { alert('Загрузите ассортимент!'); return; }
        const storeList = stores.map(s => s.tt);
        const salesMap = new Map();
        sales.forEach(s => { const key = `${s.tt}_${s.code}`; salesMap.set(key, (salesMap.get(key) || 0) + s.quantity); });
        const newMatrix = {};
        products.forEach(p => {
          newMatrix[p.code] = { ...p };
          storeList.forEach(tt => { const key = `${tt}_${p.code}`; newMatrix[p.code][tt] = (salesMap.get(key) || 0) > 0 ? 'ДА' : 'НЕТ'; });
        });
        setMatrix(newMatrix);
        setTab('matrix');
        alert(`Матрица создана: ${Object.keys(newMatrix).length} × ${storeList.length} ТТ`);
      }, [products, stores, sales]);

      // Toggle matrix value
      const toggleMatrix = useCallback((code, tt) => {
        setMatrix(prev => ({ ...prev, [code]: { ...prev[code], [tt]: prev[code]?.[tt] === 'ДА' ? 'НЕТ' : 'ДА' } }));
      }, []);

      // Remove product from matrix
      const removeProductFromMatrix = useCallback((code) => {
        if (confirm(`Удалить товар "${matrix[code]?.nomenclature || code}" из матрицы?`)) {
          setMatrix(prev => {
            const updated = { ...prev };
            delete updated[code];
            return updated;
          });
          setProducts(prev => prev.filter(p => p.code !== code));
        }
      }, [matrix]);

      // Update product field
      const updateProduct = useCallback((code, field, value) => {
        setMatrix(prev => {
          const updated = { ...prev, [code]: { ...prev[code] } };
          if (value === undefined) {
            delete updated[code][field];
          } else {
            updated[code][field] = value;
          }
          return updated;
        });
      }, []);

      // Update shelf value
      const updateShelfValue = useCallback((code, tt, value) => {
        const key = `${code}_${tt}`;
        setShelfValues(prev => {
          if (value === '' || value === null) { const updated = { ...prev }; delete updated[key]; return updated; }
          return { ...prev, [key]: parseFloat(value) || 0 };
        });
      }, []);

      // Calculate order
      const calcOrder = useCallback((packaging, stock, avgDay, period, shelf, quant = 0.5) => {
        // shelf = null когда useShelf=false (не учитывать полку)
        // shelf = число когда useShelf=true (учитывать полку)
        const minStock = shelf != null ? shelf : 0;
        const prelim = stock - (avgDay * period) - minStock;
        if (prelim > 1) return 0;
        if (prelim < 0) { 
          const need = Math.abs(prelim); 
          if (packaging === 'КГ') {
            // Округляем до кванта из группы
            return Math.ceil(need / quant) * quant;
          }
          return Math.ceil(need); 
        }
        if (packaging === 'КГ') return prelim <= 0.6 ? quant : 0;
        return 1;
      }, []);

      // Run calculation
      const runCalculation = useCallback(() => {
        if (!Object.keys(matrix).length) { alert('Создайте матрицу!'); return; }
        if (stocks.length === 0) { alert('Загрузите остатки!'); return; }
        setLoading(true);
        setTimeout(() => {
          const stockMap = new Map();
          stocks.forEach(s => { stockMap.set(`${s.tt}_${s.code}`, s); });
          const salesMap = new Map();
          sales.forEach(s => { const key = `${s.tt}_${s.code}`; salesMap.set(key, (salesMap.get(key) || 0) + s.quantity); });
          const res = [];
          stores.forEach(store => {
            Object.entries(matrix).forEach(([code, p]) => {
              const inMatrix = p[store.tt] === 'ДА';
              const key = `${store.tt}_${code}`;
              const stockData = stockMap.get(key);
              const rcStock = rcStocks[code] || 0;
              const shelfVal = shelfValues[key];
              const shelf = useShelf ? (shelfVal !== undefined ? shelfVal : (p.packaging === 'КГ' ? 1 : 4)) : null;

              if (!inMatrix) { res.push({ tt: store.tt, code, nomenclature: p.nomenclature, group: p.group || '', currentStock: 0, sales: 0, daysPresent: 0, shelf, order: 0, packaging: p.packaging, orderStatus: 'нет в матрице', rcStock, manualEdit: false, avgSalesPerDay: 0 }); return; }
              if (rcStock <= 0) { res.push({ tt: store.tt, code, nomenclature: p.nomenclature, group: p.group || '', currentStock: stockData?.currentStock || 0, sales: 0, daysPresent: 0, shelf, order: 0, packaging: p.packaging, orderStatus: 'нет на РЦ', rcStock: 0, manualEdit: false, avgSalesPerDay: 0 }); return; }
              // Товар в матрице, есть на РЦ, но нет на точке (нет данных остатков или остаток = 0)
              if (!stockData || stockData.currentStock <= 0) {
                const minOrder = p.packaging === 'КГ' ? 0.5 : 2;
                res.push({ tt: store.tt, code, nomenclature: p.nomenclature, group: p.group || '', currentStock: stockData?.currentStock || 0, sales: 0, daysPresent: 0, shelf, order: minOrder, packaging: p.packaging, orderStatus: `заказ ${minOrder} (мин.)`, rcStock, manualEdit: true, avgSalesPerDay: 0 });
                return;
              }

              const salesQty = salesMap.get(key) || 0;
              const avgSales = stockData.daysPresent > 0 ? salesQty / stockData.daysPresent : 0;
              // Получаем квант из группы для КГ товаров
              const groupQuant = p.packaging === 'КГ' ? (groupQuants[p.group || ''] || 0.5) : 1;
              // Передаём shelf (который null если useShelf=false), а не shelfVal
              const order = calcOrder(p.packaging, stockData.currentStock, avgSales, period, shelf, groupQuant);
              // Возможные продажи = средние продажи * период
              const possibleSales = avgSales * period;
              res.push({ tt: store.tt, code, nomenclature: p.nomenclature, group: p.group || '', currentStock: stockData.currentStock, sales: salesQty, possibleSales, daysPresent: stockData.daysPresent, shelf, order, packaging: p.packaging, orderStatus: order > 0 ? `заказ ${order}` : 'достаточно', rcStock, manualEdit: false, avgSalesPerDay: avgSales });
            });
          });
          setResults(res);
          save(KEYS.RESULTS, res);
          setLoading(false);
          setTab('results');
          alert(`Готово! К заказу: ${res.filter(r => r.order > 0).length}`);
        }, 100);
      }, [matrix, stores, stocks, sales, rcStocks, period, useShelf, shelfValues, calcOrder, groupQuants]);

      // Update result order
      const updateResultOrder = useCallback((tt, code, newOrder) => {
        const order = parseFloat(newOrder) || 0;
        setResults(prev => {
          const updated = prev.map(r => r.tt === tt && r.code === code ? { ...r, order, manualEdit: true, orderStatus: order > 0 ? `заказ ${order}` : 'достаточно' } : r);
          save(KEYS.RESULTS, updated);
          return updated;
        });
      }, []);

      // Calculate RC
      const calcRc = useCallback(() => {
        const totalSalesMap = new Map();
        sales.forEach(s => { totalSalesMap.set(s.code, (totalSalesMap.get(s.code) || 0) + s.quantity); });
        const avgDaysMap = new Map();
        const daysCountMap = new Map();
        stocks.forEach(s => { if (s.daysPresent > 0) { avgDaysMap.set(s.code, (avgDaysMap.get(s.code) || 0) + s.daysPresent); daysCountMap.set(s.code, (daysCountMap.get(s.code) || 0) + 1); } });
        const res = [];
        Object.entries(matrix).forEach(([code, p]) => {
          const rcStock = rcStocks[code] || 0;
          const totalSales = totalSalesMap.get(code) || 0;
          const totalDays = avgDaysMap.get(code) || 0;
          const storeCount = daysCountMap.get(code) || 1;
          const avgDaysPresent = totalDays / storeCount;
          const avgSalesPerDay = avgDaysPresent > 0 ? totalSales / avgDaysPresent : 0;
          const daysForGroup = groupDays[p.group || ''] || 30;
          const monthlyNeed = avgSalesPerDay * daysForGroup;
          let autoOrder = 0;
          if (monthlyNeed > rcStock) { const need = monthlyNeed - rcStock; autoOrder = p.packaging === 'КГ' ? Math.ceil(need * 2) / 2 : Math.ceil(need); }
          const manualOrder = rcManualOrders[code];
          res.push({ code, nomenclature: p.nomenclature, group: p.group || '', packaging: p.packaging, rcStock, totalSales, avgSalesPerDay, monthlyNeed: monthlyNeed.toFixed(2), autoOrder, order: manualOrder !== undefined ? manualOrder : autoOrder, manualEdit: manualOrder !== undefined, inPrice: p.inPrice || 0, quant: p.quant || 1 });
        });
        setRcResults(res.sort((a, b) => (a.group || '').localeCompare(b.group || '', 'ru')));
        save(KEYS.RC_RESULTS, res.sort((a, b) => (a.group || '').localeCompare(b.group || '', 'ru')));
      }, [matrix, sales, stocks, rcStocks, rcManualOrders, groupDays]);

      // Update RC order
      const updateRcOrder = useCallback((code, value) => {
        const order = parseFloat(value) || 0;
        setRcManualOrders(prev => {
          let updated;
          if (order === 0 || value === '') { updated = { ...prev }; delete updated[code]; }
          else { updated = { ...prev, [code]: order }; }
          // Сохраняем rcResults с обновлённым заказом
          setRcResults(rcPrev => {
            const updatedRc = rcPrev.map(r => r.code === code ? { ...r, order, manualEdit: order !== 0, ...(order === 0 ? {} : { autoOrder: order }) } : r);
            save(KEYS.RC_RESULTS, updatedRc);
            return updatedRc;
          });
          return updated;
        });
      }, []);

      // Export functions
      const exportExcel = useCallback(() => {
        if (results.length === 0) { alert('Нет данных!'); return; }
        const headers = ['№ Маг.', 'ТТ', 'Наименование', 'Код', 'Остаток', 'Продажи', 'Дней', 'Полка', 'Заказ', 'Упак', 'Статус', 'Ост. РЦ'];
        const storeNumMap = {};
        stores.forEach(s => { storeNumMap[s.tt] = s.storeNumber || s.tt2 || s.tt || ''; });
        const data = results.map(r => [storeNumMap[r.tt] || '', r.tt, r.nomenclature, r.code, r.currentStock.toFixed(2), r.sales.toFixed(2), r.daysPresent || '-', r.shelf ?? '', r.order, r.packaging, r.orderStatus, r.rcStock]);
        const ws = createStyledSheet(data, headers, [0, 1, 2]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Заказ');
        XLSX.writeFile(wb, `sneki_order_${new Date().toISOString().slice(0, 10)}.xlsx`);
      }, [results]);

      const exportMatrix = useCallback(() => {
        if (Object.keys(matrix).length === 0) { alert('Нет матрицы!'); return; }
        const storeList = stores.map(s => s.tt);
        // Единый формат: Наименование товара / Код товара / ТТ1 / ТТ2 / ...
        const headers = ['Наименование товара', 'Код товара', ...storeList];
        const data = Object.entries(matrix).map(([code, p]) => [
          p.nomenclature || '',
          code,
          ...storeList.map(tt => p[tt] === 'ДА' ? 'ДА' : 'НЕТ')
        ]);
        const ws = createStyledSheet(data, headers, [0]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Матрица');
        XLSX.writeFile(wb, `матрица_${new Date().toISOString().slice(0, 10)}.xlsx`);
      }, [matrix, stores]);

      const exportPrices = useCallback(() => {
        if (Object.keys(matrix).length === 0) { alert('Нет данных!'); return; }
        const headers = ['Группа', 'Наименование', 'Код', 'НДС %', 'Вход. цена', 'Выход с РЦ', 'Наценка %', 'Полка'];
        const data = Object.entries(matrix).map(([code, p]) => { 
          const productMarkup = p.markup ?? groupMarkups[p.group || ''] ?? warehouseMarkup;
          const rcOutput = (p.inPrice || 0) * (1 + warehouseMarkup / 100);
          const shelfPrice = Math.round((p.inPrice || 0) * (1 + productMarkup / 100));
          return [p.group || '', p.nomenclature || '', code, p.vat ?? vatRate, p.inPrice || 0, rcOutput.toFixed(2), productMarkup, shelfPrice]; 
        });
        const ws = createStyledSheet(data, headers, [0, 1]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Цены');
        XLSX.writeFile(wb, `sneki_prices_${new Date().toISOString().slice(0, 10)}.xlsx`);
      }, [matrix, vatRate, groupMarkups, warehouseMarkup]);

      const exportShelf = useCallback(() => {
        if (Object.keys(matrix).length === 0 || stores.length === 0) { alert('Нет данных!'); return; }
        const headers = ['Код товара', 'Наименование', 'Группа', 'Упак.', ...stores.map(s => s.tt)];
        const data = [];
        Object.entries(matrix).forEach(([code, p]) => { const row = [code, p.nomenclature, p.group || '', p.packaging || 'ШТ']; stores.forEach(store => { const key = `${code}_${store.tt}`; row.push(shelfValues[key] !== undefined ? String(shelfValues[key]) : ''); }); data.push(row); });
        const ws = createStyledSheet(data, headers, [0, 1, 2]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Полка');
        XLSX.writeFile(wb, `sneki_shelf_${new Date().toISOString().slice(0, 10)}.xlsx`);
      }, [matrix, stores, shelfValues]);

      const importShelf = useCallback((file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {

                            <td className="text-right">{item.cumulativePercent.toFixed(1)}%</td>
                            <td className="text-center">
                              <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${item.abcClass === 'A' ? 'bg-emerald-500 text-white' : item.abcClass === 'B' ? 'bg-amber-500 text-white' : 'bg-rose-500 text-white'}`}>
                                {item.abcClass}
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Проблемные товары */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                  {/* Зависшие товары */}
                  <div className="bg-white rounded-lg border border-gray-200 p-3">
                    <h3 className="text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                      <span className="text-orange-500">⚠️</span>
                      Зависшие товары ({analyticsData.stuckItems.length})
                      <span className="text-[10px] text-gray-400 font-normal">(остаток есть, продаж нет)</span>
                    </h3>
                    <div className="space-y-1 max-h-48 overflow-auto">
                      {analyticsData.stuckItems.slice(0, 20).map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center py-1 border-b border-gray-50 text-xs">
                          <div className="truncate flex-1">
                            <span className="text-gray-400 mr-1">{idx + 1}.</span>
                            <span className="font-medium">{item.name}</span>
                            <span className="text-gray-400 ml-1 truncate max-w-[100px] inline-block">({item.tt})</span>
                          </div>
                          <div className="flex items-center gap-2 shrink-0">
                            <span className="text-orange-600 font-medium">{item.stock.toFixed(1)}</span>
                            <span className="text-gray-400">{item.days}дн</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Плохо продающиеся */}
                  <div className="bg-white rounded-lg border border-gray-200 p-3">
                    <h3 className="text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                      <span className="text-red-500">📉</span>
                      Плохо продающиеся ({analyticsData.lowSellers.length})
                      <span className="text-[10px] text-gray-400 font-normal">(ср. &lt; 0.5/день)</span>
                    </h3>
                    <div className="space-y-1 max-h-48 overflow-auto">
                      {analyticsData.lowSellers.slice(0, 20).map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center py-1 border-b border-gray-50 text-xs">
                          <div className="truncate flex-1">
                            <span className="text-gray-400 mr-1">{idx + 1}.</span>
                            <span className="font-medium">{item.name}</span>
                          </div>
                          <div className="flex items-center gap-2 shrink-0">
                            <span className="text-red-600 font-medium">{item.avgPerDay.toFixed(2)}/дн</span>
                            <span className="text-gray-400">{item.totalSales.toFixed(0)} шт</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Modals */}
          {showRcModal && (
            <div className="modal-overlay" onClick={() => setShowRcModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800 flex items-center gap-2"><WarehouseIcon />Остатки на РЦ</h3>
                  <button onClick={() => setShowRcModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <p className="text-sm text-gray-500 mb-3">Формат: Наименование Код Остаток (по строке)</p>
                <textarea value={rcInputData} onChange={e => setRcInputData(e.target.value)} placeholder="Сникерс 20986 50" className="w-full h-40 px-3 py-2 border border-gray-200 rounded-md font-mono text-sm resize-none focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500" />
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowRcModal(false)} className="btn btn-secondary flex-1">Отмена</button>
                  <button onClick={parseRcInput} className="btn btn-primary flex-1">OK</button>
                </div>
              </div>
            </div>
          )}

          {showExportModal && (
            <div className="modal-overlay" onClick={() => setShowExportModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Экспорт по ТТ</h3>
                  <button onClick={() => setShowExportModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="max-h-64 overflow-auto space-y-1 mb-4">
                  <label className="flex items-center gap-2 p-2 hover:bg-gray-50 rounded cursor-pointer">
                    <input type="checkbox" checked={selectedTT.length === 0} onChange={() => setSelectedTT([])} className="w-4 h-4 rounded border-gray-300 text-amber-500" />
                    <span className="text-sm">Все ТТ</span>
                  </label>
                  {Array.from(new Set(results.map(r => r.tt))).map(tt => (
                    <label key={tt} className="flex items-center gap-2 p-2 hover:bg-gray-50 rounded cursor-pointer">
                      <input type="checkbox" checked={selectedTT.includes(tt)} onChange={() => { setSelectedTT(prev => prev.includes(tt) ? prev.filter(t => t !== tt) : [...prev, tt]); }} className="w-4 h-4 rounded border-gray-300 text-amber-500" />
                      <span className="text-sm">{tt}</span>
                    </label>
                  ))}
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setShowExportModal(false)} className="btn btn-secondary flex-1">Отмена</button>
                  <button onClick={() => { exportByTT(selectedTT); setShowExportModal(false); }} className="btn btn-success flex-1">Экспорт</button>
                </div>
              </div>
            </div>
          )}

          {showMassEditModal && (
            <div className="modal-overlay" onClick={() => setShowMassEditModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Массовое редактирование</h3>
                  <button onClick={() => setShowMassEditModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="space-y-3">
                  <div className="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                    <label className="text-sm text-gray-700">Умножить заказы на:</label>
                    <input type="number" value={massMultiplyValue} onChange={e => setMassMultiplyValue(parseFloat(e.target.value) || 1)} className="input w-20 text-center" step="0.1" min="0.1" max="10" />
                    <button onClick={() => { massUpdateOrders('multiply', massMultiplyValue); setShowMassEditModal(false); }} className="btn btn-primary">Применить</button>
                  </div>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowMassEditModal(false)} className="btn btn-secondary flex-1">Закрыть</button>
                </div>
              </div>
            </div>
          )}

          {showAddProductModal && (
            <div className="modal-overlay" onClick={() => setShowAddProductModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800 flex items-center gap-2"><PlusIcon />Добавить товар</h3>
                  <button onClick={() => setShowAddProductModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="space-y-3">
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Код товара *</label>
                      <input type="text" value={newProduct.code} onChange={e => setNewProduct(prev => ({ ...prev, code: e.target.value }))} className="input w-full" placeholder="12345" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Наименование *</label>
                      <input type="text" value={newProduct.nomenclature} onChange={e => setNewProduct(prev => ({ ...prev, nomenclature: e.target.value }))} className="input w-full" placeholder="Наименование товара" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Группа</label>
                      <input type="text" value={newProduct.group} onChange={e => setNewProduct(prev => ({ ...prev, group: e.target.value }))} className="input w-full" placeholder="Название группы" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Упаковка</label>
                      <select value={newProduct.packaging} onChange={e => setNewProduct(prev => ({ ...prev, packaging: e.target.value }))} className="select w-full">
                        <option value="ШТ">ШТ</option>
                        <option value="КГ">КГ</option>
                      </select>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Код весовой</label>
                      <input type="text" value={newProduct.weightCode} onChange={e => setNewProduct(prev => ({ ...prev, weightCode: e.target.value }))} className="input w-full" placeholder="Код для весового товара" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Входная цена</label>
                      <input type="number" value={newProduct.inPrice} onChange={e => setNewProduct(prev => ({ ...prev, inPrice: parseFloat(e.target.value) || 0 }))} className="input w-full" step="0.01" min="0" />
                    </div>
                  </div>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowAddProductModal(false)} className="btn btn-secondary flex-1">Отмена</button>
                  <button onClick={addNewProduct} className="btn btn-primary flex-1"><PlusIcon /><span>Добавить</span></button>
                </div>
              </div>
            </div>
          )}

          {/* Detail Modal - детализация расчёта */}
          {showDetailModal && selectedResult && (
            <div className="modal-overlay" onClick={() => setShowDetailModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Детализация расчёта</h3>
                  <button onClick={() => setShowDetailModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="space-y-2 text-sm">
                  <div className="bg-gray-50 rounded-lg p-3">
                    <div className="text-xs text-gray-500 mb-1">Товар</div>
                    <div className="font-medium">{selectedResult.nomenclature}</div>
                    <div className="text-xs text-gray-500">Код: {selectedResult.code}</div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-sky-50 rounded-lg p-3 border border-sky-200">
                      <div className="text-xs text-gray-500">Текущий остаток</div>
                      <div className="text-xl font-bold text-sky-700">{selectedResult.currentStock.toFixed(2)} {selectedResult.packaging}</div>
                    </div>
                    <div className="bg-violet-50 rounded-lg p-3 border border-violet-200">
                      <div className="text-xs text-gray-500">Продажи за период</div>
                      <div className="text-xl font-bold text-violet-700">{selectedResult.sales.toFixed(2)} {selectedResult.packaging}</div>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-amber-50 rounded-lg p-3 border border-amber-200">
                      <div className="text-xs text-gray-500">Дней на остатках</div>
                      <div className="text-xl font-bold text-amber-700">{selectedResult.daysPresent || '-'}</div>
                    </div>
                    <div className="bg-blue-50 rounded-lg p-3 border border-blue-200">
                      <div className="text-xs text-gray-500">Ср. продажи в день</div>
                      <div className="text-xl font-bold text-blue-700">{selectedResult.avgSalesPerDay?.toFixed(3) || '-'} {selectedResult.packaging}</div>
                    </div>
                  </div>
                  <div className="bg-emerald-50 rounded-lg p-3 border border-emerald-200">
                    <div className="text-xs text-gray-500 mb-1">К заказу</div>
                    <div className="text-2xl font-bold text-emerald-700">{selectedResult.order} {selectedResult.packaging}</div>
                    <div className="text-xs text-gray-500 mt-1">
                      {selectedResult.shelf != null 
                        ? `Полка: ${selectedResult.shelf}` 
                        : 'Полка: не учитывается'}
                    </div>
                    {(() => {
                      const avgSales = selectedResult.avgSalesPerDay || 0;
                      const stock = selectedResult.currentStock;
                      const shelf = selectedResult.shelf || 0;
                      const prelim = stock - (avgSales * period) - shelf;
                      return (
                        <div className="mt-2 p-2 bg-white/60 rounded text-[10px] text-gray-600 font-mono">
                          <div>Остаток - (Ср.прод × Период) - Полка = Предв.</div>
                          <div>{stock.toFixed(2)} - ({avgSales.toFixed(3)} × {period}) - {shelf} = {prelim.toFixed(2)}</div>
                          {prelim > 1 && <div className="text-emerald-600">Предв. &gt; 1 → заказ = 0</div>}
                          {prelim < 0 && <div className="text-amber-600">Предв. &lt; 0 → заказ = |{Math.abs(prelim).toFixed(2)}| ≈ {selectedResult.order}</div>}
                          {prelim >= 0 && prelim <= 1 && <div className="text-blue-600">0 ≤ Предв. ≤ 1 → заказ = 1</div>}
                        </div>
                      );
                    })()}
                  </div>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowDetailModal(false)} className="btn btn-secondary flex-1">Закрыть</button>
                </div>
              </div>
            </div>
          )}

          {/* Sum Modal - детализация суммы по ТТ */}
          {showSumModal && (
            <div className="modal-overlay" onClick={() => setShowSumModal(false)}>
              <div className="modal-content max-w-lg" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Сумма заказов по ТТ</h3>
                  <button onClick={() => setShowSumModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="space-y-2 max-h-96 overflow-auto">
                  {Object.entries(
                    filteredResults.filter(r => r.order > 0).reduce((acc, r) => {
                      if (!acc[r.tt]) acc[r.tt] = 0;
                      const product = Object.values(matrix).find(p => normCode(p.code) === r.code);
                      const price = product?.inPrice || 0;
                      acc[r.tt] += r.order * price;
                      return acc;
                    }, {})
                  ).sort((a, b) => b[1] - a[1]).map(([tt, sum]) => (
                    <div key={tt} className="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                      <span className="text-sm font-medium truncate flex-1 mr-2" title={tt}>{tt}</span>
                      <span className="text-sm font-bold text-emerald-700">{sum.toLocaleString('ru-RU')} ₽</span>
                    </div>
                  ))}
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowSumModal(false)} className="btn btn-secondary flex-1">Закрыть</button>
                </div>
              </div>
            </div>
          )}

          {/* Product Detail Modal - продажи товара по ТТ */}
          {showProductDetailModal && selectedProductAnalytics && (
            <div className="modal-overlay" onClick={() => setShowProductDetailModal(false)}>
              <div className="modal-content max-w-2xl" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Продажи по ТТ</h3>
                  <button onClick={() => setShowProductDetailModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                {(() => {
                  const product = Object.values(matrix).find(p => p.code === selectedProductAnalytics);
                  const productSales = sales.filter(s => s.code === selectedProductAnalytics);
                  const productStocks = stocks.filter(s => s.code === selectedProductAnalytics);
                  
                  return (
                    <div className="space-y-3">
                      <div className="bg-gray-50 rounded-lg p-3">
                        <div className="font-medium">{product?.nomenclature || 'Товар не найден'}</div>
                        <div className="text-xs text-gray-500">Код: {selectedProductAnalytics} | Группа: {product?.group || '-'}</div>
                      </div>
                      
                      <div className="grid grid-cols-3 gap-2">
                        <div className="bg-sky-50 rounded-lg p-2 text-center border border-sky-200">
                          <div className="text-[10px] text-sky-600">Всего продаж</div>
                          <div className="text-lg font-bold text-sky-700">{productSales.reduce((s, x) => s + x.quantity, 0).toFixed(1)}</div>
                        </div>
                        <div className="bg-emerald-50 rounded-lg p-2 text-center border border-emerald-200">
                          <div className="text-[10px] text-emerald-600">ТТ с продажами</div>
                          <div className="text-lg font-bold text-emerald-700">{new Set(productSales.map(s => s.tt)).size}</div>
                        </div>
                        <div className="bg-amber-50 rounded-lg p-2 text-center border border-amber-200">
                          <div className="text-[10px] text-amber-600">Остаток РЦ</div>
                          <div className="text-lg font-bold text-amber-700">{rcStocks[selectedProductAnalytics] || 0}</div>
                        </div>
                      </div>
                      
                      <div className="max-h-64 overflow-auto">
                        <table className="table-modern text-xs">
                          <thead>
                            <tr>
                              <th className="text-left bg-gray-50">ТТ</th>
                              <th className="text-right bg-gray-50">Продажи</th>
                              <th className="text-right bg-gray-50">Остаток</th>
                              <th className="text-right bg-gray-50">Дней</th>
                              <th className="text-right bg-gray-50">Ср/день</th>
                            </tr>
                          </thead>
                          <tbody>
                            {stores.map(store => {
                              const ttSales = productSales.filter(s => s.tt === store.tt);
                              const totalSales = ttSales.reduce((sum, s) => sum + s.quantity, 0);
                              const stockData = productStocks.find(s => s.tt === store.tt);
                              const days = stockData?.daysPresent || 0;
                              const avgPerDay = days > 0 ? totalSales / days : 0;
                              const currentStock = stockData?.currentStock || 0;
                              
                              return (
                                <tr key={store.tt} className={totalSales > 0 ? '' : 'bg-gray-50'}>
                                  <td className="truncate max-w-[200px]" title={store.tt}>{store.tt}</td>
                                  <td className="text-right font-medium">{totalSales.toFixed(1)}</td>
                                  <td className="text-right">{currentStock.toFixed(1)}</td>
                                  <td className="text-right text-gray-500">{days}</td>
                                  <td className="text-right">{avgPerDay.toFixed(2)}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  );
                })()}
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowProductDetailModal(false)} className="btn btn-secondary flex-1">Закрыть</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
