<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Холодильники</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="shared-utils.js"></script>
    <script src="shared-data.js"></script>
    <script src="config.js"></script>
    <script src="storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        .btn { transition: all 0.2s; }
        .btn:hover { opacity: 0.9; }
        input:focus, select:focus { outline: none; }
        .drag-over { ring: 2px solid #059669; box-shadow: 0 0 0 2px #059669; }
        [draggable=true] { user-select: none; -webkit-user-select: none; }
        [draggable=true]:active { opacity: 0.6; }
    </style>
</head>
<body class="min-h-screen bg-gray-100">
    <!-- Header -->
    <div class="bg-white border-b border-gray-200">
        <div class="px-2 py-2">
            <div class="flex items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                    </svg>
                    <span>Назад</span>
                </a>
                <div class="flex items-center gap-2 px-2">
                    <div class="p-1.5 bg-emerald-100 rounded-lg text-emerald-600">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="2" width="16" height="20" rx="2"/>
                            <line x1="4" y1="10" x2="20" y2="10"/>
                            <line x1="8" y1="6" x2="8" y2="6.01"/>
                            <line x1="8" y1="14" x2="8" y2="14.01"/>
                        </svg>
                    </div>
                    <h1 class="text-base font-semibold text-gray-900">Холодильники</h1>
                </div>
                
                <!-- Tabs -->
                <div class="flex gap-0.5 ml-2 bg-gray-100 rounded-lg p-0.5" id="tabs"></div>

                <div class="ml-auto flex gap-2">
                    <span id="productsCount" class="px-2 py-1 text-xs text-emerald-700 bg-emerald-100 rounded-md">0 товаров</span>
                    <span id="storesCount" class="px-2 py-1 text-xs text-gray-600 bg-gray-100 rounded-md">0 ТТ</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="px-2 py-2" id="content"></div>

    <script>
        // State
        let tab = 'upload';
        let products = [];
        let matrix = {};
        let matrixMarks = {};
        let writeoffs = [];
        let sales = [];
        let stores = [];
        let planograms = {};
        let analysis = [];
        let searchAssort = '';
        let searchMatrix = '';
        let filterCategory = '';
        let selectedStore = '';
        let selectedDoors = 2;
        let selectedShelves = 5;
        let planogramProducts = {};
        // Планограмма — состояние
        let planogramSearch = '';
        let planogramCategory = '';
        let planogramSelectedProduct = null; // { code, nomenclature, group }
        let planogramPlacedCodes = new Set(); // коды уже размещённых товаров
        let shelfCategories = {}; // { shelfIndex: 'Категория' } — категория для каждой полки
        let shelfSlots = {}; // { shelfKey: numberOfSlots } — кол-во слотов на полке
        let dragData = null; // { type: 'list'|'cell', ... } — текущий перетаскиваемый элемент
        // Критерии сортировки для автозаполнения полок
        let sortCriteria = { volume: true, sales: false, name: false, margin: false };

        const SharedUtils = window.SharedUtils;

        // Ключи хранения — ассортимент и матрица берутся из общих (matrix-calc/universal),
        // планограммы и аналитика — свои
        const KEYS = {
            // Ассортимент — из matrix-calc (мастер-данные, только чтение)
            PRODUCTS: SharedUtils.STORAGE_KEYS.PRODUCTS,        // shared_products_v1
            // Матрица — из universal (рабочая копия, только чтение)
            MATRIX: SharedUtils.STORAGE_KEYS.MATRIX,            // shared_matrix_v1
            WRITEOFFS: SharedUtils.STORAGE_KEYS.FRIDGE_WRITEOFFS,
            SALES: SharedUtils.STORAGE_KEYS.FRIDGE_SALES,
            STORES: SharedUtils.STORAGE_KEYS.STORES,
            PLANOGRAMS: SharedUtils.STORAGE_KEYS.FRIDGE_PLANOGRAMS
        };

        const CATEGORIES_FRIDGE = ['Молочные продукты', 'Мясные изделия', 'Напитки', 'Кондитерские изделия', 'Замороженные продукты', 'Овощи и фрукты', 'Хлебобулочные изделия', 'Соусы и приправы'];

        const getCategoryBg = (cat) => {
            if (!cat) return '#f3f4f6';
            if (cat.includes('Молочн')) return '#dbeafe';
            if (cat.includes('Мясн')) return '#fee2e2';
            if (cat.includes('Напитк')) return '#cffafe';
            if (cat.includes('Кондитерск')) return '#fce7f3';
            if (cat.includes('Заморожен')) return '#e0e7ff';
            if (cat.includes('Овощи')) return '#d1fae5';
            if (cat.includes('Хлеб')) return '#fef3c7';
            if (cat.includes('Соус')) return '#fef9c3';
            return '#f3f4f6';
        };

        // Helpers — используем SharedUtils (LZ-сжатие + dirty-флаг для облака)
        const load = (key, def) => SharedUtils.load(key, def);
        const save = (key, data) => {
            SharedUtils.save(key, data);
            if (key === KEYS.MATRIX && window.SharedData) {
                SharedData.saveMatrixMarks(data, 'fridges');
            }
        };

        const normCode = SharedUtils.normCode;

        // Icons
        const icons = {
            upload: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
            package: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
            grid: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>`,
            chart: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
            layers: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
            download: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            search: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
            db: `<svg class="w-10 h-10 text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
            dollar: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
            trash: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`,
            store: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
            calc: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10.01"/><line x1="12" y1="10" x2="12" y2="10.01"/><line x1="16" y1="10" x2="16" y2="10.01"/><line x1="8" y1="14" x2="8" y2="14.01"/><line x1="12" y1="14" x2="12" y2="14.01"/><line x1="16" y1="14" x2="16" y2="14.01"/><line x1="8" y1="18" x2="8" y2="18.01"/><line x1="12" y1="18" x2="12" y2="18.01"/><line x1="16" y1="18" x2="16" y2="18.01"/></svg>`,
            check: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
            close: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
        };

        // === Сохранённые ассортименты и матрицы (shared keys) ===
        const ASSORTMENTS_KEY = SharedUtils.STORAGE_KEYS.SAVED_ASSORTMENTS;
        const MATRICES_KEY = SharedUtils.STORAGE_KEYS.SAVED_MATRICES;

        function getSavedAssortments() {
            try {
                let data = SharedUtils.load(ASSORTMENTS_KEY, null);
                if (!data || !Array.isArray(data) || data.length === 0) {
                    data = SharedUtils.load('matrixcalc_saved_assortments_v2', []);
                }
                return data || [];
            } catch { return []; }
        }

        function getSavedMatrices() {
            try {
                let data = SharedUtils.load(MATRICES_KEY, null);
                if (!data || !Array.isArray(data) || data.length === 0) {
                    data = SharedUtils.load('matrixcalc_saved_matrices_v1', []);
                }
                return data || [];
            } catch { return []; }
        }

        function loadAssortmentToProducts(name) {
            const saved = getSavedAssortments();
            const record = saved.find(s => s.name === name);
            if (!record || !record.data) { alert('Ассортимент не найден'); return; }
            if (products.length > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count} товаров)?\nТекущий ассортимент будет заменён.`)) return;
            }
            products = record.data;
            SharedUtils.save(KEYS.PRODUCTS, products);
            if (window.SharedData) SharedData.saveProducts(products, 'fridges');
            buildMatrix();
            render();
            alert(`Загружено: ${products.length} товаров из "${name}"`);
        }

        function loadMatrixToMarks(name) {
            const saved = getSavedMatrices();
            const record = saved.find(s => s.name === name);
            if (!record || !record.matrixData) { alert('Матрица не найдена'); return; }
            const md = record.matrixData || {};
            const CATALOG_FIELDS = ['code','nomenclature','name','group','packaging','supplier','quant','price','inPrice','shelf','markup','inMatrix'];
            let count = 0;
            Object.entries(md).forEach(([code, item]) => {
                if (!code) return;
                const nc = normCode(code);
                const marks = {};
                Object.entries(item).forEach(([k, v]) => {
                    if (!CATALOG_FIELDS.includes(k) && (v === 'ДА' || v === 'НЕТ')) {
                        marks[k] = v;
                        count++;
                    }
                });
                if (Object.keys(marks).length > 0) {
                    if (!matrixMarks[nc]) matrixMarks[nc] = {};
                    Object.assign(matrixMarks[nc], marks);
                }
            });
            save(KEYS.MATRIX, matrixMarks);
            buildMatrix();
            render();
            alert(`Матрица "${name}" загружена: ${count} отметок ДА/НЕТ для ${Object.keys(matrixMarks).length} товаров`);
        }

        // Собрать уникальные ТТ из matrixMarks
        function getMatrixTTs() {
            const ttSet = new Set();
            Object.values(matrixMarks).forEach(marks => {
                Object.keys(marks).forEach(k => {
                    if (marks[k] === 'ДА' || marks[k] === 'НЕТ') ttSet.add(k);
                });
            });
            // Если есть stores — используем их порядок, добавляя недостающие из matrixMarks
            const ordered = [];
            stores.forEach(s => { if (s.tt && ttSet.has(s.tt)) { ordered.push(s.tt); ttSet.delete(s.tt); } });
            ttSet.forEach(tt => ordered.push(tt));
            return ordered;
        }

        // Build matrix view from products + matrixMarks
        function buildMatrix() {
            matrix = {};
            products.forEach(p => {
                if (!p.code) return;
                const nc = normCode(p.code);
                matrix[nc] = {
                    code: nc,
                    nomenclature: p.nomenclature || p.name || '',
                    group: p.group || p.category || '',
                    category: p.group || p.category || ''
                };
                if (matrixMarks[nc]) {
                    Object.assign(matrix[nc], matrixMarks[nc]);
                }
            });
        }

        // Init — загружаем данные из общих хранилищ
        function init() {
            products = load(KEYS.PRODUCTS, []);
            if (!Array.isArray(products)) products = [];
            // Matrix marks: {code: {tt: 'ДА'/'НЕТ'}}
            matrixMarks = load(KEYS.MATRIX, {});
            writeoffs = load(KEYS.WRITEOFFS, []);
            sales = load(KEYS.SALES, []);
            stores = load(KEYS.STORES, []);
            planograms = load(KEYS.PLANOGRAMS, {});

            buildMatrix();

            // SharedData cross-tab sync listener
            if (window.SharedData) {
                SharedData.onChange(({ source }) => {
                    if (source !== 'fridges') {
                        const newProducts = SharedData.getProducts();
                        if (newProducts && newProducts.length > 0) {
                            products = newProducts;
                            SharedUtils.save(KEYS.PRODUCTS, products);
                        }
                        const newMarks = SharedData.getMatrixMarks();
                        if (newMarks && Object.keys(newMarks).length > 0) {
                            Object.assign(matrixMarks, newMarks);
                        }
                        const newStores = SharedData.getStores();
                        if (newStores && newStores.length > 0) {
                            stores = newStores;
                            SharedUtils.save(KEYS.STORES, stores);
                        }
                        buildMatrix();
                        render();
                    }
                });
            }

            render();
        }

        // Render
        function render() {
            renderTabs();
            renderContent();
            document.getElementById('productsCount').textContent = `${products.length} товаров`;
            document.getElementById('storesCount').textContent = `${stores.length} ТТ`;
        }

        function renderTabs() {
            const tabs = [
                { id: 'upload', label: 'Загрузка', icon: icons.upload },
                { id: 'assortment', label: 'Ассортимент', icon: icons.package },
                { id: 'matrix', label: 'Матрица', icon: icons.grid },
                { id: 'planogram', label: 'Планограмма', icon: icons.layers },
                { id: 'analytics', label: 'Аналитика', icon: icons.chart }
            ];

            document.getElementById('tabs').innerHTML = tabs.map(t => `
                <button onclick="setTab('${t.id}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${tab === t.id ? 'bg-emerald-600 text-white shadow-sm' : 'text-gray-600 hover:bg-white hover:text-gray-900'}">
                    ${t.icon}<span>${t.label}</span>
                </button>
            `).join('');
        }

        function setTab(t) { tab = t; render(); }

        function renderContent() {
            const el = document.getElementById('content');
            switch(tab) {
                case 'upload': el.innerHTML = renderUpload(); break;
                case 'assortment': el.innerHTML = renderAssortment(); break;
                case 'matrix': el.innerHTML = renderMatrix(); break;
                case 'planogram': el.innerHTML = renderPlanogram(); break;
                case 'analytics': el.innerHTML = renderAnalytics(); break;
            }
        }

        function renderUpload() {
            const savedAssortments = getSavedAssortments();
            const savedMatrices = getSavedMatrices();
            const hasProducts = products.length > 0;
            const hasMarks = Object.keys(matrixMarks).length > 0;
            return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div onclick="document.getElementById('assortInput').click()" class="bg-white rounded-lg border ${hasProducts ? 'border-emerald-300' : 'border-gray-200'} p-4 cursor-pointer hover:border-emerald-400 transition-colors group">
                    <div class="flex flex-col items-center text-center">
                        <div class="p-3 bg-emerald-50 rounded-lg text-emerald-600 mb-2 group-hover:bg-emerald-100 transition-colors">${icons.package}</div>
                        <h3 class="font-medium text-gray-800 mb-1">Ассортимент</h3>
                        <p class="text-xs text-gray-400">Нажмите чтобы загрузить из файла</p>
                        <input type="file" id="assortInput" accept=".xlsx,.xls" onchange="handleFile(this, 'assortment')" class="hidden" onclick="event.stopPropagation()">
                        ${savedAssortments.length > 0 ? `
                        <div class="space-y-0.5 mt-2 max-h-28 overflow-y-auto w-full">
                            ${savedAssortments.map(s => `
                                <div onclick="event.stopPropagation();loadAssortmentToProducts('${s.name.replace(/'/g, "\\'")}')" class="px-2 py-0.5 bg-emerald-50 hover:bg-emerald-100 rounded text-[11px] text-emerald-700 cursor-pointer transition-colors flex justify-between items-center">
                                    <span class="truncate font-medium">${s.name}</span>
                                    <span class="text-emerald-400 ml-1 shrink-0">${s.count}</span>
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}
                        ${hasProducts ? `<p class="mt-2 text-sm text-emerald-600 font-bold">${products.length} товаров</p>` : ''}
                    </div>
                </div>
                <div onclick="document.getElementById('salesInput').click()" class="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-emerald-300 hover:bg-emerald-50 transition-colors group">
                    <div class="flex flex-col items-center text-center">
                        <div class="p-3 bg-emerald-50 rounded-lg text-emerald-600 mb-2 group-hover:bg-emerald-100 transition-colors">${icons.dollar}</div>
                        <h3 class="font-medium text-gray-800 mb-1">Продажи</h3>
                        <p class="text-xs text-gray-400">ТТ | Код | Кол-во</p>
                        <input type="file" id="salesInput" accept=".xlsx,.xls" onchange="handleFile(this, 'sales')" class="hidden">
                        ${sales.length > 0 ? `<p class="mt-2 text-sm text-emerald-600 font-bold">${sales.length} записей</p>` : ''}
                    </div>
                </div>
                <div onclick="document.getElementById('matrixInput').click()" class="bg-white rounded-lg border ${hasMarks ? 'border-emerald-300' : 'border-gray-200'} p-4 cursor-pointer hover:border-emerald-400 transition-colors group">
                    <div class="flex flex-col items-center text-center">
                        <div class="p-3 bg-emerald-50 rounded-lg text-emerald-600 mb-2 group-hover:bg-emerald-100 transition-colors">${icons.grid}</div>
                        <h3 class="font-medium text-gray-800 mb-1">Матрица</h3>
                        <p class="text-xs text-gray-400">Нажмите чтобы загрузить из файла</p>
                        <input type="file" id="matrixInput" accept=".xlsx,.xls" onchange="handleFile(this, 'matrix')" class="hidden" onclick="event.stopPropagation()">
                        ${savedMatrices.length > 0 ? `
                        <div class="space-y-0.5 mt-2 max-h-28 overflow-y-auto w-full">
                            ${savedMatrices.map(s => `
                                <div onclick="event.stopPropagation();loadMatrixToMarks('${s.name.replace(/'/g, "\\'")}')" class="px-2 py-0.5 bg-emerald-50 hover:bg-emerald-100 rounded text-[11px] text-emerald-700 cursor-pointer transition-colors flex justify-between items-center">
                                    <span class="truncate font-medium">${s.name}</span>
                                    <span class="text-emerald-400 ml-1 shrink-0">${s.products || 0}</span>
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}
                        ${hasMarks ? `<p class="mt-2 text-sm text-emerald-600 font-bold">${hasMarks} тов.</p>` : ''}
                    </div>
                </div>
                <div onclick="document.getElementById('writeoffsInput').click()" class="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-emerald-300 hover:bg-emerald-50 transition-colors group">
                    <div class="flex flex-col items-center text-center">
                        <div class="p-3 bg-emerald-50 rounded-lg text-emerald-600 mb-2 group-hover:bg-emerald-100 transition-colors">${icons.trash}</div>
                        <h3 class="font-medium text-gray-800 mb-1">Списания</h3>

        // Общие продажи товара по всем магазинам
        function getTotalSales(code) {
            if (!code) return 0;
            const nc = normCode(code);
            let total = 0;
            sales.forEach(s => {
                if (normCode(s.code) === nc) total += (s.quantity || 0);
            });
            return total;
        }

        // Маржа товара: (Цена - Закупочная цена)
        function calcMargin(p) {
            const price = parseFloat(p.price) || 0;
            const inPrice = parseFloat(p.inPrice) || 0;
            return price - inPrice;
        }

        function renderMatrix() {

            </div>
            <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                <div class="text-xs text-gray-500 p-2">\u041a\u043b\u0438\u043a \u0434\u043b\u044f \u043f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u044f \u0414\u0410/\u041d\u0415\u0422</div>
                <div class="overflow-auto max-h-[75vh]">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600">
                                <th class="text-left text-[10px] font-medium px-2 py-2 sticky left-0 bg-gray-50 z-20" style="min-width:80px">\u0413\u0440\u0443\u043f\u043f\u0430</th>
                                <th class="text-left text-[10px] font-medium px-2 py-2" style="min-width:150px">\u041d\u0430\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u0438\u0435</th>
                                <th class="text-left text-[10px] font-medium px-2 py-2">\u041a\u043e\u0434</th>
                                ${displayTTs.map(tt => `<th class="text-center text-[10px] font-medium px-1 py-2 min-w-[60px]">${tt}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            ${Object.entries(grouped).sort((a, b) => a[0].localeCompare(b[0], 'ru')).map(([gr, items]) => `
                                <tr class="bg-emerald-100 cursor-pointer">
                                    <td colspan="${totalCols}" class="text-left py-1 px-2">
                                        <div class="flex items-center gap-2">
                                            <span class="font-semibold text-xs text-emerald-800">${gr}</span>
                                            <span class="text-[10px] bg-emerald-200 text-emerald-700 px-1 rounded">${items.length}</span>
                                        </div>
                                    </td>
                                </tr>
                                ${items.map(p => `
                                    <tr class="hover:bg-gray-50">
                                        <td class="text-left text-[10px] text-gray-500 px-2 py-1 sticky left-0 bg-white z-10">${p.group || ''}</td>
                                        <td class="text-left text-xs font-medium text-gray-900 px-2 py-1">${p.nomenclature || p.name || ''}</td>
                                        <td class="font-mono text-[10px] text-gray-600 px-2 py-1">${p.code}</td>
                                        ${displayTTs.map(tt => `
                                            <td onclick="toggleMatrix('${p.code}','${tt.replace(/'/g, "\\\\'")}')" class="text-center cursor-pointer px-1 py-1 select-none ${p[tt] === '\u0414\u0410' ? 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200' : 'bg-rose-50 text-rose-600 hover:bg-rose-100'}">
                                                ${p[tt] === '\u0414\u0410' ? icons.check : ''}
                                            </td>
                                        `).join('')}
                                    </tr>
                                `).join('')}
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        // Собираем множество размещённых кодов
        function rebuildPlacedCodes() {
            planogramPlacedCodes = new Set();
            Object.values(planogramProducts).forEach(p => {
                if (p && p.code) planogramPlacedCodes.add(p.code);
            });
        }

        // Товары для планограммы: только те, у которых ДА в матрице для выбранного магазина
        function getStoreProducts() {
            if (!selectedStore || Object.keys(matrix).length === 0) return [];
            return products.filter(p => {
                if (!p.code) return false;
                const nc = normCode(p.code);
                return matrixMarks[nc] && matrixMarks[nc][selectedStore] === 'ДА';
            });
        }

        // === Планограмма: помощники для категорийного заполнения ===

        // Извлечь объём товара (л) из данных
        function getProductVolume(p) {
            if (p.volume !== undefined && p.volume !== null && p.volume !== '' && !isNaN(parseFloat(p.volume))) {
                return parseFloat(p.volume);
            }
            const str = String(p.nomenclature || p.name || '');
            // Ищем паттерны: «0.43л», «0,43 л», «430мл», «0.5L»
            const m1 = str.match(/(\d+[.,]\d+)\s*(л|L)/i);
            if (m1) return parseFloat(m1[1].replace(',', '.'));
            const m2 = str.match(/(\d{2,4})\s*(мл|ml)/i);
            if (m2) return parseFloat(m2[1]) / 1000;
            // Просто число в конце строки
            const m3 = str.match(/\b(\d+[.,]\d+)\s*$/);
            if (m3) return parseFloat(m3[1].replace(',', '.'));
            return 0;
        }

        // Уникальные категории для текущего магазина
        function getStoreCategories() {
            return [...new Set(getStoreProducts().map(p => p.group || p.category || '').filter(Boolean))].sort();
        }

        // Получить продажи товара для выбранного магазина
        function getSalesForProduct(code) {
            if (!selectedStore || !code) return 0;
            const nc = normCode(code);
            let total = 0;
            sales.forEach(s => {
                if (normCode(s.code) === nc && s.tt === selectedStore) total += (s.quantity || 0);
            });
            return total;
        }

        // Получить маржу товара (цена - закупочная)
        function getMarginForProduct(p) {
            const price = parseFloat(p.price) || 0;
            const inPrice = parseFloat(p.inPrice) || 0;
            return price - inPrice;
        }

        // Сортировка для полки по выбранным критериям
        function sortForShelf(prods) {
            // Порядок приоритета критериев: если галочка включена — участвует
            // По умолчанию: volume (desc), name (asc)
            const criteria = [];
            if (sortCriteria.volume) criteria.push({ key: 'volume', dir: 'desc' });
            if (sortCriteria.sales) criteria.push({ key: 'sales', dir: 'desc' });
            if (sortCriteria.margin) criteria.push({ key: 'margin', dir: 'desc' });
            if (sortCriteria.name) criteria.push({ key: 'name', dir: 'asc' });
            // Если ничего не выбрано — fallback: продажи ↓ → название ↑ → объём ↓
            if (criteria.length === 0) {
                criteria.push({ key: 'sales', dir: 'desc' });
                criteria.push({ key: 'name', dir: 'asc' });
                criteria.push({ key: 'volume', dir: 'desc' });
            }

            return [...prods].sort((a, b) => {
                for (const c of criteria) {
                    let cmp = 0;
                    if (c.key === 'volume') {
                        const va = getProductVolume(a), vb = getProductVolume(b);
                        cmp = va - vb;
                    } else if (c.key === 'sales') {
                        const sa = getSalesForProduct(a.code), sb = getSalesForProduct(b.code);
                        cmp = sa - sb;
                    } else if (c.key === 'margin') {
                        const ma = getMarginForProduct(a), mb = getMarginForProduct(b);
                        cmp = ma - mb;
                    } else if (c.key === 'name') {
                        cmp = (a.nomenclature || a.name || '').localeCompare(b.nomenclature || b.name || '');
                    }
                    if (cmp !== 0) return c.dir === 'desc' ? -cmp : cmp;
                }
                return 0;
            });
        }

        // Переключить критерий сортировки
        function toggleSortCriterion(key) {
            sortCriteria[key] = !sortCriteria[key];
            savePlanogram();
            render();
        }

        // Собрать ВСЕ размещённые коды (используется для дедупликации)
        function getAllPlacedCodes() {
            const codes = new Set();
            Object.values(planogramProducts).forEach(p => {
                if (p && p.code) codes.add(normCode(p.code));
            });
            return codes;
        }

        // Товары, доступные для полки (категория + магазин + не размещены на ДРУГИХ полках)
        function getAvailableForShelf(shelfKey, excludeShelfKey) {
            const cat = shelfCategories[shelfKey];
            if (!cat || !selectedStore) return [];
            const usedCodes = new Set();
            Object.entries(planogramProducts).forEach(([k, p]) => {
                if (p && p.code) {
                    const parts = k.split('-');
                    const kShelf = parseInt(parts[parts.length - 1]);
                    // Исключаем товары только с указанной полки (если передана excludeShelfKey)
                    if (excludeShelfKey !== undefined) {
                        if (kShelf === parseInt(excludeShelfKey)) return;
                    } else {
                        if (kShelf === parseInt(shelfKey)) return;
                    }
                    usedCodes.add(normCode(p.code));
                }
            });
            return products.filter(p => {
                if (!p.code) return false;
                const nc = normCode(p.code);
                if (usedCodes.has(nc)) return false;
                if ((p.group || p.category || '') !== cat) return false;
                return matrixMarks[nc] && matrixMarks[nc][selectedStore] === 'ДА';
            });
        }

        // Заполнить одну полку по выбранной категории
        function fillShelf(shelfKey) {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            if (!shelfCategories[shelfKey]) { alert('Выберите категорию для полки!'); return; }
            const slots = getShelfSlotCount(shelfKey);
            // Сначала удаляем товары с этой полки
            for (let d = 0; d < slots; d++) delete planogramProducts[`${d}-${shelfKey}`];
            // Получаем доступные товары (исключая уже размещённые на ДРУГИХ полках)
            const available = sortForShelf(getAvailableForShelf(shelfKey));
            const count = Math.min(available.length, slots);
            if (count === 0) { alert('Нет доступных товаров для этой полки'); return; }
            for (let d = 0; d < count; d++) {
                planogramProducts[`${d}-${shelfKey}`] = { ...available[d], faces: 1 };
            }
            savePlanogram(); render();
        }

        // Заполнить все полки с выбранными категориями
        function fillAllShelves() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const hasCat = Object.keys(shelfCategories).some(k => shelfCategories[k]);
            if (!hasCat) { alert('Выберите хотя бы одну категорию для полки!'); return; }
            planogramProducts = {};
            const globalUsedCodes = new Set();
            for (let shelfKey = selectedShelves - 1; shelfKey >= 0; shelfKey--) {
                if (!shelfCategories[shelfKey]) continue;
                const slots = getShelfSlotCount(shelfKey);
                const cat = shelfCategories[shelfKey];
                const available = products.filter(p => {
                    if (!p.code) return false;
                    const nc = normCode(p.code);
                    if (globalUsedCodes.has(nc)) return false;
                    if ((p.group || p.category || '') !== cat) return false;
                    return matrixMarks[nc] && matrixMarks[nc][selectedStore] === 'ДА';
                });
                const sorted = sortForShelf(available);
                const cnt = Math.min(sorted.length, slots);
                for (let d = 0; d < cnt; d++) {
                    const nc = normCode(sorted[d].code);
                    globalUsedCodes.add(nc);
                    planogramProducts[`${d}-${shelfKey}`] = { ...sorted[d], faces: 1 };
                }
            }
            savePlanogram(); render();
            const placed = Object.values(planogramProducts).filter(p => p && p.code).length;
            alert(`Заполнено: ${placed} позиций`);
        }

        // Кол-во слотов на полке (индивидуально или по умолчанию)
        function getShelfSlotCount(shelfKey) {
            return shelfSlots[shelfKey] || selectedDoors;
        }

        // === Drag & Drop ===
        function startDragFromList(code, nomenclature, group) {
            dragData = { type: 'list', code, nomenclature, group };
            if (event && event.dataTransfer) {
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', code);
            }
        }

        function startDragFromCell(key) {
            const p = planogramProducts[key];
            if (!p) return;
            dragData = { type: 'cell', key, product: { ...p } };
            if (event && event.dataTransfer) {
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', p.code || '');
            }
        }

        function onCellDragOver(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
        }

        function onCellDragEnter(key) {
            const el = document.getElementById('cell-' + key);
            if (el) el.style.outline = '2px solid #059669';
        }

        function onCellDragLeave(key) {
            const el = document.getElementById('cell-' + key);
            if (el) el.style.outline = '';
        }

        function onCellDrop(key) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            const el = document.getElementById('cell-' + key);
            if (el) el.style.outline = '';
            if (!dragData) return;

            const existing = planogramProducts[key] ? { ...planogramProducts[key] } : null;

            if (dragData.type === 'list') {
                const prod = products.find(p => normCode(p.code) === dragData.code);
                if (prod) planogramProducts[key] = { ...prod, faces: 1 };
            } else if (dragData.type === 'cell' && dragData.key !== key) {
                planogramProducts[key] = dragData.product;
                if (existing) {
                    planogramProducts[dragData.key] = existing;
                } else {
                    delete planogramProducts[dragData.key];
                }
            }

            dragData = null;
            savePlanogram();
            render();
        }

        function onListDragOver(e) {
            if (e) e.preventDefault();
        }

        function onListDragEnter(el) {
            if (el) el.style.outline = '2px dashed #d97706';
        }

        function onListDragLeave(el) {
            if (el) el.style.outline = '';
        }

        function onListDrop() {
            if (event) event.preventDefault();
            if (!dragData || dragData.type !== 'cell') return;
            delete planogramProducts[dragData.key];
            dragData = null;
            savePlanogram();
            render();
        }

        function endDrag() { dragData = null; }

        // === Управление слотами на полке ===
        function changeShelfSlots(shelfKey, delta) {
            const cur = getShelfSlotCount(shelfKey);
            const nv = Math.max(1, cur + delta);
            if (nv === cur) return;
            if (nv < cur) {
                for (let d = nv; d < cur; d++) delete planogramProducts[`${d}-${shelfKey}`];
            }
            shelfSlots[shelfKey] = nv;
            savePlanogram();
            render();
        }

        // === Экспорт в PDF ===
        async function exportPlanogramPDF() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const el = document.getElementById('fridge-panel');
            if (!el) { alert('Панель не найдена'); return; }
            try {
                alert('Генерация PDF...');
                const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgW = 190;
                const imgH = (canvas.height * imgW) / canvas.width;
                let hLeft = imgH, pos = 10;
                pdf.addImage(imgData, 'PNG', 10, pos, imgW, imgH);
                hLeft -= 277;
                while (hLeft > 0) {
                    pos = hLeft - imgH + 10;
                    pdf.addPage();
                    pdf.addImage(imgData, 'PNG', 10, pos, imgW, imgH);
                    hLeft -= 277;
                }
                pdf.save(`planogram_${selectedStore.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`);
            } catch (err) { alert('Ошибка: ' + err.message); }
        }

        // Номера товаров с одинаковым названием на полке (для отображения «Адреналин 1», «Адреналин 2»)
        function getShelfProductCounters(shelfKey) {
            const counters = {}; // name -> current count
            const result = {}; // key -> counter number
            const slots = getShelfSlotCount(shelfKey);
            for (let d = 0; d < slots; d++) {
                const key = `${d}-${shelfKey}`;
                const p = planogramProducts[key];
                if (!p) continue;
                const baseName = (p.nomenclature || p.name || '').trim();
                if (!counters[baseName]) counters[baseName] = 0;
                counters[baseName]++;
                result[key] = counters[baseName];
            }
            return result;
        }

        // File handling
        function handleFile(input, type) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

                    if (type === 'assortment') {
                        const { items } = SharedUtils.parseAssortment(json);
                        products = items;
                        SharedUtils.save(KEYS.PRODUCTS, products);
                        if (window.SharedData) SharedData.saveProducts(products, 'fridges');
                        buildMatrix();
                        render();
                        alert(`Загружено ${items.length} товаров в ассортимент`);
                    } else if (type === 'matrix') {
                        const CATALOG_FIELDS = ['code','nomenclature','name','group','packaging','supplier','quant','price','inPrice','shelf','markup','inMatrix'];
                        const headers = json[0] || [];
                        const tts = [];
                        for (let c = 3; c < headers.length; c++) {
                            const h = String(headers[c] || '').trim();
                            if (h) tts.push(h);
                        }
                        let count = 0;
                        for (let i = 1; i < json.length; i++) {
                            const r = json[i];
                            if (!r || r.length < 2) continue;
                            const code = normCode(String(r[2] || r[1] || '').trim());
                            if (!code) continue;
                            for (let t = 0; t < tts.length; t++) {
                                const val = String(r[3 + t] || '').trim();
                                if (val === 'ДА' || val === 'НЕТ') {
                                    if (!matrixMarks[code]) matrixMarks[code] = {};
                                    matrixMarks[code][tts[t]] = val;
                                    count++;
                                }
                            }
                        }
                        save(KEYS.MATRIX, matrixMarks);
                        buildMatrix();
                        render();
                        alert(`Матрица импортирована: ${count} отметок ДА/НЕТ для ${Object.keys(matrixMarks).length} товаров`);
                    } else if (type === 'sales') {
                        const items = [];
                        let curTT = '';
                        for (let i = 0; i < json.length; i++) {
                            const r = json[i];
                            if (!r || r.length === 0) continue;
                            const c0 = String(r[0] || '').trim();
                            const isTT = /склад|магазин|тт/i.test(c0) && !/^\d/.test(c0);
                            if (isTT) curTT = c0;
                            else if (/^\d/.test(c0) && curTT) {
                                const qty = parseFloat(String(r[1])) || 0;
                                if (qty > 0) items.push({ tt: curTT, code: c0, quantity: qty });
                            }
                        }
                        sales = items;
                        save(KEYS.SALES, sales);
                        alert(`Загружено ${items.length} продаж`);
                    } else if (type === 'writeoffs') {
                        const items = [];
                        let curTT = '';
                        for (let i = 0; i < json.length; i++) {
                            const r = json[i];
                            if (!r || r.length === 0) continue;
                            const c0 = String(r[0] || '').trim();
                            const qty = parseFloat(String(r[2] || r[1])) || 0;
                            const isTT = /склад|магазин|тт/i.test(c0) && !/^\d+$/.test(c0);
                            if (isTT) curTT = c0;
                            else if (curTT && qty > 0) {
                                const code = /^\d+$/.test(c0) ? c0 : String(r[1] || '').trim();
                                if (/^\d+$/.test(code)) items.push({ tt: curTT, code, quantity: qty, date: new Date().toISOString() });
                            }
                        }
                        writeoffs = [...writeoffs, ...items];
                        save(KEYS.WRITEOFFS, writeoffs);
                        alert(`Загружено ${items.length} списаний`);
                    } else if (type === 'stores') {
                        // ❌ УБРАНО: магазины теперь берутся из stores.html через shared_stores_v1
                        alert('Магазины загружаются через раздел «Магазины» на главной странице. Этот импорт отключён.');
                    }
                    render();
                } catch (err) { alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        // Actions
        function toggleMatrix(code, tt) {
            const nc = normCode(code);
            if (!matrixMarks[nc]) matrixMarks[nc] = {};
            matrixMarks[nc][tt] = matrixMarks[nc]?.[tt] === 'ДА' ? 'НЕТ' : 'ДА';
            save(KEYS.MATRIX, matrixMarks);
            buildMatrix();
            render();
        }

        function handleStoreSelect(tt) {
            selectedStore = tt;
            planogramSelectedProduct = null;
            planogramSearch = '';
            planogramCategory = '';
            const store = stores.find(s => s.tt === tt);
            if (store) selectedDoors = store.doors || 2;
            if (planograms[tt]) {
                const saved = planograms[tt];
                selectedDoors = saved.doors || selectedDoors;
                selectedShelves = saved.shelves || selectedShelves;
                planogramProducts = saved.products || {};
                shelfCategories = saved.shelfCategories || {};
                sortCriteria = saved.sortCriteria || { volume: true, sales: false, name: false, margin: false };
                shelfSlots = saved.shelfSlots || {};
            } else {
                planogramProducts = {};
                shelfCategories = {};
                shelfSlots = {};
            }
            render();
        }

        // Выбрать товар из списка (левая панель)
        function selectPlanogramProduct(code, nomenclature, group) {
            if (planogramSelectedProduct && planogramSelectedProduct.code === code) {
                planogramSelectedProduct = null; // снять выделение
            } else {
                planogramSelectedProduct = { code, nomenclature, group };
            }
            render();
        }

        // Клик по ячейке холодильника
        function handleCellClick(key) {
            if (planogramSelectedProduct) {
                // Разместить выбранный товар
                const sp = planogramSelectedProduct;
                const prod = products.find(p => normCode(p.code) === sp.code);
                planogramProducts[key] = {
                    code: sp.code,
                    nomenclature: sp.nomenclature,
                    group: sp.group,
                    faces: 1,
                    ...prod
                };
                planogramSelectedProduct = null; // снять выделение после размещения
                savePlanogram();
                render();
            }
            // Если ячейка занята и нет выделенного товара — ничего (товар удаляется через ✕)
        }

        // Удалить товар из ячейки
        function removeFromCell(key) {
            delete planogramProducts[key];
            savePlanogram();
            render();
        }

        // Изменить количество фейсов
        function changeFaces(key, delta) {
            const p = planogramProducts[key];
            if (!p) return;
            p.faces = Math.max(1, (p.faces || 1) + delta);
            savePlanogram();
            render();
        }

        // Автозаполнение с группировкой по категориям
        function autoFillPlanogram() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const storeProds = getStoreProducts();
            if (storeProds.length === 0) { alert('Нет товаров в матрице для этого магазина'); return; }

            // Группируем по категории
            const grouped = {};
            storeProds.forEach(p => {
                const grp = p.group || p.category || 'Без группы';
                if (!grouped[grp]) grouped[grp] = [];
                grouped[grp].push(p);
            });

            const doors = selectedDoors;
            const shelves = selectedShelves;
            const newPlanogram = {};
            const catList = Object.keys(grouped).sort();

            // Распределяем: одна категория = одна полка (сверху вниз)
            // catList = [Молочные, Мясные, Напитки, ...]
            // Полка 5 (верх) = первая категория, Полка 1 (низ) = последняя
            for (let shelfIdx = 0; shelfIdx < shelves; shelfIdx++) {
                const shelf = shelves - 1 - shelfIdx; // shelf = 4, 3, 2, 1, 0
                const catIdx = shelfIdx % catList.length;
                const catProducts = grouped[catList[catIdx]] || [];
                const startIdx = shelfIdx * doors; // какой товар из catProducts начинается
                const catOffset = shelfIdx * doors; // начало в рамках категории

                for (let door = 0; door < doors; door++) {
                    const key = `${door}-${shelf}`;
                    // Вычисляем индекс товара: в рамках категории берём с учетом смещения по полкам
                    const itemInCat = catOffset + door;
                    if (itemInCat < catProducts.length) {
                        const p = catProducts[itemInCat];
                        newPlanogram[key] = { ...p, faces: 1 };
                    } else {
                        // Если категория закончилась — берём следующие товары из всех остальных
                        const fallbackIdx = shelfIdx * doors + door;
                        if (fallbackIdx < storeProds.length) {
                            newPlanogram[key] = { ...storeProds[fallbackIdx], faces: 1 };
                        } else {
                            newPlanogram[key] = null;
                        }
                    }
                }
            }

            planogramProducts = newPlanogram;
            savePlanogram();
            render();
            const placed = Object.values(planogramProducts).filter(p => p && p.code).length;
            alert(`Заполнено: ${placed} товаров из ${storeProds.length}`);
        }

        // Очистить всю планограмму
        function clearPlanogram() {
            if (Object.values(planogramProducts).filter(p => p && p.code).length === 0) return;
            if (!confirm('Очистить все полки?')) return;
            planogramProducts = {};
            planogramSelectedProduct = null;
            savePlanogram();
            render();
        }

        // Создать матрицу из размещённых на полках товаров
        function createMatrixFromPlanogram() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const placed = Object.values(planogramProducts).filter(p => p && p.code);
            if (placed.length === 0) { alert('Сначала заполните полки товарами!'); return; }

            const placedCodes = new Set();
            placed.forEach(p => placedCodes.add(normCode(p.code)));

            // Считаем сколько товаров будет добавлено и удалено из матрицы
            let added = 0, removed = 0, kept = 0;

            // Обходим ВСЕ товары из ассортимента
            products.forEach(p => {
                if (!p.code) return;
                const nc = normCode(p.code);
                if (!matrixMarks[nc]) matrixMarks[nc] = {};

                if (placedCodes.has(nc)) {
                    // Товар на полке — ставим ДА
                    if (matrixMarks[nc][selectedStore] !== 'ДА') {
                        added++;
                    } else {
                        kept++;
                    }
                    matrixMarks[nc][selectedStore] = 'ДА';
                } else {
                    // Товара нет на полках — ставим НЕТ
                    if (matrixMarks[nc][selectedStore] === 'ДА') {
                        removed++;
                    }
                    matrixMarks[nc][selectedStore] = 'НЕТ';
                }
            });

            // Сохраняем обновлённую матрицу
            save(KEYS.MATRIX, matrixMarks);
            buildMatrix();

            // Синхронизируем через SharedData
            if (window.SharedData) SharedData.saveMatrixMarks(matrixMarks, 'fridges');

            rebuildPlacedCodes();
            render();

            alert(`Матрица для ${selectedStore} обновлена:\n✅ Добавлено: ${added}\n❌ Убрано: ${removed}\n⏭ Без изменений: ${kept}\n\nИтого ДА: ${placedCodes.size} СКЮ`);
        }

        // Сохранить планограмму
        function savePlanogram() {
            if (!selectedStore) return;
            planograms[selectedStore] = {
                doors: selectedDoors,
                shelves: selectedShelves,
                products: planogramProducts,
                shelfCategories: shelfCategories,
                shelfSlots: shelfSlots,
                sortCriteria: sortCriteria
            };
            save(KEYS.PLANOGRAMS, planograms);
        }

        function calculateAnalytics() {
            if (!Object.keys(matrix).length) { alert('Загрузите ассортимент!'); return; }

            const salesMap = new Map();
            sales.forEach(s => {
                const key = `${s.tt}_${s.code}`;
                salesMap.set(key, (salesMap.get(key) || 0) + s.quantity);
            });

            const writeoffsMap = new Map();
            writeoffs.forEach(w => {
                const key = `${w.tt}_${w.code}`;
                writeoffsMap.set(key, (writeoffsMap.get(key) || 0) + w.quantity);
            });

            analysis = [];
            stores.forEach(store => {
                if (!store.tt) return;
                Object.entries(matrix).forEach(([code, data]) => {
                    if (data[store.tt] !== 'ДА') return;
                    const salesQty = salesMap.get(`${store.tt}_${code}`) || 0;
                    const writeoffQty = writeoffsMap.get(`${store.tt}_${code}`) || 0;
                    const dailySales = salesQty / 30;
                    const writeoffPercent = salesQty > 0 ? (writeoffQty / salesQty * 100) : 0;

                    let decision = 'Оставить';
                    let comment = '';
                    if (writeoffPercent > 10) { decision = 'Удалить'; comment = `Списание: ${writeoffPercent.toFixed(1)}%`; }
                    else if (writeoffPercent > 5) { decision = 'Пересмотреть'; comment = `Списание: ${writeoffPercent.toFixed(1)}%`; }
                    else if (salesQty === 0) { decision = 'Пересмотреть'; comment = 'Нет продаж'; }

                    analysis.push({ tt: store.tt, code, name: data.nomenclature || data.name, category: data.category, dailySales: dailySales.toFixed(2), salesQty, writeoffQty, decision, comment });
                });
            });

            tab = 'analytics';
            render();
            alert(`Рассчитано: ${analysis.length} позиций`);
        }

        // Exports
        function exportAssortment() {
            const data = products.map(p => ({ 'Код': p.code, 'Наименование': p.name, 'Категория': p.category, 'Объем': p.volume, 'Тара': p.container, 'Приоритет': p.priority }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Ассортимент');
            XLSX.writeFile(wb, 'fridge_assortment.xlsx');
        }

        function exportAnalytics() {
            const data = analysis.map(a => ({ 'ТТ': a.tt, 'Код': a.code, 'Наименование': a.name, 'Категория': a.category, 'Продажи/день': a.dailySales, 'Списания': a.writeoffQty, 'Решение': a.decision }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Аналитика');
            XLSX.writeFile(wb, 'fridge_analytics.xlsx');
        }

        function exportPlanogram() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            // Собираем макс. слотов для заголовков
            const maxSlots = Math.max(...Array.from({ length: selectedShelves }, (_, i) => getShelfSlotCount(i)), 1);
            const rows = [['Полка', 'Категория', ...Array.from({ length: maxSlots }, (_, i) => `Слот ${i + 1}`)]];
            for (let shelf = selectedShelves - 1; shelf >= 0; shelf--) {
                const cat = shelfCategories[shelf] || '';
                const slots = getShelfSlotCount(shelf);
                const row = [`Полка ${shelf + 1}`, cat];
                for (let d = 0; d < maxSlots; d++) {
                    if (d < slots) {
                        const key = `${d}-${shelf}`;
                        const product = planogramProducts[key];
                        const vol = product ? getProductVolume(product) : 0;
                        const faces = product && product.faces > 1 ? ` ×${product.faces}` : '';
                        const volStr = vol > 0 ? ` ${vol}л` : '';
                        row.push(product ? `${product.nomenclature || product.name}${volStr}${faces}` : '');
                    } else {
                        row.push('');
                    }
                }
                rows.push(row);
            }
            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [{ wch: 10 }, { wch: 20 }, ...Array.from({ length: maxSlots }, () => ({ wch: 35 }))];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Планограмма');
            XLSX.writeFile(wb, `planogram_${selectedStore.replace(/[^a-zA-Z0-9]/g, '_')}.xlsx`);
        }

        // Инициализируем сразу с локальными данными
        init();

        // После загрузки из облака — перечитываем данные и перерисовываем
        window.addEventListener('cloudStorageReady', () => {
            products = load(KEYS.PRODUCTS, []);
            if (!Array.isArray(products)) products = [];
            matrixMarks = load(KEYS.MATRIX, {});
            writeoffs = load(KEYS.WRITEOFFS, []);
            sales = load(KEYS.SALES, []);
            stores = load(KEYS.STORES, []);
            planograms = load(KEYS.PLANOGRAMS, {});
            buildMatrix();
            render();
        });
    </script>
