<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ассортимент</title>
    <!-- Version: 1.0 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="config.js"></script>
    <script src="shared-utils.js"></script>
    <script src="storage.js"></script>
    <script src="shared-data.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
        .btn { transition: all 0.2s; }
        .btn:hover { opacity: 0.9; }
        input:focus, select:focus { outline: none; }
        .input { padding: 0.35rem 0.4rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.75rem; background: white; }
        .input:focus { border-color: #0d9488; }
        .table-container { overflow: auto; max-height: 75vh; border-radius: 0.5rem; border: 1px solid #e5e7eb; }
        .table-modern { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .table-modern thead { position: sticky; top: 0; z-index: 30; }
        .table-modern th { padding: 0.46rem 0.5rem; text-align: center; font-weight: 600; color: #374151; background: #f3f4f6; border: 1px solid #d1d5db; white-space: nowrap; font-size: 0.7rem; }
        .table-modern th.text-left { text-align: left; }
        .table-modern td { padding: 0.35rem 0.4rem; border: 1px solid #e5e7eb; text-align: center; }
        .table-modern td.text-left { text-align: left; }
        .cell-wrap { white-space: normal; word-wrap: break-word; }
        .group-header { background: #ccfbf1; font-weight: 600; color: #134e4a; }
        .cell-input { width: 100%; padding: 0.2rem 0.3rem; border: 1px solid transparent; border-radius: 0.25rem; font-size: 0.7rem; background: transparent; text-align: inherit; }
        .cell-input:hover { border-color: #d1d5db; background: white; }
        .cell-input:focus { border-color: #0d9488; background: white; outline: none; }
        .cell-input-num { width: 100%; padding: 0.2rem 0.3rem; border: 1px solid transparent; border-radius: 0.25rem; font-size: 0.7rem; background: transparent; text-align: center; }
        .cell-input-num:hover { border-color: #d1d5db; background: white; }
        .cell-input-num:focus { border-color: #0d9488; background: white; outline: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: white; border-radius: 0.75rem; border: 1px solid #e5e7eb; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }

    </style>
</head>
<body class="min-h-screen bg-[#f5f7fa]">
    <div class="bg-white border-b border-gray-200">
        <div class="px-3 py-2">
            <div class="flex items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span>Назад</span>
                </a>
                <div class="flex items-center gap-2 px-2">
                    <div class="p-1.5 bg-teal-100 rounded-lg text-teal-600">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                    </div>
                    <h1 class="text-base font-semibold text-gray-900">Ассортимент</h1>
                </div>
                <div class="flex gap-0.5 ml-2 bg-gray-100 rounded-lg p-0.5" id="tabs"></div>
                <div class="ml-auto flex gap-2">
                    <span class="bg-teal-100 text-teal-800 rounded-lg px-2 py-1 text-xs" id="statsProducts">0 тов.</span>
                    <span class="bg-emerald-100 text-emerald-800 rounded-lg px-2 py-1 text-xs" id="statsGroups">0 гр.</span>
                </div>
            </div>
        </div>
    </div>
    <div class="px-2 py-2" id="content"></div>

    <script>
        // ============================================================================
        // STATE
        // ============================================================================
        let tab = 'upload';
        let products = [];             // Working array of products
        let currentLoadedAssortment = null; // Name of loaded saved list
        let defaultMarkup = 25;
        let searchQuery = '';
        let filterGroup = '';
        let collapsedGroups = {};
        let _searchTimeout = null;
        let importPreviewData = null;  // For import tab preview
        let importMode = 'replace';    // 'replace' or 'merge'
        let supplierList = JSON.parse(localStorage.getItem('shared_supplier_list_v1') || '[]');
        let supplierMatrix = JSON.parse(localStorage.getItem('shared_supplier_matrix_v1') || '{}');

        // ============================================================================
        // UTILITIES
        // ============================================================================
        const normCode = SharedUtils.normCode;
        const esc = SharedUtils.esc;
        const load = (key, def) => SharedUtils.load(key, def);
        const save = (key, data) => SharedUtils.save(key, data);

        const ASSORTMENTS_KEY = SharedUtils.STORAGE_KEYS.SAVED_ASSORTMENTS;
        const PRODUCTS_KEY = SharedUtils.STORAGE_KEYS.PRODUCTS;
        const UNIV_PRODUCTS_KEY = SharedUtils.STORAGE_KEYS.UNIV_PRODUCTS;
        const SUPPLIER_LIST_KEY = 'shared_supplier_list_v1';
        const SUPPLIER_MATRIX_KEY = 'shared_supplier_matrix_v1';
        function saveSuppliers() { localStorage.setItem(SUPPLIER_LIST_KEY, JSON.stringify(supplierList)); localStorage.setItem(SUPPLIER_MATRIX_KEY, JSON.stringify(supplierMatrix)); }

        // ============================================================================
        // ICONS (same SVGs as universal.html)
        // ============================================================================
        const icons = {
            upload: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
            list: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>`,
            grid: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
            dollar: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
            download: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            search: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
            check: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
            x: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            chevronRight: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>`,
            chevronDown: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="6 9 12 15 18 9"/></svg>`,
            trash: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            plus: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
            save: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`,
            import: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            export: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M16 10l4-4-4-4"/><line x1="20" y1="6" x2="12" y2="6"/><path d="M20 6h-8v12"/></svg>`,
            db: `<svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
            package: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`
        };

        // ============================================================================
        // SYNC — save to ALL storage locations
        // ============================================================================
        function syncAll() {
            // Save as array for matrix-calc
            save(PRODUCTS_KEY, products);
            // Save as object for universal
            const obj = {};
            products.forEach(p => {
                if (p.code) obj[p.code] = {
                    ...p,
                    markup: p.markup || defaultMarkup,
                    inPrice: p.inPrice || p.price || 0
                };
            });
            save(UNIV_PRODUCTS_KEY, obj);
            // Notify SharedData for cross-tab sync
            if (window.SharedData) SharedData.saveProducts(products, 'assortment');
            // Sync to saved list if one is loaded
            syncToSavedAssortment();
        }

        function syncToSavedAssortment() {
            if (!currentLoadedAssortment) return;
            const saved = getSavedAssortments();
            const idx = saved.findIndex(s => s.name === currentLoadedAssortment);
            if (idx < 0) return;
            saved[idx] = {
                ...saved[idx],
                date: new Date().toISOString(),
                count: products.length,
                data: products.map(p => ({
                    code: p.code, nomenclature: p.nomenclature || '',
                    group: p.group || '', packaging: p.packaging || 'ШТ',
                    supplier: p.supplier || '', price: p.price || 0,
                    inPrice: p.inPrice || 0, shelfPrice: p.shelfPrice || 0,
                    shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                    markup: p.markup || defaultMarkup,
                    mandatory: p.mandatory || false, totalSales: p.totalSales || 0
                }))
            };
            save(ASSORTMENTS_KEY, saved);
        }

        // ============================================================================
        // SAVED ASSORTMENTS
        // ============================================================================
        function getSavedAssortments() {
            try {
                let data = load(ASSORTMENTS_KEY, null);
                if (!data || !Array.isArray(data)) data = [];
                return data;
            } catch { return []; }
        }

        function loadAssortmentByName(name) {
            const saved = getSavedAssortments();
            const record = saved.find(s => s.name === name);
            if (!record) { alert('Ассортимент не найден'); return; }

            const count = products.length;
            if (count > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count} товаров)?\nТекущий ассортимент (${count} товаров) будет заменен.`)) return;
            }

            products = [];
            (record.data || []).forEach(p => {
                if (p.code) {
                    products.push({
                        code: normCode(p.code),
                        nomenclature: p.nomenclature || p.name || '',
                        group: p.group || '',
                        packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '',
                        price: p.price || 0,
                        inPrice: p.inPrice || p.price || 0,
                        shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0,
                        quant: p.quant || 1,
                        volume: p.volume || 0,
                        markup: p.markup || defaultMarkup,
                        mandatory: p.mandatory || false,
                        totalSales: p.totalSales || 0,
                    });
                }
            });

            currentLoadedAssortment = name;
            syncAll();
            render();
            alert(`Загружено: ${products.length} товаров из "${name}"`);
        }

        function deleteAssortmentByName(name) {
            if (!confirm(`Удалить сохранённый список "${name}"?`)) return;
            const saved = getSavedAssortments();
            const filtered = saved.filter(s => s.name !== name);
            save(ASSORTMENTS_KEY, filtered);
            if (currentLoadedAssortment === name) currentLoadedAssortment = null;
            render();
        }

        function saveToAssortmentList() {
            if (products.length === 0) { alert('Нет товаров для сохранения'); return; }
            const name = prompt('Введите название:', currentLoadedAssortment || `Ассортимент ${new Date().toLocaleDateString('ru-RU')}`);
            if (!name) return;
            const saved = getSavedAssortments();
            const existingIdx = saved.findIndex(s => s.name === name);
            const record = {
                name,
                date: new Date().toISOString(),
                count: products.length,
                data: products.map(p => ({
                    code: p.code, nomenclature: p.nomenclature || '',
                    group: p.group || '', packaging: p.packaging || 'ШТ',
                    supplier: p.supplier || '', price: p.price || 0,
                    inPrice: p.inPrice || 0, shelfPrice: p.shelfPrice || 0,
                    shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                    markup: p.markup || defaultMarkup, mandatory: p.mandatory || false,
                    totalSales: p.totalSales || 0
                }))
            };
            if (existingIdx >= 0) {
                if (!confirm(`"${name}" уже существует. Перезаписать?`)) return;
                saved[existingIdx] = record;
            } else {
                saved.push(record);
            }
            currentLoadedAssortment = name;
            save(ASSORTMENTS_KEY, saved);
            alert(`Сохранено: "${name}" (${products.length} товаров)`);
            render();
        }

        // ============================================================================
        // DEBOUNCE SEARCH
        // ============================================================================
        function debounceSearch(inputEl) {
            if (_searchTimeout) clearTimeout(_searchTimeout);
            const val = inputEl.value;
            const pos = inputEl.selectionStart;
            _searchTimeout = setTimeout(() => {
                searchQuery = val;
                renderAssortment();
                const el = document.getElementById('assortmentSearchInput');
                if (el) { el.focus(); el.setSelectionRange(pos, pos); }
            }, 300);
        }

        // ============================================================================
        // HELPER: get all groups
        // ============================================================================
        function getAllGroups() {
            const groups = new Set();
            products.forEach(p => { if (p.group) groups.add(p.group); });
            return Array.from(groups).sort((a, b) => a.localeCompare(b, 'ru'));
        }

        // ============================================================================
        // PRODUCT CRUD
        // ============================================================================
        function updateProduct(code, field, value) {
            const p = products.find(item => item.code === code);
            if (!p) return;
            p[field] = value;
            if (field === 'price') p.inPrice = value;
            syncAll();
            if (field === 'group') renderAssortment();
        }

        function deleteProduct(code) {
            const p = products.find(item => item.code === code);
            if (!p || !confirm(`Удалить "${p.nomenclature || code}"?`)) return;
            products = products.filter(item => item.code !== code);
            syncAll();
            renderAssortment();
        }

        function showAddProductModal() {
            const existingModal = document.getElementById('addProductModal');
            if (existingModal) existingModal.remove();

            const knownGroups = getAllGroups();
            const knownSuppliers = [...new Set(products.map(p => p.supplier || '').filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ru'));

            const modal = document.createElement('div');
            modal.id = 'addProductModal';
            modal.className = 'modal-overlay';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="modal-content max-w-lg p-6" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-gray-800">${icons.plus} Добавить товар</h3>
                        <button onclick="document.getElementById('addProductModal').remove()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
                    </div>
                    <div class="space-y-3 text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block font-medium text-gray-700 mb-1">Код товара *</label>
                                <input type="text" id="newCode" placeholder="Код" class="input w-full">
                            </div>
                            <div>
                                <label class="block font-medium text-gray-700 mb-1">Упаковка</label>
                                <select id="newPackaging" class="input w-full bg-white">
                                    <option value="ШТ">ШТ</option>
                                    <option value="КГ">КГ</option>
                                    <option value="Ж/Б">Ж/Б</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block font-medium text-gray-700 mb-1">Наименование *</label>
                            <input type="text" id="newName" placeholder="Наименование товара" class="input w-full">
                        </div>
                        <div>
                            <label class="block font-medium text-gray-700 mb-1">Группа</label>
                            <input type="text" id="newGroup" placeholder="Группа" list="groupListAdd" class="input w-full">
                            <datalist id="groupListAdd">
                                ${knownGroups.map(g => `<option value="${esc(g)}">`).join('')}
                            </datalist>
                        </div>
                        <div>
                            <label class="block font-medium text-gray-700 mb-1">Поставщик</label>
                            <input type="text" id="newSupplier" placeholder="Поставщик" list="supplierListAdd" class="input w-full">
                            <datalist id="supplierListAdd">
                                ${knownSuppliers.map(s => `<option value="${esc(s)}">`).join('')}
                            </datalist>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="block font-medium text-gray-700 mb-1">Цена</label>
                                <input type="number" step="0.01" id="newPrice" placeholder="0.00" class="input w-full text-center">
                            </div>
                            <div>
                                <label class="block font-medium text-gray-700 mb-1">Цена на полке</label>
                                <input type="number" step="0.01" id="newShelfPrice" placeholder="0.00" class="input w-full text-center">
                            </div>
                            <div>
                                <label class="block font-medium text-gray-700 mb-1">Дом. полка</label>
                                <input type="number" step="0.01" id="newShelf" placeholder="0" class="input w-full text-center">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block font-medium text-gray-700 mb-1">Квант</label>
                                <input type="number" id="newQuant" value="1" min="1" class="input w-full text-center">
                            </div>
                            <div>
                                <label class="block font-medium text-gray-700 mb-1">Объём</label>
                                <input type="number" step="0.01" id="newVolume" value="0" class="input w-full text-center">
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-5">
                        <button onclick="document.getElementById('addProductModal').remove()" class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Отмена</button>
                        <button onclick="addNewProduct()" class="flex-1 px-4 py-2 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">Добавить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => document.getElementById('newCode').focus(), 100);
        }

        function addNewProduct() {
            const code = normCode(document.getElementById('newCode').value.trim());
            const name = document.getElementById('newName').value.trim();
            if (!code || code === '0') { alert('Введите код товара'); document.getElementById('newCode').focus(); return; }
            if (!name) { alert('Введите наименование'); document.getElementById('newName').focus(); return; }
            if (products.some(p => p.code === code)) { alert(`Товар с кодом "${code}" уже существует!`); document.getElementById('newCode').focus(); return; }

            const price = parseFloat(document.getElementById('newPrice').value) || 0;
            const newProduct = {
                code,
                nomenclature: name,
                group: document.getElementById('newGroup').value.trim(),
                packaging: (document.getElementById('newPackaging').value || 'ШТ').toUpperCase().trim(),
                supplier: document.getElementById('newSupplier').value.trim(),
                price,
                inPrice: price,
                shelfPrice: parseFloat(document.getElementById('newShelfPrice').value) || 0,
                shelf: parseFloat(document.getElementById('newShelf').value) || 0,
                quant: parseInt(document.getElementById('newQuant').value) || 1,
                volume: parseFloat(document.getElementById('newVolume').value) || 0,
                markup: defaultMarkup
            };

            products.push(newProduct);
            if (newProduct.group) delete collapsedGroups[newProduct.group];
            syncAll();
            document.getElementById('addProductModal').remove();
            renderAssortment();
        }

        // ============================================================================
        // IMPORT FROM EXCEL
        // ============================================================================
        function importFromFile(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            
            SharedUtils.importAssortmentUnified(file).then(function(result) {
                const items = result.items;
                if (items.length === 0) {
                    alert('Не найдено товаров в файле');
                    return;
                }
                
                if (products.length > 0) {
                    if (!confirm(`Найдено ${items.length} товаров. Заменить текущий ассортимент (${products.length} товаров)?`)) return;
                }
                
                products = items;
                // Ensure all products have required fields
                products.forEach(function(p) {
                    if (!p.markup && p.markup !== 0) p.markup = defaultMarkup;
                    if (!p.inPrice) p.inPrice = p.price || 0;
                });
                
                currentLoadedAssortment = null;
                syncAll();
                render();
                alert('Загружено товаров: ' + items.length);
            }).catch(function(err) {
                alert('Ошибка импорта: ' + err.message);
                console.error(err);
            });
            
            input.value = '';
        }

        function confirmImport() {
            if (!importPreviewData || importPreviewData.length === 0) return;
            const items = importPreviewData;

            if (importMode === 'replace') {
                if (products.length > 0) {
                    if (!confirm(`Заменить текущий ассортимент (${products.length} товаров) на ${items.length} товаров из файла?`)) return;
                }
                products = items;
                currentLoadedAssortment = null;
            } else {
                // Merge: add new, update existing
                let added = 0, updated = 0, skipped = 0;
                items.forEach(item => {
                    const existing = products.find(p => p.code === item.code);
                    if (existing) {
                        Object.assign(existing, item);
                        updated++;
                    } else {
                        products.push(item);
                        added++;
                    }
                });
                alert(`Слияние: ${added} добавлено, ${updated} обновлено`);
            }

            importPreviewData = null;
            collapsedGroups = {};
            syncAll();
            tab = 'assortment';
            render();
            alert(`Импортировано: ${products.length} товаров`);
        }

        function cancelImport() {
            importPreviewData = null;
            render();
        }

        // ============================================================================

        // ============================================================================
        function exportAssortment() {
            SharedUtils.exportAssortmentUnified(products);
        }

        function exportAllSavedLists() {
            const saved = getSavedAssortments();
            if (saved.length === 0) { alert('Нет сохранённых списков'); return; }
            const headers = ['Список', 'Дата', 'Товаров'].concat(SharedUtils.ASSORTMENT_HEADERS);
            const data = [];
            saved.forEach(s => {
                (s.data || []).forEach((p, i) => {
                    var isMandatory = p.mandatory || false;
                    var inPrice = p.inPrice || p.price || 0;
                    var shelfPrice = p.shelfPrice || 0;
                    var income = shelfPrice - inPrice;
                    var markup = inPrice > 0 ? (shelfPrice - inPrice) / inPrice * 100 : (p.markup || 0);
                    var margin = shelfPrice > 0 ? (shelfPrice - inPrice) / shelfPrice * 100 : 0;
                    data.push([i === 0 ? s.name : '', i === 0 ? new Date(s.date).toLocaleDateString('ru-RU') : '', i === 0 ? s.count : '', isMandatory ? '\u2B50' : '', p.group || '', p.nomenclature || '', p.code, p.packaging || 'ШТ', p.volume || 0, p.quant || 1, p.shelf || 0, p.supplier || '', p.totalSales || 0, inPrice, shelfPrice, Math.round(income * 100) / 100, Math.round(markup * 100) / 100, Math.round(margin * 100) / 100]);
                });
            });
            const ws = SharedUtils.createStyledSheet(data, headers, [0, 3, 4, 8]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Списки');
            const d = new Date();
            XLSX.writeFile(wb, `списки_ассортимента_${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}.xlsx`);
        }

                        <span>${esc(s)}</span>
                        <span class="opacity-60">${cnt}</span>
                        <button onclick="event.stopPropagation();removeSupplierByName('${esc(s)}')" class="opacity-50 hover:opacity-100 text-base leading-none ml-0.5" title="Удалить">&times;</button>
                    </div>`;
                });
                html += `</div>`;
            }

            // Table
            if (supplierList.length === 0) {
                html += `<div class="bg-white rounded-lg border border-gray-200 p-8 text-center text-gray-400">
                    <div class="text-4xl mb-2 opacity-30">${icons.grid}</div>
                    <div>Добавьте поставщиков чтобы увидеть таблицу привязки</div>
                </div>`;
            } else if (products.length === 0) {
                html += `<div class="bg-white rounded-lg border border-gray-200 p-8 text-center text-gray-400">
                    <div>Нет товаров. Импортируйте ассортимент через вкладку «Загрузка»</div>
                </div>`;
            } else {
                html += `<div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <div class="table-container" style="max-height:70vh">
                        <table class="table-modern">
                            <thead><tr>
                                <th class="text-left" style="min-width:250px;max-width:250px;z-index:5">Товар</th>
                                ${supplierList.map((s, i) => {
                                    const c = sc(i);
                                    const cnt = products.filter(p => supplierMatrix[p.code] && supplierMatrix[p.code][s]).length;
                                    const pct = products.length ? Math.round(cnt/products.length*100) : 0;
                                    return `<th class="cursor-pointer select-none hover:bg-blue-50" style="color:${c.text}" onclick="toggleAllForSupplier('${esc(s)}')" title="Нажмите: выделить всех / снять всех">
                                        <div class="flex flex-col items-center gap-0.5">
                                            <span class="truncate max-w-[100px]">${esc(s)}</span>
                                            <span class="font-normal text-gray-400">${cnt} (${pct}%)</span>
                                        </div>
                                    </th>`;
                                }).join('')}
                            </tr></thead>
                            <tbody>
                                ${products.map(p => `<tr>
                                    <td class="text-left" style="min-width:250px;max-width:250px">
                                        <div class="truncate font-medium text-gray-800" title="${esc(p.nomenclature||'')}">${esc(p.nomenclature || p.code || '—')}</div>
                                        <div class="text-[10px] text-gray-400 font-mono">${esc(p.code||'')}</div>
                                    </td>
                                    ${supplierList.map((s, i) => {
                                        const checked = supplierMatrix[p.code] && supplierMatrix[p.code][s];
                                        const c = sc(i);
                                        return `<td class="cursor-pointer select-none ${checked ? '' : 'hover:bg-gray-50'}" style="${checked ? 'background:'+c.bg : ''}" onclick="toggleCheck('${esc(p.code)}','${esc(s)}')">
                                            ${checked
                                                ? `<svg class="mx-auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${c.check}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
                                                : `<svg class="mx-auto text-gray-300" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>`
                                            }
                                        </td>`;
                                    }).join('')}
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;

                // Intersections table
                if (supplierList.length >= 2) {
                    html += `<div class="bg-white rounded-lg border border-gray-200 p-3 mt-2">
                        <h3 class="text-sm font-semibold text-gray-700 mb-2">Пересечения между поставщиками</h3>
                        <div class="overflow-x-auto"><table class="table-modern"><thead><tr>
                            <th class="text-left"></th>
                            ${supplierList.map(s => `<th class="text-xs">${esc(s)}</th>`).join('')}
                        </tr></thead><tbody>
                            ${supplierList.map((s1, i) => `<tr>
                                <td class="text-left text-xs font-medium text-gray-700">${esc(s1)}</td>
                                ${supplierList.map((s2, j) => {
                                    if (i === j) return `<td class="text-gray-300">—</td>`;
                                    const shared = products.filter(p => supplierMatrix[p.code] && supplierMatrix[p.code][s1] && supplierMatrix[p.code][s2]).length;
                                    return `<td class="${shared > 0 ? 'text-blue-600 font-semibold' : 'text-gray-300'}">${shared}</td>`;
                                }).join('')}
                            </tr>`).join('')}
                        </tbody></table></div>
                        <p class="text-[10px] text-gray-400 mt-1">Количество общих товаров между каждой парой</p>
                    </div>`;
                }
            }

            return html;
        }

        function addSupplierFromTab() {
            const input = document.getElementById('newSupplierInput');
            const name = (input.value || '').trim();
            if (!name) return;
            if (supplierList.includes(name)) { alert('Такой поставщик уже есть'); return; }
            supplierList.push(name);
            saveSuppliers();
            render();
        }

        function removeSupplierByName(name) {
            if (!confirm(`Удалить поставщика "${name}"?`)) return;
            supplierList = supplierList.filter(s => s !== name);
            Object.keys(supplierMatrix).forEach(code => { delete supplierMatrix[code][name]; });
            saveSuppliers();
            render();
        }

        function toggleCheck(code, supplier) {
            if (!supplierMatrix[code]) supplierMatrix[code] = {};
            supplierMatrix[code][supplier] = !supplierMatrix[code][supplier];
            saveSuppliers();
            render();
        }

        function toggleAllForSupplier(supplier) {
            const stats = products.filter(p => supplierMatrix[p.code] && supplierMatrix[p.code][supplier]).length;
            const forceValue = stats > products.length / 2 ? false : true;
            products.forEach(p => {
                if (!supplierMatrix[p.code]) supplierMatrix[p.code] = {};
                supplierMatrix[p.code][supplier] = forceValue;
            });
            saveSuppliers();
            render();
        }

        function exportSupplierMatrix() {
            if (products.length === 0) { alert('Нет товаров'); return; }
            const wb = XLSX.utils.book_new();
            const rows = [['Код товара', 'Наименование', ...supplierList]];
            products.forEach(p => {
                rows.push([p.code, p.nomenclature || '', ...supplierList.map(s => (supplierMatrix[p.code] && supplierMatrix[p.code][s]) ? 'ДА' : 'НЕТ')]);
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [{ wch: 15 }, { wch: 40 }, ...supplierList.map(() => ({ wch: 12 }))];
            XLSX.utils.book_append_sheet(wb, ws, 'Ассортимент поставщиков');
            XLSX.writeFile(wb, 'ассортимент_поставщики.xlsx');
        }

        function importSupplierMatrix() {
            document.getElementById('supplierMatrixFileInput').click();
        }

        function handleSupplierMatrixImport(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                    if (json.length < 2) { alert('Пустой файл'); return; }
                    const fileSuppliers = [];
                    for (let c = 2; c < json[0].length; c++) {
                        const s = String(json[0][c] || '').trim();
                        if (s && !fileSuppliers.includes(s)) fileSuppliers.push(s);
                    }
                    let addedS = 0;
                    fileSuppliers.forEach(s => { if (!supplierList.includes(s)) { supplierList.push(s); addedS++; } });
                    let updated = 0;
                    for (let i = 1; i < json.length; i++) {
                        const row = json[i]; if (!row) continue;
                        const code = String(row[0] || '').trim();
                        if (!code) continue;
                        if (!supplierMatrix[code]) supplierMatrix[code] = {};
                        fileSuppliers.forEach((s, idx) => {
                            const val = String(row[idx + 2] || '').trim().toUpperCase();
                            const checked = val === 'ДА' || val === 'YES' || val === '1' || val === '+';
                            supplierMatrix[code][s] = checked;
                            if (checked) updated++;
                        });
                    }
                    saveSuppliers();
                    alert(`Импорт: ${fileSuppliers.length} поставщиков${addedS ? ' (+' + addedS + ' новых)' : ''}, ${updated} привязок`);
                    render();
                } catch (err) { alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        // ============================================================================
        // RENDER — LISTS TAB
        // ============================================================================
        function renderListsTab() {
            const saved = getSavedAssortments();

            let html = `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex justify-between items-center">
                    <div class="flex gap-2 items-center">
                        <span class="bg-teal-100 text-teal-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Сохранённых списков: </span><strong>${saved.length}</strong>
                        </span>
                        ${currentLoadedAssortment ? `<span class="bg-teal-600 text-white rounded-lg px-2 py-1 text-xs font-medium">Текущий: ${esc(currentLoadedAssortment)}</span>` : ''}
                    </div>
                    <div class="flex gap-2">
                        ${products.length > 0 ? `<button onclick="saveToAssortmentList()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">${icons.plus} Сохранить текущий</button>` : ''}
                        ${saved.length > 0 ? `<button onclick="exportAllSavedLists()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт все</button>` : ''}
                    </div>
                </div>
            </div>`;

            if (saved.length === 0) {
                html += `<div class="bg-white rounded-lg border border-gray-200 p-8 text-center">
                    <div class="text-5xl mb-3 opacity-30">${icons.save}</div>
                    <div class="text-gray-500 text-lg mb-1">Нет сохранённых списков</div>
                    <div class="text-gray-400 text-sm">Сохраните текущий ассортимент или загрузите из файла</div>
                </div>`;
            } else {
                html += `<div class="space-y-2">
                    ${saved.sort((a, b) => new Date(b.date) - new Date(a.date)).map(s => {
                        const isCurrent = currentLoadedAssortment === s.name;
                        return `
                        <div class="bg-white rounded-lg border ${isCurrent ? 'border-teal-400 ring-2 ring-teal-100' : 'border-gray-200'} p-4 hover:border-teal-300 transition-colors">
                            <div class="flex justify-between items-center">
                                <div>
                                    <div class="flex items-center gap-2">
                                        ${isCurrent ? '<span class="text-teal-600">★</span>' : ''}
                                        <h3 class="font-semibold text-gray-800">${esc(s.name)}</h3>
                                    </div>
                                    <div class="text-xs text-gray-500 mt-1">
                                        ${s.count || 0} товаров • ${new Date(s.date).toLocaleDateString('ru-RU')} ${new Date(s.date).toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'})}
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="loadAssortmentByName('${esc(s.name)}')" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium ${isCurrent ? 'text-teal-700 bg-teal-50 border border-teal-200' : 'text-gray-600 bg-gray-50 border border-gray-200 hover:bg-gray-100'} rounded-lg">${icons.download} Загрузить</button>
                                    <button onclick="deleteAssortmentByName('${esc(s.name)}')" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-red-600 bg-red-50 border border-red-200 hover:bg-red-100 rounded-lg">${icons.trash} Удалить</button>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
            }

            return html;
        }

        // ============================================================================
        // RENDER — IMPORT TAB
        // ============================================================================
        function renderImportTab() {
            if (importPreviewData) {
                return renderImportPreview();
            }

            let html = `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <h2 class="text-lg font-semibold text-gray-800 mb-1">${icons.import} Импорт из Excel</h2>
                <p class="text-sm text-gray-500">Загрузите файл Excel с ассортиментом. Поддерживаются форматы с заголовками колонок и индексные.</p>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 p-6">
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('importFileInput').click()"
                     ondragover="event.preventDefault();this.classList.add('drag-over')"
                     ondragleave="this.classList.remove('drag-over')"
                     ondrop="event.preventDefault();this.classList.remove('drag-over');handleDrop(event)">
                    <div class="text-5xl mb-3 opacity-30">${icons.upload}</div>
                    <div class="text-gray-600 font-medium mb-1">Перетащите файл сюда или нажмите для выбора</div>
                    <div class="text-gray-400 text-sm">.xlsx, .xls</div>
                    <input type="file" id="importFileInput" accept=".xlsx,.xls" onchange="importFromFile(this)" class="hidden">
                </div>

                <div class="mt-6 bg-gray-50 rounded-lg p-4">
                    <h3 class="font-medium text-gray-700 mb-2">Ожидаемый формат колонок:</h3>
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th>Группа</th><th>Наименование</th><th>Код</th><th>Упак.</th><th>Поставщик</th><th>Цена</th><th>Цена на полке</th><th>Дом. полка</th><th>Квант</th><th>Объём</th>
                            </tr>
                        </thead>
                    </table>
                    <p class="text-xs text-gray-400 mt-2">Заголовки могут быть в строке 0, 1 или 2. Данные начинаются после заголовка.</p>
                </div>
            </div>`;

            return html;
        }

        function handleDrop(e) {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const fakeInput = { files: files, value: '' };
                importFromFile(fakeInput);
            }
        }

        function renderImportPreview() {
            if (!importPreviewData) return renderImportTab();
            const items = importPreviewData;
            const previewItems = items.slice(0, 20);

            let html = `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex justify-between items-center">
                    <div class="flex gap-2 items-center">
                        <span class="bg-teal-100 text-teal-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Найдено: </span><strong>${items.length}</strong> товаров
                        </span>
                    </div>
                    <div class="flex gap-2">
                        <label class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="importMode" value="replace" ${importMode === 'replace' ? 'checked' : ''} onchange="importMode='replace'">
                            Заменить текущий
                        </label>
                        <label class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="importMode" value="merge" ${importMode === 'merge' ? 'checked' : ''} onchange="importMode='merge'">
                            Слить с текущим
                        </label>
                    </div>
                </div>
            </div>`;

            html += `<div class="bg-white rounded-lg border border-gray-200 overflow-hidden mb-3">
                <div class="table-container" style="max-height:50vh">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th>#</th><th>Группа</th><th>Наименование</th><th>Код</th><th>Упак.</th><th>Поставщик</th><th>Цена</th><th>Цена на полке</th><th>Дом. полка</th><th>Квант</th><th>Объём</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${previewItems.map((p, i) => `
                                <tr>
                                    <td class="text-[10px] text-gray-400">${i + 1}</td>
                                    <td class="text-xs">${esc(p.group || '')}</td>
                                    <td class="text-xs font-medium text-left">${esc(p.nomenclature || '')}</td>
                                    <td class="font-mono text-[10px]">${esc(p.code)}</td>
                                    <td class="text-xs">${esc(p.packaging || 'ШТ')}</td>
                                    <td class="text-xs">${esc(p.supplier || '')}</td>
                                    <td class="text-xs">${p.price || 0}</td>
                                    <td class="text-xs">${p.shelfPrice || 0}</td>
                                    <td class="text-xs">${p.shelf || 0}</td>
                                    <td class="text-xs">${p.quant || 1}</td>
                                    <td class="text-xs">${p.volume || 0}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                ${items.length > 20 ? `<div class="px-4 py-2 bg-gray-50 text-xs text-gray-500">Показано 20 из ${items.length} товаров</div>` : ''}
            </div>`;

            html += `<div class="flex gap-2 justify-center">
                <button onclick="confirmImport()" class="btn inline-flex items-center gap-1.5 px-6 py-2 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">${icons.check} Подтвердить импорт (${items.length})</button>
                <button onclick="cancelImport()" class="btn px-6 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Отмена</button>
            </div>`;

            return html;
        }

        // ============================================================================
        // INIT
        // ============================================================================
        function init() {
            // Load products from shared storage (try matrix-calc format first, then universal)
            const arrData = load(PRODUCTS_KEY, null);
            const objData = load(UNIV_PRODUCTS_KEY, null);

            if (Array.isArray(arrData) && arrData.length > 0) {
                products = arrData;
            } else if (objData && typeof objData === 'object' && Object.keys(objData).length > 0) {
                // Convert object to array
                products = Object.values(objData).map(p => ({
                    code: p.code,
                    nomenclature: p.nomenclature || p.name || '',
                    group: p.group || '',
                    packaging: p.packaging || 'ШТ',
                    supplier: p.supplier || '',
                    price: p.price || 0,
                    inPrice: p.inPrice || p.price || 0,
                    shelfPrice: p.shelfPrice || 0,
                    shelf: p.shelf || 0,
                    quant: p.quant || 1,
                    volume: p.volume || 0,
                    markup: p.markup || defaultMarkup
                }));
            } else {
                products = [];
            }

            // Listen for changes from other tabs via SharedData
            if (window.SharedData) {
                SharedData.onChange(({source}) => {
                    if (source !== 'assortment') {
                        const newProducts = SharedData.getProducts();
                        if (newProducts.length > 0) {
                            products = newProducts;
                            render();
                        }
                    }
                });
            }

            // Also listen for direct localStorage events as fallback
            window.addEventListener('storage', (e) => {
                if (e.key === PRODUCTS_KEY || e.key === UNIV_PRODUCTS_KEY) {
                    const arrData = load(PRODUCTS_KEY, null);
                    const objData = load(UNIV_PRODUCTS_KEY, null);
                    if (Array.isArray(arrData) && arrData.length > 0) {
                        products = arrData;
                    } else if (objData && typeof objData === 'object' && Object.keys(objData).length > 0) {
                        products = Object.values(objData).map(p => ({
                            code: p.code, nomenclature: p.nomenclature || p.name || '',
                            group: p.group || '', packaging: p.packaging || 'ШТ',
                            supplier: p.supplier || '', price: p.price || 0,
                            inPrice: p.inPrice || p.price || 0, shelfPrice: p.shelfPrice || 0,
                            shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                            markup: p.markup || defaultMarkup
                        }));
                    }
                    render();
                }
            });

            render();
        }

        // Start after cloud storage is ready
        if (window.CloudStorage && CloudStorage.waitForReady) {
            CloudStorage.waitForReady().then(init);
        } else {
            document.addEventListener('DOMContentLoaded', init);
        }
    </script>
</body>
</html>
