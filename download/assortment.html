<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ассортимент</title>
    <!-- Version: 3.0 (shared infrastructure) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
        .btn { transition: all 0.2s; }
        .btn:hover { opacity: 0.9; }
        input:focus, select:focus { outline: none; }
        .input { padding: 0.35rem 0.4rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.75rem; background: white; }
        .input:focus { border-color: #0d9488; }
        .table-container { overflow: auto; max-height: 75vh; border-radius: 0.5rem; border: 1px solid #e5e7eb; }
        .table-modern { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .table-modern thead { position: sticky; top: 0; z-index: 30; }
        .table-modern th { padding: 0.46rem 0.5rem; text-align: center; font-weight: 600; color: #374151; background: #f3f4f6; border: 1px solid #d1d5db; white-space: nowrap; font-size: 0.7rem; }
        .table-modern th.text-left { text-align: left; }
        .table-modern td { padding: 0.35rem 0.4rem; border: 1px solid #e5e7eb; text-align: center; }
        .table-modern td.text-left { text-align: left; }
        .cell-wrap { white-space: normal; word-wrap: break-word; }
        .group-header { background: #ccfbf1; font-weight: 600; color: #134e4a; }
        .cell-input { width: 100%; padding: 0.2rem 0.3rem; border: 1px solid transparent; border-radius: 0.25rem; font-size: 0.7rem; background: transparent; text-align: inherit; }
        .cell-input:hover { border-color: #d1d5db; background: white; }
        .cell-input:focus { border-color: #0d9488; background: white; outline: none; }
        .cell-input-num { width: 100%; padding: 0.2rem 0.3rem; border: 1px solid transparent; border-radius: 0.25rem; font-size: 0.7rem; background: transparent; text-align: center; }
        .cell-input-num:hover { border-color: #d1d5db; background: white; }
        .cell-input-num:focus { border-color: #0d9488; background: white; outline: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: white; border-radius: 0.75rem; border: 1px solid #e5e7eb; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen bg-[#f5f7fa]">
    <div class="bg-white border-b border-gray-200">
        <div class="px-3 py-2">
            <div class="flex items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span>Назад</span>
                </a>
                <div class="flex items-center gap-2 px-2">
                    <div class="p-1.5 bg-teal-100 rounded-lg text-teal-600">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                    </div>
                    <h1 class="text-base font-semibold text-gray-900">Ассортимент</h1>
                </div>
                <div class="flex gap-0.5 ml-2 bg-gray-100 rounded-lg p-0.5" id="tabs"></div>
                <div class="ml-auto flex gap-2">
                    <span class="bg-teal-100 text-teal-800 rounded-lg px-2 py-1 text-xs" id="statsProducts">0 тов.</span>
                    <span class="bg-emerald-100 text-emerald-800 rounded-lg px-2 py-1 text-xs" id="statsGroups">0 гр.</span>
                </div>
            </div>
        </div>
    </div>
    <div class="px-2 py-2" id="content"></div>

    <!-- Shared infrastructure -->
    <script src="shared-utils.js"></script>
    <script src="shared-data.js"></script>
    <script src="storage.js"></script>

    <script>
        // ============================================================================
        // ТОНКИЕ ОБЁРТКИ — делегируют в SharedUtils
        // ============================================================================
        var STORAGE_KEYS = SharedUtils.STORAGE_KEYS;
        var load = function(k, d) { return SharedUtils.load(k, d); };
        var save = function(k, d) { return SharedUtils.save(k, d); };
        var normCode = SharedUtils.normCode;
        var esc = SharedUtils.esc;

        // createStyledSheet и parseAssortment используются локально
        function createStyledSheet(data, headers, leftAlignCols) {
            return SharedUtils.createStyledSheet(data, headers, leftAlignCols);
        }
        function parseAssortment(json) {
            return SharedUtils.parseAssortment(json);
        }

        // --- ASSORTMENT_HEADERS для экспорта колонок (специфично для assortment.html) ---
        var ASSORTMENT_HEADERS = [
            '\u2B50', 'Группа', 'Наименование', 'Код', 'Упак.', 'Объём', 'Квант',
            'Дом. полка', 'Поставщик', 'Продажи', 'Цена входящая', 'Цена на полке',
            'Доход', 'Наценка %', 'Маржа %'
        ];

        // --- importAssortmentUnified: парсинг Excel файла и извлечение товаров (специфично для assortment.html) ---
        function importAssortmentUnified(file) {
            return new Promise(function(resolve, reject) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        var data = new Uint8Array(e.target.result);
                        var wb = XLSX.read(data, { type: 'array' });
                        var sheet = wb.Sheets[wb.SheetNames[0]];
                        var rawJson = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                        if (rawJson.length < 2) { reject(new Error('Файл пуст или неверный формат')); return; }

                        // Поиск строки заголовка
                        var headerRow = -1;
                        for (var i = 0; i < Math.min(5, rawJson.length); i++) {
                            var row = (rawJson[i] || []).map(function(c) { return String(c || '').trim().toLowerCase(); });
                            var hasCode = row.some(function(c) { return c === 'код' || c === 'код товара' || c === 'код(товар)' || c === 'code'; });
                            var hasName = row.some(function(c) { return c === 'наименование' || c === 'наименование товара' || c === 'наим' || c === 'номенклатура' || c === 'nomenclature'; });
                            if (hasCode && hasName) {
                                headerRow = i;
                                break;
                            }
                        }

                        if (headerRow === -1) {
                            var result = parseAssortment(rawJson);
                            resolve({ items: result.items });
                            return;
                        }

                        var headersRaw = rawJson[headerRow];
                        var headers = headersRaw.map(function(h) { return String(h || '').trim().toLowerCase(); });

                        // Построение маппинга колонок по заголовкам
                        var colMap = {};
                        headers.forEach(function(h, idx) {
                            if (h === 'код' || h === 'код товара' || h === 'код(товар)' || h === 'code') colMap.code = idx;
                            else if (h === 'наименование' || h === 'наименование товара' || h === 'наим' || h === 'номенклатура' || h === 'nomenclature') colMap.name = idx;
                            else if (h === 'группа' || h === 'категория') colMap.group = idx;
                            else if (h === 'упак' || h === 'упак.' || h === 'упаковка') colMap.packaging = idx;
                            else if (h === 'объём' || h === 'объем' || h === 'объем' || h === 'volume') colMap.volume = idx;
                            else if (h === 'квант') colMap.quant = idx;
                            else if (h === 'дом. полка' || h === 'домашняя полка') colMap.shelf = idx;
                            else if (h === 'поставщик') colMap.supplier = idx;
                            else if (h === 'продажи') colMap.sales = idx;
                            else if (h === 'цена входящая' || h === 'вх. цена' || h === 'вход. цена' || h === 'закупка') colMap.inPrice = idx;
                            else if (h === 'цена на полке' || h === 'цена полки' || h === 'розничная цена') colMap.shelfPrice = idx;
                            else if (h === 'доход' || h === 'прибыль') colMap.income = idx;
                            else if (h === 'наценка' || h === 'наценка %') colMap.markup = idx;
                            else if (h === 'маржа' || h === 'маржа %') colMap.margin = idx;
                            else if (h === '\u2B50' || h === 'обязательно') colMap.mandatory = idx;
                            else if (h === 'цена') colMap.price = idx;
                        });

                        if (colMap.code === undefined) {
                            reject(new Error('Не найдена колонка "Код" в файле'));
                            return;
                        }

                        var items = [];
                        for (var i = headerRow + 1; i < rawJson.length; i++) {
                            var r = rawJson[i];
                            if (!r || r.length < 2) continue;

                            var code = normCode(String(r[colMap.code] || ''));
                            if (!code) continue;

                            var name = colMap.name !== undefined ? String(r[colMap.name] || '').trim() : '';
                            var group = colMap.group !== undefined ? String(r[colMap.group] || '').trim() : '';

                            if (!code && !name && !group) continue;

                            var inPrice = colMap.inPrice !== undefined ? (parseFloat(String(r[colMap.inPrice])) || 0) : 0;
                            var shelfPrice = colMap.shelfPrice !== undefined ? (parseFloat(String(r[colMap.shelfPrice])) || 0) : 0;
                            if (inPrice === 0 && colMap.price !== undefined && colMap.inPrice === undefined) {
                                inPrice = parseFloat(String(r[colMap.price])) || 0;
                            }

                            var shelf = colMap.shelf !== undefined ? (parseFloat(String(r[colMap.shelf])) || 0) : 0;
                            var quant = colMap.quant !== undefined ? (parseFloat(String(r[colMap.quant])) || 1) : 1;
                            var volume = colMap.volume !== undefined ? (parseFloat(String(r[colMap.volume])) || 0) : 0;

                            items.push({
                                code: code,
                                nomenclature: name,
                                group: group,
                                packaging: colMap.packaging !== undefined ? String(r[colMap.packaging] || 'ШТ').trim() : 'ШТ',
                                supplier: colMap.supplier !== undefined ? String(r[colMap.supplier] || '').trim() : '',
                                price: inPrice || shelfPrice || 0,
                                inPrice: inPrice,
                                shelfPrice: shelfPrice,
                                shelf: shelf,
                                quant: quant,
                                volume: volume,
                                markup: colMap.markup !== undefined ? (parseFloat(String(r[colMap.markup])) || 0) : 0,
                                totalSales: colMap.sales !== undefined ? (parseFloat(String(r[colMap.sales])) || 0) : 0,
                                mandatory: colMap.mandatory !== undefined ? (
                                    String(r[colMap.mandatory] || '') === '\u2B50' ||
                                    String(r[colMap.mandatory] || '').trim() === 'ДА'
                                ) : false
                            });
                        }

                        resolve({ items: items });
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = function() { reject(new Error('Ошибка чтения файла')); };
                reader.readAsArrayBuffer(file);
            });
        }

        // --- exportAssortmentUnified: экспорт товаров в стилизованый Excel (специфично для assortment.html) ---
        function exportAssortmentUnified(products, options) {
            options = options || {};
            if (!products || products.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }

            var salesMap = options.salesMap || {};
            var mandatorySet = options.mandatorySet;

            var data = products.map(function(p) {
                var code = p.code || '';
                var inPrice = p.inPrice || 0;
                var shelfPrice = p.shelfPrice || 0;
                var income = shelfPrice - inPrice;
                var markup = inPrice > 0 ? (shelfPrice - inPrice) / inPrice * 100 : (p.markup || 0);
                var margin = shelfPrice > 0 ? (shelfPrice - inPrice) / shelfPrice * 100 : 0;
                var totalSales = salesMap[code] || p.totalSales || 0;
                var isMandatory = (mandatorySet && (mandatorySet.has ? mandatorySet.has(code) : mandatorySet[code])) || p.mandatory || false;

                return [
                    isMandatory ? '\u2B50' : '',
                    p.group || '',
                    p.nomenclature || '',
                    code,
                    p.packaging || 'ШТ',
                    p.volume || 0,
                    p.quant || 1,
                    p.shelf || 0,
                    p.supplier || '',
                    totalSales,
                    inPrice,
                    shelfPrice,
                    Math.round(income * 100) / 100,
                    Math.round(markup * 100) / 100,
                    Math.round(margin * 100) / 100
                ];
            });

            var ws = createStyledSheet(data, ASSORTMENT_HEADERS, [1, 2, 8]);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Ассортимент');

            var d = new Date();
            var filename = options.filename ||
                'ассортимент_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx';
            XLSX.writeFile(wb, filename);
        }

        // ============================================================================
        // STATE
        // ============================================================================
        var tab = 'upload';
        var products = [];
        var currentLoadedAssortment = null;
        var defaultMarkup = 25;
        var searchQuery = '';
        var filterGroup = '';
        var collapsedGroups = {};
        var _searchTimeout = null;
        var importPreviewData = null;
        var importMode = 'replace';

        // Storage keys
        var ASSORTMENTS_KEY = STORAGE_KEYS.SAVED_ASSORTMENTS;
        var PRODUCTS_KEY = STORAGE_KEYS.PRODUCTS;
        var UNIV_PRODUCTS_KEY = STORAGE_KEYS.UNIV_PRODUCTS;

        // ============================================================================
        // ICONS
        // ============================================================================
        var icons = {
            upload: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
            list: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>',
            grid: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
            dollar: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
            download: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
            search: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
            check: '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
            x: '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
            chevronRight: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>',
            chevronDown: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="6 9 12 15 18 9"/></svg>',
            trash: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
            plus: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
            save: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',
            import: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
            export: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M16 10l4-4-4-4"/><line x1="20" y1="6" x2="12" y2="6"/><path d="M20 6h-8v12"/></svg>',
            db: '<svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>',
            package: '<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>'
        };

        // ============================================================================
        // SYNC — save to ALL storage locations
        // ============================================================================
        function syncAll() {
            // Save to shared keys (backward compatible)
            save(PRODUCTS_KEY, products);

            // Convert to object format for universal/fish compatibility
            var obj = {};
            products.forEach(function(p) {
                if (p.code) obj[p.code] = {
                    code: p.code, nomenclature: p.nomenclature, group: p.group,
                    packaging: p.packaging, supplier: p.supplier, price: p.price,
                    inPrice: p.inPrice || p.price || 0, shelfPrice: p.shelfPrice,
                    shelf: p.shelf, quant: p.quant, volume: p.volume,
                    markup: p.markup || defaultMarkup
                };
            });
            save(UNIV_PRODUCTS_KEY, obj);

            // Sync with fish-order.html
            save('fish_assortment_v1', obj);

            // Sync via SharedData (for cross-tab real-time sync)
            if (window.SharedData) {
                SharedData.saveProducts(products, 'assortment');
            }

            syncToSavedAssortment();
        }

        function syncToSavedAssortment() {
            if (!currentLoadedAssortment) return;
            var saved = getSavedAssortments();
            var idx = saved.findIndex(function(s) { return s.name === currentLoadedAssortment; });
            if (idx < 0) return;
            saved[idx] = {
                name: saved[idx].name,
                date: new Date().toISOString(),
                count: products.length,
                data: products.map(function(p) {
                    return {
                        code: p.code, nomenclature: p.nomenclature || '',
                        group: p.group || '', packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '', price: p.price || 0,
                        inPrice: p.inPrice || 0, shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                        markup: p.markup || defaultMarkup,
                        mandatory: p.mandatory || false, totalSales: p.totalSales || 0
                    };
                })
            };
            save(ASSORTMENTS_KEY, saved);
        }

        // ============================================================================
        // SAVED ASSORTMENTS
        // ============================================================================
        function getSavedAssortments() {
            try {
                var data = load(ASSORTMENTS_KEY, null);
                if (!data || !Array.isArray(data)) data = [];
                return data;
            } catch (e) { return []; }
        }

        function loadAssortmentByName(name) {
            var saved = getSavedAssortments();
            var record = saved.find(function(s) { return s.name === name; });
            if (!record) { alert('Ассортимент не найден'); return; }

            var count = products.length;
            if (count > 0) {
                if (!confirm('Загрузить "' + name + '" (' + record.count + ' товаров)?\nТекущий ассортимент (' + count + ' товаров) будет заменен.')) return;
            }

            products = [];
            (record.data || []).forEach(function(p) {
                if (p.code) {
                    products.push({
                        code: normCode(p.code),
                        nomenclature: p.nomenclature || p.name || '',
                        group: p.group || '',
                        packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '',
                        price: p.price || 0,
                        inPrice: p.inPrice || p.price || 0,
                        shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0,
                        quant: p.quant || 1,
                        volume: p.volume || 0,
                        markup: p.markup || defaultMarkup,
                        mandatory: p.mandatory || false,
                        totalSales: p.totalSales || 0
                    });
                }
            });

            currentLoadedAssortment = name;
            syncAll();
            render();
            alert('Загружено: ' + products.length + ' товаров из "' + name + '"');
        }

        function deleteAssortmentByName(name) {
            if (!confirm('Удалить сохранённый список "' + name + '"?')) return;
            var saved = getSavedAssortments();
            var filtered = saved.filter(function(s) { return s.name !== name; });
            save(ASSORTMENTS_KEY, filtered);
            if (currentLoadedAssortment === name) currentLoadedAssortment = null;
            render();
        }

        function saveToAssortmentList() {
            if (products.length === 0) { alert('Нет товаров для сохранения'); return; }
            var name = prompt('Введите название:', currentLoadedAssortment || ('Ассортимент ' + new Date().toLocaleDateString('ru-RU')));
            if (!name) return;
            var saved = getSavedAssortments();
            var existingIdx = saved.findIndex(function(s) { return s.name === name; });
            var record = {
                name: name,
                date: new Date().toISOString(),
                count: products.length,
                data: products.map(function(p) {
                    return {
                        code: p.code, nomenclature: p.nomenclature || '',
                        group: p.group || '', packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '', price: p.price || 0,
                        inPrice: p.inPrice || 0, shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                        markup: p.markup || defaultMarkup, mandatory: p.mandatory || false,
                        totalSales: p.totalSales || 0
                    };
                })
            };
            if (existingIdx >= 0) {
                if (!confirm('"' + name + '" уже существует. Перезаписать?')) return;
                saved[existingIdx] = record;
            } else {
                saved.push(record);
            }
            currentLoadedAssortment = name;
            save(ASSORTMENTS_KEY, saved);
            alert('Сохранено: "' + name + '" (' + products.length + ' товаров)');
            render();
        }

        // ============================================================================
        // DEBOUNCE SEARCH
        // ============================================================================
        function debounceSearch(inputEl) {
            if (_searchTimeout) clearTimeout(_searchTimeout);
            var val = inputEl.value;
            var pos = inputEl.selectionStart;
            _searchTimeout = setTimeout(function() {
                searchQuery = val;
                renderAssortment();
                var el = document.getElementById('assortmentSearchInput');
                if (el) { el.focus(); el.setSelectionRange(pos, pos); }
            }, 300);
        }

        // ============================================================================
        // HELPER: get all groups
        // ============================================================================
        function getAllGroups() {
            var groups = {};
            products.forEach(function(p) { if (p.group) groups[p.group] = true; });
            return Object.keys(groups).sort(function(a, b) { return a.localeCompare(b, 'ru'); });
        }

        // ============================================================================
        // PRODUCT CRUD
        // ============================================================================
        function updateProduct(code, field, value) {
            var p = products.find(function(item) { return item.code === code; });
            if (!p) return;
            p[field] = value;
            if (field === 'price') p.inPrice = value;
            syncAll();
            if (field === 'group') renderAssortment();
        }

        function deleteProduct(code) {
            var p = products.find(function(item) { return item.code === code; });
            if (!p || !confirm('Удалить "' + (p.nomenclature || code) + '"?')) return;
            products = products.filter(function(item) { return item.code !== code; });
            syncAll();
            renderAssortment();
        }

        function addNewProduct() {
            var code = normCode(document.getElementById('newCode').value.trim());
            var name = document.getElementById('newName').value.trim();
            if (!code || code === '0') { alert('Введите код товара'); document.getElementById('newCode').focus(); return; }
            if (!name) { alert('Введите наименование'); document.getElementById('newName').focus(); return; }
            if (products.some(function(p) { return p.code === code; })) { alert('Товар с кодом "' + code + '" уже существует!'); document.getElementById('newCode').focus(); return; }

            var price = parseFloat(document.getElementById('newPrice').value) || 0;
            var newProduct = {
                code: code,
                nomenclature: name,
                group: document.getElementById('newGroup').value.trim(),
                packaging: (document.getElementById('newPackaging').value || 'ШТ').toUpperCase().trim(),
                price: price,
                inPrice: price,
                shelfPrice: parseFloat(document.getElementById('newShelfPrice').value) || 0,
                shelf: parseFloat(document.getElementById('newShelf').value) || 0,
                quant: parseInt(document.getElementById('newQuant').value) || 1,
                volume: parseFloat(document.getElementById('newVolume').value) || 0,
                markup: defaultMarkup
            };

            products.push(newProduct);
            if (newProduct.group) delete collapsedGroups[newProduct.group];
            syncAll();
            document.getElementById('addProductModal').remove();
            renderAssortment();
        }

        // ============================================================================
        // IMPORT FROM EXCEL
        // ============================================================================
        function importFromFile(input) {
            if (!input || !input.files || !input.files[0]) return;
            var file = input.files[0];

            importAssortmentUnified(file).then(function(result) {
                var items = result.items;
                if (items.length === 0) {
                    alert('Не найдено товаров в файле');
                    return;
                }

                if (products.length > 0) {
                    if (!confirm('Найдено ' + items.length + ' товаров. Заменить текущий ассортимент (' + products.length + ' товаров)?')) return;
                }

                products = items;
                products.forEach(function(p) {
                    if (!p.markup && p.markup !== 0) p.markup = defaultMarkup;
                    if (!p.inPrice) p.inPrice = p.price || 0;
                });

                currentLoadedAssortment = null;
                syncAll();
                render();
                alert('Загружено товаров: ' + items.length);
            }).catch(function(err) {
                alert('Ошибка импорта: ' + err.message);
                console.error(err);
            });

            input.value = '';
        }

        function confirmImport() {
            if (!importPreviewData || importPreviewData.length === 0) return;
            var items = importPreviewData;

            if (importMode === 'replace') {
                if (products.length > 0) {
                    if (!confirm('Заменить текущий ассортимент (' + products.length + ' товаров) на ' + items.length + ' товаров из файла?')) return;
                }
                products = items;
                currentLoadedAssortment = null;
            } else {
                var added = 0, updated = 0;
                items.forEach(function(item) {
                    var existing = products.find(function(p) { return p.code === item.code; });
                    if (existing) {
                        Object.assign(existing, item);
                        updated++;
                    } else {
                        products.push(item);
                        added++;
                    }
                });
                alert('Слияние: ' + added + ' добавлено, ' + updated + ' обновлено');
            }

            importPreviewData = null;
            collapsedGroups = {};
            syncAll();
            tab = 'assortment';
            render();
            alert('Импортировано: ' + products.length + ' товаров');
        }

        function cancelImport() {
            importPreviewData = null;
            render();
        }

        // ============================================================================
        // EXPORT TO EXCEL
        // ============================================================================
        function exportAssortment() {

        }

        function exportAllSavedLists() {
            var saved = getSavedAssortments();
            if (saved.length === 0) { alert('Нет сохранённых списков'); return; }
            var headers = ['Список', 'Дата', 'Товаров'].concat(ASSORTMENT_HEADERS);
            var data = [];
            saved.forEach(function(s) {
                (s.data || []).forEach(function(p, i) {
                    var isMandatory = p.mandatory || false;
                    var inPrice = p.inPrice || p.price || 0;
                    var shelfPrice = p.shelfPrice || 0;
                    var income = shelfPrice - inPrice;
                    var markup = inPrice > 0 ? (shelfPrice - inPrice) / inPrice * 100 : (p.markup || 0);
                    var margin = shelfPrice > 0 ? (shelfPrice - inPrice) / shelfPrice * 100 : 0;
                    data.push([
                        i === 0 ? s.name : '',
                        i === 0 ? new Date(s.date).toLocaleDateString('ru-RU') : '',
                        i === 0 ? s.count : '',
                        isMandatory ? '\u2B50' : '',
                        p.group || '', p.nomenclature || '', p.code, p.packaging || 'ШТ',
                        p.volume || 0, p.quant || 1, p.shelf || 0, p.supplier || '',
                        p.totalSales || 0, inPrice, shelfPrice,
                        Math.round(income * 100) / 100,
                        Math.round(markup * 100) / 100,
                        Math.round(margin * 100) / 100
                    ]);
                });
            });
            var ws = createStyledSheet(data, headers, [0, 3, 4, 8]);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Списки');
            var d = new Date();
            XLSX.writeFile(wb, 'списки_ассортимента_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx');
        }

                var grouped = {};
                products.forEach(function(p) {

                            !(p.code || '').toLowerCase().includes(q) &&

                    var gr = p.group || 'Без группы';

                    grouped[gr].sort(function(a, b) { return (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru'); });
                });

                var visibleCount = Object.values(grouped).reduce(function(sum, arr) { return sum + arr.length; }, 0);

                if (visibleCount === 0 && (searchQuery || filterGroup)) {
                    html += '<div class="text-center py-8"><p class="text-gray-400">Ничего не найдено</p>' +
                        '<button onclick="searchQuery=\'\';filterGroup=\'\';renderAssortment()" class="btn mt-2 px-3 py-1.5 text-sm text-teal-600 hover:bg-teal-50 rounded-lg">Сбросить фильтры</button></div>';
                } else {
                    html += '<div class="table-container"><table class="table-modern"><thead><tr>' +
                        '<th style="min-width:30px">⭐</th>' +
                        '<th class="text-left" style="min-width:100px">Группа</th>' +
                        '<th class="text-left" style="min-width:200px">Наименование</th>' +
                        '<th style="min-width:60px">Код</th>' +
                        '<th style="min-width:50px">Упак.</th>' +
                        '<th style="min-width:65px">Цена</th>' +
                        '<th style="min-width:75px">Цена на полке</th>' +
                        '<th style="min-width:65px">Дом. полка</th>' +
                        '<th style="min-width:55px">Квант</th>' +
                        '<th style="min-width:60px">Объём</th>' +
                        '<th style="min-width:40px">Действ.</th>' +
                        '</tr></thead><tbody>';

                    var sortedGroups = Object.keys(grouped).sort(function(a, b) { return a.localeCompare(b, 'ru'); });
                    sortedGroups.forEach(function(gr) {
                        var items = grouped[gr];
                        var collapsed = collapsedGroups[gr];
                        var escGr = esc(gr).replace(/'/g, "\\'");

                        html += '<tr class="group-header cursor-pointer select-none" onclick="collapsedGroups[\'' + escGr + '\']=!collapsedGroups[\'' + escGr + '\'];renderAssortment()">' +
                            '<td class="text-center px-1 py-1"><span class="text-[10px]">' + (collapsed ? '▶' : '▼') + '</span></td>' +
                            '<td colspan="10" class="text-left py-1 px-2">' +
                            '<div class="flex items-center gap-2">' +
                            '<span class="font-semibold">' + esc(gr) + '</span>' +
                            '<span class="text-[10px] bg-teal-200 text-teal-800 px-1.5 py-0.5 rounded-full font-medium">' + items.length + '</span>' +
                            '</div></td></tr>';

                        if (!collapsed) {
                            items.forEach(function(p) {
                                var idx = items.indexOf(p);
                                var escCode = esc(p.code).replace(/'/g, "\\'");
                                html += '<tr class="hover:bg-gray-50" id="row_' + esc(p.code) + '">' +
                                    '<td class="text-center px-1 py-0.5 text-[10px] text-gray-400">' + (idx + 1) + '</td>' +
                                    '<td><input type="text" value="' + esc(p.group || '') + '" onchange="updateProduct(\'' + escCode + '\', \'group\', this.value)" class="cell-input"></td>' +
                                    '<td class="text-left font-medium text-gray-700"><input type="text" value="' + esc(p.nomenclature || '') + '" onchange="updateProduct(\'' + escCode + '\', \'nomenclature\', this.value)" class="cell-input"></td>' +
                                    '<td class="font-mono text-[10px] text-gray-600">' + esc(p.code) + '</td>' +
                                    '<td><input type="text" value="' + esc(p.packaging || 'ШТ') + '" onchange="updateProduct(\'' + escCode + '\', \'packaging\', this.value.toUpperCase())" class="cell-input" style="text-align:center;width:50px"></td>' +
                                    '<td><input type="number" step="0.01" value="' + (p.price || '') + '" onchange="updateProduct(\'' + escCode + '\', \'price\', parseFloat(this.value)||0)" class="cell-input-num" style="width:65px"></td>' +
                                    '<td><input type="number" step="0.01" value="' + (p.shelfPrice || '') + '" onchange="updateProduct(\'' + escCode + '\', \'shelfPrice\', parseFloat(this.value)||0)" class="cell-input-num" style="width:70px"></td>' +
                                    '<td><input type="number" step="0.01" value="' + (p.shelf || '') + '" onchange="updateProduct(\'' + escCode + '\', \'shelf\', parseFloat(this.value)||0)" class="cell-input-num" style="width:65px"></td>' +
                                    '<td><input type="number" value="' + (p.quant || 1) + '" onchange="updateProduct(\'' + escCode + '\', \'quant\', parseInt(this.value)||1)" class="cell-input-num" style="width:50px"></td>' +
                                    '<td><input type="number" step="0.01" value="' + (p.volume || 0) + '" onchange="updateProduct(\'' + escCode + '\', \'volume\', parseFloat(this.value)||0)" class="cell-input-num" style="width:60px"></td>' +
                                    '<td class="text-center"><button onclick="deleteProduct(\'' + escCode + '\')" class="p-1 text-red-500 hover:bg-red-100 rounded">' + icons.trash + '</button></td>' +
                                    '</tr>';
                            });
                        }
                    });

                    html += '</tbody></table></div>';
                }
            }

            return html;
        }

        // ============================================================================
        // RENDER — LISTS TAB
        // ============================================================================
        function renderListsTab() {
            var saved = getSavedAssortments();

            var html = '<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">' +
                '<div class="flex justify-between items-center">' +
                '<div class="flex gap-2 items-center">' +
                '<span class="bg-teal-100 text-teal-800 rounded-lg px-3 py-1.5">' +
                '<span class="text-xs">Сохранённых списков: </span><strong>' + saved.length + '</strong></span>' +
                (currentLoadedAssortment ? '<span class="bg-teal-600 text-white rounded-lg px-2 py-1 text-xs font-medium">Текущий: ' + esc(currentLoadedAssortment) + '</span>' : '') +
                '</div>' +
                '<div class="flex gap-2">' +
                (products.length > 0 ? '<button onclick="saveToAssortmentList()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">' + icons.plus + ' Сохранить текущий</button>' : '') +
                (saved.length > 0 ? '<button onclick="exportAllSavedLists()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">' + icons.export + ' Экспорт все</button>' : '') +
                '</div></div></div>';

            if (saved.length === 0) {
                html += '<div class="bg-white rounded-lg border border-gray-200 p-8 text-center">' +
                    '<div class="text-5xl mb-3 opacity-30">' + icons.save + '</div>' +
                    '<div class="text-gray-500 text-lg mb-1">Нет сохранённых списков</div>' +
                    '<div class="text-gray-400 text-sm">Сохраните текущий ассортимент или загрузите из файла</div></div>';
            } else {
                html += '<div class="space-y-2">';
                var sorted = saved.slice().sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
                sorted.forEach(function(s) {
                    var isCurrent = currentLoadedAssortment === s.name;
                    var escName = esc(s.name).replace(/'/g, "\\'");
                    html += '<div class="bg-white rounded-lg border ' + (isCurrent ? 'border-teal-400 ring-2 ring-teal-100' : 'border-gray-200') + ' p-4 hover:border-teal-300 transition-colors">' +
                        '<div class="flex justify-between items-center">' +
                        '<div>' +
                        '<div class="flex items-center gap-2">' +
                        (isCurrent ? '<span class="text-teal-600">★</span>' : '') +
                        '<h3 class="font-semibold text-gray-800">' + esc(s.name) + '</h3></div>' +
                        '<div class="text-xs text-gray-500 mt-1">' +
                        (s.count || 0) + ' товаров • ' +
                        new Date(s.date).toLocaleDateString('ru-RU') + ' ' +
                        new Date(s.date).toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'}) +
                        '</div></div>' +
                        '<div class="flex gap-2">' +
                        '<button onclick="loadAssortmentByName(\'' + escName + '\')" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium ' +
                        (isCurrent ? 'text-teal-700 bg-teal-50 border border-teal-200' : 'text-gray-600 bg-gray-50 border border-gray-200 hover:bg-gray-100') +
                        ' rounded-lg">' + icons.download + ' Загрузить</button>' +
                        '<button onclick="deleteAssortmentByName(\'' + escName + '\')" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-red-600 bg-red-50 border border-red-200 hover:bg-red-100 rounded-lg">' + icons.trash + ' Удалить</button>' +
                        '</div></div></div>';
                });
                html += '</div>';
            }

            return html;
        }

        // ============================================================================
        // RENDER — IMPORT PREVIEW
        // ============================================================================
        function renderImportPreview() {
            if (!importPreviewData) return renderUpload();
            var items = importPreviewData;
            var previewItems = items.slice(0, 20);

            var html = '<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">' +
                '<div class="flex justify-between items-center">' +
                '<div class="flex gap-2 items-center">' +
                '<span class="bg-teal-100 text-teal-800 rounded-lg px-3 py-1.5">' +
                '<span class="text-xs">Найдено: </span><strong>' + items.length + '</strong> товаров</span></div>' +
                '<div class="flex gap-2">' +
                '<label class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">' +
                '<input type="radio" name="importMode" value="replace" ' + (importMode === 'replace' ? 'checked' : '') + ' onchange="importMode=\'replace\'"> Заменить текущий</label>' +
                '<label class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">' +
                '<input type="radio" name="importMode" value="merge" ' + (importMode === 'merge' ? 'checked' : '') + ' onchange="importMode=\'merge\'"> Слить с текущим</label>' +
                '</div></div></div>';

            html += '<div class="bg-white rounded-lg border border-gray-200 overflow-hidden mb-3">' +
                '<div class="table-container" style="max-height:50vh">' +
                '<table class="table-modern"><thead><tr>' +
                '<th>#</th><th>Группа</th><th>Наименование</th><th>Код</th><th>Упак.</th><th>Поставщик</th><th>Цена</th><th>Цена на полке</th><th>Дом. полка</th><th>Квант</th><th>Объём</th>' +
                '</tr></thead><tbody>';

            previewItems.forEach(function(p, i) {
                html += '<tr>' +
                    '<td class="text-[10px] text-gray-400">' + (i + 1) + '</td>' +
                    '<td class="text-xs">' + esc(p.group || '') + '</td>' +
                    '<td class="text-xs font-medium text-left">' + esc(p.nomenclature || '') + '</td>' +
                    '<td class="font-mono text-[10px]">' + esc(p.code) + '</td>' +
                    '<td class="text-xs">' + esc(p.packaging || 'ШТ') + '</td>' +
                    '<td class="text-xs">' + esc(p.supplier || '') + '</td>' +
                    '<td class="text-xs">' + (p.price || 0) + '</td>' +
                    '<td class="text-xs">' + (p.shelfPrice || 0) + '</td>' +
                    '<td class="text-xs">' + (p.shelf || 0) + '</td>' +
                    '<td class="text-xs">' + (p.quant || 1) + '</td>' +
                    '<td class="text-xs">' + (p.volume || 0) + '</td></tr>';
            });

            html += '</tbody></table></div>';
            if (items.length > 20) {
                html += '<div class="px-4 py-2 bg-gray-50 text-xs text-gray-500">Показано 20 из ' + items.length + ' товаров</div>';
            }
            html += '</div>';

            html += '<div class="flex gap-2 justify-center">' +
                '<button onclick="confirmImport()" class="btn inline-flex items-center gap-1.5 px-6 py-2 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">' + icons.check + ' Подтвердить импорт (' + items.length + ')</button>' +
                '<button onclick="cancelImport()" class="btn px-6 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Отмена</button>' +
                '</div>';

            return html;
        }

        // ============================================================================
        // INIT
        // ============================================================================
        async function init() {
            // Ждём завершения облачной синхронизации
            if (window.CloudStorage && window.CloudStorage.waitForReady) {
                await window.CloudStorage.waitForReady();
            }

            // Миграция: старый ключ saved_assortments_v1 → shared_saved_assortments_v1
            try {
                var oldKey = 'saved_assortments_v1';
                var oldData = localStorage.getItem(oldKey);
                var newKey = STORAGE_KEYS.SAVED_ASSORTMENTS;
                var newData = localStorage.getItem(newKey);
                if (oldData && !newData) {
                    localStorage.setItem(newKey, oldData);
                    console.log('[Assortment] Миграция: ' + oldKey + ' → ' + newKey);
                }
            } catch (e) { console.warn('Migration error:', e); }

            // Загрузка товаров — сначала пробуем SharedData, затем fallback на прямые ключи
            if (window.SharedData) {
                var sharedProducts = SharedData.getProducts();
                if (sharedProducts && sharedProducts.length > 0) {
                    products = sharedProducts;
                } else {
                    products = load(PRODUCTS_KEY, []);
                }
            } else {
                products = load(PRODUCTS_KEY, []);
            }

            // Fallback: пробуем другие ключи если основной пуст
            if (products.length === 0) {
                var objData = load(UNIV_PRODUCTS_KEY, null);
                var fishData = load('fish_assortment_v1', null);

                if (objData && typeof objData === 'object' && Object.keys(objData).length > 0) {
                    products = Object.values(objData).map(function(p) {
                        return {
                            code: p.code, nomenclature: p.nomenclature || p.name || '',
                            group: p.group || '', packaging: p.packaging || 'ШТ',
                            supplier: p.supplier || '', price: p.price || 0,
                            inPrice: p.inPrice || p.price || 0, shelfPrice: p.shelfPrice || 0,
                            shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                            markup: p.markup || defaultMarkup
                        };
                    });
                } else if (fishData && typeof fishData === 'object' && Object.keys(fishData).length > 0) {
                    products = Object.values(fishData).map(function(p) {
                        return {
                            code: p.code, nomenclature: p.nomenclature || p.name || '',
                            group: p.group || '', packaging: p.packaging || 'ШТ',
                            supplier: p.supplier || '', price: p.price || 0,
                            inPrice: p.inPrice || p.price || 0, shelfPrice: p.shelfPrice || 0,
                            shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                            markup: p.markup || defaultMarkup
                        };
                    });
                }
            }

            // Cross-tab sync: слушаем изменения из других файлов
            if (window.SharedData) {
                SharedData.onChange(function(info) {
                    if (info.source !== 'assortment') {
                        // Перезагружаем товары из SharedData
                        var fresh = SharedData.getProducts();
                        if (fresh && fresh.length > 0 && fresh.length !== products.length) {
                            products = fresh;
                            render();
                            console.log('[Assortment] Synced from ' + info.source + ': ' + products.length + ' products');
                        }
                    }
                });
            }

            // Also listen for direct storage events (fallback)
            window.addEventListener('storage', function(e) {
                if (e.key === 'shared_products_v1' || e.key === 'db_products_v1' || e.key === 'db_timestamp_v1') {
                    if (window.SharedData) {
                        var fresh = SharedData.getProducts();
                        if (fresh && fresh.length > 0) {
                            products = fresh;
                            render();
                        }
                    }
                }
            });

            render();
        }

        // Start
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
