<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник магазинов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="shared-utils.js"></script>
    <script src="config.js"></script>
    <script src="storage.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        .btn { transition: all 0.2s; }
        .btn:hover { opacity: 0.9; }
        input:focus, select:focus { outline: none; }
    </style>
</head>
<body class="min-h-screen bg-gray-100">
    <!-- Header -->
    <div class="bg-white border-b border-gray-200">
        <div class="px-2 py-2">
            <div class="flex items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                    </svg>
                    <span>Назад</span>
                </a>
                <div class="flex items-center gap-2 px-2">
                    <div class="p-1.5 bg-orange-100 rounded-lg text-orange-600">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </div>
                    <h1 class="text-base font-semibold text-gray-900">Справочник магазинов</h1>
                </div>
                <span id="storesCount" class="ml-auto px-2 py-1 text-xs text-orange-700 bg-orange-100 rounded-md">0 записей</span>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="px-2 py-2">
        <!-- Toolbar -->
        <div class="bg-white rounded-lg border border-gray-200 p-4 mb-4">
            <div class="flex flex-wrap gap-3 items-center">
                <div class="relative flex-1 min-w-[280px]">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="Поиск по ТТ, номеру магазина или коду..." class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
                </div>
                <input type="file" id="fileInput" accept=".xlsx,.xls" class="hidden">
                <button onclick="document.getElementById('fileInput').click()" class="btn inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-orange-600 rounded-lg hover:bg-orange-700">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Загрузить
                </button>
                <button onclick="exportExcel()" class="btn inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Экспорт
                </button>
            </div>
        </div>

        <!-- Table -->
        <div id="tableContainer"></div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50" onclick="closeModal()">
        <div class="bg-white rounded-lg border border-gray-200 p-6 w-full max-w-md shadow-lg" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-semibold text-gray-900">Редактирование</h3>
                <button onclick="closeModal()" class="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div id="editFields" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Отмена</button>
                <button onclick="saveEdit()" class="flex-1 inline-flex items-center justify-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-orange-600 rounded-lg hover:bg-orange-700">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Сохранить
                </button>
            </div>
        </div>
    </div>

    <script>
        const SharedUtils = window.SharedUtils;

        // State
        let stores = [];
        let search = '';
        let editIdx = null;

        const STORAGE_KEY = SharedUtils.STORAGE_KEYS.STORES;
        const editFields = [
            ['tt', 'ТТ (полное название)', 'text'],
            ['tt2', 'ТТ 2 (краткое)', 'text'],
            ['codeSabina', 'Код Сабины', 'text'],
            ['priority', 'Приоритет', 'number'],
            ['eranis', 'Код Eranis', 'text'],
            ['fiasCode', 'Код ФИАС', 'text'],
            ['storeNumber', '№ Магазина', 'text'],
            ['codeKanzler', 'Код Канцлер', 'text'],
            ['codeAlliance', 'Код Альянс', 'text'],
            ['fridges', 'Холодильники', 'number'],
            ['doors', 'Створки', 'number'],
            ['fridgeCabinets', 'Холод. витрины', 'number'],
            ['cranes', 'Краны', 'number'],
            ['phone', 'Телефон', 'text'],
            ['ttInFactory', 'ТТ на заводе', 'text'],
            ['storeNumberFactory', '№ Маг. завод', 'text'],
            ['oldName', 'Старое название', 'text'],
            ['priceType', 'Тип цен', 'text'],
            ['latitude', 'Широта', 'number'],
            ['longitude', 'Долгота', 'number']
        ];

        // Icons
        const icons = {
            edit: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
            trash: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            db: `<svg class="w-10 h-10 text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`
        };

        // Helpers — используем SharedUtils для LZ-сжатия и dirty-флага
        const loadFromStorage = () => SharedUtils.load(STORAGE_KEY, []);
        const saveToStorage = (data) => SharedUtils.save(STORAGE_KEY, data);

        // Init
        function init() {
            stores = loadFromStorage();
            document.getElementById('searchInput').addEventListener('input', (e) => {
                search = e.target.value;
                render();
            });
            document.getElementById('fileInput').addEventListener('change', handleFile);
            render();
        }

        // Render
        function render() {
            document.getElementById('storesCount').textContent = `${stores.length} записей`;
            const filtered = getFiltered();
            const container = document.getElementById('tableContainer');

            if (stores.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg border border-gray-200 p-12 text-center">
                        <div class="flex flex-col items-center">
                            <div class="p-4 bg-orange-100 rounded-lg mb-4">${icons.db}</div>
                            <p class="text-gray-600 mb-1 font-medium">Нет данных</p>
                            <p class="text-gray-400 text-sm">Загрузите справочник магазинов из Excel файла</p>
                        </div>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-orange-50 text-gray-600">
                                <tr>
                                    <th class="text-left px-4 py-3 font-medium">ТТ</th>
                                    <th class="text-left px-4 py-3 font-medium">ТТ 2</th>
                                    <th class="text-left px-4 py-3 font-medium">Код</th>
                                    <th class="text-center px-3 py-3 font-medium">Приор.</th>
                                    <th class="text-center px-3 py-3 font-medium">№ Маг.</th>
                                    <th class="text-center px-3 py-3 font-medium">Холод.</th>
                                    <th class="text-center px-3 py-3 font-medium">Створки</th>
                                    <th class="text-center px-3 py-3 font-medium">Краны</th>
                                    <th class="text-center px-3 py-3 font-medium">Хол. витрины</th>
                                    <th class="text-center px-3 py-3 font-medium">Телефон</th>
                                    <th class="text-center px-3 py-3 font-medium">Тип цен</th>
                                    <th class="text-center px-3 py-3 font-medium">Координаты</th>
                                    <th class="text-center px-3 py-3 font-medium"></th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${filtered.map((store, idx) => `
                                    <tr class="hover:bg-orange-50">
                                        <td class="px-4 py-3 font-medium text-gray-900">${store.tt || '-'}</td>
                                        <td class="px-4 py-3 text-gray-500">${store.tt2 || '-'}</td>
                                        <td class="px-4 py-3 text-sm text-gray-600">${store.codeSabina || '-'}</td>
                                        <td class="px-4 py-3 text-center">
                                            ${store.priority ? `<span class="inline-block px-2 py-1 text-xs font-medium bg-orange-100 text-orange-700 rounded-md">${store.priority}</span>` : '-'}
                                        </td>
                                        <td class="px-4 py-3 text-center text-gray-600">${store.storeNumber || '-'}</td>
                                        <td class="px-4 py-3 text-center text-gray-600">${store.fridges || '-'}</td>
                                        <td class="px-4 py-3 text-center text-gray-600">${store.doors || '-'}</td>
                                        <td class="px-4 py-3 text-center text-gray-600">${store.cranes || '-'}</td>
                                        <td class="px-4 py-3 text-center text-gray-600">${store.fridgeCabinets || '-'}</td>
                                        <td class="px-4 py-3 text-center text-sm text-gray-500">${store.phone || '-'}</td>
                                        <td class="px-4 py-3 text-center text-gray-600">${store.priceType || '-'}</td>
                                        <td class="px-4 py-3 text-center text-xs text-gray-400">
                                            ${store.latitude && store.longitude ? `${store.latitude.toFixed(4)}, ${store.longitude.toFixed(4)}` : '-'}
                                        </td>
                                        <td class="px-4 py-3 text-center">
                                            <div class="flex items-center justify-center gap-1">
                                                <button onclick="startEdit(${idx})" class="p-1.5 rounded text-gray-400 hover:text-orange-600 hover:bg-orange-50" title="Редактировать">${icons.edit}</button>
                                                <button onclick="deleteStore(${idx})" class="p-1.5 rounded text-gray-400 hover:text-red-500 hover:bg-red-50" title="Удалить">${icons.trash}</button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        function getFiltered() {
            if (!search) return stores;
            const s = search.toLowerCase();
            return stores.filter(st =>
                st.tt?.toLowerCase().includes(s) ||
                st.tt2?.toLowerCase().includes(s) ||
                st.storeNumber?.toLowerCase().includes(s) ||
                st.codeSabina?.toLowerCase().includes(s)
            );
        }

        // File handling
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

                    // Используем общий парсер из SharedUtils для консистентности
                    const parsed = SharedUtils.parseStoresData(json);
                    stores = parsed;
                    saveToStorage(stores);
                    alert(`Загружено ${parsed.length} магазинов`);
                    render();
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
            e.target.value = '';
        }

        // Actions
        function deleteStore(idx) {
            if (confirm('Удалить этот магазин?')) {
                stores.splice(idx, 1);
                saveToStorage(stores);
                render();
            }
        }

        function startEdit(idx) {
            editIdx = idx;
            const store = stores[idx];
            document.getElementById('editFields').innerHTML = editFields.map(([key, label, type]) => `
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">${label}</label>
                    <input type="${type}" id="edit_${key}" value="${store[key] ?? ''}" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
                </div>
            `).join('');
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('editModal').classList.add('hidden');
            editIdx = null;
        }

        function saveEdit() {
            if (editIdx === null) return;
            
            const store = stores[editIdx];
            editFields.forEach(([key, , type]) => {
                const input = document.getElementById(`edit_${key}`);
                if (type === 'number') {
                    store[key] = parseFloat(input.value) || 0;
                } else {
                    store[key] = input.value;
                }
            });

            if (!store.tt) {
                alert('Название ТТ обязательно!');
                return;
            }

            saveToStorage(stores);
            closeModal();
            render();
        }

        function exportExcel() {
            const data = stores.map(s => ({
                'ТТ': s.tt,
                'ТТ 2': s.tt2,
                'Код Сабины': s.codeSabina,
                'Приоритет': s.priority,
                'Eranis': s.eranis,
                'Код ФИАС': s.fiasCode,
                '№ Магазина': s.storeNumber,
                'Код Канцлер': s.codeKanzler,
                'Код Альянс': s.codeAlliance,
                'Холодильники': s.fridges,
                'Створки': s.doors,
                'Хол. витрины': s.fridgeCabinets,
                'Краны': s.cranes,
                'Телефон': s.phone,
                'ТТ на заводе': s.ttInFactory,
                '№ Маг. завод': s.storeNumberFactory,
                'Старое название': s.oldName,
                'Тип цен': s.priceType,
                'Широта': s.latitude,
                'Долгота': s.longitude
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Магазины');
            XLSX.writeFile(wb, 'stores_export.xlsx');
        }

        // Инициализируем сразу с локальными данными
        init();

        // После загрузки из облака — перечитываем данные и перерисовываем
        window.addEventListener('cloudStorageReady', () => {
            stores = loadFromStorage();
            render();
        });
    </script>
</body>
</html>
