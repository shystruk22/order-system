                                    <th class="text-center" style="min-width:60px">Продажи</th>
                                    <th class="text-center" style="min-width:70px">Продажи вых.</th>
                                    <th class="text-center" style="min-width:60px">Остаток</th>
                                    <th class="text-center" style="min-width:60px">В пути</th>
                                    <th class="text-center" style="min-width:70px">Дн. до дост.</th>
                                    <th class="text-center bg-emerald-100" style="min-width:70px">Заказ</th>
                                    <th class="text-center" style="min-width:36px"></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${Object.entries(groupedTT).map(([tt, groups]) => `
                                    <tr class="bg-sky-50 cursor-pointer hover:bg-sky-100" onclick="collapsedTT['${esc(tt)}']=!collapsedTT['${esc(tt)}'];render()">
                                        <td colspan="11" class="text-left font-semibold text-sky-800"><span class="inline-flex items-center gap-1">${collapsedTT[tt] ? icons.chevronRight : icons.chevronDown}${icons.mapPin}${tt}<span class="font-normal text-sky-600">(${Object.values(groups).reduce((s, items) => s + items.length, 0)} поз.)</span></span></td>
                                    </tr>
                                    ${collapsedTT[tt] ? '' : Object.entries(groups).map(([gr, items]) => `
                                        <tr class="group-header cursor-pointer" onclick="collapsedG['order_${esc(tt)}_${esc(gr)}']=!collapsedG['order_${esc(tt)}_${esc(gr)}'];render()">
                                            <td colspan="11" class="text-left py-1 px-2">
                                                <div class="flex items-center gap-2">
                                                    ${collapsedG['order_' + tt + '_' + gr] ? icons.chevronRight : icons.chevronDown}
                                                    <span class="font-semibold text-indigo-800">${gr}</span>
                                                    <span class="text-[10px] bg-indigo-200 text-indigo-800 px-1 rounded">${items.length}</span>
                                                </div>
                                            </td>
                                        </tr>
                                        ${collapsedG['order_' + tt + '_' + gr] ? '' : items.map(r => {
                                            let rowClass = r.statusType === 'order' ? 'bg-emerald-50' : '';
                                            return `
                                            <tr class="${rowClass} hover:bg-gray-100">
                                                <td class="sticky left-0 bg-white text-left cell-wrap">${r.nomenclature}</td>
                                                <td class="text-center font-mono text-xs text-gray-600">${r.code}</td>
                                                <td class="text-center text-xs text-gray-600">${r.group}</td>
                                                <td class="text-center text-xs text-gray-600">${r.supplier || '—'}</td>
                                                <td class="text-center">${r.sales.toFixed(0)}</td>
                                                <td class="text-center ${r.weekendAvg > 0 ? 'text-orange-600 font-semibold' : 'text-gray-400'}">${r.weekendAvg > 0 ? r.weekendAvg.toFixed(1) : '—'}</td>
                                                <td class="text-center">${r.deliveredQty > 0 ? r.currentStock.toFixed(2) + ' <span class="text-emerald-600 font-medium">(+' + r.deliveredQty + ')</span>' : r.currentStock.toFixed(2)}</td>
                                                <td class="text-center ${r.inTransitQty > 0 ? 'text-blue-600 font-semibold' : 'text-gray-400'}">${r.inTransitQty > 0 ? r.inTransitQty : '0'}</td>
                                                <td class="text-center ${r.daysUntil >= 99 ? 'text-red-500' : r.daysUntil <= 1 ? 'text-amber-600 font-semibold' : ''}">${r.daysUntil >= 99 ? '∞' : r.daysUntil}</td>
                                                <td class="text-center font-semibold bg-emerald-100">
                                                    <input type="number" value="${r.order}" data-tt="${esc(r.tt)}" data-code="${esc(r.code)}" onchange="editOrder(this)" class="input w-16 text-center text-sm font-bold">
                                                </td>
                                                <td class="text-center">
                                                    <button onclick="event.stopPropagation();deleteOrderRow('${esc(r.tt).replace(/'/g, "\\'")}', '${esc(r.code).replace(/'/g, "\\'")}')" class="text-red-400 hover:text-red-600 p-0.5 transition-colors cursor-pointer" title="Удалить из заказа">${icons.x}</button>
                                                </td>
                                            </tr>`;
                                        }).join('')}
                                    `).join('')}
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        function editOrder(input) {
            const newOrder = parseFloat(input.value) || 0;
            const tt = input.dataset.tt;
            const code = input.dataset.code;
            const editKey = `${tt}_${code}`;
            orderEdits[editKey] = newOrder;
            const p = matrix[code];
            const newSum = newOrder * (p ? p.inPrice || 0 : 0);
            const row = input.closest('tr');
            if (row) {
                const statusTd = row.querySelector('td:last-child');
                if (statusTd) statusTd.textContent = newOrder > 0 ? `заказ ${newOrder}` : 'достаточно';
            }
        }

        function deleteOrderRow(tt, code) {
            const key = `${tt}_${code}`;
            if (orderDeleted.has(key)) {
                orderDeleted.delete(key);
            } else {
                orderDeleted.add(key);
            }
            render();
        }

        function restoreDeletedOrderRows() {
            orderDeleted.clear();
            render();
        }

        function showCalcDetail(el, r) {
            document.querySelectorAll('.calc-tooltip').forEach(e => e.remove());

            const projectedSales = (r.avgSalesPerDay * period).toFixed(1);
            const need = Math.max(0, projectedSales - r.currentStock).toFixed(1);
            const totalDays = r.daysPresent || '?';

            const tooltip = document.createElement('div');
            tooltip.className = 'calc-tooltip';
            tooltip.style.cssText = 'position:fixed;z-index:100;background:#1f2937;color:#f9fafb;border-radius:8px;padding:10px 14px;font-size:11px;line-height:1.6;box-shadow:0 8px 24px rgba(0,0,0,0.3);min-width:220px;pointer-events:auto;';
            tooltip.innerHTML = `
                <div style="font-weight:700;margin-bottom:4px;color:#93c5fd">${r.nomenclature || r.code}</div>
                <div style="display:grid;grid-template-columns:auto 1fr;gap:1px 10px">
                    <span style="color:#9ca3af">ТТ:</span><span>${r.tt}</span>
                    <span style="color:#9ca3af">Продажи:</span><span style="font-weight:600">${r.sales.toFixed(0)} шт</span>
                    <span style="color:#9ca3af">Дней с остатком:</span><span>${totalDays}</span>
                    <span style="color:#9ca3af">Ср. продажи/день:</span><span style="font-weight:600">${r.avgSalesPerDay.toFixed(3)} шт</span>
                    <span style="color:#9ca3af">Период:</span><span>${period} дней</span>
                    <span style="color:#9ca3af">Прогноз продаж:</span><span style="font-weight:600;color:#fbbf24">${projectedSales} шт</span>
                    <span style="color:#9ca3af">Текущий остаток:</span><span style="font-weight:600">${r.currentStock.toFixed(2)} шт</span>
                    <span style="color:#9ca3af">Потребность:</span><span style="font-weight:600;color:#f87171">${need} шт</span>
                    <span style="color:#9ca3af">Квант:</span><span>${r.quant}</span>
                    <span style="color:#9ca3af">Дом. полка:</span><span>${r.shelf}</span>
                </div>`;
            document.body.appendChild(tooltip);
            const rect = el.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 110;
            let top = rect.bottom + 6;
            if (left < 8) left = 8;
            if (left + 240 > window.innerWidth) left = window.innerWidth - 248;
            if (top + 200 > window.innerHeight) top = rect.top - 200;
            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
            setTimeout(() => {
                function close() { tooltip.remove(); document.removeEventListener('mousedown', close); document.removeEventListener('touchstart', close); }
                setTimeout(() => document.addEventListener('mousedown', close), 10);
                setTimeout(() => document.addEventListener('touchstart', close), 10);
            }, 10);
        }

        // === ФАЙЛОВЫЕ ПАРСЕРЫ ===
        function handleFile(input, type) {
            resetSavedOrders();
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                    if (type === 'sales') {
                        const result = SharedUtils.parseSales(json);
                        sales = result.items;
                        save(KEYS.SALES, sales);
                        // Дополнительно: парсим продажи с датами для расчёта выходных (Пн/Сб/Вс)
                        parseWeekendSales(json);
                        alert(`Загружено ${sales.length} продаж, найдено ${result.foundTTs.length} ТТ`);
                    }
                    else if (type === 'stocks') {
                        const localItems = parseStocksLocal(json);
                        console.log(`Парсинг остатков: локальный=${localItems.length}`);
                        stocks = localItems;
                        save(KEYS.STOCKS, stocks);
                        alert(`Загружено ${stocks.length} остатков`);
                    }
                    render();
                } catch (err) { console.error('Parse error:', err); alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        function parseStocksLocal(json) {
            let lastCol = 0;
            for (let i = 0; i < json.length; i++) if (json[i]) lastCol = Math.max(lastCol, json[i].length - 1);

            const items = [];
            const foundTTs = new Set();
            let curTT = '';

            for (let i = 3; i < json.length; i++) {
                const r = json[i];
                if (!r || r.length < 3) continue;

                const c0 = String(r[0] || '').trim();
                const code = String(r[1] || '').trim();

                const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(code);
                const isProductCode = /^\d/.test(code) || code.length >= 5;

                if (isTT) {
                    curTT = c0;
                    foundTTs.add(curTT);
                } else if (isProductCode && curTT && c0) {
                    const normC = normCode(code);
                    const currentStock = parseFloat(String(r[lastCol])) || 0;

                    let daysPresent = 0, totalDays = 0;
                    for (let col = 2; col <= lastCol; col++) {
                        const val = r[col];
                        if (val !== undefined && val !== null && val !== '') {
                            totalDays++;
                            if ((parseFloat(String(val)) || 0) > 0) daysPresent++;
                        }
                    }

                    items.push({ tt: curTT, code: normC, name: c0, currentStock, daysPresent, totalDays });
                }
            }
            return items;
        }

        function parseWeekendSales(json) {
            weekendSales = {};
            weekdaySales = {};
            weekendDays = {};
            weekdayDays = {};
            
            // Формат 1: Кол 0 = ТТ/код, Кол 1 = Кол-во, возможна дата в других колонках
            // Ищем колонку с датой
            const headers = json[0] || [];
            const subHeaders = json[1] || [];
            
            // Ищем колонку с датой по заголовкам
            let dateColIdx = -1;
            for (let i = 0; i < Math.max(headers.length, subHeaders.length); i++) {
                const h = String(headers[i] || subHeaders[i] || '').toLowerCase();
                if (/дата|период|date|день/.test(h)) {
                    dateColIdx = i;
                    break;
                }
            }
            
            // Если нашли колонку с датами — парсим с разбивкой по дням недели
            if (dateColIdx >= 0) {
                let curTT = '';
                for (let i = 2; i < json.length; i++) {
                    const r = json[i];
                    if (!r || r.length === 0) continue;
                    
                    const c0 = String(r[0] || '').trim();
                    const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(c0);
                    const isProductCode = /^\d/.test(c0);
                    
                    if (isTT) {
                        curTT = c0;
                    } else if (isProductCode && curTT) {
                        const qty = parseFloat(String(r[1])) || 0;
                        if (qty <= 0) continue;
                        
                        const code = normCode(c0);
                        const key = `${curTT}_${code}`;
                        const dateStr = String(r[dateColIdx] || '');
                        
                        // Пытаемся определить день недели из даты
                        let dayOfWeek = -1;
                        if (dateStr) {
                            // Пытаемся распарсить дату (Excel numeric or string format)
                            let date;
                            if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) {
                                date = new Date(dateStr);
                            } else if (/^\d{2}\.\d{2}\.\d{4}/.test(dateStr)) {
                                const parts = dateStr.split('.');
                                date = new Date(parts[2], parts[1]-1, parts[0]);
                            } else {
                                const numDate = parseFloat(dateStr);
                                if (numDate > 40000 && numDate < 60000) {
                                    // Excel serial date
                                    date = new Date((numDate - 25569) * 86400 * 1000);
                                }
                            }
                            if (date && !isNaN(date.getTime())) {
                                dayOfWeek = date.getDay(); // 0=Вс, 1=Пн, 6=Сб
                            }
                        }
                        
                        // ПН(1), СБ(6), ВС(0) = выходные для рыбы
                        const isWeekend = (dayOfWeek === 1 || dayOfWeek === 6 || dayOfWeek === 0);
                        
                        if (isWeekend) {
                            weekendSales[key] = (weekendSales[key] || 0) + qty;
                            weekendDays[key] = (weekendDays[key] || 0) + 1;
                        } else if (dayOfWeek >= 0) {
                            weekdaySales[key] = (weekdaySales[key] || 0) + qty;
                            weekdayDays[key] = (weekdayDays[key] || 0) + 1;
                        }
                    }
                }
                console.log(`[FishOrder] Выходные продажи: ${Object.keys(weekendSales).length} товаров`);
            } else {
                // Если колонка дат не найдена — разбираем продажи если файл построчный (одна продажа = одна строка с датой)
                // Ищем дату в колонках 2+ 
                let curTT = '';
                let foundDates = 0;
                
                for (let i = 2; i < json.length; i++) {
                    const r = json[i];
                    if (!r || r.length === 0) continue;
                    
                    const c0 = String(r[0] || '').trim();
                    const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(c0);
                    const isProductCode = /^\d/.test(c0);
                    
                    if (isTT) {
                        curTT = c0;
                    } else if (isProductCode && curTT) {
                        const qty = parseFloat(String(r[1])) || 0;
                        if (qty <= 0) continue;
                        
                        const code = normCode(c0);
                        const key = `${curTT}_${code}`;
                        
                        // Ищем дату в любой колонке после кол-ва
                        let dayOfWeek = -1;
                        for (let c = 2; c < r.length; c++) {
                            const cellVal = String(r[c] || '').trim();
                            if (!cellVal) continue;
                            
                            // Проверяем форматы даты
                            let date = null;
                            if (/^\d{4}-\d{2}-\d{2}/.test(cellVal)) {
                                date = new Date(cellVal);
                            } else if (/^\d{2}\.\d{2}\.\d{2,4}/.test(cellVal)) {
                                const parts = cellVal.split('.');
                                const year = parts[2].length === 2 ? '20' + parts[2] : parts[2];
                                date = new Date(year, parts[1]-1, parts[0]);
                            } else {
                                const numDate = parseFloat(cellVal);
                                if (numDate > 40000 && numDate < 60000) {
                                    date = new Date((numDate - 25569) * 86400 * 1000);
                                }
                            }
                            
                            if (date && !isNaN(date.getTime())) {
                                dayOfWeek = date.getDay();
                                foundDates++;
                                break;
                            }
                        }
                        
                        if (dayOfWeek >= 0) {
                            const isWeekend = (dayOfWeek === 1 || dayOfWeek === 6 || dayOfWeek === 0);
                            if (isWeekend) {
                                weekendSales[key] = (weekendSales[key] || 0) + qty;
                                weekendDays[key] = (weekendDays[key] || 0) + 1;
                            } else {
                                weekdaySales[key] = (weekdaySales[key] || 0) + qty;
                                weekdayDays[key] = (weekdayDays[key] || 0) + 1;
                            }
                        }
                    }
                }
                
                if (foundDates > 0) {
                    console.log(`[FishOrder] Найдено ${foundDates} дат, выходные продажи: ${Object.keys(weekendSales).length} товаров`);
                } else {
                    console.log('[FishOrder] Даты не найдены в файле продаж. Выходные продажи не рассчитаны.');
                }
            }
        }

        function getWeekendAvg(tt, code) {
            const key = `${tt}_${code}`;
            const days = weekendDays[key] || 0;
            return days > 0 ? weekendSales[key] / days : 0;
        }

        function getWeekdayAvg(tt, code) {
            const key = `${tt}_${code}`;
            const days = weekdayDays[key] || 0;
            return days > 0 ? weekdaySales[key] / days : 0;
        }

        function exportOrder() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для экспорта. Сначала откройте вкладку Заказ.');
                return;
            }

            // Фильтруем по текущим фильтрам
            let filtered = savedOrderResults;
            if (filterSupplier) filtered = filtered.filter(r => r.supplier === filterSupplier);
            if (filterTT) filtered = filtered.filter(r => r.tt === filterTT);
            if (filterGroup) filtered = filtered.filter(r => r.group === filterGroup);
            if (filterStatus === 'orders') filtered = filtered.filter(r => r.order > 0);

            if (filtered.length === 0) { alert('Нет данных по выбранным фильтрам'); return; }

            // Группировка: ТТ → Поставщик → товары
            const grouped = {};
            filtered.forEach(r => {
                const tt = r.tt || 'Не указана';
                const supplier = r.supplier || 'Не указан';
                if (!grouped[tt]) grouped[tt] = {};
                if (!grouped[tt][supplier]) grouped[tt][supplier] = [];
                grouped[tt][supplier].push(r);
            });

            const wb = XLSX.utils.book_new();

            // === Лист 1: Полный заказ по ТТ ===
            const allHeaders = ['ТТ', 'Поставщик', 'Группа', 'Наименование', 'Код', 'Остаток', 'В пути', 'Продажи', 'Дн. до дост.', 'Заказ', 'Квант', 'Цена вх.', 'Сумма', 'Статус'];
            const allRows = [];

            const sortedTTs = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'ru'));
            sortedTTs.forEach(tt => {
                const sortedSuppliers = Object.keys(grouped[tt]).sort((a, b) => a.localeCompare(b, 'ru'));
                sortedSuppliers.forEach(supplier => {
                    const items = grouped[tt][supplier];
                    items.forEach(r => {
                        const editKey = `${r.tt}_${r.code}`;
                        const orderQty = orderEdits[editKey] !== undefined ? orderEdits[editKey] : r.order;
                        allRows.push([
                            tt, supplier, r.group || '', r.nomenclature || '', r.code,
                            r.currentStock || 0, r.inTransitQty || 0,
                            (r.sales || 0).toFixed(1),
                            r.daysUntil >= 99 ? '—' : r.daysUntil,
                            orderQty, r.quant || 1, r.inPrice || 0,
                            (orderQty * (r.inPrice || 0)).toFixed(2),
                            orderQty > 0 ? 'заказ' : 'достаточно'
                        ]);
                    });
                });
            });

            // Итоговая строка
            const totalSum = filtered.reduce((s, r) => {
                const editKey = `${r.tt}_${r.code}`;
                const qty = orderEdits[editKey] !== undefined ? orderEdits[editKey] : r.order;
                return s + qty * (r.inPrice || 0);
            }, 0);
            const totalOrder = filtered.reduce((s, r) => {
                const editKey = `${r.tt}_${r.code}`;
                return s + (orderEdits[editKey] !== undefined ? orderEdits[editKey] : r.order);
            }, 0);
            allRows.push([]);
            allRows.push(['', '', '', '', 'ИТОГО', '', '', '', '', totalOrder, '', '', totalSum.toFixed(2), '']);

            const ws = createFishOrderSheet(allRows, allHeaders);
            XLSX.utils.book_append_sheet(wb, ws, 'Заказ по ТТ');

            // === Лист 2: Заказы по поставщикам ===
            if (Object.keys(grouped).length > 0) {
                const supHeaders = ['Поставщик', 'ТТ', 'Наименование', 'Код', 'Группа', 'Заказ', 'Квант', 'Цена вх.', 'Сумма'];
                const supRows = [];

                sortedTTs.forEach(tt => {
                    const sortedSuppliers = Object.keys(grouped[tt]).sort((a, b) => a.localeCompare(b, 'ru'));
                    sortedSuppliers.forEach(supplier => {
                        const items = grouped[tt][supplier].filter(r => {
                            const editKey = `${r.tt}_${r.code}`;
                            return (orderEdits[editKey] !== undefined ? orderEdits[editKey] : r.order) > 0;
                        });
                        if (items.length === 0) return;
                        items.forEach(r => {
                            const editKey = `${r.tt}_${r.code}`;
                            const orderQty = orderEdits[editKey] !== undefined ? orderEdits[editKey] : r.order;
                            supRows.push([
                                supplier, tt, r.nomenclature || '', r.code, r.group || '',
                                orderQty, r.quant || 1, r.inPrice || 0,
                                (orderQty * (r.inPrice || 0)).toFixed(2)
                            ]);
                        });
                        // Итого по поставщик-ТТ
                        const supSum = items.reduce((s, r) => {
                            const editKey = `${r.tt}_${r.code}`;
                            const qty = orderEdits[editKey] !== undefined ? orderEdits[editKey] : r.order;
                            return s + qty * (r.inPrice || 0);
                        }, 0);
                        supRows.push([]);
                        supRows.push(['', '', '', '', 'Итого по ' + supplier + ' / ' + tt, '', '', '', supSum.toFixed(2)]);
                        supRows.push([]);
                    });
                });

                const ws2 = createFishOrderSheet(supRows, supHeaders);
                XLSX.utils.book_append_sheet(wb, ws2, 'По поставщикам');
            }

            const d = new Date();
            XLSX.writeFile(wb, `заказ_рыбы_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        function createFishOrderSheet(data, headers) {
            const leftAlignCols = [0, 1, 2, 3]; // ТТ, Поставщик, Группа, Наименование
            const allData = [headers, ...data];
            const ws = XLSX.utils.aoa_to_sheet(allData);
            const range = XLSX.utils.decode_range(ws['!ref']);
            const numRows = range.e.r + 1;
            const numCols = range.e.c + 1;

            // Ширина колонок с учётом кириллицы
            const colWidths = new Array(numCols).fill(0);
            for (let c = 0; c < numCols; c++) {
                for (let r = 0; r < numRows; r++) {
                    const cellAddress = XLSX.utils.encode_cell({ r: r, c: c });
                    const cell = ws[cellAddress];
                    if (cell && cell.v !== undefined) {
                        const cellText = String(cell.v);
                        const cyrillicCount = (cellText.match(/[а-яА-ЯёЁ]/g) || []).length;
                        const otherCount = cellText.length - cyrillicCount;
                        colWidths[c] = Math.max(colWidths[c], Math.ceil(cyrillicCount * 1.5 + otherCount * 1.0) + 2);
                    }
                }
                colWidths[c] = Math.max(colWidths[c], 8);
                colWidths[c] = Math.min(colWidths[c], 60);
            }
            ws['!cols'] = colWidths.map(w => ({ wch: w }));
            ws['!rows'] = [];
            for (let r = 0; r < numRows; r++) ws['!rows'][r] = { hpt: 16 };

            // Стили
            const BORDER_THIN = {
                top: { style: "thin", color: { rgb: "B0B0B0" } },
                bottom: { style: "thin", color: { rgb: "B0B0B0" } },
                left: { style: "thin", color: { rgb: "B0B0B0" } },
                right: { style: "thin", color: { rgb: "B0B0B0" } }
            };

            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    const cellAddress = XLSX.utils.encode_cell({ r: r, c: c });
                    const cell = ws[cellAddress];
                    if (!cell) continue;

                    if (r === 0) {
                        // Шапка — светло-голубой
                        cell.s = {
                            fill: { fgColor: { rgb: "B8CCE4" } },
                            font: { bold: true, sz: 10, color: { rgb: "000000" } },
                            alignment: { horizontal: "center", vertical: "center", wrapText: false },
                            border: BORDER_THIN
                        };
                    } else {
                        const isLeft = leftAlignCols.includes(c);
                        const cellVal = String(cell.v || '');
                        const isOrder = cellVal === 'заказ';
                        const isOK = cellVal === 'достаточно';
                        const isTotal = cellVal.startsWith('ИТОГО') || cellVal.startsWith('Итого');
                        const isEmpty = cellVal === '';
                        const prevRow = r > 1 ? XLSX.utils.encode_cell({ r: r - 1, c: 0 }) : null;
                        const prevIsEmpty = prevRow && ws[prevRow] && String(ws[prevRow].v || '') === '';

                        // Фон: зебра, но с перерывом на пустые строки
                        let bg = null;
                        if (isTotal) {
                            bg = { fgColor: { rgb: "D9E2F3" } };
                        } else if (!isEmpty && !prevIsEmpty && r % 2 === 0) {
                            bg = { fgColor: { rgb: "F2F2F2" } };
                        }

                        let fontColor = { rgb: "000000" };
                        let fontBold = false;
                        if (isOrder) fontColor = { rgb: "006100" };
                        if (isOK) fontColor = { rgb: "9C0006" };
                        if (isTotal) fontBold = true;

                        cell.s = {
                            fill: bg,
                            font: { sz: 10, color: fontColor, bold: fontBold },
                            alignment: {
                                horizontal: isLeft || isTotal ? "left" : "center",
                                vertical: "center",
                                wrapText: false
                            },
                            border: isEmpty ? undefined : BORDER_THIN
                        };
                    }
                }
            }

            return ws;
        }

        // === ПОПАП СУММ ЗАКАЗА ПО МАГАЗИНАМ ===
        function showOrderSumsByStore(el) {
            document.querySelectorAll('.store-sums-popup').forEach(e => e.remove());

            if (!savedOrderResults || savedOrderResults.length === 0) return;

            const storeSums = {};
            const storeCounts = {};
            savedOrderResults.forEach(r => {
                if (r.order > 0) {
                    storeSums[r.tt] = (storeSums[r.tt] || 0) + r.sum;
                    storeCounts[r.tt] = (storeCounts[r.tt] || 0) + 1;
                }
            });

            const sortedStores = Object.entries(storeSums).sort((a, b) => b[1] - a[1]);
            const totalSum = Object.values(storeSums).reduce((s, v) => s + v, 0);

            const popup = document.createElement('div');
            popup.className = 'store-sums-popup';
            popup.style.cssText = 'position:fixed;z-index:200;background:white;border:1px solid #e5e7eb;border-radius:12px;padding:0;box-shadow:0 12px 40px rgba(0,0,0,0.2);min-width:320px;max-width:420px;max-height:70vh;overflow:hidden;pointer-events:auto;font-family:system-ui,sans-serif;';

            let totalPositions = 0;
            sortedStores.forEach(([, count]) => totalPositions += count);

            popup.innerHTML = `
                <div style="background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;padding:12px 16px;border-radius:12px 12px 0 0;">
                    <div style="font-size:14px;font-weight:700;">Суммы заказов по магазинам</div>
                    <div style="font-size:11px;opacity:0.8;margin-top:2px;">${sortedStores.length} магазинов • ${totalPositions} поз. на ${totalSum.toFixed(0)} ₽</div>
                </div>
                <div style="max-height:50vh;overflow-y:auto;padding:4px 0;">
                    ${sortedStores.map(([tt, sum], i) => `
                        <div style="display:flex;align-items:center;padding:8px 16px;gap:10px;${i % 2 === 0 ? 'background:#f9fafb;' : ''}border-bottom:1px solid #f3f4f6;">
                            <div style="width:24px;height:24px;border-radius:6px;background:#ede9fe;color:#6d28d9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">${i + 1}</div>
                            <div style="flex:1;min-width:0;">
                                <div style="font-size:12px;font-weight:600;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${tt}</div>
                                <div style="font-size:10px;color:#6b7280;">${storeCounts[tt]} поз.</div>
                            </div>
                            <div style="font-size:13px;font-weight:700;color:#6d28d9;white-space:nowrap;">${sum.toFixed(0)} ₽</div>
                        </div>
                    `).join('')}
                </div>
                <div style="background:#f3f4f6;padding:10px 16px;border-radius:0 0 12px 12px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:11px;color:#6b7280;">Итого:</span>
                    <span style="font-size:15px;font-weight:800;color:#4c1d95;">${totalSum.toFixed(0)} ₽</span>
                </div>
                <div style="padding:4px 16px 8px;text-align:center;">
                    <span style="font-size:9px;color:#9ca3af;">Кликните вне чтобы закрыть</span>
                </div>
            `;
            document.body.appendChild(popup);

            const rect = el.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 160;
            let top = rect.bottom + 8;
            if (left < 8) left = 8;
            if (left + 420 > window.innerWidth) left = window.innerWidth - 428;
            if (top + 400 > window.innerHeight) top = rect.top - 400;
            if (top < 8) top = 8;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';

            setTimeout(() => {
                function close(e) {
                    if (!popup.contains(e.target) && e.target !== el) {
                        popup.remove();
                        document.removeEventListener('mousedown', close);
                        document.removeEventListener('touchstart', close);
                    }
                }
                document.addEventListener('mousedown', close);
                document.addEventListener('touchstart', close);
            }, 50);
        }

        function clearAll() {
            [KEYS.ASSORTMENT, KEYS.MATRIX_MARKS, KEYS.SALES, KEYS.STOCKS, KEYS.SCHEDULE, KEYS.INTRANSIT].forEach(k => localStorage.removeItem(k));
            matrix = {}; matrixMarks = {}; sales = []; stocks = [];
            deliverySchedule = {}; inTransitOrders = [];
            currentLoadedAssortment = null;
            resetSavedOrders();
            render();
            alert('Данные очищены');
        }

        // Инициализация с ожиданием облачного хранилища
        if (window.CloudStorage && !window.CloudStorage.isReady()) {
            window.addEventListener('cloudStorageReady', () => { try { init(); } catch(e) { console.error('Init error:', e); document.getElementById('content').innerHTML = '<div class="p-4 text-red-600">Ошибка инициализации: ' + e.message + '</div>'; } });
        } else {
            try { init(); } catch(e) { console.error('Init error:', e); document.getElementById('content').innerHTML = '<div class="p-4 text-red-600">Ошибка инициализации: ' + e.message + '</div>'; }
        }

        // После загрузки из облака — перечитываем ВСЕ данные и перерисовываем
        window.addEventListener('cloudStorageReady', () => {
            loadStoresFromHTML();
            // Перечитываем ассортимент и матрицу
            const freshAssort = load(KEYS.ASSORTMENT, null);
            const freshMarks = load(KEYS.MATRIX_MARKS, null);
            if (freshAssort !== null) matrix = freshAssort;
            if (freshMarks !== null) matrixMarks = freshMarks;
            sales = load(KEYS.SALES, []);
            stocks = load(KEYS.STOCKS, []);
            deliverySchedule = load(KEYS.SCHEDULE, {});
            supplierAssortment = load(KEYS.SUPPLIER_ASSORTMENT, {});
            inTransitOrders = load(KEYS.INTRANSIT, []);
            groupMarkups = load(KEYS.GROUP_MARKUPS, {});
            newGroupMarkups = load(KEYS.NEW_GROUP_MARKUPS, {});
            render();
        });
    </script>
