        // === ЦЕНЫ (отдельная вкладка) ===
        function renderPricesTab() {
            if (Object.keys(matrix).length === 0) {
                return `<div class="text-center py-12">${icons.db}<p class="text-gray-500 mt-3">Загрузите ассортимент</p></div>`;
            }
            return renderSchedulePrices(Object.keys(deliverySchedule));
        }

        function renderSchedulePrices(supplierNames) {
            const totalItems = Object.keys(matrix).length;
            let html = '<div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden flex flex-col flex-1 min-h-0">';
            html += '<div class="flex items-center justify-between px-3 py-1.5 bg-gray-50 border-b border-gray-200 shrink-0">';
            html += '<div class="flex items-center gap-2">';
            html += '<span class="text-[11px] font-semibold text-gray-700">Цены</span>';
            html += '<span class="text-[10px] text-gray-400">' + totalItems + ' товаров</span>';
            html += '</div></div>';
            html += '<div class="flex-1 overflow-auto"><table class="table-modern"><thead><tr>';
            html += '<th class="text-left" style="min-width:60px">Группа</th><th class="text-left" style="min-width:140px">Наименование</th><th style="min-width:50px">Код</th><th style="min-width:55px">Вх. цена</th><th style="min-width:60px" class="bg-green-100">Цена полки</th><th style="min-width:55px">Доход ₽</th><th style="min-width:50px">Маржа %</th><th style="min-width:55px" class="bg-orange-100">Наценка %</th><th style="min-width:60px" class="bg-blue-100">Новая нац. %</th><th style="min-width:60px" class="bg-cyan-100">Новая цена</th><th style="min-width:60px" class="bg-cyan-100">Нов. доход ₽</th>';
            html += '</tr></thead><tbody>';

            const grouped = {};
            Object.entries(matrix).forEach(([code, p]) => {
                const gr = p.group || 'Без группы';
                if (!grouped[gr]) grouped[gr] = [];
                grouped[gr].push({ code, ...p });
            });
            Object.keys(grouped).forEach(gr => { grouped[gr].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru')); });

            const colCount = 11;
            Object.entries(grouped).sort(([a], [b]) => a.localeCompare(b, 'ru')).forEach(([gr, items]) => {
                html += '<tr class="group-header"><td colspan="' + colCount + '"><div class="flex items-center gap-2">';
                html += '<span>' + esc(gr) + '</span><span class="text-[10px] opacity-70">(' + items.length + ')</span>';
                html += '<span class="ml-2 text-[10px] text-gray-400">Новая наценка:</span>';
                html += '<input type="number" value="' + (newGroupMarkups[gr] ?? '') + '" onclick="event.stopPropagation()" oninput="updateNewGroupMarkupFish(\'' + esc(gr).replace(/'/g, "\\'") + '\', this.value)" placeholder="25" class="input w-14 text-center text-xs font-bold py-0.5 bg-blue-50 border-blue-200" step="0.1">';
                html += '<span class="text-[10px] text-gray-400">%</span>';
                html += '</div></td></tr>';
                items.forEach(p => {
                    const inPrice = p.inPrice || 0;
                    const markup = p.markup ?? groupMarkups[p.group || ''] ?? defaultMarkup;
                    const shelfPrice = p.shelfPrice > 0 ? p.shelfPrice : Math.round(inPrice * (1 + markup / 100));
                    const income = shelfPrice - inPrice;
                    const marginPct = shelfPrice > 0 ? ((income / shelfPrice) * 100).toFixed(1) : '0.0';
                    const markupPct = inPrice > 0 ? ((income / inPrice) * 100).toFixed(1) : '0.0';
                    const newMarkup = newGroupMarkups[gr] ?? null;
                    const newPrice = newMarkup !== null && inPrice > 0 ? Math.round(inPrice * (1 + newMarkup / 100)) : null;
                    const newIncome = newPrice !== null ? newPrice - inPrice : null;
                    html += '<tr class="hover:bg-gray-50">';
                    html += '<td class="text-[10px] text-gray-600">' + esc(p.group || '') + '</td>';
                    html += '<td class="text-xs font-medium text-gray-700 text-left">' + esc(p.nomenclature || '') + '</td>';
                    html += '<td class="font-mono text-[10px] text-center">' + esc(p.code) + '</td>';
                    html += '<td class="text-right"><input type="number" step="0.01" value="' + inPrice + '" onchange="updateProduct(\'' + esc(p.code).replace(/'/g, "\\'") + '\', \'inPrice\', parseFloat(this.value)||0)" class="input w-14 text-right text-xs"></td>';
                    html += '<td class="text-right font-semibold bg-green-50">' + shelfPrice.toLocaleString('ru-RU') + ' ₽</td>';
                    html += '<td class="text-right font-medium ' + (income > 0 ? 'text-emerald-600' : 'text-gray-500') + '">' + income.toLocaleString('ru-RU') + ' ₽</td>';
                    html += '<td class="text-right ' + (parseFloat(marginPct) > 0 ? 'text-emerald-600' : 'text-gray-500') + '">' + marginPct + '%</td>';
                    html += '<td class="text-right bg-orange-50 font-medium">' + markupPct + '%</td>';
                    html += '<td class="text-right bg-blue-50 font-medium ' + (newMarkup !== null ? 'text-blue-700' : 'text-gray-400') + '">' + (newMarkup !== null ? newMarkup + '%' : '—') + '</td>';
                    html += '<td class="text-right bg-cyan-50 font-semibold ' + (newPrice !== null ? 'text-cyan-700' : 'text-gray-400') + '">' + (newPrice !== null ? newPrice.toLocaleString('ru-RU') + ' ₽' : '—') + '</td>';
                    html += '<td class="text-right bg-cyan-50 font-medium ' + (newIncome !== null && newIncome > 0 ? 'text-emerald-600' : 'text-gray-400') + '">' + (newIncome !== null ? newIncome.toLocaleString('ru-RU') + ' ₽' : '—') + '</td>';
                    html += '</tr>';
                });
            });

            html += '</tbody></table></div></div>';
            return html;
        }

        function updateNewGroupMarkupFish(group, value) {
            if (value === '' || value === null) delete newGroupMarkups[group];
            else newGroupMarkups[group] = parseFloat(value) || 0;
            save(KEYS.NEW_GROUP_MARKUPS, newGroupMarkups);
            // Быстрое обновление без полного рендера
            const tbody = document.querySelector('.table-container tbody');
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');
            let inGroup = false;
            rows.forEach(row => {
                if (row.classList.contains('group-header')) {
                    inGroup = false;
                    const text = row.textContent || '';
                    if (text.includes(group)) inGroup = true;
                    return;
                }
                if (!inGroup) return;
                const cells = row.querySelectorAll('td');
                if (cells.length < 11) return;
                const inPrice = parseFloat(cells[3].querySelector('input')?.value) || 0;
                const nm = newGroupMarkups[group] ?? null;
                const newPrice = nm !== null && inPrice > 0 ? Math.round(inPrice * (1 + nm / 100)) : null;
                const newIncome = newPrice !== null ? newPrice - inPrice : null;
                cells[8].innerHTML = nm !== null ? nm + '%' : '—';
                cells[8].className = 'text-right bg-blue-50 font-medium ' + (nm !== null ? 'text-blue-700' : 'text-gray-400');
                cells[9].innerHTML = newPrice !== null ? newPrice.toLocaleString('ru-RU') + ' ₽' : '—';
                cells[9].className = 'text-right bg-cyan-50 font-semibold ' + (newPrice !== null ? 'text-cyan-700' : 'text-gray-400');
                cells[10].innerHTML = newIncome !== null ? newIncome.toLocaleString('ru-RU') + ' ₽' : '—';
                cells[10].className = 'text-right bg-cyan-50 font-medium ' + (newIncome !== null && newIncome > 0 ? 'text-emerald-600' : 'text-gray-400');
            });
        }

        // === В ПУТИ (Intransit Tab) ===
        function renderIntransit() {
            const allOrders = inTransitOrders || [];
            const inTransit = allOrders.filter(o => o.status === 'in_transit');
            const delivered = allOrders.filter(o => o.status === 'delivered');
            const totalInTransitItems = inTransit.reduce((s, o) => s + (o.items || []).reduce((s2, i) => s2 + (i.qty || 0), 0), 0);
            const totalInTransitSum = inTransit.reduce((s, o) => s + (o.items || []).reduce((s2, i) => s2 + (i.sum || 0), 0), 0);

            // Find next delivery date
            let nextDeliveryStr = '—';
            let minDays = Infinity;
            inTransit.forEach(o => {
                if (o.expectedDate) {
                    const exp = new Date(o.expectedDate);
                    exp.setHours(0,0,0,0);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const diff = Math.ceil((exp - today) / 86400000);
                    if (diff >= 0 && diff < minDays) {
                        minDays = diff;
                        nextDeliveryStr = o.expectedDate + (diff === 0 ? ' (сегодня)' : diff === 1 ? ' (завтра)' : ` (через ${diff} дн.)`);
                    }
                }
            });

            const ordersHTML = inTransit.length === 0 && delivered.length === 0
                ? `<div class="text-center py-12">
                    <div class="p-3 bg-gray-100 rounded-lg text-gray-400 inline-flex mb-3">${icons.truck}</div>
                    <p class="text-gray-500 text-sm">Нет заказов в пути</p>
                    <p class="text-gray-400 text-xs mt-1">Сформируйте заказы во вкладке "Заказ"</p>
                </div>`
                : inTransit.map(o => {
                    const itemsTotal = (o.items || []).reduce((s, i) => s + (i.qty || 0), 0);
                    const itemsSum = (o.items || []).reduce((s, i) => s + (i.sum || 0), 0);
                    let daysRemaining = '';
                    if (o.expectedDate) {
                        const exp = new Date(o.expectedDate);
                        exp.setHours(0,0,0,0);
                        const today = new Date();
                        today.setHours(0,0,0,0);
                        const diff = Math.ceil((exp - today) / 86400000);
                        if (diff < 0) daysRemaining = `<span class="text-red-600 font-medium">Просрочено на ${Math.abs(diff)} дн.</span>`;
                        else if (diff === 0) daysRemaining = `<span class="text-amber-600 font-medium">Сегодня</span>`;
                        else daysRemaining = `<span class="text-sky-600">через ${diff} дн.</span>`;
                    }
                    return `
                    <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                        <div class="flex items-center justify-between px-4 py-3 bg-blue-50 border-b border-blue-100">
                            <div class="flex items-center gap-3">
                                <span class="bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">В пути</span>
                                <div>
                                    <div class="text-sm font-semibold text-gray-800">${esc(o.supplier || '')} → ${esc(o.store || '')}</div>
                                    <div class="text-[10px] text-gray-500">Создан: ${o.createdAt || '—'}${o.expectedDate ? ' • Доставка: ' + o.expectedDate : ''} ${daysRemaining}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500">${itemsTotal} шт • ${itemsSum.toFixed(0)} ₽</span>
                                <button onclick="markDelivered(${o.id})" class="btn px-2.5 py-1 text-xs font-medium text-emerald-700 bg-emerald-50 rounded-md hover:bg-emerald-100 transition-colors cursor-pointer">${icons.check} Доставлено</button>
                                <button onclick="deleteInTransitOrder(${o.id})" class="btn px-2.5 py-1 text-xs text-red-600 bg-red-50 rounded-md hover:bg-red-100 transition-colors cursor-pointer">${icons.trash} Удалить</button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full border-collapse text-xs">
                                <thead><tr class="bg-gray-50">
                                    <th class="text-left px-3 py-1.5 text-gray-500 font-medium border-b">Код</th>
                                    <th class="text-left px-3 py-1.5 text-gray-500 font-medium border-b">Наименование</th>
                                    <th class="text-center px-3 py-1.5 text-gray-500 font-medium border-b">Кол-во</th>
                                    <th class="text-center px-3 py-1.5 text-gray-500 font-medium border-b">Сумма</th>
                                </tr></thead>
                                <tbody>
                                    ${(o.items || []).map(item => `<tr class="hover:bg-gray-50">
                                        <td class="text-left px-3 py-1 font-mono text-gray-600">${item.code || ''}</td>
                                        <td class="text-left px-3 py-1 text-gray-700">${esc(item.name || '')}</td>
                                        <td class="text-center px-3 py-1 font-medium">${item.qty || 0}</td>
                                        <td class="text-center px-3 py-1 text-gray-600">${(item.sum || 0).toFixed(2)} ₽</td>
                                    </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                }).join('') + (delivered.length > 0 ? `
                <div class="mt-3">
                    <div class="text-xs font-medium text-gray-500 mb-2 px-1">Доставленные (${delivered.length})</div>
                    ${delivered.map(o => {
                        const itemsTotal = (o.items || []).reduce((s, i) => s + (i.qty || 0), 0);
                        const itemsSum = (o.items || []).reduce((s, i) => s + (i.sum || 0), 0);
                        const arrivedCount = (o.items || []).filter(i => i.arrived !== false).length;
                        const notArrivedCount = (o.items || []).filter(i => i.arrived === false).length;
                        const collapsed = collapsedInTransit[o.id];
                        return `
                        <div class="bg-white rounded-lg border border-gray-200 mb-2 opacity-60 hover:opacity-80 transition-opacity">
                            <div class="flex items-center justify-between px-4 py-2 bg-green-50 border-b border-green-100 cursor-pointer" onclick="collapsedInTransit[${o.id}]=!collapsedInTransit[${o.id}];render()">
                                <div class="flex items-center gap-2">
                                    <span class="bg-green-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">✓ Доставлено</span>
                                    <div class="text-xs text-gray-600">${esc(o.supplier || '')} → ${esc(o.store || '')} • ${itemsTotal} шт • ${itemsSum.toFixed(0)} ₽</div>
                                    ${notArrivedCount > 0 ? `<span class="bg-red-100 text-red-700 text-[10px] px-1.5 py-0.5 rounded-full font-medium">! ${notArrivedCount} не приехало</span>` : ''}
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] text-gray-400">${o.expectedDate || ''}</span>
                                    <span class="text-gray-400 text-xs">${collapsed ? '▶' : '▼'}</span>
                                    <button onclick="event.stopPropagation();deleteInTransitOrder(${o.id})" class="btn px-2 py-0.5 text-xs text-red-500 hover:text-red-700 cursor-pointer" title="Удалить">${icons.trash}</button>
                                </div>
                            </div>
                            ${collapsed ? '' : `
                            <div class="overflow-x-auto">
                                <table class="w-full border-collapse text-xs">
                                    <thead><tr class="bg-gray-50">
                                        <th class="text-left px-3 py-1 text-gray-500 font-medium border-b">Код</th>
                                        <th class="text-left px-3 py-1 text-gray-500 font-medium border-b">Наименование</th>
                                        <th class="text-center px-3 py-1 text-gray-500 font-medium border-b">Заказано</th>
                                        <th class="text-center px-3 py-1 text-gray-500 font-medium border-b">Статус</th>
                                    </tr></thead>
                                    <tbody>
                                        ${(o.items || []).map((item, idx) => `
                                        <tr class="hover:bg-gray-50 ${item.arrived === false ? 'bg-red-50' : ''}">
                                            <td class="text-left px-3 py-1 font-mono text-gray-600">${item.code || ''}</td>
                                            <td class="text-left px-3 py-1 text-gray-700">${esc(item.name || '')}</td>
                                            <td class="text-center px-3 py-1 font-medium">${item.qty || 0}</td>
                                            <td class="text-center px-3 py-1">
                                                ${item.arrived === false
                                                    ? `<span class="text-red-600 font-medium cursor-pointer hover:underline" onclick="toggleItemArrived(${o.id}, ${idx})">✗ Не приехало</span>`
                                                    : `<span class="text-green-600 cursor-pointer hover:underline" onclick="toggleItemArrived(${o.id}, ${idx})">✓ Приехало</span>`
                                                }
                                            </td>
                                        </tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>`}
                        </div>`;
                    }).join('')}
                </div>` : '');

            return `
                <div class="space-y-3">
                    <div class="bg-white rounded-lg border border-gray-200 p-3">
                        <div class="flex justify-between items-center flex-wrap gap-3">
                            <div class="flex gap-3 items-center flex-wrap">
                                <div class="bg-blue-100 text-blue-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">В ПУТИ</div><div class="text-lg font-bold">${inTransit.length}</div></div>
                                <div class="bg-sky-100 text-sky-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">ТОВАРОВ</div><div class="text-lg font-bold">${totalInTransitItems}</div></div>
                                <div class="bg-violet-100 text-violet-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">СУММА</div><div class="text-lg font-bold">${totalInTransitSum.toFixed(0)} ₽</div></div>
                                <div class="bg-amber-100 text-amber-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">БЛИЖ. ДОСТАВКА</div><div class="text-sm font-bold">${nextDeliveryStr}</div></div>
                            </div>
                            <div class="flex gap-2">
                                ${delivered.length > 0 ? `<button onclick="clearDeliveredOrders()" class="btn px-3 py-2 text-sm font-medium text-white bg-orange-500 rounded-md hover:bg-orange-600 cursor-pointer">${icons.trash} Очистить доставленные (${delivered.length})</button>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${ordersHTML}
                    </div>
                </div>`;
        }

        function markDelivered(orderId) {
            const order = inTransitOrders.find(o => o.id === orderId);
            if (!order) return;
            order.status = 'delivered';
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function deleteInTransitOrder(orderId) {
            if (!confirm('Удалить заказ?')) return;
            inTransitOrders = inTransitOrders.filter(o => o.id !== orderId);
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function clearDeliveredOrders() {
            const delivered = inTransitOrders.filter(o => o.status === 'delivered');
            if (delivered.length === 0) { alert('Нет доставленных заказов'); return; }
            if (!confirm(`Удалить ${delivered.length} доставленных заказов?`)) return;
            inTransitOrders = inTransitOrders.filter(o => o.status !== 'delivered');
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        // Переключение статуса товара в доставленном заказе (приехало / не приехало)
        function toggleItemArrived(orderId, itemIdx) {
            const order = inTransitOrders.find(o => o.id === orderId);
            if (!order || !order.items || !order.items[itemIdx]) return;
            order.items[itemIdx].arrived = !order.items[itemIdx].arrived;
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        // === ЗАГРУЗКА (Upload Tab) ===
        function renderUpload() {
            const savedAssortments = getSavedAssortments();
            const savedMatrices = getSavedMatrices();

            const matrixCount = Object.keys(matrix).length;
            const marksCount = Object.keys(matrixMarks).length;
            const hasMatrix = matrixCount > 0;
            const hasStocks = stocks.length > 0;
            const hasSales = sales.length > 0;
            const hasStores = stores.length > 0;
            const hasMarks = marksCount > 0;
            const canOrder = hasMatrix && hasStocks && hasStores;

            return `
                <div class="space-y-2">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
                        <!-- Продажи -->
                        <div onclick="document.getElementById('salesInput').click()" class="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-emerald-400 transition-colors group">
                            <div class="flex flex-col items-center text-center">
                                <div class="p-3 bg-emerald-50 rounded-lg text-emerald-600 mb-2 group-hover:bg-emerald-100 transition-colors">${icons.sales}</div>
                                <h3 class="font-medium text-gray-800 mb-1">Продажи</h3>
                                <p class="text-xs text-gray-400">Загрузить из файла</p>
                                <input type="file" id="salesInput" accept=".xlsx,.xls,.csv" onchange="handleFile(this, 'sales')" class="hidden">
                                ${sales.length > 0 ? `<p class="mt-2 text-sm text-emerald-600 font-bold">${sales.length} записей</p>` : ''}
                            </div>
                        </div>
                        <!-- Остатки на ТТ -->
                        <div onclick="document.getElementById('stocksInput').click()" class="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-sky-400 transition-colors group">
                            <div class="flex flex-col items-center text-center">
                                <div class="p-3 bg-sky-50 rounded-lg text-sky-600 mb-2 group-hover:bg-sky-100 transition-colors">${icons.stock}</div>
                                <h3 class="font-medium text-gray-800 mb-1">Остатки на ТТ</h3>
                                <p class="text-xs text-gray-400">Загрузить из файла</p>
                                <input type="file" id="stocksInput" accept=".xlsx,.xls,.csv" onchange="handleFile(this, 'stocks')" class="hidden">
                                ${stocks.length > 0 ? `<p class="mt-2 text-sm text-sky-600 font-bold">${stocks.length} записей</p>` : ''}
                            </div>
                        </div>
                        <!-- Матрица -->
                        <div onclick="document.getElementById('matrixInput').click()" class="bg-white rounded-lg border ${hasMarks ? 'border-violet-300' : 'border-gray-200'} p-4 cursor-pointer hover:border-violet-400 transition-colors group">
                            <div class="flex flex-col items-center text-center">
                                <div class="p-3 bg-violet-50 rounded-lg text-violet-600 mb-2 group-hover:bg-violet-100 transition-colors">${icons.grid}</div>
                                <h3 class="font-medium text-gray-800 mb-1">Матрица</h3>
                                <p class="text-xs text-gray-400">Нажмите чтобы загрузить из файла</p>
                                <input type="file" id="matrixInput" accept=".xlsx,.xls" onchange="importMatrix(this)" class="hidden">
                                ${savedMatrices.length > 0 ? `
                                <div class="space-y-0.5 mt-2 max-h-28 overflow-y-auto w-full">
                                    ${savedMatrices.map(s => `
                                        <div onclick="event.stopPropagation();loadSavedMatrixByName('${esc(s.name)}')" class="px-2 py-0.5 bg-violet-50 hover:bg-violet-100 rounded text-[11px] text-violet-700 cursor-pointer transition-colors flex justify-between items-center">
                                            <span class="truncate font-medium">${s.name}</span>
                                            <span class="text-violet-400 ml-1 shrink-0">${s.products || 0}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                ` : ''}
                                ${hasMarks ? `<p class="mt-2 text-sm text-violet-600 font-bold">${marksCount} тов.</p>` : ''}
                            </div>
                        </div>
                        <!-- Ассортимент -->
                        <div onclick="document.getElementById('assortInput').click()" class="bg-white rounded-lg border ${hasMatrix ? 'border-sky-300' : 'border-gray-200'} p-4 cursor-pointer hover:border-sky-400 transition-colors group">
                            <div class="flex flex-col items-center text-center">
                                <div class="p-3 bg-sky-50 rounded-lg text-sky-600 mb-2 group-hover:bg-sky-100 transition-colors">${icons.package}</div>
                                <h3 class="font-medium text-gray-800 mb-1">Ассортимент</h3>
                                <p class="text-xs text-gray-400">Нажмите чтобы загрузить из файла</p>
                                <input type="file" id="assortInput" accept=".xlsx,.xls" onchange="importAssortment(this)" class="hidden">
                                ${savedAssortments.length > 0 ? `
                                <div class="space-y-0.5 mt-2 max-h-28 overflow-y-auto w-full">
                                    ${savedAssortments.map(s => `
                                        <div onclick="event.stopPropagation();loadAssortmentByName('${esc(s.name)}')" class="px-2 py-0.5 bg-sky-50 hover:bg-sky-100 rounded text-[11px] text-sky-700 cursor-pointer transition-colors flex justify-between items-center">
                                            <span class="truncate font-medium">${s.name}</span>
                                            <span class="text-sky-400 ml-1 shrink-0">${s.count}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                ` : ''}
                                ${hasMatrix ? `<p class="mt-2 text-sm text-sky-600 font-bold">${matrixCount} тов.</p>` : ''}
                            </div>
                        </div>
                    </div>

                    <!-- Нижняя панель настроек -->
                    <div class="bg-white rounded-lg border ${canOrder ? 'border-green-300' : 'border-gray-200'} p-3 space-y-2">
                        <!-- Строка 1: Период, Наценка, Индикаторы -->
                        <div class="flex flex-wrap items-center gap-3">
                            <div class="flex items-center gap-1.5 bg-gray-50 px-2.5 py-1.5 rounded-md border border-gray-200">
                                <label class="text-xs text-gray-500">Период:</label>
                                <input type="number" value="${period}" onchange="period=parseInt(this.value)||3" class="input w-12 text-center" min="1" max="60">
                                <span class="text-xs text-gray-400">дн.</span>
                            </div>

                            <div class="h-6 w-px bg-gray-200"></div>

                            <!-- Индикаторы загрузки -->
                            <div class="flex flex-wrap items-center gap-1.5">
                                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium ${hasMatrix ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-500'}">
                                    ${hasMatrix ? '&#10003;' : '&#10007;'} Ассортимент: ${matrixCount}
                                </span>
                                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium ${hasStocks ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-500'}">
                                    ${hasStocks ? '&#10003;' : '&#10007;'} Остатки: ${stocks.length}
                                </span>
                                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium ${hasSales ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-500'}">
                                    ${hasSales ? '&#10003;' : '&#10007;'} Продажи: ${sales.length}
                                </span>
                                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium ${hasStores ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-500'}">
                                    ${hasStores ? '&#10003;' : '&#10007;'} Магазины: ${stores.length}
                                </span>
                                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium ${hasMarks ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-500'}">
                                    ${hasMarks ? '&#10003;' : '&#10007;'} Матрица: ${marksCount}
                                </span>
                            </div>
                        </div>

                        <!-- Строка 2: Кнопки -->
                        <div class="flex items-center gap-3">
                            ${canOrder ? `
                            <button onclick="tab='order';searchResults='';render();setTimeout(()=>{const el=document.getElementById('orderSearchInput');if(el)el.focus();},50)" class="flex-1 max-w-xs py-2.5 text-sm font-bold text-white bg-gradient-to-r from-green-600 to-emerald-600 rounded-lg hover:from-green-700 hover:to-emerald-700 shadow-md hover:shadow-lg transition-all inline-flex items-center justify-center gap-2 cursor-pointer">
                                ${icons.order} Сформировать заказ
                                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                            </button>
                            ` : `
                            <div class="flex-1 max-w-xs py-2.5 text-sm font-medium text-gray-400 bg-gray-100 rounded-lg border border-gray-200 text-center">
                                ${icons.order} Сформировать заказ
                            </div>
                            `}
                            <button onclick="if(confirm('Очистить все данные?'))clearAll()" class="flex-1 max-w-xs py-2.5 text-sm font-medium text-red-600 bg-white border border-red-200 rounded-lg hover:bg-red-50 transition-colors inline-flex items-center justify-center gap-2">
                                ${icons.trash} Очистить
                            </button>
                        </div>
                    </div>
                </div>`;
        }

        function getAllGroups() {
            const groups = new Set();
            Object.values(matrix).forEach(p => { if (p.group) groups.add(p.group); });
            return Array.from(groups).sort((a, b) => a.localeCompare(b, 'ru'));
        }

        // === АССОРТИМЕНТ ===
        function renderAssortment() {
            const totalItems = Object.keys(matrix).length;
            const allGroups = getAllGroups();

            let html = `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex justify-between items-center">
                    <div class="flex gap-2 items-center">
                        <div class="bg-sky-100 text-sky-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Товаров: </span><strong>${totalItems}</strong>
                        </div>
                        <div class="bg-blue-100 text-blue-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Групп: </span><strong>${allGroups.length}</strong>
                        </div>
                        <div class="relative">
                            <input type="text" id="assortSearchInput" placeholder="Поиск по названию или коду..." value="${searchAssort}" oninput="debounceSearchAssort(this)" class="pl-8 pr-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-sky-400 w-56">
                            <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400">${icons.search}</span>
                            ${searchAssort ? `<button onclick="searchAssort='';render()" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">✕</button>` : ''}
                        </div>
                        <select onchange="filterGroup=this.value;render()" class="px-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-sky-400">
                            <option value="">Все группы</option>
                            ${allGroups.map(g => `<option value="${g}" ${filterGroup === g ? 'selected' : ''}>${g}</option>`).join('')}
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="showAddProductModal()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700">${icons.plus} Добавить</button>
                        <button onclick="exportAssortment()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700">${icons.export} Экспорт</button>
                    </div>
                </div>
            </div>`;

            if (totalItems === 0) {
                html += `<div class="text-center py-12">${icons.db}<p class="text-gray-500 mt-3">Загрузите данные</p></div>`;
            } else {
                const grouped = {};
                Object.entries(matrix).forEach(([code, p]) => {
                    if (searchAssort && !p.nomenclature?.toLowerCase().includes(searchAssort.toLowerCase()) && !code.includes(searchAssort)) return;
                    if (filterGroup && p.group !== filterGroup) return;
                    const gr = p.group || 'Без группы';
                    if (!grouped[gr]) grouped[gr] = [];
                    grouped[gr].push({ code, ...p });
                });

                Object.keys(grouped).forEach(gr => {
                    grouped[gr].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru'));
                });

                html += `<div class="table-container">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th class="text-left">Группа</th>
                                <th class="text-left">Наименование</th>
                                <th class="text-left">Код</th>
                                <th class="text-center">Упак.</th>
                                <th class="text-right">Цена на полке</th>
                                <th class="text-right">Дом. полка</th>
                                <th class="text-center">Квант</th>
                                <th class="text-center">Объём</th>
                                ${Object.keys(deliverySchedule).map(s => '<th class="text-right" title="' + esc(s) + '">' + esc(s) + '</th>').join('')}
                                <th class="text-center w-10"></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0], 'ru')).map(([gr, items]) => `
                                <tr class="bg-sky-50 cursor-pointer hover:bg-sky-100" onclick="collapsedG['${esc(gr)}']=!collapsedG['${esc(gr)}'];render()">
                                    <td colspan="${10 + Object.keys(deliverySchedule).length}" class="font-semibold text-sky-800">
                                        <span class="flex items-center gap-2">${collapsedG[gr] ? icons.chevronRight : icons.chevronDown}${gr} (${items.length})</span>
                                    </td>
                                </tr>
                                ${collapsedG[gr] ? '' : items.map(p => `
                                    <tr class="hover:bg-gray-50">
                                        <td class="text-xs"><input type="text" value="${p.group || ''}" onchange="updateProduct('${esc(p.code)}', 'group', this.value)" class="input w-32 text-xs" placeholder="Группа"></td>
                                        <td class="font-medium text-gray-700 text-left">${p.nomenclature || ''}</td>
                                        <td class="font-mono text-xs text-gray-600">${p.code}</td>
                                        <td class="text-center text-gray-500">${p.packaging || 'ШТ'}</td>
                                        <td class="text-right"><input type="number" step="0.01" value="${p.shelfPrice || 0}" onchange="updateProduct('${esc(p.code)}', 'shelfPrice', parseFloat(this.value)||0)" class="input w-16 text-right text-xs" placeholder="0"></td>
                                        <td class="text-right"><input type="number" step="0.01" value="${p.shelf || 0}" onchange="updateProduct('${esc(p.code)}', 'shelf', parseFloat(this.value)||0)" class="input w-16 text-right text-xs"></td>
                                        <td class="text-center"><input type="number" value="${p.quant || 1}" onchange="updateProduct('${esc(p.code)}', 'quant', parseFloat(this.value)||1)" class="input w-12 text-center text-xs" step="1"></td>
                                        <td><input type="number" step="0.01" value="${p.volume || 0}" onchange="updateProduct('${esc(p.code)}', 'volume', parseFloat(this.value)||0)" class="input w-16 text-center text-sm"></td>
                                        ${Object.keys(deliverySchedule).map(s => {
                                            const sp = (p.supplierPrices && p.supplierPrices[s]) || '';
                                            return '<td class="text-right"><input type="number" step="0.01" value="' + sp + '" onchange="updateProduct(\'' + esc(p.code).replace(/'/g, "\\'") + '\', \'supPrice_' + esc(s).replace(/'/g, "\\'") + '\', parseFloat(this.value)||0)" class="input w-16 text-right text-xs" placeholder="0" title="' + esc(s) + '"></td>';
                                        }).join('')}
                                        <td class="text-center"><button onclick="event.stopPropagation();deleteProduct('${esc(p.code)}')" class="text-red-500 hover:text-red-700 p-1">${icons.trash}</button></td>
                                    </tr>
                                `).join('')}
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
            }

            html += `</div>
            <div id="addProductModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
                <div class="bg-white rounded-lg p-6 w-96 max-w-full mx-4">
                    <h3 class="text-lg font-semibold mb-4">Добавить товар</h3>
                    <div class="space-y-3">
                        <input type="text" id="newProductName" placeholder="Наименование *" class="input w-full">
                        <input type="text" id="newProductCode" placeholder="Код *" class="input w-full">
                        <input type="text" id="newProductGroup" placeholder="Группа" class="input w-full">
                        <div class="flex gap-2">
                            <input type="text" id="newProductPackaging" placeholder="Упак" value="ШТ" class="input w-20">
                            <input type="number" id="newProductQuant" placeholder="Квант" value="1" class="input w-20">
                            <input type="number" id="newProductVolume" step="0.01" placeholder="Объём" value="0" class="input w-20">
                            <input type="number" id="newProductPrice" placeholder="Вх. цена" class="input flex-1">
                        </div>
                    </div>
                    <div class="flex justify-end gap-2 mt-4">
                        <button onclick="hideAddProductModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Отмена</button>
                        <button onclick="addNewProduct()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Добавить</button>
                    </div>
                </div>
            </div>`;

            return html;
        }

        function updateProduct(code, field, value) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            if (!product) return;
            if (field.startsWith('supPrice_')) {
                const supplier = field.replace('supPrice_', '');
                if (!product.supplierPrices) product.supplierPrices = {};
                product.supplierPrices[supplier] = parseFloat(value) || 0;
            } else {
                product[field] = value;
            }
            save(KEYS.ASSORTMENT, matrix);
            if (['inPrice', 'markup', 'group'].includes(field)) render();
        }

        function deleteProduct(code) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            const key = matrix[nc] ? nc : code;
            if (!product) return;
            if (confirm(`Удалить "${product.nomenclature || code}"?`)) {
                delete matrix[key];
                delete matrixMarks[nc];
                delete matrixMarks[code];
                save(KEYS.ASSORTMENT, matrix);
                save(KEYS.MATRIX_MARKS, matrixMarks);
                syncToSavedAssortment();
                render();
            }
        }

        function showAddProductModal() {
            document.getElementById('addProductModal').classList.remove('hidden');
            document.getElementById('addProductModal').classList.add('flex');
            document.getElementById('newProductName').focus();
        }

        function hideAddProductModal() {
            document.getElementById('addProductModal').classList.add('hidden');
            document.getElementById('addProductModal').classList.remove('flex');
        }

        function addNewProduct() {
            const name = document.getElementById('newProductName').value.trim();
            const code = document.getElementById('newProductCode').value.trim();
            if (!name || !code) { alert('Введите наименование и код'); return; }
            const normC = normCode(code);

        function importMatrix(input) {

        // === ЗАКАЗ ===
        function roundOrderQty(rawOrder, quant) {
            if (rawOrder <= 2) return 0;
            return Math.max(quant, Math.round(rawOrder / quant) * quant);
        }

        function calcOrder(stock, avgDay, periodDays, quant, shelf, packaging) {
            const minStock = shelf || 0;
            const prelim = stock - (avgDay * periodDays) - minStock;

            if (prelim > 1) return 0;

            let rawOrder;
            if (prelim < 0) {
                rawOrder = Math.abs(prelim);
            } else {
                rawOrder = 1;
            }

            if (packaging === 'КГ') {
                return Math.ceil(rawOrder / quant) * quant;
            }

            return roundOrderQty(rawOrder, quant);
        }

        // === ХЕЛПЕРЫ ДЛЯ РЫБНОГО ЗАКАЗА ===

        // Автоматическое закрытие заказов, у которых expectedDate <= сегодня
        function autoCloseDeliveredOrders() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let closed = 0;
            inTransitOrders.forEach(o => {
                if (o.status === 'in_transit' && o.expectedDate) {
                    const exp = new Date(o.expectedDate);
                    exp.setHours(0, 0, 0, 0);
                    if (exp <= today) {
                        o.status = 'delivered';
                        o.deliveredAt = today.toISOString().split('T')[0];
                        // Инициализируем arrived для каждого товара
                        if (!o.items) o.items = [];
                        o.items.forEach(item => {
                            if (item.arrived === undefined) item.arrived = true; // по умолчанию всё приехало
                        });
                        closed++;
                    }
                }
            });
            if (closed > 0) {
                save(KEYS.INTRANSIT, inTransitOrders);
                console.log(`[FishOrder] Автозакрыто ${closed} заказ(ов) по графику доставок`);
            }
        }

        // Количество доставленных товаров для ТТ+код (для прибавки к остатку)
        function getDeliveredQty(tt, code) {
            let total = 0;
            inTransitOrders.forEach(o => {
                if (o.status === 'delivered' && o.store === tt) {
                    const item = (o.items || []).find(i => i.code === code && i.arrived !== false);
                    if (item) total += (item.qty || 0);
                }
            });
            return total;
        }

        function getNextDeliveryDate(supplier, storeName) {
            const supData = deliverySchedule[supplier];
            if (!supData || supData.frozen) return null;
            const sched = supData.schedule || {};
            const days = sched[storeName];
            if (!days) return null;
            const today = new Date();
            today.setHours(0,0,0,0);
            // Check today + next 14 days
            for (let d = 0; d < 14; d++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + d);
                let dow = checkDate.getDay(); // 0=Вс
                // Convert: our array is [Пн=0, Вт=1, Ср=2, Чт=3, Пт=4, Сб=5, Вс=6]
                let arrIdx = dow === 0 ? 6 : dow - 1;
                if (days[arrIdx]) return checkDate;
            }
            return null;
        }

        function getDaysUntilDelivery(supplier, storeName) {
            const nextDate = getNextDeliveryDate(supplier, storeName);
            if (!nextDate) return 99; // No delivery scheduled
            const today = new Date();
            today.setHours(0,0,0,0);
            return Math.ceil((nextDate - today) / 86400000);
        }

        function getInTransitQty(tt, code) {
            let total = 0;
            inTransitOrders.forEach(order => {
                if (order.status === 'in_transit' && order.store === tt) {
                    const item = order.items.find(i => i.code === code);
                    if (item) total += item.qty;
                }
            });
            return total;
        }

        // Расчёт: подсчёт выходных/будних дней в периоде от сегодня до nextDeliveryDate
        function countDaysTypes(daysUntil) {
            let weekendCount = 0, weekdayCount = 0;
            const today = new Date();
            today.setHours(0,0,0,0);
            for (let d = 0; d < daysUntil; d++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + d);
                let dow = checkDate.getDay(); // 0=Вс, 1=Пн, 6=Сб
                // ПН(1), СБ(6), ВС(0) = выходные для рыбы
                if (dow === 1 || dow === 6 || dow === 0) weekendCount++;
                else weekdayCount++;
            }
            return { weekendCount, weekdayCount };
        }

        function placeOrders() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для заказа. Сначала откройте вкладку Заказ.');
                return;
            }

            // Collect all items with order > 0 from savedOrderResults
            const ordersBySupplierStore = {};
            savedOrderResults.forEach(r => {
                const editKey = `${r.tt}_${r.code}`;
                const orderQty = orderEdits[editKey] !== undefined ? orderEdits[editKey] : r.order;
                if (orderQty <= 0) return;

                const supplier = r.supplier || '';
                const store = r.tt;
                const groupKey = `${supplier}|||${store}`;
                if (!ordersBySupplierStore[groupKey]) ordersBySupplierStore[groupKey] = [];
                ordersBySupplierStore[groupKey].push({
                    code: r.code,
                    nomenclature: r.nomenclature,
                    qty: orderQty,
                    sum: orderQty * (r.inPrice || 0),
                    supplier,
                    store
                });
            });

            const orderCount = Object.keys(ordersBySupplierStore).length;
            if (orderCount === 0) {
                alert('Нет товаров к заказу');
                return;
            }

            if (!confirm(`Сформировать ${orderCount} заказ(ов)?`)) return;

            // Create in-transit records
            Object.entries(ordersBySupplierStore).forEach(([key, items]) => {
                const [supplier, store] = key.split('|||');
                const expectedDate = getNextDeliveryDate(supplier, store);
                inTransitOrders.push({
                    id: Date.now() + Math.random(),
                    createdAt: new Date().toISOString().split('T')[0],
                    supplier, store,
                    expectedDate: expectedDate ? expectedDate.toISOString().split('T')[0] : '',
                    items: items.map(i => ({
                        code: i.code, name: i.nomenclature, qty: i.qty, sum: i.sum
                    })),
                    status: 'in_transit'
                });
            });

            save(KEYS.INTRANSIT, inTransitOrders);
            // Clear orderEdits for placed items
            Object.keys(ordersBySupplierStore).forEach(key => {
                const [supplier, store] = key.split('|||');
                // Find matching items in savedOrderResults and clear edits
                savedOrderResults.forEach(r => {
                    if (r.tt === store) {
                        const editKey = `${r.tt}_${r.code}`;
                        delete orderEdits[editKey];
                    }
                });
            });
            savedOrderResults = null;
            savedOrderStats = null;
            render();
            alert('Заказы сформированы!');
        }

                                ${stores.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Магазины загружены</span>' : ''}
                                ${stocks.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Остатки загружены</span>' : ''}
                                ${sales.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Продажи загружены</span>' : ''}
                                ${Object.keys(matrixMarks).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Матрица загружена</span>' : ''}
                                ${Object.keys(deliverySchedule).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Поставщики настроены</span>' : '<span class="text-xs bg-red-100 text-red-500 px-2 py-1 rounded">Нет поставщиков</span>'}
                                ${Object.keys(supplierAssortment).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Ассортимент привязан</span>' : ''}
                            </div>
                            <button onclick="tab='upload';render()" class="mt-6 btn inline-flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700">
                                ${icons.upload} Перейти к загрузке данных
                            </button>
                        </div>
                    </div>`;
            }

            // Карта остатков по ТТ и коду
            const stockMap = new Map();
            stocks.forEach(s => stockMap.set(`${s.tt}_${s.code}`, s));

            // Карта продаж по ТТ и коду
            const salesByTTCode = {};
            const nameToCode = {};
            Object.entries(matrix).forEach(([code, p]) => {
                if (p.nomenclature) nameToCode[p.nomenclature.trim().toLowerCase()] = code;
            });
            sales.forEach(s => {
                if (!s.tt) return;
                if (s.code) {
                    const key = `${s.tt}_${normCode(s.code)}`;
                    salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                } else if (s.name) {
                    const normName = s.name.trim().toLowerCase();
                    let code = nameToCode[normName];
                    if (!code) {
                        const entry = Object.entries(nameToCode).find(([name, c]) => name.includes(normName) || normName.includes(name));
                        if (entry) code = entry[1];
                    }
                    if (code) {
                        const key = `${s.tt}_${code}`;
                        salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                    }
                }
            });

            const results = [];
            stores.forEach(store => {
                Object.entries(matrix).forEach(([code, p]) => {
                    const key = `${store.tt}_${code}`;
                    const stockData = stockMap.get(key);
                    const codeInMatrix = !!matrixMarks[code];
                    const markForTT = codeInMatrix ? (matrixMarks[code][store.tt] || 'НЕТ') : null;
                    const matrixDA = markForTT === 'ДА';

                    if (!matrixDA) return; // Only show matrix items for fish order

                    // Определяем поставщика из supplierAssortment (галочки)
                    const suppliersForProduct = (supplierAssortment[code] || []).filter(s => {
                        const supData = deliverySchedule[s];
                        return supData && !supData.frozen;
                    });
                    // Если нет галочек — используем старое поле supplier из товара
                    let supplier = p.supplier || '';
                    let daysUntil = 99;
                    if (suppliersForProduct.length > 0) {
                        // Найти поставщика с ближайшей доставкой
                        let bestSupplier = suppliersForProduct[0];
                        let bestDays = 99;
                        suppliersForProduct.forEach(s => {
                            const d = getDaysUntilDelivery(s, store.tt);
                            if (d < bestDays) { bestDays = d; bestSupplier = s; }
                        });
                        supplier = bestSupplier;
                        daysUntil = bestDays;
                    } else {
                        daysUntil = getDaysUntilDelivery(supplier, store.tt);
                    }
                    const inTransitQty = getInTransitQty(store.tt, code);
                    const deliveredQty = getDeliveredQty(store.tt, code);
                    const currentStock = stockData ? (stockData.currentStock || 0) : 0;
                    const effectiveStock = currentStock + deliveredQty;
                    const totalSales = salesByTTCode[key] || 0;

                    // Calculate estimated sales based on weekend/weekday
                    const { weekendCount, weekdayCount } = countDaysTypes(daysUntil);
                    const weekendAvg = getWeekendAvg(store.tt, code);
                    const weekdayAvg = getWeekdayAvg(store.tt, code);
                    const daysPresent = stockData ? (stockData.daysPresent || 0) : 0;
                    const avgSalesPerDay = daysPresent > 0 ? totalSales / daysPresent : 0;

                    let estimatedSales;
                    if (weekendAvg > 0 || weekdayAvg > 0) {
                        // Use weekend/weekday specific averages
                        estimatedSales = (weekdayCount * weekdayAvg) + (weekendCount * weekendAvg);
                    } else {
                        // Fallback to regular average
                        estimatedSales = avgSalesPerDay * daysUntil;
                    }

                    const quant = p.quant || 1;
                    const inPrice = p.inPrice || 0;
                    let rawOrder = estimatedSales - effectiveStock - inTransitQty;
                    // Round up to quant
                    let order = rawOrder > 0 ? Math.ceil(rawOrder / quant) * quant : 0;

                    // Apply manual edit
                    const editKey = `${store.tt}_${code}`;
                    if (orderEdits[editKey] !== undefined) order = orderEdits[editKey];

                    // Weekend avg for display
                    const weekendAvgDisplay = weekendAvg || 0;

                    const sum = order * inPrice;

                    results.push({
                        tt: store.tt, code, nomenclature: p.nomenclature || stockData?.name || '',
                        group: p.group || '', supplier, currentStock, deliveredQty, effectiveStock,
                        sales: totalSales,
                        weekendAvg: weekendAvgDisplay, daysUntil, inTransitQty,
                        order, quant, inPrice, sum,
                        status: order > 0 ? `заказ ${order}` : 'достаточно',
                        statusType: order > 0 ? 'order' : 'ok'
                    });
                });
            });

            // Фильтрация
            let filtered = results;
            // Убираем удалённые строки
            filtered = filtered.filter(r => !orderDeleted.has(`${r.tt}_${r.code}`));
            if (searchResults) {
                const s = searchResults.toLowerCase();
                filtered = filtered.filter(r => r.nomenclature?.toLowerCase().includes(s) || r.code?.includes(s) || r.group?.toLowerCase().includes(s) || (r.supplier || '').toLowerCase().includes(s));
            }
            if (filterTT) filtered = filtered.filter(r => r.tt === filterTT);
            if (filterGroup) filtered = filtered.filter(r => r.group === filterGroup);
            if (filterStatus === 'orders') filtered = filtered.filter(r => r.order > 0);
            if (filterSupplier) filtered = filtered.filter(r => r.supplier === filterSupplier);

            // Группировка: ТТ → Группа товара → товары
            const groupedTT = {};
            filtered.forEach(r => {
                if (!groupedTT[r.tt]) groupedTT[r.tt] = {};
                const gr = r.group || 'Без группы';
                if (!groupedTT[r.tt][gr]) groupedTT[r.tt][gr] = [];
                groupedTT[r.tt][gr].push(r);
            });

            // Сортировка внутри каждой группы
            Object.keys(groupedTT).forEach(tt => {
                const groups = groupedTT[tt];
                const sortedGroups = Object.entries(groups).sort(([gA], [gB]) => gA.localeCompare(gB, 'ru'));
                groupedTT[tt] = Object.fromEntries(sortedGroups);
            });

            const stats = { total: filtered.length, toOrder: filtered.filter(r => r.order > 0).length, sum: filtered.reduce((s, r) => s + r.sum, 0) };
            const allGroups = getAllGroups();

            // In-transit stats
            const inTransitCount = inTransitOrders.filter(o => o.status === 'in_transit').length;
            let nextDelivStr = '—';
            let minD = Infinity;
            inTransitOrders.filter(o => o.status === 'in_transit').forEach(o => {
                if (o.expectedDate) {
                    const exp = new Date(o.expectedDate);
                    exp.setHours(0,0,0,0);
                    const today = new Date(); today.setHours(0,0,0,0);
                    const diff = Math.ceil((exp - today) / 86400000);
                    if (diff >= 0 && diff < minD) { minD = diff; nextDelivStr = o.expectedDate; }
                }
            });

            // Сохраняем результаты расчёта заказа
            savedOrderResults = filtered;
            savedOrderStats = stats;

            return `<div class="space-y-3">
                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="flex justify-between items-center flex-wrap gap-3">
                        <div class="flex gap-3 items-center flex-wrap">
                            <div class="bg-sky-100 text-sky-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">ПОЗИЦИЙ</div><div class="text-lg font-bold">${stats.total}</div></div>
                            <div class="bg-emerald-100 text-emerald-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">К ЗАКАЗУ</div><div class="text-lg font-bold">${stats.toOrder}</div></div>
                            <div class="bg-blue-100 text-blue-800 rounded-md px-3 py-1.5" title="Заказов в пути"><div class="text-[10px] opacity-70">В ПУТИ</div><div class="text-lg font-bold">${inTransitCount}</div></div>
                            <div class="bg-violet-100 text-violet-800 rounded-md px-3 py-1.5 cursor-pointer hover:bg-violet-200 transition-colors" onclick="showOrderSumsByStore(this)" title="Нажмите для сумм по магазинам"><div class="text-[10px] opacity-70">СУММА</div><div class="text-lg font-bold">${stats.sum.toFixed(0)} ₽</div></div>
                            ${minD < Infinity ? `<div class="bg-amber-100 text-amber-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">БЛИЖ. ДОСТАВКА</div><div class="text-sm font-bold">${nextDelivStr}</div></div>` : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="placeOrders()" class="btn px-4 py-2 text-sm font-medium text-white bg-emerald-600 rounded-md hover:bg-emerald-700">${icons.order} Сформировать заказ</button>
                            <button onclick="exportOrder()" class="btn px-4 py-2 text-sm font-medium text-white bg-sky-600 rounded-md hover:bg-sky-700">${icons.export} Экспорт</button>
                            ${orderDeleted.size > 0 ? '<button onclick="restoreDeletedOrderRows()" class="btn px-4 py-2 text-sm font-medium text-amber-700 bg-amber-100 rounded-md hover:bg-amber-200">Вернуть удалённые (' + orderDeleted.size + ')</button>' : ''}
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="flex flex-wrap gap-2 items-center">
                        <input id="orderSearchInput" type="text" placeholder="Поиск..." value="${searchResults}" oninput="debounceSearchResults(this)" class="input w-40">
                        <select onchange="filterGroup=this.value;render()" class="input bg-white"><option value="">Все категории</option>${allGroups.map(g => `<option value="${g}" ${filterGroup === g ? 'selected' : ''}>${g}</option>`).join('')}</select>
                        <select onchange="filterTT=this.value;render()" class="input bg-white"><option value="">Все ТТ</option>${stores.map(s => `<option value="${s.tt}" ${filterTT === s.tt ? 'selected' : ''}>${s.tt}</option>`).join('')}</select>
                        <select onchange="filterSupplier=this.value;render()" class="input bg-white"><option value="">Все поставщики</option>${Object.keys(deliverySchedule).filter(s => !getSupplierFrozen(s)).map(s => `<option value="${esc(s)}" ${filterSupplier === s ? 'selected' : ''}>${esc(s)}</option>`).join('')}</select>
                        <select onchange="filterStatus=this.value;render()" class="input bg-white">
                            <option value="">Все статусы</option>
                            <option value="orders" ${filterStatus === 'orders' ? 'selected' : ''}>С заказом</option>
                        </select>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="table-container">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th class="text-left sticky left-0 bg-gray-50 z-20" style="min-width:160px">Наименование</th>
