    <title>Расчёт матрицы</title>
    <!-- Version: 7.7 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <script src="shared-utils.js"></script>
    <script src="config.js"></script>

    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        .btn { transition: all 0.2s; }
        .btn:hover { opacity: 0.9; }
        .table-container { overflow: auto; max-height: 75vh; }
        .table-modern { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .table-modern thead { position: sticky; top: 0; z-index: 30; }
        .table-modern th { padding: 0.46rem 0.5rem; text-align: center; font-weight: 600; color: #374151; background: #f3f4f6; border: 1px solid #d1d5db; white-space: nowrap; font-size: 0.7rem; }
        .table-modern th.text-left { text-align: left; }
        .table-modern td { padding: 0.35rem 0.4rem; border: 1px solid #e5e7eb; text-align: center; }
        .table-modern td.text-left { text-align: left; }
        .col-data { min-width: 70px; }
        .col-header { min-width: 70px; height: 60px; white-space: normal !important; word-wrap: break-word; line-height: 1.3; vertical-align: middle; padding: 0.5rem 0.4rem !important; font-size: 0.7rem !important; font-weight: 600 !important; text-align: center !important; }
        .col-code { min-width: 45px; max-width: 55px; }
        .col-group { min-width: 70px; max-width: 90px; }
        .col-name { min-width: 160px; }
        .cell-wrap { white-space: normal; word-wrap: break-word; }

        .store-header { background: #e5e7eb; font-weight: 600; color: #374151; }
        .abc-a { background: #dcfce7; color: #166534; }
        .abc-b { background: #fef9c3; color: #854d0e; }
        .abc-c { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="min-h-screen bg-gray-100">
    <div class="bg-white border-b border-gray-200">
        <div class="px-3 py-2">
            <div class="flex items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span>Назад</span>
                </a>
                <div class="flex items-center gap-2 px-2">
                    <div class="p-1.5 bg-gray-200 rounded-lg text-gray-600">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    </div>
                    <h1 class="text-base font-semibold text-gray-900">Расчёт матрицы</h1>
                </div>
                <div class="flex gap-0.5 ml-2 bg-gray-100 rounded-lg p-0.5" id="tabs"></div>
            </div>
        </div>
    </div>
    <div class="px-3 py-3" id="content"></div>

    <div id="mandatoryModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg border border-gray-200 p-6 w-full max-w-lg shadow-lg" onclick="event.stopPropagation()">
            <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">${icons.star} Обязательный ассортимент</h3>
            <p class="text-sm text-gray-600 mb-4">Товары со звёздочкой всегда остаются в матрице:</p>
            <div class="max-h-80 overflow-y-auto border rounded-lg p-2 mb-4" id="mandatoryList"></div>
            <div class="flex gap-3">
                <button onclick="hideMandatoryModal()" class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Закрыть</button>
            </div>

    </div>

    <script>
        let tab = 'upload';
        let stores = [];
        let products = [];
        let sales = [];
        let stocks = [];
        let writeoffs = [];
        let mandatoryProducts = {};
        let results = [];
        
        // Filters
        let selectedTT = '';
        let selectedGroup = '';
        let searchProduct = '';
        let filterMatrixStatus = '';
        let filterABC = '';
        let collapsedGroups = {};
        let collapsedTT = {};
        let assortmentSearch = '';
        let matrixSearch = '';

        // Settings
        let minPointsForMatrix = 5; // Минимальные баллы для попадания в матрицу

        const KEYS = {
            STORES: SharedUtils.STORAGE_KEYS.STORES,
            PRODUCTS: SharedUtils.STORAGE_KEYS.PRODUCTS,
            SALES: SharedUtils.STORAGE_KEYS.SALES,
            STOCKS: SharedUtils.STORAGE_KEYS.STOCKS,
            WRITEOFFS: SharedUtils.STORAGE_KEYS.WRITEOFFS,
            MANDATORY: SharedUtils.STORAGE_KEYS.MATRIXCALC_MANDATORY,
            RESULTS: SharedUtils.STORAGE_KEYS.MATRIXCALC_RESULTS,
            SETTINGS: SharedUtils.STORAGE_KEYS.MATRIXCALC_SETTINGS
        };

        const load = (key, def) => SharedUtils.load(key, def);
        // Обёртка save — при сохранении товаров/магазинов также пишет в SharedData
        const _save = (key, data) => SharedUtils.save(key, data);
        const save = (key, data) => {
            _save(key, data);
            if (!window.SharedData) return;
            if (key === KEYS.PRODUCTS) {
                SharedData.saveProducts(data, 'matrix-calc');
            }
            if (key === KEYS.STORES) {
                SharedData.saveStores(data, 'matrix-calc');
            }
        };

        const normCode = SharedUtils.normCode;

        const esc = SharedUtils.esc;

        const icons = {
            upload: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
            grid: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
            chart: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
            search: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
            download: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,

            star: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,

            lock: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
            lockOpen: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`,

            check: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,

            chevronRight: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`,
            chevronDown: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`,
            store: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
            package: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
            settings: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
            plus: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
            import: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            export: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M16 10l4-4-4-4"/><line x1="20" y1="6" x2="12" y2="6"/><path d="M20 6h-8v12"/></svg>`,
            list: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>`,
            save: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`
        };

        function loadStoresFromHTML() {
            try {
                const data = load(KEYS.STORES, []);
                if (Array.isArray(data) && data.length > 0) {
                    // Сохраняем полные объекты магазинов (tt, tt2, storeNumber, oldName и др.)
                    stores = data;
                    console.log(`[Matrix] Загружено ${stores.length} магазинов из stores.html`);
                    return;
                }
            } catch (e) { 
                console.error('Load stores error:', e); 
            }
            stores = [];
        }

        // Проверяет, соответствует ли ТТ из данных (продажи/остатки) магазину из stores.html
        // Учитывает tt, tt2, storeNumber, oldName — точное совпадение и вхождение
        function storeMatches(dataTT) {
            if (stores.length === 0) return true; // Список магазинов не загружен = не фильтруем
            if (!dataTT) return false;
            const t = dataTT.trim();
            return stores.some(s => {
                const tt = (s.tt || '').trim();
                const tt2 = (s.tt2 || '').trim();
                const num = String(s.storeNumber || '').trim();
                const old = (s.oldName || '').trim();
                // Точное совпадение
                if (tt && tt === t) return true;
                if (tt2 && tt2 === t) return true;
                // stores.html: "ТТ Аптека" → данные: "ТТ Аптека Магазин" (tt — префикс)
                if (tt && tt.length >= 5 && t.startsWith(tt)) return true;
                if (tt && t.length >= 5 && tt.startsWith(t)) return true;
                // Вхождение tt2
                if (tt2 && tt2.length >= 3 && t.includes(tt2)) return true;
                // Вхождение номера магазина
                if (num && num.length >= 1 && t.includes(num)) return true;
                // Вхождение старого названия
                if (old && old.length >= 5 && t.includes(old)) return true;
                return false;
            });
        }

        function init() {
            loadStoresFromHTML(); // Магазины из index.html
            products = load(KEYS.PRODUCTS, []);
            sales = load(KEYS.SALES, []);
            stocks = load(KEYS.STOCKS, []);
            writeoffs = load(KEYS.WRITEOFFS, []);
            mandatoryProducts = load(KEYS.MANDATORY, {});
            results = load(KEYS.RESULTS, []);
            
            const settings = load(KEYS.SETTINGS, {});
            minPointsForMatrix = settings.minPointsForMatrix || 5;
            
            // Слушаем изменения в localStorage (если обновили магазины в другом окне)
            window.addEventListener('storage', (e) => {
                if (e.key === KEYS.STORES) loadStoresFromHTML();
            });

            // Синхронизация с universal через SharedData
            if (window.SharedData) {
                SharedData.onChange(({ source }) => {
                    if (source === 'universal') {
                        const newProducts = SharedData.getProducts();
                        if (newProducts.length > 0) {
                            products = newProducts;
                            save(KEYS.PRODUCTS, products);
                        }
                        const newStores = SharedData.getStores();
                        if (newStores.length > 0) loadStoresFromHTML();
                        // Синхронизация отметок матрицы из universal
                        const newMarks = SharedData.getMatrixMarks();
                        if (newMarks && Object.keys(newMarks).length > 0 && results.length > 0) {
                            let merged = 0;
                            results.forEach(r => {
                                const nc = normCode(r.code);
                                if (newMarks[nc]) {
                                    stores.forEach(s => {
                                        if (newMarks[nc][s.tt] !== undefined && r.inMatrix !== newMarks[nc][s.tt]) {
                                            r.inMatrix = newMarks[nc][s.tt];
                                            merged++;
                                        }
                                    });
                                }
                            });
                            if (merged > 0) {
                                save(KEYS.RESULTS, results);
                                console.log(`SharedData sync: ${merged} marks обновлено из universal`);
                            }
                        }
                        render();
                    }
                });
            }
            
            render();
        }

        function saveSettings() {
            save(KEYS.SETTINGS, { minPointsForMatrix });
        }

        function render() {
            // Сохраняем позицию скролла для всех таблиц перед перерисовкой
            const savedScrolls = {};
            document.querySelectorAll('.table-container').forEach(c => {
                savedScrolls[c.id] = c.scrollTop;
            });
            renderTabs();
            renderContent();
            // Восстанавливаем скролл после перерисовки
            requestAnimationFrame(() => {
                Object.entries(savedScrolls).forEach(([id, top]) => {
                    const c = document.getElementById(id);
                    if (c && top > 0) c.scrollTop = top;
                });
            });
        }

        function renderTabs() {
            const tabs = [
                { id: 'upload', label: 'Загрузка', icon: icons.upload },
                { id: 'assortment', label: 'Ассортимент', icon: icons.grid },
                { id: 'analysis', label: 'Анализ', icon: icons.chart },
                { id: 'matrix', label: 'Матрица', icon: icons.grid },
            ];

            document.getElementById('tabs').innerHTML = tabs.map(t => `
                <button onclick="setTab('${t.id}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${tab === t.id ? 'bg-gray-700 text-white shadow-sm' : 'text-gray-600 hover:bg-white hover:text-gray-900'}">
                    ${t.icon}<span>${t.label}</span>
                </button>
            `).join('');
        }

        function setTab(t) { tab = t; render(); }

        function renderContent() {
            const el = document.getElementById('content');
            switch(tab) {
                case 'upload': el.innerHTML = renderUpload(); break;
                case 'assortment': el.innerHTML = renderAssortment(); break;
                case 'analysis': el.innerHTML = renderAnalysis(); break;
                case 'matrix': el.innerHTML = renderMatrix(); break;
            }
        }

        function renderUpload() {
            const savedAssortments = getSavedAssortments();
            const savedMatrices = getSavedMatrices();
            return `
                <div class="bg-white rounded-lg border border-gray-200 p-4 mb-4">
                    <h2 class="text-base font-semibold text-gray-900 mb-3 flex items-center gap-2">${icons.settings} Настройки ABC-анализа</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div class="p-4 bg-gray-50 rounded-lg border border-gray-300">
                            <label class="block font-medium text-gray-800 mb-2">Мин. баллов для матрицы</label>
                            <div class="flex items-center gap-3">
                                <input type="number" min="3" max="9" value="${minPointsForMatrix}" onchange="minPointsForMatrix=parseInt(this.value)||5;saveSettings()" class="w-20 px-3 py-2 border border-gray-400 rounded-lg text-center font-bold text-gray-800">
                                <div class="text-gray-700">
                                    <div class="text-xs">Товар попадает в матрицу если баллов ≥ этого значения</div>
                                    <div class="text-[10px] mt-1 opacity-70">A=3 балла, B=2 балла, C=1 балл (макс. 9)</div>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 bg-gray-50 rounded-lg border border-gray-200">
                            <label class="block font-medium text-gray-800 mb-2">Трёхмерный ABC-анализ</label>
                            <div class="text-xs text-gray-600 space-y-1">
                                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500"></span> <strong>П</strong> — Продажи (объём)</div>
                                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500"></span> <strong>О</strong> — Оборачиваемость (скорость)</div>
                                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-red-500"></span> <strong>С</strong> — Списания (потери)</div>
                                <div class="mt-2 pt-2 border-t border-gray-300">
                                    Итого = П + О + С (от 3 до 9 баллов)
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 p-3 bg-amber-50 rounded-lg border border-amber-200">
                        <div class="text-xs text-amber-800">
                            <strong>Рекомендуемые значения:</strong>
                            <span class="ml-2">7-9 баллов = Категория A (обязательно в матрице)</span>
                            <span class="mx-2">|</span>
                            <span>5-6 баллов = Категория B (на границе)</span>
                            <span class="mx-2">|</span>
                            <span>3-4 баллов = Категория C (не рекомендуется)</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 p-4">
                    <h2 class="text-base font-semibold text-gray-900 mb-4">Загрузка данных</h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">

        function exportAssortment() {
            if (products.length === 0) { alert('Нет данных'); return; }
            
            // Группируем товары
            const grouped = {};
            products.forEach(p => {
                const gr = p.group || 'Без группы';
                if (!grouped[gr]) grouped[gr] = [];
                grouped[gr].push(p);
            });
            
            const headers = ['Группа', 'Наименование', 'Код', 'Упаковка', 'Поставщик', 'Цена', 'Цена на полке', 'Дом. полка', 'Квант'];
            const data = [];
            
            // Сортируем группы и добавляем с группировкой
            Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'ru')).forEach((gr, grIdx) => {
                grouped[gr].forEach(p => {
                    data.push([
                        p.group || '',
                        p.nomenclature || '',
                        p.code || '',
                        p.packaging || 'ШТ',
                        p.supplier || '',
                        p.price || 0,
                        p.shelfPrice || 0,
                        p.shelf || 0,
                        p.quant || 1
                    ]);
                });
            });
            
            const ws = SharedUtils.createStyledSheet(data, headers, [0, 1]); // Группа и Наименование - по левому краю
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Ассортимент');
            XLSX.writeFile(wb, `ассортимент_${new Date().toISOString().slice(0, 10)}.xlsx`);
        }

        // === СОХРАНЕНИЕ И ЗАГРУЗКА АССОРТИМЕНТА ===
        const ASSORTMENTS_KEY = SharedUtils.STORAGE_KEYS.SAVED_ASSORTMENTS;
        let currentLoadedAssortment = null; // Имя загруженного сохранённого списка (для авто-синхронизации)

        function syncToSavedAssortment() {
            if (!currentLoadedAssortment) return;
            const saved = getSavedAssortments();
            const idx = saved.findIndex(s => s.name === currentLoadedAssortment);
            if (idx < 0) return;
            const mandatory = {};
            products.forEach(p => {
                if (p.code && mandatoryProducts[p.code]) mandatory[p.code] = true;
            });
            saved[idx] = {
                ...saved[idx],
                date: new Date().toISOString(),
                count: products.length,
                data: JSON.parse(JSON.stringify(products)),
                mandatory: mandatory
            };
            SharedUtils.save(ASSORTMENTS_KEY, saved);
        }

        function getSavedAssortments() {
            return SharedUtils.load(ASSORTMENTS_KEY, []);
        }

        function showSaveAssortmentModal() {
            if (products.length === 0) {
                alert('Нет данных для сохранения');
                return;
            }
            
            const name = prompt('Введите название для сохранения:', `Ассортимент ${new Date().toLocaleDateString('ru-RU')}`);
            if (!name) return;
            
            const saved = getSavedAssortments();
            const existing = saved.findIndex(s => s.name === name);
            
            // Собираем пометки обязательных для товаров в текущем ассортименте
            const mandatory = {};
            products.forEach(p => {
                if (p.code && mandatoryProducts[p.code]) mandatory[p.code] = true;
            });

            const record = {
                name,
                date: new Date().toISOString(),
                count: products.length,
                data: products,
                mandatory: mandatory
            };
            
            if (existing >= 0) {
                if (confirm(`Сохранение "${name}" уже существует. Перезаписать?`)) {
                    saved[existing] = record;
                } else {
                    return;
                }
            } else {
                saved.push(record);
            }
            
            SharedUtils.save(ASSORTMENTS_KEY, saved);
            alert(`Сохранено: ${products.length} товаров под названием "${name}"`);
        }

        function showLoadAssortmentModal() {
            const saved = getSavedAssortments();
            
            if (saved.length === 0) {
                alert('Нет сохранённых ассортиментов');
                return;

            const modal = document.createElement('div');
            modal.id = 'loadAssortmentModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.innerHTML = `

        function loadMatrixByName(name) {
            const saved = getSavedMatrices();
            const record = saved.find(s => s.name === name);

            if (!record) {
                alert('Матрица не найдена');
                return;
            }

            if (results.length > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count || 0} записей)?\nТекущие результаты анализа будут заменены.`)) {
                    return;
                }
            }

            results = record.results || [];

            // Сливаем с отметками из universal (shared_matrix_v1)
            try {
                const sharedMarks = SharedUtils.load(SharedUtils.STORAGE_KEYS.MATRIX, {});
                if (sharedMarks && Object.keys(sharedMarks).length > 0) {
                    let merged = 0;
                    results.forEach(r => {
                        const nc = normCode(r.code);
                        if (sharedMarks[nc]) {
                            const marks = sharedMarks[nc];
                            stores.forEach(s => {
                                if (marks[s.tt] !== undefined) {
                                    const oldVal = r.inMatrix;
                                    r.inMatrix = marks[s.tt];
                                    if (oldVal !== marks[s.tt]) merged++;
                                }
                            });
                        }
                    });
                    if (merged > 0) {
                        console.log(`Слияние с universal: ${merged} отметок обновлено`);
                    }
                }
            } catch(e) { console.error('Merge marks error:', e); }

            save(KEYS.RESULTS, results);

            const modal = document.getElementById('loadMatrixModal');
            if (modal) modal.remove();

            render();
            alert(`Загружено: ${results.length} записей матрицы из "${name}"`);
        }

        function renderAnalysis() {
            if (results.length === 0) {
                return `<div class="bg-white rounded-lg border border-gray-200 p-4">
                    <div class="text-center py-12">
                        <svg class="w-12 h-12 mx-auto text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        <p class="text-gray-500 mt-3">Нет данных. Загрузите файлы и нажмите "Рассчитать анализ"</p>
                    </div>
                </div>`;
            }

            // Groups and TTs for filters
            const groups = [...new Set(results.map(r => r.group || 'Без группы'))].sort((a, b) => a.localeCompare(b, 'ru'));
            const tts = [...new Set(results.map(r => r.tt))].sort((a, b) => a.localeCompare(b, 'ru'));

            // Filter results — фильтруем только если справочник магазинов/ассортимент загружен
            const hasStores = stores.length > 0;
            const productCodes = new Set(products.map(p => p.code));
            const filteredResults = results.filter(r => {
                // Фильтруем по магазинам из stores.html
                if (hasStores && !storeMatches(r.tt)) return false;
                // Фильтруем по ассортименту только если список не пустой
                if (products.length > 0 && !productCodes.has(r.code)) return false;
                if (selectedTT && r.tt !== selectedTT) return false;
                if (selectedGroup && (r.group || 'Без группы') !== selectedGroup) return false;
                if (searchProduct && !r.nomenclature?.toLowerCase().includes(searchProduct.toLowerCase()) && !r.code.includes(searchProduct)) return false;
                if (filterMatrixStatus === 'yes' && r.inMatrix !== 'ДА') return false;
                if (filterMatrixStatus === 'no' && r.inMatrix !== 'НЕТ') return false;
                if (filterABC === 'A' && r.abcClass !== 'A') return false;
                if (filterABC === 'B' && r.abcClass !== 'B') return false;
                if (filterABC === 'C' && r.abcClass !== 'C') return false;
                return true;
            });

            // Stats
            const stats = {
                total: results.length,
                inMatrix: results.filter(r => r.inMatrix === 'ДА').length,
                notInMatrix: results.filter(r => r.inMatrix === 'НЕТ').length,
                mandatory: results.filter(r => r.isMandatory).length,
                abcA: results.filter(r => r.abcClass === 'A').length,
                abcB: results.filter(r => r.abcClass === 'B').length,
                abcC: results.filter(r => r.abcClass === 'C').length
            };

            // Сортируем: ТТ → Группа → ABC (A,B,C) → Алфавит
            const abcOrder = { 'A': 1, 'B': 2, 'C': 3 };
            filteredResults.sort((a, b) => {
                const ttCompare = a.tt.localeCompare(b.tt, 'ru');
                if (ttCompare !== 0) return ttCompare;
                
                const groupA = a.group || 'Без группы';
                const groupB = b.group || 'Без группы';
                const groupCompare = groupA.localeCompare(groupB, 'ru');
                if (groupCompare !== 0) return groupCompare;
                
                const abcCompare = (abcOrder[a.abcClass] || 3) - (abcOrder[b.abcClass] || 3);
                if (abcCompare !== 0) return abcCompare;
                
                return (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru');
            });

            return `
                <div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                    <div class="flex flex-wrap justify-between items-center gap-2">
                        <div class="flex flex-wrap gap-2">
                            <div class="bg-emerald-100 text-emerald-800 rounded-lg px-2 py-1 text-center min-w-[50px]">

                                <div class="text-base font-bold">${stats.inMatrix}</div>
                            </div>
                            <div class="bg-rose-100 text-rose-800 rounded-lg px-2 py-1 text-center min-w-[50px]">
                                <div class="text-[8px] opacity-70">НЕТ</div>
                                <div class="text-base font-bold">${stats.notInMatrix}</div>
                            </div>
                            <div class="bg-gray-200 text-gray-800 rounded-lg px-2 py-1 text-center min-w-[50px] cursor-pointer hover:bg-gray-200" onclick="showMandatoryModal()">
                                <div class="text-[8px] opacity-70">⭐ ОБЯЗАТ.</div>
                                <div class="text-base font-bold">${stats.mandatory}</div>
                            </div>
                            <div class="flex gap-1 ml-1">
                                <div class="bg-green-200 text-green-800 rounded px-1.5 py-0.5 text-[10px]"><strong>A:</strong> ${stats.abcA}</div>
                                <div class="bg-yellow-200 text-yellow-800 rounded px-1.5 py-0.5 text-[10px]"><strong>B:</strong> ${stats.abcB}</div>
                                <div class="bg-red-200 text-red-800 rounded px-1.5 py-0.5 text-[10px]"><strong>C:</strong> ${stats.abcC}</div>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 items-center">
                            <select onchange="selectedTT=this.value;filterAnalysis()" class="px-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-gray-500">
                                <option value="">Магазин (${tts.length})</option>
                                ${tts.map(tt => `<option value="${tt}" ${selectedTT === tt ? 'selected' : ''}>${tt.substring(0,20)}${tt.length>20?'...':''}</option>`).join('')}
                            </select>
                            <select onchange="selectedGroup=this.value;filterAnalysis()" class="px-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-gray-500">
                                <option value="">Группа (${groups.length})</option>
                                ${groups.map(g => `<option value="${g}" ${selectedGroup === g ? 'selected' : ''}>${g}</option>`).join('')}
                            </select>
                            <select onchange="filterMatrixStatus=this.value;filterAnalysis()" class="px-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-gray-500">
                                <option value="">Матрица</option>
                                <option value="yes" ${filterMatrixStatus === 'yes' ? 'selected' : ''}>ДА</option>
                                <option value="no" ${filterMatrixStatus === 'no' ? 'selected' : ''}>НЕТ</option>
                            </select>
                            <select onchange="filterABC=this.value;filterAnalysis()" class="px-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-gray-500">
                                <option value="">ABC</option>
                                <option value="A" ${filterABC === 'A' ? 'selected' : ''}>A</option>
                                <option value="B" ${filterABC === 'B' ? 'selected' : ''}>B</option>
                                <option value="C" ${filterABC === 'C' ? 'selected' : ''}>C</option>
                            </select>
                            <div class="relative">
                                <div class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400">${icons.search}</div>
                                <input type="text" id="analysisSearchInput" placeholder="Поиск..." value="${esc(searchProduct)}" oninput="debounceSearchAnalysis(this)" class="pl-7 pr-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-gray-500 w-40">
                            </div>
                            <button onclick="showSaveMatrixModal()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-amber-600 rounded-lg hover:bg-amber-700">${icons.save} Сохранить</button>
                            <button onclick="showLoadMatrixModal()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">${icons.import} Загрузить</button>
                            <button onclick="exportAnalysis()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт</button>
                            <button onclick="generateMatrix()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-gray-700 rounded-lg hover:bg-gray-800">${icons.grid} Создать матрицу</button>
                        </div>

        function toggleAnalysisMatrix(tt, code) {
            const container = document.getElementById('analysisTableContainer');
            const scrollTop = container ? container.scrollTop : 0;

            results.forEach(r => {
                if (r.tt === tt && r.code === code) {
                    r.inMatrix = r.inMatrix === 'ДА' ? 'НЕТ' : 'ДА';
                    r.manualEdit = true;
                    r.reason = r.inMatrix === 'ДА' ? 'Вручную добавлен' : 'Вручную удалён';
                }
            });
            save(KEYS.RESULTS, results);

            // Быстрое обновление только изменённой ячейки и счётчиков — без полного render()
            const btn = event.target.closest('button');
            if (btn) {
                const isDA = results.find(r => r.tt === tt && r.code === code)?.inMatrix === 'ДА';
                btn.className = `px-2 py-1 rounded text-xs font-bold ${isDA ? 'bg-emerald-500 hover:bg-emerald-600 text-white' : 'bg-red-500 hover:bg-red-600 text-white'} cursor-pointer`;
                btn.textContent = isDA ? '✓ ДА' : '✗ НЕТ';

            const ttHeaderCell = container?.querySelector(`td[onclick="toggleTT('${tt.replace(/'/g, "\\'")}')"]`);

        }

        function renderMatrix() {
            if (results.length === 0) {

                        <p class="text-gray-500 mt-3">Нет данных. Загрузите файлы и нажмите "Рассчитать анализ"</p>
                    </div>
                </div>`;
            }

            // Фильтруем только по магазинам из stores.html
            const hasStores = stores.length > 0;
            const filteredResults = hasStores
                ? results.filter(r => storeMatches(r.tt))
                : results;

            // Get unique TTs and products (только из отфильтрованных)
            const tts = [...new Set(filteredResults.map(r => r.tt))].sort((a, b) => a.localeCompare(b, 'ru'));
            const productMap = new Map();
            filteredResults.forEach(r => {
                if (!productMap.has(r.code)) {
                    productMap.set(r.code, { code: r.code, nomenclature: r.nomenclature, group: r.group });
                }
            });

            // Build matrix data (только из отфильтрованных)
            const matrixData = {};
            filteredResults.forEach(r => {
                const key = r.code;
                if (!matrixData[key]) matrixData[key] = { code: r.code, nomenclature: r.nomenclature, group: r.group };
                matrixData[key][r.tt] = r.inMatrix;
            });

            // Filter by search
            let filteredMatrixData = Object.entries(matrixData);
            if (matrixSearch) {
                const searchLower = matrixSearch.toLowerCase();
                filteredMatrixData = filteredMatrixData.filter(([code, p]) => 
                    (p.nomenclature || '').toLowerCase().includes(searchLower) ||
                    (p.code || '').toLowerCase().includes(searchLower) ||
                    (p.group || '').toLowerCase().includes(searchLower)

            // Group by category
            const grouped = {};
            filteredMatrixData.forEach(([code, p]) => {

                            </div>
                        </div>

        function importMatrix(input) {
            // Делегируем в handleMatrixUpload — та же логика слияния
            handleMatrixUpload(input);
        }

        function toggleMatrixCell(code, tt) {
            // Ищем существующую запись
            let found = false;
            results.forEach(r => {
                if (r.code === code && r.tt === tt) {
                    r.inMatrix = r.inMatrix === 'ДА' ? 'НЕТ' : 'ДА';
                    r.manualEdit = true;
                    found = true;
                }
            });
            
            // Если записи нет - создаём новую
            if (!found) {
                // Находим данные о товаре из ассортимента
                const product = products.find(p => p.code === code);
                const newRecord = {
                    tt: tt,
                    code: code,
                    nomenclature: product ? product.nomenclature : code,
                    group: product ? product.group : '',
                    sales: 0,
                    stock: 0,
                    totalDays: 0,
                    daysPresent: 0,
                    avgPerDay: 0,
                    turnoverIndex: 999,
                    writeoff: 0,
                    writeoffPercent: 0,
                    abcSales: 'C',
                    abcTurnover: 'C',
                    abcWriteoff: 'A',
                    abcScore: 5,
                    abcClass: 'C',
                    hasPrice: false,
                    price: 0,
                    shelf: 0,
                    profitIndex: 0,
                    inMatrix: 'ДА',
                    isMandatory: false,
                    reason: 'Вручную добавлен в матрицу',
                    manualEdit: true
                };
                results.push(newRecord);
            }
            
            save(KEYS.RESULTS, results);
            render();
        }

        function filterMatrix() {
            const container = document.getElementById('matrixTableContainer');
            const scrollTop = container ? container.scrollTop : 0;

            // Перерисовываем только tbody
            const tbody = document.querySelector('#matrixTableContainer tbody');
            if (!tbody) {
                render();
                return;
            }

            // Фильтруем только по магазинам из stores.html
            const hasStores = stores.length > 0;
            const filteredResults = hasStores
                ? results.filter(r => storeMatches(r.tt))
                : results;

            // Get unique TTs and products
            const tts = [...new Set(filteredResults.map(r => r.tt))].sort((a, b) => a.localeCompare(b, 'ru'));

            // Build matrix data
            const matrixData = {};
            filteredResults.forEach(r => {
                const key = r.code;
                if (!matrixData[key]) matrixData[key] = { code: r.code, nomenclature: r.nomenclature, group: r.group };
                matrixData[key][r.tt] = r.inMatrix;
            });

            // Filter by search
            let filteredMatrixData = Object.entries(matrixData);
            if (matrixSearch) {
                const searchLower = matrixSearch.toLowerCase();
                filteredMatrixData = filteredMatrixData.filter(([code, p]) => 
                    (p.nomenclature || '').toLowerCase().includes(searchLower) ||
                    (p.code || '').toLowerCase().includes(searchLower) ||
                    (p.group || '').toLowerCase().includes(searchLower)
                );
            }

            // Group by category
            const grouped = {};
            filteredMatrixData.forEach(([code, p]) => {
                const gr = p.group || 'Без группы';
                if (!grouped[gr]) grouped[gr] = [];
                grouped[gr].push(p);
            });

            tbody.innerHTML = Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0], 'ru')).map(([gr, items]) => `
                <tr class="group-header cursor-pointer" onclick="toggleGroup('matrix_${gr}')">
                    <td colspan="${3 + tts.length}" class="text-left py-1 px-2">
                        <div class="flex items-center gap-2">
                            ${collapsedGroups['matrix_' + gr] ? icons.chevronRight : icons.chevronDown}
                            <span class="font-semibold text-xs">${gr}</span>
                            <span class="text-[10px] bg-gray-200 text-gray-800 px-1 rounded">${items.length}</span>
                        </div>
                    </td>
                </tr>
                ${collapsedGroups['matrix_' + gr] ? '' : items.map(p => `
                    <tr class="hover:bg-gray-50">
                        <td class="text-left text-[10px]">${p.group || ''}</td>
                        <td class="text-left font-medium text-xs">${p.nomenclature || ''}</td>
                        <td class="font-mono text-[10px]">${p.code}</td>
                        ${tts.map(tt => `
                            <td class="cursor-pointer font-medium select-none ${p[tt] === 'ДА' ? 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200' : 'bg-rose-50 text-rose-600 hover:bg-rose-100'}" onclick="toggleMatrixCell('${p.code}', '${tt}')">
                                ${p[tt] === 'ДА' ? icons.check : ''}
                            </td>
                        `).join('')}
                    </tr>
                `).join('')}
            `).join('');

            // Восстанавливаем скролл
            if (container) container.scrollTop = scrollTop;

            // Обновляем счётчик товаров
            const counterEl = document.querySelector('.bg-gray-200 strong');
            if (counterEl) {
                counterEl.textContent = filteredMatrixData.length + (matrixSearch ? '/' + Object.keys(matrixData).length : '');
            }
        }

        function exportAnalysis() {
            if (results.length === 0) { alert('Нет данных'); return; }

            // Фильтруем только по магазинам из stores.html
            const hasStores = stores.length > 0;
            const filteredResults = hasStores
                ? results.filter(r => storeMatches(r.tt))
                : results;

            // Сортируем: ТТ → Группа → ABC (A,B,C)
            const abcOrder = { 'A': 1, 'B': 2, 'C': 3 };
            filteredResults.sort((a, b) => {
                const ttCompare = a.tt.localeCompare(b.tt, 'ru');
                if (ttCompare !== 0) return ttCompare;
                
                const groupA = a.group || 'Без группы';
                const groupB = b.group || 'Без группы';
                const groupCompare = groupA.localeCompare(groupB, 'ru');
                if (groupCompare !== 0) return groupCompare;
                
                return (abcOrder[a.abcClass] || 3) - (abcOrder[b.abcClass] || 3);
            });

            const headers = ['ТТ', 'Группа', 'Наименование', 'Код', 'Продажи', 'Дней торговли', 'Списание', 'Ср.прод/день', '% спис.', 'ABC (П/О/С)', 'Итого', 'В матрице'];
            const data = [];
            
            filteredResults.forEach(r => {
                data.push([
                    r.tt,
                    r.group || '',
                    r.nomenclature,
                    r.code,
                    r.sales.toFixed(1),

                    r.writeoff.toFixed(1),
                    r.avgPerDay.toFixed(2),
