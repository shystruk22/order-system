<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Универсальный расчёт</title>
    <!-- Version: 2.1 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="config.js"></script>
    <script src="shared-utils.js"></script>
    <script src="storage.js"></script>
    <script src="shared-data.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
        .btn { transition: all 0.2s; }
        .btn:hover { opacity: 0.9; }
        input:focus, select:focus { outline: none; }
        .input { padding: 0.35rem 0.4rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.75rem; background: white; }
        .input:focus { border-color: #0ea5e9; }
        .table-container { overflow: auto; max-height: 75vh; border-radius: 0.5rem; border: 1px solid #e5e7eb; }
        .table-modern { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .table-modern thead { position: sticky; top: 0; z-index: 30; }
        .table-modern th { padding: 0.46rem 0.5rem; text-align: center; font-weight: 600; color: #374151; background: #f3f4f6; border: 1px solid #d1d5db; white-space: nowrap; font-size: 0.7rem; }
        .table-modern th.text-left { text-align: left; }
        .table-modern td { padding: 0.35rem 0.4rem; border: 1px solid #e5e7eb; text-align: center; }
        .table-modern td.text-left { text-align: left; }
        .col-header { min-width: 70px; height: 60px; white-space: normal !important; word-wrap: break-word; line-height: 1.3; vertical-align: middle; padding: 0.5rem 0.4rem !important; font-size: 0.7rem !important; font-weight: 600 !important; text-align: center !important; }
        .col-code { min-width: 45px; max-width: 55px; }
        .col-group { min-width: 70px; max-width: 90px; }
        .col-name { min-width: 160px; }
        .cell-wrap { white-space: normal; word-wrap: break-word; }
        .group-header { background: #e0f2fe; font-weight: 600; color: #0c4a6e; }
        .store-header { height: auto; max-width: 80px; white-space: normal; word-wrap: break-word; word-break: break-word; font-size: 9px; line-height: 1.2; padding: 2px 3px; text-align: center; }
        .abc-a { background: #dcfce7; color: #166534; }
        .abc-b { background: #fef9c3; color: #854d0e; }
        .abc-c { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="min-h-screen bg-gray-100">
    <div class="bg-white border-b border-gray-200">
        <div class="px-3 py-2">
            <div class="flex items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span>Назад</span>
                </a>
                <div class="flex items-center gap-2 px-2">
                    <div class="p-1.5 bg-sky-100 rounded-lg text-sky-600">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                    </div>
                    <h1 class="text-base font-semibold text-gray-900">Универсальный расчёт</h1>
                </div>
                <div class="flex gap-0.5 ml-2 bg-gray-100 rounded-lg p-0.5" id="tabs"></div>
                <div class="ml-auto flex gap-2">
                    <span class="bg-purple-100 text-purple-800 rounded-lg px-2 py-1 text-xs" id="statsProducts">0 тов.</span>
                    <span class="bg-blue-100 text-blue-800 rounded-lg px-2 py-1 text-xs" id="statsStores">0 ТТ</span>
                </div>
            </div>
        </div>
    </div>
    <div class="px-3 py-3" id="content"></div>

    <script>
        let tab = 'upload';
        let matrix = {}; // Ассортимент (каталог): {code, nomenclature, group, packaging, supplier, price, shelf, quant, inPrice, markup}
        let matrixMarks = {}; // Отметки матрицы: {[code]: {[tt]: 'ДА'/'НЕТ', ...}}
        let sales = []; // {tt, name, quantity, group} - продажи С ТТ
        let stocks = []; // {tt, name, code, currentStock, daysPresent, totalDays}
        let stores = []; // [{tt}]
        let suppliers = []; // [{name, matrix, sales, stocks, date}]
        let currentSupplier = '';
        let period = 21;
        let defaultMarkup = 25;
        
        let searchAssort = '';
        let searchPrices = '';
        let searchResults = '';
        let filterTT = '';
        let filterStatus = '';
        let filterGroup = '';
        let collapsedG = {};
        let collapsedTT = {};
        let groupMarkups = {};
        let searchAnalytics = '';
        let filterAnalyticsGroup = '';
        let savedOrderResults = null; // Сохранённые результаты расчёта заказа
        let savedOrderStats = null;   // Сохранённая статистика заказа
        let orderEdits = {};          // Ручные правки заказа: {"tt_code": value}
        let newMarkupEdits = {};      // Временные «новые наценки» для вкладки Цены: {"code": value}
        let savedOrderDate = null;    // Дата сохранённого заказа
        let ndsRate = 20;             // Стандартная ставка НДС %
        let ndflRate = 6;             // Ставка НДФЛ %
        let onlineFeeRate = 1;        // 1% за онлайн-обслуживание
        let savedOrdersList = [];     // Список всех сохранённых заказов
        let viewingOrderIdx = null;   // Индекс просматриваемого заказа из списка

        function resetSavedOrders() { savedOrderResults = null; savedOrderStats = null; orderEdits = {}; savedOrderDate = null; viewingOrderIdx = null; }

        const KEYS = {
            ASSORTMENT: SharedUtils.STORAGE_KEYS.UNIV_PRODUCTS,
            MATRIX_MARKS: SharedUtils.STORAGE_KEYS.UNIV_MATRIX,
            SALES: SharedUtils.STORAGE_KEYS.UNIV_OWN_SALES,
            STOCKS: SharedUtils.STORAGE_KEYS.UNIV_OWN_STOCKS,
            STORES: SharedUtils.STORAGE_KEYS.STORES,
            SUPPLIERS: SharedUtils.STORAGE_KEYS.UNIV_SUPPLIERS,
            CURRENT_SUPPLIER: SharedUtils.STORAGE_KEYS.UNIV_CURRENT_SUPPLIER,
            DEFAULT_MARKUP: SharedUtils.STORAGE_KEYS.UNIV_DEFAULT_MARKUP,
            GROUP_MARKUPS: SharedUtils.STORAGE_KEYS.UNIV_GROUP_MARKUPS,
            SAVED_ORDER: 'univ_saved_order_v1',
            SAVED_ORDERS_LIST: 'univ_saved_orders_list_v1'
        };

        // Поля каталога товаров (не ДА/НЕТ)
        const CATALOG_FIELDS = ['code','nomenclature','name','group','packaging','supplier','quant','volume','price','inPrice','shelfPrice','shelf','markup'];

        const normCode = (code) => String(code || '').trim().replace(/^0+/, '') || '0';

        const load = (key, def) => SharedUtils.load(key, def);
        
        const save = (key, data) => {
            try {
                SharedUtils.save(key, data);
                // Сохраняем отметки матрицы в SharedData для кросс-таб синхронизации
                if (key === KEYS.MATRIX_MARKS) {
                    try {
                        SharedUtils.save(SharedUtils.STORAGE_KEYS.MATRIX, data);
                        if (window.SharedData) SharedData.saveMatrixMarks(data, 'universal');
                    } catch(e) {}
                }
                // Синхронизация ассортимента с другими файлами
                if (key === KEYS.ASSORTMENT) {
                    try {
                        // Конвертируем object→array для shared_products_v1
                        const arr = Object.values(data).map(p => ({
                            code: p.code, nomenclature: p.nomenclature || p.name || '',
                            group: p.group || '', packaging: p.packaging || 'ШТ',
                            supplier: p.supplier || '', price: p.price || 0,
                            inPrice: p.inPrice || p.price || 0, shelfPrice: p.shelfPrice || 0,
                            shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                            markup: p.markup || defaultMarkup
                        }));
                        SharedUtils.save(SharedUtils.STORAGE_KEYS.PRODUCTS, arr);
                        if (window.SharedData) SharedData.saveProducts(arr, 'universal');
                    } catch(e) { console.error('Assortment sync error:', e); }
                }
            } catch (e) { console.error('Save error:', e); }
        };

        const esc = SharedUtils.esc;

        // === ЗАГРУЗКА СОХРАНЁННЫХ АССОРТИМЕНТОВ И МАТРИЦ ===
        const ASSORTMENTS_KEY = SharedUtils.STORAGE_KEYS.SAVED_ASSORTMENTS;
        let currentLoadedAssortment = null; // Имя загруженного сохранённого списка (для авто-синхронизации)

        function syncToSavedAssortment() {
            if (!currentLoadedAssortment) return;
            const saved = getSavedAssortments();
            const idx = saved.findIndex(s => s.name === currentLoadedAssortment);
            if (idx < 0) return;
            saved[idx] = {
                ...saved[idx],
                date: new Date().toISOString(),
                count: Object.keys(matrix).length,
                data: Object.values(matrix).map(p => ({
                    code: p.code, nomenclature: p.nomenclature || '',
                    group: p.group || '', packaging: p.packaging || 'ШТ',
                    supplier: p.supplier || '', price: p.price || 0,
                    inPrice: p.inPrice || 0, shelfPrice: p.shelfPrice || 0,
                    shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0, markup: p.markup || 0, mandatory: p.mandatory || false
                }))
            };
            SharedUtils.save(ASSORTMENTS_KEY, saved);
        }
        const MATRICES_KEY = SharedUtils.STORAGE_KEYS.SAVED_MATRICES;
        // Fallback на старые ключи (если матрикс сохранял до обновления)
        const OLD_ASSORTMENTS_KEY = 'matrixcalc_saved_assortments_v2';
        const OLD_MATRICES_KEY = 'matrixcalc_saved_matrices_v1';
        
        function getSavedAssortments() {
            try {
                let data = SharedUtils.load(ASSORTMENTS_KEY, null);
                if (!data || !Array.isArray(data) || data.length === 0) {
                    data = SharedUtils.load(OLD_ASSORTMENTS_KEY, []);
                    if (data && data.length > 0) {
                        // Мигрируем в новый ключ
                        SharedUtils.save(ASSORTMENTS_KEY, data);
                    }
                }
                return data || [];
            } catch { return []; }
        }

        function getSavedMatrices() {
            try {
                let data = SharedUtils.load(MATRICES_KEY, null);
                if (!data || !Array.isArray(data) || data.length === 0) {
                    data = SharedUtils.load(OLD_MATRICES_KEY, []);
                    if (data && data.length > 0) {
                        SharedUtils.save(MATRICES_KEY, data);
                    }
                }
                return data || [];
            } catch { return []; }
        }
        
        function loadAssortmentByName(name) {
            resetSavedOrders();
            const saved = getSavedAssortments();
            const record = saved.find(s => s.name === name);
            
            if (!record) {
                alert('Ассортимент не найден');
                return;
            }
            
            const count = Object.keys(matrix).length;
            if (count > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count} товаров)?\nТекущий ассортимент будет заменен.\nОтметки матрицы (ДА/НЕТ) останутся.`)) {
                    return;
                }
            }
            
            matrix = {};
            record.data.forEach(p => {
                if (p.code) {
                    matrix[normCode(p.code)] = {
                        code: p.code,
                        nomenclature: p.nomenclature || p.name || '',
                        group: p.group || '',
                        packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '',
                        price: p.price || 0,
                        inPrice: p.inPrice || p.price || 0,
                        shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0,
                        quant: p.quant || 1,
                        volume: p.volume || 0,
                        markup: defaultMarkup
                    };
                }
            });
            
            save(KEYS.ASSORTMENT, matrix);
            currentLoadedAssortment = name;
            render();
            alert(`Загружено: ${Object.keys(matrix).length} товаров из "${name}"\nОтметки матрицы: ${Object.keys(matrixMarks).length} товаров`);
        }
        
        // === ЗАГРУЗКА СОХРАНЁННЫХ МАТРИЦ ===
        function loadSavedMatrixByName(name) {
            resetSavedOrders();
            const saved = getSavedMatrices();
            const record = saved.find(s => s.name === name);
            
            if (!record) {
                alert('Матрица не найден');
                return;
            }
            
            const md = record.matrixData || {};
            let merged = 0;
            let added = 0;
            Object.entries(md).forEach(([code, item]) => {
                if (!code) return;
                const nc = normCode(code);
                
                // Извлекаем ДА/НЕТ marks
                const marks = {};
                Object.entries(item).forEach(([k, v]) => {
                    if (!CATALOG_FIELDS.includes(k) && k !== 'inMatrix' && (v === 'ДА' || v === 'НЕТ')) {
                        marks[k] = v;
                    }
                });
                
                if (Object.keys(marks).length > 0) {
                    if (!matrixMarks[nc]) matrixMarks[nc] = {};
                    Object.assign(matrixMarks[nc], marks);
                }
                
                if (!matrix[nc]) {
                    matrix[nc] = {
                        code: item.code || code,
                        nomenclature: item.nomenclature || '',
                        group: item.group || '',
                        packaging: 'ШТ',
                        inPrice: 0,
                        quant: 1,
                        markup: defaultMarkup
                    };
                    added++;
                } else {
                    merged++;
                }
            });
            
            save(KEYS.ASSORTMENT, matrix);
            save(KEYS.MATRIX_MARKS, matrixMarks);
            
            const modal = document.getElementById('matrixSelectModal');
            if (modal) modal.remove();
            
            render();
            alert(`Матрица применена: ${merged} обновлено, ${added} добавлено в каталог\nОтметок матрицы: ${Object.keys(matrixMarks).length} товаров\nВсего в ассортименте: ${Object.keys(matrix).length} товаров`);
        }
        
        function showMatrixSelectModal() {
            const saved = getSavedMatrices();
            
            if (saved.length === 0) {
                alert('Нет сохранённых матриц.\nСначала сохраните матрицу в matrix-calc.html');
                return;
            }
            
            const existing = document.getElementById('matrixSelectModal');
            if (existing) existing.remove();
            
            const modal = document.createElement('div');
            modal.id = 'matrixSelectModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg border border-gray-200 p-6 w-full max-w-md shadow-lg" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-900">${icons.grid} Выберите матрицу</h3>
                        <button onclick="document.getElementById('matrixSelectModal').remove()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
                    </div>
                    <div class="max-h-80 overflow-y-auto border rounded-lg divide-y">
                        ${saved.map(s => `
                            <div class="p-3 hover:bg-violet-50 cursor-pointer flex justify-between items-center" onclick="loadSavedMatrixByName('${esc(s.name)}')">
                                <div>
                                    <div class="font-medium text-gray-900">${s.name}</div>
                                    <div class="text-xs text-gray-500">${s.products || 0} товаров • ${s.inMatrix || 0} в матрице • ${new Date(s.date).toLocaleDateString('ru-RU')}</div>
                                </div>
                                <span class="text-violet-600 font-medium">Загрузить →</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 text-xs text-gray-400 text-center">
                        Матрицы сохраняются в matrix-calc.html
                    </div>
                </div>
            `;
            modal.addEventListener('click', () => modal.remove());
            document.body.appendChild(modal);
        }

        function showAssortmentSelectModal() {
            const saved = getSavedAssortments();
            
            if (saved.length === 0) {
                alert('Нет сохранённых ассортиментов.\nСначала сохраните ассортимент в matrix-calc.html');
                return;
            }
            
            const existing = document.getElementById('assortmentSelectModal');
            if (existing) existing.remove();
            
            const modal = document.createElement('div');
            modal.id = 'assortmentSelectModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg border border-gray-200 p-6 w-full max-w-md shadow-lg" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-900">${icons.list} Выберите ассортимент</h3>
                        <button onclick="document.getElementById('assortmentSelectModal').remove()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
                    </div>
                    <div class="max-h-80 overflow-y-auto border rounded-lg divide-y">
                        ${saved.map(s => `
                            <div class="p-3 hover:bg-teal-50 cursor-pointer flex justify-between items-center" onclick="loadAssortmentByName('${esc(s.name)}')">
                                <div>
                                    <div class="font-medium text-gray-900">${s.name}</div>
                                    <div class="text-xs text-gray-500">${s.count} товаров • ${new Date(s.date).toLocaleDateString('ru-RU')}</div>
                                </div>
                                <span class="text-teal-600 font-medium">Загрузить →</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 text-xs text-gray-400 text-center">
                        Ассортименты сохраняются в matrix-calc.html
                    </div>
                </div>
            `;
            modal.addEventListener('click', () => modal.remove());
            document.body.appendChild(modal);
        }

        const icons = {
            upload: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
            list: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>`,
            grid: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
            dollar: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
            order: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`,
            download: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            search: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
            check: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
            x: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            chevronRight: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>`,
            chevronDown: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="6 9 12 15 18 9"/></svg>`,
            trash: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            db: `<svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
            mapPin: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
            package: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`,
            sales: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
            stock: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`,
            supplier: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>`,
            chart: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
            plus: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
            save: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`,
            refresh: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
            import: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            export: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M16 10l4-4-4-4"/><line x1="20" y1="6" x2="12" y2="6"/><path d="M20 6h-8v12"/></svg>`
        };

        function init() {
            loadStoresFromHTML();
            sales = load(KEYS.SALES, []);
            stocks = load(KEYS.STOCKS, []);
            suppliers = load(KEYS.SUPPLIERS, []);
            currentSupplier = load(KEYS.CURRENT_SUPPLIER, '');
            defaultMarkup = load(KEYS.DEFAULT_MARKUP, 25);
            groupMarkups = load(KEYS.GROUP_MARKUPS, {});

            // Загрузка списка сохранённых заказов (автоудаление после 14 дней)
            cleanupOldOrders();
            savedOrdersList = load(KEYS.SAVED_ORDERS_LIST, []);
            // Миграция: если есть старый одиночный заказ — переносим в список
            var oldSaved = load(KEYS.SAVED_ORDER, null);
            if (oldSaved && oldSaved.createdAt && (Date.now() - new Date(oldSaved.createdAt).getTime()) < 14 * 86400000) {
                savedOrdersList.push({
                    id: Date.now(),
                    name: 'Заказ (мигрированный)',
                    createdAt: oldSaved.createdAt,
                    date: oldSaved.date,
                    items: oldSaved.items,
                    stats: oldSaved.stats,
                    supplierGroups: oldSaved.supplierGroups || {},
                    totalOrderItems: oldSaved.totalOrderItems || 0,
                    totalSum: oldSaved.totalSum || 0,
                    orderEdits: oldSaved.orderEdits || {}
                });
                save(KEYS.SAVED_ORDERS_LIST, savedOrdersList);
                SharedUtils.save(KEYS.SAVED_ORDER, null);
            } else {
                if (oldSaved) SharedUtils.save(KEYS.SAVED_ORDER, null);
            }

            // Загрузка с миграцией: старый формат (всё в matrix) → новый (matrix + matrixMarks)
            const savedAssort = load(KEYS.ASSORTMENT, null);
            const savedMarks = load(KEYS.MATRIX_MARKS, null);

            if (savedAssort !== null && savedMarks !== null) {
                // Новый формат
                matrix = savedAssort;
                matrixMarks = savedMarks;
            } else {
                // Старый формат — мигрируем
                const oldData = load('univ_matrix_v8', {});
                if (Object.keys(oldData).length > 0) {
                    console.log('Миграция: разделение matrix на assortment + matrixMarks...');
                    matrix = {};
                    matrixMarks = {};
                    Object.entries(oldData).forEach(([code, item]) => {
                        const catalog = {};
                        CATALOG_FIELDS.forEach(f => {
                            if (item[f] !== undefined && item[f] !== null) catalog[f] = item[f];
                        });
                        if (Object.keys(catalog).length > 0) matrix[code] = catalog;

                        const marks = {};
                        Object.entries(item).forEach(([k, v]) => {
                            if (!CATALOG_FIELDS.includes(k) && (v === 'ДА' || v === 'НЕТ')) {
                                marks[k] = v;
                            }
                        });
                        if (Object.keys(marks).length > 0) matrixMarks[code] = marks;
                    });
                    save(KEYS.ASSORTMENT, matrix);
                    save(KEYS.MATRIX_MARKS, matrixMarks);
                    console.log(`Миграция: ${Object.keys(matrix).length} каталог, ${Object.keys(matrixMarks).length} marks`);
                }
            }
            
            window.addEventListener('storage', (e) => {
                if (e.key === KEYS.STORES) loadStoresFromHTML();
                if (e.key === SharedUtils.STORAGE_KEYS.PRODUCTS) {
                    // Другая вкладка изменила ассортимент — перезагрузить
                    try {
                        const arr = SharedUtils.load(SharedUtils.STORAGE_KEYS.PRODUCTS, null);
                        if (Array.isArray(arr) && arr.length > 0) {
                            const obj = {};
                            arr.forEach(p => {
                                if (p.code) obj[normCode(p.code)] = {
                                    ...p, inPrice: p.inPrice || p.price || 0,
                                    markup: p.markup || defaultMarkup
                                };
                            });
                            matrix = obj;
                            save(KEYS.ASSORTMENT, matrix);
                            resetSavedOrders();
                            render();
                        }
                    } catch(e) {}
                }
                if (e.key === SharedUtils.STORAGE_KEYS.MATRIX || e.key === 'db_matrix_marks_v1') {
                    // Другая вкладка изменила матрицу — перезагрузить
                    try {
                        const newMarks = SharedUtils.load(SharedUtils.STORAGE_KEYS.MATRIX, null);
                        if (newMarks && Object.keys(newMarks).length > 0) {
                            matrixMarks = newMarks;
                            save(KEYS.MATRIX_MARKS, matrixMarks);
                            resetSavedOrders();
                            render();
                        }
                    } catch(e) {}
                }
            });

            // Синхронизация через polling SharedData
            if (window.SharedData) {
                SharedData.onChange(({source}) => {
                    if (source !== 'universal') {
                        try {
                            // Синхронизация ассортимента
                            const newProducts = SharedData.getProducts();
                            if (newProducts && Array.isArray(newProducts) && newProducts.length > 0) {
                                const obj = {};
                                newProducts.forEach(p => {
                                    if (p.code) {
                                        const code = normCode(p.code);
                                        obj[code] = {
                                            ...p, inPrice: p.inPrice || p.price || 0,
                                            markup: p.markup || defaultMarkup
                                        };
                                    }
                                });
                                let changed = false;
                                Object.entries(obj).forEach(([code, item]) => {
                                    if (!matrix[code] || matrix[code].nomenclature !== item.nomenclature ||
                                        matrix[code].price !== item.price || matrix[code].group !== item.group) {
                                        changed = true;
                                    }
                                });
                                if (changed || Object.keys(matrix).length !== Object.keys(obj).length) {
                                    matrix = obj;
                                    save(KEYS.ASSORTMENT, matrix);
                                    resetSavedOrders();
                                    render();
                                }
                            }

                            // Синхронизация отметок матрицы (ДА/НЕТ)
                            const newMarks = SharedData.getMatrixMarks();
                            if (newMarks && Object.keys(newMarks).length > 0) {
                                let changed = false;
                                Object.entries(newMarks).forEach(([code, ttMarks]) => {
                                    if (!matrixMarks[code]) {
                                        matrixMarks[code] = {};
                                    }
                                    Object.entries(ttMarks).forEach(([tt, val]) => {
                                        if (matrixMarks[code][tt] !== val) {
                                            matrixMarks[code][tt] = val;
                                            changed = true;
                                        }
                                    });
                                });
                                if (changed) {
                                    save(KEYS.MATRIX_MARKS, matrixMarks);
                                    resetSavedOrders();
                                    render();
                                }
                            }
                        } catch(e) {}
                    }
                });
            }
            
            render();
        }

        function loadStoresFromHTML() {
            try {
                const data = load(KEYS.STORES, []);
                if (Array.isArray(data) && data.length > 0) {
                    stores = data;
                    console.log(`[Universal] Загружено ${stores.length} магазинов из stores.html`);
                    return;
                }
            } catch (e) { console.error('Load stores error:', e); }
            stores = [];
        }

        function render() {
            // Сохраняем позицию скролла до перерисовки
            const content = document.getElementById('content');
            const scrollTop = content.scrollTop;
            // Сохраняем скролл внутри таблицы если есть
            const tableContainer = document.querySelector('.table-container');
            const tableScrollTop = tableContainer ? tableContainer.scrollTop : 0;
            
            renderTabs();
            renderContent();
            updateStats();
            
            // Восстанавливаем позицию скролла
            content.scrollTop = scrollTop;
            // Восстанавливаем скролл таблицы
            const newTableContainer = document.querySelector('.table-container');
            if (newTableContainer && tableScrollTop > 0) {
                newTableContainer.scrollTop = tableScrollTop;
            }
        }

        function updateStats() {
            document.getElementById('statsProducts').textContent = Object.keys(matrix).length + ' тов.';
            document.getElementById('statsStores').textContent = stores.length + ' ТТ';
        }

        function renderTabs() {
            const tabs = [
                { id: 'upload', label: 'Загрузка', icon: icons.upload },
                { id: 'suppliers', label: 'Поставщики', icon: icons.supplier },
                { id: 'assortment', label: 'Ассортимент', icon: icons.list },
                { id: 'matrix', label: 'Матрица', icon: icons.grid },
                { id: 'prices', label: 'Цены', icon: icons.dollar },
                { id: 'order', label: 'Заказ', icon: icons.order },
                { id: 'analytics', label: 'Аналитика', icon: icons.chart },
            ];
            document.getElementById('tabs').innerHTML = tabs.map(t => `
                <button onclick="tab='${t.id}';render()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${tab === t.id ? 'bg-sky-600 text-white shadow-sm' : 'text-gray-600 hover:bg-white hover:text-gray-900'}">
                    ${t.icon}<span>${t.label}</span>
                </button>
            `).join('');
        }

        function renderContent() {
            const el = document.getElementById('content');
            switch(tab) {
                case 'upload': el.innerHTML = renderUpload(); break;
                case 'suppliers': el.innerHTML = renderSuppliers(); break;
                case 'assortment': el.innerHTML = renderAssortment(); break;
                case 'matrix': el.innerHTML = renderMatrix(); break;
                case 'prices': el.innerHTML = renderPrices(); break;
                case 'order': el.innerHTML = renderOrder(); break;
                case 'analytics': el.innerHTML = renderAnalytics(); break;
            }
        }

        // === ЗАГРУЗКА (Upload Tab) ===
        function renderUpload() {
            const savedAssortments = getSavedAssortments();
            const savedMatrices = getSavedMatrices();

            const matrixCount = Object.keys(matrix).length;
            const marksCount = Object.keys(matrixMarks).length;
            const hasMatrix = matrixCount > 0;
            const hasStocks = stocks.length > 0;
            const hasSales = sales.length > 0;
            const hasStores = stores.length > 0;
            const hasMarks = marksCount > 0;
            const canOrder = hasMatrix && hasStocks && hasStores;

            return `
                <div class="space-y-2">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
                        <!-- Продажи -->
                        <div onclick="document.getElementById('salesInput').click()" class="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-emerald-400 transition-colors group">
                            <div class="flex flex-col items-center text-center">
                                <div class="p-3 bg-emerald-50 rounded-lg text-emerald-600 mb-2 group-hover:bg-emerald-100 transition-colors">${icons.sales}</div>
                                <h3 class="font-medium text-gray-800 mb-1">Продажи</h3>
                                <p class="text-xs text-gray-400">Загрузить из файла</p>
                                <input type="file" id="salesInput" accept=".xlsx,.xls,.csv" onchange="handleFile(this, 'sales')" class="hidden">
                                ${sales.length > 0 ? `<p class="mt-2 text-sm text-emerald-600 font-bold">${sales.length} записей</p>` : ''}
                            </div>
                        </div>
                        <!-- Остатки на ТТ -->
                        <div onclick="document.getElementById('stocksInput').click()" class="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-sky-400 transition-colors group">
                            <div class="flex flex-col items-center text-center">
                                <div class="p-3 bg-sky-50 rounded-lg text-sky-600 mb-2 group-hover:bg-sky-100 transition-colors">${icons.stock}</div>
                                <h3 class="font-medium text-gray-800 mb-1">Остатки на ТТ</h3>
                                <p class="text-xs text-gray-400">Загрузить из файла</p>
                                <input type="file" id="stocksInput" accept=".xlsx,.xls,.csv" onchange="handleFile(this, 'stocks')" class="hidden">
                                ${stocks.length > 0 ? `<p class="mt-2 text-sm text-sky-600 font-bold">${stocks.length} записей</p>` : ''}
                            </div>
                        </div>
                        <!-- Матрица -->
                        <div onclick="document.getElementById('matrixInput').click()" class="bg-white rounded-lg border ${hasMarks ? 'border-violet-300' : 'border-gray-200'} p-4 cursor-pointer hover:border-violet-400 transition-colors group">
                            <div class="flex flex-col items-center text-center">
                                <div class="p-3 bg-violet-50 rounded-lg text-violet-600 mb-2 group-hover:bg-violet-100 transition-colors">${icons.grid}</div>

                                ${savedMatrices.length > 0 ? `

                                            <span class="truncate font-medium">${s.name}</span>

                                        </div>

                                </div>
                                ` : ''}
                                ${hasMarks ? `<p class="mt-2 text-sm text-violet-600 font-bold">${marksCount} тов.</p>` : ''}
                            </div>
                        </div>
                        <!-- Ассортимент -->
                        <div onclick="document.getElementById('assortInput').click()" class="bg-white rounded-lg border ${hasMatrix ? 'border-sky-300' : 'border-gray-200'} p-4 cursor-pointer hover:border-sky-400 transition-colors group">
                            <div class="flex flex-col items-center text-center">
                                <div class="p-3 bg-sky-50 rounded-lg text-sky-600 mb-2 group-hover:bg-sky-100 transition-colors">${icons.package}</div>
                                <h3 class="font-medium text-gray-800 mb-1">Ассортимент</h3>
                                <p class="text-xs text-gray-400">Нажмите чтобы загрузить из файла</p>
                                <input type="file" id="assortInput" accept=".xlsx,.xls" onchange="importAssortment(this)" class="hidden">
                                ${savedAssortments.length > 0 ? `
                                <div class="space-y-0.5 mt-2 max-h-28 overflow-y-auto w-full">
                                    ${savedAssortments.map(s => `
                                        <div onclick="event.stopPropagation();loadAssortmentByName('${esc(s.name)}')" class="px-2 py-0.5 bg-sky-50 hover:bg-sky-100 rounded text-[11px] text-sky-700 cursor-pointer transition-colors flex justify-between items-center">
                                            <span class="truncate font-medium">${s.name}</span>
                                            <span class="text-sky-400 ml-1 shrink-0">${s.count}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                ` : ''}
                                ${hasMatrix ? `<p class="mt-2 text-sm text-sky-600 font-bold">${matrixCount} тов.</p>` : ''}
                            </div>
                        </div>
                    </div>

                    <!-- Нижняя панель настроек -->
                    <div class="bg-white rounded-lg border ${canOrder ? 'border-green-300' : 'border-gray-200'} p-3 space-y-2">
                        <!-- Строка 1: Период, Наценка, Индикаторы -->
                        <div class="flex flex-wrap items-center gap-3">

                                <input type="number" value="${period}" onchange="period=parseInt(this.value)||21" class="input w-12 text-center" min="1" max="60">

                                            <div>Продаж: <strong>${(s.sales || []).length}</strong></div>
                                            <div>Остатков: <strong>${(s.stocks || []).length}</strong></div>
                                            <div>Дата: ${s.date || '-'}</div>
                                        </div>
                                        <div class="flex gap-2 mt-3">
                                            <button onclick="loadSupplier(${i})" class="flex-1 btn px-3 py-1.5 text-xs font-medium text-white bg-green-600 rounded hover:bg-green-700">${icons.refresh}Загрузить</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </div>
                
                <div id="saveSupplierModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
                    <div class="bg-white rounded-lg p-6 w-96 max-w-full mx-4">
                        <h3 class="text-lg font-semibold mb-4">Сохранить поставщика</h3>
                        <input type="text" id="supplierName" placeholder="Название поставщика" class="w-full px-3 py-2 border rounded-lg mb-4">
                        <div class="flex justify-end gap-2">
                            <button onclick="hideSaveSupplierModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Отмена</button>
                            <button onclick="confirmSaveSupplier()" class="px-4 py-2 bg-sky-500 text-white rounded-lg hover:bg-sky-600">Сохранить</button>
                        </div>
                    </div>
                </div>`;
        }

        function saveCurrentSupplier() {
            if (Object.keys(matrix).length === 0) { alert('Нет данных'); return; }
            document.getElementById('saveSupplierModal').classList.remove('hidden');
            document.getElementById('saveSupplierModal').classList.add('flex');
            document.getElementById('supplierName').focus();
        }

        function hideSaveSupplierModal() {
            document.getElementById('saveSupplierModal').classList.add('hidden');
            document.getElementById('saveSupplierModal').classList.remove('flex');
        }

        function confirmSaveSupplier() {
            const name = document.getElementById('supplierName').value.trim();
            if (!name) { alert('Введите название'); return; }
            
            const existing = suppliers.findIndex(s => s.name === name);
            const supplierData = {
                name,
                matrix: JSON.parse(JSON.stringify(matrix)),
                matrixMarks: JSON.parse(JSON.stringify(matrixMarks)),
                sales: JSON.parse(JSON.stringify(sales)),
                stocks: JSON.parse(JSON.stringify(stocks)),
                groupMarkups: JSON.parse(JSON.stringify(groupMarkups)),
                date: new Date().toLocaleDateString('ru-RU')
            };
            
            if (existing >= 0) {
                if (confirm('Перезаписать?')) suppliers[existing] = supplierData;
                else return;
            } else {
                suppliers.push(supplierData);
            }
            
            currentSupplier = name;
            save(KEYS.SUPPLIERS, suppliers);
            save(KEYS.CURRENT_SUPPLIER, currentSupplier);
            hideSaveSupplierModal();
            render();
            alert('Сохранено: ' + name);
        }

        function loadSupplier(index) {
            const s = suppliers[index];
            if (!s) return;
            if (Object.keys(matrix).length > 0 && !confirm('Заменить данные?')) return;
            
            matrix = JSON.parse(JSON.stringify(s.matrix || {}));
            matrixMarks = JSON.parse(JSON.stringify(s.matrixMarks || {}));
            sales = JSON.parse(JSON.stringify(s.sales || []));
            stocks = JSON.parse(JSON.stringify(s.stocks || []));
            groupMarkups = JSON.parse(JSON.stringify(s.groupMarkups || {}));
            currentSupplier = s.name;
            
            save(KEYS.ASSORTMENT, matrix);
            save(KEYS.MATRIX_MARKS, matrixMarks);
            save(KEYS.SALES, sales);
            save(KEYS.STOCKS, stocks);
            save(KEYS.GROUP_MARKUPS, groupMarkups);
            save(KEYS.CURRENT_SUPPLIER, currentSupplier);
            render();
            alert('Загружено: ' + s.name);
        }

        function deleteSupplier(index) {
            if (confirm(`Удалить "${suppliers[index]?.name}"?`)) {
                suppliers.splice(index, 1);
                save(KEYS.SUPPLIERS, suppliers);
                render();
            }
        }

        function getAllGroups() {
            const groups = new Set();
            Object.values(matrix).forEach(p => { if (p.group) groups.add(p.group); });
            return Array.from(groups).sort((a, b) => a.localeCompare(b, 'ru'));
        }

        // === АССОРТИМЕНТ ===

                });

                    grouped[gr].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru'));
                });

                html += `<div class="table-container">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th class="text-left">Группа</th>
                                <th class="text-left">Наименование</th>
                                <th class="text-left">Код</th>
                                <th class="text-center">Упак.</th>
                                <th class="text-left">Поставщик</th>
                                <th class="text-right">Цена</th>
                                <th class="text-right">Цена на полке</th>

                                <th class="text-center w-10"></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0], 'ru')).map(([gr, items]) => `
                                <tr class="bg-sky-50 cursor-pointer hover:bg-sky-100" onclick="collapsedG['${esc(gr)}']=!collapsedG['${esc(gr)}'];render()">
                                    <td colspan="11" class="font-semibold text-sky-800">
                                        <span class="flex items-center gap-2">${collapsedG[gr] ? icons.chevronRight : icons.chevronDown}${gr} (${items.length})</span>
                                    </td>
                                </tr>
                                ${collapsedG[gr] ? '' : items.map(p => `
                                    <tr class="hover:bg-gray-50">
                                        <td class="text-xs"><input type="text" value="${p.group || ''}" onchange="updateProduct('${esc(p.code)}', 'group', this.value)" class="input w-32 text-xs" placeholder="Группа"></td>

                                        <td class="text-center text-gray-500">${p.packaging || 'ШТ'}</td>
                                        <td class="text-xs"><input type="text" value="${p.supplier || ''}" onchange="updateProduct('${esc(p.code)}', 'supplier', this.value)" class="input w-24 text-xs" placeholder="Поставщик"></td>
                                        <td class="text-right"><input type="number" step="0.01" value="${p.price || 0}" onchange="updateProduct('${esc(p.code)}', 'price', parseFloat(this.value)||0)" class="input w-16 text-right text-xs"></td>
                                        <td class="text-right"><input type="number" step="0.01" value="${p.shelfPrice || 0}" onchange="updateProduct('${esc(p.code)}', 'shelfPrice', parseFloat(this.value)||0)" class="input w-16 text-right text-xs" placeholder="0"></td>

                                        <td class="text-center"><input type="number" value="${p.quant || 1}" onchange="updateProduct('${esc(p.code)}', 'quant', parseFloat(this.value)||1)" class="input w-12 text-center text-xs" step="1"></td>
                                        <td><input type="number" step="0.01" value="${p.volume || 0}" onchange="updateProduct('${esc(p.code)}', 'volume', parseFloat(this.value)||0)" class="input w-16 text-center text-sm"></td>
                                        <td class="text-center"><button onclick="event.stopPropagation();deleteProduct('${esc(p.code)}')" class="text-red-500 hover:text-red-700 p-1">${icons.trash}</button></td>

                    </table>

            }
            
            html += `</div>
            <div id="addProductModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
                <div class="bg-white rounded-lg p-6 w-96 max-w-full mx-4">
                    <h3 class="text-lg font-semibold mb-4">Добавить товар</h3>
                    <div class="space-y-3">
                        <input type="text" id="newProductName" placeholder="Наименование *" class="input w-full">

        }

        function updateProduct(code, field, value) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            if (!product) return;
            product[field] = value;
            save(KEYS.ASSORTMENT, matrix);
            // Синхронизация: price ↔ inPrice (раздел Цены использует inPrice)
            if (field === 'price') product.inPrice = value;
            if (field === 'inPrice') product.price = value;
            if (['price', 'inPrice', 'shelfPrice', 'markup', 'group'].includes(field)) render();
        }

        function deleteProduct(code) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            const key = matrix[nc] ? nc : code;
            if (!product) return;
            if (confirm(`Удалить "${product.nomenclature || code}"?`)) {
                delete matrix[key];
                delete matrixMarks[nc];
                delete matrixMarks[code];
                save(KEYS.ASSORTMENT, matrix);
                save(KEYS.MATRIX_MARKS, matrixMarks);
                syncToSavedAssortment();
                render();
            }
        }

        function showAddProductModal() {
            document.getElementById('addProductModal').classList.remove('hidden');
            document.getElementById('addProductModal').classList.add('flex');
            document.getElementById('newProductName').focus();
        }

        function hideAddProductModal() {
            document.getElementById('addProductModal').classList.add('hidden');
            document.getElementById('addProductModal').classList.remove('flex');
        }

        function addNewProduct() {
            const name = document.getElementById('newProductName').value.trim();
            const code = document.getElementById('newProductCode').value.trim();
            if (!name || !code) { alert('Введите наименование и код'); return; }
            const normC = normCode(code);
            if (matrix[normC]) { alert('Товар уже существует'); return; }
            matrix[normC] = {
                nomenclature: name, code: normC,
                group: document.getElementById('newProductGroup').value.trim(),
                packaging: document.getElementById('newProductPackaging').value.trim() || 'ШТ',
                quant: parseFloat(document.getElementById('newProductQuant').value) || 1,
                volume: parseFloat(document.getElementById('newProductVolume').value) || 0,
                inPrice: parseFloat(document.getElementById('newProductPrice').value) || 0,
                markup: defaultMarkup
            };
            save(KEYS.ASSORTMENT, matrix);
            syncToSavedAssortment();
            hideAddProductModal();
            render();
        }

        function importAssortment(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            
            SharedUtils.importAssortmentUnified(file).then(function(result) {
                const items = result.items;
                if (items.length === 0) {
                    alert('Не найдено товаров в файле');
                    return;
                }
                
                const existingCount = Object.keys(matrix).length;
                if (existingCount > 0) {
                    if (!confirm('Загружено ' + items.length + ' товаров. Заменить текущий ассортимент (' + existingCount + ' товаров)?')) {
                        input.value = '';
                        return;
                    }
                }
                
                matrix = {};
                items.forEach(function(p) {
                    const code = normCode(p.code);
                    matrix[code] = {
                        code: code,
                        nomenclature: p.nomenclature || '',
                        group: p.group || '',
                        packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '',
                        price: p.price || p.inPrice || 0,
                        inPrice: p.inPrice || p.price || 0,
                        shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0,
                        quant: p.quant || 1,
                        volume: p.volume || 0,
                        markup: p.markup || defaultMarkup,
                        mandatory: p.mandatory || false
                    };
                });
                
                save(KEYS.ASSORTMENT, matrix);
                syncToSavedAssortment();
                render();
                alert('Импортировано товаров: ' + items.length);
            }).catch(function(err) {
                alert('Ошибка импорта: ' + err.message);
                console.error(err);
            });
            
            input.value = '';
        }

        function exportAssortment() {
            SharedUtils.exportAssortmentUnified(Object.values(matrix));
        }

        // === МАТРИЦА ===
        function renderMatrix() {
            if (Object.keys(matrix).length === 0) return `<div class="bg-white rounded-lg border border-gray-200 p-4"><div class="text-center py-12">${icons.db}<p class="text-gray-500 mt-3">Загрузите данные</p></div></div>`;

            const grouped = {};
            Object.entries(matrix).forEach(([code, p]) => {
                const gr = p.group || 'Без группы';
                if (!grouped[gr]) grouped[gr] = [];
                grouped[gr].push({ code, ...p });
            });

            return `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex justify-between items-center">
                    <div class="flex gap-2 items-center">
                        <div class="bg-sky-100 text-sky-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Товаров: </span><strong>${Object.keys(matrix).length}</strong>
                        </div>
                        <div class="bg-violet-100 text-violet-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">В матрице: </span><strong>${Object.keys(matrixMarks).length}</strong>
                        </div>
                        <div class="bg-blue-100 text-blue-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Магазинов: </span><strong>${stores.length}</strong>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="saveCurrentMatrix()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-violet-600 rounded-lg hover:bg-violet-700">${icons.save} Сохранить</button>
                        <button onclick="document.getElementById('matrixImportInput').click()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700">${icons.import} Импорт</button>
                        <input type="file" id="matrixImportInput" accept=".xlsx,.xls" onchange="importMatrix(this)" class="hidden">
                        <button onclick="exportMatrix()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт</button>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                <div class="table-container">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th class="text-left sticky left-0 bg-gray-50 z-20" style="min-width:80px">Группа</th>
                                <th class="text-left" style="min-width:150px">Наименование</th>
                                <th class="text-left">Код</th>
                                ${stores.map(s => `<th class="text-center min-w-[70px]"><div class="store-header" title="${s.tt}">${s.tt}</div></th>`).join('')}
                                <th class="text-center w-10"></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0], 'ru')).map(([gr, items]) => `
                                <tr class="group-header cursor-pointer" onclick="collapsedG['matrix_${esc(gr)}']=!collapsedG['matrix_${esc(gr)}'];render()">
                                    <td colspan="${3 + stores.length}" class="text-left py-1 px-2">
                                        <div class="flex items-center gap-2">
                                            ${collapsedG['matrix_' + gr] ? icons.chevronRight : icons.chevronDown}
                                            <span class="font-semibold">${gr}</span>
                                            <span class="text-[10px] bg-indigo-200 text-indigo-800 px-1 rounded">${items.length}</span>
                                        </div>
                                    </td>
                                </tr>
                                ${collapsedG['matrix_' + gr] ? '' : items.map(p => {
                                    const inMatrix = !!matrixMarks[p.code];
                                    return `
                                    <tr class="hover:bg-gray-50 ${inMatrix ? '' : 'opacity-60'}">
                                        <td class="text-left text-[10px] sticky left-0 bg-white z-10">${p.group || ''}</td>
                                        <td class="text-left font-medium text-xs">${p.nomenclature || ''}</td>
                                        <td class="font-mono text-[10px]">${p.code}</td>
                                        ${stores.map(s => {
                                            const mark = matrixMarks[p.code] ? matrixMarks[p.code][s.tt] : null;
                                            const isYes = mark === 'ДА';
                                            const isNo = mark === 'НЕТ';
                                            return `<td class="text-center cursor-pointer font-medium select-none ${isYes ? 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200' : isNo ? 'bg-rose-50 text-rose-600 hover:bg-rose-100' : 'bg-gray-50 text-gray-300 hover:bg-gray-100'}" onclick="toggleMatrixCell('${esc(p.code)}', '${esc(s.tt)}')">
                                                ${isYes ? icons.check : ''}
                                            </td>`;
                                        }).join('')}
                                        <td class="text-center"><button onclick="event.stopPropagation();deleteFromMatrix('${esc(p.code)}')" class="text-red-500 hover:text-red-700 p-1">${icons.trash}</button></td>
                                    </tr>`;
                                }).join('')}
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        function toggleMatrixCell(code, tt) {
            if (!matrixMarks[code]) matrixMarks[code] = {};
            matrixMarks[code][tt] = matrixMarks[code][tt] === 'ДА' ? 'НЕТ' : 'ДА';
            save(KEYS.MATRIX_MARKS, matrixMarks);
            render();
        }

        function deleteFromMatrix(code) {
            if (confirm(`Удалить "${matrix[code]?.nomenclature || code}"?`)) {
                delete matrix[code];
                delete matrixMarks[code];
                save(KEYS.ASSORTMENT, matrix);
                save(KEYS.MATRIX_MARKS, matrixMarks);
                render();
            }
        }

        function saveCurrentMatrix() {
            const name = prompt('Введите название для сохранения матрицы:', 'Матрица ' + new Date().toLocaleDateString('ru-RU'));
            if (!name) return;

            const saved = SharedUtils.load(SharedUtils.STORAGE_KEYS.SAVED_MATRICES, []);
            const existingIdx = saved.findIndex(s => s.name === name);

            // Формируем данные матрицы: ассортимент + отметки вместе
            const matrixData = {};
            Object.keys(matrix).forEach(code => {
                matrixData[code] = { ...matrix[code] };
                if (matrixMarks[code]) {
                    Object.entries(matrixMarks[code]).forEach(([tt, val]) => {
                        matrixData[code][tt] = val;
                    });
                }
            });

            // Считаем количество ДА
            let daCount = 0;
            Object.values(matrixMarks).forEach(marks => {
                Object.values(marks).forEach(v => { if (v === 'ДА') daCount++; });
            });

            const record = {
                name,
                date: new Date().toISOString(),
                products: Object.keys(matrix).length,
                inMatrix: Object.keys(matrixMarks).length,
                daCount,
                matrixData
            };

            if (existingIdx >= 0) {
                if (!confirm('Матрица "' + name + '" уже существует. Перезаписать?')) return;
                saved[existingIdx] = record;
            } else {
                saved.push(record);
            }

            SharedUtils.save(SharedUtils.STORAGE_KEYS.SAVED_MATRICES, saved);
            alert('Матрица сохранена: "' + name + '"\n' + Object.keys(matrix).length + ' товаров, ' + daCount + ' отметок ДА');
        }

        function importMatrix(input) {
            resetSavedOrders();
            const file = input.files[0];
            if (!file) return;

            SharedUtils.importMatrixExcel(file).then(({ marks, products }) => {
                products.forEach(p => {
                    const code = p.code;
                    if (!matrix[code]) {
                        matrix[code] = { nomenclature: p.nomenclature, code, group: p.group };
                    } else {
                        if (!matrix[code].group && p.group) matrix[code].group = p.group;
                        if (!matrix[code].nomenclature && p.nomenclature) matrix[code].nomenclature = p.nomenclature;
                    }

                    if (!matrixMarks[code]) matrixMarks[code] = {};
                    Object.entries(marks[code] || {}).forEach(([tt, val]) => {
                        if (stores.some(s => s.tt === tt)) {
                            matrixMarks[code][tt] = val;
                        }
                    });
                });

                save(KEYS.ASSORTMENT, matrix);
                save(KEYS.MATRIX_MARKS, matrixMarks);
                render();
                alert(`Ассортимент: ${Object.keys(matrix).length} товаров\nОтметки матрицы: ${Object.keys(matrixMarks).length} товаров`);
            }).catch(err => {
                alert('Ошибка: ' + err.message);
            });

            input.value = '';
        }

        function exportMatrix() {
            if (Object.keys(matrix).length === 0) { alert('Нет данных'); return; }

            const storeList = stores.map(s => s.tt);
            const headers = ['Группа', 'Наименование', 'Код', ...storeList];
            const data = Object.entries(matrix).map(([code, p]) => {
                const row = [p.group || '', p.nomenclature || '', code];
                storeList.forEach(tt => {
                    row.push((matrixMarks[code] && matrixMarks[code][tt] === 'ДА') ? 'ДА' : 'НЕТ');
                });
                return row;
            });

            const ws = SharedUtils.createStyledSheet(data, headers, [0, 1]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Матрица');

            const d = new Date();
            XLSX.writeFile(wb, 'матрица_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx');
        }

        // === ЦЕНЫ ===

            const allGroups = getAllGroups();
