            sales.forEach(s => {
                const nc = s.code ? normCode(s.code) : null;
                const product = nc ? matrix[nc] : 
                    (s.name ? Object.values(matrix).find(p => p.nomenclature === s.name) : null);
                if (product) {
                    const inPrice = product.inPrice || 0;
                    const shelfPrice = product.shelfPrice > 0 ? product.shelfPrice : inPrice * (1 + (product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup) / 100);
                    const qty = s.quantity;
                    totalPurchase += qty * inPrice;
                    totalRevenue += qty * shelfPrice;
                    const profit = shelfPrice - inPrice;
                    totalProfit += qty * profit;
                    // НДС
                    const ndsIn = inPrice * ndsRate / (100 + ndsRate);
                    const ndsOut = shelfPrice * ndsRate / (100 + ndsRate);
                    totalNdsPayable += qty * (ndsOut - ndsIn);
                    // НДФЛ
                    totalNdfl += qty * profit * ndflRate / 100;
                    // 1% онлайн
                    totalOnlineFee += qty * shelfPrice * onlineFeeRate / 100;
                }
            });
            totalNetIncome = totalProfit - totalNdsPayable - totalNdfl - totalOnlineFee;

            const individualMarkups = Object.values(matrix).filter(p => p.markup !== undefined && p.markup !== null).length;
            
            return `<div class="space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="bg-gradient-to-r from-violet-50 to-indigo-50 rounded-lg border border-violet-200 p-4">
                        <div class="flex items-center gap-2 mb-3">${icons.chart}<h2 class="text-sm font-semibold text-violet-800">Доходность</h2></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-white rounded-lg p-2 border border-violet-100 text-center"><div class="text-[10px] text-gray-500">Закупка</div><div class="text-base font-bold text-gray-800">${totalPurchase.toLocaleString('ru-RU')} ₽</div></div>
                            <div class="bg-white rounded-lg p-2 border border-violet-100 text-center"><div class="text-[10px] text-gray-500">Выручка</div><div class="text-base font-bold text-gray-800">${totalRevenue.toLocaleString('ru-RU')} ₽</div></div>
                            <div class="bg-white rounded-lg p-2 border border-violet-100 text-center"><div class="text-[10px] text-gray-500">Прибыль</div><div class="text-base font-bold text-emerald-600">${totalProfit.toLocaleString('ru-RU')} ₽</div></div>
                            <div class="bg-white rounded-lg p-2 border border-violet-100 text-center"><div class="text-[10px] text-gray-500">Маржа</div><div class="text-base font-bold text-violet-600">${totalPurchase > 0 ? ((totalProfit / totalPurchase) * 100).toFixed(1) : 0}%</div></div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-lg border border-gray-200 p-4">
                        <h3 class="text-sm font-semibold text-gray-800 mb-3 flex items-center gap-2">${icons.dollar}Настройки</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="flex items-center justify-between bg-gray-50 px-3 py-2 rounded-lg border">
                                <label class="text-xs text-gray-600">Наценка %</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" value="${defaultMarkup}" onchange="defaultMarkup=parseFloat(this.value)||25;save(KEYS.DEFAULT_MARKUP,defaultMarkup);render()" class="input w-14 text-center text-sm font-bold text-blue-700" step="0.1">
                                    <span class="text-xs text-gray-400">%</span>
                                </div>
                            </div>
                            <div class="bg-blue-50 px-3 py-2 rounded-lg border border-blue-200 text-center">
                                <div class="text-[10px] text-gray-500">Индивид.</div>
                                <div class="text-lg font-bold text-blue-700">${individualMarkups}</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 mt-2">
                            <div class="flex items-center justify-between bg-yellow-50 px-2 py-1.5 rounded-lg border border-yellow-200">
                                <label class="text-[10px] text-gray-600">НДС %</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" value="${ndsRate}" onchange="ndsRate=parseFloat(this.value)||0;render()" class="input w-12 text-center text-xs font-bold text-yellow-700" step="0.1">
                                    <span class="text-[10px] text-gray-400">%</span>
                                </div>
                            </div>
                            <div class="flex items-center justify-between bg-orange-50 px-2 py-1.5 rounded-lg border border-orange-200">
                                <label class="text-[10px] text-gray-600">НДФЛ %</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" value="${ndflRate}" onchange="ndflRate=parseFloat(this.value)||0;render()" class="input w-12 text-center text-xs font-bold text-orange-700" step="0.1">
                                    <span class="text-[10px] text-gray-400">%</span>
                                </div>
                            </div>
                            <div class="flex items-center justify-between bg-purple-50 px-2 py-1.5 rounded-lg border border-purple-200">
                                <label class="text-[10px] text-gray-600">Онлайн %</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" value="${onlineFeeRate}" onchange="onlineFeeRate=parseFloat(this.value)||0;render()" class="input w-12 text-center text-xs font-bold text-purple-700" step="0.1">
                                    <span class="text-[10px] text-gray-400">%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Итоговые карточки: НДС, НДФЛ, Онлайн, Чистый доход -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-center">
                        <div class="text-[10px] text-yellow-700 font-medium">НДС к уплате</div>
                        <div class="text-lg font-bold ${totalNdsPayable > 0 ? 'text-yellow-800' : 'text-green-700'}">${totalNdsPayable.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ' ')} ₽</div>
                        <div class="text-[10px] text-yellow-600">Полка ${ndsRate}% − Вход ${ndsRate}%</div>
                    </div>
                    <div class="bg-orange-50 border border-orange-200 rounded-lg p-3 text-center">
                        <div class="text-[10px] text-orange-700 font-medium">НДФЛ</div>
                        <div class="text-lg font-bold text-orange-800">${totalNdfl.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ' ')} ₽</div>
                        <div class="text-[10px] text-orange-600">${ndflRate}% от прибыли</div>
                    </div>
                    <div class="bg-purple-50 border border-purple-200 rounded-lg p-3 text-center">
                        <div class="text-[10px] text-purple-700 font-medium">Онлайн-обслуживание</div>
                        <div class="text-lg font-bold text-purple-800">${totalOnlineFee.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ' ')} ₽</div>
                        <div class="text-[10px] text-purple-600">${onlineFeeRate}% от выручки</div>
                    </div>
                    <div class="bg-emerald-50 border border-emerald-300 rounded-lg p-3 text-center">
                        <div class="text-[10px] text-emerald-700 font-semibold">ЧИСТЫЙ ДОХОД</div>
                        <div class="text-lg font-bold ${totalNetIncome >= 0 ? 'text-emerald-700' : 'text-red-600'}">${totalNetIncome.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ' ')} ₽</div>
                        <div class="text-[10px] text-emerald-600">${totalRevenue > 0 ? ((totalNetIncome / totalRevenue) * 100).toFixed(1) : 0}% от выручки</div>
                    </div>
                </div>
                
                <div class="bg-white rounded-lg border border-gray-200 p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-semibold text-gray-800">Наценки по категориям</h3>
                        <span class="text-[10px] text-gray-400">Серый = средняя по группе, ввод = применить ко всей категории</span>
                    </div>
                    <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2 max-h-[200px] overflow-auto">
                        ${allGroups.map(group => {
                            const groupItems = Object.values(matrix).filter(p => p.group === group);
                            const withPrice = groupItems.filter(p => (p.inPrice || 0) > 0 && ((p.shelfPrice || 0) > 0 || (p.shelf || 0) > 0));
                            let avgMarkup = 0;
                            if (withPrice.length > 0) {
                                const sum = withPrice.reduce((s, p) => {
                                    const sp = p.shelfPrice > 0 ? p.shelfPrice : (p.shelf || 0);
                                    const ip = p.inPrice || 0;
                                    return s + (ip > 0 ? ((sp - ip) / ip * 100) : 0);
                                }, 0);
                                avgMarkup = (sum / withPrice.length).toFixed(1);
                            }
                            const hasCustom = groupMarkups[group] !== undefined;
                            const displayVal = hasCustom ? groupMarkups[group] : '';
                            const phVal = withPrice.length > 0 ? avgMarkup : defaultMarkup;
                            return `<div class="rounded px-2 py-2 text-xs border ${hasCustom ? 'bg-orange-50 border-orange-300' : 'bg-gray-50 border-gray-200'}">
                                <div class="font-medium text-gray-700 break-words leading-tight" style="min-height: 28px; word-break: break-word;">${group}</div>
                                <div class="text-[10px] text-gray-400 mt-0.5">${groupItems.length} тов.${withPrice.length > 0 ? ' · ср. ' + avgMarkup + '%' : ''}</div>
                                <div class="flex items-center gap-1 mt-1">
                                    <input type="number" value="${displayVal}" onchange="updateGroupMarkup('${esc(group)}', this.value)" placeholder="${phVal}" class="input w-14 text-center text-xs font-bold py-0.5" step="0.1">
                                    <span class="text-gray-400 text-[10px]">%</span>
                                </div>
                                ${hasCustom ? '<div class="text-[9px] text-orange-500 mt-0.5">Применена ко всем товарам</div>' : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>
                
                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-sm font-semibold text-gray-800 flex items-center gap-2">${icons.dollar}Цены по товарам</h2>
                        <div class="flex gap-2">
                            <input id="pricesSearchInput" type="text" placeholder="Поиск..." value="${searchPrices}" oninput="debounceSearchPrices(this)" class="input w-40">
                            <button onclick="document.getElementById('pricesImportInput').click()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700">${icons.import} Импорт</button>
                            <button onclick="exportPrices()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт цен</button>
                            <button onclick="saveAllPrices()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-amber-600 rounded-lg hover:bg-amber-700">${icons.save} Сохранить цены</button>
                            <input type="file" id="pricesImportInput" accept=".xlsx,.xls" class="hidden" onchange="importPrices(this)">
                        </div>
                    </div>
                    <div class="mb-2 px-2 py-1.5 bg-sky-50 rounded-md border border-sky-200 text-[11px] text-sky-700">
                        <b>Как читать таблицу:</b> Первые колонки — текущие данные из ассортимента. 
                        <span class="text-yellow-700 font-semibold">НДС</span> = разница между НДС с полки и НДС со входа (к уплате в бюджет). 
                        <span class="text-orange-700 font-semibold">НДФЛ</span> = налог на прибыль. 
                        <span class="text-purple-700 font-semibold">Онлайн</span> = 1% от выручки. 
                        <span class="text-emerald-700 font-semibold">Чистый доход</span> = Прибыль − НДС − НДФЛ − Онлайн.
                        Колонки <span class="text-blue-700 font-semibold">«Новая наценка»</span> — введите процент, чтобы увидеть прогноз.
                    </div>
                    <div class="table-container">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th class="text-left">Группа</th>
                                    <th class="text-left">Наименование</th>
                                    <th class="text-center">Код</th>
                                    <th class="text-center">Вход.<br>цена</th>
                                    <th class="text-center bg-amber-100">Новый<br>вход ₽</th>
                                    <th class="text-center bg-green-100">Цена<br>на полке</th>
                                    <th class="text-center">Доход<br>₽</th>
                                    <th class="text-center bg-yellow-100">НДС<br>к уплате</th>
                                    <th class="text-center bg-orange-100">НДФЛ</th>
                                    <th class="text-center bg-purple-100">Онлайн<br>1%</th>
                                    <th class="text-center bg-emerald-100">Чистый<br>доход ₽</th>
                                    <th class="text-center bg-sky-100">Наценка<br>%</th>
                                    <th class="text-center bg-blue-100">Новая<br>наценка %</th>
                                    <th class="text-center bg-blue-50">Новая<br>цена</th>
                                    <th class="text-center bg-blue-50">Новый<br>чист. доход</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${(() => {
                                    const grouped = {};
                                    Object.entries(matrix).forEach(([code, p]) => {
                                        if (searchPrices && !p.nomenclature?.toLowerCase().includes(searchPrices.toLowerCase()) && !code.includes(searchPrices)) return;
                                        const gr = p.group || 'Без группы';
                                        if (!grouped[gr]) grouped[gr] = [];
                                        grouped[gr].push({ code, ...p });
                                    });
                                    Object.keys(grouped).forEach(gr => {
                                        grouped[gr].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru'));
                                    });
                                    return Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0], 'ru')).map(([gr, items]) => `
                                        <tr class="group-header cursor-pointer" onclick="collapsedG['prices_${esc(gr)}']=!collapsedG['prices_${esc(gr)}'];renderPricesDebounced()">
                                            <td colspan="15" class="text-left py-1 px-2">
                                                <div class="flex items-center gap-2">
                                                    ${collapsedG['prices_' + gr] ? icons.chevronRight : icons.chevronDown}
                                                    <span class="font-semibold">${gr}</span>
                                                    <span class="text-[10px] bg-indigo-200 text-indigo-800 px-1 rounded">${items.length}</span>
                                                </div>
                                            </td>
                                        </tr>
                                        ${collapsedG['prices_' + gr] ? '' : items.map(p => {
                                            const inPrice = p.inPrice || 0;
                                            const markup = p.markup ?? groupMarkups[p.group || ''] ?? defaultMarkup;
                                            const shelfPrice = p.shelfPrice > 0 ? p.shelfPrice : Math.round(inPrice * (1 + markup / 100));
                                            const profit = shelfPrice - inPrice;
                                            // НДС расчёт
                                            const ndsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                                            const ndsOut = ndsRate > 0 ? shelfPrice * ndsRate / (100 + ndsRate) : 0;
                                            const ndsPayable = ndsOut - ndsIn;
                                            // НДФЛ
                                            const ndfl = ndflRate > 0 ? profit * ndflRate / 100 : 0;
                                            // Онлайн 1%
                                            const onlineFee = onlineFeeRate > 0 ? shelfPrice * onlineFeeRate / 100 : 0;
                                            // Чистый доход
                                            const netIncome = profit - ndsPayable - ndfl - onlineFee;
                                            // Новая наценка
                                            const newMarkupKey = 'newMarkup_' + p.code;
                                            const newMarkupVal = newMarkupEdits[newMarkupKey];
                                            const hasNewMarkup = newMarkupVal !== undefined && newMarkupVal !== '';
                                            const appliedNewMarkup = hasNewMarkup ? (parseFloat(newMarkupVal) || 0) : null;
                                            let newPrice = '-', newNetIncome = '-';
                                            if (hasNewMarkup && inPrice > 0) {
                                                newPrice = Math.round(inPrice * (1 + appliedNewMarkup / 100));
                                                const newProfit = newPrice - inPrice;
                                                const newNdsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                                                const newNdsOut = ndsRate > 0 ? newPrice * ndsRate / (100 + ndsRate) : 0;
                                                const newNdsPay = newNdsOut - newNdsIn;
                                                const newNdfl = ndflRate > 0 ? newProfit * ndflRate / 100 : 0;
                                                const newOnline = onlineFeeRate > 0 ? newPrice * onlineFeeRate / 100 : 0;
                                                newNetIncome = newProfit - newNdsPay - newNdfl - newOnline;
                                            }
                                            const effectiveMarkup = inPrice > 0 ? ((shelfPrice - inPrice) / inPrice * 100).toFixed(1) : (markup || 0);
                                            return `
                                                <tr class="hover:bg-gray-50">
                                                    <td class="text-left text-[10px] text-gray-500">${p.group || ''}</td>
                                                    <td class="text-left font-medium text-gray-700">${p.nomenclature || ''}</td>
                                                    <td class="text-center font-mono text-[10px] text-gray-500">${p.code}</td>
                                                    <td class="text-center">${inPrice.toLocaleString('ru-RU')} ₽</td>
                                                    <td class="text-center bg-amber-50"><input type="number" step="0.01" value="" placeholder="—" oninput="handleNewInPriceInput(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();applyNewInPrice(this)}" data-code="${esc(p.code)}" data-field="newInPrice" class="input w-16 text-center text-xs font-bold text-amber-700 bg-amber-50" title="Новый вход. Введите и нажмите Enter для сохранения"></td>
                                                    <td class="text-center font-semibold bg-green-50">${shelfPrice.toLocaleString('ru-RU')} ₽</td>
                                                    <td class="text-center font-medium ${profit > 0 ? 'text-emerald-600' : 'text-gray-500'}">${profit.toLocaleString('ru-RU')} ₽</td>
                                                    <td class="text-center text-xs font-medium ${ndsPayable > 0 ? 'text-yellow-700 bg-yellow-50' : 'text-gray-400'}">${ndsPayable > 0 ? ndsPayable.toFixed(2) + ' ₽' : '—'}</td>
                                                    <td class="text-center text-xs font-medium text-orange-700 bg-orange-50">${ndfl > 0 ? ndfl.toFixed(2) + ' ₽' : '—'}</td>
                                                    <td class="text-center text-xs font-medium text-purple-700 bg-purple-50">${onlineFee > 0 ? onlineFee.toFixed(2) + ' ₽' : '—'}</td>
                                                    <td class="text-center font-semibold ${netIncome >= 0 ? 'text-emerald-700 bg-emerald-50' : 'text-red-600 bg-red-50'}">${netIncome.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ')} ₽</td>
                                                    <td class="text-center bg-sky-50 font-semibold text-sky-700 text-xs">${effectiveMarkup}%</td>
                                                    <td class="text-center bg-blue-50"><input type="number" value="${hasNewMarkup ? newMarkupVal : ''}" oninput="handleNewMarkupInput(this)" data-code="${esc(p.code)}" data-field="newMarkup" placeholder="—" class="input w-14 text-center text-xs font-bold text-blue-700"></td>
                                                    <td class="text-center font-semibold ${hasNewMarkup ? (newPrice > shelfPrice ? 'text-emerald-700' : newPrice < shelfPrice ? 'text-red-600' : 'text-gray-700') : 'text-gray-400'}">${hasNewMarkup ? newPrice.toLocaleString('ru-RU') + ' ₽' : '—'}</td>
                                                    <td class="text-center font-semibold ${hasNewMarkup ? (newNetIncome >= netIncome ? 'text-emerald-700' : 'text-red-600') : 'text-gray-400'}">${hasNewMarkup && typeof newNetIncome === 'number' ? newNetIncome.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽' : '—'}</td>
                                                </tr>`;
                                        }).join('')}
                                    `).join('');
                                })()}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        function updateGroupMarkup(group, value) {
            if (value === '' || value === null) {
                delete groupMarkups[group];
            } else {
                const newMarkup = parseFloat(value) || 0;
                groupMarkups[group] = newMarkup;
                // Применить наценку ко ВСЕМ товарам в категории
                Object.entries(matrix).forEach(([code, p]) => {
                    if (p.group === group) {
                        p.markup = newMarkup;
                        // Пересчитать цену на полку
                        if (p.inPrice > 0) {
                            p.shelfPrice = Math.round(p.inPrice * (1 + newMarkup / 100));
                        }
                    }
                });
                save(KEYS.ASSORTMENT, matrix);
            }
            save(KEYS.GROUP_MARKUPS, groupMarkups);
            render();
        }

        function updateProductMarkup(code, value) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            if (!product) return;
            if (value === '' || value === null) delete product.markup;
            else product.markup = parseFloat(value) || 0;
            save(KEYS.ASSORTMENT, matrix);
            render();
        }

        // === ЖИВОЕ ОБНОВЛЕНИЕ «НОВЫЙ ВХОД» (применяется по Enter) ===
        function handleNewInPriceInput(inputEl) {
            const code = inputEl.dataset.code;
            if (!code) return;
            const row = inputEl.closest('tr');
            if (!row) return;
            const cells = row.querySelectorAll('td');
            const val = parseFloat(inputEl.value);
            const product = matrix[code] || matrix[normCode(code)];
            if (!product) return;

            // При вводе значения — показываем предпросмотр без сохранения
            const currentInPrice = product.inPrice || 0;
            const markup = product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup;

            if (isNaN(val) || val <= 0) {
                // Вернуть текущие значения
                const shelfPrice = product.shelfPrice > 0 ? product.shelfPrice : Math.round(currentInPrice * (1 + markup / 100));
                cells[5].innerHTML = shelfPrice.toLocaleString('ru-RU') + ' ₽';
                cells[5].className = 'text-center font-semibold bg-green-50';
                return;
            }

            // Предпросмотр: новая цена на полке
            const newShelfPrice = Math.round(val * (1 + markup / 100));
            const newProfit = newShelfPrice - val;
            const ndsIn = ndsRate > 0 ? val * ndsRate / (100 + ndsRate) : 0;
            const ndsOut = ndsRate > 0 ? newShelfPrice * ndsRate / (100 + ndsRate) : 0;
            const ndsPay = ndsOut - ndsIn;
            const ndfl = ndflRate > 0 ? newProfit * ndflRate / 100 : 0;
            const onlineFee = onlineFeeRate > 0 ? newShelfPrice * onlineFeeRate / 100 : 0;
            const netInc = newProfit - ndsPay - ndfl - onlineFee;

            cells[5].innerHTML = '<span class="text-amber-700">' + newShelfPrice.toLocaleString('ru-RU') + ' ₽</span>';
            cells[5].className = 'text-center font-semibold bg-amber-50';
            cells[6].innerHTML = '<span class="' + (newProfit > 0 ? 'text-emerald-600' : 'text-gray-500') + '">' + newProfit.toLocaleString('ru-RU') + ' ₽</span>';
            cells[7].innerHTML = ndsPay > 0 ? '<span class="text-yellow-700 bg-yellow-50">' + ndsPay.toFixed(2) + ' ₽</span>' : '—';
            cells[8].innerHTML = ndfl > 0 ? '<span class="text-orange-700 bg-orange-50">' + ndfl.toFixed(2) + ' ₽</span>' : '—';
            cells[9].innerHTML = onlineFee > 0 ? '<span class="text-purple-700 bg-purple-50">' + onlineFee.toFixed(2) + ' ₽</span>' : '—';
            cells[10].innerHTML = '<span class="font-semibold ' + (netInc >= 0 ? 'text-emerald-700 bg-emerald-50' : 'text-red-600 bg-red-50') + '">' + netInc.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽</span>';
        }

        // Применение нового входа по Enter (сохраняет в ассортимент)
        function applyNewInPrice(inputEl) {
            const code = inputEl.dataset.code;
            if (!code) return;
            const val = parseFloat(inputEl.value);
            if (isNaN(val) || val <= 0) return;
            const product = matrix[code] || matrix[normCode(code)];
            if (!product) return;
            product.inPrice = val;
            product.price = val;
            // Пересчитать цену на полку
            const markup = product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup;
            product.shelfPrice = Math.round(val * (1 + markup / 100));
            save(KEYS.ASSORTMENT, matrix);
            inputEl.value = '';
            render();
        }

        // === ЖИВОЕ ОБНОВЛЕНИЕ «НОВАЯ НАЦЕНКА» (без полного рендера) ===
        function handleNewMarkupInput(inputEl) {
            const code = inputEl.dataset.code;
            if (!code) return;
            const key = 'newMarkup_' + code;
            const val = inputEl.value;
            const row = inputEl.closest('tr');
            if (!row) return;

            if (val === '' || val === null) {
                delete newMarkupEdits[key];
            } else {
                newMarkupEdits[key] = val;
            }

            const product = matrix[code];
            const inPrice = product ? (product.inPrice || 0) : 0;
            const markup = product ? (product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup) : defaultMarkup;
            const shelfPrice = product && product.shelfPrice > 0 ? product.shelfPrice : Math.round(inPrice * (1 + markup / 100));
            const effectiveMarkup = inPrice > 0 ? Math.round(((shelfPrice - inPrice) / inPrice) * 100) : markup;
            const profit = shelfPrice - inPrice;

            const cells = row.querySelectorAll('td');
            // cells[11] = наценка % (авто), cells[12] = новая наценка (input), cells[13] = новая цена, cells[14] = новый чист. доход
            if (val === '' || !inPrice) {
                cells[13].innerHTML = '—';
                cells[13].className = 'text-center font-semibold text-gray-400';
                cells[14].innerHTML = '—';
                cells[14].className = 'text-center font-semibold text-gray-400';
                return;
            }

            const appliedNewMarkup = parseFloat(val) || 0;
            const newPrice = Math.round(inPrice * (1 + appliedNewMarkup / 100));
            const newProfit = newPrice - inPrice;
            const currentProfit = shelfPrice - inPrice;

            // Расчёт нового чистого дохода с НДС, НДФЛ, Онлайн
            const curNdsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
            const curNdsOut = ndsRate > 0 ? shelfPrice * ndsRate / (100 + ndsRate) : 0;
            const curNdsPay = curNdsOut - curNdsIn;
            const curNdfl = ndflRate > 0 ? currentProfit * ndflRate / 100 : 0;
            const curOnline = onlineFeeRate > 0 ? shelfPrice * onlineFeeRate / 100 : 0;
            const curNet = currentProfit - curNdsPay - curNdfl - curOnline;

            const newNdsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
            const newNdsOut = ndsRate > 0 ? newPrice * ndsRate / (100 + ndsRate) : 0;
            const newNdsPay = newNdsOut - newNdsIn;
            const newNdfl = ndflRate > 0 ? newProfit * ndflRate / 100 : 0;
            const newOnline = onlineFeeRate > 0 ? newPrice * onlineFeeRate / 100 : 0;
            const newNet = newProfit - newNdsPay - newNdfl - newOnline;

            const priceClass = newPrice > shelfPrice ? 'text-emerald-700' : newPrice < shelfPrice ? 'text-red-600' : 'text-gray-700';
            const netClass = newNet >= curNet ? 'text-emerald-700' : 'text-red-600';

            cells[13].innerHTML = newPrice.toLocaleString('ru-RU') + ' ₽';
            cells[13].className = 'text-center font-semibold ' + priceClass;
            cells[14].innerHTML = newNet.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽';
            cells[14].className = 'text-center font-semibold ' + netClass;
        }

        // === СОХРАНИТЬ ЦЕНЫ (массовое применение новых входов и наценок) ===
        function saveAllPrices() {
            let updatedInPrice = 0, updatedMarkup = 0, skipped = 0;

            // 1. Собрать незакоммиченные «Новый вход» из DOM
            document.querySelectorAll('input[data-field="newInPrice"]').forEach(function(inputEl) {
                const code = inputEl.dataset.code;
                if (!code) return;
                const val = parseFloat(inputEl.value);
                if (isNaN(val) || val <= 0) { skipped++; return; }
                const product = matrix[code] || matrix[normCode(code)];
                if (!product) { skipped++; return; }
                const oldInPrice = product.inPrice || 0;
                if (val === oldInPrice) { skipped++; return; }
                product.inPrice = val;
                product.price = val;
                // Пересчитать полку по текущей наценке
                const markup = product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup;
                if (val > 0) {
                    product.shelfPrice = Math.round(val * (1 + markup / 100));
                }
                updatedInPrice++;
                inputEl.value = '';
            });

            // 2. Применить «Новая наценка» из newMarkupEdits
            Object.entries(newMarkupEdits).forEach(function([key, val]) {
                if (val === '' || val === null) return;
                const code = key.replace('newMarkup_', '');
                const product = matrix[code] || matrix[normCode(code)];
                if (!product) return;
                const newMarkup = parseFloat(val);
                if (isNaN(newMarkup)) return;
                product.markup = newMarkup;
                if ((product.inPrice || 0) > 0) {
                    product.shelfPrice = Math.round(product.inPrice * (1 + newMarkup / 100));
                }
                updatedMarkup++;
            });

            // 3. Сохранить и синхронизировать
            if (updatedInPrice === 0 && updatedMarkup === 0) {
                alert('Нет новых цен для сохранения');
                return;
            }

            newMarkupEdits = {};
            save(KEYS.ASSORTMENT, matrix);
            syncToSavedAssortment();
            render();

            let msg = 'Сохранено:\n';
            if (updatedInPrice > 0) msg += '  Вход. цены: ' + updatedInPrice + ' тов.\n';
            if (updatedMarkup > 0) msg += '  Наценки: ' + updatedMarkup + ' тов.\n';
            msg += '\nДанные синхронизированы во всех разделах.';
            alert(msg);
        }

        function importPrices(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                    if (rows.length < 2) { alert('Файл пуст'); return; }
                    const headers = rows[0].map(h => String(h || '').trim().toLowerCase());
                    const codeIdx = headers.findIndex(h => h === 'код');
                    const inPriceIdx = headers.findIndex(h => h.includes('вход'));
                    const markupIdx = headers.findIndex(h => h.includes('наценка'));
                    if (codeIdx < 0) { alert('Не найдена колонка "Код" в файле'); return; }
                    let updated = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const r = rows[i];
                        if (!r[codeIdx]) continue;
                        const code = String(r[codeIdx]).trim();
                        const normC = normCode(code);
                        const product = matrix[normC] || matrix[code];
                        if (!product) continue;
                        if (inPriceIdx >= 0 && r[inPriceIdx] !== undefined && r[inPriceIdx] !== '') {
                            product.inPrice = parseFloat(r[inPriceIdx]) || 0;
                            product.price = product.inPrice;
                            // Пересчитать цену на полку
                            const markup = product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup;
                            if (product.inPrice > 0) {
                                product.shelfPrice = Math.round(product.inPrice * (1 + markup / 100));
                            }
                        }
                        if (markupIdx >= 0 && r[markupIdx] !== undefined && r[markupIdx] !== '') {
                            const val = parseFloat(r[markupIdx]);
                            if (!isNaN(val)) {
                                product.markup = val;
                                if (product.inPrice > 0) {
                                    product.shelfPrice = Math.round(product.inPrice * (1 + val / 100));
                                }
                            }
                        }
                        updated++;
                    }
                    save(KEYS.ASSORTMENT, matrix);
                    render();
                    alert('Обновлено ' + updated + ' товаров');
                } catch (err) { alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        function exportPrices() {
            const headers = ['Группа', 'Наименование', 'Код', 'Вход. цена', 'Цена на полке', 'Доход ₽', 'НДС к уплате', 'НДФЛ', 'Онлайн 1%', 'Чистый доход ₽', 'Новая наценка %', 'Новая цена', 'Новый чист. доход ₽'];
            const data = [];
            Object.entries(matrix).forEach(([code, p]) => {
                const inPrice = p.inPrice || 0;
                const markup = p.markup ?? groupMarkups[p.group || ''] ?? defaultMarkup;
                const shelfPrice = p.shelfPrice > 0 ? p.shelfPrice : Math.round(inPrice * (1 + markup / 100));
                const profit = shelfPrice - inPrice;
                const ndsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                const ndsOut = ndsRate > 0 ? shelfPrice * ndsRate / (100 + ndsRate) : 0;
                const ndsPayable = ndsOut - ndsIn;
                const ndfl = ndflRate > 0 ? profit * ndflRate / 100 : 0;
                const onlineFee = onlineFeeRate > 0 ? shelfPrice * onlineFeeRate / 100 : 0;
                const netIncome = profit - ndsPayable - ndfl - onlineFee;
                // Новая наценка
                const newMarkupKey = 'newMarkup_' + code;
                const newMarkupVal = newMarkupEdits[newMarkupKey];
                const hasNewMarkup = newMarkupVal !== undefined && newMarkupVal !== '' && inPrice > 0;
                let newPrice = '', newNetIncome = '', newMarkupStr = '';
                if (hasNewMarkup) {
                    const nm = parseFloat(newMarkupVal) || 0;
                    newPrice = Math.round(inPrice * (1 + nm / 100));
                    const newProfit = newPrice - inPrice;
                    const nNdsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                    const nNdsOut = ndsRate > 0 ? newPrice * ndsRate / (100 + ndsRate) : 0;
                    const nNdsPay = nNdsOut - nNdsIn;
                    const nNdfl = ndflRate > 0 ? newProfit * ndflRate / 100 : 0;
                    const nOnline = onlineFeeRate > 0 ? newPrice * onlineFeeRate / 100 : 0;
                    newNetIncome = (newProfit - nNdsPay - nNdfl - nOnline).toFixed(2);
                    newMarkupStr = nm + '%';
                }
                data.push([p.group || '', p.nomenclature || '', code, inPrice, shelfPrice, profit.toFixed(2), ndsPayable.toFixed(2), ndfl.toFixed(2), onlineFee.toFixed(2), netIncome.toFixed(2), newMarkupStr, newPrice !== '' ? newPrice : '', newNetIncome !== '' ? newNetIncome : '']);
            });
            const ws = SharedUtils.createStyledSheet(data, headers, [0, 1]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Цены');
            const d = new Date(); XLSX.writeFile(wb, `цены_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        // === DEBOUNCE ПОИСКА ===

        // === ЗАКАЗ ===
        function roundOrderQty(rawOrder, quant) {
            if (rawOrder <= 2) return 0;
            return Math.max(quant, Math.round(rawOrder / quant) * quant);
        }

        function calcOrder(stock, avgDay, periodDays, quant, shelf, packaging) {
            const minStock = shelf || 0;
            const prelim = stock - (avgDay * periodDays) - minStock;

            if (prelim > 1) return 0;

            let rawOrder;
            if (prelim < 0) {
                rawOrder = Math.abs(prelim);
            } else {
                rawOrder = 1;
            }

            if (packaging === 'КГ') {
                return Math.ceil(rawOrder / quant) * quant;
            }

            return roundOrderQty(rawOrder, quant);
        }

        function renderOrder() {
            if (Object.keys(matrix).length === 0 || stores.length === 0) {
                const missing = [];
                if (Object.keys(matrix).length === 0) missing.push({ label: 'Ассортимент', tab: 'upload' });
                if (stores.length === 0) missing.push({ label: 'Магазины (ТТ)', tab: 'upload' });
                if (stocks.length === 0) missing.push({ label: 'Остатки на ТТ', tab: 'upload' });

                return `
                    <div class="bg-white rounded-lg border border-gray-200 p-4">
                        <div class="text-center py-12">
                            ${icons.order}
                            <h3 class="text-lg font-semibold text-gray-700 mt-4">Не хватает данных для расчёта заказа</h3>
                            <div class="flex flex-wrap justify-center gap-3 mt-4">
                                ${missing.map(m => `
                                    <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-center">
                                        <p class="text-sm font-medium text-red-700">❌ ${m.label}</p>
                                        <button onclick="tab='${m.tab}';render()" class="mt-1 text-xs text-blue-600 hover:underline">Загрузить →</button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex flex-wrap justify-center gap-3 mt-4">
                                ${Object.keys(matrix).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Ассортимент загружен</span>' : ''}
                                ${stores.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Магазины загружены</span>' : ''}
                                ${stocks.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Остатки загружены</span>' : ''}
                                ${sales.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Продажи загружены</span>' : ''}
                                ${Object.keys(matrixMarks).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Матрица загружена</span>' : ''}
                            </div>
                            <button onclick="tab='upload';render()" class="mt-6 btn inline-flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700">
                                ${icons.upload} Перейти к загрузке данных
                            </button>
                        </div>
                    </div>`;
            }

            // Карта остатков по ТТ и коду
            const stockMap = new Map();
            stocks.forEach(s => stockMap.set(`${s.tt}_${s.code}`, s));

            // Карта продаж по ТТ и коду
            const salesByTTCode = {};
            const nameToCode = {};
            Object.entries(matrix).forEach(([code, p]) => {
                if (p.nomenclature) nameToCode[p.nomenclature.trim().toLowerCase()] = code;
            });
            sales.forEach(s => {
                if (!s.tt) return;
                if (s.code) {
                    const key = `${s.tt}_${normCode(s.code)}`;
                    salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                } else if (s.name) {
                    const normName = s.name.trim().toLowerCase();
                    let code = nameToCode[normName];
                    if (!code) {
                        const entry = Object.entries(nameToCode).find(([name, c]) => name.includes(normName) || normName.includes(name));
                        if (entry) code = entry[1];
                    }
                    if (code) {
                        const key = `${s.tt}_${code}`;
                        salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                    }
                }
            });

            const results = [];
            stores.forEach(store => {
                Object.entries(matrix).forEach(([code, p]) => {
                    const key = `${store.tt}_${code}`;
                    const stockData = stockMap.get(key);
                    const codeInMatrix = !!matrixMarks[code];
                    const markForTT = codeInMatrix ? (matrixMarks[code][store.tt] || 'НЕТ') : null;
                    const matrixDA = markForTT === 'ДА';

                    // Товар вне матрицы — не попадает в формирование заказа
                    if (!matrixDA) return;

                    const packaging = p.packaging || 'ШТ';
                    const quant = p.quant || 1;
                    const shelf = p.shelf || 0;
                    const unitLabel = packaging === 'КГ' ? 'кг' : 'шт';
                    const minOrderBase = packaging === 'КГ' ? 0.5 : 4;
                    const editKey = `${store.tt}_${code}`;

                    if (!stockData) {
                        // Нет данных остатков — минимальный заказ по упаковке
                        const minOrder = packaging === 'КГ'
                            ? Math.ceil(minOrderBase / quant) * quant
                            : Math.max(quant, Math.round(minOrderBase / quant) * quant);
                        const editedOrder = orderEdits[editKey] !== undefined ? orderEdits[editKey] : minOrder;
                        results.push({ tt: store.tt, code, nomenclature: p.nomenclature || '', group: p.group || '', currentStock: 0, sales: salesByTTCode[key] || 0, daysPresent: 0, avgSalesPerDay: 0, order: editedOrder, quant, shelf, packaging, inPrice: p.inPrice || 0, sum: editedOrder * (p.inPrice || 0), status: editedOrder > 0 ? `мин. заказ ${editedOrder} ${unitLabel}` : 'достаточно', statusType: 'minOrder', isAssortment: false });
                        return;
                    }

                    const currentStock = stockData.currentStock || 0;
                    const totalSales = salesByTTCode[key] || 0;
                    const daysPresent = stockData.daysPresent || 0;
                    const avgSalesPerDay = daysPresent > 0 ? totalSales / daysPresent : 0;

                    if (currentStock === 0 && totalSales === 0) {
                        // Остаток=0 и продажи=0 — минимальный заказ
                        const minOrder = packaging === 'КГ'
                            ? Math.ceil(minOrderBase / quant) * quant
                            : Math.max(quant, Math.round(minOrderBase / quant) * quant);
                        const editedOrder = orderEdits[editKey] !== undefined ? orderEdits[editKey] : minOrder;
                        results.push({ tt: store.tt, code, nomenclature: p.nomenclature || stockData.name || '', group: p.group || '', currentStock: 0, sales: 0, daysPresent, avgSalesPerDay: parseFloat(avgSalesPerDay.toFixed(3)), order: editedOrder, quant, shelf, packaging, inPrice: p.inPrice || 0, sum: editedOrder * (p.inPrice || 0), status: editedOrder > 0 ? `мин. заказ ${editedOrder} ${unitLabel}` : 'достаточно', statusType: 'minOrder', isAssortment: false });
                        return;
                    }

                    if (totalSales === 0) {
                        // Остаток есть, но продаж нет — заказ не делается
                        results.push({ tt: store.tt, code, nomenclature: p.nomenclature || stockData.name || '', group: p.group || '', currentStock, sales: 0, daysPresent, avgSalesPerDay: 0, order: 0, quant, shelf, packaging, inPrice: p.inPrice || 0, sum: 0, status: 'хватает (нет продаж)', statusType: 'ok', isAssortment: false });
                        return;
                    }

                    // Нормальный расчёт заказа (с учётом полки и округлением до кванта)
                    let order = calcOrder(currentStock, avgSalesPerDay, period, quant, shelf, packaging);
                    if (orderEdits[editKey] !== undefined) order = orderEdits[editKey];
                    order = Math.round(order * 100) / 100; // округление float
                    const sum = order * (p.inPrice || 0);
                    const statusText = order > 0 ? `заказ ${order} ${unitLabel}` : 'хватает';
                    results.push({ tt: store.tt, code, nomenclature: p.nomenclature || stockData.name || '', group: p.group || '', currentStock, sales: totalSales, daysPresent, avgSalesPerDay: parseFloat(avgSalesPerDay.toFixed(3)), order, quant, shelf, packaging, inPrice: p.inPrice || 0, sum, status: statusText, statusType: order > 0 ? 'order' : 'ok', isAssortment: false });
                });
            });

            // Фильтрация
            let filtered = results;
            if (searchResults) {
                const s = searchResults.toLowerCase();
                filtered = filtered.filter(r => r.nomenclature?.toLowerCase().includes(s) || r.code?.includes(s) || r.group?.toLowerCase().includes(s));
            }
            if (filterTT) filtered = filtered.filter(r => r.tt === filterTT);
            if (filterGroup) filtered = filtered.filter(r => r.group === filterGroup);
            if (filterStatus === 'orders') filtered = filtered.filter(r => r.order > 0);
            else if (filterStatus === 'minOrder') filtered = filtered.filter(r => r.statusType === 'minOrder');
            else if (filterStatus === 'ok') filtered = filtered.filter(r => r.statusType === 'ok');

            // Группировка: ТТ → Группа товара → товары
            const groupedTT = {};
            filtered.forEach(r => {
                if (!groupedTT[r.tt]) groupedTT[r.tt] = {};
                const gr = r.group || 'Без группы';
                if (!groupedTT[r.tt][gr]) groupedTT[r.tt][gr] = [];
                groupedTT[r.tt][gr].push(r);
            });

            // Сортировка внутри каждой группы
            Object.keys(groupedTT).forEach(tt => {
                const groups = groupedTT[tt];
                const sortedGroups = Object.entries(groups).sort(([gA, itemsA], [gB, itemsB]) => {
                    const hasMinA = itemsA.some(i => i.statusType === 'minOrder');
                    const hasMinB = itemsB.some(i => i.statusType === 'minOrder');
                    if (hasMinA !== hasMinB) return hasMinA ? -1 : 1;
                    return gA.localeCompare(gB, 'ru');
                });
                groupedTT[tt] = Object.fromEntries(sortedGroups);
            });

            const stats = { total: filtered.length, toOrder: filtered.filter(r => r.order > 0).length, minOrder: filtered.filter(r => r.statusType === 'minOrder').length, ok: filtered.filter(r => r.statusType === 'ok').length, sum: filtered.reduce((s, r) => s + r.sum, 0) };
            const allGroups = getAllGroups();

            // Сохраняем результаты расчёта заказа
            savedOrderResults = filtered;
            savedOrderStats = stats;

            return `<div class="space-y-3">
                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="flex justify-between items-center flex-wrap gap-3">
                        <div class="flex gap-3 items-center flex-wrap">
                            <div class="flex items-center gap-2 bg-gray-50 px-3 py-2 rounded-md border">
                                <label class="text-xs text-gray-600">Период:</label>
                                <input type="number" value="${period}" onchange="period=parseInt(this.value)||21" class="input w-14 text-center" min="1" max="60">
                                <span class="text-xs text-gray-500">дней</span>
                            </div>
                            <div class="bg-sky-100 text-sky-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">ПОЗИЦИЙ</div><div class="text-lg font-bold">${stats.total}</div></div>
                            <div class="bg-emerald-100 text-emerald-800 rounded-md px-3 py-1.5"><div class="text-[10px opacity-70">К ЗАКАЗУ</div><div class="text-lg font-bold">${stats.toOrder}</div></div>
                            <div class="bg-amber-100 text-amber-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">МИН. ЗАКАЗ</div><div class="text-lg font-bold">${stats.minOrder}</div></div>
                            <div class="bg-gray-100 text-gray-600 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">ХВАТАЕТ</div><div class="text-lg font-bold">${stats.ok}</div></div>
                            <div class="bg-violet-100 text-violet-800 rounded-md px-3 py-1.5 cursor-pointer hover:bg-violet-200 transition-colors" onclick="showOrderSumsByStore(this)" title="Нажмите для сумм по магазинам"><div class="text-[10px] opacity-70">СУММА</div><div class="text-lg font-bold">${stats.sum.toFixed(0)} ₽</div></div>
                        </div>
                        <div class="flex gap-2">
                            ${savedOrdersList.length > 0 ? '<button onclick="showSavedOrdersList()" class="btn px-3 py-2 text-sm font-medium text-violet-700 bg-violet-50 border border-violet-200 rounded-md hover:bg-violet-100">' + icons.order + ' Мои заказы (' + savedOrdersList.length + ')</button>' : ''}
                            ${viewingOrderIdx !== null && savedOrdersList[viewingOrderIdx] ? '<div class="bg-violet-50 border border-violet-200 text-violet-800 rounded-md px-3 py-1.5 text-xs">Просмотр: <b>' + esc(savedOrdersList[viewingOrderIdx].name) + '</b> от ' + esc(savedOrdersList[viewingOrderIdx].date) + '</div>' : ''}
                            <button onclick="placeOrders()" class="btn px-4 py-2 text-sm font-medium text-white bg-emerald-600 rounded-md hover:bg-emerald-700">${icons.order} Сформировать заказ</button>
                            <button onclick="clearSavedOrder()" class="btn px-3 py-2 text-sm font-medium text-gray-600 bg-gray-100 border border-gray-200 rounded-md hover:bg-gray-200">${icons.refresh} Сбросить</button>
                            <button onclick="exportOrder()" class="btn px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">${icons.export} Экспорт</button>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="flex flex-wrap gap-2 items-center">
                        <input id="orderSearchInput" type="text" placeholder="Поиск..." value="${searchResults}" oninput="debounceSearchResults(this)" class="input w-40">
                        <select onchange="filterGroup=this.value;render()" class="input bg-white"><option value="">Все категории</option>${allGroups.map(g => `<option value="${g}" ${filterGroup === g ? 'selected' : ''}>${g}</option>`).join('')}</select>
                        <select onchange="filterTT=this.value;render()" class="input bg-white"><option value="">Все ТТ</option>${stores.map(s => `<option value="${s.tt}" ${filterTT === s.tt ? 'selected' : ''}>${s.tt}</option>`).join('')}</select>
                        <select onchange="filterStatus=this.value;render()" class="input bg-white">
                            <option value="">Все статусы</option>
                            <option value="orders" ${filterStatus === 'orders' ? 'selected' : ''}>С заказом</option>
                            <option value="minOrder" ${filterStatus === 'minOrder' ? 'selected' : ''}>Мин. заказ</option>
                            <option value="ok" ${filterStatus === 'ok' ? 'selected' : ''}>Хватает</option>
                        </select>
                    </div>
                </div>
                
                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="table-container">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th class="text-left sticky left-0 bg-gray-50 z-20">Наименование</th>
                                    <th class="text-center">Код</th>
                                    <th class="text-center cursor-pointer" title="Нажмите для расчёта">Продажи</th>
                                    <th class="text-center">Дней</th>
                                    <th class="text-center">Ср./день</th>
                                    <th class="text-center">Остаток</th>
                                    <th class="text-center bg-emerald-100">Заказ</th>
                                    <th class="text-center">Статус</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${Object.entries(groupedTT).map(([tt, groups]) => `
                                    <tr class="bg-sky-50 cursor-pointer hover:bg-sky-100" onclick="collapsedTT['${esc(tt)}']=!collapsedTT['${esc(tt)}'];render()">
                                        <td colspan="8" class="text-left font-semibold text-sky-800"><span class="inline-flex items-center gap-1">${collapsedTT[tt] ? icons.chevronRight : icons.chevronDown}${icons.mapPin}${tt}<span class="font-normal text-sky-600">(${Object.values(groups).reduce((s, items) => s + items.length, 0)} поз.)</span></span></td>
                                    </tr>
                                    ${collapsedTT[tt] ? '' : Object.entries(groups).map(([gr, items]) => `
                                        <tr class="group-header cursor-pointer" onclick="collapsedG['order_${esc(tt)}_${esc(gr)}']=!collapsedG['order_${esc(tt)}_${esc(gr)}'];render()">
                                            <td colspan="8" class="text-left py-1 px-2">
                                                <div class="flex items-center gap-2">
                                                    ${collapsedG['order_' + tt + '_' + gr] ? icons.chevronRight : icons.chevronDown}
                                                    <span class="font-semibold text-indigo-800">${gr}</span>
                                                    <span class="text-[10px] bg-indigo-200 text-indigo-800 px-1 rounded">${items.length}</span>
                                                </div>
                                            </td>
                                        </tr>
                                        ${collapsedG['order_' + tt + '_' + gr] ? '' : items.map(r => {
                                            let rowClass = '';
                                            let statusClass = 'text-gray-500';
                                            if (r.statusType === 'minOrder') { rowClass = 'bg-amber-50'; statusClass = 'text-amber-700'; }
                                            else if (r.statusType === 'order') { rowClass = 'bg-emerald-50'; statusClass = 'text-emerald-600'; }
                                            else if (r.statusType === 'ok') { rowClass = ''; statusClass = 'text-gray-500'; }
                                            return `
                                            <tr class="${rowClass} hover:bg-gray-100">
                                                <td class="sticky left-0 bg-white text-left">${r.nomenclature}</td>
                                                <td class="text-center font-mono text-xs text-gray-600">${r.code}</td>
                                                <td class="text-center cursor-pointer hover:underline hover:text-blue-600" onclick="event.stopPropagation();showCalcDetail(this, ${JSON.stringify(r).replace(/"/g, '&quot;')})">${r.sales.toFixed(0)}</td>
                                                <td class="text-center text-xs text-gray-600">${r.daysPresent || '-'}</td>
                                                <td class="text-center">${r.avgSalesPerDay.toFixed(2)}</td>
                                                <td class="text-center">${r.currentStock.toFixed(2)}</td>
                                                <td class="text-center font-semibold ${r.statusType === 'minOrder' ? 'bg-amber-100' : r.statusType === 'order' ? 'bg-emerald-100' : ''}">
                                                    <input type="number" value="${r.order}" data-tt="${esc(r.tt)}" data-code="${esc(r.code)}" onchange="editOrder(this)" class="input w-16 text-center text-sm font-bold">
                                                </td>
                                                <td class="text-center text-xs font-medium ${statusClass}">${r.status}</td>
                                            </tr>`;
                                        }).join('')}
                                    `).join('')}
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        function editOrder(input) {
            const newOrder = parseFloat(input.value) || 0;
            const tt = input.dataset.tt;
            const code = input.dataset.code;
            const editKey = `${tt}_${code}`;
            orderEdits[editKey] = newOrder;
            const p = matrix[code];
            const newSum = newOrder * (p ? p.inPrice || 0 : 0);
            const row = input.closest('tr');
            if (row) {
                const statusTd = row.querySelector('td:last-child');
                if (statusTd) {
                    const packaging = p ? p.packaging || 'ШТ' : 'ШТ';
                    const unitLabel = packaging === 'КГ' ? 'кг' : 'шт';
                    const key = `${tt}_${code}`;
                    const stockMapLocal = new Map();
                    stocks.forEach(s => stockMapLocal.set(`${s.tt}_${s.code}`, s));
                    const stockData = stockMapLocal.get(key);
                    const totalSales = 0;
                    const isMinOrder = !stockData || (stockData.currentStock === 0 && totalSales === 0);
                    if (newOrder > 0) {
                        statusTd.textContent = isMinOrder ? `мин. заказ ${newOrder} ${unitLabel}` : `заказ ${newOrder} ${unitLabel}`;
                    } else {
                        statusTd.textContent = 'хватает';
                    }
                }
            }
        }

        // === Сохранение заказа (множественное) ===
        function cleanupOldOrders() {
            var list = load(KEYS.SAVED_ORDERS_LIST, []);
            var changed = false;
            list = list.filter(function(o) {
                if (!o.createdAt) return false;
                var age = Date.now() - new Date(o.createdAt).getTime();
                if (age >= 14 * 86400000) { changed = true; return false; }
                return true;
            });
            if (changed) SharedUtils.save(KEYS.SAVED_ORDERS_LIST, list);
            return list;
        }

        function placeOrders() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для заказа. Сначала откройте вкладку Заказ.');
                return;
            }

            // Формируем сводку по поставщикам
            var supplierGroups = {};
            var totalOrderItems = 0, totalSum = 0;
            savedOrderResults.forEach(function(r) {
                if (r.order <= 0) return;
                var sup = (matrix[r.code] || {}).supplier || '—';
                if (!supplierGroups[sup]) supplierGroups[sup] = { count: 0, sum: 0 };
                supplierGroups[sup].count++;
                supplierGroups[sup].sum += r.sum;
                totalOrderItems++;
                totalSum += r.sum;
            });

            // Формируем имя из поставщиков
            var supNames = Object.keys(supplierGroups);
            var defaultName = supNames.length > 0 ? supNames.join(', ') : 'Заказ';
            if (defaultName.length > 50) defaultName = defaultName.substring(0, 47) + '...';

            // Спрашиваем название заказа
            var orderName = prompt('Название заказа:', defaultName);
            if (orderName === null) return; // Отмена
            if (!orderName.trim()) orderName = 'Заказ';
            orderName = orderName.trim();

            // Спрашиваем дату ожидаемой доставки
            var tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            var defDateStr = tomorrow.toISOString().split('T')[0];
            var expectedDateStr = prompt('Ожидаемая дата доставки (ГГГГ-ММ-ДД):', defDateStr);
            var expectedDate = '';
            if (expectedDateStr !== null && expectedDateStr.trim()) {
                var d = new Date(expectedDateStr.trim());
                if (!isNaN(d.getTime())) {
                    expectedDate = d.toISOString().split('T')[0];
                } else {
                    alert('Неверный формат даты — дата доставки не сохранена.\nМожете указать позже в "График доставок".');
                }
            }

            var orderData = {
                name: orderName,
                createdAt: new Date().toISOString(),
                date: new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
                items: savedOrderResults,
                stats: savedOrderStats,
                supplierGroups: supplierGroups,
                totalOrderItems: totalOrderItems,
                totalSum: totalSum,
                orderEdits: Object.assign({}, orderEdits),
                expectedDate: expectedDate
            };

            // Проверяем — может это перезапись просматриваемого заказа?
            if (viewingOrderIdx !== null && savedOrdersList[viewingOrderIdx]) {
                if (!confirm('Перезаписать заказ "' + esc(savedOrdersList[viewingOrderIdx].name) + '" от ' + savedOrdersList[viewingOrderIdx].date + '?\nДля нового нажмите "Отмена" и задайте другое название.')) return;
                orderData.id = savedOrdersList[viewingOrderIdx].id;
                savedOrdersList[viewingOrderIdx] = orderData;
            } else {
                orderData.id = Date.now();
                savedOrdersList.push(orderData);
            }

            save(KEYS.SAVED_ORDERS_LIST, savedOrdersList);
            savedOrderDate = new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            viewingOrderIdx = null;
            alert('Заказ "' + orderName + '" сохранён!\n' + totalOrderItems + ' поз. на сумму ' + totalSum.toFixed(0) + ' ₽' + (expectedDate ? '\nДоставка: ' + expectedDate : ''));
            render();
        }

        function clearSavedOrder() {
            if (viewingOrderIdx !== null && savedOrdersList[viewingOrderIdx]) {
                if (!confirm('Удалить сохранённый заказ "' + esc(savedOrdersList[viewingOrderIdx].name) + '"?')) return;
                savedOrdersList.splice(viewingOrderIdx, 1);
                save(KEYS.SAVED_ORDERS_LIST, savedOrdersList);
            }
            resetSavedOrders();
            render();
        }

        // === Просмотр сохранённых заказов (список) ===
        function showSavedOrdersList() {
            var existing = document.getElementById('savedOrdersModal');
            if (existing) existing.remove();

            var list = savedOrdersList;
            if (list.length === 0) {
                alert('Нет сохранённых заказов.');
                return;
            }

            var modal = document.createElement('div');
            modal.id = 'savedOrdersModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg border border-gray-200 p-6 w-full max-w-2xl shadow-lg max-h-[90vh] flex flex-col" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center mb-4 shrink-0">
                        <h3 class="text-lg font-semibold text-gray-900">${icons.order} Сохранённые заказы (${list.length})</h3>
                        <button onclick="document.getElementById('savedOrdersModal').remove()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
                    </div>
                    <div class="flex-1 overflow-y-auto border rounded-lg divide-y">
                        ${list.map(function(o, idx) {
                            var daysLeft = Math.max(0, 14 - Math.floor((Date.now() - new Date(o.createdAt).getTime()) / 86400000));
                            var supKeys = Object.keys(o.supplierGroups || {});
                            var supInfo = supKeys.length > 0 ? supKeys.map(function(s) { return s + ' (' + (o.supplierGroups[s].count || 0) + ' поз.)'; }).join(', ') : '—';
                            return `
                            <div class="p-4 hover:bg-emerald-50 transition-colors">
                                <div class="flex justify-between items-start gap-3">
                                    <div class="flex-1 min-w-0">
                                        <div class="font-semibold text-gray-900 text-base truncate">${esc(o.name)}</div>
                                        <div class="text-xs text-gray-500 mt-0.5">${esc(o.date)}</div>
                                        <div class="text-xs text-gray-400 mt-1">${esc(supInfo)}</div>
                                    </div>
                                    <div class="flex flex-col items-end gap-1 shrink-0">
                                        <div class="bg-emerald-100 text-emerald-800 rounded px-2 py-0.5 text-xs font-medium">${(o.totalOrderItems || 0)} поз.</div>
                                        <div class="text-sm font-bold text-gray-700">${(o.totalSum || 0).toFixed(0)} ₽</div>
                                        <div class="text-[10px] text-gray-400">ост. ${daysLeft} дн.</div>
                                    </div>
                                </div>
                                <div class="flex gap-2 mt-2">
                                    <button onclick="viewSavedOrder(${idx});document.getElementById('savedOrdersModal').remove()" class="btn px-3 py-1 text-xs font-medium text-white bg-sky-600 rounded hover:bg-sky-700">${icons.search} Просмотр</button>
                                    <button onclick="loadSavedOrderToEdit(${idx});document.getElementById('savedOrdersModal').remove()" class="btn px-3 py-1 text-xs font-medium text-gray-700 bg-gray-100 border border-gray-200 rounded hover:bg-gray-200">${icons.refresh} Редактировать</button>
                                    <button onclick="exportSavedOrder(${idx})" class="btn px-3 py-1 text-xs font-medium text-white bg-blue-600 rounded hover:bg-blue-700">${icons.export} Excel</button>
                                    <button onclick="deleteSavedOrder(${idx})" class="btn px-3 py-1 text-xs font-medium text-red-600 bg-red-50 border border-red-200 rounded hover:bg-red-100">${icons.trash} Удалить</button>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                    <div class="mt-3 text-xs text-gray-400 text-center shrink-0">
                        Заказы хранятся 14 дней, затем удаляются автоматически
                    </div>
                </div>
            `;
            modal.addEventListener('click', function() { modal.remove(); });
            document.body.appendChild(modal);
        }

        function viewSavedOrder(idx) {
            var o = savedOrdersList[idx];
            if (!o) { alert('Заказ не найден'); return; }
            viewingOrderIdx = idx;
            savedOrderResults = o.items;
            savedOrderStats = o.stats;
            orderEdits = o.orderEdits || {};
            savedOrderDate = o.date;
            tab = 'order';
            render();
        }

        function loadSavedOrderToEdit(idx) {
            var o = savedOrdersList[idx];
            if (!o) { alert('Заказ не найден'); return; }
            viewingOrderIdx = idx;
            savedOrderResults = o.items;
            savedOrderStats = o.stats;
            orderEdits = o.orderEdits || {};
            savedOrderDate = o.date;
            tab = 'order';
            render();
            alert('Заказ "' + o.name + '" загружен для редактирования.\nИзмените quantities и нажмите "Сформировать заказ" для перезаписи.');
        }

        function deleteSavedOrder(idx) {
            var o = savedOrdersList[idx];
            if (!o) return;
            if (!confirm('Удалить заказ "' + esc(o.name) + '" от ' + esc(o.date) + '?')) return;
            savedOrdersList.splice(idx, 1);
            save(KEYS.SAVED_ORDERS_LIST, savedOrdersList);
            if (viewingOrderIdx === idx) {
                resetSavedOrders();
            } else if (viewingOrderIdx !== null && viewingOrderIdx > idx) {
                viewingOrderIdx--;
            }
            // Обновляем модалку если открыта
            var modal = document.getElementById('savedOrdersModal');
            if (modal) { modal.remove(); showSavedOrdersList(); }
            else render();
        }

        function exportSavedOrder(idx) {
            var o = savedOrdersList[idx];
            if (!o || !o.items) { alert('Заказ не найден'); return; }
            var rows = [['№ Маг.', 'ТТ', 'Код', 'Наименование', 'Группа', 'Продажи', 'Дней', 'Ср./день', 'Остаток', 'Заказ', 'Сумма', 'Статус']];
            o.items.forEach(function(r) {
                rows.push([r.storeNumber || '', r.tt || '', r.code || '', r.nomenclature || '', r.group || '', (r.sales || 0).toFixed(0), r.daysPresent || 0, (r.avgSalesPerDay || 0).toFixed(3), (r.currentStock || 0).toFixed(2), r.order || 0, (r.sum || 0).toFixed(2), r.status || '']);
            });
            var headers = rows.shift();
            var ws = SharedUtils.createStyledSheet(rows, headers, [0, 1, 2, 3, 11]);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Заказ');
            var safeName = (o.name || 'заказ').replace(/[^a-zA-Zа-яА-Я0-9 _-]/g, '_').substring(0, 30);
            XLSX.writeFile(wb, safeName + '_' + (o.date || '').replace(/[.:]/g, '-') + '.xlsx');
        }

        function showCalcDetail(el, r) {
            document.querySelectorAll('.calc-tooltip').forEach(e => e.remove());

            const projectedSales = (r.avgSalesPerDay * period).toFixed(1);
            const need = Math.max(0, projectedSales - r.currentStock).toFixed(1);
            const totalDays = r.daysPresent || '?';
            const unitLabel = (r.packaging === 'КГ') ? 'кг' : 'шт';

            const tooltip = document.createElement('div');
            tooltip.className = 'calc-tooltip';
            tooltip.style.cssText = 'position:fixed;z-index:100;background:#1f2937;color:#f9fafb;border-radius:8px;padding:10px 14px;font-size:11px;line-height:1.6;box-shadow:0 8px 24px rgba(0,0,0,0.3);min-width:220px;pointer-events:auto;';
            tooltip.innerHTML = `
                <div style="font-weight:700;margin-bottom:4px;color:#93c5fd">${r.nomenclature || r.code}</div>
                <div style="display:grid;grid-template-columns:auto 1fr;gap:1px 10px">

        // === АНАЛИТИКА ===

            }

            // Build lookup: code -> product, name -> product
            const codeLookup = {};
            const nameLookup = {};
            Object.entries(matrix).forEach(([code, p]) => {
                codeLookup[normCode(code)] = p;
                const n = (p.nomenclature || p.name || '').trim().toLowerCase();
                if (n) nameLookup[n] = p;
            });

            // Helper: find product by sale item
            function findProduct(sale) {
                if (sale.code) {
                    const c = normCode(String(sale.code));
                    if (codeLookup[c]) return codeLookup[c];
                }
                if (sale.name) {
                    const n = sale.name.trim().toLowerCase();
                    if (nameLookup[n]) return nameLookup[n];
                }
                return null;
            }

            // Compute enriched sales
            const enriched = sales.map(s => {
                const prod = findProduct(s);
                return {
                    ...s,
                    inPrice: prod ? (prod.inPrice || 0) : 0,
                    group: s.group || (prod ? (prod.group || '') : ''),
                    code: s.code || (prod ? prod.code : ''),
                    name: s.name || (prod ? (prod.nomenclature || prod.name || '') : ''),
                    revenue: (s.quantity || 0) * (prod ? (prod.inPrice || 0) : 0)

            });

            // Filter by group and search
            const filtered = enriched.filter(s => {
                if (filterAnalyticsGroup && s.group !== filterAnalyticsGroup) return false;
                if (searchAnalytics && !s.name?.toLowerCase().includes(searchAnalytics.toLowerCase())) return false;
                return true;

            const grandRevenue = groupRows.reduce((s, r) => s + r.revenue, 0);
