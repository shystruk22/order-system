                        <div class="flex gap-2">
                            <input id="pricesSearchInput" type="text" placeholder="Поиск..." value="${esc(searchPrices)}" oninput="debounceSearchPrices(this)" class="input w-40">
                            <button onclick="document.getElementById('pricesImportInput').click()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700">${icons.import} Импорт</button>
                            <button onclick="exportPrices()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт цен</button>
                            <button onclick="saveAllPricesAssortment()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-amber-600 rounded-lg hover:bg-amber-700">${icons.save} Сохранить цены</button>
                            <input type="file" id="pricesImportInput" accept=".xlsx,.xls" class="hidden" onchange="importPrices(this)">
                        </div>
                    </div>
                    <div class="mb-2 px-2 py-1.5 bg-sky-50 rounded-md border border-sky-200 text-[11px] text-sky-700">
                        <b>Как читать таблицу:</b> Первые колонки - текущие данные из ассортимента.
                        <span class="text-yellow-700 font-semibold">НДС</span> = разница между НДС с полки и НДС со входа (к уплате в бюджет).
                        <span class="text-orange-700 font-semibold">НДФЛ</span> = налог на прибыль.
                        <span class="text-purple-700 font-semibold">Онлайн</span> = 1% от выручки.
                        <span class="text-emerald-700 font-semibold">Чистый доход</span> = Прибыль - НДС - НДФЛ - Онлайн.
                        Колонки <span class="text-blue-700 font-semibold">"Новая наценка"</span> - введите процент, чтобы увидеть прогноз.
                    </div>
                    <div class="table-container">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th class="text-left">Группа</th>
                                    <th class="text-left">Наименование</th>
                                    <th class="text-center">Код</th>
                                    <th class="text-center">Вход.<br>цена</th>
                                    <th class="text-center bg-amber-100">Новый<br>вход ₽</th>
                                    <th class="text-center bg-green-100">Цена<br>на полке</th>
                                    <th class="text-center">Доход<br>₽</th>
                                    <th class="text-center bg-yellow-100">НДС<br>к уплате</th>
                                    <th class="text-center bg-orange-100">НДФЛ</th>
                                    <th class="text-center bg-purple-100">Онлайн<br>1%</th>
                                    <th class="text-center bg-emerald-100">Чистый<br>доход ₽</th>
                                    <th class="text-center bg-sky-100">Наценка<br>%</th>
                                    <th class="text-center bg-blue-100">Новая<br>наценка %</th>
                                    <th class="text-center bg-blue-50">Новая<br>цена</th>
                                    <th class="text-center bg-blue-50">Новый<br>чист. доход</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${(() => {
                                    const grouped = {};
                                    products.forEach(p => {
                                        if (searchPrices && !p.nomenclature?.toLowerCase().includes(searchPrices.toLowerCase()) && !(p.code || '').includes(searchPrices)) return;
                                        const gr = p.group || 'Без группы';
                                        if (!grouped[gr]) grouped[gr] = [];
                                        grouped[gr].push(p);
                                    });
                                    Object.keys(grouped).forEach(gr => {
                                        grouped[gr].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru'));
                                    });
                                    return Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0], 'ru')).map(([gr, items]) => `
                                        <tr class="group-header cursor-pointer" onclick="collapsedG['prices_${esc(gr)}']=!collapsedG['prices_${esc(gr)}'];renderPricesDebounced()">
                                            <td colspan="15" class="text-left py-1 px-2">
                                                <div class="flex items-center gap-2">
                                                    ${collapsedG['prices_' + gr] ? icons.chevronRight : icons.chevronDown}
                                                    <span class="font-semibold">${esc(gr)}</span>
                                                    <span class="text-[10px] bg-indigo-200 text-indigo-800 px-1 rounded">${items.length}</span>
                                                </div>
                                            </td>
                                        </tr>
                                        ${collapsedG['prices_' + gr] ? '' : items.map(p => {
                                            const inPrice = p.inPrice || p.price || 0;
                                            const markup = p.markup ?? groupMarkups[p.group || ''] ?? defaultMarkup;
                                            const shelfPrice = p.shelfPrice > 0 ? p.shelfPrice : Math.round(inPrice * (1 + markup / 100));
                                            const profit = shelfPrice - inPrice;
                                            const ndsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                                            const ndsOut = ndsRate > 0 ? shelfPrice * ndsRate / (100 + ndsRate) : 0;
                                            const ndsPayable = ndsOut - ndsIn;
                                            const ndfl = ndflRate > 0 ? profit * ndflRate / 100 : 0;
                                            const onlineFee = onlineFeeRate > 0 ? shelfPrice * onlineFeeRate / 100 : 0;
                                            const netIncome = profit - ndsPayable - ndfl - onlineFee;
                                            const newMarkupKey = 'newMarkup_' + p.code;
                                            const newMarkupVal = newMarkupEdits[newMarkupKey];
                                            const hasNewMarkup = newMarkupVal !== undefined && newMarkupVal !== '';
                                            const appliedNewMarkup = hasNewMarkup ? (parseFloat(newMarkupVal) || 0) : null;
                                            let newPrice = '-', newNetIncome = '-';
                                            if (hasNewMarkup && inPrice > 0) {
                                                newPrice = Math.round(inPrice * (1 + appliedNewMarkup / 100));
                                                const newProfit = newPrice - inPrice;
                                                const newNdsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                                                const newNdsOut = ndsRate > 0 ? newPrice * ndsRate / (100 + ndsRate) : 0;
                                                const newNdsPay = newNdsOut - newNdsIn;
                                                const newNdfl = ndflRate > 0 ? newProfit * ndflRate / 100 : 0;
                                                const newOnline = onlineFeeRate > 0 ? newPrice * onlineFeeRate / 100 : 0;
                                                newNetIncome = newProfit - newNdsPay - newNdfl - newOnline;
                                            }
                                            const effectiveMarkup = inPrice > 0 ? ((shelfPrice - inPrice) / inPrice * 100).toFixed(1) : (markup || 0);
                                            return `
                                                <tr class="hover:bg-gray-50">
                                                    <td class="text-left text-[10px] text-gray-500">${esc(p.group || '')}</td>
                                                    <td class="text-left font-medium text-gray-700">${esc(p.nomenclature || '')}</td>
                                                    <td class="text-center font-mono text-[10px] text-gray-500">${esc(p.code)}</td>
                                                    <td class="text-center">${inPrice.toLocaleString('ru-RU')} ₽</td>
                                                    <td class="text-center bg-amber-50"><input type="number" step="0.01" value="" placeholder="-" oninput="handleNewInPriceInput(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();applyNewInPrice(this)}" data-code="${esc(p.code)}" data-field="newInPrice" class="input w-16 text-center text-xs font-bold text-amber-700 bg-amber-50" title="Новый вход. Введите и нажмите Enter"></td>
                                                    <td class="text-center font-semibold bg-green-50">${shelfPrice.toLocaleString('ru-RU')} ₽</td>
                                                    <td class="text-center font-medium ${profit > 0 ? 'text-emerald-600' : 'text-gray-500'}">${profit.toLocaleString('ru-RU')} ₽</td>
                                                    <td class="text-center text-xs font-medium ${ndsPayable > 0 ? 'text-yellow-700 bg-yellow-50' : 'text-gray-400'}">${ndsPayable > 0 ? ndsPayable.toFixed(2) + ' ₽' : '-'}</td>
                                                    <td class="text-center text-xs font-medium text-orange-700 bg-orange-50">${ndfl > 0 ? ndfl.toFixed(2) + ' ₽' : '-'}</td>
                                                    <td class="text-center text-xs font-medium text-purple-700 bg-purple-50">${onlineFee > 0 ? onlineFee.toFixed(2) + ' ₽' : '-'}</td>
                                                    <td class="text-center font-semibold ${netIncome >= 0 ? 'text-emerald-700 bg-emerald-50' : 'text-red-600 bg-red-50'}">${netIncome.toFixed(2).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' ')} ₽</td>
                                                    <td class="text-center bg-sky-50 font-semibold text-sky-700 text-xs">${effectiveMarkup}%</td>
                                                    <td class="text-center bg-blue-50"><input type="number" value="${hasNewMarkup ? newMarkupVal : ''}" oninput="handleNewMarkupInput(this)" data-code="${esc(p.code)}" data-field="newMarkup" placeholder="-" class="input w-14 text-center text-xs font-bold text-blue-700"></td>
                                                    <td class="text-center font-semibold ${typeof newPrice === 'number' ? (newPrice > shelfPrice ? 'text-emerald-700' : newPrice < shelfPrice ? 'text-red-600' : 'text-gray-700') : 'text-gray-400'}">${typeof newPrice === 'number' ? newPrice.toLocaleString('ru-RU') + ' ₽' : '-'}</td>
                                                    <td class="text-center font-semibold ${typeof newNetIncome === 'number' ? (newNetIncome >= 0 ? 'text-emerald-700' : 'text-red-600') : 'text-gray-400'}">${typeof newNetIncome === 'number' ? newNetIncome.toFixed(2).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' ') + ' ₽' : '-'}</td>
                                                </tr>`;
                                        }).join('')}
                                    `).join('')
                                })()}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        // === Групповые наценки ===
        function updateGroupMarkup(group, value) {
            if (value === '' || value === null) {
                delete groupMarkups[group];
            } else {
                const newMarkup = parseFloat(value) || 0;
                groupMarkups[group] = newMarkup;
                products.forEach(p => {
                    if (p.group === group) {
                        p.markup = newMarkup;
                        if ((p.inPrice || p.price || 0) > 0) {
                            p.shelfPrice = Math.round((p.inPrice || p.price || 0) * (1 + newMarkup / 100));
                        }
                    }
                });
            }
            savePriceSettings();
            syncAll();
        }

        // === Живое обновление "Новый вход" ===
        function handleNewInPriceInput(inputEl) {
            const code = inputEl.dataset.code;
            if (!code) return;
            const row = inputEl.closest('tr');
            if (!row) return;
            const cells = row.querySelectorAll('td');
            const val = parseFloat(inputEl.value);
            const product = products.find(p => p.code === code);
            if (!product) return;
            const currentInPrice = product.inPrice || product.price || 0;
            const markup = product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup;
            if (isNaN(val) || val <= 0) {
                const shelfPrice = product.shelfPrice > 0 ? product.shelfPrice : Math.round(currentInPrice * (1 + markup / 100));
                cells[5].innerHTML = shelfPrice.toLocaleString('ru-RU') + ' ₽';
                cells[5].className = 'text-center font-semibold bg-green-50';
                return;
            }
            const newShelfPrice = Math.round(val * (1 + markup / 100));
            const newProfit = newShelfPrice - val;
            const ndsIn = ndsRate > 0 ? val * ndsRate / (100 + ndsRate) : 0;
            const ndsOut = ndsRate > 0 ? newShelfPrice * ndsRate / (100 + ndsRate) : 0;
            const ndsPay = ndsOut - ndsIn;
            const ndfl = ndflRate > 0 ? newProfit * ndflRate / 100 : 0;
            const onlineFee = onlineFeeRate > 0 ? newShelfPrice * onlineFeeRate / 100 : 0;
            const netInc = newProfit - ndsPay - ndfl - onlineFee;
            cells[5].innerHTML = '<span class="text-amber-700">' + newShelfPrice.toLocaleString('ru-RU') + ' ₽</span>';
            cells[5].className = 'text-center font-semibold bg-amber-50';
            cells[6].innerHTML = '<span class="' + (newProfit > 0 ? 'text-emerald-600' : 'text-gray-500') + '">' + newProfit.toLocaleString('ru-RU') + ' ₽</span>';
            cells[7].innerHTML = ndsPay > 0 ? '<span class="text-yellow-700 bg-yellow-50">' + ndsPay.toFixed(2) + ' ₽</span>' : '—';
            cells[8].innerHTML = ndfl > 0 ? '<span class="text-orange-700 bg-orange-50">' + ndfl.toFixed(2) + ' ₽</span>' : '—';
            cells[9].innerHTML = onlineFee > 0 ? '<span class="text-purple-700 bg-purple-50">' + onlineFee.toFixed(2) + ' ₽</span>' : '—';
            cells[10].innerHTML = '<span class="font-semibold ' + (netInc >= 0 ? 'text-emerald-700 bg-emerald-50' : 'text-red-600 bg-red-50') + '">' + netInc.toFixed(2).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' ') + ' ₽</span>';
        }

        function applyNewInPrice(inputEl) {
            const code = inputEl.dataset.code;
            if (!code) return;
            const val = parseFloat(inputEl.value);
            if (isNaN(val) || val <= 0) return;
            const product = products.find(p => p.code === code);
            if (!product) return;
            product.inPrice = val;
            product.price = val;
            const markup = product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup;
            product.shelfPrice = Math.round(val * (1 + markup / 100));
            inputEl.value = '';
            syncAll();
            render();
        }

        // === Живое обновление "Новая наценка" ===
        function handleNewMarkupInput(inputEl) {
            const code = inputEl.dataset.code;
            if (!code) return;
            const key = 'newMarkup_' + code;
            const val = inputEl.value;
            const row = inputEl.closest('tr');
            if (!row) return;
            if (val === '' || val === null) {
                delete newMarkupEdits[key];
            } else {
                newMarkupEdits[key] = val;
            }
            const product = products.find(p => p.code === code);
            const inPrice = product ? (product.inPrice || product.price || 0) : 0;
            const markup = product ? (product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup) : defaultMarkup;
            const shelfPrice = product && product.shelfPrice > 0 ? product.shelfPrice : Math.round(inPrice * (1 + markup / 100));
            const cells = row.querySelectorAll('td');
            if (val === '' || !inPrice) {
                cells[13].innerHTML = '-';
                cells[13].className = 'text-center font-semibold text-gray-400';
                cells[14].innerHTML = '-';
                cells[14].className = 'text-center font-semibold text-gray-400';
                return;
            }
            const appliedNewMarkup = parseFloat(val) || 0;
            const newPrice = Math.round(inPrice * (1 + appliedNewMarkup / 100));
            const newProfit = newPrice - inPrice;
            const currentProfit = shelfPrice - inPrice;
            const curNdsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
            const curNdsOut = ndsRate > 0 ? shelfPrice * ndsRate / (100 + ndsRate) : 0;
            const curNdsPay = curNdsOut - curNdsIn;
            const curNdfl = ndflRate > 0 ? currentProfit * ndflRate / 100 : 0;
            const curOnline = onlineFeeRate > 0 ? shelfPrice * onlineFeeRate / 100 : 0;
            const newNdsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
            const newNdsOut = ndsRate > 0 ? newPrice * ndsRate / (100 + ndsRate) : 0;
            const newNdsPay = newNdsOut - newNdsIn;
            const newNdfl = ndflRate > 0 ? newProfit * ndflRate / 100 : 0;
            const newOnline = onlineFeeRate > 0 ? newPrice * onlineFeeRate / 100 : 0;
            const newNet = newProfit - newNdsPay - newNdfl - newOnline;
            const curNet = currentProfit - curNdsPay - curNdfl - curOnline;
            const priceClass = newPrice > shelfPrice ? 'text-emerald-700' : newPrice < shelfPrice ? 'text-red-600' : 'text-gray-700';
            const netClass = newNet >= curNet ? 'text-emerald-700' : 'text-red-600';
            cells[13].innerHTML = newPrice.toLocaleString('ru-RU') + ' ₽';
            cells[13].className = 'text-center font-semibold ' + priceClass;
            cells[14].innerHTML = newNet.toFixed(2).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' ') + ' ₽';
            cells[14].className = 'text-center font-semibold ' + netClass;
        }

        function debounceSearchPrices(inputEl) {
            if (_pricesTimeout) clearTimeout(_pricesTimeout);
            const val = inputEl.value;
            const pos = inputEl.selectionStart;
            _pricesTimeout = setTimeout(() => {
                searchPrices = val;
                render();
                const el = document.getElementById('pricesSearchInput');
                if (el) { el.focus(); el.setSelectionRange(pos, pos); }
            }, 300);
        }

        // === СОХРАНИТЬ ВСЕ ЦЕНЫ ===
        function saveAllPricesAssortment() {
            let updatedInPrice = 0, updatedMarkup = 0;
            document.querySelectorAll('input[data-field="newInPrice"]').forEach(function(inputEl) {
                const code = inputEl.dataset.code;
                if (!code) return;
                const val = parseFloat(inputEl.value);
                if (isNaN(val) || val <= 0) return;
                const product = products.find(p => p.code === code);
                if (!product) return;
                product.inPrice = val;
                product.price = val;
                const markup = product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup;
                product.shelfPrice = Math.round(val * (1 + markup / 100));
                updatedInPrice++;
                inputEl.value = '';
            });
            Object.entries(newMarkupEdits).forEach(function([key, val]) {
                if (val === '' || val === null) return;
                const code = key.replace('newMarkup_', '');
                const product = products.find(p => p.code === code);
                if (!product) return;
                const newMarkup = parseFloat(val);
                if (isNaN(newMarkup)) return;
                product.markup = newMarkup;
                if ((product.inPrice || product.price || 0) > 0) {
                    product.shelfPrice = Math.round((product.inPrice || product.price || 0) * (1 + newMarkup / 100));
                }
                updatedMarkup++;
            });
            if (updatedInPrice === 0 && updatedMarkup === 0) { alert('Нет новых цен для сохранения'); return; }
            newMarkupEdits = {};
            syncAll();
            render();
            let msg = 'Сохранено и синхронизировано:\n';
            if (updatedInPrice > 0) msg += '  Вход. цены: ' + updatedInPrice + ' тов.\n';
            if (updatedMarkup > 0) msg += '  Наценки: ' + updatedMarkup + ' тов.\n';
            alert(msg);
        }

        // === ИМПОРТ ЦЕН ИЗ EXCEL ===
        function importPrices(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                    if (rows.length < 2) { alert('Файл пуст'); return; }
                    const headers = rows[0].map(h => String(h || '').trim().toLowerCase());
                    const codeIdx = headers.findIndex(h => h === 'код');
                    const inPriceIdx = headers.findIndex(h => h.includes('вход'));
                    const markupIdx = headers.findIndex(h => h.includes('наценка'));
                    const shelfPriceIdx = headers.findIndex(h => h.includes('полке') || h.includes('полка'));
                    if (codeIdx < 0) { alert('Не найдена колонка "Код" в файле'); return; }
                    let updated = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const r = rows[i];
                        if (!r[codeIdx]) continue;
                        const code = String(r[codeIdx]).trim();
                        const nc = normCode(code);
                        const product = products.find(p => p.code === nc || p.code === code);
                        if (!product) continue;
                        if (inPriceIdx >= 0 && r[inPriceIdx] !== undefined && r[inPriceIdx] !== '') {
                            product.inPrice = parseFloat(r[inPriceIdx]) || 0;
                            product.price = product.inPrice;
                            const markup = product.markup ?? groupMarkups[product.group || ''] ?? defaultMarkup;
                            if (product.inPrice > 0) {
                                product.shelfPrice = Math.round(product.inPrice * (1 + markup / 100));
                            }
                        }
                        if (shelfPriceIdx >= 0 && r[shelfPriceIdx] !== undefined && r[shelfPriceIdx] !== '') {
                            product.shelfPrice = parseFloat(r[shelfPriceIdx]) || 0;
                        }
                        if (markupIdx >= 0 && r[markupIdx] !== undefined && r[markupIdx] !== '') {
                            const val = parseFloat(r[markupIdx]);
                            if (!isNaN(val)) {
                                product.markup = val;
                                if ((product.inPrice || product.price || 0) > 0) {
                                    product.shelfPrice = Math.round((product.inPrice || product.price || 0) * (1 + val / 100));
                                }
                            }
                        }
                        updated++;
                    }
                    if (updated > 0) {
                        syncAll();
                        render();
                    }
                    alert('Обновлено ' + updated + ' товаров\nДанные синхронизированы.');
                } catch (err) { alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        // === ЭКСПОРТ ЦЕН В EXCEL ===
        function exportPrices() {
            const headers = ['Группа', 'Наименование', 'Код', 'Вход. цена', 'Цена на полке', 'Доход ₽', 'НДС к уплате', 'НДФЛ', 'Онлайн 1%', 'Чистый доход ₽', 'Наценка %', 'Новая наценка %', 'Новая цена', 'Новый чист. доход ₽'];
            const data = [];
            products.forEach(p => {
                const inPrice = p.inPrice || p.price || 0;
                const markup = p.markup ?? groupMarkups[p.group || ''] ?? defaultMarkup;
                const shelfPrice = p.shelfPrice > 0 ? p.shelfPrice : Math.round(inPrice * (1 + markup / 100));
                const profit = shelfPrice - inPrice;
                const ndsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                const ndsOut = ndsRate > 0 ? shelfPrice * ndsRate / (100 + ndsRate) : 0;
                const ndsPayable = ndsOut - ndsIn;
                const ndfl = ndflRate > 0 ? profit * ndflRate / 100 : 0;
                const onlineFee = onlineFeeRate > 0 ? shelfPrice * onlineFeeRate / 100 : 0;
                const netIncome = profit - ndsPayable - ndfl - onlineFee;
                const effectiveMarkup = inPrice > 0 ? ((shelfPrice - inPrice) / inPrice * 100).toFixed(1) : (markup || 0);
                // Новая наценка
                const newMarkupKey = 'newMarkup_' + p.code;
                const newMarkupVal = newMarkupEdits[newMarkupKey];
                const hasNewMarkup = newMarkupVal !== undefined && newMarkupVal !== '' && inPrice > 0;
                let newPrice = '', newNetIncome = '', newMarkupStr = '';
                if (hasNewMarkup) {
                    const nm = parseFloat(newMarkupVal) || 0;
                    newPrice = Math.round(inPrice * (1 + nm / 100));
                    const newProfit = newPrice - inPrice;
                    const nNdsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                    const nNdsOut = ndsRate > 0 ? newPrice * ndsRate / (100 + ndsRate) : 0;
                    const nNdsPay = nNdsOut - nNdsIn;
                    const nNdfl = ndflRate > 0 ? newProfit * ndflRate / 100 : 0;
                    const nOnline = onlineFeeRate > 0 ? newPrice * onlineFeeRate / 100 : 0;
                    newNetIncome = (newProfit - nNdsPay - nNdfl - nOnline).toFixed(2);
                    newMarkupStr = nm + '%';
                }
                data.push([p.group || '', p.nomenclature || '', p.code, inPrice, shelfPrice, profit.toFixed(2), ndsPayable.toFixed(2), ndfl.toFixed(2), onlineFee.toFixed(2), netIncome.toFixed(2), effectiveMarkup, newMarkupStr, newPrice !== '' ? newPrice : '', newNetIncome !== '' ? newNetIncome : '']);
            });
            const ws = _createStyledSheet(data, headers, [0, 1]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Цены');
            const d = new Date(); XLSX.writeFile(wb, `цены_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        // === DEBOUNCE ДЛЯ СВОРАЧИВАНИЯ ГРУПП ===
        let renderTimeoutPrices = null;
        function renderPricesDebounced() {
            clearTimeout(renderTimeoutPrices);
            renderTimeoutPrices = setTimeout(() => render(), 0);
        }

        // ============================================================================
        // RENDER — SUPPLIERS TAB (checkbox table: products x suppliers)
        // ============================================================================
        function renderSuppliersTab() {
            const SUP_COLORS = ['#dbeafe','#d1fae5','#fef3c7','#fee2e2','#ede9fe','#cffafe','#fce7f3','#e0e7ff'];
            const SUP_TEXT  = ['#1e40af','#065f46','#92400e','#991b1b','#5b21b6','#155e75','#9d174d','#3730a3'];
            const SUP_CHECK = ['#2563eb','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#be185d','#4338ca'];
            const sc = (i) => ({ bg: SUP_COLORS[i%8], text: SUP_TEXT[i%8], check: SUP_CHECK[i%8] });

            let html = `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-2">
                <div class="flex flex-wrap items-center gap-2">
                    <div class="flex gap-1.5 items-center flex-1 min-w-[200px]">
                        <input type="text" id="newSupplierInput" placeholder="Название поставщика..." class="input flex-1" onkeydown="if(event.key==='Enter')addSupplierFromTab()">
                        <button onclick="addSupplierFromTab()" class="btn inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">${icons.plus} Добавить</button>
                    </div>
                    ${supplierList.length > 0 ? `
                    <button onclick="exportSupplierMatrix()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-blue-600 bg-blue-50 border border-blue-200 rounded-lg hover:bg-blue-100">${icons.export} Экспорт</button>
                    <button onclick="importSupplierMatrix()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-amber-600 bg-amber-50 border border-amber-200 rounded-lg hover:bg-amber-100">${icons.import} Импорт матрицы</button>
                    <input type="file" id="supplierMatrixFileInput" accept=".xlsx,.xls" onchange="handleSupplierMatrixImport(this)" class="hidden">
                    ` : ''}
                </div>
            </div>`;

            if (supplierList.length > 0) {
                html += `<div class="flex flex-wrap gap-1.5 mb-2">`;
                supplierList.forEach((s, i) => {
                    const c = sc(i);
                    const cnt = products.filter(p => supplierMatrix[p.code] && supplierMatrix[p.code][s]).length;
                    html += `<div class="inline-flex items-center gap-1.5 px-2 py-1 rounded-md text-xs font-medium" style="background:${c.bg};color:${c.text}">
                        <span class="w-2 h-2 rounded-full" style="background:${c.check}"></span>
                        <span>${esc(s)}</span>
                        <span class="opacity-60">${cnt}</span>
                        <button onclick="event.stopPropagation();removeSupplierByName('${esc(s)}')" class="opacity-50 hover:opacity-100 text-base leading-none ml-0.5" title="Удалить">&times;</button>
                    </div>`;
                });
                html += `</div>`;
            }

            if (supplierList.length === 0) {
                html += `<div class="bg-white rounded-lg border border-gray-200 p-8 text-center text-gray-400">
                    <div class="text-4xl mb-2 opacity-30">${icons.grid}</div>
                    <div>Добавьте поставщиков чтобы увидеть таблицу привязки</div>
                </div>`;
            } else if (products.length === 0) {
                html += `<div class="bg-white rounded-lg border border-gray-200 p-8 text-center text-gray-400">
                    <div>Нет товаров. Импортируйте ассортимент через вкладку «Загрузка»</div>
                </div>`;
            } else {
                html += `<div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <div class="table-container" style="max-height:70vh">
                        <table class="table-modern">
                            <thead><tr>
                                <th class="text-left" style="min-width:250px;max-width:250px;z-index:5">Товар</th>
                                ${supplierList.map((s, i) => {
                                    const c = sc(i);
                                    const cnt = products.filter(p => supplierMatrix[p.code] && supplierMatrix[p.code][s]).length;
                                    const pct = products.length ? Math.round(cnt/products.length*100) : 0;
                                    return `<th class="cursor-pointer select-none hover:bg-blue-50" style="color:${c.text}" onclick="toggleAllForSupplier('${esc(s)}')" title="Нажмите: выделить всех / снять всех">
                                        <div class="flex flex-col items-center gap-0.5">
                                            <span class="truncate max-w-[100px]">${esc(s)}</span>
                                            <span class="font-normal text-gray-400">${cnt} (${pct}%)</span>
                                        </div>
                                    </th>`;
                                }).join('')}
                            </tr></thead>
                            <tbody>
                                ${products.map(p => `<tr>
                                    <td class="text-left" style="min-width:250px;max-width:250px">
                                        <div class="truncate font-medium text-gray-800" title="${esc(p.nomenclature||'')}">${esc(p.nomenclature || p.code || '—')}</div>
                                        <div class="text-[10px] text-gray-400 font-mono">${esc(p.code||'')}</div>
                                    </td>
                                    ${supplierList.map((s, i) => {
                                        const checked = supplierMatrix[p.code] && supplierMatrix[p.code][s];
                                        const c = sc(i);
                                        return `<td class="cursor-pointer select-none ${checked ? '' : 'hover:bg-gray-50'}" style="${checked ? 'background:'+c.bg : ''}" onclick="toggleCheck('${esc(p.code)}','${esc(s)}')">
                                            ${checked
                                                ? `<svg class="mx-auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${c.check}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
                                                : `<svg class="mx-auto text-gray-300" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>`
                                            }
                                        </td>`;
                                    }).join('')}
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;

                if (supplierList.length >= 2) {
                    html += `<div class="bg-white rounded-lg border border-gray-200 p-3 mt-2">
                        <h3 class="text-sm font-semibold text-gray-700 mb-2">Пересечения между поставщиками</h3>
                        <div class="overflow-x-auto"><table class="table-modern"><thead><tr>
                            <th class="text-left"></th>
                            ${supplierList.map(s => `<th class="text-xs">${esc(s)}</th>`).join('')}
                        </tr></thead><tbody>
                            ${supplierList.map((s1, i) => `<tr>
                                <td class="text-left text-xs font-medium text-gray-700">${esc(s1)}</td>
                                ${supplierList.map((s2, j) => {
                                    if (i === j) return `<td class="text-gray-300">—</td>`;
                                    const shared = products.filter(p => supplierMatrix[p.code] && supplierMatrix[p.code][s1] && supplierMatrix[p.code][s2]).length;
                                    return `<td class="${shared > 0 ? 'text-blue-600 font-semibold' : 'text-gray-300'}">${shared}</td>`;
                                }).join('')}
                            </tr>`).join('')}
                        </tbody></table></div>
                        <p class="text-[10px] text-gray-400 mt-1">Количество общих товаров между каждой парой</p>
                    </div>`;
                }
            }

            return html;
        }

        function addSupplierFromTab() {
            const input = document.getElementById('newSupplierInput');
            const name = (input.value || '').trim();
            if (!name) return;
            if (supplierList.includes(name)) { alert('Такой поставщик уже есть'); return; }
            supplierList.push(name);
            saveSuppliers();
            render();
        }

        function removeSupplierByName(name) {
            if (!confirm(`Удалить поставщика "${name}"?`)) return;
            supplierList = supplierList.filter(s => s !== name);
            Object.keys(supplierMatrix).forEach(code => { delete supplierMatrix[code][name]; });
            saveSuppliers();
            render();
        }

        function toggleCheck(code, supplier) {
            if (!supplierMatrix[code]) supplierMatrix[code] = {};
            supplierMatrix[code][supplier] = !supplierMatrix[code][supplier];
            saveSuppliers();
            syncAll();
            render();
        }

        function toggleAllForSupplier(supplier) {
            const stats = products.filter(p => supplierMatrix[p.code] && supplierMatrix[p.code][supplier]).length;
            const forceValue = stats > products.length / 2 ? false : true;
            products.forEach(p => {
                if (!supplierMatrix[p.code]) supplierMatrix[p.code] = {};
                supplierMatrix[p.code][supplier] = forceValue;
            });
            saveSuppliers();
            syncAll();
            render();
        }

        function exportSupplierMatrix() {
            if (products.length === 0) { alert('Нет товаров'); return; }
            const wb = XLSX.utils.book_new();
            const rows = [['Код товара', 'Наименование', ...supplierList]];
            products.forEach(p => {
                rows.push([p.code, p.nomenclature || '', ...supplierList.map(s => (supplierMatrix[p.code] && supplierMatrix[p.code][s]) ? 'ДА' : 'НЕТ')]);
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [{ wch: 15 }, { wch: 40 }, ...supplierList.map(() => ({ wch: 12 }))];
            XLSX.utils.book_append_sheet(wb, ws, 'Ассортимент поставщиков');
            XLSX.writeFile(wb, 'ассортимент_поставщики.xlsx');
        }

        function importSupplierMatrix() {
            document.getElementById('supplierMatrixFileInput').click();
        }

        function handleSupplierMatrixImport(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                    if (json.length < 2) { alert('Пустой файл'); return; }
                    const fileSuppliers = [];
                    for (let c = 2; c < json[0].length; c++) {
                        const s = String(json[0][c] || '').trim();
                        if (s && !fileSuppliers.includes(s)) fileSuppliers.push(s);
                    }
                    let addedS = 0;
                    fileSuppliers.forEach(s => { if (!supplierList.includes(s)) { supplierList.push(s); addedS++; } });
                    let updated = 0;
                    for (let i = 1; i < json.length; i++) {
                        const row = json[i]; if (!row) continue;
                        const code = String(row[0] || '').trim();
                        if (!code) continue;
                        if (!supplierMatrix[code]) supplierMatrix[code] = {};
                        fileSuppliers.forEach((s, idx) => {
                            const val = String(row[idx + 2] || '').trim().toUpperCase();
                            const checked = val === 'ДА' || val === 'YES' || val === '1' || val === '+';
                            supplierMatrix[code][s] = checked;
                            if (checked) updated++;
                        });
                    }
                    saveSuppliers();
                    syncAll();
                    alert(`Импорт: ${fileSuppliers.length} поставщиков${addedS ? ' (+' + addedS + ' новых)' : ''}, ${updated} привязок`);
                    render();
                } catch (err) { alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        // ============================================================================
        // RENDER — LISTS TAB
        // ============================================================================
        function renderListsTab() {

                <div class="flex justify-between items-center">
                    <div class="flex gap-2 items-center">
                        <span class="bg-teal-100 text-teal-800 rounded-lg px-3 py-1.5">

                        </span>

                    <div class="flex gap-2">
                        ${products.length > 0 ? `<button onclick="saveToAssortmentList()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">${icons.plus} Сохранить текущий</button>` : ''}
                        ${saved.length > 0 ? `<button onclick="exportAllSavedLists()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт все</button>` : ''}

                                    <div class="flex items-center gap-2">
                                        ${isCurrent ? '<span class="text-teal-600">★</span>' : ''}
                                        <h3 class="font-semibold text-gray-800">${esc(s.name)}</h3>
                                    </div>
                                    <div class="text-xs text-gray-500 mt-1">
                                        ${s.count || 0} товаров • ${new Date(s.date).toLocaleDateString('ru-RU')} ${new Date(s.date).toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'})}

                                <div class="flex gap-2">
                                    <button onclick="loadAssortmentByName('${esc(s.name)}')" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium ${isCurrent ? 'text-teal-700 bg-teal-50 border border-teal-200' : 'text-gray-600 bg-gray-50 border border-gray-200 hover:bg-gray-100'} rounded-lg">${icons.download} Загрузить</button>
                                    <button onclick="deleteAssortmentByName('${esc(s.name)}')" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-red-600 bg-red-50 border border-red-200 hover:bg-red-100 rounded-lg">${icons.trash} Удалить</button>
                                </div>
                            </div>
                        </div>`;

        // ============================================================================
        // RENDER — IMPORT TAB
        // ============================================================================
        function renderImportTab() {
            if (importPreviewData) {
                return renderImportPreview();
            }

            let html = `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <h2 class="text-lg font-semibold text-gray-800 mb-1">${icons.import} Импорт из Excel</h2>
                <p class="text-sm text-gray-500">Загрузите файл Excel с ассортиментом.</p>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 p-6">
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('importFileInput').click()"
                     ondragover="event.preventDefault();this.classList.add('drag-over')"
                     ondragleave="this.classList.remove('drag-over')"
                     ondrop="event.preventDefault();this.classList.remove('drag-over');handleDrop(event)">
                    <div class="text-5xl mb-3 opacity-30">${icons.upload}</div>
                    <div class="text-gray-600 font-medium mb-1">Перетащите файл сюда или нажмите для выбора</div>
                    <div class="text-gray-400 text-sm">.xlsx, .xls</div>
                    <input type="file" id="importFileInput" accept=".xlsx,.xls" onchange="importFromFile(this)" class="hidden">
                </div>
            </div>`;

            return html;
        }

        function handleDrop(e) {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const fakeInput = { files: files, value: '' };
                importFromFile(fakeInput);
            }
        }

        function renderImportPreview() {
            if (!importPreviewData) return renderImportTab();
            const items = importPreviewData;
            const previewItems = items.slice(0, 20);

            let html = `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex justify-between items-center">
                    <div class="flex gap-2 items-center">
                        <span class="bg-teal-100 text-teal-800 rounded-lg px-3 py-1.5">
                            <span class="text-xs">Найдено: </span><strong>${items.length}</strong> товаров
                        </span>
                    </div>
                    <div class="flex gap-2">
                        <label class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="importMode" value="replace" ${importMode === 'replace' ? 'checked' : ''} onchange="importMode='replace'">

                        </label>
                        <label class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">

                                <tr>

                                    <td class="text-xs font-medium text-left">${esc(p.nomenclature || '')}</td>
                                    <td class="font-mono text-[10px]">${esc(p.code)}</td>
                                    <td class="text-xs">${esc(p.packaging || 'ШТ')}</td>
                                    <td class="text-xs">${esc(p.supplier || '')}</td>
                                    <td class="text-xs">${p.price || 0}</td>
                                    <td class="text-xs">${p.shelfPrice || 0}</td>
                                    <td class="text-xs">${p.shelf || 0}</td>
                                    <td class="text-xs">${p.quant || 1}</td>
                                    <td class="text-xs">${p.volume || 0}</td>

                        </tbody>
                    </table>
                </div>
                ${items.length > 20 ? `<div class="px-4 py-2 bg-gray-50 text-xs text-gray-500">Показано 20 из ${items.length} товаров</div>` : ''}

            html += `<div class="flex gap-2 justify-center">
                <button onclick="confirmImport()" class="btn inline-flex items-center gap-1.5 px-6 py-2 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">${icons.check} Подтвердить импорт (${items.length})</button>
                <button onclick="cancelImport()" class="btn px-6 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Отмена</button>

        // ============================================================================
        // INIT — robust loading with error handling
        // ============================================================================
        function init() {
            try {
                products = load(PRODUCTS_KEY, []);
                if (!Array.isArray(products)) products = [];

                // Also try fish matrix as fallback
                if (products.length === 0) {
                    const fishMatrix = load(FISH_KEYS.MATRIX, {});
                    if (fishMatrix && typeof fishMatrix === 'object' && Object.keys(fishMatrix).length > 0) {
                        products = Object.values(fishMatrix).map(p => ({
                            code: p.code || '',
                            nomenclature: p.nomenclature || p.name || '',
                            group: p.group || '',
                            packaging: p.packaging || 'ШТ',
                            supplier: p.supplier || '',
                            price: p.price || p.inPrice || 0,
                            inPrice: p.inPrice || p.price || 0,
                            shelfPrice: p.shelfPrice || p.price || 0,
                            shelf: p.shelf || 0,
                            quant: p.quant || 1,
                            volume: p.volume || 0,
                            markup: p.markup || defaultMarkup
                        }));
                        console.log('[Assortment] Loaded from fish matrix:', products.length, 'products');
                    }
                }

                // Also try UNIV_PRODUCTS as fallback
                if (products.length === 0) {
                    const objData = load(UNIV_PRODUCTS_KEY, null);
                    if (objData && typeof objData === 'object' && Object.keys(objData).length > 0) {
                        products = Object.values(objData).map(p => ({
                            code: p.code,
                            nomenclature: p.nomenclature || p.name || '',
                            group: p.group || '',
                            packaging: p.packaging || 'ШТ',
                            supplier: p.supplier || '',
                            price: p.price || 0,
                            inPrice: p.inPrice || p.price || 0,
                            shelfPrice: p.shelfPrice || 0,
                            shelf: p.shelf || 0,
                            quant: p.quant || 1,
                            volume: p.volume || 0,
                            markup: p.markup || defaultMarkup
                        }));
                    }
                }
            } catch (e) {
                console.error('Init error:', e);
                products = [];
            }

            // Load price settings (synced with universal.html)
            loadPriceSettings();

            // Listen for cross-tab changes
            if (window.SharedData) {
                SharedData.onChange(({source}) => {
                    if (source !== 'assortment') {
                        try {
                            const newProducts = SharedData.getProducts();
                            if (newProducts.length > 0) {
                                products = newProducts;
                                render();
                            }
                        } catch(e) {}
                    }
                });
            }

            // Also listen for direct localStorage events as fallback
            window.addEventListener('storage', (e) => {
                if (e.key === PRODUCTS_KEY || e.key === UNIV_PRODUCTS_KEY || e.key === FISH_KEYS.MATRIX) {
                    try {
                        let arrData = load(PRODUCTS_KEY, null);
                        if (Array.isArray(arrData) && arrData.length > 0) {
                            products = arrData;
                        } else {
                            const fishMatrix = load(FISH_KEYS.MATRIX, {});
                            if (fishMatrix && typeof fishMatrix === 'object' && Object.keys(fishMatrix).length > 0) {
                                products = Object.values(fishMatrix).map(p => ({
                                    code: p.code, nomenclature: p.nomenclature || p.name || '',
                                    group: p.group || '', packaging: p.packaging || 'ШТ',
                                    supplier: p.supplier || '', price: p.price || p.inPrice || 0,
                                    inPrice: p.inPrice || p.price || 0, shelfPrice: p.shelfPrice || 0,
                                    shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                                    markup: p.markup || defaultMarkup
                                }));
                            }
                        }
                        render();
                    } catch(e) {}
                }
                // Reload prices data if changed externally
                if (e.key === PRICE_SETTINGS_KEY) {
                    try {
                        loadPriceSettings();
                        render();
                    } catch(e) {}
                }
            });

            if (products.length > 0) tab = 'assortment';
            render();
            console.log('[Assortment] Initialized:', products.length, 'products');
        }

        // Start immediately
        document.addEventListener('DOMContentLoaded', init);
    </script>
