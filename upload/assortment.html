<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ассортимент</title>
    <!-- Version: 2.2 — Prices tab fully synced with universal.html (import/export, bidirectional price sync) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
        .btn { transition: all 0.2s; }
        .btn:hover { opacity: 0.9; }
        input:focus, select:focus { outline: none; }
        .input { padding: 0.35rem 0.4rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.75rem; background: white; }
        .input:focus { border-color: #0d9488; }
        .table-container { overflow: auto; max-height: 75vh; border-radius: 0.5rem; border: 1px solid #e5e7eb; }
        .table-modern { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .table-modern thead { position: sticky; top: 0; z-index: 30; }
        .table-modern th { padding: 0.46rem 0.5rem; text-align: center; font-weight: 600; color: #374151; background: #f3f4f6; border: 1px solid #d1d5db; white-space: nowrap; font-size: 0.7rem; }
        .table-modern th.text-left { text-align: left; }
        .table-modern td { padding: 0.35rem 0.4rem; border: 1px solid #e5e7eb; text-align: center; }
        .table-modern td.text-left { text-align: left; }
        .cell-wrap { white-space: normal; word-wrap: break-word; }
        .group-header { background: #ccfbf1; font-weight: 600; color: #134e4a; }
        .cell-input { width: 100%; padding: 0.2rem 0.3rem; border: 1px solid transparent; border-radius: 0.25rem; font-size: 0.7rem; background: transparent; text-align: inherit; }
        .cell-input:hover { border-color: #d1d5db; background: white; }
        .cell-input:focus { border-color: #0d9488; background: white; outline: none; }
        .cell-input-num { width: 100%; padding: 0.2rem 0.3rem; border: 1px solid transparent; border-radius: 0.25rem; font-size: 0.7rem; background: transparent; text-align: center; }
        .cell-input-num:hover { border-color: #d1d5db; background: white; }
        .cell-input-num:focus { border-color: #0d9488; background: white; outline: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .modal-content { background: white; border-radius: 0.75rem; border: 1px solid #e5e7eb; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen bg-[#f5f7fa]">
    <div class="bg-white border-b border-gray-200">
        <div class="px-3 py-2">
            <div class="flex items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span>Назад</span>
                </a>
                <div class="flex items-center gap-2 px-2">
                    <div class="p-1.5 bg-teal-100 rounded-lg text-teal-600">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                    </div>
                    <h1 class="text-base font-semibold text-gray-900">Ассортимент</h1>
                </div>
                <div class="flex gap-0.5 ml-2 bg-gray-100 rounded-lg p-0.5" id="tabs"></div>
                <div class="ml-auto flex gap-2">
                    <span class="bg-teal-100 text-teal-800 rounded-lg px-2 py-1 text-xs" id="statsProducts">0 тов.</span>
                    <span class="bg-emerald-100 text-emerald-800 rounded-lg px-2 py-1 text-xs" id="statsGroups">0 гр.</span>
                </div>
            </div>
        </div>
    </div>
    <div class="px-2 py-2" id="content"></div>

    <script>
        // ============================================================================
        // INLINE SHARED UTILITIES (was: shared-utils.js)
        // ============================================================================
        const STORAGE_KEYS = {
            PRODUCTS: 'shared_products_v1',
            MATRIX: 'shared_matrix_v1',
            SALES: 'shared_sales_v1',
            STOCKS: 'shared_stocks_v1',
            WRITEOFFS: 'shared_writeoffs_v1',
            STORES: 'shared_stores_v1',
            SAVED_ASSORTMENTS: 'shared_saved_assortments_v1',
            SAVED_MATRICES: 'shared_saved_matrices_v1',
            UNIV_PRODUCTS: 'univ_products_v1',
            LAST_SYNC: 'cloud_last_sync_v1',
            DIRTY_FLAG: 'cloud_dirty_v1'
        };

        function _normCode(code) {
            return String(code || '').trim().replace(/^0+/, '') || '0';
        }

        function _esc(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function _load(key, defaultValue) {
            try {
                const data = localStorage.getItem(key);
                if (!data) return defaultValue;
                if (data.startsWith('{') || data.startsWith('[')) {
                    return JSON.parse(data) || defaultValue;
                }
                if (typeof LZString !== 'undefined') {
                    try {
                        return JSON.parse(LZString.decompressFromUTF16(data)) || defaultValue;
                    } catch {
                        return JSON.parse(data) || defaultValue;
                    }
                }
                return JSON.parse(data) || defaultValue;
            } catch (e) {
                console.warn('Load error for key', key, e);
                return defaultValue;
            }
        }

        function _save(key, data) {
            try {
                const json = JSON.stringify(data);
                if (typeof LZString !== 'undefined' && json.length > 1000) {
                    const compressed = LZString.compressToUTF16(json);
                    localStorage.setItem(key, compressed);
                } else {
                    localStorage.setItem(key, json);
                }
            } catch (e) {
                console.error('Save error for key', key, e);
            }
        }

        function _readExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        resolve(jsonData);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(new Error('Ошибка чтения файла'));
                reader.readAsArrayBuffer(file);
            });
        }

        function _createStyledSheet(data, headers, leftAlignCols) {
            leftAlignCols = leftAlignCols || [];
            const allData = [headers, ...data];
            const ws = XLSX.utils.aoa_to_sheet(allData);
            const range = XLSX.utils.decode_range(ws['!ref']);
            const numRows = range.e.r + 1;
            const numCols = range.e.c + 1;
            const colWidths = new Array(numCols).fill(0);
            for (let c = 0; c < numCols; c++) {
                for (let r = 0; r < numRows; r++) {
                    const cellAddress = XLSX.utils.encode_cell({ r: r, c: c });
                    const cell = ws[cellAddress];
                    if (cell && cell.v !== undefined) {
                        const cellText = String(cell.v);
                        const cyrillicCount = (cellText.match(/[а-яА-ЯёЁ]/g) || []).length;
                        const otherCount = cellText.length - cyrillicCount;
                        const estimatedWidth = Math.ceil(cyrillicCount * 1.5 + otherCount * 1.0) + 2;
                        colWidths[c] = Math.max(colWidths[c], estimatedWidth);
                    }
                }
                colWidths[c] = Math.max(colWidths[c], 8);
                colWidths[c] = Math.min(colWidths[c], 60);
            }
            ws['!cols'] = colWidths.map(w => ({ wch: w }));
            ws['!rows'] = [];
            for (let r = 0; r < numRows; r++) {
                ws['!rows'][r] = { hpt: 15 };
            }
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    const cellAddress = XLSX.utils.encode_cell({ r: r, c: c });
                    const cell = ws[cellAddress];
                    if (cell) {
                        if (r === 0) {
                            cell.s = {
                                fill: { fgColor: { rgb: "B8CCE4" } },
                                font: { bold: true, sz: 10 },
                                alignment: { horizontal: "center", vertical: "center", wrapText: false },
                                border: { top: { style: "dotted", color: { rgb: "808080" } }, bottom: { style: "dotted", color: { rgb: "808080" } }, left: { style: "dotted", color: { rgb: "808080" } }, right: { style: "dotted", color: { rgb: "808080" } } }
                            };
                        } else {
                            const isLeftAlign = leftAlignCols.includes(c);
                            cell.s = {
                                font: { sz: 10 },
                                alignment: { horizontal: isLeftAlign ? "left" : "center", vertical: "center", wrapText: false },
                                border: { top: { style: "dotted", color: { rgb: "808080" } }, bottom: { style: "dotted", color: { rgb: "808080" } }, left: { style: "dotted", color: { rgb: "808080" } }, right: { style: "dotted", color: { rgb: "808080" } } }
                            };
                        }
                    }
                }
            }
            return ws;
        }

        // Expose as SharedUtils for compatibility
        window.SharedUtils = {
            STORAGE_KEYS: STORAGE_KEYS,
            normCode: _normCode,
            esc: _esc,
            load: _load,
            save: _save,
            readExcelFile: _readExcelFile,
            createStyledSheet: _createStyledSheet
        };

        // ============================================================================
        // INLINE SHARED DATA (cross-tab sync via localStorage polling)
        // ============================================================================
        (function() {
            const DB_KEYS = {
                PRODUCTS: 'db_products_v1',
                PRODUCTS_LEGACY: 'shared_products_v1',
                _TIMESTAMP: 'db_timestamp_v1',
                _SOURCE: 'db_source_v1'
            };
            const now = () => Date.now();
            function dbLoad(key, def) { try { const r = localStorage.getItem(key); if (!r) return def; return JSON.parse(r) || def; } catch { return def; } }
            function dbSave(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch {} }
            function nc(code) { return String(code || '').trim().replace(/^0+/, '') || '0'; }

            const SharedData = {
                saveProducts(productsArray, source) {
                    if (!Array.isArray(productsArray)) return;
                    dbSave(DB_KEYS.PRODUCTS, productsArray);
                    dbSave(DB_KEYS.PRODUCTS_LEGACY, productsArray);
                    this._touch(source);
                },
                getProducts() { return dbLoad(DB_KEYS.PRODUCTS, []); },
                getProductsMap() {
                    const arr = this.getProducts();
                    const map = {};
                    arr.forEach(p => { if (p.code) map[nc(p.code)] = p; });
                    return map;
                },
                _touch(source) {
                    try { localStorage.setItem(DB_KEYS._SOURCE, source || 'unknown'); localStorage.setItem(DB_KEYS._TIMESTAMP, String(now())); } catch {}
                },
                getTimestamp() { return parseInt(localStorage.getItem(DB_KEYS._TIMESTAMP) || '0'); },
                getSource() { return localStorage.getItem(DB_KEYS._SOURCE) || ''; }
            };

            SharedData._callbacks = [];
            SharedData._lastTimestamp = SharedData.getTimestamp();
            SharedData.onChange = function(callback) { SharedData._callbacks.push(callback); };
            SharedData._poll = function() {
                const ts = SharedData.getTimestamp();
                if (ts !== SharedData._lastTimestamp) {
                    const source = SharedData.getSource();
                    SharedData._lastTimestamp = ts;
                    SharedData._callbacks.forEach(cb => { try { cb({ source, timestamp: ts }); } catch(e) {} });
                }
            };
            setInterval(SharedData._poll, 500);
            window.SharedData = SharedData;
        })();

        // ============================================================================
        // STATE
        // ============================================================================
        let tab = 'upload';
        let products = [];
        let currentLoadedAssortment = null;
        let defaultMarkup = 25;
        let searchQuery = '';
        let searchAssort = ''; // for prices tab
        let filterGroup = '';
        let collapsedGroups = {};
        let collapsedG = {}; // for prices tab collapsed groups
        let _searchTimeout = null;
        let importPreviewData = null;
        let importMode = 'replace';
        let supplierList = JSON.parse(localStorage.getItem('shared_supplier_list_v1') || '[]');
        let supplierMatrix = JSON.parse(localStorage.getItem('shared_supplier_matrix_v1') || '{}');

        // Prices tab state (shared with universal.html)
        let ndsRate = 20;
        let ndflRate = 6;
        let onlineFeeRate = 1;
        let groupMarkups = {};
        let newMarkupEdits = {};
        let searchPrices = '';
        let _pricesTimeout = null;

        // Shared price settings key (synced with universal.html)
        const PRICE_SETTINGS_KEY = 'shared_price_settings_v1';

        // Fish-order keys (for cross-app sync)
        const FISH_KEYS = {
            MATRIX: 'fish_matrix_v2',
            SUPPLIER_PRICES: 'fish_supplier_prices_v1',
            SUPPLIER_ASSORTMENT: 'fish_supplier_assortment_v1',
            DELIVERY_SCHEDULE: 'fish_delivery_schedule_v1'
        };

        // ============================================================================
        // UTILITIES
        // ============================================================================
        const normCode = _normCode;
        const esc = _esc;
        const load = _load;
        const save = _save;

        const ASSORTMENTS_KEY = STORAGE_KEYS.SAVED_ASSORTMENTS;
        const PRODUCTS_KEY = STORAGE_KEYS.PRODUCTS;
        const UNIV_PRODUCTS_KEY = STORAGE_KEYS.UNIV_PRODUCTS;
        const SUPPLIER_LIST_KEY = 'shared_supplier_list_v1';
        const SUPPLIER_MATRIX_KEY = 'shared_supplier_matrix_v1';
        function saveSuppliers() { localStorage.setItem(SUPPLIER_LIST_KEY, JSON.stringify(supplierList)); localStorage.setItem(SUPPLIER_MATRIX_KEY, JSON.stringify(supplierMatrix)); }

        // === Price settings sync (load/save from shared key) ===
        function loadPriceSettings() {
            try {
                const s = load(PRICE_SETTINGS_KEY, null);
                if (s) {
                    if (s.ndsRate !== undefined) ndsRate = s.ndsRate;
                    if (s.ndflRate !== undefined) ndflRate = s.ndflRate;
                    if (s.onlineFeeRate !== undefined) onlineFeeRate = s.onlineFeeRate;
                    if (s.defaultMarkup !== undefined) defaultMarkup = s.defaultMarkup;
                    if (s.groupMarkups) groupMarkups = s.groupMarkups;
                }
            } catch(e) { console.warn('loadPriceSettings error', e); }
        }
        function savePriceSettings() {
            save(PRICE_SETTINGS_KEY, { ndsRate, ndflRate, onlineFeeRate, defaultMarkup, groupMarkups, _ts: Date.now(), _src: 'assortment' });
        }
        function pollPriceSettings() {
            try {
                const s = load(PRICE_SETTINGS_KEY, null);
                if (!s || !s._ts || s._src === 'assortment') return;
                if (s.ndsRate !== undefined && s.ndsRate !== ndsRate) ndsRate = s.ndsRate;
                if (s.ndflRate !== undefined && s.ndflRate !== ndflRate) ndflRate = s.ndflRate;
                if (s.onlineFeeRate !== undefined && s.onlineFeeRate !== onlineFeeRate) onlineFeeRate = s.onlineFeeRate;
                if (s.defaultMarkup !== undefined && s.defaultMarkup !== defaultMarkup) defaultMarkup = s.defaultMarkup;
                if (s.groupMarkups) {
                    const keysA = JSON.stringify(Object.keys(groupMarkups).sort());
                    const keysB = JSON.stringify(Object.keys(s.groupMarkups).sort());
                    if (keysA !== keysB) { groupMarkups = s.groupMarkups; }
                }
            } catch(e) {}
        }
        setInterval(pollPriceSettings, 1000);

        // ============================================================================
        // ICONS
        // ============================================================================
        const icons = {
            upload: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
            list: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>`,
            grid: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
            dollar: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
            download: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            search: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
            check: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
            x: `<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            chevronRight: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>`,
            chevronDown: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="6 9 12 15 18 9"/></svg>`,
            trash: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            plus: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
            save: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`,
            import: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
            export: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M16 10l4-4-4-4"/><line x1="20" y1="6" x2="12" y2="6"/><path d="M20 6h-8v12"/></svg>`,
            refresh: `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
            db: `<svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
            package: `<svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`
        };

        // ============================================================================
        // SYNC — save to ALL storage locations
        // ============================================================================
        function syncAll() {
            // Save as array for matrix-calc
            save(PRODUCTS_KEY, products);
            // Save as object for universal
            const obj = {};
            products.forEach(p => {
                if (p.code) obj[p.code] = {
                    ...p,
                    markup: p.markup || defaultMarkup,
                    inPrice: p.inPrice || p.price || 0
                };
            });
            save(UNIV_PRODUCTS_KEY, obj);
            // Notify SharedData for cross-tab sync
            if (window.SharedData) SharedData.saveProducts(products, 'assortment');
            // Sync to saved list if one is loaded
            syncToSavedAssortment();
            // Sync price settings
            savePriceSettings();

            // === Sync to fish-order matrix format ===
            const fishMatrix = {};
            products.forEach(p => {
                if (p.code) fishMatrix[p.code] = {
                    code: p.code, nomenclature: p.nomenclature || '',
                    group: p.group || '', supplier: p.supplier || '',
                    inPrice: p.inPrice || p.price || 0,
                    price: p.shelfPrice || 0, shelfPrice: p.shelfPrice || 0,
                    shelf: p.shelf || 0, quant: p.quant || 1,
                    packaging: p.packaging || 'ШТ', volume: p.volume || 0,
                    markup: p.markup || defaultMarkup
                };
            });
            save(FISH_KEYS.MATRIX, fishMatrix);
        }

        function syncToSavedAssortment() {
            if (!currentLoadedAssortment) return;
            const saved = getSavedAssortments();
            const idx = saved.findIndex(s => s.name === currentLoadedAssortment);
            if (idx < 0) return;
            saved[idx] = {
                ...saved[idx],
                date: new Date().toISOString(),
                count: products.length,
                data: products.map(p => ({
                    code: p.code, nomenclature: p.nomenclature || '',
                    group: p.group || '', packaging: p.packaging || 'ШТ',
                    supplier: p.supplier || '', price: p.price || 0,
                    inPrice: p.inPrice || 0, shelfPrice: p.shelfPrice || 0,
                    shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                    markup: p.markup || defaultMarkup,
                    mandatory: p.mandatory || false, totalSales: p.totalSales || 0
                }))
            };

        function loadAssortmentByName(name) {
            const saved = getSavedAssortments();
            const record = saved.find(s => s.name === name);
            if (!record) { alert('Ассортимент не найден'); return; }

            const count = products.length;
            if (count > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count} товаров)?\nТекущий ассортимент (${count} товаров) будет заменен.`)) return;
            }

            products = [];
            (record.data || []).forEach(p => {
                if (p.code) {
                    products.push({
                        code: normCode(p.code),
                        nomenclature: p.nomenclature || p.name || '',
                        group: p.group || '',
                        packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '',
                        price: p.price || 0,
                        inPrice: p.inPrice || p.price || 0,
                        shelfPrice: p.shelfPrice || 0,
                        shelf: p.shelf || 0,
                        quant: p.quant || 1,
                        volume: p.volume || 0,
                        markup: p.markup || defaultMarkup,
                        mandatory: p.mandatory || false,
                        totalSales: p.totalSales || 0,
                    });
                }
            });

            currentLoadedAssortment = name;
            syncAll();
            render();
            alert(`Загружено: ${products.length} товаров из "${name}"`);
        }

        function deleteAssortmentByName(name) {
            if (!confirm(`Удалить сохранённый список "${name}"?`)) return;
            const saved = getSavedAssortments();
            const filtered = saved.filter(s => s.name !== name);
            save(ASSORTMENTS_KEY, filtered);
            if (currentLoadedAssortment === name) currentLoadedAssortment = null;
            render();
        }

        function saveToAssortmentList() {
            if (products.length === 0) { alert('Нет товаров для сохранения'); return; }
            const name = prompt('Введите название:', currentLoadedAssortment || `Ассортимент ${new Date().toLocaleDateString('ru-RU')}`);
            if (!name) return;
            const saved = getSavedAssortments();
            const existingIdx = saved.findIndex(s => s.name === name);
            const record = {
                name,
                date: new Date().toISOString(),
                count: products.length,
                data: products.map(p => ({
                    code: p.code, nomenclature: p.nomenclature || '',
                    group: p.group || '', packaging: p.packaging || 'ШТ',
                    supplier: p.supplier || '', price: p.price || 0,
                    inPrice: p.inPrice || 0, shelfPrice: p.shelfPrice || 0,
                    shelf: p.shelf || 0, quant: p.quant || 1, volume: p.volume || 0,
                    markup: p.markup || defaultMarkup, mandatory: p.mandatory || false,
                    totalSales: p.totalSales || 0
                }))
            };
            if (existingIdx >= 0) {
                if (!confirm(`"${name}" уже существует. Перезаписать?`)) return;
                saved[existingIdx] = record;
            } else {
                saved.push(record);
            }
            currentLoadedAssortment = name;
            save(ASSORTMENTS_KEY, saved);
            alert(`Сохранено: "${name}" (${products.length} товаров)`);

        function saveAllPricesAssortment() {
            let updatedInPrice = 0;

                const code = inputEl.dataset.code;
                if (!code) return;
                const val = parseFloat(inputEl.value);
                if (isNaN(val) || val <= 0) return;
                const p = products.find(item => item.code === code);
                if (!p) return;
                p.inPrice = val;
                p.price = val;
                if (val > 0 && p.shelfPrice > 0) {
                    const markup = p.markup || defaultMarkup;
                    p.shelfPrice = Math.round(val * (1 + markup / 100));
                }
                updatedInPrice++;
                inputEl.value = '';
            });
            if (updatedInPrice === 0) { alert('Нет новых цен для сохранения'); return; }
            syncAll();
            render();
            alert('Сохранено: ' + updatedInPrice + ' товаров\nДанные синхронизированы.');
        }

        // ============================================================================
        // IMPORT FROM EXCEL
        // ============================================================================
        function importFromFile(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            input.value = '';

            _readExcelFile(file).then(function(json) {
                let headerRow = -1;
                let colGroup = -1, colName = -1, colCode = -1, colPack = -1;
                let colSupplier = -1, colPrice = -1, colShelfPrice = -1, colShelf = -1;
                let colQuant = -1, colVolume = -1;

                for (let i = 0; i < Math.min(5, json.length); i++) {
                    const row = (json[i] || []).map(function(c) { return String(c || '').trim().toLowerCase(); });
                    if (row.some(function(c) { return c === 'группа' || c === 'групп'; }) &&
                        row.some(function(c) { return c === 'код' || c === 'код товара'; })) {
                        headerRow = i;
                        row.forEach(function(h, idx) {
                            if (h === 'группа' || h === 'групп') colGroup = idx;
                            else if (h === 'наименование' || h === 'название' || h === 'наим') colName = idx;
                            else if (h === 'код' || h === 'код товара') colCode = idx;
                            else if (h === 'упак.' || h === 'упак' || h === 'упаковка') colPack = idx;
                            else if (h === 'поставщик') colSupplier = idx;
                            else if (h === 'цена' || h === 'вх.цена' || h === 'вход.цена') colPrice = idx;
                            else if (h === 'цена на полке' || h === 'полка' || h === 'цена полки') colShelfPrice = idx;
                            else if (h === 'дом. полка' || h === 'дом.полка') colShelf = idx;
                            else if (h === 'квант') colQuant = idx;
                            else if (h === 'объём' || h === 'объем') colVolume = idx;
                        });
                        break;
                    }
                }

                if (headerRow < 0 || colCode < 0) {
                    alert('Не найдена строка заголовков с колонками "Группа" и "Код".\nПроверьте формат файла.');
                    return;
                }
                if (colName < 0) colName = colCode > 0 ? colCode - 1 : 0;

                var items = [];
                for (var i = headerRow + 1; i < json.length; i++) {
                    var r = json[i];
                    if (!r || r.length < 2) continue;
                    var code = normCode(r[colCode]);
                    if (!code) continue;
                    items.push({
                        code: code,
                        nomenclature: colName >= 0 ? String(r[colName] || '').trim() : '',
                        group: colGroup >= 0 ? String(r[colGroup] || '').trim() : '',
                        packaging: colPack >= 0 ? String(r[colPack] || 'ШТ').trim().toUpperCase() : 'ШТ',
                        supplier: colSupplier >= 0 ? String(r[colSupplier] || '').trim() : '',
                        price: colPrice >= 0 ? parseFloat(String(r[colPrice] || '0').replace(',', '.')) || 0 : 0,
                        inPrice: colPrice >= 0 ? parseFloat(String(r[colPrice] || '0').replace(',', '.')) || 0 : 0,
                        shelfPrice: colShelfPrice >= 0 ? parseFloat(String(r[colShelfPrice] || '0').replace(',', '.')) || 0 : 0,
                        shelf: colShelf >= 0 ? parseFloat(String(r[colShelf] || '0').replace(',', '.')) || 0 : 0,
                        quant: colQuant >= 0 ? parseFloat(String(r[colQuant] || '1').replace(',', '.')) || 1 : 1,
                        volume: colVolume >= 0 ? parseFloat(String(r[colVolume] || '0').replace(',', '.')) || 0 : 0,
                        markup: defaultMarkup
                    });
                }

                if (items.length === 0) { alert('Не найдено товаров в файле'); return; }

                if (products.length > 0) {
                    if (!confirm('Найдено ' + items.length + ' товаров. Заменить текущий ассортимент (' + products.length + ' товаров)?')) return;
                }

                products = items;
                currentLoadedAssortment = null;
                syncAll();
                render();
                alert('Загружено товаров: ' + items.length);
            }).catch(function(err) {
                alert('Ошибка импорта: ' + err.message);
                console.error(err);
            });
        }

        function confirmImport() {
            if (!importPreviewData || importPreviewData.length === 0) return;
            const items = importPreviewData;

            if (importMode === 'replace') {
                if (products.length > 0) {
                    if (!confirm(`Заменить текущий ассортимент (${products.length} товаров) на ${items.length} товаров из файла?`)) return;
                }
                products = items;
                currentLoadedAssortment = null;
            } else {
                let added = 0, updated = 0, skipped = 0;
                items.forEach(item => {
                    const existing = products.find(p => p.code === item.code);
                    if (existing) {
                        Object.assign(existing, item);
                        updated++;
                    } else {
                        products.push(item);
                        added++;
                    }
                });
                alert(`Слияние: ${added} добавлено, ${updated} обновлено`);
            }

            importPreviewData = null;
            collapsedGroups = {};
            syncAll();
            tab = 'assortment';
            render();
            alert(`Импортировано: ${products.length} товаров`);
        }

        function cancelImport() {
            importPreviewData = null;
            render();
        }

        // ============================================================================
        // EXPORT TO EXCEL
        // ============================================================================
        function exportAssortment() {
            if (products.length === 0) { alert('Нет данных для экспорта'); return; }
            const headers = ['Группа', 'Наименование', 'Код', 'Упак.', 'Поставщик', 'Цена', 'Цена на полке', 'Дом. полка', 'Квант', 'Объём'];
            const rows = [headers];
            products.sort(function(a, b) {
                const ga = (a.group || '').localeCompare(b.group || '', 'ru');
                return ga !== 0 ? ga : (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru');
            }).forEach(function(p) {
                rows.push([
                    p.group || '', p.nomenclature || '', p.code || '', p.packaging || 'ШТ',
                    p.supplier || '', p.price || 0, p.shelfPrice || 0, p.shelf || 0,
                    p.quant || 1, p.volume || 0
                ]);
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [
                { wch: 18 }, { wch: 35 }, { wch: 12 }, { wch: 6 },
                { wch: 18 }, { wch: 10 }, { wch: 12 }, { wch: 10 },
                { wch: 8 }, { wch: 8 }
            ];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Ассортимент');
            const today = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(wb, 'ассортимент_' + today + '.xlsx');
        }

        function exportAllSavedLists() {
            const saved = getSavedAssortments();
            if (saved.length === 0) { alert('Нет сохранённых списков'); return; }
            const baseHeaders = ['Группа', 'Наименование', 'Код', 'Упак.', 'Поставщик', 'Цена', 'Цена полки', 'Полка', 'Квант', 'Объём', 'Маржа %'];
            const headers = ['Список', 'Дата', 'Товаров'].concat(baseHeaders);
            const data = [];
            saved.forEach(s => {
                (s.data || []).forEach((p, i) => {
                    const inP = p.inPrice || p.price || 0;
                    const shP = p.shelfPrice || 0;
                    const markup = inP > 0 ? (shP - inP) / inP * 100 : 0;
                    data.push([
                        i === 0 ? s.name : '', i === 0 ? new Date(s.date).toLocaleDateString('ru-RU') : '', i === 0 ? s.count : '',
                        p.group || '', p.nomenclature || '', p.code, p.packaging || 'ШТ',
                        p.supplier || '', inP, shP, p.shelf || 0, p.quant || 1, p.volume || 0,
                        Math.round(markup * 100) / 100
                    ]);
                });
            });
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Списки');
            const d = new Date();
            XLSX.writeFile(wb, 'списки_ассортимента_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx');
        }

                        <div class="relative">
                            <input type="text" id="assortmentSearchInput" placeholder="Поиск по названию или коду..." value="${esc(searchQuery)}" oninput="debounceSearch(this)" class="pl-8 pr-7 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-teal-400 w-56">

                </div>`;
            } else {
                const grouped = {};
                products.forEach(p => {
                    if (searchQuery) {
                        const q = searchQuery.toLowerCase();

                            !(p.code || '').toLowerCase().includes(q) &&
                            !(p.group || '').toLowerCase().includes(q)) return;

                    const gr = p.group || 'Без группы';

                    grouped[gr].push(p);

                Object.keys(grouped).forEach(gr => {
                    grouped[gr].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru'));
                });

                const visibleCount = Object.values(grouped).reduce((sum, arr) => sum + arr.length, 0);

                if (visibleCount === 0 && (searchQuery || filterGroup)) {
                    html += `<div class="text-center py-8"><p class="text-gray-400">Ничего не найдено</p>

                                    <th style="min-width:75px">Цена на полке</th>
                                    <th class="bg-amber-100" style="min-width:80px">Новый вход ₽</th>

                                    <th style="min-width:55px">Квант</th>

                                </tr>

                                    <tr class="group-header cursor-pointer select-none" onclick="collapsedGroups['${esc(gr)}']=!collapsedGroups['${esc(gr)}'];renderAssortment()">
                                        <td class="text-center px-1 py-1">
                                            <span class="text-[10px]">${collapsedGroups[gr] ? '▶' : '▼'}</span>
                                        </td>
                                        <td colspan="13" class="text-left py-1 px-2">
                                            <div class="flex items-center gap-2">
                                                <span class="font-semibold">${esc(gr)}</span>
                                                <span class="text-[10px] bg-teal-200 text-teal-800 px-1.5 py-0.5 rounded-full font-medium">${items.length}</span>
                                            </div>
                                        </td>
                                    </tr>
                                    ${collapsedGroups[gr] ? '' : items.map(p => `
                                        <tr class="hover:bg-gray-50" id="row_${esc(p.code)}">
                                            <td class="text-center px-1 py-0.5 text-[10px] text-gray-400">${items.indexOf(p) + 1}</td>
                                            <td>
                                                <input type="text" value="${esc(p.group || '')}" onchange="updateProduct('${esc(p.code)}', 'group', this.value)" class="cell-input">
                                            </td>
                                            <td class="text-left font-medium text-gray-700">
                                                <input type="text" value="${esc(p.nomenclature || '')}" onchange="updateProduct('${esc(p.code)}', 'nomenclature', this.value)" class="cell-input">
                                            </td>
                                            <td class="font-mono text-[10px] text-gray-600">${esc(p.code)}</td>
                                            <td>
                                                <input type="text" value="${esc(p.packaging || 'ШТ')}" onchange="updateProduct('${esc(p.code)}', 'packaging', this.value.toUpperCase())" class="cell-input" style="text-align:center;width:50px">
                                            </td>
                                            <td>
                                                <input type="number" step="0.01" value="${p.price || ''}" onchange="updateProduct('${esc(p.code)}', 'price', parseFloat(this.value)||0)" class="cell-input-num" style="width:65px">

                                            <td>
                                                <input type="number" step="0.01" value="${p.shelfPrice || ''}" onchange="updateProduct('${esc(p.code)}', 'shelfPrice', parseFloat(this.value)||0)" class="cell-input-num" style="width:70px">
                                            </td>
                                            <td class="bg-amber-50"><input type="number" step="0.01" value="" placeholder="—" data-code="${esc(p.code)}" data-field="newInPrice" class="cell-input-num" style="width:70px;text-align:center" title="Новый вход. Нажмите Сохранить цены"></td>
                                            <td class="text-center font-semibold text-sky-700 bg-sky-50 text-xs">${((p.inPrice || p.price || 0) > 0 && (p.shelfPrice || 0) > 0) ? (((p.shelfPrice || 0) - (p.inPrice || p.price || 0)) / (p.inPrice || p.price || 0) * 100).toFixed(1) : 0}%</td>

        // ============================================================================
        // ЦЕНЫ (Prices Tab) — synced with universal.html
        // ============================================================================

        function renderPrices() {
            const allGroups = getAllGroups();
            let totalRevenue = 0, totalProfit = 0, totalPurchase = 0;
            let totalNdsPayable = 0, totalNdfl = 0, totalOnlineFee = 0, totalNetIncome = 0;

            products.forEach(p => {
                const inPrice = p.inPrice || p.price || 0;
                if (inPrice <= 0) return;
                const markup = p.markup ?? groupMarkups[p.group || ''] ?? defaultMarkup;
                const shelfPrice = p.shelfPrice > 0 ? p.shelfPrice : Math.round(inPrice * (1 + markup / 100));
                // Use sales data if available, otherwise estimate from price
                const qty = p.totalSales || 1;
                totalPurchase += qty * inPrice;
                totalRevenue += qty * shelfPrice;
                const profit = shelfPrice - inPrice;
                totalProfit += qty * profit;
                const ndsIn = ndsRate > 0 ? inPrice * ndsRate / (100 + ndsRate) : 0;
                const ndsOut = ndsRate > 0 ? shelfPrice * ndsRate / (100 + ndsRate) : 0;
                totalNdsPayable += qty * (ndsOut - ndsIn);
                totalNdfl += qty * profit * ndflRate / 100;
                totalOnlineFee += qty * shelfPrice * onlineFeeRate / 100;
            });
            totalNetIncome = totalProfit - totalNdsPayable - totalNdfl - totalOnlineFee;

            const individualMarkups = products.filter(p => p.markup !== undefined && p.markup !== null && p.markup !== defaultMarkup).length;

            if (products.length === 0) {
                return `<div class="bg-white rounded-lg border border-gray-200 p-6">
                    <div class="text-center py-12">${icons.db}<p class="text-gray-500 mt-3">Загрузите данные для работы с ценами</p></div>
                </div>`;
            }

            return `<div class="space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="bg-gradient-to-r from-violet-50 to-indigo-50 rounded-lg border border-violet-200 p-4">
                        <div class="flex items-center gap-2 mb-3">${icons.chart}<h2 class="text-sm font-semibold text-violet-800">Доходность</h2></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-white rounded-lg p-2 border border-violet-100 text-center"><div class="text-[10px] text-gray-500">Закупка</div><div class="text-base font-bold text-gray-800">${totalPurchase.toLocaleString('ru-RU')} ₽</div></div>
                            <div class="bg-white rounded-lg p-2 border border-violet-100 text-center"><div class="text-[10px] text-gray-500">Выручка</div><div class="text-base font-bold text-gray-800">${totalRevenue.toLocaleString('ru-RU')} ₽</div></div>
                            <div class="bg-white rounded-lg p-2 border border-violet-100 text-center"><div class="text-[10px] text-gray-500">Прибыль</div><div class="text-base font-bold text-emerald-600">${totalProfit.toLocaleString('ru-RU')} ₽</div></div>
                            <div class="bg-white rounded-lg p-2 border border-violet-100 text-center"><div class="text-[10px] text-gray-500">Маржа</div><div class="text-base font-bold text-violet-600">${totalPurchase > 0 ? ((totalProfit / totalPurchase) * 100).toFixed(1) : 0}%</div></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg border border-gray-200 p-4">
                        <h3 class="text-sm font-semibold text-gray-800 mb-3 flex items-center gap-2">${icons.dollar}Настройки</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="flex items-center justify-between bg-gray-50 px-3 py-2 rounded-lg border">
                                <label class="text-xs text-gray-600">Наценка %</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" value="${defaultMarkup}" onchange="defaultMarkup=parseFloat(this.value)||25;savePriceSettings();render()" class="input w-14 text-center text-sm font-bold text-blue-700" step="0.1">
                                    <span class="text-xs text-gray-400">%</span>
                                </div>
                            </div>
                            <div class="bg-blue-50 px-3 py-2 rounded-lg border border-blue-200 text-center">
                                <div class="text-[10px] text-gray-500">Индивид.</div>
                                <div class="text-lg font-bold text-blue-700">${individualMarkups}</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 mt-2">
                            <div class="flex items-center justify-between bg-yellow-50 px-2 py-1.5 rounded-lg border border-yellow-200">
                                <label class="text-[10px] text-gray-600">НДС %</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" value="${ndsRate}" onchange="ndsRate=parseFloat(this.value)||0;savePriceSettings();render()" class="input w-12 text-center text-xs font-bold text-yellow-700" step="0.1">
                                    <span class="text-[10px] text-gray-400">%</span>
                                </div>
                            </div>
                            <div class="flex items-center justify-between bg-orange-50 px-2 py-1.5 rounded-lg border border-orange-200">
                                <label class="text-[10px] text-gray-600">НДФЛ %</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" value="${ndflRate}" onchange="ndflRate=parseFloat(this.value)||0;savePriceSettings();render()" class="input w-12 text-center text-xs font-bold text-orange-700" step="0.1">
                                    <span class="text-[10px] text-gray-400">%</span>
                                </div>
                            </div>
                            <div class="flex items-center justify-between bg-purple-50 px-2 py-1.5 rounded-lg border border-purple-200">
                                <label class="text-[10px] text-gray-600">Онлайн %</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" value="${onlineFeeRate}" onchange="onlineFeeRate=parseFloat(this.value)||0;savePriceSettings();render()" class="input w-12 text-center text-xs font-bold text-purple-700" step="0.1">
                                    <span class="text-[10px] text-gray-400">%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Итоговые карточки -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-center">
                        <div class="text-[10px] text-yellow-700 font-medium">НДС к уплате</div>
                        <div class="text-lg font-bold ${totalNdsPayable > 0 ? 'text-yellow-800' : 'text-green-700'}">${totalNdsPayable.toFixed(0).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' ')} ₽</div>
                        <div class="text-[10px] text-yellow-600">Полка ${ndsRate}% - Вход ${ndsRate}%</div>
                    </div>
                    <div class="bg-orange-50 border border-orange-200 rounded-lg p-3 text-center">
                        <div class="text-[10px] text-orange-700 font-medium">НДФЛ</div>
                        <div class="text-lg font-bold text-orange-800">${totalNdfl.toFixed(0).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' ')} ₽</div>
                        <div class="text-[10px] text-orange-600">${ndflRate}% от прибыли</div>
                    </div>
                    <div class="bg-purple-50 border border-purple-200 rounded-lg p-3 text-center">
                        <div class="text-[10px] text-purple-700 font-medium">Онлайн-обслуживание</div>
                        <div class="text-lg font-bold text-purple-800">${totalOnlineFee.toFixed(0).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' ')} ₽</div>
                        <div class="text-[10px] text-purple-600">${onlineFeeRate}% от выручки</div>
                    </div>
                    <div class="bg-emerald-50 border border-emerald-300 rounded-lg p-3 text-center">
                        <div class="text-[10px] text-emerald-700 font-semibold">ЧИСТЫЙ ДОХОД</div>
                        <div class="text-lg font-bold ${totalNetIncome >= 0 ? 'text-emerald-700' : 'text-red-600'}">${totalNetIncome.toFixed(0).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ' ')} ₽</div>
                        <div class="text-[10px] text-emerald-600">${totalRevenue > 0 ? ((totalNetIncome / totalRevenue) * 100).toFixed(1) : 0}% от выручки</div>
                    </div>
                </div>

                <!-- Наценки по категориям -->
                <div class="bg-white rounded-lg border border-gray-200 p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-semibold text-gray-800">Наценки по категориям</h3>
                        <span class="text-[10px] text-gray-400">Серый = средняя по группе, ввод = применить ко всей категории</span>
                    </div>
                    <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2 max-h-[200px] overflow-auto">
                        ${allGroups.map(group => {
                            const groupItems = products.filter(p => p.group === group);
                            const withPrice = groupItems.filter(p => (p.inPrice || p.price || 0) > 0 && ((p.shelfPrice || 0) > 0 || (p.shelf || 0) > 0));
                            let avgMarkup = 0;
                            if (withPrice.length > 0) {
                                const sum = withPrice.reduce((s, p) => {
                                    const sp = p.shelfPrice > 0 ? p.shelfPrice : (p.shelf || 0);
                                    const ip = p.inPrice || p.price || 0;
                                    return s + (ip > 0 ? ((sp - ip) / ip * 100) : 0);
                                }, 0);
                                avgMarkup = (sum / withPrice.length).toFixed(1);
                            }
                            const hasCustom = groupMarkups[group] !== undefined;
                            const displayVal = hasCustom ? groupMarkups[group] : '';
                            const phVal = withPrice.length > 0 ? avgMarkup : defaultMarkup;
                            return `<div class="rounded px-2 py-2 text-xs border ${hasCustom ? 'bg-orange-50 border-orange-300' : 'bg-gray-50 border-gray-200'}">
                                <div class="font-medium text-gray-700 break-words leading-tight" style="min-height: 28px; word-break: break-word;">${esc(group)}</div>
                                <div class="text-[10px] text-gray-400 mt-0.5">${groupItems.length} тов.${withPrice.length > 0 ? ' · ср. ' + avgMarkup + '%' : ''}</div>
                                <div class="flex items-center gap-1 mt-1">
                                    <input type="number" value="${displayVal}" onchange="updateGroupMarkup('${esc(group)}', this.value)" placeholder="${phVal}" class="input w-14 text-center text-xs font-bold py-0.5" step="0.1">
                                    <span class="text-gray-400 text-[10px]">%</span>
                                </div>
                                ${hasCustom ? '<div class="text-[9px] text-orange-500 mt-0.5">Применена ко всем товарам</div>' : ''}
                            </div>`;
                        }).join('')}
                    </div>

                <!-- Цены по товарам -->
                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="flex justify-between items-center mb-3">
