<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ Ассистент — Система расчёта заказов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f3f4f6; }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 2rem);
            max-width: 900px;
            margin: 0 auto;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            scroll-behavior: smooth;
        }

        .msg-user {
            background: #7c3aed;
            color: white;
            border-radius: 18px 18px 4px 18px;
            padding: 0.75rem 1rem;
            max-width: 80%;
            margin-left: auto;
            word-break: break-word;
        }

        .msg-ai {
            background: white;
            color: #1f2937;
            border-radius: 18px 18px 18px 4px;
            padding: 0.75rem 1rem;
            max-width: 85%;
            margin-right: auto;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .msg-ai pre {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 0.75rem;
            overflow-x: auto;
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }

        .msg-ai code {
            background: #f1f5f9;
            color: #7c3aed;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .msg-ai pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .msg-ai table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.5rem 0;
            font-size: 0.8rem;
        }

        .msg-ai table th {
            background: #f9fafb;
            padding: 6px 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
        }

        .msg-ai table td {
            padding: 6px 10px;
            border-bottom: 1px solid #f3f4f6;
        }

        .msg-ai ul, .msg-ai ol {
            padding-left: 1.25rem;
            margin: 0.4rem 0;
        }

        .msg-ai li {
            margin: 0.2rem 0;
        }

        .msg-ai strong {
            color: #7c3aed;
        }

        .typing-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a78bfa;
            animation: bounce 1.4s infinite;
            margin: 0 2px;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        .quick-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid #e5e7eb;
            background: white;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .quick-btn:hover {
            border-color: #7c3aed;
            color: #7c3aed;
            background: #faf5ff;
        }

        .settings-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .settings-content {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            width: 100%;
            max-width: 480px;
        }

        .input-field {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #7c3aed;
        }

        .model-select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }
        .model-select:focus {
            border-color: #7c3aed;
        }
    </style>
</head>
<body class="p-4">
    <div class="chat-container">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-gray-400 hover:text-gray-600 transition">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </a>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                        <span class="text-2xl">🤖</span>
                        ИИ Ассистент
                    </h1>
                    <p class="text-xs text-gray-500" id="modelLabel">Не настроен</p>
                </div>
            </div>
            <button onclick="openSettings()" class="w-9 h-9 rounded-lg bg-white border border-gray-200 flex items-center justify-center hover:border-purple-300 hover:bg-purple-50 transition" title="Настройки">
                <svg class="w-4 h-4 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Quick Actions -->
        <div class="flex flex-wrap gap-2 mb-3" id="quickActions">
            <button class="quick-btn" onclick="askQuick('Проанализируй остатки на РЦ и скажи, что нужно срочно заказать')">📊 Анализ остатков</button>
            <button class="quick-btn" onclick="askQuick('Какие товары лучше всего продаются? Покажи топ-15')">🏆 Топ продаж</button>
            <button class="quick-btn" onclick="askQuick('Есть ли проблемы в текущих заказах? Проверь точность и адекватность')">🔍 Проверка заказов</button>
            <button class="quick-btn" onclick="askQuick('Дай рекомендации по оптимизации заказов на основе данных о продажах и остатках')">💡 Рекомендации</button>
            <button class="quick-btn" onclick="askQuick('Какие магазины имеют наибольшие остатки и возможно переполнение?')">🏪 По магазинам</button>
            <button class="quick-btn" onclick="askQuick('Сделай прогноз: какие товары закончатся в ближайшие 3 дня?')">📅 Прогноз</button>
        </div>

        <!-- Input -->
        <div class="flex gap-2">
            <div class="flex-1 relative">
                <input type="text" id="chatInput" class="input-field pr-12" placeholder="Задайте вопрос по вашим данным..." autocomplete="off" onkeydown="if(event.key==='Enter')sendMessage()">
            </div>
            <button onclick="sendMessage()" id="sendBtn" class="px-4 py-2 bg-purple-600 text-white rounded-xl font-medium text-sm hover:bg-purple-700 transition flex items-center gap-2">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Отправить
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-panel hidden" id="settingsPanel" onclick="if(event.target===this)closeSettings()">
        <div class="settings-content">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-900">⚙️ Настройки ИИ</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API провайдер</label>
                    <select id="apiProvider" class="model-select" onchange="onProviderChange()">
                        <option value="deepseek">DeepSeek</option>
                        <option value="openai">OpenAI (GPT)</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="openrouter">OpenRouter (любая модель)</option>
                        <option value="custom">Свой API endpoint</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API Ключ</label>
                    <input type="password" id="apiKey" class="input-field" placeholder="sk-... или ваш ключ">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Модель</label>
                    <input type="text" id="modelName" class="input-field" placeholder="deepseek-chat" value="deepseek-chat">
                    <p class="text-xs text-gray-400 mt-1">DeepSeek: deepseek-chat | GPT: gpt-4o-mini | Claude: claude-3-haiku</p>
                </div>

                <div id="customEndpointGroup" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">API URL</label>
                    <input type="text" id="customEndpoint" class="input-field" placeholder="https://api.example.com/v1/chat/completions">
                </div>

                <div id="corsGroup">
                    <div class="flex items-center justify-between">
                        <div>
                            <label class="text-sm font-medium text-gray-700">CORS-прокси</label>
                            <p class="text-xs text-gray-400">Нужен для DeepSeek и OpenAI из браузера</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="useCorsProxy" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                        </label>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div>
                        <label class="text-sm font-medium text-gray-700">Включать все данные в контекст</label>
                        <p class="text-xs text-gray-400">Больше данных = точнее анализ, но медленнее</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="fullContext" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                    </label>
                </div>

                <button onclick="saveSettings()" class="w-full py-2.5 bg-purple-600 text-white rounded-xl font-medium text-sm hover:bg-purple-700 transition">
                    Сохранить настройки
                </button>
            </div>
        </div>
    </div>

    <script src="shared-utils.js"></script>
    <script>
        // === Конфигурация ===
        const AI_SETTINGS_KEY = 'ai_assistant_settings';
        let settings = JSON.parse(localStorage.getItem(AI_SETTINGS_KEY) || '{}');
        let chatHistory = [];

        // === Утилиты чтения данных ===
        function get(key, def) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return def || null;
                if (raw.startsWith('{') || raw.startsWith('[')) return JSON.parse(raw) || def || null;
                if (typeof LZString !== 'undefined') { try { return JSON.parse(LZString.decompressFromUTF16(raw)) || def || null; } catch {} }
                try { return JSON.parse(raw) || def || null; } catch { return raw; }
            } catch { return def || null; }
        }

        function normCode(code) {
            if (!code) return '';
            return String(code).replace(/^0+/, '') || '0';
        }

        // === Сбор данных для ИИ ===
        function collectContext() {
            const fullMode = document.getElementById('fullContext').checked;
            const context = {};
            const now = new Date().toLocaleString('ru');

            context.summary = {
                timestamp: now,
                stores_count: (get('shared_stores_v1') || []).length,
                products_count: (get('shared_products_v1') || []).length,
                sneki_products: (get('sneki_products_v2') || []).length,
                fish_products: (get('fish_assortment_v1') || []).length
            };

            // Магазины
            const stores = get('shared_stores_v1') || [];
            if (stores.length > 0) {
                context.stores = stores.map(s => ({
                    name: s.name || s.storeName || '',
                    tt: s.tt || s.code || '',
                    type: s.type || ''
                }));
            }

            // Снеки — остатки на РЦ
            const rcStocks = get('sneki_rcStocks_v2') || {};
            const rcEntries = Object.entries(rcStocks);
            if (rcEntries.length > 0) {
                const snekiProducts = get('sneki_products_v2') || [];
                context.rcStocks = rcEntries.map(([code, qty]) => {
                    const prod = snekiProducts.find(p => normCode(p.code || p.article) === normCode(code));
                    return {
                        code,
                        name: prod ? (prod.name || prod.title) : code,
                        qty: Number(qty) || 0
                    };
                }).filter(r => fullMode || r.qty <= 5);
            }

            // Снеки — результаты заказов
            const snekiResults = get('sneki_results_v2') || [];
            if (snekiResults.length > 0) {
                context.snekiOrders = snekiResults.slice(0, fullMode ? snekiResults.length : 30).map(r => ({
                    code: r.code || r.article,
                    name: r.name || r.title || '',
                    orderQty: r.orderQty,
                    orderStatus: r.orderStatus || '',
                    rcStock: r.rcStock
                }));
            }

            // Снеки — продажи
            const snekiSales = get('sneki_sales_v2') || {};
            if (snekiSales && Object.keys(snekiSales).length > 0) {
                context.salesSummary = {};
                Object.entries(snekiSales).slice(0, fullMode ? undefined : 20).forEach(([code, data]) => {
                    const prod = (get('sneki_products_v2') || []).find(p => normCode(p.code || p.article) === normCode(code));
                    context.salesSummary[code] = {
                        name: prod ? (prod.name || prod.title) : code,
                        total: data.total || 0,
                        avgDaily: data.avgDaily || data.avg || 0,
                        daysPresent: data.daysPresent || 0
                    };
                });
            }

            // Рыба — заказ
            const fishOrder = get('fish_saved_order_v1') || [];
            if (fishOrder.length > 0) {
                context.fishOrders = fishOrder.slice(0, fullMode ? fishOrder.length : 30).map(r => ({
                    code: r.code || r.article,
                    name: r.name || r.title || '',
                    needQty: r.needQty,
                    stock: r.stock,
                    supplier: r.supplier || ''
                }));
            }

            // Рыба — остатки
            const fishStocks = get('fish_stocks_v1') || {};
            if (fishStocks && Object.keys(fishStocks).length > 0) {
                context.fishStocks = Object.entries(fishStocks).slice(0, fullMode ? undefined : 30).map(([code, data]) => ({
                    code,
                    total: typeof data === 'number' ? data : (data.total || 0)
                }));
            }

            // Общий ассортимент
            const products = get('shared_products_v1') || [];
            if (products.length > 0 && fullMode) {
                context.products = products.slice(0, 50).map(p => ({
                    code: p.code || p.article,
                    name: p.name || p.title,
                    group: p.group || p.category || '',
                    price: p.price || 0
                }));
            }

            // Матрица (сколько товаров в матрице)
            const matrix = get('sneki_matrix_v2') || {};
            context.matrixInfo = {
                totalProducts: Object.keys(matrix).length,
                storeCodes: Object.keys((get('shared_stores_v1') || [{}])[0] || {}).length
            };

            // Доставки
            const inTransit = get('fish_intransit_v1') || [];
            if (inTransit.length > 0) {
                context.deliveries = inTransit.filter(t => t.status === 'in_transit' || t.status === 'ожидается').map(t => ({
                    supplier: t.supplier || '',
                    date: t.deliveryDate || t.date || '',
                    status: t.status,
                    items: t.items || ''
                }));
            }

            return context;
        }

        function buildSystemPrompt(contextData) {
            const ctx = JSON.stringify(contextData, null, 2);
            return `Ты — умный ИИ-ассистент для системы расчёта заказов розничной сети. Твоя задача — анализировать данные и давать полезные рекомендации по закупкам, остаткам и продажам.

ПРАВИЛА:
- Отвечай на русском языке
- Будь кратким и конкретным, используй таблицы и списки
- Если данных недостаточно, скажи об этом
- Опирайся ТОЛЬКО на предоставленные данные
- Предлагай конкретные действия и цифры
- Если видишь проблему — сразу предлагай решение

ВРЕМЯ: ${contextData.summary?.timestamp || 'неизвестно'}

Текущие данные системы:
${ctx}

ПОМОГИТЕ ПОЛЬЗОВАТЕЛЮ с анализом заказов, остатков, продаж и стратегией закупок.`;
        }

        // === API вызовы ===
        async function callAI(userMessage) {
            if (!settings.apiKey) {
                openSettings();
                return null;
            }

            const contextData = collectContext();
            const systemPrompt = buildSystemPrompt(contextData);

            chatHistory.push({ role: 'user', content: userMessage });

            // Ограничиваем историю до последних 10 сообщений для экономии токенов
            const historySlice = chatHistory.slice(-10);

            const provider = settings.provider || 'openai';

            if (provider === 'anthropic') {
                return callAnthropic(systemPrompt, historySlice);
            }

            // CORS proxy — нужен для запросов из браузера к DeepSeek/OpenAI
            const CORS_PROXY = 'https://corsproxy.io/?';
            const useProxy = document.getElementById('useCorsProxy').checked;

            // OpenAI / DeepSeek / OpenRouter / Custom — единый формат
            let baseUrl;
            if (provider === 'custom') {
                baseUrl = (settings.customEndpoint || '').replace('/chat/completions', '');
            } else if (provider === 'deepseek') {
                baseUrl = 'https://api.deepseek.com';
            } else if (provider === 'openrouter') {
                baseUrl = 'https://openrouter.ai/api/v1';
            } else {
                baseUrl = 'https://api.openai.com/v1';
            }

            const endpoint = (useProxy ? CORS_PROXY + encodeURIComponent(baseUrl + '/chat/completions') : baseUrl + '/chat/completions');

            const headers = {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + settings.apiKey
            };

            if (provider === 'openrouter') {
                headers['HTTP-Referer'] = window.location.href;
                headers['X-Title'] = 'Order System AI Assistant';
            }

            const response = await fetch(endpoint, {
                method: 'POST',
                headers,
                body: JSON.stringify({
                    model: settings.model || (provider === 'deepseek' ? 'deepseek-chat' : 'gpt-4o-mini'),
                    messages: [
                        { role: 'system', content: systemPrompt },
                        ...historySlice
                    ],
                    temperature: 0.3,
                    max_tokens: 4000
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || err.detail || 'Ошибка API: ' + response.status);
            }

            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content || 'Не получен ответ от ИИ';

            chatHistory.push({ role: 'assistant', content: reply });
            return reply;
        }

        async function callAnthropic(systemPrompt, historySlice) {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': settings.apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: settings.model || 'claude-3-haiku-20240307',
                    max_tokens: 4000,
                    system: systemPrompt,
                    messages: historySlice
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || 'Ошибка Anthropic API: ' + response.status);
            }

            const data = await response.json();
            const reply = data.content?.[0]?.text || 'Не получен ответ от ИИ';

            chatHistory.push({ role: 'assistant', content: reply });
            return reply;
        }

        // === UI ===
        function renderMarkdown(text) {
            if (!text) return '';
            let html = text;

            // Таблицы
            html = html.replace(/^\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/gm, function(match, header, body) {
                const ths = header.split('|').filter(s => s.trim()).map(s => `<th>${s.trim()}</th>`).join('');
                const rows = body.trim().split('\n').map(row => {
                    const tds = row.split('|').filter(s => s.trim()).map(s => `<td>${s.trim()}</td>`).join('');
                    return `<tr>${tds}</tr>`;
                }).join('');
                return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
            });

            // Код-блоки
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // Инлайн код
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Жирный
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Курсив
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Списки
            html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Нумерованные
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // Заголовки
            html = html.replace(/^### (.+)$/gm, '<h3 class="text-sm font-bold mt-2 mb-1">$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2 class="text-base font-bold mt-2 mb-1">$1</h2>');

            // Переносы строк
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        function addMessage(role, content) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'mb-3 ' + (role === 'user' ? 'flex justify-end' : 'flex justify-start');

            if (role === 'user') {
                div.innerHTML = `<div class="msg-user">${escapeHtml(content)}</div>`;
            } else {
                div.innerHTML = `<div class="msg-ai">${renderMarkdown(content)}</div>`;
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addTyping() {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'mb-3 flex justify-start';
            div.id = 'typingIndicator';
            div.innerHTML = `<div class="msg-ai typing-dots"><span></span><span></span><span></span></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addMessage('user', text);

            // Проверяем настройку
            if (!settings.apiKey) {
                addMessage('ai', '⚠️ API ключ не настроен. Нажмите ⚙️ для ввода ключа.\n\nПоддерживаемые провайдеры:\n- **DeepSeek** (deepseek-chat)\n- **OpenAI** (GPT-4o, GPT-4o-mini)\n- **Anthropic** (Claude)\n- **OpenRouter** (доступ к множеству моделей)\n- Любой совместимый API');
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            addTyping();

            try {
                const reply = await callAI(text);
                removeTyping();
                addMessage('ai', reply);
            } catch (err) {
                removeTyping();
                addMessage('ai', '❌ Ошибка: ' + err.message);
            }

            btn.disabled = false;
            input.focus();
        }

        function askQuick(question) {
            document.getElementById('chatInput').value = question;
            sendMessage();
        }

        // === Настройки ===
        function openSettings() {
            document.getElementById('settingsPanel').classList.remove('hidden');
            document.getElementById('apiProvider').value = settings.provider || 'openai';
            document.getElementById('apiKey').value = settings.apiKey || '';
            document.getElementById('modelName').value = settings.model || 'gpt-4o-mini';
            document.getElementById('fullContext').checked = settings.fullContext !== false;
            document.getElementById('useCorsProxy').checked = settings.useCorsProxy !== false;
            if (settings.customEndpoint) {
                document.getElementById('customEndpoint').value = settings.customEndpoint;
            }
            onProviderChange();
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.add('hidden');
        }

        function onProviderChange() {
            const provider = document.getElementById('apiProvider').value;
            const customGroup = document.getElementById('customEndpointGroup');
            const modelInput = document.getElementById('modelName');

            if (provider === 'custom') {
                customGroup.classList.remove('hidden');
            } else {
                customGroup.classList.add('hidden');
            }

            if (provider === 'deepseek') {
                modelInput.value = settings.model || 'deepseek-chat';
            } else if (provider === 'openai') {
                modelInput.value = settings.model || 'gpt-4o-mini';
            } else if (provider === 'anthropic') {
                modelInput.value = settings.model || 'claude-3-haiku-20240307';
            }
        }

        function saveSettings() {
            settings = {
                provider: document.getElementById('apiProvider').value,
                apiKey: document.getElementById('apiKey').value.trim(),
                model: document.getElementById('modelName').value.trim(),
                customEndpoint: document.getElementById('customEndpoint').value.trim(),
                fullContext: document.getElementById('fullContext').checked,
                useCorsProxy: document.getElementById('useCorsProxy').checked
            };

            localStorage.setItem(AI_SETTINGS_KEY, JSON.stringify(settings));
            closeSettings();
            updateModelLabel();

            // Показать подтверждение
            addMessage('ai', '✅ Настройки сохранены. Модель: **' + (settings.model || 'не указана') + '**');
        }

        function updateModelLabel() {
            const label = document.getElementById('modelLabel');
            if (settings.apiKey) {
                label.textContent = (settings.model || 'модель') + ' — готов к работе';
                label.style.color = '#059669';
            } else {
                label.textContent = 'Нажмите ⚙️ для настройки';
                label.style.color = '#6b7280';
            }
        }

        // === Инициализация ===
        function init() {
            updateModelLabel();

            // Приветственное сообщение
            const hasData = (get('shared_stores_v1') || []).length > 0 || (get('sneki_products_v2') || []).length > 0;

            if (!settings.apiKey) {
                addMessage('ai', '👋 Привет! Я ИИ-ассистент для анализа ваших заказов и остатков.\n\nДля начала работы нажмите ⚙️ и введите API ключ.\n\nПоддерживаются **DeepSeek**, **OpenAI**, **Anthropic (Claude)** и **OpenRouter**.');
            } else if (hasData) {
                addMessage('ai', '👋 Привет! Я вижу ваши данные — магазины, товары, остатки и заказы.\n\nМогу:\n- 📊 Анализировать остатки на РЦ\n- 🏆 Показать топ продаж\n- 🔍 Проверять заказы на точность\n- 💡 Давать рекомендации по закупкам\n- 📅 Прогнозировать дефицит\n\nЗадайте вопрос или нажмите кнопку быстрого запроса ниже.');
            } else {
                addMessage('ai', '👋 Привет! Я ИИ-ассистент. Пока в системе нет данных — импортируйте ассортимент и остатки, а потом возвращайтесь за аналитикой.');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
