    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f3f4f6; }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 2rem);
            max-width: 900px;
            margin: 0 auto;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            scroll-behavior: smooth;
        }

        .msg-user {
            background: #7c3aed;
            color: white;
            border-radius: 18px 18px 4px 18px;
            padding: 0.75rem 1rem;
            max-width: 80%;
            margin-left: auto;
            word-break: break-word;
        }

        .msg-ai {
            background: white;
            color: #1f2937;
            border-radius: 18px 18px 18px 4px;
            padding: 0.75rem 1rem;
            max-width: 85%;
            margin-right: auto;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .msg-ai pre {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 0.75rem;
            overflow-x: auto;
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }

        .msg-ai code {
            background: #f1f5f9;
            color: #7c3aed;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .msg-ai pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .msg-ai table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.5rem 0;
            font-size: 0.8rem;
        }

        .msg-ai table th {
            background: #f9fafb;
            padding: 6px 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
        }

        .msg-ai table td {
            padding: 6px 10px;
            border-bottom: 1px solid #f3f4f6;
        }

        .msg-ai ul, .msg-ai ol {
            padding-left: 1.25rem;
            margin: 0.4rem 0;
        }

        .msg-ai li {
            margin: 0.2rem 0;
        }

        .msg-ai strong {
            color: #7c3aed;
        }

        .typing-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a78bfa;
            animation: bounce 1.4s infinite;
            margin: 0 2px;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        .quick-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid #e5e7eb;
            background: white;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .quick-btn:hover {
            border-color: #7c3aed;
            color: #7c3aed;
            background: #faf5ff;
        }

        .settings-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .settings-panel.visible {
            display: flex;
        }

        .settings-content {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            width: 100%;
            max-width: 480px;
        }

        .input-field {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #7c3aed;
        }

        .model-select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }
        .model-select:focus {
            border-color: #7c3aed;
        }
    </style>
</head>
<body class="p-4">
    <div class="chat-container">
        <!-- Header -->

    <script src="shared-utils.js"></script>
    <script>
        // === Конфигурация ===
        const AI_SETTINGS_KEY = 'ai_assistant_settings';
        let settings = JSON.parse(localStorage.getItem(AI_SETTINGS_KEY) || '{}');
        let chatHistory = [];

        // === Утилиты чтения данных ===
        function get(key, def) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return def || null;
                if (raw.startsWith('{') || raw.startsWith('[')) return JSON.parse(raw) || def || null;
                if (typeof LZString !== 'undefined') { try { return JSON.parse(LZString.decompressFromUTF16(raw)) || def || null; } catch {} }
                try { return JSON.parse(raw) || def || null; } catch { return raw; }
            } catch { return def || null; }
        }

        function normCode(code) {
            if (!code) return '';
            return String(code).replace(/^0+/, '') || '0';
        }

        // === Сбор данных для ИИ ===
        function collectContext() {
            const fullMode = document.getElementById('fullContext').checked;
            const context = {};
            const now = new Date().toLocaleString('ru');

            context.summary = {
                timestamp: now,
                stores_count: (get('shared_stores_v1') || []).length,
                products_count: (get('shared_products_v1') || []).length,
                sneki_products: (get('sneki_products_v2') || []).length,
                fish_products: (get('fish_assortment_v1') || []).length
            };

            // Магазины
            const stores = get('shared_stores_v1') || [];
            if (stores.length > 0) {
                context.stores = stores.map(s => ({
                    name: s.name || s.storeName || '',
                    tt: s.tt || s.code || '',
                    type: s.type || ''
                }));
            }

            // Снеки — остатки на РЦ
            const rcStocks = get('sneki_rcStocks_v2') || {};
            const rcEntries = Object.entries(rcStocks);
            if (rcEntries.length > 0) {
                const snekiProducts = get('sneki_products_v2') || [];
                context.rcStocks = rcEntries.map(([code, qty]) => {
                    const prod = snekiProducts.find(p => normCode(p.code || p.article) === normCode(code));
                    return {
                        code,
                        name: prod ? (prod.name || prod.title) : code,
                        qty: Number(qty) || 0
                    };
                }).filter(r => fullMode || r.qty <= 5);
            }

            // Снеки — результаты заказов
            const snekiResults = get('sneki_results_v2') || [];
            if (snekiResults.length > 0) {
                context.snekiOrders = snekiResults.slice(0, fullMode ? snekiResults.length : 30).map(r => ({
                    code: r.code || r.article,
                    name: r.name || r.title || '',
                    orderQty: r.orderQty,
                    orderStatus: r.orderStatus || '',
                    rcStock: r.rcStock
                }));
            }

            // Снеки — продажи
            const snekiSales = get('sneki_sales_v2') || {};
            if (snekiSales && Object.keys(snekiSales).length > 0) {
                context.salesSummary = {};
                Object.entries(snekiSales).slice(0, fullMode ? undefined : 20).forEach(([code, data]) => {
                    const prod = (get('sneki_products_v2') || []).find(p => normCode(p.code || p.article) === normCode(code));
                    context.salesSummary[code] = {
                        name: prod ? (prod.name || prod.title) : code,
                        total: data.total || 0,
                        avgDaily: data.avgDaily || data.avg || 0,
                        daysPresent: data.daysPresent || 0
                    };
                });
            }

            // Рыба — заказ
            const fishOrder = get('fish_saved_order_v1') || [];
            if (fishOrder.length > 0) {
                context.fishOrders = fishOrder.slice(0, fullMode ? fishOrder.length : 30).map(r => ({
                    code: r.code || r.article,
                    name: r.name || r.title || '',
                    needQty: r.needQty,
                    stock: r.stock,
                    supplier: r.supplier || ''
                }));
            }

            // Рыба — остатки
            const fishStocks = get('fish_stocks_v1') || {};
            if (fishStocks && Object.keys(fishStocks).length > 0) {
                context.fishStocks = Object.entries(fishStocks).slice(0, fullMode ? undefined : 30).map(([code, data]) => ({
                    code,
                    total: typeof data === 'number' ? data : (data.total || 0)
                }));
            }

            // Общий ассортимент
            const products = get('shared_products_v1') || [];
            if (products.length > 0 && fullMode) {
                context.products = products.slice(0, 50).map(p => ({
                    code: p.code || p.article,
                    name: p.name || p.title,
                    group: p.group || p.category || '',
                    price: p.price || 0
                }));
            }

            // Матрица (сколько товаров в матрице)
            const matrix = get('sneki_matrix_v2') || {};
            context.matrixInfo = {
                totalProducts: Object.keys(matrix).length,
                storeCodes: Object.keys((get('shared_stores_v1') || [{}])[0] || {}).length
            };

            // Доставки
            const inTransit = get('fish_intransit_v1') || [];
            if (inTransit.length > 0) {
                context.deliveries = inTransit.filter(t => t.status === 'in_transit' || t.status === 'ожидается').map(t => ({
                    supplier: t.supplier || '',
                    date: t.deliveryDate || t.date || '',
                    status: t.status,
                    items: t.items || ''
                }));
            }

            return context;
        }

        function buildSystemPrompt(contextData) {
            const ctx = JSON.stringify(contextData);
            // Ограничиваем размер контекста (15K символов ≈ 4K токенов)
            const MAX_CTX = 15000;
            const trimmedCtx = ctx.length > MAX_CTX ? ctx.slice(0, MAX_CTX) + '... (данные обрезаны)' : ctx;
            return `Ты — умный ИИ-ассистент для системы расчёта заказов розничной сети. Твоя задача — анализировать данные и давать полезные рекомендации по закупкам, остаткам и продажам.

ПРАВИЛА:
- Отвечай на русском языке
- Будь кратким и конкретным, используй таблицы и списки
- Если данных недостаточно, скажи об этом
- Опирайся ТОЛЬКО на предоставленные данные
- Предлагай конкретные действия и цифры
- Если видишь проблему — сразу предлагай решение

ВРЕМЯ: ${contextData.summary?.timestamp || 'неизвестно'}

Текущие данные системы:
${trimmedCtx}

ПОМОГИТЕ ПОЛЬЗОВАТЕЛЮ с анализом заказов, остатков, продаж и стратегией закупок.`;
        }

        // === API вызовы ===
        async function callAI(userMessage) {
            if (!settings.apiKey) {
                openSettings();
                return null;
            }

            const contextData = collectContext();
            const systemPrompt = buildSystemPrompt(contextData);

            chatHistory.push({ role: 'user', content: userMessage });

            // Ограничиваем историю до последних 10 сообщений для экономии токенов
            const historySlice = chatHistory.slice(-5);

            const provider = settings.provider || 'openai';

            if (provider === 'zai') {
                addMessage('ai', '⚠️ Z.AI ключ работает только через сервер (Node.js SDK), а не напрямую из браузера.\n\nИспользуйте ваш ключ через **OpenRouter**:\n1. API провайдер: **OpenRouter**\n2. API Ключ: ваш ключ OpenRouter\n3. Модель: `deepseek/deepseek-chat` или `openai/gpt-4o-mini`\n\nИли зарегистрируйтесь на [openrouter.ai](https://openrouter.ai) для получения ключа.');
                return;
            }

            if (provider === 'anthropic') {
                return callAnthropic(systemPrompt, historySlice);
            }

            // CORS proxy — нужен для запросов из браузера к DeepSeek/OpenAI
            // OpenRouter и Anthropic работают без прокси
            const CORS_PROXY = 'https://corsproxy.io/?';
            const useProxy = document.getElementById('useCorsProxy').checked && provider !== 'openrouter' && provider !== 'anthropic';

            // OpenAI / DeepSeek / OpenRouter / Custom — единый формат
            let baseUrl;
            if (provider === 'custom') {
                baseUrl = (settings.customEndpoint || '').replace('/chat/completions', '');
            } else if (provider === 'zai') {
                baseUrl = 'https://api.z.ai/v1';
            } else if (provider === 'deepseek') {
                baseUrl = 'https://api.deepseek.com';
            } else if (provider === 'openrouter') {
                baseUrl = 'https://openrouter.ai/api/v1';
            } else {
                baseUrl = 'https://api.openai.com/v1';
            }

            const targetUrl = baseUrl + '/chat/completions';
            const reqBody = JSON.stringify({
                model: settings.model || (provider === 'deepseek' ? 'deepseek-chat' : 'gpt-4o-mini'),
                messages: [
                    { role: 'system', content: systemPrompt },
                    ...historySlice
                ],
                temperature: 0.3,
                max_tokens: 2000
            });

            let response;
            const endpoint = (useProxy ? CORS_PROXY + encodeURIComponent(targetUrl) : targetUrl);

            const headers = {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + settings.apiKey
            };

            if (provider === 'openrouter') {
                headers['HTTP-Referer'] = window.location.href;
                headers['X-Title'] = 'Order System AI Assistant';
            }

            try {
                response = await fetch(endpoint, {
                    method: 'POST',
                    headers,
                    body: reqBody
                });
            } catch(e) {
                throw new Error('Сеть недоступна. Если используете DeepSeek/OpenAI — включите CORS-прокси в настройках ⚙️.\n\nРекомендуемый вариант: используйте **OpenRouter** — он работает без прокси.');
            }

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || err.detail || 'Ошибка API: ' + response.status);
            }

            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content || 'Не получен ответ от ИИ';

            chatHistory.push({ role: 'assistant', content: reply });
            return reply;
        }

        async function callAnthropic(systemPrompt, historySlice) {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': settings.apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: settings.model || 'claude-3-haiku-20240307',
                    max_tokens: 2000,
                    system: systemPrompt,
                    messages: historySlice
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || 'Ошибка Anthropic API: ' + response.status);
            }

            const data = await response.json();
            const reply = data.content?.[0]?.text || 'Не получен ответ от ИИ';

            chatHistory.push({ role: 'assistant', content: reply });
            return reply;
        }

        // === UI ===
        function renderMarkdown(text) {
            if (!text) return '';
            let html = text;

            // Таблицы
            html = html.replace(/^\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/gm, function(match, header, body) {
                const ths = header.split('|').filter(s => s.trim()).map(s => `<th>${s.trim()}</th>`).join('');
                const rows = body.trim().split('\n').map(row => {
                    const tds = row.split('|').filter(s => s.trim()).map(s => `<td>${s.trim()}</td>`).join('');
                    return `<tr>${tds}</tr>`;
                }).join('');
                return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
            });

            // Код-блоки
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // Инлайн код
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Жирный
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Курсив
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Списки
            html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Нумерованные
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // Заголовки
            html = html.replace(/^### (.+)$/gm, '<h3 class="text-sm font-bold mt-2 mb-1">$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2 class="text-base font-bold mt-2 mb-1">$1</h2>');

            // Переносы строк
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        function addMessage(role, content) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'mb-3 ' + (role === 'user' ? 'flex justify-end' : 'flex justify-start');

            if (role === 'user') {
                div.innerHTML = `<div class="msg-user">${escapeHtml(content)}</div>`;
            } else {
                div.innerHTML = `<div class="msg-ai">${renderMarkdown(content)}</div>`;
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addTyping() {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'mb-3 flex justify-start';
            div.id = 'typingIndicator';
            div.innerHTML = `<div class="msg-ai typing-dots"><span></span><span></span><span></span></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addMessage('user', text);

            // Проверяем настройку
            if (!settings.apiKey) {
                addMessage('ai', '⚠️ API ключ не настроен. Нажмите ⚙️ для ввода ключа.\n\nПоддерживаемые провайдеры:\n- **DeepSeek** (deepseek-chat)\n- **OpenAI** (GPT-4o, GPT-4o-mini)\n- **Anthropic** (Claude)\n- **OpenRouter** (доступ к множеству моделей)\n- Любой совместимый API');
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            addTyping();

            try {
                const reply = await callAI(text);
                removeTyping();
                addMessage('ai', reply);
            } catch (err) {
                removeTyping();
                addMessage('ai', '❌ Ошибка: ' + err.message);
            }

            btn.disabled = false;
            input.focus();
        }

        function askQuick(question) {
            document.getElementById('chatInput').value = question;
            sendMessage();
        }

        // === Настройки ===
        function openSettings() {
            document.getElementById('settingsPanel').classList.add('visible');
            document.getElementById('apiProvider').value = settings.provider || 'openai';
            document.getElementById('apiKey').value = settings.apiKey || '';
            document.getElementById('modelName').value = settings.model || 'gpt-4o-mini';
            document.getElementById('fullContext').checked = settings.fullContext !== false;
            document.getElementById('useCorsProxy').checked = settings.useCorsProxy !== false;
            if (settings.customEndpoint) {
                document.getElementById('customEndpoint').value = settings.customEndpoint;
            }
            onProviderChange();
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('visible');
        }

        function onProviderChange() {
            const provider = document.getElementById('apiProvider').value;
            const customGroup = document.getElementById('customEndpointGroup');
            const modelInput = document.getElementById('modelName');

            if (provider === 'custom') {
                customGroup.classList.remove('hidden');
            } else {
                customGroup.classList.add('hidden');
            }

            if (provider === 'zai') {
                modelInput.value = settings.model || 'glm-4-plus';
            } else if (provider === 'deepseek') {
                modelInput.value = settings.model || 'deepseek-chat';
            } else if (provider === 'openai') {
                modelInput.value = settings.model || 'gpt-4o-mini';
            } else if (provider === 'anthropic') {
                modelInput.value = settings.model || 'claude-3-haiku-20240307';
            }
        }

        function saveSettings() {
            settings = {
                provider: document.getElementById('apiProvider').value,
                apiKey: document.getElementById('apiKey').value.trim(),
                model: document.getElementById('modelName').value.trim(),
                customEndpoint: document.getElementById('customEndpoint').value.trim(),
                fullContext: document.getElementById('fullContext').checked,
                useCorsProxy: document.getElementById('useCorsProxy').checked
            };

            localStorage.setItem(AI_SETTINGS_KEY, JSON.stringify(settings));
            closeSettings();
            updateModelLabel();

            // Показать подтверждение
            try { addMessage('ai', '✅ Настройки сохранены. Модель: **' + (settings.model || 'не указана') + '**'); } catch(e) {}
        }

        function updateModelLabel() {
            const label = document.getElementById('modelLabel');
            if (settings.apiKey) {
                label.textContent = (settings.model || 'модель') + ' — готов к работе';
                label.style.color = '#059669';
            } else {
                label.textContent = 'Нажмите ⚙️ для настройки';
                label.style.color = '#6b7280';
            }
        }

        // === Инициализация ===
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSettings();
        });
        function init() {
            updateModelLabel();

            // Приветственное сообщение
            const hasData = (get('shared_stores_v1') || []).length > 0 || (get('sneki_products_v2') || []).length > 0;

            if (!settings.apiKey) {
                addMessage('ai', '👋 Привет! Я ИИ-ассистент для анализа ваших заказов и остатков.\n\nДля начала работы нажмите ⚙️ и введите API ключ.\n\nПоддерживаются **DeepSeek**, **OpenAI**, **Anthropic (Claude)** и **OpenRouter**.');
            } else if (hasData) {
                addMessage('ai', '👋 Привет! Я вижу ваши данные — магазины, товары, остатки и заказы.\n\nМогу:\n- 📊 Анализировать остатки на РЦ\n- 🏆 Показать топ продаж\n- 🔍 Проверять заказы на точность\n- 💡 Давать рекомендации по закупкам\n- 📅 Прогнозировать дефицит\n\nЗадайте вопрос или нажмите кнопку быстрого запроса ниже.');
            } else {
                addMessage('ai', '👋 Привет! Я ИИ-ассистент. Пока в системе нет данных — импортируйте ассортимент и остатки, а потом возвращайтесь за аналитикой.');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
