        function loadStoresFromHTML() {
            try {

                    console.log(`[Matrix] Загружено ${stores.length} магазинов из stores.html`);
                    return;
                }
            } catch (e) { 
                console.error('Load stores error:', e); 
            }
            stores = [];
        }

        // Проверяет, соответствует ли ТТ из данных (продажи/остатки) магазину из stores.html
        // Учитывает tt, tt2, storeNumber, oldName — точное совпадение и вхождение
        function storeMatches(dataTT) {
            if (stores.length === 0) return true; // Список магазинов не загружен = не фильтруем
            if (!dataTT) return false;
            const t = dataTT.trim();
            return stores.some(s => {
                const tt = (s.tt || '').trim();
                const tt2 = (s.tt2 || '').trim();
                const num = String(s.storeNumber || '').trim();
                const old = (s.oldName || '').trim();
                // Точное совпадение
                if (tt && tt === t) return true;
                if (tt2 && tt2 === t) return true;
                // stores.html: "ТТ Аптека" → данные: "ТТ Аптека Магазин" (tt — префикс)
                if (tt && tt.length >= 5 && t.startsWith(tt)) return true;
                if (tt && t.length >= 5 && tt.startsWith(t)) return true;
                // Вхождение tt2
                if (tt2 && tt2.length >= 3 && t.includes(tt2)) return true;
                // Вхождение номера магазина
                if (num && num.length >= 1 && t.includes(num)) return true;
                // Вхождение старого названия
                if (old && old.length >= 5 && t.includes(old)) return true;
                return false;
            });
        }

        function init() {

            mandatoryProducts = load(KEYS.MANDATORY, {});
            results = load(KEYS.RESULTS, []);
            
            const settings = load(KEYS.SETTINGS, {});
            minPointsForMatrix = settings.minPointsForMatrix || 5;
            
            // Слушаем изменения в localStorage (если обновили магазины в другом окне)
            window.addEventListener('storage', (e) => {
                if (e.key === KEYS.STORES) loadStoresFromHTML();
                if (e.key === SharedUtils.STORAGE_KEYS.PRODUCTS || e.key === 'db_products_v1') {
                    try {
                        const arr = SharedUtils.load(SharedUtils.STORAGE_KEYS.PRODUCTS, null);
                        if (Array.isArray(arr) && arr.length > 0) {
                            products = arr;
                            save(KEYS.PRODUCTS, products);
                            render();
                        }
                    } catch(e) {}
                }
                if (e.key === SharedUtils.STORAGE_KEYS.MATRIX || e.key === 'db_matrix_marks_v1') {
                    try {
                        const newMarks = SharedUtils.load(SharedUtils.STORAGE_KEYS.MATRIX, null);
                        if (newMarks && Object.keys(newMarks).length > 0 && results.length > 0) {
                            results.forEach(r => {
                                const nc = normCode(r.code);
                                if (newMarks[nc]) {
                                    stores.forEach(s => {
                                        if (newMarks[nc][s.tt] !== undefined) {
                                            r.inMatrix = newMarks[nc][s.tt];
                                        }
                                    });
                                }
                            });
                            render();
                        }
                    } catch(e) {}
                }
            });

            // Синхронизация assortment/stores/matrix с другими файлами через SharedData
            if (window.SharedData) {
                SharedData.onChange(({ source }) => {
                    if (source !== 'matrix-calc') {
                        const newProducts = SharedData.getProducts();
                        if (newProducts.length > 0) {
                            products = newProducts;
                            save(KEYS.PRODUCTS, products);
                        }
                        const newStores = SharedData.getStores();
                        if (newStores.length > 0) loadStoresFromHTML();
                        // Синхронизация отметок матрицы из universal
                        const newMarks = SharedData.getMatrixMarks();
                        if (newMarks && Object.keys(newMarks).length > 0 && results.length > 0) {
                            let merged = 0;
                            results.forEach(r => {
                                const nc = normCode(r.code);
                                if (newMarks[nc]) {
                                    stores.forEach(s => {
                                        if (newMarks[nc][s.tt] !== undefined && r.inMatrix !== newMarks[nc][s.tt]) {
                                            r.inMatrix = newMarks[nc][s.tt];
                                            merged++;
                                        }
                                    });
                                }
                            });
                            if (merged > 0) {
                                save(KEYS.RESULTS, results);
                                console.log(`SharedData sync: ${merged} marks обновлено из universal`);
                            }
                        }
                        render();
                    }
                });
            }
            
            render();
        }

        function exportAssortment() {
            if (products.length === 0) { alert('Нет данных'); return; }
            // Группируем и сортируем как раньше
            const grouped = {};
            products.forEach(p => {
                const g = p.group || 'Без группы';
                if (!grouped[g]) grouped[g] = [];
                grouped[g].push(p);
            });
            const sorted = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'ru'));
            const sortedProducts = [];
            sorted.forEach(g => sortedProducts.push(...grouped[g]));

            // Конвертируем mandatoryProducts (plain object) в Set
            const mandatorySet = new Set(Object.keys(mandatoryProducts).filter(code => mandatoryProducts[code]));
            SharedUtils.exportAssortmentUnified(sortedProducts, { mandatorySet: mandatorySet });
        }

        // === СОХРАНЕНИЕ И ЗАГРУЗКА АССОРТИМЕНТА ===
        const ASSORTMENTS_KEY = SharedUtils.STORAGE_KEYS.SAVED_ASSORTMENTS;
        let currentLoadedAssortment = null; // Имя загруженного сохранённого списка (для авто-синхронизации)

        function syncToSavedAssortment() {
            if (!currentLoadedAssortment) return;
            const saved = getSavedAssortments();
            const idx = saved.findIndex(s => s.name === currentLoadedAssortment);
            if (idx < 0) return;
            const mandatory = {};
            products.forEach(p => {
                if (p.code && mandatoryProducts[p.code]) mandatory[p.code] = true;
            });
            saved[idx] = {
                ...saved[idx],
                date: new Date().toISOString(),
                count: products.length,
                data: JSON.parse(JSON.stringify(products)),
                mandatory: mandatory,
                totalSales: products.reduce(function(sum, p) { return sum + (p.totalSales || 0); }, 0)
            };
            SharedUtils.save(ASSORTMENTS_KEY, saved);
        }

        function getSavedAssortments() {
            return SharedUtils.load(ASSORTMENTS_KEY, []);
        }

        function showSaveAssortmentModal() {
            if (products.length === 0) {
                alert('Нет данных для сохранения');
                return;
            }
            
            const name = prompt('Введите название для сохранения:', `Ассортимент ${new Date().toLocaleDateString('ru-RU')}`);
            if (!name) return;
            
            const saved = getSavedAssortments();
            const existing = saved.findIndex(s => s.name === name);
            
            // Собираем пометки обязательных для товаров в текущем ассортименте
            const mandatory = {};
            products.forEach(p => {
                if (p.code && mandatoryProducts[p.code]) mandatory[p.code] = true;
            });

            const record = {
                name,
                date: new Date().toISOString(),
                count: products.length,
                data: products,
                mandatory: mandatory
            };
            
            if (existing >= 0) {
                if (confirm(`Сохранение "${name}" уже существует. Перезаписать?`)) {
                    saved[existing] = record;
                } else {
                    return;
                }
            } else {
                saved.push(record);
            }
            
            SharedUtils.save(ASSORTMENTS_KEY, saved);
            alert(`Сохранено: ${products.length} товаров под названием "${name}"`);
        }

        function showLoadAssortmentModal() {
            const saved = getSavedAssortments();
            
            if (saved.length === 0) {
                alert('Нет сохранённых ассортиментов');
                return;
            }
            
            // Создаём модальное окно для выбора
            const existingModal = document.getElementById('loadAssortmentModal');
            if (existingModal) existingModal.remove();
            
            const modal = document.createElement('div');
            modal.id = 'loadAssortmentModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg border border-gray-200 p-6 w-full max-w-md shadow-lg" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-900">${icons.list} Загрузить ассортимент</h3>
                        <button onclick="document.getElementById('loadAssortmentModal').remove()" class="text-gray-400 hover:text-gray-600">${icons.x}</button>
                    </div>
                    <div class="max-h-80 overflow-y-auto border rounded-lg divide-y">
                        ${saved.map((s, i) => `
                            <div class="p-3 hover:bg-gray-50 cursor-pointer flex justify-between items-center" onclick="loadAssortmentByName('${s.name.replace(/'/g, "\\'")}')">
                                <div>
                                    <div class="font-medium text-gray-900">${s.name}</div>
                                    <div class="text-xs text-gray-500">${s.count} товаров • ${new Date(s.date).toLocaleDateString('ru-RU')}</div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="event.stopPropagation(); deleteAssortment('${s.name.replace(/'/g, "\\'")}')" class="text-red-500 hover:text-red-700 p-1" title="Удалить">${icons.trash}</button>
                                    <span class="text-green-600">Загрузить →</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            modal.addEventListener('click', () => modal.remove());
            document.body.appendChild(modal);
        }

        function loadAssortmentByName(name) {
            const saved = getSavedAssortments();
            const record = saved.find(s => s.name === name);
            
            if (!record) {
                alert('Ассортимент не найден');
                return;
            }
            
            if (products.length > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count} товаров)?\nТекущий ассортимент будет заменён.`)) {
                    return;
                }
            }
            
            products = record.data;
            
            // Восстанавливаем пометки обязательных товаров
            if (record.mandatory && typeof record.mandatory === 'object') {
                Object.entries(record.mandatory).forEach(([code, val]) => {
                    if (val) mandatoryProducts[code] = true;
                });
                save(KEYS.MANDATORY, mandatoryProducts);
            }
            
            save(KEYS.PRODUCTS, products);
            currentLoadedAssortment = name;

            // Закрываем модальное окно
            const modal = document.getElementById('loadAssortmentModal');
            if (modal) modal.remove();
            
            render();
            alert(`Загружено: ${products.length} товаров из "${name}"`);
        }

        function deleteAssortment(name) {
            if (!confirm(`Удалить сохранение "${name}"?`)) return;
            
            let saved = getSavedAssortments();
            saved = saved.filter(s => s.name !== name);
            SharedUtils.save(ASSORTMENTS_KEY, saved);
            
            // Обновляем интерфейс
            const modal = document.getElementById('loadAssortmentModal');
            if (modal) modal.remove();
            render();
        }

        // Экспорт списка сохранённых ассортиментов для universal.html
        function exportAssortmentsList() {
            const saved = getSavedAssortments();
            return saved.map(s => ({
                name: s.name,
                count: s.count,
                date: s.date
            }));
        }

        // === СОХРАНЕНИЕ И ЗАГРУЗКА МАТРИЦ ===
        const MATRICES_KEY = SharedUtils.STORAGE_KEYS.SAVED_MATRICES;

        function getSavedMatrices() {
            return SharedUtils.load(MATRICES_KEY, []);
        }

        function showSaveMatrixModal() {
            if (results.length === 0) {
                alert('Нет данных для сохранения. Сначала рассчитайте анализ.');
                return;
            }

            const name = prompt('Введите название для сохранения матрицы:', `Матрица ${new Date().toLocaleDateString('ru-RU')}`);
            if (!name) return;

            const saved = getSavedMatrices();
            const existing = saved.findIndex(s => s.name === name);

            // Собираем данные матрицы из results
            const matrixData = {};
            results.forEach(r => {
                const key = r.code;
                if (!matrixData[key]) matrixData[key] = { code: r.code, nomenclature: r.nomenclature, group: r.group, inMatrix: r.inMatrix };
                matrixData[key][r.tt] = r.inMatrix;
            });

            const record = {
                name,
                date: new Date().toISOString(),
                count: results.length,
                products: Object.keys(matrixData).length,
                inMatrix: results.filter(r => r.inMatrix === 'ДА').length,
                results: results,
                matrixData: matrixData
            };

            if (existing >= 0) {
                if (confirm(`Сохранение "${name}" уже существует. Перезаписать?`)) {
                    saved[existing] = record;
                } else {
                    return;

        function loadMatrixByName(name) {
            const saved = getSavedMatrices();
            const record = saved.find(s => s.name === name);

            if (!record) {
                alert('Матрица не найдена');
                return;
            }

            if (results.length > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count || 0} записей)?\nТекущие результаты анализа будут заменены.`)) {
                    return;
                }
            }

            results = record.results || [];

            // Сливаем с отметками из universal (shared_matrix_v1)
            try {
                const sharedMarks = SharedUtils.load(SharedUtils.STORAGE_KEYS.MATRIX, {});
                if (sharedMarks && Object.keys(sharedMarks).length > 0) {
                    let merged = 0;
                    results.forEach(r => {
                        const nc = normCode(r.code);
                        if (sharedMarks[nc]) {
                            const marks = sharedMarks[nc];
                            stores.forEach(s => {
                                if (marks[s.tt] !== undefined) {
                                    const oldVal = r.inMatrix;
                                    r.inMatrix = marks[s.tt];
                                    if (oldVal !== marks[s.tt]) merged++;
                                }
                            });
                        }
                    });
                    if (merged > 0) {
                        console.log(`Слияние с universal: ${merged} отметок обновлено`);
                    }
                }
            } catch(e) { console.error('Merge marks error:', e); }

            save(KEYS.RESULTS, results);
            syncMarksToShared();

            const modal = document.getElementById('loadMatrixModal');
            if (modal) modal.remove();

            render();
            alert(`Загружено: ${results.length} записей матрицы из "${name}"`);
        }

        function deleteMatrix(name) {
            if (!confirm(`Удалить сохранение "${name}"?`)) return;

            let saved = getSavedMatrices();
            saved = saved.filter(s => s.name !== name);
            SharedUtils.save(MATRICES_KEY, saved);

            const modal = document.getElementById('loadMatrixModal');
            if (modal) modal.remove();
            render();
        }

        function updateProduct(code, field, value) {
            const product = products.find(p => p.code === code);
            if (product) {
                product[field] = value;
                save(KEYS.PRODUCTS, products);
            }
        }

        function saveAllPrices() {
            let updatedInPrice = 0;
            document.querySelectorAll('input[data-field="newInPrice"]').forEach(function(inputEl) {
                const code = inputEl.dataset.code;
                if (!code) return;
                const val = parseFloat(inputEl.value);
                if (isNaN(val) || val <= 0) return;
                const p = products.find(item => item.code === code);
                if (!p) return;
                p.inPrice = val;
                p.price = val;
                if (val > 0 && p.shelfPrice > 0) {
                    const markup = p.markup || defaultMarkup || 25;
                    p.shelfPrice = Math.round(val * (1 + markup / 100));
                }
                updatedInPrice++;
                inputEl.value = '';
            });
            if (updatedInPrice === 0) { alert('Нет новых цен для сохранения'); return; }
            save(KEYS.PRODUCTS, products);
            syncToSavedAssortment();
            render();
            alert('Сохранено: ' + updatedInPrice + ' товаров\nДанные синхронизированы.');
        }

            const container = document.getElementById('assortmentTableContainer');

            products = products.filter(p => p.code !== code);
            delete mandatoryProducts[code];
            save(KEYS.PRODUCTS, products);

        function renderAnalysis() {
            if (results.length === 0) {
                return `<div class="bg-white rounded-lg border border-gray-200 p-4">

                        <svg class="w-12 h-12 mx-auto text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>

                    </div>
                </div>`;
            }

            // Groups and TTs for filters
            const groups = [...new Set(results.map(r => r.group || 'Без группы'))].sort((a, b) => a.localeCompare(b, 'ru'));
            const tts = [...new Set(results.map(r => r.tt))].sort((a, b) => a.localeCompare(b, 'ru'));

            // Filter results — фильтруем только если справочник магазинов/ассортимент загружен
            const hasStores = stores.length > 0;
            const productCodes = new Set(products.map(p => p.code));
            const filteredResults = results.filter(r => {
                // Фильтруем по магазинам из stores.html
                if (hasStores && !storeMatches(r.tt)) return false;
                // Фильтруем по ассортименту только если список не пустой
                if (products.length > 0 && !productCodes.has(r.code)) return false;
                if (selectedTT && r.tt !== selectedTT) return false;
                if (selectedGroup && (r.group || 'Без группы') !== selectedGroup) return false;
                if (searchProduct && !r.nomenclature?.toLowerCase().includes(searchProduct.toLowerCase()) && !r.code.includes(searchProduct)) return false;
                if (filterMatrixStatus === 'yes' && r.inMatrix !== 'ДА') return false;
                if (filterMatrixStatus === 'no' && r.inMatrix !== 'НЕТ') return false;
                if (filterABC === 'A' && r.abcClass !== 'A') return false;
                if (filterABC === 'B' && r.abcClass !== 'B') return false;
                if (filterABC === 'C' && r.abcClass !== 'C') return false;
                return true;
            });

            // Stats
            const stats = {
                total: results.length,
                inMatrix: results.filter(r => r.inMatrix === 'ДА').length,
                notInMatrix: results.filter(r => r.inMatrix === 'НЕТ').length,
                mandatory: results.filter(r => r.isMandatory).length,
                abcA: results.filter(r => r.abcClass === 'A').length,
                abcB: results.filter(r => r.abcClass === 'B').length,
                abcC: results.filter(r => r.abcClass === 'C').length
            };

            // Сортируем: ТТ → Группа → ABC (A,B,C) → Алфавит
            const abcOrder = { 'A': 1, 'B': 2, 'C': 3 };
            filteredResults.sort((a, b) => {
                const ttCompare = a.tt.localeCompare(b.tt, 'ru');
                if (ttCompare !== 0) return ttCompare;
                
                const groupA = a.group || 'Без группы';
                const groupB = b.group || 'Без группы';
                const groupCompare = groupA.localeCompare(groupB, 'ru');
                if (groupCompare !== 0) return groupCompare;
                
                const abcCompare = (abcOrder[a.abcClass] || 3) - (abcOrder[b.abcClass] || 3);
                if (abcCompare !== 0) return abcCompare;
                
                return (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru');
            });

            return `

                    <div class="flex flex-wrap justify-between items-center gap-2">

                            </div>
                            <div class="bg-rose-100 text-rose-800 rounded-lg px-2 py-1 text-center min-w-[50px]">
                                <div class="text-[8px] opacity-70">НЕТ</div>
                                <div class="text-base font-bold">${stats.notInMatrix}</div>
                            </div>
                            <div class="bg-gray-200 text-gray-800 rounded-lg px-2 py-1 text-center min-w-[50px] cursor-pointer hover:bg-gray-200" onclick="showMandatoryModal()">

                                <div class="text-base font-bold">${stats.mandatory}</div>
                            </div>
                            <div class="flex gap-1 ml-1">
                                <div class="bg-green-200 text-green-800 rounded px-1.5 py-0.5 text-[10px]"><strong>A:</strong> ${stats.abcA}</div>
                                <div class="bg-yellow-200 text-yellow-800 rounded px-1.5 py-0.5 text-[10px]"><strong>B:</strong> ${stats.abcB}</div>
                                <div class="bg-red-200 text-red-800 rounded px-1.5 py-0.5 text-[10px]"><strong>C:</strong> ${stats.abcC}</div>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 items-center">
                            <select onchange="selectedTT=this.value;filterAnalysis()" class="px-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-gray-500">
                                <option value="">Магазин (${tts.length})</option>
                                ${tts.map(tt => `<option value="${tt}" ${selectedTT === tt ? 'selected' : ''}>${tt.substring(0,20)}${tt.length>20?'...':''}</option>`).join('')}
                            </select>
                            <select onchange="selectedGroup=this.value;filterAnalysis()" class="px-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-gray-500">
                                <option value="">Группа (${groups.length})</option>

                                    <th class="col-header bg-emerald-100" style="min-width:70px">В матрице</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${(() => {
                                    // Подсчитываем статистику по ТТ и группам
                                    const ttStats = {};
                                    const groupStats = {};
                                    filteredResults.forEach(r => {
                                        const grp = r.group || 'Без группы';
                                        if (!ttStats[r.tt]) ttStats[r.tt] = { count: 0, inMatrix: 0, notInMatrix: 0 };
                                        ttStats[r.tt].count++;
                                        if (r.inMatrix === 'ДА') ttStats[r.tt].inMatrix++;
                                        else ttStats[r.tt].notInMatrix++;
                                        
                                        const key = r.tt + '|' + grp;
                                        if (!groupStats[key]) groupStats[key] = { count: 0, inMatrix: 0, notInMatrix: 0, group: grp };
                                        groupStats[key].count++;
                                        if (r.inMatrix === 'ДА') groupStats[key].inMatrix++;
                                        else groupStats[key].notInMatrix++;

                                    filteredResults.forEach(r => {
                                        const grp = r.group || 'Без группы';

                                        const sortedGroups = Object.keys(ttGroups[tt]).sort((a, b) => a.localeCompare(b, 'ru'));

                                            const groupKey = tt + '_' + grp;

                                            ttGroups[tt][grp].forEach((r, idx) => {

                                                const matrixBtnClass = r.inMatrix === 'ДА' 
                                                    ? 'bg-emerald-500 hover:bg-emerald-600 text-white' 
                                                    : 'bg-red-500 hover:bg-red-600 text-white';
                                                const matrixBtn = `<button onclick="event.stopPropagation();toggleAnalysisMatrix('${r.tt}', '${r.code}')" class="px-2 py-1 rounded text-xs font-bold ${matrixBtnClass} cursor-pointer" title="Нажмите чтобы изменить">${r.inMatrix === 'ДА' ? '✓ ДА' : '✗ НЕТ'}</button>`;

                                                rows.push(`
                                                    <tr class="hover:bg-gray-50">
                                                        <td class="text-left text-[10px] text-gray-400"></td>
                                                        <td class="text-left text-[10px] text-gray-500 font-medium"></td>

                                                        <td class="font-mono text-[10px] ${cellColor}">${r.code}</td>
                                                        <td class="${cellColor} text-center">
                                                            <button onclick="event.stopPropagation();showCalcDetails('${r.tt}', '${r.code}')" class="px-2 py-0.5 rounded hover:opacity-80 font-medium cursor-pointer" title="Нажмите для просмотра расчёта">
                                                                ${r.sales.toFixed(1)}
                                                            </button>
                                                        </td>
                                                        <td class="${cellColor} text-center">${r.daysPresent}</td>
                                                        <td class="${cellColor} text-center ${r.writeoff > 0 ? 'text-red-600 font-medium' : ''}">${r.writeoff.toFixed(1)}</td>
                                                        <td class="${cellColor} text-center">${r.avgPerDay.toFixed(2)}</td>
                                                        <td class="${cellColor} text-center">${r.writeoffPercent.toFixed(0)}%</td>
                                                        <td class="${cellColor} text-center">
                                                            <span class="text-[9px] font-medium ${r.abcSales === 'A' ? 'text-green-700' : r.abcSales === 'B' ? 'text-yellow-700' : 'text-red-700'}">${r.abcSales}</span>
                                                            <span class="text-gray-400">/</span>
                                                            <span class="text-[9px] font-medium ${r.abcTurnover === 'A' ? 'text-green-700' : r.abcTurnover === 'B' ? 'text-yellow-700' : 'text-red-700'}">${r.abcTurnover}</span>
                                                            <span class="text-gray-400">/</span>
                                                            <span class="text-[9px] font-medium ${r.abcWriteoff === 'A' ? 'text-green-700' : r.abcWriteoff === 'B' ? 'text-yellow-700' : 'text-red-700'}">${r.abcWriteoff}</span>
                                                        </td>
                                                        <td class="${cellColor} text-center">
                                                            <span class="px-2 py-0.5 rounded text-xs font-bold ${r.abcScore >= 7 ? 'bg-green-300 text-green-900' : r.abcScore >= 5 ? 'bg-yellow-300 text-yellow-900' : 'bg-red-300 text-red-900'}">${r.abcScore}</span>
                                                        </td>
                                                        <td class="${cellColor} text-center">${matrixBtn}</td>
                                                    </tr>
                                                `);
                                            });
                                        });
                                    });

                                    return rows.join('');
                                })()}
                            </tbody>
                        </table>
                    </div>

        }

        let searchTimeoutAnalysis = null;

        // Быстрый фильтр анализа (для select-ов)
        function filterAnalysis() {

        // Синхронизация marks из results в shared_matrix_v1 + SharedData
        function syncMarksToShared() {
            try {
                const marks = {};
                results.forEach(r => {
                    if (r.inMatrix === 'ДА' || r.inMatrix === 'НЕТ') {
                        if (!marks[r.code]) marks[r.code] = {};
                        marks[r.code][r.tt] = r.inMatrix;
                    }
                });
                SharedUtils.save(SharedUtils.STORAGE_KEYS.MATRIX, marks);
                if (window.SharedData) SharedData.saveMatrixMarks(marks, 'matrix-calc');
            } catch(e) {}
        }

        // Переключение статуса товара в матрице из таблицы анализа — быстрое, без полного рендера
        function toggleAnalysisMatrix(tt, code) {
            const container = document.getElementById('analysisTableContainer');
            const scrollTop = container ? container.scrollTop : 0;

            results.forEach(r => {
                if (r.tt === tt && r.code === code) {
                    r.inMatrix = r.inMatrix === 'ДА' ? 'НЕТ' : 'ДА';
                    r.manualEdit = true;
                    r.reason = r.inMatrix === 'ДА' ? 'Вручную добавлен' : 'Вручную удалён';
                }
            });
            save(KEYS.RESULTS, results);
            syncMarksToShared();

            // Быстрое обновление только изменённой ячейки и счётчиков — без полного render()
            const btn = event.target.closest('button');
            if (btn) {
                const isDA = results.find(r => r.tt === tt && r.code === code)?.inMatrix === 'ДА';
                btn.className = `px-2 py-1 rounded text-xs font-bold ${isDA ? 'bg-emerald-500 hover:bg-emerald-600 text-white' : 'bg-red-500 hover:bg-red-600 text-white'} cursor-pointer`;
                btn.textContent = isDA ? '✓ ДА' : '✗ НЕТ';

            // Обновляем счётчики в TT-заголовке
            const ttHeaderCell = container?.querySelector(`td[onclick="toggleTT('${tt.replace(/'/g, "\\'")}')"]`);
            // Простой fallback: обновляем через data-атрибут или просто пропускаем (счётчики обновятся при следующем render)
        }

        function renderMatrix() {
            if (results.length === 0) {
                return `<div class="bg-white rounded-lg border border-gray-200 p-4">
                    <div class="text-center py-12">
                        <svg class="w-12 h-12 mx-auto text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        <p class="text-gray-500 mt-3">Нет данных. Загрузите файлы и нажмите "Рассчитать анализ"</p>
                    </div>
                </div>`;
            }

            // Фильтруем только по магазинам из stores.html
            const hasStores = stores.length > 0;
            const filteredResults = hasStores
                ? results.filter(r => storeMatches(r.tt))
                : results;

            // Get unique TTs and products (только из отфильтрованных)
            const tts = [...new Set(filteredResults.map(r => r.tt))].sort((a, b) => a.localeCompare(b, 'ru'));
            const productMap = new Map();
            filteredResults.forEach(r => {
                if (!productMap.has(r.code)) {
                    productMap.set(r.code, { code: r.code, nomenclature: r.nomenclature, group: r.group });
                }
            });

            // Build matrix data (только из отфильтрованных)
            const matrixData = {};
            filteredResults.forEach(r => {
                const key = r.code;
                if (!matrixData[key]) matrixData[key] = { code: r.code, nomenclature: r.nomenclature, group: r.group };
                matrixData[key][r.tt] = r.inMatrix;
            });

            // Filter by search
            let filteredMatrixData = Object.entries(matrixData);
            if (matrixSearch) {
                const searchLower = matrixSearch.toLowerCase();
                filteredMatrixData = filteredMatrixData.filter(([code, p]) => 
                    (p.nomenclature || '').toLowerCase().includes(searchLower) ||
                    (p.code || '').toLowerCase().includes(searchLower) ||
                    (p.group || '').toLowerCase().includes(searchLower)
                );
            }

            // Group by category
            const grouped = {};
            filteredMatrixData.forEach(([code, p]) => {
                const gr = p.group || 'Без группы';
                if (!grouped[gr]) grouped[gr] = [];
                grouped[gr].push(p);

            return `

                        <div class="flex gap-2 items-center">

                                    value="${matrixSearch}"

                                    class="pl-8 pr-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-gray-500 w-56"
                                >
                                <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400">${icons.search}</span>
                                ${matrixSearch ? `<button onclick="matrixSearch='';filterMatrix()" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">${icons.x}</button>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="showSaveMatrixModal()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-amber-600 rounded-lg hover:bg-amber-700">${icons.save} Сохранить</button>
                            <button onclick="document.getElementById('matrixImportInput').click()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700">${icons.import} Импорт</button>
                            <input type="file" id="matrixImportInput" accept=".xlsx,.xls,.csv" onchange="importMatrix(this)" class="hidden">
                            <button onclick="exportMatrix()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <div class="table-container" id="matrixTableContainer">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th class="text-left" style="min-width:100px">Группа</th>
                                    <th class="text-left" style="min-width:150px">Наименование</th>
                                    <th class="text-left">Код</th>
                                    ${tts.map(tt => `<th style="min-width:50px; height:70px; white-space:normal; word-wrap:break-word; line-height:1.2; vertical-align:bottom; padding:6px 4px; font-size:9px;">${tt}</th>`).join('')}
                                </tr>
                            </thead>

                                ${Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0], 'ru')).map(([gr, items]) => `
                                    <tr class="group-header cursor-pointer" onclick="toggleGroup('matrix_${gr}')">
                                        <td colspan="${3 + tts.length}" class="text-left py-1 px-2">
                                            <div class="flex items-center gap-2">
                                                ${collapsedGroups['matrix_' + gr] ? icons.chevronRight : icons.chevronDown}
                                                <span class="font-semibold text-xs">${gr}</span>
                                                <span class="text-[10px] bg-gray-200 text-gray-800 px-1 rounded">${items.length}</span>

                                    ${collapsedGroups['matrix_' + gr] ? '' : items.map(p => `
                                        <tr class="hover:bg-gray-50">
                                            <td class="text-left text-[10px]">${p.group || ''}</td>
                                            <td class="text-left font-medium text-xs">${p.nomenclature || ''}</td>
                                            <td class="font-mono text-[10px]">${p.code}</td>
                                            ${tts.map(tt => `
                                                <td class="cursor-pointer font-medium select-none ${p[tt] === 'ДА' ? 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200' : 'bg-rose-50 text-rose-600 hover:bg-rose-100'}" onclick="toggleMatrixCell('${p.code}', '${tt}')">
                                                    ${p[tt] === 'ДА' ? icons.check : ''}
                                                </td>
                                            `).join('')}
                                        </tr>
                                    `).join('')}
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        // Импорт матрицы с вкладки Матрица — работает через тот же merge-механизм
        function importMatrix(input) {
            // Делегируем в handleMatrixUpload — та же логика слияния
            handleMatrixUpload(input);
        }

        function toggleMatrixCell(code, tt) {
            // Ищем существующую запись
            let found = false;
            results.forEach(r => {
                if (r.code === code && r.tt === tt) {
                    r.inMatrix = r.inMatrix === 'ДА' ? 'НЕТ' : 'ДА';
                    r.manualEdit = true;
                    found = true;
                }
            });
            
            // Если записи нет - создаём новую
            if (!found) {
                // Находим данные о товаре из ассортимента
                const product = products.find(p => p.code === code);
                const newRecord = {
                    tt: tt,
                    code: code,
                    nomenclature: product ? product.nomenclature : code,
                    group: product ? product.group : '',
                    sales: 0,
                    stock: 0,
                    totalDays: 0,
                    daysPresent: 0,
                    avgPerDay: 0,
                    turnoverIndex: 999,
                    writeoff: 0,
                    writeoffPercent: 0,
                    abcSales: 'C',
                    abcTurnover: 'C',
                    abcWriteoff: 'A',
                    abcScore: 5,
                    abcClass: 'C',
                    hasPrice: false,
                    price: 0,
                    shelf: 0,
                    profitIndex: 0,
                    inMatrix: 'ДА',
                    isMandatory: false,
                    reason: 'Вручную добавлен в матрицу',
                    manualEdit: true

                results.push(newRecord);

            save(KEYS.RESULTS, results);
            syncMarksToShared();
            render();

        // Фильтрация матрицы без полной перерисовки (сохраняет фокус и скролл)
        function filterMatrix() {
            const container = document.getElementById('matrixTableContainer');
            const scrollTop = container ? container.scrollTop : 0;

            // Перерисовываем только tbody
            const tbody = document.querySelector('#matrixTableContainer tbody');
            if (!tbody) {
                render();
                return;

                ${collapsedGroups['matrix_' + gr] ? '' : items.map(p => `

                            <td class="cursor-pointer font-medium select-none ${p[tt] === 'ДА' ? 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200' : 'bg-rose-50 text-rose-600 hover:bg-rose-100'}" onclick="toggleMatrixCell('${p.code}', '${tt}')">

        function exportAnalysis() {
            if (results.length === 0) { alert('Нет данных'); return; }

            // Фильтруем только по магазинам из stores.html
            const hasStores = stores.length > 0;
            const filteredResults = hasStores
                ? results.filter(r => storeMatches(r.tt))
                : results;

            // Сортируем: ТТ → Группа → ABC (A,B,C)
            const abcOrder = { 'A': 1, 'B': 2, 'C': 3 };
            filteredResults.sort((a, b) => {
                const ttCompare = a.tt.localeCompare(b.tt, 'ru');
                if (ttCompare !== 0) return ttCompare;
                
                const groupA = a.group || 'Без группы';
                const groupB = b.group || 'Без группы';
                const groupCompare = groupA.localeCompare(groupB, 'ru');
                if (groupCompare !== 0) return groupCompare;
                
                return (abcOrder[a.abcClass] || 3) - (abcOrder[b.abcClass] || 3);
            });

            const headers = ['ТТ', 'Группа', 'Наименование', 'Код', 'Продажи', 'Дней торговли', 'Списание', 'Ср.прод/день', '% спис.', 'ABC (П/О/С)', 'Итого', 'В матрице'];
            const data = [];
            
            filteredResults.forEach(r => {
                data.push([
                    r.tt,
                    r.group || '',
                    r.nomenclature,

                    r.sales.toFixed(1),
                    r.daysPresent,
                    r.writeoff.toFixed(1),
                    r.avgPerDay.toFixed(2),
                    r.writeoffPercent.toFixed(0),
                    `${r.abcSales}/${r.abcTurnover}/${r.abcWriteoff}`,
                    r.abcScore,

        // === FILE PARSING ===
        function handleFile(input, type) {
            if (type === 'assortment') {
                const file = input.files[0];
                if (!file) return;
                currentLoadedAssortment = null;
                SharedUtils.importAssortmentUnified(file).then(function(result) {
                    products = result.items;
                    products.forEach(function(p) {
                        if (!p.markup && p.markup !== 0) p.markup = defaultMarkup;
                        if (!p.inPrice) p.inPrice = p.price || 0;
                    });
                    save(KEYS.PRODUCTS, products);
                    syncToSavedAssortment();
                    render();
                    alert('Загружено товаров: ' + products.length);
                }).catch(function(err) {
                    alert('Ошибка импорта: ' + err.message);
                    console.error(err);
                });
                input.value = '';
                return;
            }

            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });

                    if (type === 'sales') {
                        const { items } = SharedUtils.parseSales(json);
                        sales = items;
                        save(KEYS.SALES, sales);
                    } else if (type === 'stocks') {
                        const { items } = SharedUtils.parseStocks(json);
                        stocks = items;
                        save(KEYS.STOCKS, stocks);
                    } else if (type === 'writeoff') {
                        const { items } = SharedUtils.parseWriteoffs(json);
                        writeoffs = items;
                        save(KEYS.WRITEOFFS, writeoffs);
                    }

                    render();
                } catch (err) {
                    console.error('Parse error:', err);
                    alert('Ошибка: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        // Загрузка матрицы из Excel файла — единый формат (автоопределение старого/нового)
        function handleMatrixUpload(input) {
            const file = input.files[0];
            if (!file) return;

            SharedUtils.importMatrixExcel(file).then(({ marks, products }) => {
                const importCodes = new Set(Object.keys(marks));
                const importTTs = new Set(Object.keys(marks).flatMap(code => Object.keys(marks[code])));

                // Если results пуст — создаём записи из файла (первый импорт без анализа)
                if (results.length === 0) {
                    if (!confirm(`Загрузить матрицу из файла (${products.length} товаров)?\nАнализ не был рассчитан — данные будут только из файла.`)) return;

                    const parsed = [];
                    products.forEach(p => {
                        Object.entries(marks[p.code] || {}).forEach(([tt, val]) => {
                            parsed.push({
                                tt, code: p.code, nomenclature: p.nomenclature,
                                group: p.group,
                                inMatrix: val,
                                sales: 0, stock: 0, daysPresent: 0, totalDays: 0,
                                avgPerDay: 0, turnoverIndex: 999, writeoff: 0, writeoffPercent: 0,
                                abcSales: 'C', abcTurnover: 'C', abcWriteoff: 'A',
                                abcScore: 5, abcClass: 'C', hasPrice: false,
                                isMandatory: false, manualEdit: true
                            });
                        });
                    });
                    results = parsed;
                    save(KEYS.RESULTS, results);
                    syncMarksToShared();
                    render();
                    alert(`Загружено ${parsed.length} записей матрицы из файла`);
                    return;
                }

                // РЕЖИМ СЛИЯНИЯ: обновляем inMatrix из файла, не затирая ABC-данные
                let updatedDA = 0, updatedNET = 0, setToNET = 0;

                results.forEach(r => {
                    const code = normCode(r.code);
                    const codeMarks = marks[code];

                    if (codeMarks) {
                        const imported = codeMarks[r.tt];
                        if (imported !== undefined) {
                            if (r.inMatrix !== imported) {
                                if (imported === 'ДА') updatedDA++;
                                else updatedNET++;
                                r.inMatrix = imported;
                                r.manualEdit = true;
                            }
                        } else {
                            // ТТ есть в results, но нет в файле для этого кода
                            if (r.inMatrix === 'ДА') {
                                r.inMatrix = 'НЕТ';
                                r.manualEdit = true;
                                setToNET++;
                            }
                        }
                    } else {
                        // Код отсутствует в файле — убираем из матрицы
                        if (r.inMatrix === 'ДА') {
                            r.inMatrix = 'НЕТ';
                            r.manualEdit = true;
                            setToNET++;
                        }
                    }
                });

                // Обновляем названия товаров и групп из файла
                products.forEach(p => {
                    results.forEach(res => {
                        if (normCode(res.code) === p.code) {
                            if (p.nomenclature && p.nomenclature !== '0') res.nomenclature = p.nomenclature;
                            if (p.group) res.group = p.group;
                        }
                    });
                });

                save(KEYS.RESULTS, results);
                syncMarksToShared();
                render();

                const msg = `Матрица обновлена из файла:\n• Установлено ДА: ${updatedDA}\n• Установлено НЕТ: ${updatedNET}\n• Убрано (нет в файле): ${setToNET}`;
            }).catch(err => {
                console.error('Matrix parse error:', err);
                alert('Ошибка чтения матрицы: ' + err.message);
            });

            input.value = '';
        }

        // === ANALYSIS ===
        function runAnalysis() {
            if (sales.length === 0 && stocks.length === 0) {
                alert('Загрузите файлы продаж и/или остатков!');
                return;
            }

            const salesMap = new Map();
            sales.forEach(s => {
                let code = s.code;
                const stockByCode = stocks.find(st => st.code === s.code && st.tt === s.tt);
                if (!stockByCode) {
                    const stockByName = stocks.find(st => st.productName === s.name && st.tt === s.tt);
                    if (stockByName) code = stockByName.code;
                }
                const key = `${s.tt}_${code}`;
                salesMap.set(key, (salesMap.get(key) || 0) + s.quantity);
            });

            const stockMap = new Map();
            const daysMap = new Map();
            const totalDaysMap = new Map();
            const nameMap = new Map();
            const avgStockMap = new Map();
            const firstStockMap = new Map();

            stocks.forEach(s => {
                const key = `${s.tt}_${s.code}`;
                stockMap.set(key, s.currentStock);           // Конечный остаток
                firstStockMap.set(key, s.currentStock);       // Начальный остаток (нет отдельного поля)
                daysMap.set(key, s.daysPresent || 1);        // Дней с остатком > 0
                totalDaysMap.set(key, s.totalDays || 30);     // Всего дней в периоде
                nameMap.set(key, s.productName);
                avgStockMap.set(key, s.currentStock);         // Средний запас (текущий остаток)
            });

            const writeoffMap = new Map();
            writeoffs.forEach(w => {
                let code = w.code;
                // Ищем правильный код через stocks по названию товара
                const stockByCode = stocks.find(st => st.code === w.code && st.tt === w.tt);
                if (!stockByCode) {
                    const stockByName = stocks.find(st => st.productName === w.name && st.tt === w.tt);
                    if (stockByName) code = stockByName.code;
                }
                const key = `${w.tt}_${code}`;
                writeoffMap.set(key, (writeoffMap.get(key) || 0) + w.quantity);
            });

            const productInfo = {};
            products.forEach(p => { productInfo[p.code] = p; });

            const allPairs = new Set();
            sales.forEach(s => {
                let code = s.code;
                const stockByName = stocks.find(st => st.productName === s.name && st.tt === s.tt);
                if (stockByName) code = stockByName.code;
                allPairs.add(`${s.tt}_${code}`);
            });
            stocks.forEach(s => allPairs.add(`${s.tt}_${s.code}`));
            writeoffs.forEach(w => {
                let code = w.code;
                const stockByName = stocks.find(st => st.productName === w.name && st.tt === w.tt);
                if (stockByName) code = stockByName.code;
                allPairs.add(`${w.tt}_${code}`);
            });

            // Фильтруем только товары из ассортимента и магазины из stores.html
            const productCodes = new Set(products.map(p => p.code));
            const hasStores = stores.length > 0;

            if (products.length > 0 || hasStores) {
                const filteredPairs = new Set();
                allPairs.forEach(pair => {
                    const [tt, code] = pair.split('_');
                    const productOk = products.length === 0 || productCodes.has(code);
                    const storeOk = !hasStores || storeMatches(tt);
                    if (productOk && storeOk) {
                        filteredPairs.add(pair);
                    }
                });
                // Заменяем allPairs на отфильтрованный
                allPairs.clear();
                filteredPairs.forEach(p => allPairs.add(p));
            }

            // ABC анализ внутри каждой группы (ТТ + Группа)
            const groupPairsMap = new Map(); // ключ: "ТТ_Группа" -> [{pair, sales}]
            
            allPairs.forEach(pair => {
                const [tt, code] = pair.split('_');
                const salesQty = salesMap.get(pair) || 0;
                const group = productInfo[code]?.group || 'Без группы';
                const groupKey = `${tt}_${group}`;
                
                if (!groupPairsMap.has(groupKey)) {
                    groupPairsMap.set(groupKey, []);
                }
                groupPairsMap.get(groupKey).push({ pair, sales: salesQty });
            });

            // Сортируем внутри каждой группы по продажам и присваиваем ABC класс
            const abcSalesMap = new Map();   // ABC по объёму продаж
            const abcTurnoverMap = new Map(); // ABC по оборачиваемости
            const abcWriteoffMap = new Map(); // ABC по списаниям
            
            // === ABC по ПРОДАЖАМ (относительный внутри группы ТТ+Категория) ===
            // Средние продажи = продажи / daysPresent (дни когда товар был на полке)
            groupPairsMap.forEach((items, groupKey) => {
                // Считаем средние продажи в день для каждого товара
                items.forEach(item => {
                    const salesQty = salesMap.get(item.pair) || 0;
                    const daysPresent = daysMap.get(item.pair) || 1;
                    item.avgPerDay = salesQty / daysPresent;
                });
                
                // Сортируем по убыванию продаж
                items.sort((a, b) => b.avgPerDay - a.avgPerDay);
                const count = items.length;
                
                items.forEach((item, idx) => {
                    const position = idx / count;
                    let abcClass = 'C';
                    if (count === 1) {
                        abcClass = 'A'; // Если один товар - он лучший
                    } else if (position < 0.2) {
                        abcClass = 'A';
                    } else if (position < 0.5) {
                        abcClass = 'B';
                    }
                    abcSalesMap.set(item.pair, abcClass);
                });
            });
            
            // === ABC по ОБОРАЧИВАЕМОСТИ (абсолютные пороги по дням) ===
            // turnover = (средний остаток * daysPresent) / продажи за период
            // A: ≤ 30 дней, B: 30-45, C: > 45
            allPairs.forEach(pair => {
                const salesQty = salesMap.get(pair) || 0;
                const avgStock = avgStockMap.get(pair) || 0;
                const daysPresent = daysMap.get(pair) || 1;
                
                let turnover = 999;
                if (salesQty > 0 && avgStock > 0) {
                    turnover = (avgStock * daysPresent) / salesQty;
                } else if (salesQty > 0) {
                    turnover = daysPresent;
                }
                
                let abcClass = 'C';
                if (turnover <= 30) abcClass = 'A';
                else if (turnover <= 45) abcClass = 'B';
                
                abcTurnoverMap.set(pair, abcClass);
            });
            
            // === ABC по СПИСАНИЯМ (абсолютные пороги по %) ===
            // A: 0% - нет списаний (отлично!)
            // B: 0.1% - 5% - немного списаний
            // C: > 5% - много списаний
            allPairs.forEach(pair => {
                const salesQty = salesMap.get(pair) || 0;
                const writeoffQty = writeoffMap.get(pair) || 0;
                const writeoffPercent = salesQty > 0 ? (writeoffQty / salesQty) * 100 : 0;
                
                let abcClass = 'C';
                if (writeoffPercent === 0) abcClass = 'A';
                else if (writeoffPercent <= 5) abcClass = 'B';
                
                abcWriteoffMap.set(pair, abcClass);
            });
            
            // === ИТОГОВЫЙ ABC (сумма баллов) ===
            // A = 3, B = 2, C = 1
            const abcScore = { 'A': 3, 'B': 2, 'C': 1 };
            const abcFinalMap = new Map();
            
            allPairs.forEach(pair => {
                const scoreSales = abcScore[abcSalesMap.get(pair)] || 1;
                const scoreTurnover = abcScore[abcTurnoverMap.get(pair)] || 1;
                const scoreWriteoff = abcScore[abcWriteoffMap.get(pair)] || 1;
                const totalScore = scoreSales + scoreTurnover + scoreWriteoff;
                
                // Итоговый класс по сумме баллов
                // Max = 9 (AAA), Min = 3 (CCC)
                let finalClass = 'C';
                if (totalScore >= 7) finalClass = 'A';      // 7-9 баллов
                else if (totalScore >= 5) finalClass = 'B'; // 5-6 баллов
                // 3-4 балла = C
                
                abcFinalMap.set(pair, {
                    sales: abcSalesMap.get(pair) || 'C',
                    turnover: abcTurnoverMap.get(pair) || 'C',
                    writeoff: abcWriteoffMap.get(pair) || 'C',
                    score: totalScore,
                    final: finalClass
                });
            });

            results = [];

            allPairs.forEach(pair => {
                const [tt, code] = pair.split('_');
                const salesQty = salesMap.get(pair) || 0;
                const stockQty = stockMap.get(pair) || 0;
                const avgStock = avgStockMap.get(pair) || stockQty;
                const daysPresent = daysMap.get(pair) || 1;
                const writeoffQty = writeoffMap.get(pair) || 0;
                const nomenclature = nameMap.get(pair) || productInfo[code]?.nomenclature || `Товар ${code}`;
                const group = productInfo[code]?.group || '';
                const price = productInfo[code]?.price || 0;
                const shelf = productInfo[code]?.shelf || 0;
                const hasPrice = price > 0;
                const isMandatory = mandatoryProducts[code] || false;
                
                // Получаем ABC данные
                const abcData = abcFinalMap.get(pair) || { sales: 'C', turnover: 'C', writeoff: 'C', score: 3, final: 'C' };

                const totalDays = totalDaysMap.get(pair) || 30;  // Всего дней в периоде
                const avgPerDay = daysPresent > 0 ? salesQty / daysPresent : 0;
                // Классическая формула оборачиваемости (дней)
                const avgStockVal = avgStock || stockQty;
                const turnoverIndex = salesQty > 0 && avgStockVal > 0
                    ? (avgStockVal * daysPresent) / salesQty
                    : (salesQty > 0 ? daysPresent : 999);
                const writeoffPercent = salesQty > 0 ? (writeoffQty / salesQty) * 100 : 0;

                let profitIndex = 0;
                if (hasPrice) {
                    const margin = shelf > 0 ? shelf - price : price * 0.3;
                    profitIndex = (salesQty * margin) - (writeoffQty * price);
                }

                // Товар в матрице на основании ABC баллов
                // Используем порог minPointsForMatrix (по умолчанию 5)
                let inMatrix = 'НЕТ';
                let reason = '';

                if (isMandatory) {
                    inMatrix = 'ДА';
                    reason = 'Обязательный';
                } else if (salesQty === 0) {
                    inMatrix = 'НЕТ';
                    reason = 'Нет продаж';
                } else if (abcData.score >= minPointsForMatrix) {
                    inMatrix = 'ДА';
                    reason = `${abcData.score} баллов (≥${minPointsForMatrix})`;
                } else {
                    inMatrix = 'НЕТ';
                    reason = `${abcData.sales}${abcData.turnover}${abcData.writeoff}=${abcData.score} баллов (<${minPointsForMatrix})`;
                }

                results.push({
                    tt, code, nomenclature, group,
                    sales: salesQty,
                    stock: stockQty,
                    totalDays,
                    daysPresent,
                    avgPerDay,
                    turnoverIndex,
                    writeoff: writeoffQty,
                    writeoffPercent,
                    // Трёхмерный ABC
                    abcSales: abcData.sales,
                    abcTurnover: abcData.turnover,
                    abcWriteoff: abcData.writeoff,
                    abcScore: abcData.score,
                    abcClass: abcData.final,
                    hasPrice,
                    price,
                    shelf,
                    profitIndex,
                    inMatrix,
                    isMandatory,
                    reason,
                    manualEdit: false
                });
            });

            save(KEYS.RESULTS, results);
            syncMarksToShared();
            setTab('analysis');

            const stats = {
                total: results.length,
                yes: results.filter(r => r.inMatrix === 'ДА').length,
                no: results.filter(r => r.inMatrix === 'НЕТ').length
            };
            alert(`Рассчитано ${stats.total} позиций\nВ матрице: ${stats.yes}\nНе в матрице: ${stats.no}`);
        }

        function generateAssortment() {
            currentLoadedAssortment = null;
            if (sales.length === 0 && stocks.length === 0) {
                alert('Загрузите файлы продаж и/или остатков!');
                return;
            }

            // Фильтруем только по магазинам из stores.html
            const hasStores = stores.length > 0;
            const filteredStocks = hasStores ? stocks.filter(s => storeMatches(s.tt)) : stocks;
            const filteredSales = hasStores ? sales.filter(s => storeMatches(s.tt)) : sales;

            // Создаём маппинг: название товара -> код (из stocks) - как ВПР
            const nameToCode = new Map();
            filteredStocks.forEach(s => {
                if (s.productName && s.code) {
                    // Сохраняем только если код числовой или длинный (реальный код)
                    if (/^\d/.test(s.code) || s.code.length >= 5) {
                        nameToCode.set(s.productName, s.code);
                    }
                }
            });

            const assortmentMap = new Map();

            // Сначала добавляем из stocks - там точный код
            filteredStocks.forEach(s => {
                if (!s.productName || !s.code) return;
                const key = s.code; // Ключ = код товара

                if (!assortmentMap.has(key)) {
                    assortmentMap.set(key, {
                        nomenclature: s.productName,
                        code: s.code,
                        group: '',
                        packaging: 'ШТ',
                        supplier: '',
                        price: 0,
                        shelfPrice: 0,
                        shelf: 0,
                        quant: 1
                    });
                }
            });

            // Затем добавляем из продаж, сопоставляя код через название (ВПР)
            filteredSales.forEach(s => {
                const name = s.name || s.code;
                if (!name) return;
                
                // Ищем код через ВПР по названию в stocks
                let realCode = nameToCode.get(name);
                if (!realCode) {
                    // Если не нашли точное совпадение, ищем частичное
                    for (const [stockName, stockCode] of nameToCode) {
                        if (stockName.includes(name) || name.includes(stockName)) {
                            realCode = stockCode;
                            break;
                        }
                    }
                }
                
                // Если код не найден, используем s.code если он похож на код
                if (!realCode) {
                    if (/^\d/.test(s.code) || (s.code && s.code.length >= 5)) {
                        realCode = s.code;
                    }
                }
                
                // Ключ для ассортимента
                const key = realCode || name;
                
                if (!assortmentMap.has(key)) {
                    assortmentMap.set(key, {
                        nomenclature: name,
                        code: realCode || '',
                        group: s.group || '',
                        packaging: 'ШТ',
                        supplier: '',
                        price: 0,
                        shelfPrice: 0,
                        shelf: 0,
                        quant: 1
                    });
                } else {
                    // Обновляем группу если была пустая
                    const item = assortmentMap.get(key);
                    if (!item.group && s.group) item.group = s.group;
                }
            });

            // Присваиваем коды товарам без кода
            let codeIndex = 1;
            assortmentMap.forEach(item => {
                if (!item.code || item.code === item.nomenclature) {
                    item.code = 'NEW' + String(codeIndex++).padStart(5, '0');
                }
            });

            products = Array.from(assortmentMap.values());
            save(KEYS.PRODUCTS, products);

            const groupsCount = {};
            products.forEach(p => {
                const g = p.group || 'Без группы';
                groupsCount[g] = (groupsCount[g] || 0) + 1;
            });

            const groupStats = Object.entries(groupsCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5)
                .map(([g, c]) => `${g}: ${c}`)
                .join('\n');

            alert(`Создан ассортимент: ${products.length} товаров\n\nТоп групп:\n${groupStats}`);
            render();
        }

        function generateMatrix() {
            if (results.length === 0) {
                alert('Сначала рассчитайте анализ!');
                return;
            }
            
            // Фильтруем только магазины из stores.html и товары из ассортимента
            const hasStores = stores.length > 0;
            const productCodes = new Set(products.map(p => p.code));
            const matrixResults = results.filter(r => {
                if (hasStores && !storeMatches(r.tt)) return false;
                if (products.length > 0 && !productCodes.has(r.code)) return false;
                return r.inMatrix === 'ДА';
            });
            
            if (matrixResults.length === 0) {
                alert('Нет товаров для матрицы! Проверьте результаты анализа.');
                return;
            }
            
            // Переходим на вкладку Матрица
            setTab('matrix');
            
            const stats = {
                total: matrixResults.length,
                products: [...new Set(matrixResults.map(r => r.code))].length,
                stores: [...new Set(matrixResults.map(r => r.tt))].length
            };
            
            alert(`Матрица создана!\n\nТоваров: ${stats.products}\nМагазинов: ${stats.stores}\nПозиций: ${stats.total}`);
        }

        function toggleMandatory(code) {
            mandatoryProducts[code] = !mandatoryProducts[code];
            save(KEYS.MANDATORY, mandatoryProducts);
            
            results.forEach(r => {
                if (r.code === code) {
                    r.isMandatory = mandatoryProducts[code];
                    if (r.isMandatory) {
                        r.inMatrix = 'ДА';
                    } else if (!r.manualEdit) {
                        // Используем ABC логику
                        if (r.abcScore >= 5) {
                            r.inMatrix = 'ДА';
                        } else {
                            r.inMatrix = 'НЕТ';
                        }
                    }
                }
            });
            save(KEYS.RESULTS, results);
            syncMarksToShared();
            render();
        }

        function showMandatoryModal() {
            const list = Object.entries(mandatoryProducts)
                .filter(([code, isMandatory]) => isMandatory)
                .map(([code]) => {
                    const r = results.find(x => x.code === code);
                    return `<div class="p-2 border-b border-gray-100 text-sm">${r?.nomenclature || code} <span class="text-gray-400">(${code})</span></div>`;
                }).join('');
            
            document.getElementById('mandatoryList').innerHTML = list || '<div class="text-gray-400 text-center p-4">Нет обязательных товаров</div>';
            document.getElementById('mandatoryModal').classList.remove('hidden');
            document.getElementById('mandatoryModal').classList.add('flex');
        }

        function hideMandatoryModal() {
            document.getElementById('mandatoryModal').classList.add('hidden');
            document.getElementById('mandatoryModal').classList.remove('flex');
        }

        function clearData() {
            if (!confirm('Очистить все данные?')) return;
            products = [];
            sales = [];
            stocks = [];
            writeoffs = [];
            mandatoryProducts = {};
            results = [];
            collapsedGroups = {};
            collapsedTT = {};
            selectedTT = '';
            selectedGroup = '';
            searchProduct = '';
            filterMatrixStatus = '';
            filterABC = '';
            
            save(KEYS.PRODUCTS, products);
            save(KEYS.SALES, sales);
            save(KEYS.STOCKS, stocks);
            save(KEYS.WRITEOFFS, writeoffs);
            save(KEYS.MANDATORY, mandatoryProducts);
            save(KEYS.RESULTS, results);
            
            render();
        }

        document.getElementById('mandatoryModal').addEventListener('click', function(e) {
            if (e.target === this) hideMandatoryModal();
        });

        // Инициализируем сразу с локальными данными
        // Ждём завершения загрузки из облака (если есть токен Яндекс.Диска)
        // чтобы данные из localStorage были актуальными
        if (window.CloudStorage && !window.CloudStorage.isReady()) {
            window.addEventListener('cloudStorageReady', () => {
                try { init(); } catch(e) { console.error('Init error:', e); document.getElementById('content').innerHTML = '<div class="p-4 text-red-600">Ошибка инициализации: ' + e.message + '</div>'; }
            });
        } else {
            try { init(); } catch(e) { console.error('Init error:', e); document.getElementById('content').innerHTML = '<div class="p-4 text-red-600">Ошибка инициализации: ' + e.message + '</div>'; }
        }

        // После загрузки из облака — перечитываем данные и перерисовываем
        window.addEventListener('cloudStorageReady', () => {
            loadStoresFromHTML();
            products = load(KEYS.PRODUCTS, []);
            sales = load(KEYS.SALES, []);
            stocks = load(KEYS.STOCKS, []);
            writeoffs = load(KEYS.WRITEOFFS, []);
            mandatoryProducts = load(KEYS.MANDATORY, {});
            results = load(KEYS.RESULTS, []);
            render();
        });
    </script>
</body>
</html>
