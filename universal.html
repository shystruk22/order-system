        function exportAnalytics() {
            const codeLookup = {};
            const nameLookup = {};
            Object.entries(matrix).forEach(([code, p]) => {
                codeLookup[normCode(code)] = p;
                const n = (p.nomenclature || p.name || '').trim().toLowerCase();
                if (n) nameLookup[n] = p;
            });

            function findProduct(sale) {
                if (sale.code) { const c = normCode(String(sale.code)); if (codeLookup[c]) return codeLookup[c]; }
                if (sale.name) { const n = sale.name.trim().toLowerCase(); if (nameLookup[n]) return nameLookup[n]; }
                return null;
            }

            const enriched = sales.map(s => {
                const prod = findProduct(s);
                return {
                    group: s.group || (prod ? (prod.group || '') : ''),
                    name: s.name || (prod ? (prod.nomenclature || prod.name || '') : ''),
                    code: s.code || (prod ? prod.code : ''),
                    quantity: s.quantity || 0,
                    revenue: (s.quantity || 0) * (prod ? (prod.inPrice || 0) : 0),
                    tt: s.tt || ''
                };
            });

            const wb = XLSX.utils.book_new();

            // Sheet 1: Summary
            const totalQty = enriched.reduce((s, r) => s + r.quantity, 0);
            const totalRev = enriched.reduce((s, r) => s + r.revenue, 0);
            const activeStores = new Set(enriched.map(r => r.tt));
            const summaryData = [
                ['Показатель', 'Значение'],
                ['Всего продаж (шт)', totalQty],
                ['Выручка (закупка) ₽', totalRev],
                ['Товаров в матрице', Object.keys(matrix).length],
                ['Активных ТТ', activeStores.size]
            ];
            const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
            ws1['!cols'] = [{ wch: 25 }, { wch: 20 }];
            XLSX.utils.book_append_sheet(wb, ws1, 'Сводка');

            // Sheet 2: By group with ABC
            const groupMap = {};
            enriched.forEach(s => {
                const gr = s.group || 'Без группы';
                if (!groupMap[gr]) groupMap[gr] = { qty: 0, revenue: 0 };
                groupMap[gr].qty += s.quantity;
                groupMap[gr].revenue += s.revenue;
            });
            const gRows = Object.entries(groupMap).map(([gr, d]) => ({ group: gr, qty: d.qty, revenue: d.revenue })).sort((a, b) => b.revenue - a.revenue);
            const gGrand = gRows.reduce((s, r) => s + r.revenue, 0);
            let gCum = 0;
            gRows.forEach(r => {
                gCum += r.revenue;
                const pct = gGrand > 0 ? (gCum / gGrand) * 100 : 0;
                r.share = gGrand > 0 ? (r.revenue / gGrand) * 100 : 0;
                r.abc = pct <= 80 ? 'A' : pct <= 95 ? 'B' : 'C';
            });
            const groupHeaders = ['Группа', 'Кол-во продаж', 'Выручка ₽', 'Доля %', 'ABC'];
            const groupData = gRows.map(r => [r.group, r.qty, Math.round(r.revenue), parseFloat(r.share.toFixed(1)), r.abc]);
            const ws2 = SharedUtils.createStyledSheet(groupData, groupHeaders, [0]);
            XLSX.utils.book_append_sheet(wb, ws2, 'По группам');

            // Sheet 3: Top products
            const prodMap = {};
            enriched.forEach(s => {
                const key = (s.code || '') + '|' + (s.name || '');
                if (!prodMap[key]) prodMap[key] = { code: s.code, name: s.name, group: s.group, qty: 0, revenue: 0 };
                prodMap[key].qty += s.quantity;
                prodMap[key].revenue += s.revenue;
            });
            const pRows = Object.values(prodMap).sort((a, b) => b.qty - a.qty).slice(0, 20);
            const pGrand = pRows.reduce((s, r) => s + r.revenue, 0);
            const prodHeaders = ['Код', 'Наименование', 'Группа', 'Продажи', 'Выручка ₽', 'Доля %'];
            const prodData = pRows.map(r => [r.code, r.name, r.group, r.qty, Math.round(r.revenue), parseFloat((pGrand > 0 ? (r.revenue / pGrand) * 100 : 0).toFixed(1))]);
            const ws3 = SharedUtils.createStyledSheet(prodData, prodHeaders, [0, 1, 2]);
            XLSX.utils.book_append_sheet(wb, ws3, 'Топ товары');

            // Sheet 4: By store
            const storeMap = {};
            enriched.forEach(s => {
                const tt = s.tt || 'Неизвестно';
                if (!storeMap[tt]) storeMap[tt] = { qty: 0, revenue: 0 };
                storeMap[tt].qty += s.quantity;
                storeMap[tt].revenue += s.revenue;
            });
            const storeMatrixCount = {};
            stores.forEach(s => {
                storeMatrixCount[s.tt] = 0;
                Object.keys(matrixMarks).forEach(code => {
                    if (matrixMarks[code][s.tt] === 'ДА') storeMatrixCount[s.tt]++;
                });
            });
            const sRows = Object.entries(storeMap).map(([tt, d]) => ({ tt, qty: d.qty, revenue: d.revenue, matrixCount: storeMatrixCount[tt] || 0 })).sort((a, b) => b.revenue - a.revenue);
            const sGrand = sRows.reduce((s, r) => s + r.revenue, 0);
            const storeHeaders = ['ТТ', 'Продажи', 'Выручка ₽', 'Товаров в матрице', 'Доля %'];
            const storeData = sRows.map(r => [r.tt, r.qty, Math.round(r.revenue), r.matrixCount, parseFloat((sGrand > 0 ? (r.revenue / sGrand) * 100 : 0).toFixed(1))]);
            const ws4 = SharedUtils.createStyledSheet(storeData, storeHeaders, [0]);
            XLSX.utils.book_append_sheet(wb, ws4, 'По магазинам');

            const d = new Date();
            XLSX.writeFile(wb, `аналитика_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        // === ФАЙЛОВЫЕ ПАРСЕРЫ ===
        function handleFile(input, type) {
            resetSavedOrders();
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                    if (type === 'sales') {
                        // Используем общий парсер (формат: код → кол-во, как в Matrix/Sneki)
                        const result = SharedUtils.parseSales(json, stores.map(s => s.tt));
                        sales = result.items; // [{tt, code, quantity}]
                        save(KEYS.SALES, sales);
                        alert(`Загружено ${sales.length} продаж, найдено ${result.foundTTs.length} ТТ`);
                    }
                    else if (type === 'stocks') {
                        const localItems = parseStocksLocal(json);
                        console.log(`Парсинг остатков: локальный=${localItems.length}`);
                        stocks = localItems;
                        save(KEYS.STOCKS, stocks);
                        alert(`Загружено ${stocks.length} остатков`);
                    }
                    render();
                } catch (err) { console.error('Parse error:', err); alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        // Парсинг ОСТАТКОВ — локальный (используем SharedUtils для мэтчинга TT)
        function parseStocksLocal(json) {
            const storeNames = stores.map(s => s.tt);
            const parsed = SharedUtils.parseStocks(json, storeNames);
            console.log(`Парсинг остатков: SharedUtils=${parsed.items.length}, TT: ${parsed.foundTTs.join(', ')}`);

            // SharedUtils.parseStocks возвращает items с {tt, code, productName, currentStock, daysPresent, totalDays}
            // Конвертируем в формат universal: {tt, code, name, currentStock, daysPresent, totalDays}
            return parsed.items.map(item => ({
                tt: item.tt,
                code: item.code,
                name: item.productName || '',
                currentStock: item.currentStock,
                daysPresent: item.daysPresent,
                totalDays: item.totalDays
            }));
        }

        function exportOrder() {
            if (stores.length === 0) { alert('Нет данных'); return; }
            
            const stockMap = new Map();
            stocks.forEach(s => stockMap.set(`${s.tt}_${s.code}`, s));

            const salesByTTCode = {};
            const nameToCode = {};
            Object.entries(matrix).forEach(([code, p]) => {
                if (p.nomenclature) nameToCode[p.nomenclature.trim().toLowerCase()] = code;
            });
            sales.forEach(s => {
                if (!s.tt) return;
                if (s.code) {
                    const key = `${s.tt}_${normCode(s.code)}`;
                    salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                } else if (s.name) {
                    const normName = s.name.trim().toLowerCase();
                    let code = nameToCode[normName];
                    if (!code) {
                        const entry = Object.entries(nameToCode).find(([name, c]) =>
                            name.includes(normName) || normName.includes(name)
                        );
                        if (entry) code = entry[1];
                    }
                    if (code) {
                        const key = `${s.tt}_${code}`;
                        salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                    }
                }
            });
            
            const rows = [['№ Маг.', 'ТТ', 'Код', 'Поставщик', 'Наименование', 'Группа', 'Продажи', 'Дней', 'Ср./день', 'Остаток', 'Заказ', 'Расчёт', 'Сумма', 'Статус']];
            
            stores.forEach(store => {
                Object.entries(matrix).forEach(([code, p]) => {
                    const key = `${store.tt}_${code}`;
                    const stockData = stockMap.get(key);
                    const codeInMatrix = !!matrixMarks[code];
                    const markForTT = codeInMatrix ? (matrixMarks[code][store.tt] || 'НЕТ') : null;
                    const matrixDA = markForTT === 'ДА';

                    // Товар вне матрицы — не попадает в формирование заказа
                    if (!matrixDA) return;

                    const packaging = p.packaging || 'ШТ';
                    const quant = p.quant || 1;
                    const shelf = p.shelf || 0;
                    const unitLabel = packaging === 'КГ' ? 'кг' : 'шт';
                    const minOrderBase = packaging === 'КГ' ? 0.5 : 4;
                    const editKey = `${store.tt}_${code}`;

                    if (!stockData) {
                        const minOrder = packaging === 'КГ' ? 0.5 : 2;
                        const expOrder = orderEdits[editKey] !== undefined ? orderEdits[editKey] : minOrder;
                        rows.push([store.storeNumber || store.tt2 || '', store.tt, code, p.supplier || '', p.nomenclature || '', p.group || '', salesByTTCode[key] || 0, 0, 0, 0, expOrder, minOrder, (expOrder * (p.inPrice || 0)).toFixed(2), `мин. заказ ${minOrder} ${unitLabel}`]);
                        return;
                    }

                    const currentStock = stockData.currentStock || 0;
                    const daysPresent = stockData.daysPresent || 0;
                    const totalSales = salesByTTCode[key] || 0;
                    const avgSalesPerDay = daysPresent > 0 ? totalSales / daysPresent : 0;

                    if (currentStock === 0 && totalSales === 0) {
                        const minOrder = packaging === 'КГ' ? 0.5 : 2;
                        const expOrder = orderEdits[editKey] !== undefined ? orderEdits[editKey] : minOrder;
                        rows.push([store.storeNumber || store.tt2 || '', store.tt, code, p.supplier || '', p.nomenclature || '', p.group || '', 0, daysPresent, 0, 0, expOrder, minOrder, (expOrder * (p.inPrice || 0)).toFixed(2), `мин. заказ ${minOrder} ${unitLabel}`]);
                        return;
                    }

                    if (totalSales === 0) {
                        // Остаток есть, но продаж нет — заказ не делается
                        rows.push([store.storeNumber || store.tt2 || '', store.tt, code, p.supplier || '', p.nomenclature || '', p.group || '', 0, daysPresent, 0, currentStock.toFixed(2), 0, 0, '0.00', 'хватает (нет продаж)']);
                        return;
                    }

                    let calcOrderVal = calcOrder(currentStock, avgSalesPerDay, period, quant, shelf, packaging);
                    calcOrderVal = Math.round(calcOrderVal * 100) / 100;
                    let order = orderEdits[editKey] !== undefined ? orderEdits[editKey] : calcOrderVal;
                    order = Math.round(order * 100) / 100;
                    const status = calcOrderVal > 0 ? `расчёт ${calcOrderVal} ${unitLabel}` : 'хватает';
                    rows.push([store.storeNumber || store.tt2 || '', store.tt, code, p.supplier || '', p.nomenclature || '', p.group || '', totalSales, daysPresent, avgSalesPerDay.toFixed(3), currentStock.toFixed(2), order, calcOrderVal, (order * (p.inPrice || 0)).toFixed(2), status]);
                });
            });
            
            const headers = rows.shift();
            const ws = SharedUtils.createStyledSheet(rows, headers, [0, 1, 2, 3, 11]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Заказ');
            const d = new Date(); XLSX.writeFile(wb, `заказ_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        // === ПОПАП СУММ ЗАКАЗА ПО МАГАЗИНАМ ===
        function showOrderSumsByStore(el) {
            // Убираем предыдущий попап
            document.querySelectorAll('.store-sums-popup').forEach(e => e.remove());

            if (!savedOrderResults || savedOrderResults.length === 0) return;

            // Считаем суммы по ТТ
            const storeSums = {};
            const storeCounts = {};
            savedOrderResults.forEach(r => {
                if (r.order > 0) {
                    storeSums[r.tt] = (storeSums[r.tt] || 0) + r.sum;
                    storeCounts[r.tt] = (storeCounts[r.tt] || 0) + 1;
                }
            });

            const sortedStores = Object.entries(storeSums).sort((a, b) => b[1] - a[1]);
            const totalSum = Object.values(storeSums).reduce((s, v) => s + v, 0);

            const popup = document.createElement('div');
            popup.className = 'store-sums-popup';
            popup.style.cssText = 'position:fixed;z-index:200;background:white;border:1px solid #e5e7eb;border-radius:12px;padding:0;box-shadow:0 12px 40px rgba(0,0,0,0.2);min-width:320px;max-width:420px;max-height:70vh;overflow:hidden;pointer-events:auto;font-family:system-ui,sans-serif;';

            let totalPositions = 0;
            sortedStores.forEach(([, count]) => totalPositions += count);

            popup.innerHTML = `
                <div style="background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;padding:12px 16px;border-radius:12px 12px 0 0;">
                    <div style="font-size:14px;font-weight:700;">Суммы заказов по магазинам</div>
                    <div style="font-size:11px;opacity:0.8;margin-top:2px;">${sortedStores.length} магазинов • ${totalPositions} поз. на ${totalSum.toFixed(0)} ₽</div>
                </div>
                <div style="max-height:50vh;overflow-y:auto;padding:4px 0;">
                    ${sortedStores.map(([tt, sum], i) => `
                        <div style="display:flex;align-items:center;padding:8px 16px;gap:10px;${i % 2 === 0 ? 'background:#f9fafb;' : ''}border-bottom:1px solid #f3f4f6;">
                            <div style="width:24px;height:24px;border-radius:6px;background:#ede9fe;color:#6d28d9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">${i + 1}</div>
                            <div style="flex:1;min-width:0;">
                                <div style="font-size:12px;font-weight:600;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${tt}</div>
                                <div style="font-size:10px;color:#6b7280;">${storeCounts[tt]} поз.</div>
                            </div>
                            <div style="font-size:13px;font-weight:700;color:#6d28d9;white-space:nowrap;">${sum.toFixed(0)} ₽</div>
                        </div>
                    `).join('')}
                </div>
                <div style="background:#f3f4f6;padding:10px 16px;border-radius:0 0 12px 12px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:11px;color:#6b7280;">Итого:</span>
                    <span style="font-size:15px;font-weight:800;color:#4c1d95;">${totalSum.toFixed(0)} ₽</span>
                </div>
                <div style="padding:4px 16px 8px;text-align:center;">
                    <span style="font-size:9px;color:#9ca3af;">Кликните вне чтобы закрыть</span>
                </div>
            `;
            document.body.appendChild(popup);

            // Позиционируем попап
            const rect = el.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 160;
            let top = rect.bottom + 8;
            if (left < 8) left = 8;
            if (left + 420 > window.innerWidth) left = window.innerWidth - 428;
            if (top + 400 > window.innerHeight) top = rect.top - 400;
            if (top < 8) top = 8;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';

            // Закрытие по клику вне
            setTimeout(() => {
                function close(e) {
                    if (!popup.contains(e.target) && e.target !== el) {
                        popup.remove();
                        document.removeEventListener('mousedown', close);
                        document.removeEventListener('touchstart', close);
                    }
                }
                document.addEventListener('mousedown', close);
                document.addEventListener('touchstart', close);
            }, 50);
        }

        function clearAll() {
            [KEYS.ASSORTMENT, KEYS.MATRIX_MARKS, KEYS.SALES, KEYS.STOCKS, KEYS.GROUP_MARKUPS].forEach(k => localStorage.removeItem(k));
            matrix = {}; matrixMarks = {}; sales = []; stocks = []; groupMarkups = {};
            currentLoadedAssortment = null;
            resetSavedOrders();
            render();
            alert('Данные очищены');
        }

        // Инициализация с защитой от CloudStorage (если storage.js загружен другой страницей)
        function safeInit() {
            try { init(); } catch(e) {
                console.error('Init error:', e);
                document.getElementById('content').innerHTML = '<div class="p-4 text-red-600">Ошибка инициализации: ' + e.message + '</div>';
            }
        }
        if (window.CloudStorage && !window.CloudStorage.isReady()) {
            // CloudStorage существует но не готов — ждём с таймаутом 3 сек
            window.addEventListener('cloudStorageReady', function onReady() {
                window.removeEventListener('cloudStorageReady', onReady);
                clearTimeout(cloudTimeout);
                safeInit();
            });
            var cloudTimeout = setTimeout(function() {
                console.warn('[Universal] CloudStorage timeout — запускаем init без ожидания облака');
                safeInit();
            }, 3000);
        } else {
            safeInit();
        }

        // После загрузки из облака — перечитываем данные и перерисовываем
        window.addEventListener('cloudStorageReady', () => {
            loadStoresFromHTML();
            sales = load(KEYS.SALES, []);
            stocks = load(KEYS.STOCKS, []);
            render();
        });
    </script>
