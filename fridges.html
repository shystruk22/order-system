        // Debounce functions to preserve cursor position during search
        let searchTimeoutAssort = null;
        function debounceSearchAssort(input) {
            const val = input.value;
            const pos = input.selectionStart;
            clearTimeout(searchTimeoutAssort);
            searchTimeoutAssort = setTimeout(() => {
                searchAssort = val;
                render();
                setTimeout(() => {
                    const el = document.getElementById('fridgeAssortSearchInput');
                    if (el) { el.focus(); el.setSelectionRange(pos, pos); }
                }, 10);
            }, 300);
        }
        let searchTimeoutMatrix = null;
        function debounceSearchMatrix(input) {
            const val = input.value;
            const pos = input.selectionStart;
            clearTimeout(searchTimeoutMatrix);
            searchTimeoutMatrix = setTimeout(() => {
                searchMatrix = val;

                setTimeout(() => {

            }, 300);
        }
        let searchTimeoutPlanogram = null;
        function debounceSearchPlanogram(input) {

        let selectedStore = '';

            if (cat.includes('Напитк')) return '#cffafe';
            if (cat.includes('Кондитерск')) return '#fce7f3';
            if (cat.includes('Заморожен')) return '#e0e7ff';

        // Helpers — используем SharedUtils (LZ-сжатие + dirty-флаг для облака)

        const save = (key, data) => {

        const normCode = SharedUtils.normCode;

        };

        // === Сохранённые ассортименты и матрицы (shared keys) ===
        const ASSORTMENTS_KEY = SharedUtils.STORAGE_KEYS.SAVED_ASSORTMENTS;
        const MATRICES_KEY = SharedUtils.STORAGE_KEYS.SAVED_MATRICES;

        function getSavedAssortments() {
            try {
                let data = SharedUtils.load(ASSORTMENTS_KEY, null);
                if (!data || !Array.isArray(data) || data.length === 0) {
                    data = SharedUtils.load('matrixcalc_saved_assortments_v2', []);
                }
                return data || [];
            } catch { return []; }
        }

        function getSavedMatrices() {
            try {
                let data = SharedUtils.load(MATRICES_KEY, null);
                if (!data || !Array.isArray(data) || data.length === 0) {
                    data = SharedUtils.load('matrixcalc_saved_matrices_v1', []);
                }
                return data || [];
            } catch { return []; }
        }

        function loadAssortmentToProducts(name) {
            const saved = getSavedAssortments();
            const record = saved.find(s => s.name === name);
            if (!record || !record.data) { alert('Ассортимент не найден'); return; }
            if (products.length > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count} товаров)?\nТекущий ассортимент будет заменён.`)) return;
            }
            products = record.data;
            SharedUtils.save(KEYS.PRODUCTS, products);
            if (window.SharedData) SharedData.saveProducts(products, 'fridges');
            buildMatrix();
            render();
            alert(`Загружено: ${products.length} товаров из "${name}"`);
        }

        function loadMatrixToMarks(name) {
            const saved = getSavedMatrices();
            const record = saved.find(s => s.name === name);
            if (!record || !record.matrixData) { alert('Матрица не найдена'); return; }
            const md = record.matrixData || {};
            const CATALOG_FIELDS = ['code','nomenclature','name','group','packaging','supplier','quant','price','inPrice','shelfPrice','shelf','markup','inMatrix'];
            let count = 0;
            Object.entries(md).forEach(([code, item]) => {
                if (!code) return;
                const nc = normCode(code);
                const marks = {};
                Object.entries(item).forEach(([k, v]) => {
                    if (!CATALOG_FIELDS.includes(k) && (v === 'ДА' || v === 'НЕТ')) {
                        marks[k] = v;
                        count++;
                    }
                });
                if (Object.keys(marks).length > 0) {
                    if (!matrixMarks[nc]) matrixMarks[nc] = {};
                    Object.assign(matrixMarks[nc], marks);
                }
            });
            save(KEYS.MATRIX, matrixMarks);
            buildMatrix();
            render();
            alert(`Матрица "${name}" загружена: ${count} отметок ДА/НЕТ для ${Object.keys(matrixMarks).length} товаров`);
        }

        // Собрать уникальные ТТ из matrixMarks
        function getMatrixTTs() {
            const ttSet = new Set();
            Object.values(matrixMarks).forEach(marks => {
                Object.keys(marks).forEach(k => {
                    if (marks[k] === 'ДА' || marks[k] === 'НЕТ') ttSet.add(k);
                });
            });
            // Если есть stores — используем их порядок, добавляя недостающие из matrixMarks
            const ordered = [];
            stores.forEach(s => { if (s.tt && ttSet.has(s.tt)) { ordered.push(s.tt); ttSet.delete(s.tt); } });
            ttSet.forEach(tt => ordered.push(tt));
            return ordered;
        }

        // Build matrix view from products + matrixMarks
        function buildMatrix() {
            matrix = {};
            products.forEach(p => {
                if (!p.code) return;
                const nc = normCode(p.code);
                matrix[nc] = {
                    code: nc,
                    nomenclature: p.nomenclature || p.name || '',
                    group: p.group || p.category || '',
                    category: p.group || p.category || ''
                };
                if (matrixMarks[nc]) {
                    Object.assign(matrix[nc], matrixMarks[nc]);
                }
            });
        }

        // Init — загружаем данные из общих хранилищ
        function init() {
            products = load(KEYS.PRODUCTS, []);
            if (!Array.isArray(products)) products = [];
            // Matrix marks: {code: {tt: 'ДА'/'НЕТ'}}
            matrixMarks = load(KEYS.MATRIX, {});
            writeoffs = load(KEYS.WRITEOFFS, []);
            sales = load(KEYS.SALES, []);
            stores = load(KEYS.STORES, []);
            planograms = load(KEYS.PLANOGRAMS, {});
            planogramTemplates = JSON.parse(localStorage.getItem('fridge_planogram_templates') || '{}');

            buildMatrix();

            // Storage event listener для кросс-таб синхронизации
            window.addEventListener('storage', (e) => {
                if (e.key === KEYS.STORES) {
                    stores = load(KEYS.STORES, []);
                    buildMatrix();
                    render();
                }
                if (e.key === SharedUtils.STORAGE_KEYS.PRODUCTS || e.key === 'db_products_v1') {
                    try {
                        const arr = SharedUtils.load(SharedUtils.STORAGE_KEYS.PRODUCTS, null);
                        if (Array.isArray(arr) && arr.length > 0) {
                            products = arr;
                            SharedUtils.save(KEYS.PRODUCTS, products);
                            buildMatrix();
                            render();
                        }
                    } catch(e) {}
                }
                if (e.key === SharedUtils.STORAGE_KEYS.MATRIX || e.key === 'db_matrix_marks_v1') {
                    try {
                        const newMarks = SharedUtils.load(SharedUtils.STORAGE_KEYS.MATRIX, null);
                        if (newMarks && Object.keys(newMarks).length > 0) {
                            Object.assign(matrixMarks, newMarks);
                            buildMatrix();
                            render();
                        }
                    } catch(e) {}
                }
            });

            // SharedData cross-tab sync listener
            if (window.SharedData) {
                SharedData.onChange(({ source }) => {
                    if (source !== 'fridges') {
                        const newProducts = SharedData.getProducts();
                        if (newProducts && newProducts.length > 0) {
                            products = newProducts;
                            SharedUtils.save(KEYS.PRODUCTS, products);
                        }
                        const newMarks = SharedData.getMatrixMarks();
                        if (newMarks && Object.keys(newMarks).length > 0) {
                            Object.assign(matrixMarks, newMarks);
                        }
                        const newStores = SharedData.getStores();
                        if (newStores && newStores.length > 0) {
                            stores = newStores;
                            SharedUtils.save(KEYS.STORES, stores);
                        }
                        buildMatrix();
                        render();
                    }
                });
            }

            render();
        }

        // Render
        function render() {

            document.getElementById('storesCount').textContent = `${stores.length} ТТ`;

        function renderTabs() {
            const tabs = [
                { id: 'upload', label: 'Загрузка', icon: icons.upload },

                { id: 'matrix', label: 'Матрица', icon: icons.grid },

                { id: 'analytics', label: 'Аналитика', icon: icons.chart }

            document.getElementById('tabs').innerHTML = tabs.map(t => `
                <button onclick="setTab('${t.id}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${tab === t.id ? 'bg-emerald-600 text-white shadow-sm' : 'text-gray-600 hover:bg-white hover:text-gray-900'}">
                    ${t.icon}<span>${t.label}</span>
                </button>
            `).join('');
        }

        function setTab(t) { tab = t; render(); }

        function renderContent() {
            const el = document.getElementById('content');
            switch(tab) {
                case 'upload': el.innerHTML = renderUpload(); break;
                case 'assortment': el.innerHTML = renderAssortment(); break;
                case 'matrix': el.innerHTML = renderMatrix(); break;
                case 'planogram': el.innerHTML = renderPlanogram(); requestAnimationFrame(() => equalizeShelfHeights()); break;
                case 'analytics': el.innerHTML = renderAnalytics(); break;
            }
        }

        // Общие продажи товара по всем магазинам
        function getTotalSales(code) {
            if (!code) return 0;
            const nc = normCode(code);
            let total = 0;
            sales.forEach(s => {
                if (normCode(s.code) === nc) total += (s.quantity || 0);
            });
            return total;
        }

        // Маржа товара: (Цена - Закупочная цена)
        function calcMargin(p) {
            const price = parseFloat(p.price) || 0;
            const inPrice = parseFloat(p.inPrice) || 0;
            return price - inPrice;
        }

        // Редактирование поля товара в ассортименте
        function editProductField(code, field, value, fullRender) {
            const nc = normCode(code);
            const p = products.find(x => normCode(x.code) === nc);
            if (!p) return;
            // Для числовых полей — парсим число
            if (['price','inPrice','shelfPrice','shelf','quant','volume'].includes(field)) {
                p[field] = value !== '' && value !== '-' ? parseFloat(value) || 0 : '';
            } else {
                p[field] = value;
            }
            // Группа/категория синхронизируются
            if (field === 'group') p.category = value;
            if (field === 'category') p.group = value;
            // Сохраняем и синхронизируем
            save(KEYS.PRODUCTS, products);
            // Для числовых полей — быстрое обновление ячейки без полного рендера
            if (!fullRender && ['price','inPrice','shelfPrice','shelf','quant','volume','packaging'].includes(field)) {
                // Обновляем только значения в текущей строке таблицы
                const row = document.getElementById('ar-' + nc);
                if (row) {
                    const margin = calcMargin(p);
                    const vol = p.volume || getProductVolume(p);
                    const cells = row.querySelectorAll('[data-field]');
                    cells.forEach(c => {
                        const f = c.getAttribute('data-field');
                        if (f === field) {
                            c.textContent = field === 'volume' ? (vol > 0 ? vol + 'л' : '-') : (p[field] || '-');
                        }
                        if (f === 'margin') {

                        }
                    });
                }
                buildMatrix();
                return;

            buildMatrix();

        // Экспорт матрицы в Excel
        function exportMatrixExcel() {
            if (Object.keys(matrix).length === 0) { alert('Нет данных для экспорта'); return; }
            const displayTTs = stores.map(s => s.tt);
            // № Маг. для каждого магазина (берём из stores[i].number или stores[i].num или индекс+1)
            const storeNumbers = displayTTs.map((tt, i) => {
                const s = stores.find(x => x.tt === tt);
                return s ? (s.number || s.num || s.nn || s.no || (i + 1)) : (i + 1);
            });

            // Собираем все товары с группами
            const allItems = [];
            Object.entries(matrix).forEach(([code, data]) => {
                const gr = data.group || data.category || '';
                allItems.push({ code, nomenclature: data.nomenclature || data.name || '', group: gr, ...data });
            });
            // Сортировка по группе
            allItems.sort((a, b) => (a.group || '').localeCompare(b.group || '', 'ru'));

            const wsData = [];
            // Заголовок: строка 1 — Группа | Наименование | Код | № Маг. для каждого магазина
            const header1 = ['Группа', 'Наименование', 'Код', ...displayTTs.map((tt, i) => String(storeNumbers[i]))];
            // Заголовок: строка 2 — пустые | ТТ для каждого магазина
            const header2 = ['', '', '', ...displayTTs];
            wsData.push(header1);
            wsData.push(header2);

            // Данные
            let lastGroup = '';
            allItems.forEach(item => {
                const gr = item.group || '';
                if (gr !== lastGroup) {
                    // Строка группы
                    wsData.push([gr]);
                    lastGroup = gr;
                }
                const row = [gr, item.nomenclature, item.code];
                displayTTs.forEach(tt => {
                    row.push(item[tt] === 'ДА' ? 'ДА' : '');
                });
                wsData.push(row);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            // Ширина колонок
            ws['!cols'] = [
                { wch: 25 },   // Группа
                { wch: 45 },   // Наименование
                { wch: 14 },   // Код
                ...displayTTs.map(() => ({ wch: 8 }))
            ];
            // Объединение ячеек для заголовка: строка 1 и 2 для первых 3 колонок
            ws['!merges'] = [
                { s: { r: 0, c: 0 }, e: { r: 1, c: 0 } }, // Группа
                { s: { r: 0, c: 1 }, e: { r: 1, c: 1 } }, // Наименование
                { s: { r: 0, c: 2 }, e: { r: 1, c: 2 } }, // Код
            ];
            XLSX.utils.book_append_sheet(wb, ws, 'Матрица');
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            XLSX.writeFile(wb, `matrix_${dateStr}.xlsx`);
        }

        // Собираем множество размещённых кодов
        function rebuildPlacedCodes() {
            planogramPlacedCodes = new Set();
            Object.values(planogramProducts).forEach(p => {
                if (p && p.code) planogramPlacedCodes.add(p.code);
            });
        }

        // Товары для планограммы: только те, у которых ДА в матрице для выбранного магазина
        function getStoreProducts() {
            if (!selectedStore || Object.keys(matrix).length === 0) return [];
            return products.filter(p => {
                if (!p.code) return false;
                const nc = normCode(p.code);
                return matrixMarks[nc] && matrixMarks[nc][selectedStore] === 'ДА';
            });
        }

        // === Планограмма: помощники для категорийного заполнения ===

        // Извлечь объём товара (л) из данных
        function getProductVolume(p) {
            if (p.volume !== undefined && p.volume !== null && p.volume !== '' && !isNaN(parseFloat(p.volume))) {
                return parseFloat(p.volume);
            }
            const str = String(p.nomenclature || p.name || '');
            // Ищем паттерны: «0.43л», «0,43 л», «430мл», «0.5L»
            const m1 = str.match(/(\d+[.,]\d+)\s*(л|L)/i);
            if (m1) return parseFloat(m1[1].replace(',', '.'));
            const m2 = str.match(/(\d{2,4})\s*(мл|ml)/i);
            if (m2) return parseFloat(m2[1]) / 1000;
            // Просто число в конце строки
            const m3 = str.match(/\b(\d+[.,]\d+)\s*$/);
            if (m3) return parseFloat(m3[1].replace(',', '.'));
            return 0;
        }

        // Уникальные категории для текущего магазина
        function getStoreCategories() {
            return [...new Set(getStoreProducts().map(p => p.group || p.category || '').filter(Boolean))].sort();
        }

        // Получить продажи товара для выбранного магазина
        function getSalesForProduct(code) {
            if (!selectedStore || !code) return 0;
            const nc = normCode(code);
            let total = 0;
            sales.forEach(s => {
                if (normCode(s.code) === nc && s.tt === selectedStore) total += (s.quantity || 0);
            });
            return total;
        }

        // Получить маржу товара (цена - закупочная)
        function getMarginForProduct(p) {
            const price = parseFloat(p.price) || 0;
            const inPrice = parseFloat(p.inPrice) || 0;
            return price - inPrice;
        }

        // Получить данные критерия для товара (продажи/выручка/маржа) для отображения в ячейке
        function getProductCriteriaData(product) {
            if (!product || !product.code) return '';
            // Приоритет: первый активный критерий
            if (fillCriteria.sales) {
                const s = getSalesForProduct(product.code);
                if (s > 0) return s + ' шт';
            }
            if (fillCriteria.margin) {
                const m = getMarginForProduct(product);
                if (m > 0) return m.toFixed(0) + ' ₽';
            }
            // Если ничего не выбрано — показываем продажи по умолчанию
            const defSales = getSalesForProduct(product.code);
            if (defSales > 0) return defSales + ' шт';
            return '';
        }

        // Собрать ВСЕ размещённые коды (используется для дедупликации)
        function getAllPlacedCodes() {
            const codes = new Set();
            Object.values(planogramProducts).forEach(p => {
                if (p && p.code) codes.add(normCode(p.code));
            });
            return codes;
        }

        // Кол-во СКЮ на полке (индивидуально или по умолчанию skuPerShelf)
        function getShelfSlotCount(shelfIdx) {
            return shelfSlots[shelfIdx] || skuPerShelf;
        }

        // Общее кол-во ячеек: sum over shelves of (doors * shelfSlots[i])
        function getTotalCells() {
            let total = 0;
            for (let i = 0; i < selectedShelves; i++) {
                total += selectedDoors * getShelfSlotCount(i);
            }
            return total;
        }

        // Товары, доступные для створки+полки (категория + магазин + не размещены на ДРУГИх с той же категорией)
        function getAvailableForDoorShelf(doorIdx, shelfIdx) {
            const key = `${doorIdx}-${shelfIdx}`;
            const cat = shelfCategories[key];
            if (!cat || !selectedStore) return [];
            const usedCodes = new Set();
            // Собираем коды, размещённые на ДРУГИХ створках/полках с той же категорией
            Object.entries(planogramProducts).forEach(([k, p]) => {
                if (p && p.code) {
                    const parts = k.split('-');
                    if (parts.length >= 3) {
                        const kDoor = parseInt(parts[0]);
                        const kShelf = parseInt(parts[1]);
                        const kKey = `${kDoor}-${kShelf}`;
                        if (kKey !== key) {
                            const otherCat = shelfCategories[kKey];
                            if (otherCat === cat) {
                                usedCodes.add(normCode(p.code));
                            }
                        }
                    }
                }
            });
            return products.filter(p => {
                if (!p.code) return false;
                const nc = normCode(p.code);
                if (usedCodes.has(nc)) return false;
                if ((p.group || p.category || '') !== cat) return false;
                return matrixMarks[nc] && matrixMarks[nc][selectedStore] === 'ДА';
            });
        }

        // Сортировка для полки по объёму (primary) + вторичные критерии
        function sortForShelf(prods) {
            return [...prods].sort((a, b) => {
                // Primary: volume ascending (for shelf assignment — top shelf gets smallest)
                const va = getProductVolume(a), vb = getProductVolume(b);
                if (va !== vb) return va - vb;
                // Secondary criteria within same volume
                return secondarySort(a, b);
            });
        }

        // Вторичная сортировка по выбранным критериям (внутри одинакового объёма)
        function secondarySort(a, b) {
            if (fillCriteria.name) {
                const cmp = (a.nomenclature || a.name || '').localeCompare(b.nomenclature || b.name || '');
                if (cmp !== 0) return cmp;
            }
            if (fillCriteria.sales) {
                const sa = getSalesForProduct(a.code), sb = getSalesForProduct(b.code);
                if (sa !== sb) return sb - sa;
            }
            if (fillCriteria.margin) {
                const ma = getMarginForProduct(a), mb = getMarginForProduct(b);
                if (ma !== mb) return mb - ma;
            }
            if (fillCriteria.supplier) {
                const cmp = (a.supplier || '').localeCompare(b.supplier || '');
                if (cmp !== 0) return cmp;
            }
            return 0;
        }

        // Переключить критерий сортировки
        function toggleFillCriterion(key) {
            fillCriteria[key] = !fillCriteria[key];
            savePlanogram();
            render();
        }

        // Заполнить все створки с выбранными категориями (volume-based sorting)
        // Заполнение идёт створка за створкой: сначала створка 0 (все полки сверху вниз), потом створка 1 и т.д.
        function fillAllShelves() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const hasCat = Object.keys(shelfCategories).some(k => shelfCategories[k]);
            if (!hasCat) { alert('Выберите хотя бы одну категорию для створки/полки!'); return; }
            planogramProducts = {};
            const globalUsedCodes = new Set();

            // Идём по створкам, затем по полкам сверху вниз
            for (let doorIdx = 0; doorIdx < selectedDoors; doorIdx++) {
                for (let shelfIdx = selectedShelves - 1; shelfIdx >= 0; shelfIdx--) {
                    const dsKey = `${doorIdx}-${shelfIdx}`;
                    if (!shelfCategories[dsKey]) continue;
                    const cat = shelfCategories[dsKey];
                    const slotsPerShelf = getShelfSlotCount(shelfIdx);

                    // Получаем доступные товары для этой категории (deduplicated)
                    const available = products.filter(p => {
                        if (!p.code) return false;
                        const nc = normCode(p.code);
                        if (globalUsedCodes.has(nc)) return false;
                        if ((p.group || p.category || '') !== cat) return false;
                        return matrixMarks[nc] && matrixMarks[nc][selectedStore] === 'ДА';
                    });

                    // Сортировка: volume ascending (верхняя полка = самые мелкие)
                    const sorted = sortForShelf(available);

                    // Внутри полки: разворачиваем чтобы самые большие были слева
                    const reversed = [...sorted].reverse();

                    // Заполняем ячейки этой створки+полки
                    let prodIdx = 0;
                    for (let skuIdx = 0; skuIdx < slotsPerShelf && prodIdx < reversed.length; skuIdx++) {
                        const key = `${doorIdx}-${shelfIdx}-${skuIdx}`;
                        const nc = normCode(reversed[prodIdx].code);
                        globalUsedCodes.add(nc);
                        planogramProducts[key] = { ...reversed[prodIdx], faces: 1 };
                        prodIdx++;
                    }
                }
            }
            savePlanogram(); render();
            const placed = Object.values(planogramProducts).filter(p => p && p.code).length;
            alert(`Заполнено: ${placed} позиций`);
        }

        // === Drag & Drop ===
        function startDragFromList(code, nomenclature, group) {
            dragData = { type: 'list', code, nomenclature, group };
            if (event && event.dataTransfer) {
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', code);
            }
        }

        function startDragFromCell(key) {
            const p = planogramProducts[key];
            if (!p) return;
            dragData = { type: 'cell', key, product: { ...p } };
            if (event && event.dataTransfer) {
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', p.code || '');
            }
        }

        function onCellDragOver(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
        }

        function onCellDragEnter(key) {
            const el = document.getElementById('cell-' + key);
            if (el) el.style.outline = '2px solid #059669';
        }

        function onCellDragLeave(key) {
            const el = document.getElementById('cell-' + key);
            if (el) el.style.outline = '';
        }

        function onCellDrop(key) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            const el = document.getElementById('cell-' + key);
            if (el) el.style.outline = '';
            if (!dragData) return;

            const existing = planogramProducts[key] ? { ...planogramProducts[key] } : null;

            if (dragData.type === 'list') {
                const prod = products.find(p => normCode(p.code) === dragData.code);
                if (prod) planogramProducts[key] = { ...prod, faces: 1 };
            } else if (dragData.type === 'cell' && dragData.key !== key) {
                planogramProducts[key] = dragData.product;
                if (existing) {
                    planogramProducts[dragData.key] = existing;
                } else {
                    delete planogramProducts[dragData.key];
                }
            }

            dragData = null;
            savePlanogram();
            render();
        }

        function onListDragOver(e) {
            if (e) e.preventDefault();
        }

        function onListDragEnter(el) {
            if (el) el.style.outline = '2px dashed #d97706';
        }

        function onListDragLeave(el) {
            if (el) el.style.outline = '';
        }

        function onListDrop() {
            if (event) event.preventDefault();
            if (!dragData || dragData.type !== 'cell') return;
            delete planogramProducts[dragData.key];
            dragData = null;
            savePlanogram();
            render();
        }

        function endDrag() { dragData = null; }

        // === Управление СКЮ на полке ===
        function changeShelfSlots(shelfIdx, delta) {
            const cur = getShelfSlotCount(shelfIdx);
            const nv = Math.max(1, cur + delta);
            if (nv === cur) return;
            // Удаляем ячейки, которые выходят за пределы нового размера
            if (nv < cur) {
                for (let d = 0; d < selectedDoors; d++) {
                    for (let s = nv; s < cur; s++) {
                        delete planogramProducts[`${d}-${shelfIdx}-${s}`];
                    }
                }
            }
            shelfSlots[shelfIdx] = nv;
            savePlanogram();
            render();
        }

        // === Экспорт в PDF (через html2canvas — полная поддержка кириллицы и раскладки) ===
        async function exportPlanogramPDF() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            try {
                const fridgePanel = document.getElementById('fridge-panel');
                if (!fridgePanel) { alert('Холодильник не найден'); return; }

                // Создаём клон панели для рендера с фиксированной шириной
                const clone = fridgePanel.cloneNode(true);
                clone.style.width = '1100px';
                clone.style.position = 'absolute';
                clone.style.left = '-9999px';
                clone.style.top = '0';
                clone.style.background = '#fff';
                clone.style.padding = '16px';
                document.body.appendChild(clone);

                // Рендерим в canvas
                const canvas = await html2canvas(clone, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff'
                });
                document.body.removeChild(clone);

                // Создаём PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('l', 'mm', 'a4');
                const pageW = pdf.internal.pageSize.getWidth();
                const pageH = pdf.internal.pageSize.getHeight();
                const margin = 8;

                // Заголовок
                pdf.setFontSize(14);
                const now = new Date();
                const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
                pdf.text(`${selectedStore} — Планограмма  ${dateStr}`, margin, margin + 5);

                const imgY = margin + 10;
                const imgW = pageW - margin * 2;
                const imgH = (canvas.height * imgW) / canvas.width;

                // Если не влезает на одну страницу — разбиваем
                if (imgH <= pageH - imgY - margin) {
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, imgY, imgW, imgH);
                } else {
                    // Разбиваем на части по высоте страницы
                    const maxImgH = pageH - margin;
                    const totalH = canvas.height * (imgW / canvas.width);
                    let srcY = 0;
                    let page = 0;
                    while (srcY < totalH) {
                        if (page > 0) pdf.addPage();
                        const partH = Math.min(maxImgH, totalH - srcY);
                        const srcRatio = partH / totalH;
                        const srcCropH = canvas.height * srcRatio;
                        // Создаём canvas для части
                        const partCanvas = document.createElement('canvas');
                        partCanvas.width = canvas.width;
                        partCanvas.height = srcCropH;
                        const ctx = partCanvas.getContext('2d');
                        ctx.drawImage(canvas, 0, srcY / (imgW / canvas.width), canvas.width, srcCropH, 0, 0, canvas.width, srcCropH);
                        pdf.addImage(partCanvas.toDataURL('image/png'), 'PNG', margin, margin, imgW, partH);
                        srcY += partH;
                        page++;
                    }
                }

                pdf.save(`planogram_${selectedStore.replace(/[^a-zA-Z0-9а-яА-Я]/g, '_')}_${dateStr}.pdf`);
            } catch (err) { alert('Ошибка PDF: ' + err.message); }
        }

        // Выровнять высоты полок по горизонтали между всеми створками
        // Ячейки auto-size под контент, затем все ячейки в одной полке (shelf-row)
        // выравниваются по высоте самого tall элемента среди ВСЕХ створок
        function equalizeShelfHeights() {
            const grids = document.querySelectorAll('.shelf-grid');
            if (!grids.length) return;
            // Собираем grid-элементы по shelf-row (номер полки)
            const byRow = {};
            grids.forEach(g => {
                const rowIdx = g.getAttribute('data-shelf-row');
                if (!byRow[rowIdx]) byRow[rowIdx] = [];
                byRow[rowIdx].push(g);
            });
            // Для каждого номера полки: выравниваем все grid-ы по максимальной высоте
            Object.values(byRow).forEach(rowGrids => {
                let maxH = 0;
                // Временно убираем any заданную высоту и flex-растяжение, чтобы измерить естественную высоту контента
                rowGrids.forEach(g => {
                    g.style.height = 'auto';
                    g.style.flex = 'none';
                });
                // Принудительный reflow, затем измеряем
                void rowGrids[0].offsetHeight;
                // Измеряем максимальную естественную высоту
                rowGrids.forEach(g => {
                    const h = g.scrollHeight;
                    if (h > maxH) maxH = h;
                });
                // Устанавливаем одинаковую высоту и убираем flex-растяжение
                rowGrids.forEach(g => {
                    g.style.height = maxH + 'px';
                    g.style.flex = 'none';
                    g.style.flexShrink = '0';
                });
            });
        }

        // File handling
        function handleFile(input, type) {
            if (type === 'assortment') {
                const file = input.files[0];
                if (!file) return;
                SharedUtils.importAssortmentUnified(file).then(function(result) {
                    products = result.items;
                    products.forEach(function(p) {
                        if (!p.markup && p.markup !== 0) p.markup = defaultMarkup;
                        if (!p.inPrice) p.inPrice = p.price || 0;
                    });
                    save(KEYS.PRODUCTS, products);
                    render();
                    alert('Загружено товаров: ' + products.length);
                }).catch(function(err) {
                    alert('Ошибка импорта: ' + err.message);
                });
                input.value = '';
                return;
            }
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

                    if (type === 'matrix') {
                        const CATALOG_FIELDS = ['code','nomenclature','name','group','packaging','supplier','quant','price','inPrice','shelfPrice','shelf','markup','inMatrix'];
                        const headers = json[0] || [];
                        const tts = [];
                        for (let c = 3; c < headers.length; c++) {
                            const h = String(headers[c] || '').trim();
                            if (h) tts.push(h);
                        }
                        let count = 0;
                        for (let i = 1; i < json.length; i++) {
                            const r = json[i];
                            if (!r || r.length < 2) continue;
                            const code = normCode(String(r[2] || r[1] || '').trim());
                            if (!code) continue;
                            for (let t = 0; t < tts.length; t++) {
                                const val = String(r[3 + t] || '').trim();
                                if (val === 'ДА' || val === 'НЕТ') {
                                    if (!matrixMarks[code]) matrixMarks[code] = {};
                                    matrixMarks[code][tts[t]] = val;
                                    count++;
                                }
                            }
                        }
                        save(KEYS.MATRIX, matrixMarks);
                        buildMatrix();
                        render();
                        alert(`Матрица импортирована: ${count} отметок ДА/НЕТ для ${Object.keys(matrixMarks).length} товаров`);
                    } else if (type === 'sales') {
                        const items = [];
                        let curTT = '';
                        for (let i = 0; i < json.length; i++) {
                            const r = json[i];
                            if (!r || r.length === 0) continue;
                            const c0 = String(r[0] || '').trim();
                            const isTT = /склад|магазин|тт/i.test(c0) && !/^\d/.test(c0);
                            if (isTT) curTT = c0;
                            else if (/^\d/.test(c0) && curTT) {
                                const qty = parseFloat(String(r[1])) || 0;
                                if (qty > 0) items.push({ tt: curTT, code: c0, quantity: qty });
                            }
                        }
                        sales = items;
                        save(KEYS.SALES, sales);
                        alert(`Загружено ${items.length} продаж`);
                    } else if (type === 'writeoffs') {
                        const items = [];
                        let curTT = '';
                        for (let i = 0; i < json.length; i++) {
                            const r = json[i];
                            if (!r || r.length === 0) continue;
                            const c0 = String(r[0] || '').trim();
                            const qty = parseFloat(String(r[2] || r[1])) || 0;
                            const isTT = /склад|магазин|тт/i.test(c0) && !/^\d+$/.test(c0);
                            if (isTT) curTT = c0;
                            else if (curTT && qty > 0) {
                                const code = /^\d+$/.test(c0) ? c0 : String(r[1] || '').trim();
                                if (/^\d+$/.test(code)) items.push({ tt: curTT, code, quantity: qty, date: new Date().toISOString() });
                            }
                        }
                        writeoffs = [...writeoffs, ...items];
                        save(KEYS.WRITEOFFS, writeoffs);
                        alert(`Загружено ${items.length} списаний`);
                    } else if (type === 'stores') {
                        // ❌ УБРАНО: магазины теперь берутся из stores.html через shared_stores_v1
                        alert('Магазины загружаются через раздел «Магазины» на главной странице. Этот импорт отключён.');
                    }
                    render();
                } catch (err) { alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        // Actions
        function toggleMatrix(code, tt) {
            const nc = normCode(code);
            if (!matrixMarks[nc]) matrixMarks[nc] = {};
            matrixMarks[nc][tt] = matrixMarks[nc]?.[tt] === 'ДА' ? 'НЕТ' : 'ДА';
            save(KEYS.MATRIX, matrixMarks);
            buildMatrix();
            render();
        }

        function handleStoreSelect(tt) {
            selectedStore = tt;
            planogramSelectedProduct = null;
            planogramSearch = '';
            planogramCategory = '';
            expandedGroups = new Set();
            const store = stores.find(s => s.tt === tt);
            if (store) selectedDoors = store.doors || 2;
            if (planograms[tt]) {
                const saved = planograms[tt];
                selectedDoors = saved.doors || selectedDoors;
                selectedShelves = saved.shelves || selectedShelves;
                skuPerShelf = saved.skuPerShelf || 7;
                planogramProducts = saved.products || {};
                shelfCategories = saved.shelfCategories || {};
                shelfSlots = saved.shelfSlots || {};
                fillCriteria = saved.fillCriteria || { name: true, sales: false, margin: false, supplier: false };
            } else {
                selectedDoors = store ? (store.doors || 2) : 2;
                selectedShelves = 5;
                skuPerShelf = 7;
                planogramProducts = {};
                shelfCategories = {};
                shelfSlots = {};
                fillCriteria = { name: true, sales: false, margin: false, supplier: false };
            }
            render();
        }

        // Выбрать товар из списка (левая панель)
        function selectPlanogramProduct(code, nomenclature, group) {
            if (planogramSelectedProduct && planogramSelectedProduct.code === code) {
                planogramSelectedProduct = null; // снять выделение
            } else {
                planogramSelectedProduct = { code, nomenclature, group };
            }
            render();
        }

        // Клик по ячейке холодильника
        function handleCellClick(key) {
            if (planogramSelectedProduct) {
                // Разместить выбранный товар
                const sp = planogramSelectedProduct;
                const prod = products.find(p => normCode(p.code) === sp.code);
                planogramProducts[key] = {
                    code: sp.code,
                    nomenclature: sp.nomenclature,
                    group: sp.group,
                    faces: 1,
                    ...prod
                };
                planogramSelectedProduct = null; // снять выделение после размещения
                savePlanogram();
                render();
            }
            // Если ячейка занята и нет выделенного товара — ничего (товар удаляется через ✕)
        }

        function removeFromCell(key) {
            delete planogramProducts[key];
            savePlanogram();
            render();
        }

        // Изменить количество фейсов
        function changeFaces(key, delta) {
            const p = planogramProducts[key];
            if (!p) return;
            p.faces = Math.max(1, (p.faces || 1) + delta);
            savePlanogram();
            render();
        }

        // Очистить всю планограмму
        function clearPlanogram() {
            if (Object.values(planogramProducts).filter(p => p && p.code).length === 0) return;
            if (!confirm('Очистить все полки?')) return;
            planogramProducts = {};
            planogramSelectedProduct = null;
            savePlanogram();
            render();
        }

        // Создать матрицу из размещённых на полках товаров
        function createMatrixFromPlanogram() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const placed = Object.values(planogramProducts).filter(p => p && p.code);
            if (placed.length === 0) { alert('Сначала заполните полки товарами!'); return; }

            const placedCodes = new Set();
            placed.forEach(p => placedCodes.add(normCode(p.code)));

            // Считаем сколько товаров будет добавлено и удалено из матрицы
            let added = 0, removed = 0, kept = 0;

            // Обходим ВСЕ товары из ассортимента
            products.forEach(p => {
                if (!p.code) return;
                const nc = normCode(p.code);
                if (!matrixMarks[nc]) matrixMarks[nc] = {};

                if (placedCodes.has(nc)) {
                    // Товар на полке — ставим ДА
                    if (matrixMarks[nc][selectedStore] !== 'ДА') {
                        added++;
                    } else {
                        kept++;
                    }
                    matrixMarks[nc][selectedStore] = 'ДА';
                } else {
                    // Товара нет на полках — ставим НЕТ
                    if (matrixMarks[nc][selectedStore] === 'ДА') {
                        removed++;
                    }
                    matrixMarks[nc][selectedStore] = 'НЕТ';
                }
            });

            // Сохраняем обновлённую матрицу (save() уже синхронизирует через SharedData)
            save(KEYS.MATRIX, matrixMarks);
            buildMatrix();

            rebuildPlacedCodes();
            render();

            alert(`Матрица для ${selectedStore} обновлена:\n✅ Добавлено: ${added}\n❌ Убрано: ${removed}\n⏭ Без изменений: ${kept}\n\nИтого ДА: ${placedCodes.size} СКЮ`);
        }

        // Сохранить планограмму
        function savePlanogram() {
            if (!selectedStore) return;
            planograms[selectedStore] = {
                doors: selectedDoors,
                shelves: selectedShelves,
                skuPerShelf: skuPerShelf,
                products: planogramProducts,
                shelfCategories: shelfCategories,
                shelfSlots: shelfSlots,
                fillCriteria: fillCriteria
            };
            save(KEYS.PLANOGRAMS, planograms);
        }

        // Загрузить планограмму из сохранённых данных
        function loadPlanogram() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            if (!planograms[selectedStore]) { alert('Сохранённая планограмма не найдена'); return; }
            const saved = planograms[selectedStore];
            selectedDoors = saved.doors || selectedDoors;
            selectedShelves = saved.shelves || selectedShelves;
            skuPerShelf = saved.skuPerShelf || 7;
            planogramProducts = saved.products || {};
            shelfCategories = saved.shelfCategories || {};
            shelfSlots = saved.shelfSlots || {};
            fillCriteria = saved.fillCriteria || fillCriteria;
            render();
            alert('Планограмма загружена!');
        }

        // Сохранить шаблон
        function saveTemplate() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const name = prompt('Название шаблона:', `${selectedStore}_шаблон`);
            if (!name) return;
            planogramTemplates[name] = {
                shelves: selectedShelves,
                skuPerShelf: skuPerShelf,
                shelfCategories: { ...shelfCategories },
                shelfSlots: { ...shelfSlots },
                productCodes: {}
            };
            // Extract codes from planogramProducts
            Object.entries(planogramProducts).forEach(([key, p]) => {
                if (p && p.code) {
                    planogramTemplates[name].productCodes[key] = p.code;
                }
            });
            localStorage.setItem('fridge_planogram_templates', JSON.stringify(planogramTemplates));
            render();
            alert(`Шаблон "${name}" сохранён`);
        }

        // Применить шаблон
        function applyTemplate(name) {
            if (!name) { alert('Выберите шаблон!'); return; }
            if (!planogramTemplates[name]) { alert('Шаблон не найден!'); return; }
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const tpl = planogramTemplates[name];
            selectedShelves = tpl.shelves || selectedShelves;
            skuPerShelf = tpl.skuPerShelf || skuPerShelf;
            shelfCategories = { ...(tpl.shelfCategories || {}) };
            shelfSlots = { ...(tpl.shelfSlots || {}) };

            // Clear and fill from template
            planogramProducts = {};
            const storeProducts = getStoreProducts(); // products with ДА for this store
            const storeProductMap = {};
            storeProducts.forEach(p => { storeProductMap[normCode(p.code)] = p; });

            Object.entries(tpl.productCodes || {}).forEach(([key, code]) => {
                const nc = normCode(code);
                const prod = storeProductMap[nc];
                if (prod) {
                    planogramProducts[key] = { ...prod, faces: 1 };
                }
                // If product not found in matrix for this store → cell stays empty
            });

            savePlanogram();
            render();
            const placed = Object.values(planogramProducts).filter(p => p && p.code).length;
            const total = Object.keys(tpl.productCodes || {}).length;
            alert(`Шаблон "${name}" применён: ${placed}/${total} товаров размещено`);
        }

        function calculateAnalytics() {
            if (!Object.keys(matrix).length) { alert('Загрузите ассортимент!'); return; }

            const salesMap = new Map();
            sales.forEach(s => {
                const key = `${s.tt}_${s.code}`;
                salesMap.set(key, (salesMap.get(key) || 0) + s.quantity);
            });

            const writeoffsMap = new Map();
            writeoffs.forEach(w => {
                const key = `${w.tt}_${w.code}`;
                writeoffsMap.set(key, (writeoffsMap.get(key) || 0) + w.quantity);
            });

            analysis = [];
            stores.forEach(store => {
                if (!store.tt) return;
                Object.entries(matrix).forEach(([code, data]) => {
                    if (data[store.tt] !== 'ДА') return;
                    const salesQty = salesMap.get(`${store.tt}_${code}`) || 0;
                    const writeoffQty = writeoffsMap.get(`${store.tt}_${code}`) || 0;
                    const dailySales = salesQty / 30;
                    const writeoffPercent = salesQty > 0 ? (writeoffQty / salesQty * 100) : 0;

                    let decision = 'Оставить';
                    let comment = '';
                    if (writeoffPercent > 10) { decision = 'Удалить'; comment = `Списание: ${writeoffPercent.toFixed(1)}%`; }
                    else if (writeoffPercent > 5) { decision = 'Пересмотреть'; comment = `Списание: ${writeoffPercent.toFixed(1)}%`; }
                    else if (salesQty === 0) { decision = 'Пересмотреть'; comment = 'Нет продаж'; }

                    analysis.push({ tt: store.tt, code, name: data.nomenclature || data.name, category: data.category, dailySales: dailySales.toFixed(2), salesQty, writeoffQty, decision, comment });
                });
            });

            tab = 'analytics';
            render();
            alert(`Рассчитано: ${analysis.length} позиций`);
        }

        // Exports
        function exportAssortment() {
            // Build sales map for the unified export
            var salesMap = {};
            products.forEach(function(p) {
                salesMap[p.code] = getTotalSales(p.code);
            });
            SharedUtils.exportAssortmentUnified(products, { salesMap: salesMap, filename: 'fridge_assortment.xlsx' });
        }

        function exportAnalytics() {
            const data = analysis.map(a => ({ 'ТТ': a.tt, 'Код': a.code, 'Наименование': a.name, 'Категория': a.category, 'Продажи/день': a.dailySales, 'Списания': a.writeoffQty, 'Решение': a.decision }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Аналитика');
            XLSX.writeFile(wb, 'fridge_analytics.xlsx');
        }

        function exportPlanogram() {
            if (!selectedStore) { alert('Выберите магазин!'); return; }
            const maxSKU = Math.max(...Array.from({ length: selectedShelves }, (_, i) => getShelfSlotCount(i)), 1);
            const rows = [['Створка', 'Полка', 'Категория', ...Array.from({ length: maxSKU }, (_, i) => `СКЮ ${i + 1}`)]];
            for (let d = 0; d < selectedDoors; d++) {
                for (let shelf = selectedShelves - 1; shelf >= 0; shelf--) {
                    const dsKey = `${d}-${shelf}`;
                    const cat = shelfCategories[dsKey] || '';
                    const slots = getShelfSlotCount(shelf);
                    const row = [`Створка ${d + 1}`, `Полка ${shelf + 1}`, cat];
                    for (let s = 0; s < maxSKU; s++) {
                        if (s < slots) {
                            const key = `${d}-${shelf}-${s}`;
                            const product = planogramProducts[key];
                            const vol = product ? getProductVolume(product) : 0;
                            const faces = product && product.faces > 1 ? ` ×${product.faces}` : '';
                            const volStr = vol > 0 ? ` ${vol}л` : '';
                            row.push(product ? `${product.nomenclature || product.name}${volStr}${faces}` : '');
                        } else {
                            row.push('');
                        }
                    }
                    rows.push(row);
                }
            }
            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [{ wch: 10 }, { wch: 20 }, ...Array.from({ length: maxSKU }, () => ({ wch: 35 }))];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Планограмма');
            XLSX.writeFile(wb, `planogram_${selectedStore.replace(/[^a-zA-Z0-9]/g, '_')}.xlsx`);
        }

        // Инициализируем сразу с локальными данными
        init();

        // После загрузки из облака — перечитываем данные и перерисовываем
        window.addEventListener('cloudStorageReady', () => {
            products = load(KEYS.PRODUCTS, []);
            if (!Array.isArray(products)) products = [];
            matrixMarks = load(KEYS.MATRIX, {});
            writeoffs = load(KEYS.WRITEOFFS, []);
            sales = load(KEYS.SALES, []);
            stores = load(KEYS.STORES, []);
            planograms = load(KEYS.PLANOGRAMS, {});
            planogramTemplates = JSON.parse(localStorage.getItem('fridge_planogram_templates') || '{}');
            buildMatrix();
            render();
        });
    </script>
    <!-- Version: 4.18 — PDF export via html2canvas for Cyrillic support and pixel-perfect layout -->
