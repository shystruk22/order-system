<body class="min-h-screen p-6 bg-gray-50">
    <div class="max-w-4xl mx-auto">

                    <button onclick="downloadData()" class="data-btn bg-emerald-50 border-emerald-200 text-emerald-700 hover:bg-emerald-100">

        function log(msg, type) {
            const area = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString('ru');
            area.innerHTML += `<div><span class="${type || ''}">[${time}]</span> ${msg}</div>`;
            area.scrollTop = area.scrollHeight;
        }

        function readValue(key) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                if (raw.startsWith('{') || raw.startsWith('[')) {
                    return JSON.parse(raw);
                }
                if (typeof LZString !== 'undefined') {
                    try { return JSON.parse(LZString.decompressFromUTF16(raw)); } catch {}
                }
                try { return JSON.parse(raw); } catch { return raw; }
            } catch { return null; }
        }

        function writeValue(key, value) {
            try {
                if (value === null || value === undefined) return;
                const json = JSON.stringify(value);
                if (typeof LZString !== 'undefined' && json.length > 500) {
                    localStorage.setItem(key, LZString.compressToUTF16(json));
                } else {
                    localStorage.setItem(key, json);
                }
                return true;
            } catch (e) {
                log('Ошибка записи ' + key + ': ' + e.message, 'err');
                return false;
            }
        }

        function downloadData() {
            log('--- Начало выгрузки данных ---', 'info');
            const data = {};
            let count = 0;
            let totalSize = 0;

            ALL_KEYS.forEach(key => {
                const val = readValue(key);
                if (val !== null) {
                    data[key] = val;
                    count++;
                    const size = JSON.stringify(val).length;
                    totalSize += size;
                    const sizeStr = size > 1024 ? (size / 1024).toFixed(1) + ' KB' : size + ' B';
                    log('+' + key + ' (' + sizeStr + ')', 'ok');
                }
            });

            if (count === 0) {
                log('Нет данных для сохранения!', 'err');
                return;
            }

            const exportObj = {
                _meta: {
                    version: 1,
                    date: new Date().toISOString(),
                    keys: count,
                    totalSize: totalSize
                },
                data: data
            };

            const blob = new Blob([JSON.stringify(exportObj)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const d = new Date();
            a.download = 'order-system-backup_' + d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + '.json';
            a.click();
            URL.revokeObjectURL(url);

            log('--- Готово! Сохранено ' + count + ' ключей, ' + (totalSize / 1024).toFixed(1) + ' KB ---', 'ok');
        }

        function uploadData(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            log('--- Загрузка файла: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB) ---', 'info');

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const obj = JSON.parse(e.target.result);
                    const data = obj.data || obj;
                    const keys = Object.keys(data);
                    let loaded = 0;
                    let errors = 0;

                    log('Найдено ' + keys.length + ' ключей в файле', 'info');

                    keys.forEach(key => {
                        if (writeValue(key, data[key])) {
                            loaded++;
                        } else {
                            errors++;
                        }
                    });

                    log('--- Загружено: ' + loaded + ' ключей' + (errors > 0 ? ', ошибок: ' + errors : '') + ' ---', loaded > 0 ? 'ok' : 'err');
                    if (loaded > 0) {
                        log('Обновите страницу (F5) чтобы увидеть данные', 'warn');
                    }
                } catch (err) {
                    log('Ошибка чтения файла: ' + err.message, 'err');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }
