            trash: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
            check: '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
            download: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
            export: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M16 10l4-4-4-4"/><line x1="20" y1="6" x2="12" y2="6"/><path d="M20 6h-8v12"/></svg>',
            clipboard: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>',
            package: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
            search: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
        };

        var esc = function(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
        };
        var normCode = function(code) { return String(code || '').trim().replace(/^0+/, '') || '0'; };
        var load = function(key, def) { return SharedUtils.load(key, def); };
        var save = function(key, data) { SharedUtils.save(key, data); };

        // === ИНИЦИАЛИЗАЦИЯ ===
        function init() {
            try {
                stores = load(KEYS.STORES, []);
                if (!Array.isArray(stores)) stores = [];
            } catch(e) { stores = []; }

            try { deliverySchedule = load(KEYS.SCHEDULE, {}); } catch(e) { deliverySchedule = {}; }
            try { supplierProducts = load(KEYS.SUPPLIER_PRODUCTS, {}); } catch(e) { supplierProducts = {}; }
            try { inTransitOrders = load(KEYS.INTRANSIT, []); } catch(e) { inTransitOrders = []; }

            loadProductsLookup();

            var supplierKeys = Object.keys(deliverySchedule);
            selectedSupplier = supplierKeys.length > 0 ? supplierKeys[0] : '';

            window.addEventListener('storage', function(e) {
                if (e.key === KEYS.STORES) { stores = load(KEYS.STORES, []); if (!Array.isArray(stores)) stores = []; render(); }
                if (e.key === KEYS.INTRANSIT) { inTransitOrders = load(KEYS.INTRANSIT, []); render(); }
            });

            syncFromUniversal();
            autoCloseOrders();
            render();
        }

        function loadProductsLookup() {
            products = {};
            try {
                var shared = load('shared_products_v1', {});
                if (shared && Object.keys(shared).length > 0) { products = shared; return; }
            } catch(e) {}
            try {
                var fish = load('fish_assortment_v1', {});
                if (fish && Object.keys(fish).length > 0) {
                    Object.keys(fish).forEach(function(code) {
                        var p = fish[code];
                        products[code] = { code: code, nomenclature: p.nomenclature || '', group: p.group || '' };
                    });
                }
            } catch(e) {}
        }

        // === ПОСТАВЩИКИ ===
        function ensureScheduleStores() {
            if (!stores || stores.length === 0) return;
            var emptyWeek = [false, false, false, false, false, false, false];
            Object.keys(deliverySchedule).forEach(function(sup) {
                if (!deliverySchedule[sup]) deliverySchedule[sup] = {};
                stores.forEach(function(s) {
                    if (!deliverySchedule[sup][s.tt]) deliverySchedule[sup][s.tt] = emptyWeek.slice();
                });
                Object.keys(deliverySchedule[sup]).forEach(function(tt) {
                    if (!stores.find(function(s) { return s.tt === tt; })) delete deliverySchedule[sup][tt];
                });
            });
        }

        function addSupplier() {
            var name = prompt('Введите название поставщика:');
            if (!name || !name.trim()) return;
            name = name.trim();
            if (deliverySchedule[name]) { alert('Поставщик "' + name + '" уже есть'); return; }
            deliverySchedule[name] = {};
            supplierProducts[name] = {};
            var emptyWeek = [false, false, false, false, false, false, false];
            stores.forEach(function(s) { deliverySchedule[name][s.tt] = emptyWeek.slice(); });
            selectedSupplier = name;
            save(KEYS.SCHEDULE, deliverySchedule);
            save(KEYS.SUPPLIER_PRODUCTS, supplierProducts);
            render();
        }

        function deleteSupplier(name) {
            if (!confirm('Удалить поставщика "' + name + '"?')) return;
            delete deliverySchedule[name];
            delete supplierProducts[name];
            var keys = Object.keys(deliverySchedule);
            selectedSupplier = keys.length > 0 ? keys[0] : '';
            save(KEYS.SCHEDULE, deliverySchedule);
            save(KEYS.SUPPLIER_PRODUCTS, supplierProducts);
            render();
        }

        function renameSupplier(oldName) {
            var newName = prompt('Новое название поставщика:', oldName);
            if (!newName || !newName.trim() || newName.trim() === oldName) return;
            newName = newName.trim();
            if (deliverySchedule[newName]) { alert('Поставщик "' + newName + '" уже есть'); return; }
            deliverySchedule[newName] = deliverySchedule[oldName];
            delete deliverySchedule[oldName];
            supplierProducts[newName] = supplierProducts[oldName] || {};
            delete supplierProducts[oldName];
            inTransitOrders.forEach(function(o) {
                if (o.supplier === oldName) o.supplier = newName;
            });
            if (selectedSupplier === oldName) selectedSupplier = newName;
            save(KEYS.SCHEDULE, deliverySchedule);
            save(KEYS.SUPPLIER_PRODUCTS, supplierProducts);
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function importSuppliers() {
            var supplierSet = {};
            try { var us = load('univ_suppliers_v1', []); if (Array.isArray(us)) us.forEach(function(s) { if (s && s.name) supplierSet[s.name] = true; }); } catch(e) {}
            try { Object.values(load('shared_products_v1', {})).forEach(function(p) { if (p && p.supplier) supplierSet[p.supplier] = true; }); } catch(e) {}
            try { Object.values(load('fish_assortment_v1', {})).forEach(function(p) { if (p && p.supplier) supplierSet[p.supplier] = true; }); } catch(e) {}
            try { Object.keys(load('fish_schedule_v1', {})).forEach(function(s) { supplierSet[s] = true; }); } catch(e) {}

            var names = Object.keys(supplierSet);
            if (names.length === 0) { alert('Не найдено поставщиков.\nСначала назначьте поставщиков в ассортименте.'); return; }
            var emptyWeek = [false, false, false, false, false, false, false];
            var added = 0;
            names.forEach(function(name) {
                if (!deliverySchedule[name]) {
                    deliverySchedule[name] = {};
                    supplierProducts[name] = {};
                    stores.forEach(function(s) { deliverySchedule[name][s.tt] = emptyWeek.slice(); });
                    added++;
                }
            });
            if (added > 0) {
                selectedSupplier = names[0];
                save(KEYS.SCHEDULE, deliverySchedule);
                save(KEYS.SUPPLIER_PRODUCTS, supplierProducts);
            }
            alert(added > 0 ? 'Добавлено: ' + added + '\n' + names.join(', ') : 'Все поставщики уже есть.');
            render();
        }

        function toggleDeliveryDay(sup, tt, di) {
            if (!deliverySchedule[sup] || !deliverySchedule[sup][tt]) return;
            deliverySchedule[sup][tt][di] = !deliverySchedule[sup][tt][di];
            save(KEYS.SCHEDULE, deliverySchedule);

            var cbId = 'cb_' + CSS.escape(sup) + '_' + CSS.escape(tt) + '_' + di;
            var cb = document.getElementById(cbId);
            if (cb) {
                var on = deliverySchedule[sup][tt][di];
                cb.className = 'w-5 h-5 rounded flex items-center justify-center transition-colors cursor-pointer ' + (on ? 'bg-emerald-500 text-white border-0' : 'bg-white border-2 border-gray-300');
                cb.innerHTML = on ? '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '';
            }
            var totalEl = document.getElementById('tot_' + CSS.escape(sup) + '_' + CSS.escape(tt));
            if (totalEl) {
                var cnt = deliverySchedule[sup][tt].filter(Boolean).length;
                totalEl.textContent = cnt > 0 ? cnt + ' дн.' : '—';
                totalEl.style.color = cnt > 0 ? '#374151' : '#9ca3af';
            }
        }

        // === ТОВАРЫ ПОСТАВЩИКА ===
        function addProductManual() {
            var inp = document.getElementById('addCodeInput');
            if (!inp) return;
            var code = normCode(inp.value);
            if (!code || code === '0') return;
            if (!supplierProducts[selectedSupplier]) supplierProducts[selectedSupplier] = {};
            if (supplierProducts[selectedSupplier][code]) { alert('Код ' + code + ' уже есть'); inp.value = ''; inp.focus(); return; }
            var prod = products[code] || {};
            supplierProducts[selectedSupplier][code] = { code: code, nomenclature: prod.nomenclature || '', group: prod.group || '' };
            save(KEYS.SUPPLIER_PRODUCTS, supplierProducts);
            inp.value = ''; inp.focus();
            render();
        }

        function showPasteModal() {
            var html = '<div id="pasteModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onclick="if(event.target===this)this.remove()">' +
                '<div class="bg-white rounded-xl shadow-xl w-96 max-h-[80vh] overflow-hidden">' +
                    '<div class="px-4 py-3 bg-amber-50 border-b border-amber-200 flex items-center justify-between">' +
                        '<h3 class="text-sm font-semibold text-amber-800">' + icons.clipboard + ' Вставить коды товаров</h3>' +
                        '<button onclick="document.getElementById(\'pasteModal\').remove()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>' +
                    '</div>' +
                    '<div class="p-4 space-y-3">' +
                        '<p class="text-xs text-gray-500">Вставьте коды (по одному на строку, через запятую или пробел). Данные подтянутся из ассортимента.</p>' +
                        '<textarea id="pasteArea" rows="8" class="w-full input text-xs font-mono" placeholder="100123&#10;100456&#10;100789"></textarea>' +
                    '</div>' +
                    '<div class="px-4 py-3 bg-gray-50 border-t flex justify-end gap-2">' +
                        '<button onclick="document.getElementById(\'pasteModal\').remove()" class="px-3 py-1.5 text-xs text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-100">Отмена</button>' +
                        '<button onclick="processPaste()" class="px-4 py-1.5 text-xs font-medium text-white bg-amber-600 rounded-lg hover:bg-amber-700">' + icons.plus + ' Добавить</button>' +
                    '</div>' +
                '</div></div>';
            document.body.insertAdjacentHTML('beforeend', html);
            setTimeout(function() { var ta = document.getElementById('pasteArea'); if (ta) ta.focus(); }, 100);
        }

        function processPaste() {
            var ta = document.getElementById('pasteArea');
            if (!ta || !ta.value.trim()) return;
            var codes = ta.value.trim().split(/[\n\r,;\t]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
            var sup = selectedSupplier;
            if (!supplierProducts[sup]) supplierProducts[sup] = {};
            var added = 0, skipped = 0;
            codes.forEach(function(raw) {
                raw.split(/\s+/).forEach(function(c) {
                    var code = normCode(c);
                    if (!code || code === '0') return;
                    if (supplierProducts[sup][code]) { skipped++; return; }
                    var prod = products[code] || {};
                    supplierProducts[sup][code] = { code: code, nomenclature: prod.nomenclature || '', group: prod.group || '' };
                    added++;
                });
            });
            save(KEYS.SUPPLIER_PRODUCTS, supplierProducts);
            document.getElementById('pasteModal').remove();
            render();
            alert('Добавлено: ' + added + (skipped > 0 ? '\nПропущено: ' + skipped : ''));
        }

        function removeProduct(code) {
            if (!supplierProducts[selectedSupplier]) return;
            delete supplierProducts[selectedSupplier][code];
            save(KEYS.SUPPLIER_PRODUCTS, supplierProducts);
            render();
        }

        function clearProducts() {
            if (!supplierProducts[selectedSupplier]) return;
            var cnt = Object.keys(supplierProducts[selectedSupplier]).length;
            if (cnt === 0) return;
            if (!confirm('Удалить все товары (' + cnt + ')?')) return;
            supplierProducts[selectedSupplier] = {};
            save(KEYS.SUPPLIER_PRODUCTS, supplierProducts);
            render();
        }

        function exportProducts() {
            var sup = selectedSupplier;
            if (!supplierProducts[sup]) return;
            var codes = Object.keys(supplierProducts[sup]);
            if (codes.length === 0) { alert('Нет товаров'); return; }
            var rows = [['Код', 'Наименование', 'Группа']];
            codes.forEach(function(code) {
                var p = supplierProducts[sup][code] || {};
                rows.push([code, p.nomenclature || '', p.group || '']);
            });
            var ws = SharedUtils.createStyledSheet(rows, rows.shift(), [0]);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Товары');
            XLSX.writeFile(wb, sup + '_tovary.xlsx');
        }

        // === В ПУТИ ===
        function syncFromUniversal() {
            try {
                var univOrders = load('univ_saved_orders_list_v1', []);
                if (!Array.isArray(univOrders)) return;
                var changed = false;
                univOrders.forEach(function(o) {
                    if (inTransitOrders.find(function(ex) { return ex.universalId === o.id; })) return;
                    var items = (o.items || []).filter(function(r) { return r.order > 0; }).map(function(r) { return { code: r.code || '', name: r.nomenclature || '', qty: r.order || 0, sum: r.sum || 0 }; });
                    if (items.length === 0) return;
                    var supList = Object.keys(o.supplierGroups || {});
                    inTransitOrders.push({
                        id: Date.now() + Math.random(), universalId: o.id, createdAt: o.date || '',
                        supplier: supList[0] || '—', suppliers: supList, expectedDate: o.expectedDate || '',
                        items: items, status: 'in_transit', orderName: o.name || 'Заказ', orderSource: 'universal',
                        totalSum: items.reduce(function(s, i) { return s + i.sum; }, 0),
                        totalQty: items.reduce(function(s, i) { return s + i.qty; }, 0)
                    });
                    changed = true;
                });
                if (changed) save(KEYS.INTRANSIT, inTransitOrders);
            } catch(e) {}
        }

        function autoCloseOrders() {
            var changed = false;
            inTransitOrders.forEach(function(o) {
                if (o.status === 'in_transit' && o.expectedDate) {
                    var exp = new Date(o.expectedDate); exp.setHours(23,59,59,999);
                    if (new Date() > exp) { o.status = 'delivered'; changed = true; }
                }
            });
            if (changed) save(KEYS.INTRANSIT, inTransitOrders);
        }

        function markDelivered(id) { var o = inTransitOrders.find(function(x){return x.id===id;}); if(o){o.status='delivered'; save(KEYS.INTRANSIT,inTransitOrders); render();} }
        function deleteTransitOrder(id) { if(!confirm('Удалить?'))return; inTransitOrders=inTransitOrders.filter(function(x){return x.id!==id;}); save(KEYS.INTRANSIT,inTransitOrders); render(); }
        function editExpectedDate(id) {
            var o = inTransitOrders.find(function(x){return x.id===id;}); if(!o)return;
            var d = prompt('Дата доставки (ГГГГ-ММ-ДД):', o.expectedDate || new Date(Date.now()+86400000).toISOString().split('T')[0]);
            if(d===null)return; var dd=new Date(d); if(isNaN(dd.getTime())){alert('Неверный формат');return;}
            o.expectedDate=d.toISOString().split('T')[0]; save(KEYS.INTRANSIT,inTransitOrders); render();
        }
        function clearDelivered() { var c=inTransitOrders.filter(function(o){return o.status==='delivered';}); if(c.length===0)return; if(!confirm('Удалить '+c.length+' доставленных?'))return; inTransitOrders=inTransitOrders.filter(function(o){return o.status!=='delivered';}); save(KEYS.INTRANSIT,inTransitOrders); render(); }
        function exportTransit() {
            if(inTransitOrders.length===0)return;
            var rows=[['Заказ','Поставщик','Дата','Доставка','Статус','Код','Наим.','Кол-во','Сумма']];
            inTransitOrders.forEach(function(o){var st=o.status==='in_transit'?'В пути':'Доставлен';(o.items||[]).forEach(function(i){rows.push([o.orderName||'',o.supplier||'',o.createdAt||'',o.expectedDate||'',st,i.code||'',i.name||'',i.qty||0,(i.sum||0).toFixed(2)]);});});
            var ws=SharedUtils.createStyledSheet(rows,rows.shift(),[0,1,3,4,6]);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Доставки');
            XLSX.writeFile(wb,'dostavki_'+new Date().toISOString().split('T')[0]+'.xlsx');
        }

        // === РЕНДЕР ===
        function render() { renderTabs(); document.getElementById('content').innerHTML = tab==='schedule' ? renderSchedule() : renderIntransit(); renderAlerts(); updateStats(); }

        function updateStats() {
            document.getElementById('statsSuppliers').textContent = Object.keys(deliverySchedule).length + ' пост.';
            document.getElementById('statsStores').textContent = stores.length + ' ТТ';
            var tp = 0; Object.values(supplierProducts).forEach(function(sp){tp+=Object.keys(sp).length;});
            document.getElementById('statsProducts').textContent = tp + ' тов.';
        }

        function renderTabs() {
            var tc = inTransitOrders.filter(function(o){return o.status==='in_transit';}).length;
            var tabs = [{id:'schedule',label:'График',icon:icons.calendar},{id:'intransit',label:'В пути'+(tc>0?' ('+tc+')':''),icon:icons.truck}];
            document.getElementById('tabs').innerHTML = tabs.map(function(t) {
                return '<button onclick="tab=\''+t.id+'\';render()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md transition-colors '+(tab===t.id?'bg-amber-600 text-white shadow-sm':'text-gray-600 hover:bg-white hover:text-gray-900')+'">'+t.icon+'<span>'+t.label+'</span></button>';
            }).join('');
        }

        function renderAlerts() {
            var banner = document.getElementById('alertBanner');
            var alerts = [];
            inTransitOrders.forEach(function(o) {
                if(o.status!=='in_transit'||!o.expectedDate)return;
                var exp=new Date(o.expectedDate);exp.setHours(0,0,0,0);var today=new Date();today.setHours(0,0,0,0);
                var diff=Math.ceil((exp-today)/86400000);
                if(diff<0) alerts.push('<span class="text-red-700 font-medium">'+esc(o.supplier)+'</span>: просрочено на <b>'+Math.abs(diff)+'</b> дн.');
                else if(diff===0) alerts.push('<span class="text-amber-700 font-medium">'+esc(o.supplier)+'</span>: доставка <b>сегодня</b>');
                else if(diff===1) alerts.push('<span class="text-sky-700 font-medium">'+esc(o.supplier)+'</span>: доставка <b>завтра</b>');
            });
            if(alerts.length===0){banner.className='hidden';return;}
            banner.className='mx-3 mt-2 bg-amber-50 border border-amber-200 rounded-lg p-2 text-xs';
            banner.innerHTML='<div class="flex items-start gap-2"><span class="text-amber-500 shrink-0">'+icons.truck+'</span><div class="space-y-0.5">'+alerts.join('<hr class="border-amber-200">')+'</div></div>';
        }

        // === ГРАФИК ===
        function renderSchedule() {
            ensureScheduleStores();
            var names = Object.keys(deliverySchedule);

            if (stores.length === 0) {
                return '<div class="bg-white rounded-lg border border-gray-200 p-6 text-center"><div class="p-3 bg-amber-50 rounded-lg text-amber-500 inline-flex mb-3">'+icons.calendar+'</div><h3 class="text-gray-700 font-medium mb-1">Нет магазинов</h3><p class="text-gray-400 text-sm">Сначала добавьте магазины на странице "Магазины"</p></div>';
            }
            if (names.length === 0) {
                return '<div class="bg-white rounded-lg border border-gray-200 p-6 text-center"><div class="p-3 bg-sky-50 rounded-lg text-sky-500 inline-flex mb-3">'+icons.calendar+'</div><h3 class="text-gray-700 font-medium mb-1">Нет поставщиков</h3><p class="text-gray-400 text-sm mb-4">Создайте поставщика для настройки графика</p><button onclick="addSupplier()" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700">'+icons.plus+' Добавить поставщика</button></div>';
            }
            if (!selectedSupplier || !deliverySchedule[selectedSupplier]) selectedSupplier = names[0];

            var cur = selectedSupplier;
            var data = deliverySchedule[cur] || {};

            // Фильтр поставщиков
            var filtered = names.filter(function(n){return !supplierSearch || n.toLowerCase().indexOf(supplierSearch.toLowerCase())>=0;});
            var sidebar = filtered.map(function(name) {
                var active = name===cur;
                var transit = inTransitOrders.filter(function(o){return o.supplier===name&&o.status==='in_transit';}).length;
                var pc = supplierProducts[name] ? Object.keys(supplierProducts[name]).length : 0;
                return '<button onclick="selectedSupplier=\''+esc(name)+'\';supplierSearch=\'\';render()" class="w-full text-left px-3 py-1.5 text-xs font-medium rounded-lg transition-colors cursor-pointer '+(active?'bg-amber-600 text-white shadow-sm':'text-gray-600 hover:bg-gray-100 border border-gray-200')+'">'+esc(name)+(transit>0?' <span class="bg-blue-500 text-white text-[9px] px-1 rounded-full">'+transit+'</span>':'')+(pc>0?' <span class="bg-emerald-500 text-white text-[9px] px-1 rounded-full">'+pc+'</span>':'')+'</button>';
            }).join('');

            // Таблица
            var totals = [0,0,0,0,0,0,0], totalActive = 0;
            var today = new Date(); today.setHours(0,0,0,0);
            var dow = today.getDay();
            var todayIdx = dow===0?6:dow-1;

            var storeRows = stores.map(function(s) {
                var days = data[s.tt] || [false,false,false,false,false,false,false];
                var cells = days.map(function(on, di) {
                    if(on){totals[di]++;totalActive++;}
                    var isWe = di>=5;
                    var isToday = di===todayIdx && on;
                    var cbId = 'cb_'+CSS.escape(cur)+'_'+CSS.escape(s.tt)+'_'+di;
                    var cls = 'w-5 h-5 rounded flex items-center justify-center transition-colors cursor-pointer '+(on?'bg-emerald-500 text-white border-0':'bg-white border-2 border-gray-300')+(isToday?' ring-2 ring-amber-400 ring-offset-1':'');
                    var inner = on?'<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':'';
                    return '<td class="px-0.5 py-0.5 '+(isWe?'bg-red-50':'')+'"><div class="flex justify-center"><button id="'+cbId+'" class="'+cls+'" onclick="toggleDeliveryDay(\''+esc(cur)+'\',\''+esc(s.tt)+'\','+di+')">'+inner+'</button></div></td>';
                }).join('');
                var cnt = days.filter(Boolean).length;
                return '<tr class="hover:bg-gray-50"><td class="text-left px-2 py-1 font-medium text-gray-700 text-xs whitespace-nowrap max-w-[200px] truncate" title="'+esc(s.tt)+'">'+esc(s.tt)+'</td>'+cells+'<td class="px-1.5 py-1 text-xs font-medium" id="tot_'+CSS.escape(cur)+'_'+CSS.escape(s.tt)+'" style="color:'+(cnt>0?'#374151':'#9ca3af')+'">'+(cnt>0?cnt+' дн.':'—')+'</td></tr>';
            }).join('');

            var totalCells = DAY_NAMES.map(function(d,i){var isWe=i>=5;return '<td class="px-0.5 py-1 text-xs font-bold '+(isWe?'bg-red-100 text-red-700':'bg-gray-100 text-gray-700')+'">'+(totals[i]>0?totals[i]:'')+'</td>';}).join('');

            // Товары
            var sp = supplierProducts[cur] || {};
            var spCodes = Object.keys(sp);
            var prodRows = spCodes.map(function(code) {
                var p = sp[code]||{};
                var found = p.nomenclature && p.nomenclature.length>0;
                return '<tr class="'+(found?'':'bg-amber-50')+' hover:bg-gray-100"><td class="text-left px-3 py-1 font-mono text-xs font-medium">'+esc(code)+'</td><td class="text-left px-3 py-1 text-xs '+(found?'text-gray-700':'text-gray-400 italic')+'">'+esc(found?p.nomenclature:'не найден в ассортименте')+'</td><td class="text-left px-3 py-1 text-xs text-gray-500">'+esc(p.group||'')+'</td><td class="text-center px-2 py-1"><button onclick="removeProduct(\''+esc(code)+'\')" class="text-red-400 hover:text-red-600 text-xs" title="Удалить">'+icons.trash+'</button></td></tr>';
            }).join('');

            var prodHTML = '<div class="bg-white rounded-lg border border-gray-200 overflow-hidden">' +
                '<div class="flex items-center justify-between px-3 py-2 bg-emerald-50 border-b border-emerald-200">' +
                    '<div class="flex items-center gap-2"><span class="text-sm font-semibold text-emerald-800">'+icons.package+' Товары поставщика</span><span class="text-xs text-gray-400">'+spCodes.length+' поз.</span></div>' +
                    '<div class="flex gap-1.5">'+(spCodes.length>0?'<button onclick="exportProducts()" class="btn px-2 py-1 text-[10px] text-blue-600 bg-blue-50 border border-blue-200 rounded hover:bg-blue-100" title="Экспорт">'+icons.export+'</button><button onclick="clearProducts()" class="btn px-2 py-1 text-[10px] text-red-600 bg-red-50 border border-red-200 rounded hover:bg-red-100" title="Очистить">'+icons.trash+'</button>':'')+'</div>' +
                '</div>' +
                '<div class="px-3 py-2 border-b border-gray-100"><div class="flex gap-2 items-center">' +
                    '<input id="addCodeInput" type="text" placeholder="Код товара + Enter" class="input flex-1 font-mono" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addProductManual()}">' +
                    '<button onclick="addProductManual()" class="btn px-3 py-1.5 text-xs font-medium text-white bg-emerald-600 rounded-lg hover:bg-emerald-700">'+icons.plus+' Добавить</button>' +
                    '<button onclick="showPasteModal()" class="btn px-3 py-1.5 text-xs font-medium text-amber-700 bg-amber-50 border border-amber-200 rounded-lg hover:bg-amber-100">'+icons.clipboard+' Вставить коды</button>' +
                '</div><p class="text-[10px] text-gray-400 mt-1">Наименование и группа подтягиваются из загруженного ассортимента автоматически</p></div>' +
                (spCodes.length>0?'<div class="table-container" style="max-height:250px"><table class="table-modern"><thead><tr><th class="text-left" style="min-width:80px">Код</th><th class="text-left" style="min-width:200px">Наименование</th><th class="text-left" style="min-width:100px">Группа</th><th style="width:40px"></th></tr></thead><tbody>'+prodRows+'</tbody></table></div>':'<div class="px-3 py-4 text-center text-gray-300 text-xs">Добавьте коды товаров</div>') +
            '</div>';

            return '<div class="space-y-3">' +
                '<div class="bg-white rounded-lg border border-gray-200 p-3"><div class="flex justify-between items-center flex-wrap gap-3"><div class="flex gap-3 items-center"><span class="text-sm font-semibold text-gray-700">'+icons.calendar+' График доставок</span><span class="text-xs text-gray-400">'+names.length+' пост. • '+stores.length+' ТТ</span></div><div class="flex gap-2"><button onclick="importSuppliers()" class="btn px-3 py-1.5 text-xs font-medium text-violet-700 bg-violet-50 border border-violet-200 rounded-lg hover:bg-violet-100">'+icons.download+' Подтянуть</button><button onclick="addSupplier()" class="btn px-3 py-1.5 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700">'+icons.plus+' Добавить</button></div></div></div>' +
                '<div class="flex gap-3"><div class="w-44 flex-shrink-0 space-y-1"><div class="text-[10px] font-semibold text-gray-400 uppercase px-1 mb-1.5">Поставщики</div><input type="text" placeholder="Поиск..." value="'+esc(supplierSearch)+'" oninput="supplierSearch=this.value;render()" class="input w-full mb-1">'+sidebar+'</div>' +
                '<div class="flex-1 min-w-0 space-y-3">' +
                    '<div class="bg-white rounded-lg border border-gray-200 overflow-hidden"><div class="flex items-center justify-between px-3 py-2"><h3 class="text-sm font-semibold text-gray-800 cursor-pointer hover:text-amber-600" onclick="renameSupplier(\''+esc(cur)+'\')" title="Переименовать">'+icons.truck+' '+esc(cur)+'</h3><button onclick="deleteSupplier(\''+esc(cur)+'\')" class="btn px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100">'+icons.trash+' Удалить</button></div>' +
                    '<div class="overflow-x-auto"><table class="w-full border-collapse text-center"><thead><tr class="bg-gray-50"><th class="text-left px-2 py-1 text-[10px] font-semibold text-gray-500 border-b sticky left-0 bg-gray-50 z-10">Магазин</th>'+DAY_NAMES.map(function(d,i){return '<th class="px-0.5 py-1 text-[10px] font-semibold border-b w-8 '+(i>=5?'text-red-500 bg-red-50':'text-gray-500')+'">'+d+'</th>';}).join('')+'<th class="px-1.5 py-1 text-[10px] font-semibold text-gray-400 border-b">Итого</th></tr></thead><tbody>'+storeRows+'<tr class="bg-gray-50 font-bold"><td class="text-left px-2 py-1 text-xs font-bold text-gray-800 sticky left-0 bg-gray-50 z-10">Итого</td>'+totalCells+'<td class="px-1.5 py-1 text-xs font-bold text-gray-800 bg-gray-100">'+(totalActive>0?totalActive+' дн.':'—')+'</td></tr></tbody></table></div></div>' +
                    prodHTML +
                '</div></div></div>';
        }

        // === В ПУТИ ===
        function renderIntransit() {
            var all = inTransitOrders||[];
            var inT = all.filter(function(o){return o.status==='in_transit';});
            var del = all.filter(function(o){return o.status==='delivered';});
            var filtered = inT;
            if(searchTransit){var s=searchTransit.toLowerCase();filtered=filtered.filter(function(o){return (o.supplier||'').toLowerCase().indexOf(s)>=0||(o.orderName||'').toLowerCase().indexOf(s)>=0;});}
            if(filterTransitStatus==='overdue')filtered=filtered.filter(function(o){return o.expectedDate&&new Date(o.expectedDate)<new Date();});
            else if(filterTransitStatus==='today')filtered=filtered.filter(function(o){if(!o.expectedDate)return false;var e=new Date(o.expectedDate);e.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);return e.getTime()===t.getTime();});

            var totalItems=inT.reduce(function(s,o){return s+(o.items||[]).reduce(function(s2,i){return s2+(i.qty||0);},0);},0);
            var totalSum=inT.reduce(function(s,o){return s+(o.items||[]).reduce(function(s2,i){return s2+(i.sum||0);},0);},0);
            var nextStr='—',minD=Infinity;
            inT.forEach(function(o){if(o.expectedDate){var e=new Date(o.expectedDate);e.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);var d=Math.ceil((e-t)/86400000);if(d>=0&&d<minD){minD=d;nextStr=o.expectedDate+(d===0?' (сегодня)':d===1?' (завтра)':' (через '+d+' дн.)');}}});

            var ordersHTML = filtered.length===0&&del.length===0
                ? '<div class="text-center py-12"><div class="p-3 bg-gray-100 rounded-lg text-gray-400 inline-flex mb-3">'+icons.truck+'</div><p class="text-gray-500 text-sm">Нет заказов в пути</p></div>'
                : filtered.map(function(o){
                    var its=(o.items||[]).reduce(function(s,i){return s+(i.qty||0);},0);
                    var ism=(o.items||[]).reduce(function(s,i){return s+(i.sum||0);},0);
                    var dr='';
                    if(o.expectedDate){var e=new Date(o.expectedDate);e.setHours(0,0,0,0);var t=new Date();t.setHours(0,0,0,0);var d=Math.ceil((e-t)/86400000);if(d<0)dr='<span class="text-red-600 font-medium">Просрочено '+Math.abs(d)+' дн.</span>';else if(d===0)dr='<span class="text-amber-600 font-medium">Сегодня</span>';else dr='<span class="text-sky-600">через '+d+' дн.</span>';}
                    var cl=collapsedInTransit[o.id];
                    return '<div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden"><div class="flex items-center justify-between px-4 py-3 bg-blue-50 border-b border-blue-100 cursor-pointer" onclick="collapsedInTransit['+o.id+']=!collapsedInTransit['+o.id+'];render()"><div class="flex items-center gap-3"><span class="bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">В пути</span><div><div class="text-sm font-semibold text-gray-800">'+esc(o.orderName||'')+'</div><div class="text-[10px] text-gray-500">'+esc(o.supplier||'—')+' • '+esc(o.createdAt||'')+(o.expectedDate?' • '+o.expectedDate:'')+' '+dr+'</div></div></div><div class="flex items-center gap-2"><span class="text-xs text-gray-500">'+its+' поз. • '+ism.toFixed(0)+' ₽</span><span class="text-gray-400">'+(cl?'▶':'▼')+'</span>'+(o.expectedDate?'<button onclick="event.stopPropagation();editExpectedDate('+o.id+')" class="btn px-2 py-1 text-[10px] text-gray-500 bg-white border border-gray-200 rounded hover:bg-gray-50">📅</button>':'')+'<button onclick="event.stopPropagation();markDelivered('+o.id+')" class="btn px-3 py-1.5 text-xs font-medium text-emerald-700 bg-emerald-50 rounded-lg hover:bg-emerald-100">'+icons.check+' Доставлено</button><button onclick="event.stopPropagation();deleteTransitOrder('+o.id+')" class="btn px-2 py-1.5 text-xs font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100">'+icons.trash+'</button></div></div>'+(cl?'':'<div class="overflow-x-auto"><table class="w-full border-collapse text-xs"><thead><tr class="bg-gray-50"><th class="text-left px-3 py-1.5 text-gray-500 border-b">Код</th><th class="text-left px-3 py-1.5 text-gray-500 border-b">Наименование</th><th class="text-center px-3 py-1.5 text-gray-500 border-b">Кол-во</th><th class="text-center px-3 py-1.5 text-gray-500 border-b">Сумма</th></tr></thead><tbody>'+(o.items||[]).map(function(i){return '<tr class="hover:bg-gray-50"><td class="text-left px-3 py-1 font-mono text-gray-600">'+(i.code||'')+'</td><td class="text-left px-3 py-1 text-gray-700">'+esc(i.name||'')+'</td><td class="text-center px-3 py-1 font-medium">'+(i.qty||0)+'</td><td class="text-center px-3 py-1 text-gray-600">'+(i.sum||0).toFixed(2)+' ₽</td></tr>';}).join('')+'</tbody></table></div>')+'</div>';
                }).join('')+(del.length>0?'<div class="mt-3"><div class="text-xs font-medium text-gray-500 mb-2 px-1">Доставленные ('+del.length+')</div>'+del.map(function(o){var its=(o.items||[]).reduce(function(s,i){return s+(i.qty||0);},0);var ism=(o.items||[]).reduce(function(s,i){return s+(i.sum||0);},0);var cl=collapsedInTransit[o.id];return '<div class="bg-white rounded-lg border border-gray-200 mb-2 opacity-60 hover:opacity-80"><div class="flex items-center justify-between px-4 py-2 bg-green-50 border-b border-green-100 cursor-pointer" onclick="collapsedInTransit['+o.id+']=!collapsedInTransit['+o.id+'];render()"><div class="flex items-center gap-2"><span class="bg-green-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">✓ Доставлено</span><div class="text-xs text-gray-600">'+esc(o.orderName||o.supplier||'')+' • '+its+' поз. • '+ism.toFixed(0)+' ₽</div></div><div class="flex items-center gap-2"><span class="text-[10px] text-gray-400">'+esc(o.createdAt||'')+'</span><span class="text-gray-400 text-xs">'+(cl?'▶':'▼')+'</span><button onclick="event.stopPropagation();deleteTransitOrder('+o.id+')" class="btn inline-flex items-center justify-center w-7 h-7 text-xs text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg">'+icons.trash+'</button></div></div>'+(cl?'':'<div class="overflow-x-auto"><table class="w-full border-collapse text-xs"><thead><tr class="bg-gray-50"><th class="text-left px-3 py-1 text-gray-500 border-b">Код</th><th class="text-left px-3 py-1 text-gray-500 border-b">Наим.</th><th class="text-center px-3 py-1 text-gray-500 border-b">Кол-во</th><th class="text-center px-3 py-1 text-gray-500 border-b">Сумма</th></tr></thead><tbody>'+(o.items||[]).map(function(i){return '<tr class="hover:bg-gray-50"><td class="text-left px-3 py-1 font-mono text-gray-600">'+(i.code||'')+'</td><td class="text-left px-3 py-1 text-gray-700">'+esc(i.name||'')+'</td><td class="text-center px-3 py-1 font-medium">'+(i.qty||0)+'</td><td class="text-center px-3 py-1 text-gray-600">'+(i.sum||0).toFixed(2)+' ₽</td></tr>';}).join('')+'</tbody></table></div>')+'</div>';}).join('')+'</div>':'');

            return '<div class="space-y-3"><div class="bg-white rounded-lg border border-gray-200 p-3"><div class="flex justify-between items-center flex-wrap gap-3"><div class="flex gap-3 items-center flex-wrap"><div class="bg-blue-100 text-blue-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">В ПУТИ</div><div class="text-lg font-bold">'+inT.length+'</div></div><div class="bg-sky-100 text-sky-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">ПОЗИЦИЙ</div><div class="text-lg font-bold">'+totalItems+'</div></div><div class="bg-violet-100 text-violet-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">СУММА</div><div class="text-lg font-bold">'+totalSum.toFixed(0)+' ₽</div></div><div class="bg-amber-100 text-amber-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">БЛИЖ. ДОСТАВКА</div><div class="text-sm font-bold">'+nextStr+'</div></div></div><div class="flex gap-2">'+(del.length>0?'<button onclick="clearDelivered()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-orange-500 rounded-lg hover:bg-orange-600">'+icons.trash+' Очистить ('+del.length+')</button>':'')+(inT.length>0?'<button onclick="exportTransit()" class="btn px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">'+icons.export+' Экспорт</button>':'')+'</div></div></div><div class="bg-white rounded-lg border border-gray-200 p-3"><div class="flex flex-wrap gap-2 items-center"><input type="text" placeholder="Поиск..." value="'+esc(searchTransit)+'" oninput="searchTransit=this.value;render()" class="input w-48"><select onchange="filterTransitStatus=this.value;render()" class="input bg-white"><option value="">Все</option><option value="overdue" '+(filterTransitStatus==='overdue'?'selected':'')+'>Просроченные</option><option value="today" '+(filterTransitStatus==='today'?'selected':'')+'>Сегодня</option></select></div></div><div class="space-y-2">'+ordersHTML+'</div></div>';
        }

        init();
    </script>
</body>
</html>
