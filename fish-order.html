        const normCode = (code) => String(code || '').trim().replace(/^0+/, '') || '0';

        // Умное округление: убирает мусорные знаки после запятой (1.000000004 → 1, 0.5 → 0.5, 0.23 → 0.23)
        const smartRound = (val) => {
            if (val === 0 || val === undefined || val === null) return 0;
            const n = parseFloat(val);
            if (isNaN(n)) return 0;
            if (n === Math.round(n)) return Math.round(n); // целое число
            // Округляем до 2 знаков и убираем trailing zeros
            const rounded = Math.round(n * 100) / 100;
            return rounded;

            if (!record) {
                alert('Ассортимент не найден');
                return;
            }

            const count = Object.keys(matrix).length;
            if (count > 0) {
                if (!confirm(`Загрузить "${name}" (${record.count} товаров)?\nТекущий ассортимент будет заменен.\nОтметки матрицы (ДА/НЕТ) останутся.`)) {
                    return;
                }
            }

            matrix = {};
            record.data.forEach(p => {
                if (p.code) {
                    matrix[normCode(p.code)] = {
                        code: p.code,
                        nomenclature: p.nomenclature || p.name || '',
                        group: p.group || '',
                        packaging: p.packaging || 'ШТ',
                        supplier: p.supplier || '',

                        quant: p.quant || 1,
                        volume: p.volume || 0,

            syncFishAssortment();

        }

        function loadSavedMatrixByName(name) {
            resetSavedOrders();
            const saved = getSavedMatrices();
            const record = saved.find(s => s.name === name);

            if (!record) {
                alert('Матрица не найден');
                return;
            }

            const md = record.matrixData || {};
            let merged = 0;
            let added = 0;
            Object.entries(md).forEach(([code, item]) => {
                if (!code) return;
                const nc = normCode(code);

                const marks = {};
                Object.entries(item).forEach(([k, v]) => {
                    if (!CATALOG_FIELDS.includes(k) && k !== 'inMatrix' && (v === 'ДА' || v === 'НЕТ')) {
                        marks[k] = v;
                    }
                });

                if (Object.keys(marks).length > 0) {
                    if (!matrixMarks[nc]) matrixMarks[nc] = {};
                    Object.assign(matrixMarks[nc], marks);
                }

                if (!matrix[nc]) {
                    matrix[nc] = {
                        code: item.code || code,
                        nomenclature: item.nomenclature || '',
                        group: item.group || '',
                        packaging: 'ШТ',
                        inPrice: 0,
                        quant: 1,
                        markup: defaultMarkup
                    };
                    added++;
                } else {
                    merged++;
                }
            });

            syncFishAssortment();
            save(KEYS.MATRIX_MARKS, matrixMarks);

            const modal = document.getElementById('matrixSelectModal');
            if (modal) modal.remove();

            render();

            const supplierKeys = Object.keys(deliverySchedule);
            selectedScheduleSupplier = supplierKeys.length > 0 ? supplierKeys[0] : '';
            inTransitOrders = load(KEYS.INTRANSIT, []);
            supplierAssortment = load(KEYS.SUPPLIER_ASSORTMENT, {});
            supplierPrices = load(KEYS.SUPPLIER_PRICES, {});
            storeSupplierPrefs = load(KEYS.STORE_SUPPLIER_PREFS, {});
            stockConsumptionData = load(KEYS.STOCK_CONSUMPTION, {});
            storeWishes = load(KEYS.STORE_WISHES, []);
            // Загрузка сохранённого заказа (автоудаление после 14 дней)
            var saved = load(KEYS.SAVED_ORDER, null);
            if (saved && saved.createdAt && (Date.now() - new Date(saved.createdAt).getTime()) < 14 * 86400000) {
                savedOrderResults = saved.items;
                savedOrderStats = saved.stats;
                orderEdits = saved.orderEdits || {};
                savedOrderDate = saved.date;
            } else {
                // Протух — удаляем
                if (saved) SharedUtils.save(KEYS.SAVED_ORDER, null);
                savedOrderResults = null;
            }
            autoCloseDeliveredOrders();

            // Загрузка с миграцией: старый формат (всё в matrix) → новый (matrix + matrixMarks)
            const savedAssort = load(KEYS.ASSORTMENT, null);
            const savedMarks = load(KEYS.MATRIX_MARKS, null);

            if (savedAssort !== null && savedMarks !== null) {
                // Новый формат
                matrix = savedAssort;
                matrixMarks = savedMarks;
            } else {
                // Старый формат — мигрируем
                const oldData = load('univ_matrix_v8', {});
                if (Object.keys(oldData).length > 0) {
                    console.log('Миграция: разделение matrix на assortment + matrixMarks...');
                    matrix = {};
                    matrixMarks = {};
                    Object.entries(oldData).forEach(([code, item]) => {
                        const catalog = {};
                        CATALOG_FIELDS.forEach(f => {
                            if (item[f] !== undefined && item[f] !== null) catalog[f] = item[f];
                        });
                        if (Object.keys(catalog).length > 0) matrix[code] = catalog;

                        const marks = {};
                        Object.entries(item).forEach(([k, v]) => {
                            if (!CATALOG_FIELDS.includes(k) && (v === 'ДА' || v === 'НЕТ')) {
                                marks[k] = v;
                            }
                        });
                        if (Object.keys(marks).length > 0) matrixMarks[code] = marks;
                    });
                    syncFishAssortment();
                    save(KEYS.MATRIX_MARKS, matrixMarks);
                    console.log(`Миграция: ${Object.keys(matrix).length} каталог, ${Object.keys(matrixMarks).length} marks`);
                }
            }

            // Автозаполнение supplierPrices из inPrice при загрузке
            ensureSupplierAssortment();
            save(KEYS.SUPPLIER_PRICES, supplierPrices);
            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);

            window.addEventListener('storage', (e) => {
                if (e.key === KEYS.STORES) loadStoresFromHTML();
            });

            // SharedData: только ВЫГРУЗКА данных из fish-order (не подтягиваем чужие товары!)
            // Раньше SharedData onChange сливал продукты из universal.html в fish-order,
            // что загрязняло ассортимент рыбы данными из других калькуляторов и вызывало ошибки.
            if (window.SharedData) {
                try {
                    const arr = Object.values(matrix).filter(p => p && p.code);
                    if (arr.length > 0) SharedData.saveProducts(arr, 'fish-order');
                } catch(e) { console.warn('SharedData sync error:', e); }
                // НЕ подписываемся на onChange — fish-order управляет своим ассортиментом
                // самостоятельно через загрузку файлов и сохранённые ассортимент/матрицы.
            }

            render();
        }

        function loadStoresFromHTML() {
            try {
                const data = load(KEYS.STORES, []);
                if (Array.isArray(data) && data.length > 0) {
                    stores = data;
                    console.log(`[FishOrder] Загружено ${stores.length} магазинов`);
                    return;
                }
            } catch (e) { console.error('Load stores error:', e); }
            stores = [];
        }

        // === SharedData sync helper ===
        function syncFishAssortment() {
            save(KEYS.ASSORTMENT, matrix);
            if (window.SharedData) {
                try {
                    const arr = Object.values(matrix).filter(p => p && p.code);
                    if (arr.length > 0) SharedData.saveProducts(arr, 'fish-order');
                } catch(e) {}
            }
        }

        function render() {
            try {
                const content = document.getElementById('content');
                const scrollTop = content.scrollTop;
                const tableContainer = document.querySelector('.table-container');
                const tableScrollTop = tableContainer ? tableContainer.scrollTop : 0;

                renderTabs();
                renderContent();
                updateStats();

                content.scrollTop = scrollTop;
                const newTableContainer = document.querySelector('.table-container');
                if (newTableContainer && tableScrollTop > 0) {
                    newTableContainer.scrollTop = tableScrollTop;
                }
            } catch(e) {
                console.error('Render error:', e);
                document.getElementById('content').innerHTML = '<div class="bg-red-50 border border-red-300 rounded-lg p-6 text-center"><p class="text-red-700 font-semibold text-lg">Ошибка отображения</p><p class="text-red-500 text-sm mt-2">' + esc(e.message) + '</p><button onclick="render()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Повторить</button></div>';
            }
        }

        function updateStats() {
            document.getElementById('statsProducts').textContent = Object.keys(matrix).length + ' тов.';
            document.getElementById('statsStores').textContent = stores.length + ' ТТ';
        }

        function renderTabs() {
            const tabs = [
                { id: 'upload', label: 'Загрузка', icon: icons.upload },
                { id: 'assortment', label: 'Ассортимент', icon: icons.list },
                { id: 'prices', label: 'Цена', icon: icons.dollar },
                { id: 'matrix', label: 'Матрица', icon: icons.grid },
                { id: 'suppliers', label: 'Поставщики', icon: icons.suppliers },
                { id: 'order', label: 'Заказ', icon: icons.order },
                { id: 'intransit', label: 'В пути', icon: icons.truck }
            ];
            document.getElementById('tabs').innerHTML = tabs.map(t => `
                <button onclick="tab='${t.id}';render()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${tab === t.id ? 'bg-sky-600 text-white shadow-sm' : 'text-gray-600 hover:bg-white hover:text-gray-900'}">
                    ${t.icon}<span>${t.label}</span>
                </button>

        }

        function renderContent() {
            const el = document.getElementById('content');
            try {
                switch(tab) {
                    case 'upload': el.innerHTML = renderUpload(); break;
                    case 'assortment': el.innerHTML = renderAssortment(); break;
                    case 'prices': el.innerHTML = renderPrices(); break;
                    case 'matrix': el.innerHTML = renderMatrix(); break;
                    case 'suppliers': el.innerHTML = renderSuppliers(); break;
                    case 'order': el.innerHTML = renderOrder(); break;
                    case 'intransit': el.innerHTML = renderIntransit(); break;
                }
            } catch(e) {
                console.error('Render content error:', e);
                el.innerHTML = '<div class="bg-red-50 border border-red-300 rounded-lg p-6 text-center"><p class="text-red-700 font-semibold text-lg">Ошибка отображения</p><p class="text-red-500 text-sm mt-2">' + esc(e.message) + '</p><button onclick="render()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Повторить</button></div>';
            }
        }

        // === ГРАФИК ДОСТАВОК (Schedule Tab) ===
        const DAY_NAMES = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

        function saveSchedule() {
            save(KEYS.SCHEDULE, deliverySchedule);
            // Green flash indicator
            const indicator = document.getElementById('scheduleSaveIndicator');
            if (indicator) {
                indicator.textContent = '✓ Сохранено';
                indicator.className = 'text-xs text-emerald-600 font-medium transition-opacity';
                indicator.style.opacity = '1';
                setTimeout(() => { indicator.style.opacity = '0.4'; }, 1500);
            }
        }

        function ensureScheduleStores() {
            // Add any missing stores to all suppliers
            if (!stores || stores.length === 0) return;
            const emptyWeek = [false, false, false, false, false, false, false];
            Object.keys(deliverySchedule).forEach(supplier => {
                if (!deliverySchedule[supplier]) deliverySchedule[supplier] = {};
                stores.forEach(s => {
                    if (!deliverySchedule[supplier][s.tt]) {
                        deliverySchedule[supplier][s.tt] = [...emptyWeek];
                    }
                });
            });
        }

        function addSupplier() {
            const name = prompt('Введите название поставщика:');
            if (!name) return;
            if (deliverySchedule[name]) { alert('Поставщик уже существует'); return; }
            deliverySchedule[name] = {};
            stores.forEach(s => {
                deliverySchedule[name][s.tt] = [false, false, false, false, false, false, false];
            });
            selectedScheduleSupplier = name;
            saveSchedule();
            render();
        }

        function deleteSupplier(name) {
            if (!confirm(`Удалить поставщика "${name}"?`)) return;
            delete deliverySchedule[name];
            const remaining = Object.keys(deliverySchedule);
            selectedScheduleSupplier = remaining.length > 0 ? remaining[0] : '';
            saveSchedule();
            render();
        }

        function renameSupplier(oldName) {
            const newName = prompt('Новое название поставщика:', oldName);
            if (!newName || newName === oldName) return;
            if (deliverySchedule[newName]) { alert('Поставщик с таким названием уже существует'); return; }
            deliverySchedule[newName] = deliverySchedule[oldName];
            delete deliverySchedule[oldName];
            selectedScheduleSupplier = newName;
            saveSchedule();
            render();
        }

        function toggleDeliveryDay(supplier, store, dayIndex) {
            if (!deliverySchedule[supplier]) deliverySchedule[supplier] = {};
            if (!deliverySchedule[supplier][store]) deliverySchedule[supplier][store] = [false,false,false,false,false,false,false];
            deliverySchedule[supplier][store][dayIndex] = !deliverySchedule[supplier][store][dayIndex];
            saveSchedule();
            // Update just this checkbox without full re-render to avoid losing focus
            const cb = document.getElementById(`sched_${CSS.escape(supplier)}_${CSS.escape(store)}_${dayIndex}`);
            if (cb) {
                const isChecked = deliverySchedule[supplier][store][dayIndex];
                cb.className = isChecked
                    ? 'w-7 h-7 rounded bg-emerald-500 text-white border-0 cursor-pointer flex items-center justify-center transition-colors'
                    : 'w-7 h-7 rounded bg-white border-2 border-gray-300 cursor-pointer flex items-center justify-center transition-colors';
                cb.innerHTML = isChecked
                    ? '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
                    : '';
            }
            // Update Итого cell
            const totalEl = document.getElementById(`total_${CSS.escape(supplier)}_${CSS.escape(store)}`);
            if (totalEl) {
                const activeCount = deliverySchedule[supplier][store].filter(Boolean).length;
                totalEl.textContent = activeCount > 0 ? activeCount + ' дн.' : '—';
                totalEl.style.color = activeCount > 0 ? '#374151' : '#9ca3af';
            }
        }

        function renderScheduleCards() {
            const supplierNames = Object.keys(deliverySchedule);
            if (supplierNames.length === 0) return '';

            // Если выбранный поставщик не найден — берём первого
            if (!selectedScheduleSupplier || !deliverySchedule[selectedScheduleSupplier]) {
                selectedScheduleSupplier = supplierNames[0];
            }

            const current = selectedScheduleSupplier;
            const supplierData = deliverySchedule[current] || {};

            // Боковая панель с переключением поставщиков
            const sidebar = supplierNames.map(name => {
                const isActive = name === current;
                return `<button onclick="selectedScheduleSupplier='${esc(name)}';render()" class="w-full text-left px-3 py-1.5 text-xs font-medium rounded-lg transition-colors cursor-pointer ${isActive ? 'bg-sky-600 text-white shadow-sm' : 'text-gray-600 hover:bg-gray-100 border border-gray-200'}" title="${esc(name)}">${esc(name)}</button>`;
            }).join('');

            // Подсчитаем Итого по дням (сколько магазинов имеют доставку в каждый день)
            const totalsByDay = [0, 0, 0, 0, 0, 0, 0];
            let totalActiveCells = 0;

            // Таблица доставки для выбранного поставщика
            const storeRows = stores.map(s => {
                const days = supplierData[s.tt] || [false,false,false,false,false,false,false];
                const cells = days.map((checked, di) => {
                    if (checked) {
                        totalsByDay[di]++;
                        totalActiveCells++;
                    }
                    const isWeekend = di >= 5;
                    const cbId = `sched_${CSS.escape(current)}_${CSS.escape(s.tt)}_${di}`;
                    const cbClass = checked
                        ? 'w-5 h-5 rounded bg-emerald-500 text-white border-0 cursor-pointer flex items-center justify-center transition-colors'
                        : 'w-5 h-5 rounded bg-white border-2 border-gray-300 cursor-pointer flex items-center justify-center transition-colors';
                    const inner = checked
                        ? '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
                        : '';
                    return `<td class="px-0.5 py-0.5 ${isWeekend ? 'bg-red-50' : ''}"><div class="flex justify-center"><button id="${cbId}" class="${cbClass}" onclick="toggleDeliveryDay('${esc(current)}','${esc(s.tt)}',${di})">${inner}</button></div></td>`;
                }).join('');
                const activeCount = days.filter(Boolean).length;
                return `<tr class="hover:bg-gray-50">
                    <td class="text-left px-2 py-1 font-medium text-gray-700 text-xs whitespace-nowrap max-w-[200px] truncate" title="${esc(s.tt)}">${esc(s.tt)}</td>
                    ${cells}
                    <td class="px-1.5 py-1 text-xs font-medium" id="total_${CSS.escape(current)}_${CSS.escape(s.tt)}" style="color:${activeCount > 0 ? '#374151' : '#9ca3af'}">${activeCount > 0 ? activeCount + ' дн.' : '—'}</td>
                </tr>`;
            }).join('');

            // Строка Итого
            const totalCells = DAY_NAMES.map((d, i) => {
                const isWeekend = i >= 5;
                const cnt = totalsByDay[i];
                return `<td class="px-0.5 py-1 text-xs font-bold ${isWeekend ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700'}">${cnt > 0 ? cnt : ''}</td>`;
            }).join('');
            const totalRow = `<tr class="bg-gray-50 font-bold">
                <td class="text-left px-2 py-1 text-xs font-bold text-gray-800 sticky left-0 bg-gray-50 z-10">Итого</td>
                ${totalCells}
                <td class="px-1.5 py-1 text-xs font-bold text-gray-800 bg-gray-100">${totalActiveCells > 0 ? totalActiveCells + ' дн.' : '—'}</td>
            </tr>`;

            return `
                <div class="flex gap-3">
                    <div class="w-40 flex-shrink-0 space-y-1">
                        <div class="text-[10px] font-semibold text-gray-400 uppercase px-1 mb-1.5">Поставщики</div>
                        ${sidebar}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <h3 class="text-sm font-semibold text-gray-800 cursor-pointer hover:text-sky-600 transition-colors" onclick="renameSupplier('${esc(current)}')" title="Нажмите для переименования">${icons.truck} ${esc(current)}</h3>
                            </div>
                            <button onclick="deleteSupplier('${esc(current)}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors cursor-pointer">
                                ${icons.trash} Удалить
                            </button>
                        </div>
                        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full border-collapse text-center">
                                    <thead>
                                        <tr class="bg-gray-50">
                                            <th class="text-left px-2 py-1 text-[10px] font-semibold text-gray-500 border-b border-gray-200 sticky left-0 bg-gray-50 z-10">Магазин</th>
                                            ${DAY_NAMES.map((d, i) => `<th class="px-0.5 py-1 text-[10px] font-semibold border-b border-gray-200 w-8 ${i >= 5 ? 'text-red-500 bg-red-50' : 'text-gray-500'}">${d}</th>`).join('')}
                                            <th class="px-1.5 py-1 text-[10px] font-semibold text-gray-400 border-b border-gray-200">Итого</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${storeRows}
                                        ${totalRow}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderSchedule() {
            ensureScheduleStores();

            const supplierNames = Object.keys(deliverySchedule);
            const hasStores = stores && stores.length > 0;

            if (!hasStores) {
                return `
                    <div class="bg-white rounded-lg border border-gray-200 p-6">
                        <div class="text-center">
                            <div class="p-3 bg-amber-50 rounded-lg text-amber-500 inline-flex mb-3">${icons.calendar}</div>
                            <p class="text-gray-500 text-sm">Сначала добавьте магазины на главной странице</p>
                        </div>
                    </div>`;
            }

            if (supplierNames.length === 0) {
                return `
                    <div class="bg-white rounded-lg border border-gray-200 p-6">
                        <div class="text-center">
                            <div class="p-3 bg-sky-50 rounded-lg text-sky-500 inline-flex mb-3">${icons.calendar}</div>
                            <h3 class="text-gray-700 font-medium mb-1">График доставок</h3>
                            <p class="text-gray-400 text-sm mb-4">Настройте дни доставки по поставщикам и магазинам</p>
                            <button onclick="addSupplier()" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700 transition-colors cursor-pointer">
                                ${icons.plus} Добавить поставщика
                            </button>
                        </div>
                    </div>`;
            }

            return `
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-medium text-gray-700">График доставок</span>
                            <span class="text-xs text-gray-400">${supplierNames.length} поставщик(ов) • ${stores.length} магазин(ов)</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span id="scheduleSaveIndicator" class="text-xs text-gray-300 transition-opacity" style="opacity:0"></span>
                            <button onclick="addSupplier()" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700 transition-colors cursor-pointer">
                                ${icons.plus} Добавить поставщика
                            </button>
                        </div>
                    </div>
                    ${renderScheduleCards()}
                </div>`;
        }

        // === ПОСТАВЩИКИ (Suppliers Tab) ===
        function ensureSupplierAssortment() {
            // Добавить новые товары из matrix в supplierAssortment
            // Поставщики подтягиваются ТОЛЬКО если они УЖЕ есть в deliverySchedule (графике доставок рыбы)
            // Это предотвращает попадание поставщиков из Универсального расчёта
            const matrixCodes = Object.keys(matrix);
            const knownFishSuppliers = Object.keys(deliverySchedule);
            let newSuppliersAdded = false;

            matrixCodes.forEach(code => {
                if (!supplierAssortment[code]) {
                    supplierAssortment[code] = [];
                }
                // Подтягиваем поставщика из ассортимента ТОЛЬКО если это рыбный поставщик
                const supplier = (matrix[code] && matrix[code].supplier) || '';
                if (supplier && knownFishSuppliers.includes(supplier)) {
                    if (!supplierAssortment[code].includes(supplier)) {
                        supplierAssortment[code].push(supplier);
                    }
                    // Добавляем все магазины в график для поставщика
                    const emptyWeek = [false, false, false, false, false, false, false];
                    if (stores && stores.length > 0) {
                        stores.forEach(s => {
                            if (!deliverySchedule[supplier][s.tt]) {
                                deliverySchedule[supplier][s.tt] = [...emptyWeek];
                            }
                        });
                        newSuppliersAdded = true;
                    }
                    // Заполняем supplierPrices из inPrice ТОЛЬКО если цена для этого поставщика ещё НИКОГДА не устанавливалась
                    // Используем hasOwnProperty чтобы не перезаписывать явно заданные (или импортированные) цены,
                    // даже если они равны 0 — пользователь мог очистить цену вручную
                    const inPrice = matrix[code].inPrice || 0;
                    if (inPrice > 0) {
                        if (!supplierPrices[code]) supplierPrices[code] = {};
                        if (!supplierPrices[code].hasOwnProperty(supplier)) {
                            supplierPrices[code][supplier] = inPrice;
                        }
                    }
                }
            });

            // НЕ удаляем ручные назначения поставщиков!
            // Раньше здесь была очистка supplierAssortment от поставщиков, которых нет в deliverySchedule.
            // Это приводило к потере галочек при перезагрузке, если поставщик был добавлен вручную
            // или если deliverySchedule ещё не загружен полностью.
            // Теперь оставляем все сохранённые назначения как есть.

            if (newSuppliersAdded) {
                save(KEYS.SCHEDULE, deliverySchedule);
            }
            // Обновляем selectedScheduleSupplier если текущий не найден
            const existing = Object.keys(deliverySchedule);
            if (!selectedScheduleSupplier || !deliverySchedule[selectedScheduleSupplier]) {
                selectedScheduleSupplier = existing.length > 0 ? existing[0] : '';
            }
        }

        function toggleSupplierProduct(code, supplierName) {
            if (!supplierAssortment[code]) supplierAssortment[code] = [];
            const idx = supplierAssortment[code].indexOf(supplierName);
            if (idx >= 0) {
                supplierAssortment[code].splice(idx, 1);
            } else {
                supplierAssortment[code].push(supplierName);
            }
            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
            // Обновить галочку без полного рендера
            const cb = document.getElementById(`sa_${CSS.escape(code)}_${CSS.escape(supplierName)}`);
            if (cb) {
                const isChecked = supplierAssortment[code].includes(supplierName);
                cb.className = isChecked
                    ? 'w-6 h-6 rounded bg-emerald-500 text-white border-0 cursor-pointer flex items-center justify-center transition-colors'
                    : 'w-6 h-6 rounded bg-white border-2 border-gray-300 cursor-pointer flex items-center justify-center transition-colors';
                cb.innerHTML = isChecked
                    ? '<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
                    : '';
            }
        }

        function selectAllForSupplier(supplierName) {
            const supplierNames = Object.keys(deliverySchedule);
            if (supplierNames.length === 0) return;
            Object.keys(matrix).forEach(code => {
                if (!supplierAssortment[code]) supplierAssortment[code] = [];
                if (!supplierAssortment[code].includes(supplierName)) {
                    supplierAssortment[code].push(supplierName);
                }
            });
            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
            render();
        }

        function clearAllForSupplier(supplierName) {
            Object.keys(supplierAssortment).forEach(code => {
                const idx = supplierAssortment[code].indexOf(supplierName);
                if (idx >= 0) supplierAssortment[code].splice(idx, 1);
            });
            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
            render();
        }

        // === МАГАЗИНЫ → Поставщик (предпочтения) ===
        function openStoreSupplierModal(code, productName) {
            if (!storeSupplierPrefs[code]) storeSupplierPrefs[code] = {};
            const prefs = storeSupplierPrefs[code];
            const productSuppliers = supplierAssortment[code] || [];
            const supplierNames = Object.keys(deliverySchedule);

            if (productSuppliers.length === 0) {
                alert('Сначала привяжите товар к поставщикам (галочки)');
                return;
            }

            const modalId = 'storeSupplierModal';
            let overlay = document.getElementById(modalId);
            if (overlay) overlay.remove();

            const storeRows = stores.map(s => {
                const currentPref = prefs[s.tt] || '';
                const options = supplierNames.map(sup => {
                    if (!productSuppliers.includes(sup)) return '';
                    return `<option value="${esc(sup)}" ${currentPref === sup ? 'selected' : ''}>${esc(sup)}</option>`;
                }).join('');
                return `<tr class="hover:bg-gray-50">
                    <td class="py-1.5 px-2 text-sm font-medium text-gray-700">${esc(s.tt)}</td>
                    <td class="py-1.5 px-2">
                        <select class="w-full text-sm border border-gray-300 rounded px-2 py-1" id="ssp_${CSS.escape(code)}_${CSS.escape(s.tt)}">
                            <option value="">— авто —</option>
                            ${options}
                        </select>
                    </td>
                </tr>`;
            }).join('');

            const html = `<div id="${modalId}" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,0.4)" onclick="if(event.target===this)closeStoreSupplierModal()">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[80vh] flex flex-col" onclick="event.stopPropagation()">
                    <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
                        <div>
                            <div class="text-sm font-semibold text-gray-800">Предпочтения магазинов</div>
                            <div class="text-xs text-gray-500">${esc(code)} — ${esc(productName)}</div>
                        </div>

        function closeStoreSupplierModal() {
            const el = document.getElementById('storeSupplierModal');
            if (el) el.remove();
        }

        function saveStoreSupplierPrefs(code) {
            if (!storeSupplierPrefs[code]) storeSupplierPrefs[code] = {};
            const prefs = storeSupplierPrefs[code];
            const productSuppliers = supplierAssortment[code] || [];

            stores.forEach(s => {
                const sel = document.getElementById(`ssp_${CSS.escape(code)}_${CSS.escape(s.tt)}`);
                if (!sel) return;
                const val = sel.value.trim();
                if (val && productSuppliers.includes(val)) {
                    prefs[s.tt] = val;
                } else {
                    delete prefs[s.tt];
                }
            });

            // Удаляем пустой объект
            if (Object.keys(prefs).length === 0) {
                delete storeSupplierPrefs[code];
            }

            save(KEYS.STORE_SUPPLIER_PREFS, storeSupplierPrefs);
            closeStoreSupplierModal();
            render();
        }

        function clearStoreSupplierPrefs(code) {
            delete storeSupplierPrefs[code];
            save(KEYS.STORE_SUPPLIER_PREFS, storeSupplierPrefs);
            closeStoreSupplierModal();
            render();
        }

            // Find next delivery date

            inTransit.forEach(o => {

                    const exp = new Date(o.expectedDate);
                    exp.setHours(0,0,0,0);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const diff = Math.ceil((exp - today) / 86400000);
                    if (diff >= 0 && diff < minDays) {
                        minDays = diff;
                        nextDeliveryStr = o.expectedDate + (diff === 0 ? ' (сегодня)' : diff === 1 ? ' (завтра)' : ` (через ${diff} дн.)`);

        function markDelivered(orderId) {
            const order = inTransitOrders.find(o => o.id === orderId);
            if (!order) return;
            order.status = 'delivered';
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function deleteInTransitOrder(orderId) {
            if (!confirm('Удалить заказ?')) return;
            inTransitOrders = inTransitOrders.filter(o => o.id !== orderId);
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function deleteInTransitItem(orderId, itemIdx) {
            const order = inTransitOrders.find(o => o.id === orderId);
            if (!order || !order.items || !order.items[itemIdx]) return;
            const item = order.items[itemIdx];
            if (!confirm('Удалить позицию "' + (item.name || item.code || '') + '" (' + smartRound(item.qty) + ')?')) return;
            order.items.splice(itemIdx, 1);
            // Если все позиции удалены — удаляем заказ целиком
            if (order.items.length === 0) {
                inTransitOrders = inTransitOrders.filter(o => o.id !== orderId);
            } else {
                // Пересчитываем итоги заказа
                save(KEYS.INTRANSIT, inTransitOrders);
            }
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

        function clearDeliveredOrders() {
            const delivered = inTransitOrders.filter(o => o.status === 'delivered');
            if (delivered.length === 0) { alert('Нет доставленных заказов'); return; }
            if (!confirm(`Удалить ${delivered.length} доставленных заказов?`)) return;
            inTransitOrders = inTransitOrders.filter(o => o.status !== 'delivered');
            save(KEYS.INTRANSIT, inTransitOrders);
            render();
        }

            const order = inTransitOrders.find(o => o.id === orderId);
            if (!order || !order.items || !order.items[itemIdx]) return;
            order.items[itemIdx].arrived = !order.items[itemIdx].arrived;

            render();

        // === ЦЕНЫ (Price Tab) ===
        function getSupplierMaxPrice(code) {
            const prices = supplierPrices[code] || {};
            const vals = Object.values(prices).filter(v => v > 0);
            if (vals.length > 0) return Math.max(...vals);
            return 0;
        }

        function renderPrices() {
            const totalItems = Object.keys(matrix).length;
            const supplierNames = Object.keys(deliverySchedule);
            const allGroups = getAllGroups();

            if (totalItems === 0) {
                return `<div class="bg-white rounded-lg border border-gray-200 p-6">
                    <div class="text-center py-12">${icons.db}<p class="text-gray-500 mt-3">Загрузите данные для работы с ценами</p></div>
                </div>`;
            }

            // Статистика (расчёт от макс. цены поставщика)
            let itemsWithPrice = 0;
            let itemsWithShelfPrice = 0;
            let totalIncome = 0;
            let avgMarkup = 0;
            let avgMargin = 0;
            let markupCount = 0;

            Object.values(matrix).forEach(p => {
                const shP = p.shelfPrice || 0;
                let maxInP = getSupplierMaxPrice(normCode(p.code));
                if (!maxInP) {
                    const inP = p.inPrice || 0;
                    if (inP > 0 && inP < shP) maxInP = inP;
                    else maxInP = 0;
                }
                if (maxInP > 0) itemsWithPrice++;
                if (shP > 0) itemsWithShelfPrice++;
                if (maxInP > 0 && shP > 0) {
                    totalIncome += (shP - maxInP);
                    avgMarkup += (shP - maxInP) / maxInP * 100;
                    avgMargin += (shP - maxInP) / shP * 100;
                    markupCount++;
                }
            });
            avgMarkup = markupCount > 0 ? avgMarkup / markupCount : 0;
            avgMargin = markupCount > 0 ? avgMargin / markupCount : 0;

            const fixedCols = 4; // Группа, Наим., Код, Упак.
            const totalCols = fixedCols + supplierNames.length + 4; // +4: Макс, Полка, Доход, Наценка, Маржа = 5 → totalCols = fixedCols + supplierNames.length + 5

            let html = `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex flex-wrap gap-2 items-center">
                    <div class="bg-emerald-100 text-emerald-800 rounded-lg px-3 py-1.5">
                        <span class="text-xs">С ценой пост.: </span><strong>${itemsWithPrice}</strong>
                    </div>
                    <div class="bg-blue-100 text-blue-800 rounded-lg px-3 py-1.5">
                        <span class="text-xs">С ценой полки: </span><strong>${itemsWithShelfPrice}</strong>
                    </div>
                    <div class="bg-violet-100 text-violet-800 rounded-lg px-3 py-1.5">
                        <span class="text-xs">Общий доход: </span><strong>${totalIncome.toFixed(0)} ₽</strong>
                    </div>
                    <div class="bg-amber-100 text-amber-800 rounded-lg px-3 py-1.5">
                        <span class="text-xs">Ср. наценка: </span><strong>${avgMarkup.toFixed(1)}%</strong>
                    </div>
                    <div class="bg-rose-100 text-rose-800 rounded-lg px-3 py-1.5">
                        <span class="text-xs">Ср. маржа: </span><strong>${avgMargin.toFixed(1)}%</strong>
                    </div>
                    <div class="ml-auto flex gap-2">
                        <button onclick="applyDefaultMarkup()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-violet-600 rounded-lg hover:bg-violet-700">${icons.refresh} Наценка</button>
                        <button onclick="recalcInPricesFromSuppliers()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-orange-700 bg-orange-50 border border-orange-200 rounded-lg hover:bg-orange-100" title="Пересчитать inPrice: взять минимальную цену из поставщиков вместо максимальной">🔧 Испр. вх. цены</button>
                        <button onclick="document.getElementById('pricesImportInput').click()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-emerald-600 rounded-lg hover:bg-emerald-700">${icons.import} Импорт</button>
                        <input type="file" id="pricesImportInput" accept=".xlsx,.xls,.csv" onchange="importPrices(this)" class="hidden">
                        <button onclick="exportPrices()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">${icons.export} Экспорт</button>
                    </div>
                </div>
            </div>`;

            // Группируем по группам
            const grouped = {};
            Object.entries(matrix).forEach(([code, p]) => {
                if (searchAssort && !p.nomenclature?.toLowerCase().includes(searchAssort.toLowerCase()) && !code.includes(searchAssort)) return;
                if (filterGroup && p.group !== filterGroup) return;
                const gr = p.group || 'Без группы';
                if (!grouped[gr]) grouped[gr] = [];
                grouped[gr].push({ code, ...p });
            });
            Object.keys(grouped).forEach(gr => {
                grouped[gr].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru'));
            });

            // Фильтр по группе и поиск
            html += `<div class="bg-white rounded-lg border border-gray-200 p-3 mb-3">
                <div class="flex gap-2 items-center">
                    <div class="relative">
                        <input type="text" placeholder="Поиск по названию или коду..." value="${searchAssort}" oninput="searchAssort=this.value;render()" class="pl-8 pr-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-sky-400 w-56">
                        <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400">${icons.search}</span>
                    </div>
                    <select onchange="filterGroup=this.value;render()" class="px-2 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-sky-400">
                        <option value="">Все группы</option>
                        ${allGroups.map(g => `<option value="${g}" ${filterGroup === g ? 'selected' : ''}>${g}</option>`).join('')}
                    </select>
                    ${filterGroup || searchAssort ? `<button onclick="searchAssort='';filterGroup='';render()" class="text-xs text-gray-500 hover:text-gray-700">Сбросить</button>` : ''}
                </div>
            </div>`;

            const colspanVal = fixedCols + supplierNames.length + 5;

            html += `<div class="table-container">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th class="text-left" style="min-width:80px">Группа</th>
                            <th class="text-left" style="min-width:160px">Наименование</th>
                            <th class="text-left" style="min-width:50px">Код</th>
                            <th class="text-center" style="min-width:45px">Упак.</th>
                            ${supplierNames.map(s => `<th class="text-right" style="min-width:90px">
                                <div class="text-[9px] leading-tight text-gray-400 normal-case" title="Цена от поставщика">${esc(s)}</div>
                            </th>`).join('')}
                            <th class="text-right" style="min-width:75px;background:#fef3c7">Макс. вх.</th>
                            <th class="text-right" style="min-width:80px">Цена полки</th>
                            <th class="text-right" style="min-width:70px">Доход</th>
                            <th class="text-right" style="min-width:70px">Наценка %</th>
                            <th class="text-right" style="min-width:70px">Маржа %</th>
                        </tr>
                    </thead>
                    <tbody>`;

            const sortedGroups = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'ru'));
            sortedGroups.forEach(gr => {
                const items = grouped[gr];
                // Групповые итоги
                let grIncome = 0;
                let grMarkupSum = 0;
                let grMarginSum = 0;
                let grPricedCount = 0;
                items.forEach(p => {
                    const shP = p.shelfPrice || 0;
                    let maxInP = getSupplierMaxPrice(normCode(p.code));
                    if (!maxInP) {
                        const inP = p.inPrice || 0;
                        if (inP > 0 && inP < shP) maxInP = inP;
                        else maxInP = 0;
                    }
                    if (maxInP > 0 && shP > 0) {
                        grIncome += (shP - maxInP);
                        grMarkupSum += (shP - maxInP) / maxInP * 100;
                        grMarginSum += (shP - maxInP) / shP * 100;
                        grPricedCount++;
                    }
                });
                const grAvgMarkup = grPricedCount > 0 ? grMarkupSum / grPricedCount : 0;
                const grAvgMargin = grPricedCount > 0 ? grMarginSum / grPricedCount : 0;

                html += `<tr class="bg-sky-50 cursor-pointer hover:bg-sky-100" onclick="collapsedG['price_${esc(gr)}']=!collapsedG['price_${esc(gr)}'];render()">
                    <td colspan="${colspanVal}" class="font-semibold text-sky-800 py-1 px-2">
                        <span class="flex items-center gap-2">
                            ${collapsedG['price_' + gr] ? icons.chevronRight : icons.chevronDown}
                            ${gr} (${items.length})
                            <span class="text-[10px] text-gray-500 ml-2">Наценка: ${grAvgMarkup.toFixed(1)}% • Маржа: ${grAvgMargin.toFixed(1)}% • Доход: ${grIncome.toFixed(0)} ₽</span>
                        </span>
                    </td>
                </tr>`;

                if (!collapsedG['price_' + gr]) {
                    items.forEach(p => {
                        const code = p.code;
                        const nc = normCode(code);
                        const sp = supplierPrices[nc] || {};
                        const shP = p.shelfPrice || 0;
                        // Макс. вх. = максимальная цена из поставщиков
                        // Если нет цен у поставщиков — берём p.inPrice, но ТОЛЬКО если он < shelfPrice (реально входящая, а не полка)
                        let maxInP = getSupplierMaxPrice(nc);
                        if (!maxInP) {
                            const inP = p.inPrice || 0;
                            if (inP > 0 && inP < shP) {
                                maxInP = inP;
                            } else {
                                maxInP = 0;
                            }
                        }
                        const income = shP - maxInP;
                        const markup = maxInP > 0 ? (shP - maxInP) / maxInP * 100 : 0;
                        const margin = shP > 0 ? (shP - maxInP) / shP * 100 : 0;

                        // Цветовая индикация наценки
                        let markupClass = '';
                        if (markup > 0 && markup < 15) markupClass = 'text-amber-600';
                        else if (markup >= 15 && markup < 30) markupClass = 'text-emerald-600';
                        else if (markup >= 30) markupClass = 'text-blue-600';
                        else if (markup <= 0 && shP > 0) markupClass = 'text-red-600 font-semibold';

                        let marginClass = '';
                        if (margin > 0 && margin < 10) marginClass = 'text-amber-600';
                        else if (margin >= 10 && margin < 20) marginClass = 'text-emerald-600';
                        else if (margin >= 20) marginClass = 'text-blue-600';
                        else if (margin <= 0 && shP > 0) marginClass = 'text-red-600 font-semibold';

                        let incomeClass = '';
                        if (income < 0) incomeClass = 'text-red-600 font-semibold';
                        else if (income > 0) incomeClass = 'text-emerald-600';

                        // Определяем максимальную цену среди поставщиков
                        const priceVals = Object.values(sp).filter(v => v > 0);
                        const uniqueMax = priceVals.length > 1 ? priceVals.filter(v => v === maxInP).length === 1 : false;

                        html += `<tr class="hover:bg-gray-50">
                            <td class="text-xs text-gray-600">${esc(p.group || '')}</td>
                            <td class="font-medium text-gray-700 text-left whitespace-nowrap max-w-[200px] truncate" title="${esc(p.nomenclature || '')}">${esc(p.nomenclature || '')}</td>
                            <td class="font-mono text-xs text-gray-600">${code}</td>
                            <td class="text-center text-gray-500">${p.packaging || 'ШТ'}</td>
                            ${supplierNames.map(s => {
                                const val = sp[s] || 0;
                                const isMax = val > 0 && val === maxInP && uniqueMax;
                                const cellStyle = isMax ? 'border: 2px solid #fca5a5; background: #fef2f2;' : '';
                                return `<td class="text-right"><input type="number" step="0.01" value="${val}" data-sprice="${esc(nc)}_${esc(s)}" onchange="updateSupplierPrice('${esc(nc)}','${esc(s)}', parseFloat(this.value)||0)" onblur="updateSupplierPrice('${esc(nc)}','${esc(s)}', parseFloat(this.value)||0)" class="input w-20 text-right text-xs" style="${cellStyle}" title="Цена от ${esc(s)}"></td>`;
                            }).join('')}
                            <td class="text-right text-xs font-bold text-amber-700 bg-amber-50" data-max-price="${esc(nc)}">${maxInP > 0 ? maxInP.toFixed(2) : '—'}</td>
                            <td class="text-right"><input type="number" step="0.01" value="${shP}" onchange="updatePrice('${esc(code)}', 'shelfPrice', parseFloat(this.value)||0)" class="input w-20 text-right text-xs"></td>
                            <td class="text-right text-xs font-medium ${incomeClass}" data-income="${esc(nc)}">${shP > 0 && maxInP > 0 ? (income > 0 ? '+' : '') + income.toFixed(2) : '—'}</td>
                            <td class="text-right text-xs font-medium ${markupClass}" data-markup="${esc(nc)}">${maxInP > 0 && shP > 0 ? markup.toFixed(1) + '%' : '—'}</td>
                            <td class="text-right text-xs font-medium ${marginClass}" data-margin="${esc(nc)}">${maxInP > 0 && shP > 0 ? margin.toFixed(1) + '%' : '—'}</td>
                        </tr>`;
                    });
                }
            });

            html += `</tbody></table></div>`;
            return html;
        }

        function updateSupplierPrice(code, supplierName, value) {
            const nc = normCode(code);
            if (!supplierPrices[nc]) supplierPrices[nc] = {};

            // Защита от двойного вызова (onchange + onblur на одном элементе)
            const currentVal = supplierPrices[nc][supplierName] || 0;
            if (value === currentVal) return; // значение не изменилось — ничего не делаем

            if (value > 0) {
                supplierPrices[nc][supplierName] = value;
                console.log('[Price] Saved:', nc, supplierName, '=', value);
            } else {
                delete supplierPrices[nc][supplierName];
                if (Object.keys(supplierPrices[nc]).length === 0) delete supplierPrices[nc];
                console.log('[Price] Deleted:', nc, supplierName);
            }
            const product = matrix[nc] || matrix[code];
            if (product) {
                if (!product.inPrice || product.inPrice === 0) {
                    const minP = getSupplierMinPrice(nc);
                    if (minP > 0) product.inPrice = minP;
                }
                syncFishAssortment();
            }
            // Сразу сохраняем в localStorage — это самое важное!
            save(KEYS.SUPPLIER_PRICES, supplierPrices);

            // НЕ делаем полный render() сразу — это уничтожит все input-поля
            // и сбросит фокус пользователя при быстром вводе цен.
            // Вместо этого обновляем только расчётные ячейки в текущей строке.
            updatePriceRowCells(nc);

            // Debounce: полный render() через 2 сек бездействия (для обновления статистики)
            if (_priceRenderTimeout) clearTimeout(_priceRenderTimeout);
            _priceRenderTimeout = setTimeout(() => {
                _priceRenderTimeout = null;
                // Save any in-progress edits before re-rendering
                var priceInputs = document.querySelectorAll('input[data-sprice]');
                priceInputs.forEach(function(inp) {
                    if (document.activeElement === inp) {
                        var key = inp.getAttribute('data-sprice');
                        var parts = key.split('_');
                        var code = parts[0];
                        var supplier = parts.slice(1).join('_');
                        var val = parseFloat(inp.value);
                        if (!isNaN(val) && val > 0) {
                            if (!supplierPrices[code]) supplierPrices[code] = {};
                            supplierPrices[code][supplier] = val;
                        }
                    }
                });
                save(KEYS.SUPPLIER_PRICES, supplierPrices);
                render();
            }, 2000);
        }

        // Обновляет только расчётные ячейки (Макс, Доход, Наценка, Маржа) в строке товара
        // без полного перестроения DOM — чтобы не терять фокус при вводе цен
        function updatePriceRowCells(code) {
            const product = matrix[code];
            if (!product) return;
            const supplierNames = Object.keys(deliverySchedule);
            const sp = supplierPrices[code] || {};
            const shP = product.shelfPrice || 0;
            let maxInP = getSupplierMaxPrice(code);
            if (!maxInP) {
                const inP = product.inPrice || 0;
                if (inP > 0 && inP < shP) maxInP = inP;
                else maxInP = 0;
            }
            const income = shP - maxInP;
            const markup = maxInP > 0 ? (shP - maxInP) / maxInP * 100 : 0;
            const margin = shP > 0 ? (shP - maxInP) / shP * 100 : 0;

            // Обновляем ячейку "Макс" — ищем по data-атрибуту
            const maxCell = document.querySelector(`[data-max-price="${CSS.escape(code)}"]`);
            if (maxCell) {
                maxCell.textContent = maxInP > 0 ? maxInP.toFixed(2) : '—';
            }

            // Обновляем расчётные ячейки
            const incomeCell = document.querySelector(`[data-income="${CSS.escape(code)}"]`);
            if (incomeCell) {
                incomeCell.textContent = shP > 0 && maxInP > 0 ? (income > 0 ? '+' : '') + income.toFixed(2) : '—';
                incomeCell.className = incomeCell.className.replace(/text-(emerald|red)-\d+/g, '');
                incomeCell.classList.add(income < 0 ? 'text-red-600' : income > 0 ? 'text-emerald-600' : '');
                if (income < 0) incomeCell.classList.add('font-semibold');
                if (income > 0) incomeCell.classList.add('font-medium');
            }

            const markupCell = document.querySelector(`[data-markup="${CSS.escape(code)}"]`);
            if (markupCell) {
                markupCell.textContent = maxInP > 0 && shP > 0 ? markup.toFixed(1) + '%' : '—';
            }

            const marginCell = document.querySelector(`[data-margin="${CSS.escape(code)}"]`);
            if (marginCell) {
                marginCell.textContent = maxInP > 0 && shP > 0 ? margin.toFixed(1) + '%' : '—';
            }

            // Обновляем стиль у ячеек цен поставщиков (подсветка максимальной цены)
            const priceVals = Object.values(sp).filter(v => v > 0);
            const uniqueMax = priceVals.length > 1 ? priceVals.filter(v => v === maxInP).length === 1 : false;
            supplierNames.forEach(s => {
                const input = document.querySelector(`[data-sprice="${CSS.escape(code)}_${CSS.escape(s)}"]`);
                if (!input) return;
                const val = sp[s] || 0;
                const isMax = val > 0 && val === maxInP && uniqueMax;
                if (isMax) {
                    input.style.cssText = 'border: 2px solid #fca5a5; background: #fef2f2;';
                } else {
                    input.style.cssText = '';
                }
            });
        }

        function getSupplierMinPrice(code) {
            const prices = supplierPrices[code] || {};
            const vals = Object.values(prices).filter(v => v > 0);
            if (vals.length > 0) return Math.min(...vals);
            return 0;
        }

        function recalcInPricesFromSuppliers() {
            if (!confirm('Исправить входящие цены (inPrice) у всех товаров?\n\nЗаменит inPrice:\n- Если есть цены поставщиков → минимальная из них\n- Если inPrice = shelfPrice → очистить (0)\n\nЭто повлияет на расчёт заказа и наценки.')) return;

            let fixed = 0;
            let cleared = 0;
            Object.entries(matrix).forEach(([code, p]) => {
                // Случай 1: inPrice = shelfPrice → явно ошибка, очищаем
                if (p.inPrice > 0 && p.inPrice === p.shelfPrice) {
                    p.inPrice = 0;
                    p.price = 0;
                    cleared++;
                    return;
                }
                // Случай 2: есть цены у поставщиков — берём минимальную
                const supPrices = supplierPrices[code];
                if (!supPrices) return;
                const vals = Object.values(supPrices).filter(v => v > 0);
                if (vals.length === 0) return;
                const minP = Math.min(...vals);
                const maxP = Math.max(...vals);
                if (minP !== maxP && (p.inPrice || 0) === maxP) {
                    p.inPrice = minP;
                    p.price = minP;
                    fixed++;
                }
            });

            syncFishAssortment();
            save(KEYS.ASSORTMENT, matrix);
            save(KEYS.SUPPLIER_PRICES, supplierPrices);
            render();
            alert('Исправлено: ' + fixed + ' товаров (inPrice = мин. цена пост.)\nОчищено: ' + cleared + ' товаров (inPrice был = цене полки)');
        }

        function updatePrice(code, field, value) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            if (!product) return;
            product[field] = value;
            if (field === 'inPrice') product.price = value;
            syncFishAssortment();
            render();
        }

        function applyDefaultMarkup() {
            const mu = prompt(`Применить наценку ко всем товарам без цены на полке.\nРасчёт от максимальной цены поставщика.\nТекущая наценка: ${defaultMarkup}%\n\nВведите наценку (%):`, defaultMarkup);
            if (mu === null) return;
            const markupVal = parseFloat(mu);
            if (isNaN(markupVal)) { alert('Некорректное значение'); return; }
            defaultMarkup = markupVal;

            let updated = 0;
            Object.values(matrix).forEach(p => {
                const shP = p.shelfPrice || 0;
                let maxInP = getSupplierMaxPrice(normCode(p.code));
                if (!maxInP) {
                    const inP = p.inPrice || 0;
                    if (inP > 0 && inP < shP) maxInP = inP;
                    else maxInP = 0;
                }
                if (maxInP > 0) {
                    const newShelfPrice = Math.round(maxInP * (1 + markupVal / 100) * 100) / 100;
                    if (!p.shelfPrice || p.shelfPrice === 0) {
                        p.shelfPrice = newShelfPrice;
                        updated++;
                    }
                }
            });

            syncFishAssortment();
            render();
            alert(`Наценка ${markupVal}% применена (от макс. цены поставщика).\nОбновлено: ${updated}\n(только товары без цены на полке)`);
        }

        function exportPrices() {
            const items = Object.values(matrix);
            const supplierNames = Object.keys(deliverySchedule);
            if (items.length === 0) { alert('Нет данных для экспорта'); return; }

            const headers = ['Группа', 'Наименование', 'Код', 'Упак.', ...supplierNames.map(s => 'Цена ' + s), 'Макс. вх.', 'Цена полки', 'Доход', 'Наценка %', 'Маржа %'];
            const data = items.map(p => {
                const sp = supplierPrices[normCode(p.code)] || {};
                const shP = p.shelfPrice || 0;
                let maxInP = getSupplierMaxPrice(normCode(p.code));
                if (!maxInP) {
                    const inP = p.inPrice || 0;
                    if (inP > 0 && inP < shP) maxInP = inP;
                    else maxInP = 0;
                }
                const income = shP - maxInP;
                const markup = maxInP > 0 ? (shP - maxInP) / maxInP * 100 : 0;
                const margin = shP > 0 ? (shP - maxInP) / shP * 100 : 0;
                return [
                    p.group || '', p.nomenclature || '', p.code, p.packaging || 'ШТ',
                    ...supplierNames.map(s => sp[s] || 0),
                    maxInP, shP,
                    Math.round(income * 100) / 100,
                    Math.round(markup * 100) / 100,
                    Math.round(margin * 100) / 100
                ];
            });

            const ws = SharedUtils.createStyledSheet(data, headers, [0, 1]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Цены');

            const d = new Date();
            XLSX.writeFile(wb, 'цены_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx');
        }

        function importPrices(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });

                    if (json.length < 2) { alert('Файл пуст или некорректный формат'); return; }

                    // Заголовки из файла
                    const headers = json[0].map(h => String(h || '').trim());
                    const knownSuppliers = Object.keys(deliverySchedule);

                    // Ищем колонки поставщиков: по шаблону "Цена Имя" ИЛИ просто по имени поставщика
                    const supplierNamesInFile = [];
                    const supplierIdxMap = {};
                    headers.forEach((h, idx) => {
                        let supName = '';
                        if (h.startsWith('Цена ')) {
                            supName = h.replace('Цена ', '').trim();
                        } else if (knownSuppliers.includes(h)) {
                            supName = h;
                        }
                        if (supName && !supplierIdxMap[supName]) {
                            supplierNamesInFile.push(supName);
                            supplierIdxMap[supName] = idx;
                        }
                    });

                    // Находим индексы остальных колонок
                    const idxGroup = headers.indexOf('Группа');
                    const idxName = headers.indexOf('Наименование');
                    const idxCode = headers.indexOf('Код');
                    const idxMaxIn = headers.indexOf('Макс. вх.');
                    const idxShelfPrice = headers.indexOf('Цена полки');

                    if (idxCode < 0) {
                        alert('Не найдена колонка "Код" в файле. Проверьте что это файл экспорта цен.');
                        return;
                    }

                    // Если в файле есть поставщики, которых нет в deliverySchedule — создаём их
                    supplierNamesInFile.forEach(sName => {
                        if (!deliverySchedule[sName]) {
                            deliverySchedule[sName] = {};
                            if (stores && stores.length > 0) {
                                stores.forEach(st => {
                                    deliverySchedule[sName][st.tt] = [false, false, false, false, false, false, false];
                                });
                            }
                        }
                    });

                    let updatedProducts = 0;
                    let updatedSupplierPrices = 0;
                    let notFound = 0;
                    let newSuppliersFound = 0;
                    let totalRows = 0;

                    // Диагностика
                    const notFoundCodes = [];

                    for (let i = 1; i < json.length; i++) {
                        const r = json[i];
                        if (!r || r.length < 2) continue;

                        const rawCode = String(r[idxCode] || '').trim();
                        const code = normCode(rawCode);
                        if (!code || code === '0') continue;
                        totalRows++;

                        let product = matrix[code];
                        // Если не нашли по нормализованному — пробуем оригинальный код
                        if (!product && rawCode !== code) product = matrix[rawCode];
                        // Если не нашли — пробуем с ведущими нулями
                        if (!product) {
                            const padded = String(code).padStart(5, '0');
                            product = matrix[padded];
                        }
                        if (!product) { notFound++; notFoundCodes.push(rawCode); continue; }

                        // Обновляем цену полки
                        if (idxShelfPrice >= 0 && r[idxShelfPrice] !== undefined && r[idxShelfPrice] !== '') {
                            const shP = parseFloat(String(r[idxShelfPrice]).replace(',', '.')) || 0;
                            if (shP > 0) {
                                product.shelfPrice = shP;
                                updatedProducts++;
                            }
                        }

                        // Обновляем inPrice из Макс. вх.
                        if (idxMaxIn >= 0 && r[idxMaxIn] !== undefined && r[idxMaxIn] !== '') {
                            const maxIn = parseFloat(String(r[idxMaxIn]).replace(',', '.')) || 0;
                            if (maxIn > 0) {
                                product.inPrice = maxIn;
                                product.price = maxIn;
                            }
                        }

                        // Обновляем цены поставщиков
                        Object.entries(supplierIdxMap).forEach(([sName, colIdx]) => {
                            if (r[colIdx] !== undefined && r[colIdx] !== '') {
                                const price = parseFloat(String(r[colIdx]).replace(',', '.')) || 0;
                                if (price > 0) {
                                    if (!supplierPrices[code]) supplierPrices[code] = {};
                                    supplierPrices[code][sName] = price;
                                    updatedSupplierPrices++;

                                    // supplierAssortment
                                    if (!supplierAssortment[code]) supplierAssortment[code] = [];
                                    if (!supplierAssortment[code].includes(sName)) {
                                        supplierAssortment[code].push(sName);
                                        newSuppliersFound++;
                                    }
                                }
                            }
                        });

                        // Обновляем группу/наименование если в файле есть
                        if (idxGroup >= 0 && r[idxGroup]) {
                            const g = String(r[idxGroup]).trim();
                            if (g) product.group = g;
                        }
                        if (idxName >= 0 && r[idxName]) {
                            const n = String(r[idxName]).trim();
                            if (n) product.nomenclature = n;
                        }
                    }

                    // Сохраняем всё
                    syncFishAssortment();
                    save(KEYS.SUPPLIER_PRICES, supplierPrices);
                    save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
                    save(KEYS.SCHEDULE, deliverySchedule);
                    // НЕ вызываем ensureSupplierAssortment() после импорта цен — он перезапишет импортированные цены из inPrice
                    render();

                    const msg = `Импорт цен завершён:
• Строк в файле: ${totalRows}
• Найдено в каталоге: ${totalRows - notFound}
• Обновлено товаров (цена полки): ${updatedProducts}
• Обновлено цен поставщиков: ${updatedSupplierPrices}
• Новых связей товар↔поставщик: ${newSuppliersFound}
• Не найдено в каталоге: ${notFound}${notFoundCodes.length > 0 ? '\n\nНе найденные коды: ' + notFoundCodes.slice(0, 10).join(', ') + (notFoundCodes.length > 10 ? ' и ещё ' + (notFoundCodes.length - 10) : '') : ''}${supplierNamesInFile.length === 0 ? '\n\n⚠ ВНИМАНИЕ: В файле не найдены колонки поставщиков!\nУбедитесь что названия колонок совпадают с именами поставщиков (например "Цена Дзюба" или просто "Дзюба").' : ''}`;
                    alert(msg);
                } catch (err) {
                    console.error('Import prices error:', err);
                    alert('Ошибка импорта: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        function updateProduct(code, field, value) {
            const nc = normCode(code);
            const product = matrix[nc] || matrix[code];
            if (!product) return;
            product[field] = value;
            syncFishAssortment();
            if (['inPrice', 'markup', 'group', 'shelfPrice'].includes(field)) render();
        }
