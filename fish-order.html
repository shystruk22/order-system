                                    <th class="text-center" style="min-width:60px">Среднее/день</th>
                                    <th class="text-center" style="min-width:55px">Остаток, кг</th>
                                    ${supplierColumns.map(sup => `<th class="text-center bg-emerald-50" style="min-width:100px" title="${esc(sup)}">${esc(sup)}<br><span class="text-[10px] font-normal opacity-70">заказ / сумма</span></th>`).join('')}
                                    <th class="text-left" style="min-width:180px">Статус</th>
                                    ${hasWishes ? '<th class="text-center bg-violet-50" style="min-width:90px" title="Пожелания магазинов из загруженного файла"><span class="text-violet-700">Пожелания</span><br><span class="text-[10px] font-normal opacity-70">магазин / кол-во</span></th>' : ''}
                                </tr>
                            </thead>
                            <tbody>
                                ${Object.entries(groupedTT).map(([tt, groups]) => `
                                    <tr class="bg-sky-50 cursor-pointer hover:bg-sky-100" onclick="collapsedTT['${esc(tt)}']=!collapsedTT['${esc(tt)}'];render()">
                                        <td colspan="${colCount}" class="text-left font-semibold text-sky-800"><span class="inline-flex items-center gap-1">${collapsedTT[tt] ? icons.chevronRight : icons.chevronDown}${icons.mapPin}${tt}<span class="font-normal text-sky-600">(${Object.values(groups).reduce((s, items) => s + items.length, 0)} поз.)</span></span></td>
                                    </tr>
                                    ${collapsedTT[tt] ? '' : Object.entries(groups).map(([gr, items]) => `
                                        <tr class="group-header cursor-pointer" onclick="collapsedG['order_${esc(tt)}_${esc(gr)}']=!collapsedG['order_${esc(tt)}_${esc(gr)}'];render()">
                                            <td colspan="${colCount}" class="text-left py-1 px-2">
                                                <div class="flex items-center gap-2">
                                                    ${collapsedG['order_' + tt + '_' + gr] ? icons.chevronRight : icons.chevronDown}
                                                    <span class="font-semibold text-indigo-800">${gr}</span>
                                                    <span class="text-[10px] bg-indigo-200 text-indigo-800 px-1 rounded">${items.length}</span>
                                                </div>
                                            </td>
                                        </tr>
                                        ${collapsedG['order_' + tt + '_' + gr] ? '' : items.map(r => {
                                            let rowClass = '';
                                            let cellBg = '';
                                            let titleAttr = '';
                                            if (r.notInMatrix) {
                                                rowClass = r.matrixNet ? 'bg-orange-50' : 'bg-blue-50';
                                                titleAttr = r.matrixNet ? ' title="НЕТ в матрице (исключён, можно заказать на пробу)"' : ' title="Товар вне ассортимента"';
                                            } else if (r.hasConflict) {
                                                rowClass = 'bg-amber-50';
                                                cellBg = 'bg-amber-100';
                                                titleAttr = ' title="⚠️ Конфликт: несколько поставщиков с заказом"';
                                            } else if (r.order > 0) {
                                                rowClass = 'bg-emerald-50';
                                                cellBg = 'bg-emerald-100';
                                            }
                                            return `
                                            <tr class="${rowClass} hover:bg-gray-100"${titleAttr}>
                                                <td class="sticky left-0 bg-white text-left cell-wrap">${r.nomenclature}</td>
                                                <td class="text-center font-mono text-xs text-gray-600">${r.code}</td>
                                                <td class="text-center text-xs text-gray-600">${r.group}</td>
                                                <td class="text-center"><span class="cursor-pointer underline decoration-dotted decoration-gray-400 hover:text-sky-600 hover:decoration-sky-400 transition-colors" onclick="event.stopPropagation();showCalcDetail(this, ${JSON.stringify(r).replace(/"/g, '&quot;')})">${r.sales.toFixed(2)}</span></td>
                                                <td class="text-center font-medium ${(r.weekendAvg > 0 || r.weekdayAvg > 0) ? 'text-blue-700' : 'text-gray-400'}">${(r.weekendAvg > 0 || r.weekdayAvg > 0) ? ((r.weekdayCount * r.weekdayAvg + r.weekendCount * r.weekendAvg) / Math.max(1, r.weekdayCount + r.weekendCount)).toFixed(3) : (r.avgSalesPerDay > 0 ? r.avgSalesPerDay.toFixed(3) : '—')}</td>
                                                <td class="text-center">${r.deliveredQty > 0 ? r.currentStock.toFixed(2) + ' <span class="text-emerald-600 font-medium">(+' + r.deliveredQty + ')</span>' : r.currentStock.toFixed(2)}</td>
                                                ${supplierColumns.map(sup => {
                                                    const so = (r.supplierOrders || {})[sup];
                                                    const deliversTomorrow = so && so.daysUntil === 1;
                                                    const editKey = r.tt + '_' + r.code + '_' + sup;
                                                    const editedVal = orderEdits[editKey];
                                                    const hasManualEdit = editedVal !== undefined;
                                                    const orderVal = hasManualEdit ? editedVal : (so ? so.order : 0);
                                                    const supPrice = (supplierPrices[normCode(r.code)] && supplierPrices[normCode(r.code)][sup]) || r.inPrice || 0;
                                                    const sumVal = smartRound(orderVal * supPrice);

                                                    // Вне ассортимента или НЕТ в матрице — инпут только если доставка ЗАВТРА
                                                    if (r.notInMatrix && so) {
                                                        const netBg = r.matrixNet ? 'bg-orange' : 'bg-blue';
                                                        const netLabel = r.matrixNet ? 'НЕТ в матрице' : 'Вне ассортимента';
                                                        if (deliversTomorrow) {
                                                            if (orderVal > 0) {
                                                                return '<td class="text-center ' + netBg + '-50" title="' + netLabel + ' (ручной заказ)"><input type="number" step="0.5" min="0" value="' + Number(orderVal).toFixed(1) + '" data-tt="' + esc(r.tt) + '" data-code="' + esc(r.code) + '" data-supplier="' + esc(sup) + '" onblur="editOrder(this)" onkeydown="if(event.keyCode===13){event.preventDefault();this.blur()}" class="input w-16 text-center text-sm font-bold"><div class="text-[10px] text-gray-500">' + sumVal.toFixed(0) + ' ₽</div></td>';
                                                            }
                                                            return '<td class="text-center ' + netBg + '-50" title="' + netLabel + '"><input type="number" step="0.5" min="0" value="' + (hasManualEdit ? '0' : '') + '" placeholder="0" data-tt="' + esc(r.tt) + '" data-code="' + esc(r.code) + '" data-supplier="' + esc(sup) + '" onblur="editOrder(this)" onkeydown="if(event.keyCode===13){event.preventDefault();this.blur()}" class="input w-16 text-center text-sm text-gray-400 bg-gray-50"></td>';
                                                        } else {
                                                            // Нет доставки завтра — серая ячейка, редактирование недоступно
                                                            return '<td class="text-center bg-gray-200 opacity-50 cursor-not-allowed" title="' + netLabel + ', нет доставки завтра от ' + esc(sup) + '"><span class="text-gray-400 text-xs">—</span></td>';
                                                        }
                                                    }

                                                    // Серая колонка: поставщик не доставляет завтра в эту ТТ (только для товаров В матрице)
                                                    if (!deliversTomorrow) {
                                                        // Но если это предпочитаемый поставщик без доставки — показываем пометку
                                                        const prefMark = (so && so.isPreferred) ? ' ★' : '';
                                                        return '<td class="text-center bg-gray-200 opacity-50 cursor-not-allowed" title="Нет доставки завтра от ' + esc(sup) + prefMark + '"><span class="text-gray-400 text-xs">—</span></td>';
                                                    }
                                                    // Поставщик пропущен из-за предпочтения магазина

                                                        return '<td class="text-center bg-gray-50 opacity-40" title="Магазин предпочитает другого поставщика"><span class="text-gray-300 text-[10px]">авто</span></td>';
                                                    }
                                                    // Предпочитаемый поставщик — подсветка
                                                    const prefBg = (so && so.isPreferred) ? 'ring-2 ring-violet-300 bg-violet-50' : '';
                                                    if (orderVal > 0) {
                                                        const editBg = hasManualEdit ? 'bg-amber-100 ring-1 ring-amber-300' : '';
                                                        const editTitle = hasManualEdit ? ' title="Ручная правка"' : ((so && so.isPreferred) ? ' title="Предпочтение магазина ★"' : '');
                                                        return '<td class="text-center ' + (cellBg || '') + ' ' + editBg + ' ' + prefBg + '"' + editTitle + '><input type="number" step="0.5" min="0" value="' + Number(orderVal).toFixed(1) + '" data-tt="' + esc(r.tt) + '" data-code="' + esc(r.code) + '" data-supplier="' + esc(sup) + '" onblur="editOrder(this)" onkeydown="if(event.keyCode===13){event.preventDefault();this.blur()}" class="input w-16 text-center text-sm font-bold"><div class="text-[10px] text-gray-500">' + sumVal.toFixed(0) + ' ₽</div></td>';
                                                    }
                                                    const editBg = hasManualEdit ? 'bg-amber-50 ring-1 ring-amber-200' : '';
                                                    const editTitle = hasManualEdit ? ' title="Ручная правка (очистите поле для авто)"' : ((so && so.isPreferred) ? ' title="Предпочтение магазина ★"' : '');
                                                    const inputVal = hasManualEdit ? '0' : '';
                                                    return '<td class="text-center ' + editBg + ' ' + prefBg + '"' + editTitle + '><input type="number" step="0.5" min="0" value="' + inputVal + '" placeholder="0" data-tt="' + esc(r.tt) + '" data-code="' + esc(r.code) + '" data-supplier="' + esc(sup) + '" onblur="editOrder(this)" onkeydown="if(event.keyCode===13){event.preventDefault();this.blur()}" class="input w-16 text-center text-sm text-gray-400 bg-gray-50"></td>';
                                                }).join('')}
                                                <td class="text-left text-xs ${r.notInMatrix ? (r.matrixNet ? 'text-orange-600 font-medium italic' : 'text-blue-600 font-medium italic') : r.hasConflict ? 'text-amber-700 font-medium' : r.order > 0 ? 'text-emerald-700' : 'text-gray-500'}">${r.status}</td>
                                                ${hasWishes ? (() => {
                                                    const wish = getStoreWish(r.tt, r.code);
                                                    if (!wish) return '<td class="text-center"></td>';
                                                    return '<td class="text-center bg-violet-50"><div class="text-[10px] text-violet-500">' + esc(wish.tt) + (wish.supplier ? ' → ' + esc(wish.supplier) : '') + '</div><div class="font-bold text-violet-700">' + wish.qty + '</div><button onclick="event.stopPropagation();removeStoreWish(\'' + esc(r.tt) + '\',\'' + esc(r.code) + '\')" class="text-red-300 hover:text-red-500 text-[10px]" title="Удалить">✕</button></td>';
                                                })() : ''}
                                            </tr>`;
                                        }).join('')}
                                    `).join('')}
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }


        function debugOrderEditability() {
            // Собираем инфу: для каждого товара + ТТ + поставщика — почему ячейка заблокирована
            const lines = [];
            const scheduleKeys = Object.keys(deliverySchedule);
            lines.push('=== ДИАГНОСТИКА ЗАКАЗА ===');
            lines.push('Поставщики в графике: ' + scheduleKeys.join(', '));
            lines.push('Всего товаров в каталоге: ' + Object.keys(matrix).length);
            lines.push('Всего ТТ: ' + stores.map(s => s.tt).join(', '));
            lines.push('');

            // Берём первые 5 ТТ и первые 10 товаров для диагностики
            const diagStores = stores.slice(0, 3);
            const diagCodes = Object.keys(matrix).slice(0, 10);

            diagStores.forEach(store => {
                lines.push('--- ТТ: ' + store.tt + ' ---');
                diagCodes.forEach(code => {
                    const p = matrix[code];
                    if (!p) return;
                    const name = p.nomenclature || code;

                    // 1) Матрица
                    const inMatrix = !!matrixMarks[code];
                    const mark = inMatrix ? (matrixMarks[code][store.tt] || 'НЕТ') : 'вне ассортимента';
                    const matrixOk = mark === 'ДА' || !inMatrix;

                    // 2) Поставщики товара
                    const supList = (supplierAssortment[code] && supplierAssortment[code].length > 0)
                        ? supplierAssortment[code]
                        : (p.supplier ? [p.supplier] : []);
                    const supStr = supList.join(', ') || '(пусто)';

                    // 3) Для каждого поставщика — доставка завтра?
                    const supDetails = supList.map(sup => {
                        const dp = getDeliveryPeriod(sup, store.tt);
                        const dpToday = hasSupplierDeliveryToday(sup, store.tt);
                        const inSchedule = !!deliverySchedule[sup] && !!deliverySchedule[sup][store.tt];
                        const scheduleDays = inSchedule ? deliverySchedule[sup][store.tt].map((d, i) => d ? DAY_NAMES[i] : '').filter(Boolean).join(', ') : '(не найден в графике)';

                        // Проверяем совпадение имени
                        const nameMatch = scheduleKeys.includes(sup);

                        return '  ' + sup + ': dp=' + (dp ? dp.period + 'дн' : 'null') +
                            ', сегодня=' + dpToday +
                            ', вГрафике=' + inSchedule +
                            ', имяСовпадает=' + nameMatch +
                            ', дни=[' + scheduleDays + ']';
                    });

                    lines.push(name + ' (' + code + '): матрица=' + mark + (matrixOk ? ' ✓' : ' ✗') +
                        ', поставщики=[' + supStr + ']');
                    supDetails.forEach(d => lines.push(d));
                });
                lines.push('');
            });

            // Выводим в консоль И в alert
            const text = lines.join('\n');
            console.log(text);
            alert(text);
        }

        function editOrder(input) {
            const val = input.value.trim();
            const tt = input.dataset.tt;
            const code = normCode(input.dataset.code);
            const supplier = input.dataset.supplier || '';
            const editKey = supplier ? `${tt}_${code}_${supplier}` : `${tt}_${code}`;
            if (val === '') {
                delete orderEdits[editKey]; // Пустое поле = вернуть авто
            } else {
                const num = parseFloat(val);
                orderEdits[editKey] = isNaN(num) ? 0 : Math.round(num * 100) / 100;
            }
            // Обновляем сумму в соседнем div БЕЗ полного перестроения DOM
            const td = input.closest('td');
            if (td) {
                const sumDiv = td.querySelector('div');
                if (sumDiv) {
                    const qty = orderEdits[editKey] !== undefined ? orderEdits[editKey] : 0;
                    const sp = (supplierPrices[code] && supplierPrices[code][supplier]) || (matrix[code] && matrix[code].inPrice) || 0;
                    sumDiv.textContent = Math.round(qty * sp) + ' \u20BD';
                }
            }
            // Автосохранение правок в localStorage (чтобы не потерялись при перезагрузке)
            try {
                var saved = load(KEYS.SAVED_ORDER, null);
                if (saved) {
                    saved.orderEdits = Object.assign({}, orderEdits);
                    save(KEYS.SAVED_ORDER, saved);
                }
            } catch(e) {}
            // НЕ вызываем render() — это вызывало задержку и перестроение всего DOM
        }

        // Собрать ВСЕ текущие значения из полей ввода заказа в orderEdits
        // Вызывать перед сохранением/экспортом чтобы гарантировать актуальность правок
        function collectEditsFromDOM() {
            const inputs = document.querySelectorAll('input[data-tt][data-code][data-supplier], input[data-tt][data-code]:not([data-supplier])');
            inputs.forEach(function(input) {
                const tt = input.dataset.tt;
                const code = input.dataset.code;
                const supplier = input.dataset.supplier || '';
                const editKey = supplier ? `${tt}_${code}_${supplier}` : `${tt}_${code}`;
                const val = input.value.trim();
                if (val === '') {
                    delete orderEdits[editKey];
                } else {
                    const num = parseFloat(val);
                    if (!isNaN(num)) {
                        orderEdits[editKey] = Math.round(num * 100) / 100;
                    }
                }
            });
        }

        // Применить orderEdits к savedOrderResults (для сохранения и экспорта)
        function applyEditsToResults() {
            if (!savedOrderResults) return;
            savedOrderResults.forEach(function(r) {
                if (!r.supplierOrders) return;
                Object.keys(r.supplierOrders).forEach(function(sup) {
                    const editKey = `${r.tt}_${r.code}_${sup}`;
                    if (orderEdits[editKey] !== undefined) {
                        var so = r.supplierOrders[sup];
                        so.order = smartRound(orderEdits[editKey]);
                        so.sum = smartRound(so.order * (so.inPrice || 0));
                    }
                });
                // Also update primary order
                const editKeyPrimary = r.supplier ? `${r.tt}_${r.code}_${r.supplier}` : `${r.tt}_${r.code}`;
                if (orderEdits[editKeyPrimary] !== undefined) {
                    r.order = smartRound(orderEdits[editKeyPrimary]);
                    r.sum = smartRound(r.order * (r.inPrice || 0));
                } else if (orderEdits[`${r.tt}_${r.code}`] !== undefined) {
                    r.order = smartRound(orderEdits[`${r.tt}_${r.code}`]);
                    r.sum = smartRound(r.order * (r.inPrice || 0));
                }
            });
        }

        // === ФАЙЛОВЫЕ ПАРСЕРЫ ===
        function handleFile(input, type) {
            resetSavedOrders();
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                    if (type === 'sales') {
                        const storeNames = stores.map(s => s.tt);

                        save(KEYS.SALES, sales);
                        // Дополнительно: парсим продажи с датами для расчёта выходных (Пн/Сб/Вс)

                    }
                    else if (type === 'stocks') {
                        const storeNames = stores.map(s => s.tt);
                        const parseResult = SharedUtils.parseStocks(json, storeNames);
                        const localItems = parseResult.items || parseResult;
                        // Маппим productName → name для совместимости
                        localItems.forEach(item => { item.name = item.productName || item.name || ''; });
                        console.log(`Парсинг остатков: ${localItems.length} записей`);
                        // Лог для диагностики дней присутствия
                        const withDays = localItems.filter(i => i.daysPresent > 0).length;
                        const noDays = localItems.filter(i => i.daysPresent === 0).length;
                        console.log(`  С днями присутствия: ${withDays}, Без: ${noDays}`);
                        if (localItems.length > 0 && noDays > 0) {
                            console.log('  Пример записи:', JSON.stringify(localItems[0]));

                        alert(`Загружено ${stocks.length} остатков\n(с днями присутствия: ${withDays})\nПотребление рассчитано: ${consCount} тов.`);

        function parseStocksLocal(json) {
            let lastCol = 0;
            for (let i = 0; i < json.length; i++) if (json[i]) lastCol = Math.max(lastCol, json[i].length - 1);

            const items = [];
            const foundTTs = new Set();
            let curTT = '';

            for (let i = 3; i < json.length; i++) {
                const r = json[i];
                if (!r || r.length < 3) continue;

                const c0 = String(r[0] || '').trim();
                const code = String(r[1] || '').trim();

                const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(code);
                const isProductCode = /^\d/.test(code) || code.length >= 5;

                if (isTT) {
                    curTT = c0;
                    foundTTs.add(curTT);
                } else if (isProductCode && curTT && c0) {
                    const normC = normCode(code);
                    const currentStock = parseFloat(String(r[lastCol])) || 0;

                    let daysPresent = 0, totalDays = 0;
                    for (let col = 2; col <= lastCol; col++) {
                        const val = r[col];
                        if (val !== undefined && val !== null && val !== '') {
                            totalDays++;
                            if ((parseFloat(String(val)) || 0) > 0) daysPresent++;
                        }
                    }

                    items.push({ tt: curTT, code: normC, name: c0, currentStock, daysPresent, totalDays });
                }
            }
            return items;
        }

        // === РАСЧЁТ ПОТРЕБЛЕНИЯ ИЗ ФАЙЛА ОСТАТКОВ ===
        // Парсим даты из строки 3 заголовков (json[2]) и вычисляем ежедневное потребление
        // по разнице остатков между соседними днями. Разделяем на выходные/будние.
        function parseStockConsumption(json) {
            stockConsumptionData = {};

            // Строка с датами — json[2] (3-я строка: 0=заголовок, 1=подзаголовок, 2=даты)
            const dateRow = json[2] || [];
            const dateInfos = []; // [{col, isWeekend, dow, date}]

            for (let c = 2; c < dateRow.length; c++) {
                const cellVal = String(dateRow[c] || '').trim();
                if (!cellVal) continue;

                let date = null;
                if (/^\d{4}-\d{2}-\d{2}/.test(cellVal)) {
                    date = new Date(cellVal);
                } else if (/^\d{2}\.\d{2}\.\d{2,4}/.test(cellVal)) {
                    const parts = cellVal.split('.');
                    const year = parts[2].length === 2 ? '20' + parts[2] : parts[2];
                    date = new Date(year, parts[1]-1, parts[0]);
                } else {
                    const numDate = parseFloat(cellVal);
                    if (numDate > 40000 && numDate < 60000) {
                        date = new Date((numDate - 25569) * 86400 * 1000);
                    }
                }

                if (date && !isNaN(date.getTime())) {
                    const dow = date.getDay();
                    const isWeekend = (dow === 1 || dow === 6 || dow === 0); // ПН, СБ, ВС = выходные
                    dateInfos.push({ col: c, isWeekend, dow, date });
                }
            }

            if (dateInfos.length < 2) {
                console.log(`[FishOrder] Недостаточно дат в файле остатков для расчёта потребления (найдено: ${dateInfos.length})`);
                return;
            }

            // Собираем данные по ТТ: {tt: [{code, values: {col: stock}}]}
            let curTT = '';
            const ttData = {};

            for (let i = 3; i < json.length; i++) {
                const r = json[i];
                if (!r || r.length < 3) continue;

                const c0 = String(r[0] || '').trim();
                const code = String(r[1] || '').trim();
                const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(code);

                if (isTT) {
                    curTT = c0;
                    if (!ttData[curTT]) ttData[curTT] = [];
                } else {
                    const isProductCode = /^\d/.test(code) || code.length >= 5;
                    if (isProductCode && curTT) {
                        const values = {};
                        dateInfos.forEach(di => {
                            const val = parseFloat(String(r[di.col] || ''));
                            if (!isNaN(val)) values[di.col] = val;
                        });
                        ttData[curTT].push({ code: normCode(code), values });
                    }
                }
            }

            // Вычисляем потребление: stock[prev] - stock[curr] (только положительное = реальные продажи)
            let totalProducts = 0;

            Object.entries(ttData).forEach(([tt, products]) => {
                products.forEach(prod => {
                    const key = `${tt}_${prod.code}`;
                    let wSales = 0, wDays = 0, wdSales = 0, wdDays = 0;

                    for (let di = 1; di < dateInfos.length; di++) {
                        const prevStock = prod.values[dateInfos[di-1].col];
                        const currStock = prod.values[dateInfos[di].col];

                        if (prevStock === undefined || currStock === undefined) continue;

                        const consumption = prevStock - currStock;
                        if (consumption <= 0) continue; // Остаток вырос (доставка) — пропускаем

                        if (dateInfos[di].isWeekend) {
                            wSales += consumption;
                            wDays++;
                        } else {
                            wdSales += consumption;
                            wdDays++;
                        }
                    }

                    if (wDays > 0 || wdDays > 0) {
                        stockConsumptionData[key] = {
                            weekendSales: wSales, weekendDays: wDays,
                            weekdaySales: wdSales, weekdayDays: wdDays
                        };
                        totalProducts++;
                    }
                });
            });

            // Сохраняем в localStorage
            save(KEYS.STOCK_CONSUMPTION, stockConsumptionData);

            console.log(`[FishOrder] Расчёт потребления из остатков: ${totalProducts} товаров, ${dateInfos.length} дней`);
            console.log(`[FishOrder] С выходными данными: ${Object.values(stockConsumptionData).filter(d => d.weekendDays > 0).length}, С будними: ${Object.values(stockConsumptionData).filter(d => d.weekdayDays > 0).length}`);
        }

        // === ПАРСИНГ ВЫХОДНЫХ ПРОДАЖ ИЗ ФАЙЛА ПРОДАЖ ===
        function parseWeekendSales(json) {
            weekendSales = {};
            weekdaySales = {};
            weekendDays = {};
            weekdayDays = {};
            
            // Формат 1: Кол 0 = ТТ/код, Кол 1 = Кол-во, возможна дата в других колонках
            // Ищем колонку с датой
            const headers = json[0] || [];
            const subHeaders = json[1] || [];
            
            // Ищем колонку с датой по заголовкам
            let dateColIdx = -1;
            for (let i = 0; i < Math.max(headers.length, subHeaders.length); i++) {
                const h = String(headers[i] || subHeaders[i] || '').toLowerCase();
                if (/дата|период|date|день/.test(h)) {
                    dateColIdx = i;
                    break;
                }
            }
            
            // Если нашли колонку с датами — парсим с разбивкой по дням недели
            if (dateColIdx >= 0) {
                let curTT = '';
                for (let i = 2; i < json.length; i++) {
                    const r = json[i];
                    if (!r || r.length === 0) continue;
                    
                    const c0 = String(r[0] || '').trim();
                    const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(c0);
                    const isProductCode = /^\d/.test(c0);
                    
                    if (isTT) {
                        curTT = c0;
                    } else if (isProductCode && curTT) {
                        const qty = parseFloat(String(r[1])) || 0;
                        if (qty <= 0) continue;
                        
                        const code = normCode(c0);
                        const key = `${curTT}_${code}`;
                        const dateStr = String(r[dateColIdx] || '');
                        
                        // Пытаемся определить день недели из даты
                        let dayOfWeek = -1;
                        if (dateStr) {
                            // Пытаемся распарсить дату (Excel numeric or string format)
                            let date;
                            if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) {
                                date = new Date(dateStr);
                            } else if (/^\d{2}\.\d{2}\.\d{4}/.test(dateStr)) {
                                const parts = dateStr.split('.');
                                date = new Date(parts[2], parts[1]-1, parts[0]);
                            } else {
                                const numDate = parseFloat(dateStr);
                                if (numDate > 40000 && numDate < 60000) {
                                    // Excel serial date
                                    date = new Date((numDate - 25569) * 86400 * 1000);
                                }
                            }
                            if (date && !isNaN(date.getTime())) {
                                dayOfWeek = date.getDay(); // 0=Вс, 1=Пн, 6=Сб
                            }
                        }
                        
                        // ПН(1), СБ(6), ВС(0) = выходные для рыбы
                        const isWeekend = (dayOfWeek === 1 || dayOfWeek === 6 || dayOfWeek === 0);
                        
                        if (isWeekend) {
                            weekendSales[key] = (weekendSales[key] || 0) + qty;
                            weekendDays[key] = (weekendDays[key] || 0) + 1;
                        } else if (dayOfWeek >= 0) {
                            weekdaySales[key] = (weekdaySales[key] || 0) + qty;
                            weekdayDays[key] = (weekdayDays[key] || 0) + 1;
                        }
                    }
                }
                console.log(`[FishOrder] Выходные продажи: ${Object.keys(weekendSales).length} товаров`);
            } else {
                // Если колонка дат не найдена — разбираем продажи если файл построчный (одна продажа = одна строка с датой)
                // Ищем дату в колонках 2+ 
                let curTT = '';
                let foundDates = 0;
                
                for (let i = 2; i < json.length; i++) {
                    const r = json[i];
                    if (!r || r.length === 0) continue;
                    
                    const c0 = String(r[0] || '').trim();
                    const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(c0);
                    const isProductCode = /^\d/.test(c0);
                    
                    if (isTT) {
                        curTT = c0;
                    } else if (isProductCode && curTT) {
                        const qty = parseFloat(String(r[1])) || 0;
                        if (qty <= 0) continue;
                        
                        const code = normCode(c0);
                        const key = `${curTT}_${code}`;
                        
                        // Ищем дату в любой колонке после кол-ва
                        let dayOfWeek = -1;
                        for (let c = 2; c < r.length; c++) {
                            const cellVal = String(r[c] || '').trim();
                            if (!cellVal) continue;
                            
                            // Проверяем форматы даты
                            let date = null;
                            if (/^\d{4}-\d{2}-\d{2}/.test(cellVal)) {
                                date = new Date(cellVal);
                            } else if (/^\d{2}\.\d{2}\.\d{2,4}/.test(cellVal)) {
                                const parts = cellVal.split('.');
                                const year = parts[2].length === 2 ? '20' + parts[2] : parts[2];
                                date = new Date(year, parts[1]-1, parts[0]);
                            } else {
                                const numDate = parseFloat(cellVal);
                                if (numDate > 40000 && numDate < 60000) {
                                    date = new Date((numDate - 25569) * 86400 * 1000);
                                }
                            }
                            
                            if (date && !isNaN(date.getTime())) {
                                dayOfWeek = date.getDay();
                                foundDates++;
                                break;
                            }
                        }
                        
                        if (dayOfWeek >= 0) {
                            const isWeekend = (dayOfWeek === 1 || dayOfWeek === 6 || dayOfWeek === 0);
                            if (isWeekend) {
                                weekendSales[key] = (weekendSales[key] || 0) + qty;
                                weekendDays[key] = (weekendDays[key] || 0) + 1;
                            } else {
                                weekdaySales[key] = (weekdaySales[key] || 0) + qty;
                                weekdayDays[key] = (weekdayDays[key] || 0) + 1;
                            }
                        }
                    }
                }
                
                if (foundDates > 0) {
                    console.log(`[FishOrder] Найдено ${foundDates} дат, выходные продажи: ${Object.keys(weekendSales).length} товаров`);
                } else {
                    console.log('[FishOrder] Даты не найдены в файле продаж. Выходные продажи не рассчитаны.');
                }
            }
        }

        function getWeekendAvg(tt, code) {
            const key = `${tt}_${code}`;
            // Сначала проверяем постоянные данные из файла остатков
            const sc = stockConsumptionData[key];
            if (sc && sc.weekendDays > 0) return sc.weekendSales / sc.weekendDays;
            // Fallback: данные из файла продаж
            const days = weekendDays[key] || 0;
            return days > 0 ? weekendSales[key] / days : 0;
        }

        function getWeekdayAvg(tt, code) {
            const key = `${tt}_${code}`;
            const sc = stockConsumptionData[key];
            if (sc && sc.weekdayDays > 0) return sc.weekdaySales / sc.weekdayDays;
            const days = weekdayDays[key] || 0;
            return days > 0 ? weekdaySales[key] / days : 0;
        }

        function exportOrder() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для экспорта. Сначала откройте вкладку Заказ.');
                return;
            }

            // Собрать все текущие правки из полей ввода (на случай если onchange не успел сработать)
            collectEditsFromDOM();
            // Применить правки к savedOrderResults перед экспортом
            applyEditsToResults();

            const rows = [['№ Маг.', 'ТТ', 'Код', 'Наименование', 'Группа', 'Поставщик', 'Продажи, кг', 'Среднее/день', 'Остаток, кг', 'Доставлено', 'В пути', 'Дн. до дост.', 'Заказ, кг', 'Сумма', 'Статус']];

            savedOrderResults.forEach(r => {
                const avgDay = (r.weekendAvg > 0 || r.weekdayAvg > 0)
                    ? ((r.weekdayCount * r.weekdayAvg + r.weekendCount * r.weekendAvg) / Math.max(1, r.weekdayCount + r.weekendCount))
                    : r.avgSalesPerDay;

                if (!r.supplierOrders) {
                    // Fallback for results without supplierOrders (single supplier)
                    const editKey1 = `${r.tt}_${r.code}_${r.supplier}`;
                    const editKey2 = `${r.tt}_${r.code}`;
                    const orderQty = orderEdits[editKey1] !== undefined ? orderEdits[editKey1] : (orderEdits[editKey2] !== undefined ? orderEdits[editKey2] : r.order);
                    rows.push([
                        r.tt || '', r.tt, r.code, r.nomenclature || '', r.group || '',
                        r.supplier || '',
                        (r.sales || 0).toFixed(2),
                        avgDay > 0 ? avgDay.toFixed(3) : '—',
                        (r.currentStock || 0).toFixed(2),
                        r.deliveredQty || 0,
                        r.inTransitQty || 0,
                        r.daysUntil >= 99 ? '∞' : r.daysUntil,
                        smartRound(orderQty),
                        smartRound(orderQty * (r.inPrice || 0)).toFixed(2),
                        r.status || ''
                    ]);
                } else {
                    // Multi-supplier: one row per active supplier
                    Object.entries(r.supplierOrders).forEach(([sup, so]) => {
                        // Явно проверяем orderEdits для каждого поставщика
                        const editKey = `${r.tt}_${r.code}_${sup}`;
                        const orderQty = orderEdits[editKey] !== undefined ? orderEdits[editKey] : so.order;
                        if (orderQty <= 0 && (so.order || 0) <= 0) return;
                        const supPrice = so.inPrice || r.inPrice || 0;
                        const statusText = r.notInMatrix
                            ? (orderQty > 0 ? 'вне ассортимента (заказ)' : 'вне ассортимента')
                            : (orderQty > 0 ? 'заказ' : '');
                        const daysText = so.daysUntil === null ? 'нет доставки' : (r.daysUntil >= 99 ? '∞' : (r.daysUntil || '—'));
                        rows.push([
                            r.tt || '', r.tt, r.code, r.nomenclature || '', r.group || '',
                            sup,
                            (r.sales || 0).toFixed(2),
                            avgDay > 0 ? avgDay.toFixed(3) : '—',
                            (r.currentStock || 0).toFixed(2),
                            r.deliveredQty || 0,
                            r.inTransitQty || 0,
                            daysText,
                            smartRound(orderQty),
                            smartRound(orderQty * supPrice).toFixed(2),
                            statusText
                        ]);
                    });
                }
            });

            const headers = rows.shift();
            const ws = SharedUtils.createStyledSheet(rows, headers, [0, 1, 2, 3, 5]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Заказ рыбы');
            const d = new Date(); XLSX.writeFile(wb, `заказ_рыба_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        // === СОХРАНЕНИЕ ЗАКАЗА (один, автоудаление через 14 дней) ===
        function saveCurrentOrder() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для сохранения.');
                return;
            }

            // Собрать все текущие правки из полей ввода перед сохранением
            collectEditsFromDOM();
            // Применить правки к savedOrderResults
            applyEditsToResults();

            var supplierGroups = {};
            var totalOrderItems = 0, totalSum = 0;
            savedOrderResults.forEach(function(r) {
                if (!r.supplierOrders) return;
                Object.keys(r.supplierOrders).forEach(function(sup) {
                    var so = r.supplierOrders[sup];
                    if (!so || so.order <= 0) return;
                    if (!supplierGroups[sup]) supplierGroups[sup] = { count: 0, sum: 0 };
                    supplierGroups[sup].count++;
                    supplierGroups[sup].sum += so.sum;
                    totalOrderItems++;
                    totalSum += so.sum;
                });
            });
            var data = {
                createdAt: new Date().toISOString(),
                date: new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
                items: savedOrderResults,
                stats: savedOrderStats,
                supplierGroups: supplierGroups,
                totalOrderItems: totalOrderItems,
                totalSum: totalSum,
                orderEdits: Object.assign({}, orderEdits)
            };
            save(KEYS.SAVED_ORDER, data);
            savedOrderDate = data.date;
            // === Создать записи "В пути" из подтверждённого заказа ===
            createInTransitFromOrder(data);
            render();
        }

        // === Создать записи "В пути" на основе подтверждённого заказа ===
        function createInTransitFromOrder(orderData) {
            if (!orderData || !orderData.items) return;
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Сначала очищаем старые записи "В пути" по правилу:
            // Удаляем записи поставщиков, чья дата доставки уже прошла (deliveryDate < сегодня)
            cleanupExpiredInTransit(today);

            // Группируем товары по (поставщик, магазин)
            const groups = {};
            orderData.items.forEach(function(r) {
                if (!r.supplierOrders) return;
                Object.keys(r.supplierOrders).forEach(function(sup) {
                    const so = r.supplierOrders[sup];
                    if (!so || so.order <= 0) return;
                    const key = sup + '|||' + r.tt;
                    if (!groups[key]) groups[key] = { supplier: sup, store: r.tt, items: [] };
                    groups[key].items.push({ code: r.code, name: r.nomenclature || r.code, qty: smartRound(so.order), sum: smartRound(so.sum || 0) });
                });
            });

            Object.keys(groups).forEach(function(key) {
                const g = groups[key];
                // Определяем дату доставки — следующий день доставки этого поставщика в этот магазин
                const nextDate = getNextDeliveryDate(g.supplier, g.store);
                const expectedDate = nextDate ? nextDate.toISOString().split('T')[0] : today.toISOString().split('T')[0];

                const newOrder = {
                    id: Date.now() + Math.random(),
                    createdAt: orderData.date || new Date().toLocaleString('ru-RU'),
                    supplier: g.supplier,
                    store: g.store,
                    expectedDate: expectedDate,
                    items: g.items,
                    status: 'in_transit'
                };

                // Проверяем: есть ли уже "В пути" от этого же поставщика в этот магазин
                const existingIdx = inTransitOrders.findIndex(function(o) {
                    return o.status === 'in_transit' && o.supplier === g.supplier && o.store === g.store;
                });

                if (existingIdx >= 0) {
                    // Обновляем существующую запись
                    inTransitOrders[existingIdx] = newOrder;
                } else {
                    inTransitOrders.push(newOrder);
                }
            });

            save(KEYS.INTRANSIT, inTransitOrders);
        }

        // Очистка просроченных записей "В пути" —deliveryDate < сегодня
        function cleanupExpiredInTransit(today) {
            if (!today) {
                today = new Date();
                today.setHours(0, 0, 0, 0);
            }
            let cleaned = 0;
            inTransitOrders = inTransitOrders.filter(function(o) {
                if (o.status !== 'in_transit') return true; // delivered записи не трогаем
                if (!o.expectedDate) return true; // без даты оставляем
                const exp = new Date(o.expectedDate);
                exp.setHours(0, 0, 0, 0);
                if (exp < today) {
                    // Доставка уже была — удаляем
                    cleaned++;
                    return false;
                }
                return true;
            });
            if (cleaned > 0) {
                console.log('[FishOrder] Очищено ' + cleaned + ' просроченных записей В пути');
                save(KEYS.INTRANSIT, inTransitOrders);
            }
        }

                                                if (r.notInMatrix && so) {
                                                    if (orderVal > 0) {
                                                        return '<td class="text-center bg-blue-50" title="\u041D\u0435 \u0432 \u043C\u0430\u0442\u0440\u0438\u0446\u0435"><div class="font-bold text-sm">' + smartRound(orderVal).toFixed(1) + '</div><div class="text-[10px] text-gray-500">' + sumVal.toFixed(0) + ' \u20BD</div></td>';
                                                    }
                                                    var bgClass = deliversTomorrow ? 'bg-blue-50' : 'bg-blue-100';
                                                    var titleText = deliversTomorrow ? '\u041D\u0435 \u0432 \u043C\u0430\u0442\u0440\u0438\u0446\u0435' : '\u041D\u0435 \u0432 \u043C\u0430\u0442\u0440\u0438\u0446\u0435, \u043D\u0435\u0442 \u0434\u043E\u0441\u0442\u0430\u0432\u043A\u0438';
                                                    return '<td class="text-center ' + bgClass + '" title="' + titleText + '"><span class="text-gray-300">\u2014</span></td>';
                                                }
                                                if (!deliversTomorrow) {
                                                    var prefMark2 = (so && so.isPreferred) ? ' ★' : '';
                                                    return '<td class="text-center bg-gray-200 opacity-50" title="\u041D\u0435\u0442 \u0434\u043E\u0441\u0442\u0430\u0432\u043A\u0438 \u0437\u0430\u0432\u0442\u0440\u0430' + prefMark2 + '"><span class="text-gray-400 text-xs">\u2014</span></td>';
                                                }
                                                if (so && so.skippedByPref) {
                                                    return '<td class="text-center bg-gray-50 opacity-40" title="\u041C\u0430\u0433\u0430\u0437\u0438\u043D \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442 \u0434\u0440\u0443\u0433\u043E\u0433\u043E"><span class="text-gray-300 text-[10px]">\u0430\u0432\u0442\u043E</span></td>';
                                                }
                                                var prefBg2 = (so && so.isPreferred) ? 'ring-2 ring-violet-300 bg-violet-50' : '';
                                                if (orderVal > 0) {
                                                    return '<td class="text-center ' + cellBg + ' ' + prefBg2 + '"><div class="font-bold text-sm">' + smartRound(orderVal).toFixed(1) + '</div><div class="text-[10px] text-gray-500">' + sumVal.toFixed(0) + ' \u20BD</div></td>';
                                                }
                                                return '<td class="text-center ' + prefBg2 + '"><span class="text-gray-300">\u2014</span></td>';
                                            }).join('');
                                            return '<tr class="' + rowClass + ' hover:bg-gray-100">' +
                                                '<td class="sticky left-0 bg-white text-left cell-wrap">' + esc(r.nomenclature || '') + '</td>' +
                                                '<td class="text-center font-mono text-xs text-gray-600">' + (r.code || '') + '</td>' +
                                                '<td class="text-center text-xs text-gray-600">' + esc(r.group || '') + '</td>' +
                                                '<td class="text-center">' + (r.sales || 0).toFixed(2) + '</td>' +
                                                '<td class="text-center font-medium text-gray-500">' +
                                                    ((r.weekendAvg > 0 || r.weekdayAvg > 0) ?
                                                        ((r.weekdayCount * r.weekdayAvg + r.weekendCount * r.weekendAvg) / Math.max(1, r.weekdayCount + r.weekendCount)).toFixed(3) :
                                                        (r.avgSalesPerDay > 0 ? r.avgSalesPerDay.toFixed(3) : '\u2014')) + '</td>' +
                                                '<td class="text-center">' + (r.currentStock || 0).toFixed(2) + '</td>' +
                                                supplierCells +
                                                '<td class="text-left text-xs ' + (r.notInMatrix ? 'text-blue-600 font-medium italic' : r.hasConflict ? 'text-amber-700 font-medium' : r.order > 0 ? 'text-emerald-700' : 'text-gray-500') + '">' + esc(r.status || '') + '</td>' +
                                                (hasWishesSaved ? (() => {
                                                    var wish = getStoreWish(r.tt, r.code);
                                                    if (!wish) return '<td class="text-center"></td>';
                                                    return '<td class="text-center bg-violet-50"><div class="text-[10px] text-violet-500">' + esc(wish.tt) + (wish.supplier ? ' &rarr; ' + esc(wish.supplier) : '') + '</div><div class="font-bold text-violet-700">' + wish.qty + '</div></td>';
                                                })() : '') +
                                            '</tr>';
                                }).join(''));
                            }).join(''));
                        }).join('') +
                    '</tbody></table></div></div></div>';
        }

        // === ПОПАП СУММ ЗАКАЗА ПО МАГАЗИНАМ ===
        function showOrderSumsByStore(el) {
            document.querySelectorAll('.store-sums-popup').forEach(e => e.remove());

            if (!savedOrderResults || savedOrderResults.length === 0) return;

            const storeSums = {};
            const storeCounts = {};
            savedOrderResults.forEach(r => {
                if (r.order > 0) {
                    storeSums[r.tt] = (storeSums[r.tt] || 0) + r.sum;
                    storeCounts[r.tt] = (storeCounts[r.tt] || 0) + 1;
                }
            });

            const sortedStores = Object.entries(storeSums).sort((a, b) => b[1] - a[1]);
            const totalSum = Object.values(storeSums).reduce((s, v) => s + v, 0);

            const popup = document.createElement('div');
            popup.className = 'store-sums-popup';
            popup.style.cssText = 'position:fixed;z-index:200;background:white;border:1px solid #e5e7eb;border-radius:12px;padding:0;box-shadow:0 12px 40px rgba(0,0,0,0.2);min-width:320px;max-width:420px;max-height:70vh;overflow:hidden;pointer-events:auto;font-family:system-ui,sans-serif;';

            let totalPositions = 0;
            sortedStores.forEach(([, count]) => totalPositions += count);

            popup.innerHTML = `
                <div style="background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;padding:12px 16px;border-radius:12px 12px 0 0;">
                    <div style="font-size:14px;font-weight:700;">Суммы заказов по магазинам</div>
                    <div style="font-size:11px;opacity:0.8;margin-top:2px;">${sortedStores.length} магазинов • ${totalPositions} поз. на ${totalSum.toFixed(0)} ₽</div>
                </div>
                <div style="max-height:50vh;overflow-y:auto;padding:4px 0;">
                    ${sortedStores.map(([tt, sum], i) => `
                        <div style="display:flex;align-items:center;padding:8px 16px;gap:10px;${i % 2 === 0 ? 'background:#f9fafb;' : ''}border-bottom:1px solid #f3f4f6;">
                            <div style="width:24px;height:24px;border-radius:6px;background:#ede9fe;color:#6d28d9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">${i + 1}</div>
                            <div style="flex:1;min-width:0;">
                                <div style="font-size:12px;font-weight:600;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${tt}</div>
                                <div style="font-size:10px;color:#6b7280;">${storeCounts[tt]} поз.</div>
                            </div>
                            <div style="font-size:13px;font-weight:700;color:#6d28d9;white-space:nowrap;">${sum.toFixed(0)} ₽</div>
                        </div>
                    `).join('')}
                </div>
                <div style="background:#f3f4f6;padding:10px 16px;border-radius:0 0 12px 12px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:11px;color:#6b7280;">Итого:</span>
                    <span style="font-size:15px;font-weight:800;color:#4c1d95;">${totalSum.toFixed(0)} ₽</span>
                </div>
                <div style="padding:4px 16px 8px;text-align:center;">
                    <span style="font-size:9px;color:#9ca3af;">Кликните вне чтобы закрыть</span>
                </div>
            `;
            document.body.appendChild(popup);

            const rect = el.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 160;
            let top = rect.bottom + 8;
            if (left < 8) left = 8;
            if (left + 420 > window.innerWidth) left = window.innerWidth - 428;
            if (top + 400 > window.innerHeight) top = rect.top - 400;
            if (top < 8) top = 8;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';

            setTimeout(() => {
                function close(e) {
                    if (!popup.contains(e.target) && e.target !== el) {
                        popup.remove();
                        document.removeEventListener('mousedown', close);
                        document.removeEventListener('touchstart', close);
                    }
                }
                document.addEventListener('mousedown', close);
                document.addEventListener('touchstart', close);
            }, 50);
        }

        function clearSalesAndStocks() {
            localStorage.removeItem(KEYS.SALES);
            localStorage.removeItem(KEYS.STOCKS);
            sales = [];
            stocks = [];
            resetSavedOrders();
            render();
            alert('Продажи и остатки очищены');
        }

        function clearAll() {
            [KEYS.ASSORTMENT, KEYS.MATRIX_MARKS, KEYS.SALES, KEYS.STOCKS, KEYS.SCHEDULE, KEYS.INTRANSIT, KEYS.SUPPLIER_ASSORTMENT, KEYS.STORE_SUPPLIER_PREFS].forEach(k => localStorage.removeItem(k));
            matrix = {}; matrixMarks = {}; sales = []; stocks = [];
            deliverySchedule = {}; inTransitOrders = []; supplierAssortment = {}; storeSupplierPrefs = {};
            currentLoadedAssortment = null;
            resetSavedOrders();
            render();
            alert('Данные очищены');
        }

        // Инициализация с защитой от CloudStorage (если storage.js загружен другой страницей)
        function safeInit() {
            try { init(); } catch(e) {
                console.error('Init error:', e);
                document.getElementById('content').innerHTML = '<div class="p-4 text-red-600">Ошибка инициализации: ' + e.message + '</div>';
            }
        }
        if (window.CloudStorage && !window.CloudStorage.isReady()) {
            // CloudStorage существует но не готов — ждём с таймаутом 3 сек
            window.addEventListener('cloudStorageReady', function onReady() {
                window.removeEventListener('cloudStorageReady', onReady);
                clearTimeout(cloudTimeout);
                safeInit();
            });
            var cloudTimeout = setTimeout(function() {
                console.warn('[FishOrder] CloudStorage timeout — запускаем init без ожидания облака');
                safeInit();
            }, 3000);
        } else {
            safeInit();
        }

        // После загрузки из облака — перечитываем данные и перерисовываем
        window.addEventListener('cloudStorageReady', () => {
            loadStoresFromHTML();
            sales = load(KEYS.SALES, []);
            stocks = load(KEYS.STOCKS, []);
            deliverySchedule = load(KEYS.SCHEDULE, {});
            const sk = Object.keys(deliverySchedule);
            if (sk.length > 0 && !sk.includes(selectedScheduleSupplier)) selectedScheduleSupplier = sk[0];
            inTransitOrders = load(KEYS.INTRANSIT, []);
            supplierAssortment = load(KEYS.SUPPLIER_ASSORTMENT, {});
            storeSupplierPrefs = load(KEYS.STORE_SUPPLIER_PREFS, {});
            render();
        });
    </script>
</body>
</html>
