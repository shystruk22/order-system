        // === ИМПОРТ ПОЖЕЛАНИЙ МАГАЗИНОВ ===
        function importStoreWishes(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            input.value = '';

            const reader = new FileReader();
            reader.onerror = function(e) {
                alert('Ошибка чтения файла: ' + (e.target.error ? e.target.error.message : 'неизвестная ошибка'));
                console.error('[Wishes] FileReader error:', e);
            };
            reader.onload = function(e) {
                try {
                    let wb;
                    try {
                        wb = XLSX.read(e.target.result, { type: 'array' });
                    } catch(err1) {
                        console.warn('[Wishes] array parse failed, trying binary:', err1.message);
                        try {
                            // Конвертируем ArrayBuffer в binary string для совместимости
                            const arr = new Uint8Array(e.target.result);
                            let binaryStr = '';
                            for (let i = 0; i < arr.length; i++) binaryStr += String.fromCharCode(arr[i]);
                            wb = XLSX.read(binaryStr, { type: 'binary' });
                        } catch(err2) {
                            throw new Error('Не удалось прочитать файл Excel.\nПопробуйте пересохранить файл в формате .xlsx\n\nОшибка: ' + err2.message);
                        }
                    }

                    // Ищем лучший лист: "Желаемые позиции" > "Заказ" > первый лист
                    let ws = null;
                    let sheetName = '';
                    const prioritySheets = ['Желаемые позиции', 'Желаемые', 'Пожелания', 'Заказ', 'Wishes'];
                    for (let sn of prioritySheets) {
                        if (wb.Sheets[sn]) {
                            ws = wb.Sheets[sn];
                            sheetName = sn;
                            break;
                        }
                    }
                    if (!ws) {
                        ws = wb.Sheets[wb.SheetNames[0]];
                        sheetName = wb.SheetNames[0];
                    }
                    if (!ws) throw new Error('В файле нет листов с данными');

                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                    if (rows.length < 2) { alert('Файл пуст или нет данных'); return; }

                    // Пропускаем пустые строки в начале
                    let startRow = 0;
                    while (startRow < rows.length && (!rows[startRow] || (rows[startRow] && rows[startRow].every(c => !c && c !== 0)))) {
                        startRow++;
                    }
                    if (startRow >= rows.length - 1) { alert('Файл пуст или нет данных'); return; }

                    const headers = rows[startRow].map(h => String(h || '').trim().toLowerCase());
                    let colTT = -1, colSupplier = -1, colCode = -1, colName = -1, colQty = -1;

                    // Поиск колонок
                    let codeCols = [];
                    headers.forEach(function(h, idx) {
                        // Магазин / ТТ
                        if (h === 'магазин' || h.includes('магазин') || h === 'тт' || h === 'торг' || h === 'точка' || h === 'склад') colTT = idx;
                        // Поставщик
                        if (h.includes('поставщик') || (h.includes('пост') && !h.includes('сопост'))) colSupplier = idx;
                        // Код (исключаем весовой)
                        if (h.includes('код') && !h.includes('весов')) codeCols.push(idx);
                        // Наименование
                        if (h.includes('наимен') || h.includes('товар') || h.includes('имя') || h === 'name') colName = idx;
                        // Количество / Вес (исключаем колонки с "код" в названии типа "Код весовой")
                        if ((h.includes('вес') || h.includes('кол') || h.includes('qty') || h === 'количество' || h === 'кг' || h.includes('кол-во')) && !h.includes('код')) colQty = idx;
                    });
                    colCode = codeCols.length > 0 ? codeCols[0] : -1;

                    console.log('[Wishes] Лист:', sheetName, 'Строка заголовков:', startRow, 'Колонки:', { colTT, colSupplier, colCode, colName, colQty, headers });

                    if (colTT < 0) { alert('Не найдена колонка "Магазин/ТТ/Склад" в файле.\n\nЗаголовки: ' + rows[startRow].join(', ')); return; }
                    if (colCode < 0) { alert('Не найдена колонка "Код" в файле.\n\nЗаголовки: ' + rows[startRow].join(', ')); return; }
                    if (colQty < 0) { alert('Не найдена колонка с количеством (Вес/Количество) в файле.\n\nЗаголовки: ' + rows[startRow].join(', ')); return; }

                    // Сопоставляем полное название магазина из файла с коротким ТТ из stores
                    const storeMapping = {};
                    stores.forEach(function(s) {
                        storeMapping[s.tt.toLowerCase()] = s.tt;
                    });

                    function matchStore(fileStoreName) {
                        const lower = fileStoreName.toLowerCase();
                        if (storeMapping[lower]) return storeMapping[lower];
                        for (var key in storeMapping) {
                            if (lower.includes(key) || key.includes(lower)) return storeMapping[key];
                        }
                        return fileStoreName;
                    }

                    storeWishes = [];
                    let imported = 0, skippedEmpty = 0;

                    for (let ri = startRow + 1; ri < rows.length; ri++) {
                        const row = rows[ri];
                        if (!row || row.length === 0) continue;

                        try {
                            const rawTT = String(row[colTT] || '').trim();
                            if (!rawTT) continue;

                            const rawCode = String(row[colCode] || '').trim();
                            const code = normCode(rawCode);
                            if (!code || code === '0') continue;

                            const tt = matchStore(rawTT);
                            const supplier = colSupplier >= 0 ? String(row[colSupplier] || '').trim() : '';
                            const name = colName >= 0 ? String(row[colName] || '').trim() : (matrix[code] ? matrix[code].nomenclature : '');
                            const rawQty = row[colQty];
                            const qty = parseFloat(String(rawQty).replace(',', '.'));
                            if (isNaN(qty) || qty <= 0) { skippedEmpty++; continue; }

                            const exists = storeWishes.some(function(w) { return w.tt === tt && w.code === code; });
                            if (exists) continue;

                            storeWishes.push({ tt: tt, supplier: supplier, code: code, name: name, qty: smartRound(qty) });
                            imported++;
                        } catch(rowErr) {
                            console.warn('[Wishes] Error parsing row', ri, ':', rowErr);
                            continue;
                        }
                    }

                    save(KEYS.STORE_WISHES, storeWishes);
                    render();
                    let msg = 'Импортировано пожеланий: ' + imported;
                    if (skippedEmpty > 0) msg += '\nПропущено (пустые/недопустимые): ' + skippedEmpty;
                    alert(msg);
                } catch (err) {
                    console.error('[Wishes] Import error:', err);
                    alert('Ошибка при импорте пожеланий: ' + err.message + '\n\nПопробуйте пересохранить файл в формате .xlsx');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Получить пожелание для конкретной ТТ + кода
        function getStoreWish(tt, code) {
            if (!storeWishes || storeWishes.length === 0) return null;
            return storeWishes.find(function(w) {
                return w.tt === tt && w.code === code;
            }) || null;
        }

        // Удалить пожелание
        function removeStoreWish(tt, code) {
            storeWishes = storeWishes.filter(function(w) {
                return !(w.tt === tt && w.code === code);
            });
            save(KEYS.STORE_WISHES, storeWishes);
            render();
        }

        // Очистить все пожелания
        function clearStoreWishes() {
            if (storeWishes.length === 0) return;
            if (!confirm('Очистить все пожелания магазинов (' + storeWishes.length + ' шт.)?')) return;
            storeWishes = [];
            save(KEYS.STORE_WISHES, storeWishes);
            render();
        }

        // === Экспорт/Импорт ТОЛЬКО ассортимента и предпочтений магазинов ===
        function exportAssortmentData() {
            const supplierNames = Object.keys(deliverySchedule);
            if (supplierNames.length === 0) { alert('Нет поставщиков. Сначала добавьте поставщиков в графике доставок.'); return; }

            const wb = XLSX.utils.book_new();

            // Лист 1: Ассортимент поставщиков (галочки)
            const saHeaders = ['Код', 'Наименование', 'Группа', ...supplierNames];
            const saData = [];
            Object.keys(matrix).forEach(code => {
                const p = matrix[code];
                const sups = supplierAssortment[code] || [];
                const hasAny = sups.length > 0;
                if (hasAny) {
                    saData.push([
                        code,
                        p.nomenclature || '',
                        p.group || '',
                        ...supplierNames.map(s => sups.includes(s) ? 'Да' : '')
                    ]);
                }
            });
            if (saData.length === 0) {
                alert('Ассортимент поставщиков пуст — нет ни одной выбранной позиции. Сначала расставьте галочки.');
                return;
            }
            const ws1 = SharedUtils.createStyledSheet(saData, saHeaders, []);
            XLSX.utils.book_append_sheet(wb, ws1, 'Ассортимент поставщиков');

            // Лист 2: Предпочтения магазинов
            const prefCodes = Object.keys(storeSupplierPrefs).filter(c => Object.keys(storeSupplierPrefs[c]).length > 0);
            if (prefCodes.length > 0) {
                const allStoresInPrefs = new Set();
                prefCodes.forEach(code => Object.keys(storeSupplierPrefs[code]).forEach(tt => allStoresInPrefs.add(tt)));
                const storeList = stores.map(s => s.tt).filter(tt => allStoresInPrefs.has(tt));

                const prefHeaders = ['Код', 'Наименование', ...storeList];
                const prefData = [];
                prefCodes.forEach(code => {
                    const p = matrix[code];
                    const prefs = storeSupplierPrefs[code] || {};
                    prefData.push([
                        code,
                        p ? (p.nomenclature || '') : '',
                        ...storeList.map(tt => prefs[tt] || '')
                    ]);
                });
                const ws2 = SharedUtils.createStyledSheet(prefData, prefHeaders, []);
                XLSX.utils.book_append_sheet(wb, ws2, 'Предпочтения магазинов');
            }

            const d = new Date();
            XLSX.writeFile(wb, 'ассортимент_поставщиков_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx');
        }

        function importAssortmentData(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            input.value = '';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const wb = XLSX.read(e.target.result, { type: 'array' });
                    const supplierNamesNow = Object.keys(deliverySchedule);
                    let updatedAssortment = 0;
                    let updatedPrefs = 0;

                    // Лист 1: Ассортимент поставщиков
                    const ws1 = wb.Sheets['Ассортимент поставщиков'];
                    if (ws1) {
                        const rows = XLSX.utils.sheet_to_json(ws1, { header: 1 });
                        if (rows.length > 0) {
                            const fileHeaders = rows[0].map(h => String(h || '').trim());
                            const supplierCols = {};
                            fileHeaders.forEach((h, idx) => {
                                if (idx >= 3 && supplierNamesNow.includes(h)) {
                                    supplierCols[h] = idx;
                                }
                            });

                            if (Object.keys(supplierCols).length === 0) {
                                // Если не нашли поставщиков по имени — пробуем все колонки после 3-й
                                fileHeaders.forEach((h, idx) => {
                                    if (idx >= 3) supplierCols[h] = idx;
                                });
                            }

                            rows.slice(1).forEach(row => {
                                const code = normCode(String(row[0] || ''));
                                if (!code || code === '0') return;
                                const matrixKey = matrix[code] ? code : (matrix[String(row[0] || '').trim()] ? String(row[0] || '').trim() : null);
                                if (!matrixKey) return;

                                if (!supplierAssortment[matrixKey]) supplierAssortment[matrixKey] = [];

                                Object.entries(supplierCols).forEach(([supName, colIdx]) => {
                                    const val = String(row[colIdx] || '').trim().toLowerCase();
                                    if (val === 'да' || val === 'yes' || val === '1' || val === 'true') {
                                        if (!supplierAssortment[matrixKey].includes(supName)) {
                                            supplierAssortment[matrixKey].push(supName);
                                            updatedAssortment++;
                                        }
                                    } else {
                                        const idx2 = supplierAssortment[matrixKey].indexOf(supName);
                                        if (idx2 >= 0) {
                                            supplierAssortment[matrixKey].splice(idx2, 1);
                                        }
                                    }
                                });
                            });
                            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
                        }
                    } else {
                        alert('В файле не найден лист "Ассортимент поставщиков". Убедитесь что это правильный файл.');
                        return;
                    }

                    // Лист 2: Предпочтения магазинов
                    const ws2 = wb.Sheets['Предпочтения магазинов'];
                    if (ws2) {
                        const rows = XLSX.utils.sheet_to_json(ws2, { header: 1 });
                        if (rows.length > 0) {
                            const fileHeaders = rows[0].map(h => String(h || '').trim());
                            const storeCols = {};
                            fileHeaders.forEach((h, idx) => {
                                if (idx >= 2) storeCols[h] = idx;
                            });

                            rows.slice(1).forEach(row => {
                                const code = String(row[0] || '').trim();
                                if (!code) return;

                                Object.entries(storeCols).forEach(([tt, colIdx]) => {
                                    const val = String(row[colIdx] || '').trim();
                                    if (val) {
                                        if (!storeSupplierPrefs[code]) storeSupplierPrefs[code] = {};
                                        storeSupplierPrefs[code][tt] = val;
                                        updatedPrefs++;
                                    }
                                });
                            });
                            save(KEYS.STORE_SUPPLIER_PREFS, storeSupplierPrefs);
                        }
                    }

                    ensureSupplierAssortment();
                    render();

                    let msg = 'Ассортимент импортирован!\n\n';
                    if (updatedAssortment > 0) msg += '• Галочки ассортимента: ' + updatedAssortment + ' связей обновлено\n';
                    if (updatedPrefs > 0) msg += '• Предпочтения магазинов: ' + updatedPrefs + ' настроек\n';
                    if (updatedAssortment === 0 && updatedPrefs === 0) msg += 'Изменений не найдено (возможно данные уже актуальны).';
                    alert(msg);

                } catch (err) {
                    alert('Ошибка при импорте ассортимента: ' + err.message);
                    console.error('Import assortment error:', err);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function exportSupplierData() {
            const supplierNames = Object.keys(deliverySchedule);
            if (supplierNames.length === 0) { alert('Нет поставщиков для экспорта'); return; }

            const wb = XLSX.utils.book_new();

            // === Лист 1: График доставок ===
            const schedHeaders = ['Магазин', ...DAY_NAMES, 'Итого дней'];
            const schedData = [];
            supplierNames.forEach(supplier => {
                schedData.push([]); // разделитель
                schedData.push([supplier]); // название поставщика
                const supplierData = deliverySchedule[supplier] || {};
                stores.forEach(s => {
                    const days = supplierData[s.tt] || [];
                    const activeCount = days.filter(Boolean).length;
                    schedData.push([
                        s.tt,
                        ...days.map(d => d ? 'Да' : ''),
                        activeCount > 0 ? activeCount + ' дн.' : ''
                    ]);
                });
            });
            const ws1 = SharedUtils.createStyledSheet(schedData, schedHeaders, [0]);
            XLSX.utils.book_append_sheet(wb, ws1, 'График доставок');

            // === Лист 2: Ассортимент поставщиков (галочки) ===
            const saHeaders = ['Код', 'Наименование', 'Группа', ...supplierNames];
            const saData = [];
            Object.keys(matrix).forEach(code => {
                const p = matrix[code];
                const sups = supplierAssortment[code] || [];
                saData.push([
                    code,
                    p.nomenclature || '',
                    p.group || '',
                    ...supplierNames.map(s => sups.includes(s) ? 'Да' : '')
                ]);
            });
            const ws2 = SharedUtils.createStyledSheet(saData, saHeaders, []);
            XLSX.utils.book_append_sheet(wb, ws2, 'Ассортимент поставщиков');

            // === Лист 3: Цены поставщиков ===
            const spHeaders = ['Код', 'Наименование', ...supplierNames];
            const spData = [];
            Object.keys(matrix).forEach(code => {
                const p = matrix[code];
                const prices = supplierPrices[code] || {};
                const hasAny = supplierNames.some(s => prices[s] > 0);
                if (hasAny) {
                    spData.push([
                        code,
                        p.nomenclature || '',
                        ...supplierNames.map(s => prices[s] || '')
                    ]);
                }
            });
            if (spData.length > 0) {
                const ws3 = SharedUtils.createStyledSheet(spData, spHeaders, []);
                XLSX.utils.book_append_sheet(wb, ws3, 'Цены поставщиков');
            }

            // === Лист 4: Предпочтения магазинов ===
            const prefCodes = Object.keys(storeSupplierPrefs).filter(c => Object.keys(storeSupplierPrefs[c]).length > 0);
            if (prefCodes.length > 0) {
                const allStoresInPrefs = new Set();
                prefCodes.forEach(code => Object.keys(storeSupplierPrefs[code]).forEach(tt => allStoresInPrefs.add(tt)));
                const storeList = stores.map(s => s.tt).filter(tt => allStoresInPrefs.has(tt));

                const prefHeaders = ['Код', 'Наименование', ...storeList];
                const prefData = [];
                prefCodes.forEach(code => {
                    const p = matrix[code];
                    const prefs = storeSupplierPrefs[code] || {};
                    prefData.push([
                        code,
                        p ? (p.nomenclature || '') : '',
                        ...storeList.map(tt => prefs[tt] || '')
                    ]);
                });
                const ws4 = SharedUtils.createStyledSheet(prefData, prefHeaders, []);
                XLSX.utils.book_append_sheet(wb, ws4, 'Предпочтения магазинов');
            }

            const d = new Date();
            XLSX.writeFile(wb, 'поставщики_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.xlsx');
        }

        function importSupplierData(input) {
            if (!input || !input.files || !input.files[0]) return;
            const file = input.files[0];
            input.value = ''; // сброс для повторного выбора

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const wb = XLSX.read(e.target.result, { type: 'array' });
                    let updatedSchedule = false;
                    let updatedAssortment = 0;
                    let updatedPrices = 0;

                    // === Лист 1: График доставок ===
                    const ws1 = wb.Sheets['График доставок'];
                    if (ws1) {
                        const rows = XLSX.utils.sheet_to_json(ws1, { header: 1 });
                        let currentSupplier = '';
                        rows.forEach(row => {
                            if (!row || row.length === 0) { currentSupplier = ''; return; }
                            // Если первая ячейка — не число дней и не магазин, это название поставщика
                            const firstVal = String(row[0] || '').trim();
                            if (firstVal && !stores.some(s => s.tt === firstVal)) {
                                // Проверяем: если дальше есть Да/'' — это магазин, иначе — поставщик
                                const hasDayMarks = row.slice(1, 8).some(c => String(c || '').trim().toLowerCase() === 'да');
                                if (!hasDayMarks) {
                                    currentSupplier = firstVal;
                                    if (!deliverySchedule[currentSupplier]) {
                                        deliverySchedule[currentSupplier] = {};
                                    }
                                    return;
                                }
                            }
                            // Строка магазина
                            if (currentSupplier && firstVal) {
                                const tt = firstVal;
                                const emptyWeek = [false, false, false, false, false, false, false];
                                const days = [];
                                for (let i = 0; i < 7; i++) {
                                    days.push(String(row[1 + i] || '').trim().toLowerCase() === 'да');
                                }
                                deliverySchedule[currentSupplier][tt] = days;
                                updatedSchedule = true;
                            }
                        });
                        if (updatedSchedule) save(KEYS.SCHEDULE, deliverySchedule);
                    }

                    // Обновляем список магазинов если нужно
                    const allStoresInSchedule = new Set();
                    Object.values(deliverySchedule).forEach(supData => {
                        Object.keys(supData).forEach(tt => allStoresInSchedule.add(tt));
                    });
                    // Добавляем новые магазины из графика в stores
                    allStoresInSchedule.forEach(tt => {
                        if (!stores.some(s => s.tt === tt)) {
                            stores.push({ tt: tt });
                        }
                    });

                    // Обновляем knownFishSuppliers после импорта графика
                    const supplierNamesNow = Object.keys(deliverySchedule);

                    // === Лист 2: Ассортимент поставщиков (галочки) ===
                    const ws2 = wb.Sheets['Ассортимент поставщиков'];
                    if (ws2) {
                        const rows = XLSX.utils.sheet_to_json(ws2, { header: 1 });
                        if (rows.length > 0) {
                            const fileHeaders = rows[0].map(h => String(h || '').trim());
                            // Ищем колонки поставщиков (начиная с 4-го индекса)
                            const supplierCols = {};
                            fileHeaders.forEach((h, idx) => {
                                if (idx >= 3 && supplierNamesNow.includes(h)) {
                                    supplierCols[h] = idx;
                                }
                            });

                            rows.slice(1).forEach(row => {
                                const code = normCode(String(row[0] || ''));
                                if (!code || code === '0') return;
                                const matrixKey = matrix[code] ? code : (matrix[String(row[0] || '').trim()] ? String(row[0] || '').trim() : null);
                                if (!matrixKey) return;

                                if (!supplierAssortment[matrixKey]) supplierAssortment[matrixKey] = [];

                                Object.entries(supplierCols).forEach(([supName, colIdx]) => {
                                    const val = String(row[colIdx] || '').trim().toLowerCase();
                                    if (val === 'да' || val === 'yes' || val === '1' || val === 'true') {
                                        if (!supplierAssortment[matrixKey].includes(supName)) {
                                            supplierAssortment[matrixKey].push(supName);
                                            updatedAssortment++;
                                        }
                                    } else {
                                        const idx2 = supplierAssortment[matrixKey].indexOf(supName);
                                        if (idx2 >= 0) {
                                            supplierAssortment[matrixKey].splice(idx2, 1);
                                        }
                                    }
                                });
                            });
                            save(KEYS.SUPPLIER_ASSORTMENT, supplierAssortment);
                        }
                    }

                    // === Лист 3: Цены поставщиков ===
                    const ws3 = wb.Sheets['Цены поставщиков'];
                    if (ws3) {
                        const rows = XLSX.utils.sheet_to_json(ws3, { header: 1 });
                        if (rows.length > 0) {
                            const fileHeaders = rows[0].map(h => String(h || '').trim());
                            const supplierCols = {};
                            fileHeaders.forEach((h, idx) => {
                                if (idx >= 2 && supplierNamesNow.includes(h)) {
                                    supplierCols[h] = idx;
                                }
                            });

                            rows.slice(1).forEach(row => {
                                const rawCode = String(row[0] || '').trim();
                                if (!rawCode) return;
                                const code = normCode(rawCode);

                                Object.entries(supplierCols).forEach(([supName, colIdx]) => {
                                    const val = parseFloat(row[colIdx]);
                                    if (!isNaN(val) && val > 0) {
                                        if (!supplierPrices[code]) supplierPrices[code] = {};
                                        supplierPrices[code][supName] = val;
                                        updatedPrices++;
                                    }
                                });
                            });
                            save(KEYS.SUPPLIER_PRICES, supplierPrices);
                        }
                    }

                    ensureSupplierAssortment();

                    // === Лист 4: Предпочтения магазинов ===
                    let updatedPrefs = 0;
                    const ws4 = wb.Sheets['Предпочтения магазинов'];
                    if (ws4) {
                        const rows = XLSX.utils.sheet_to_json(ws4, { header: 1 });
                        if (rows.length > 0) {
                            const fileHeaders = rows[0].map(h => String(h || '').trim());
                            // Колонки магазинов (начиная с индекса 2)
                            const storeCols = {};
                            fileHeaders.forEach((h, idx) => {
                                if (idx >= 2) storeCols[h] = idx;
                            });

                            rows.slice(1).forEach(row => {
                                const code = String(row[0] || '').trim();
                                if (!code) return;

                                Object.entries(storeCols).forEach(([tt, colIdx]) => {
                                    const val = String(row[colIdx] || '').trim();
                                    if (val) {
                                        if (!storeSupplierPrefs[code]) storeSupplierPrefs[code] = {};
                                        storeSupplierPrefs[code][tt] = val;
                                        updatedPrefs++;
                                    }
                                });
                            });
                            save(KEYS.STORE_SUPPLIER_PREFS, storeSupplierPrefs);
                        }
                    }

                    render();

                    let msg = 'Данные поставщиков импортированы!\n\n';
                    if (updatedSchedule) msg += '• График доставок: обновлён\n';
                    if (updatedAssortment > 0) msg += '• Ассортимент поставщиков: ' + updatedAssortment + ' связей\n';
                    if (updatedPrices > 0) msg += '• Цены поставщиков: ' + updatedPrices + ' цен\n';
                    if (updatedPrefs > 0) msg += '• Предпочтения магазинов: ' + updatedPrefs + ' настроек\n';
                    if (!updatedSchedule && updatedAssortment === 0 && updatedPrices === 0 && updatedPrefs === 0) {
                        msg += 'Изменений не найдено.';
                    }
                    alert(msg);

                } catch (err) {
                    alert('Ошибка при импорте: ' + err.message);
                    console.error('Import error:', err);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // === МАТРИЦА ===
        function renderMatrix() {

            <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">

        function toggleMatrixCell(code, tt) {
            if (!matrixMarks[code]) matrixMarks[code] = {};
            matrixMarks[code][tt] = matrixMarks[code][tt] === 'ДА' ? 'НЕТ' : 'ДА';
            save(KEYS.MATRIX_MARKS, matrixMarks);
            render();
        }

        function deleteFromMatrix(code) {
            if (confirm(`Удалить "${matrix[code]?.nomenclature || code}"?`)) {
                delete matrix[code];
                delete matrixMarks[code];
                syncFishAssortment();
                save(KEYS.MATRIX_MARKS, matrixMarks);
                render();
            }
        }

        function importMatrix(input) {
            resetSavedOrders();
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
                    const headers = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 })[0] || [];

                    json.forEach(row => {
                        const code = normCode(String(row['Код'] || ''));
                        if (!code) return;

                        if (!matrix[code]) {
                            matrix[code] = { nomenclature: String(row['Наименование'] || '').trim(), code, group: String(row['Группа'] || '').trim() };
                        } else {
                            if (!matrix[code].group) matrix[code].group = String(row['Группа'] || '').trim();
                            if (!matrix[code].nomenclature) matrix[code].nomenclature = String(row['Наименование'] || '').trim();
                        }

                        if (!matrixMarks[code]) matrixMarks[code] = {};
                        headers.forEach((h, i) => {
                            if (i > 2 && h) {
                                const ttName = String(h).trim();
                                if (stores.some(s => s.tt === ttName)) {
                                    const val = String(row[ttName] || Object.values(row)[i] || '').toUpperCase();
                                    matrixMarks[code][ttName] = val === 'ДА' || val === 'YES' || val === '1' ? 'ДА' : 'НЕТ';
                                }
                            }
                        });
                    });
                    syncFishAssortment();
                    save(KEYS.MATRIX_MARKS, matrixMarks);
                    render();
                    alert(`Ассортимент: ${Object.keys(matrix).length} товаров\nОтметки матрицы: ${Object.keys(matrixMarks).length} товаров`);
                } catch (err) { alert('Ошибка: ' + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = '';
        }

        function exportMatrix() {
            if (Object.keys(matrix).length === 0) { alert('Нет данных'); return; }
            const headers = ['Группа', 'Наименование', 'Код', ...stores.map(s => s.tt)];
            const data = [];
            Object.entries(matrix).forEach(([code, p]) => {
                const row = [p.group || '', p.nomenclature || '', code];
                stores.forEach(s => row.push((matrixMarks[code] && matrixMarks[code][s.tt] === 'ДА') ? 'ДА' : 'НЕТ'));
                data.push(row);
            });
            const ws = SharedUtils.createStyledSheet(data, headers, [0, 1]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Матрица');
            const d = new Date(); XLSX.writeFile(wb, `матрица_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.xlsx`);
        }

        // === DEBOUNCE ПОИСКА ===
        function onOrderSearch(input) {

            render();

        function debounceSearchAssort(input) {

            const pos = input.selectionStart;

                searchAssort = val;
                render();
                setTimeout(() => {

        let searchTimeoutMatrix = null;
        function debounceMatrixSearch() {
            const input = document.getElementById('matrixSearchInput');
            if (!input) return;
            const val = input.value;
            const pos = input.selectionStart;
            clearTimeout(searchTimeoutMatrix);
            searchTimeoutMatrix = setTimeout(() => {
                searchMatrix = val;
                render();
                setTimeout(() => {
                    const el = document.getElementById('matrixSearchInput');
                    if (el) { el.focus(); el.setSelectionRange(pos, pos); }
                }, 10);
            }, 200);

        // === ЗАКАЗ ===
        function roundOrderQty(rawOrder, quant) {
            if (rawOrder <= 2) return 0;
            return Math.max(quant, Math.round(rawOrder / quant) * quant);
        }

        function calcOrder(stock, avgDay, periodDays, quant, shelf, packaging) {
            const minStock = shelf || 0;
            const prelim = stock - (avgDay * periodDays) - minStock;

            if (prelim > 1) return 0;

            let rawOrder;
            if (prelim < 0) {
                rawOrder = Math.abs(prelim);
            } else {
                rawOrder = 1;
            }

            if (packaging === 'КГ') {
                return Math.ceil(rawOrder / quant) * quant;
            }

            return roundOrderQty(rawOrder, quant);
        }

        // === ХЕЛПЕРЫ ДЛЯ РЫБНОГО ЗАКАЗА ===

        // Автоматическое закрытие заказов, у которых expectedDate <= сегодня
        function autoCloseDeliveredOrders() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let closed = 0;
            inTransitOrders.forEach(o => {
                if (o.status === 'in_transit' && o.expectedDate) {
                    const exp = new Date(o.expectedDate);
                    exp.setHours(0, 0, 0, 0);
                    if (exp <= today) {
                        o.status = 'delivered';
                        o.deliveredAt = today.toISOString().split('T')[0];
                        // Инициализируем arrived для каждого товара
                        if (!o.items) o.items = [];
                        o.items.forEach(item => {
                            if (item.arrived === undefined) item.arrived = true; // по умолчанию всё приехало
                        });
                        closed++;
                    }
                }
            });
            if (closed > 0) {
                save(KEYS.INTRANSIT, inTransitOrders);
                console.log(`[FishOrder] Автозакрыто ${closed} заказ(ов) по графику доставок`);
            }
        }

        // Количество доставленных товаров для ТТ+код (для прибавки к остатку)
        function getDeliveredQty(tt, code) {
            let total = 0;
            inTransitOrders.forEach(o => {
                if (o.status === 'delivered' && o.store === tt) {
                    const item = (o.items || []).find(i => i.code === code && i.arrived !== false);
                    if (item) total += (item.qty || 0);
                }
            });
            return total;
        }

        function getNextDeliveryDate(supplier, storeName) {
            if (!deliverySchedule[supplier] || !deliverySchedule[supplier][storeName]) return null;
            const days = deliverySchedule[supplier][storeName];
            const today = new Date();
            today.setHours(0,0,0,0);
            // Check today + next 14 days
            for (let d = 0; d < 14; d++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + d);
                let dow = checkDate.getDay(); // 0=Вс
                // Convert: our array is [Пн=0, Вт=1, Ср=2, Чт=3, Пт=4, Сб=5, Вс=6]
                let arrIdx = dow === 0 ? 6 : dow - 1;
                if (days[arrIdx]) return checkDate;
            }
            return null;
        }

        function getDaysUntilDelivery(supplier, storeName) {
            const nextDate = getNextDeliveryDate(supplier, storeName);
            if (!nextDate) return 99; // No delivery scheduled
            const today = new Date();
            today.setHours(0,0,0,0);
            return Math.ceil((nextDate - today) / 86400000);
        }

        // Получить период доставки для поставщика → магазин:
        // Возвращает {firstDeliveryDate, secondDeliveryDate, period} если доставка ЗАВТРА,
        // или null если завтра нет доставки
        function getDeliveryPeriod(supplier, storeName) {
            if (!deliverySchedule[supplier] || !deliverySchedule[supplier][storeName]) return null;
            const days = deliverySchedule[supplier][storeName];
            const today = new Date();
            today.setHours(0,0,0,0);

            let firstDeliveryDate = null;
            let secondDeliveryDate = null;

            for (let d = 1; d < 14; d++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + d);
                let dow = checkDate.getDay();
                let arrIdx = dow === 0 ? 6 : dow - 1;
                if (days[arrIdx]) {
                    if (!firstDeliveryDate) {
                        firstDeliveryDate = new Date(checkDate);
                    } else {
                        secondDeliveryDate = new Date(checkDate);
                        break;
                    }
                }
            }

            if (!firstDeliveryDate) return null;

            const daysUntilFirst = Math.ceil((firstDeliveryDate - today) / 86400000);
            if (daysUntilFirst !== 1) return null; // Только завтра!

            const period = secondDeliveryDate
                ? Math.ceil((secondDeliveryDate - firstDeliveryDate) / 86400000)
                : 7; // По умолчанию 7 дней если нет следующей доставки

            return { firstDeliveryDate, secondDeliveryDate, period };
        }

        function getInTransitQty(tt, code) {
            let total = 0;
            inTransitOrders.forEach(order => {
                if (order.status === 'in_transit' && order.store === tt) {
                    const item = order.items.find(i => i.code === code);
                    if (item) total += item.qty;
                }
            });
            return total;
        }

        // Расчёт: подсчёт выходных/будних дней в периоде начиная с ЗАВТРА
        function countDaysTypesFromTomorrow(period) {
            let weekendCount = 0, weekdayCount = 0;
            const today = new Date();
            today.setHours(0,0,0,0);
            for (let d = 1; d <= period; d++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + d);
                let dow = checkDate.getDay(); // 0=Вс, 1=Пн, 6=Сб
                // ПН(1), СБ(6), ВС(0) = выходные для рыбы
                if (dow === 1 || dow === 6 || dow === 0) weekendCount++;
                else weekdayCount++;
            }
            return { weekendCount, weekdayCount };
        }

        function placeOrders() {
            if (!savedOrderResults || savedOrderResults.length === 0) {
                alert('Нет данных для заказа. Сначала откройте вкладку Заказ.');
                return;
            }

            // Если уже есть сохранённый заказ — спрашиваем про перезапись
            if (savedOrderDate) {
                if (!confirm('Перезаписать сохранённый заказ от ' + savedOrderDate + '?')) {
                    return; // Пользователь нажал "Нет" — продолжаем работать
                }
            }

            // Сохраняем текущий заказ как снимок (БЕЗ создания записей «в пути»)
            saveCurrentOrder();
        }

        // Определить, доставляется ли сегодня в магазин от конкретного поставщика
        function hasSupplierDeliveryToday(supplier, storeName) {
            if (!deliverySchedule[supplier] || !deliverySchedule[supplier][storeName]) return false;
            const today = new Date(); today.setHours(0,0,0,0);
            const dow = today.getDay();
            const arrIdx = dow === 0 ? 6 : dow - 1;
            return deliverySchedule[supplier][storeName][arrIdx];
        }

        function renderOrder() {
            if (Object.keys(matrix).length === 0 || stores.length === 0) {
                const missing = [];
                if (Object.keys(matrix).length === 0) missing.push({ label: 'Ассортимент', tab: 'upload' });
                if (stores.length === 0) missing.push({ label: 'Магазины (ТТ)', tab: 'upload' });
                if (stocks.length === 0) missing.push({ label: 'Остатки на ТТ', tab: 'upload' });

                return `
                    <div class="bg-white rounded-lg border border-gray-200 p-4">
                        <div class="text-center py-12">
                            ${icons.order}
                            <h3 class="text-lg font-semibold text-gray-700 mt-4">Не хватает данных для расчёта заказа</h3>
                            <div class="flex flex-wrap justify-center gap-3 mt-4">
                                ${missing.map(m => `
                                    <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-center">
                                        <p class="text-sm font-medium text-red-700">❌ ${m.label}</p>
                                        <button onclick="tab='${m.tab}';render()" class="mt-1 text-xs text-blue-600 hover:underline">Загрузить →</button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex flex-wrap justify-center gap-3 mt-4">
                                ${Object.keys(matrix).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Ассортимент загружен</span>' : ''}
                                ${stores.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Магазины загружены</span>' : ''}
                                ${stocks.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Остатки загружены</span>' : ''}
                                ${sales.length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Продажи загружены</span>' : ''}
                                ${Object.keys(matrixMarks).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ Матрица загружена</span>' : ''}
                                ${Object.keys(deliverySchedule).length > 0 ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">✅ График доставок</span>' : ''}
                            </div>
                            <button onclick="tab='upload';render()" class="mt-6 btn inline-flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-sky-600 rounded-lg hover:bg-sky-700">
                                ${icons.upload} Перейти к загрузке данных
                            </button>
                        </div>
                    </div>`;
            }

            // Всегда показываем редактируемый расчёт заказа
            // (сохранённый заказ загружается как orderEdits и применяется в расчёте)

            // === НОВЫЙ РАСЧЁТ ЗАКАЗА ===
            const allStores = [...stores];
            const skippedTodayInfo = []; // Для информирования о пропущенных

            // Общая карта мэтчинга TT
            const storeTTSet = new Set(stores.map(s => s.tt));

            // Карта остатков по ТТ и коду (с мэтчингом TT)
            const stockMap = new Map();
            const stockTTMatchMap = {};
            stocks.forEach(s => {
                let resolvedTT = s.tt;
                if (!storeTTSet || !storeTTSet.has(s.tt)) {
                    if (stockTTMatchMap[s.tt]) {
                        resolvedTT = stockTTMatchMap[s.tt];
                    } else {
                        // Используем тот же мэтчинг что и для продаж
                        const lower = s.tt.toLowerCase();
                        for (const st of stores) {
                            const stL = (st.tt || '').toLowerCase();
                            if (stL && (lower.includes(stL) || stL.includes(lower))) { resolvedTT = st.tt; break; }
                        }
                        stockTTMatchMap[s.tt] = resolvedTT;
                    }
                }
                stockMap.set(`${resolvedTT}_${s.code}`, s);
            });

            // Карта продаж по ТТ и коду (с мэтчингом TT)
            const salesByTTCode = {};
            const nameToCode = {};
            Object.entries(matrix).forEach(([code, p]) => {
                if (p.nomenclature) nameToCode[p.nomenclature.trim().toLowerCase()] = code;
            });
            // Карта мэтчинга TT: полное имя → короткое TT из stores
            const ttMatchMap = {};
            sales.forEach(s => {
                if (!s.tt) return;
                // Мэтчим TT если оно длинное (из файла) и не совпадает ни с одним stores[].tt
                let resolvedTT = s.tt;
                if (!storeTTSet.has(s.tt)) {
                    if (ttMatchMap[s.tt]) {
                        resolvedTT = ttMatchMap[s.tt];
                    } else {
                        const lower = s.tt.toLowerCase();
                        const cleaned = lower.replace(/основной склад/g, '').replace(/крым/g, '').replace(/[()]/g, '').replace(/\s+/g, ' ').trim();
                        const fileWords = cleaned.split(/[\s,]+/).filter(w => w.length > 2);
                        for (const st of stores) {
                            const stL = (st.tt || '').toLowerCase();
                            if (stL && lower.includes(stL)) { resolvedTT = st.tt; break; }
                            const stCleaned = stL.replace(/\s+/g, ' ').trim();
                            const stWords = stCleaned.split(/[\s,]+/).filter(w => w.length > 2);
                            let mc = 0;
                            for (const fw of fileWords) { for (const sw of stWords) { if (fw.includes(sw) || sw.includes(fw)) { mc++; break; } } }
                            if (mc >= 2 && mc >= Math.min(fileWords.length, stWords.length) * 0.5) { resolvedTT = st.tt; break; }
                        }
                        ttMatchMap[s.tt] = resolvedTT;
                    }
                }
                if (s.code) {
                    const key = `${resolvedTT}_${normCode(s.code)}`;
                    salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                } else if (s.name) {
                    const normName = s.name.trim().toLowerCase();
                    let code = nameToCode[normName];
                    if (!code) {
                        const entry = Object.entries(nameToCode).find(([name, c]) => name.includes(normName) || normName.includes(name));
                        if (entry) code = entry[1];
                    }
                    if (code) {
                        const key = `${s.tt}_${code}`;
                        salesByTTCode[key] = (salesByTTCode[key] || 0) + s.quantity;
                    }
                }
            });

            const results = [];
            const allOrderSuppliers = new Set();
            const conflictSummary = []; // Конфликты пересечения продукции

            allStores.forEach(store => {
                Object.entries(matrix).forEach(([code, p]) => {
                    const key = `${store.tt}_${code}`;
                    const stockData = stockMap.get(key);
                    const codeInMatrix = !!matrixMarks[code];
                    const markForTT = codeInMatrix ? (matrixMarks[code][store.tt] || 'НЕТ') : null;
                    const matrixDA = markForTT === 'ДА';
                    const notInMatrix = !codeInMatrix; // Товар есть в каталоге, но НЕ в матрице
                    const matrixNet = codeInMatrix && markForTT === 'НЕТ'; // В матрице, но исключён для этой ТТ

                    // Все три варианта показываем: ДА, вне ассортимента, НЕТ
                    // (НЕТ — тоже показываем для ручного заказа на пробу)

                    // Получить всех поставщиков для товара
                    const suppliers = (supplierAssortment[code] && supplierAssortment[code].length > 0)
                        ? supplierAssortment[code]
                        : (p.supplier ? [p.supplier] : []);

                    // Для каждого поставщика проверить: доставка ЗАВТРА?
                    const supplierPeriodMap = {};
                    suppliers.forEach(sup => {
                        const dp = getDeliveryPeriod(sup, store.tt);
                        if (dp) {
                            supplierPeriodMap[sup] = dp.period;
                        } else {
                            // Если доставка сегодня — запомним для информации
                            if (hasSupplierDeliveryToday(sup, store.tt)) {
                                const infoKey = `${sup}→${store.tt}`;
                                if (!skippedTodayInfo.find(i => i.key === infoKey)) {
                                    skippedTodayInfo.push({ key: infoKey, supplier: sup, store: store.tt });
                                }
                            }
                        }
                    });

                    const periodArr = Object.values(supplierPeriodMap);

                    // Товар НЕ в матрице ИЛИ с отметкой НЕТ — показываем если привязан к поставщику
                    if (notInMatrix || matrixNet) {
                        const isNet = matrixNet; // отмечен НЕТ в матрице
                        // Получить поставщиков товара (уже вычислено выше на строке 2646)
                        const allSuppliers = (supplierAssortment[code] && supplierAssortment[code].length > 0)
                            ? supplierAssortment[code]
                            : (p.supplier ? [p.supplier] : []);
                        if (allSuppliers.length === 0) return; // Нет привязки к поставщику — не показываем

                        const supplierOrders = {};
                        const primarySupplier = p.supplier || '';
                        const quant = p.quant || 1;
                        const inPrice = p.inPrice || 0;
                        const hasAnyDeliveryTomorrow = periodArr.length > 0;

                        // Добавляем ВСЕХ поставщиков товара, даже без доставки завтра
                        allSuppliers.forEach(sup => {
                            const editKey = `${store.tt}_${code}_${sup}`;
                            let supOrder = orderEdits[editKey] !== undefined ? orderEdits[editKey] : 0;
                            const supSpecificPrice = (supplierPrices[code] && supplierPrices[code][sup]) || p.inPrice || 0;
                            const hasDelivery = !!(sup in supplierPeriodMap);
                            supplierOrders[sup] = { order: supOrder, inPrice: supSpecificPrice, sum: supOrder * supSpecificPrice, daysUntil: hasDelivery ? 1 : null };
                            if (supOrder > 0) allOrderSuppliers.add(sup);
                        });

                        const statusText = isNet
                            ? (hasAnyDeliveryTomorrow ? 'НЕТ в матрице (исключён)' : 'НЕТ в матрице, нет доставки завтра')
                            : (hasAnyDeliveryTomorrow ? 'вне ассортимента' : 'вне ассортимента, нет доставки завтра');

                        results.push({
                            tt: store.tt, code, nomenclature: p.nomenclature || '',
                            group: p.group || '', supplier: primarySupplier,
                            currentStock: stockData ? (stockData.currentStock || 0) : 0,
                            deliveredQty: 0, effectiveStock: stockData ? (stockData.currentStock || 0) : 0,
                            sales: 0, daysPresent: 0, effectiveDays: 0,
                            weekendAvg: 0, weekdayAvg: 0, avgSalesPerDay: 0,
                            weekendCount: 0, weekdayCount: 0, daysUntil: hasAnyDeliveryTomorrow ? 7 : null,
                            estimatedSales: 0, inTransitQty: 0,
                            rawOrder: 0, order: 0, quant, inPrice, sum: 0, shelf: 0,
                            status: statusText,
                            statusType: 'notInMatrix',
                            supplierOrders, hasConflict: false,
                            notInMatrix: true,
                            matrixNet: isNet
                        });
                        return;
                    }

                    // Товар В матрице — обычная логика
                    if (periodArr.length === 0) return; // Никто не доставляет завтра

                    // Берём минимальный период (самый частый цикл)
                    const forecastPeriod = Math.min(...periodArr);

                    const inTransitQty = getInTransitQty(store.tt, code);
                    const deliveredQty = getDeliveredQty(store.tt, code);
                    const currentStock = stockData ? (stockData.currentStock || 0) : 0;
                    const effectiveStock = currentStock + deliveredQty;
                    const totalSales = salesByTTCode[key] || 0;
                    const daysPresent = stockData ? (stockData.daysPresent || 0) : 0;
                    const effectiveDays = daysPresent > 0 ? daysPresent : (stockData ? (stockData.totalDays || 0) : 0);
                    const avgSalesPerDay = effectiveDays > 0 ? totalSales / effectiveDays : 0;

                    const { weekendCount, weekdayCount } = countDaysTypesFromTomorrow(forecastPeriod);
                    const weekendAvg = getWeekendAvg(store.tt, code);
                    const weekdayAvg = getWeekdayAvg(store.tt, code);

                    let estimatedSales;
                    if (weekendAvg > 0 || weekdayAvg > 0) {
                        estimatedSales = (weekdayCount * weekdayAvg) + (weekendCount * weekendAvg);
                    } else {
                        estimatedSales = avgSalesPerDay * forecastPeriod;
                    }

                    const quant = p.quant || 1;
                    const inPrice = p.inPrice || 0;
                    const shelf = p.shelf || 0;
                    // Заказ = прогноз продаж + полка (мин. остаток) — текущий остаток — в пути
                    let rawOrder = smartRound(estimatedSales + shelf - effectiveStock - inTransitQty);

                    // Логика заказа:
                    // 1) Продажи=0 И остаток >= полка → НЕ заказываем (есть запас, товар не продаётся)
                    // 2) Продажи>0 → обычный расчёт (с учётом полки)
                    // 3) Остаток=0 (любые продажи) И товар в матрице → мин. заказ 0.5 кг
                    // 4) Остаток < полки → заказать до полки даже если продаж нет

                    const hasSales = totalSales > 0;
                    const hasStock = effectiveStock > 0;
                    const belowShelf = shelf > 0 && effectiveStock < shelf;

                    let order = 0;
                    let orderReason = '';

                    if (hasSales) {
                        // Есть продажи — обычный расчёт (полка уже в rawOrder)
                        order = rawOrder > 0 ? Math.ceil(rawOrder / quant) * quant : 0;
                        // Округляем ДО формирования статуса чтобы убрать float ошибки
                        order = smartRound(order);
                        if (order > 0) {
                            orderReason = `заказ ${smartRound(order)} кг`;
                        } else if (rawOrder <= 0) {
                            orderReason = `хватает (${smartRound(effectiveStock)} кг)`;
                        } else {
                            orderReason = `достаточно`;
                        }
                    } else if (!hasStock) {
                        // Нет остатков — мин. заказ 0.5 кг (товар в матрице, значит нужен)
                        order = 0.5;
                        orderReason = `мин. заказ 0.5 кг (нет остатков)`;
                    } else if (belowShelf) {
                        // Продаж нет, но остаток ниже полки — дозаказ до полки
                        order = Math.ceil((shelf - effectiveStock) / quant) * quant;
                        order = smartRound(order);
                        if (order > 0) {
                            orderReason = `до полки (${smartRound(shelf)} кг), заказ ${smartRound(order)} кг`;
                        } else {
                            order = smartRound(quant);
                            orderReason = `до полки (${smartRound(shelf)} кг), заказ ${smartRound(order)} кг`;
                        }
                    } else {
                        // Продаж нет, остаток >= полки — НЕ заказываем
                        order = 0;
                        orderReason = `остаток ${smartRound(effectiveStock)} кг, продаж нет`;
                    }

                    // Финальное округление (на случай если ветки выше не попали в smartRound)
                    order = smartRound(order);

                    // Build supplierOrders для поставщиков с доставкой ЗАВТРА
                    const supplierOrders = {};
                    const primarySupplier = p.supplier || '';

                    // Проверяем: есть ли у магазина предпочтение по поставщику для данного товара
                    const codePrefs = storeSupplierPrefs[code] || {};
                    const preferredSupplier = codePrefs[store.tt] || '';
                    const hasStorePref = preferredSupplier && supplierPeriodMap[preferredSupplier];

                    suppliers.forEach(sup => {
                        if (!(sup in supplierPeriodMap)) return;
                        const editKey = `${store.tt}_${code}_${sup}`;
                        let supOrder = 0;

                        // Если у магазина есть предпочтение — заказываем ТОЛЬКО у предпочитаемого поставщика
                        if (hasStorePref && sup !== preferredSupplier) {
                            // Этот поставщик НЕ является предпочитаемым — пропускаем
                            // Но добавляем ячейку (с order=0) чтобы она была видна/редактируема
                            const supSpecificPrice = (supplierPrices[code] && supplierPrices[code][sup]) || p.inPrice || 0;
                            supplierOrders[sup] = { order: 0, inPrice: supSpecificPrice, sum: 0, daysUntil: 1, skippedByPref: true };
                            return;
                        }

                        if (hasSales) {
                            supOrder = rawOrder > 0 ? Math.ceil(rawOrder / quant) * quant : 0;
                        } else if (!hasStock) {
                            supOrder = 0.5;
                        } else if (belowShelf) {
                            supOrder = Math.ceil((shelf - effectiveStock) / quant) * quant;
                            if (supOrder <= 0) supOrder = quant;
                        }
                        // else: продаж нет, остаток >= полки → supOrder = 0

                        supOrder = smartRound(supOrder);
                        if (orderEdits[editKey] !== undefined) supOrder = orderEdits[editKey];

                        // Цена конкретного поставщика (не максимальная из всех!)
                        const supSpecificPrice = (supplierPrices[code] && supplierPrices[code][sup]) || p.inPrice || 0;
                        const supSum = smartRound(supOrder * supSpecificPrice);
                        supplierOrders[sup] = { order: supOrder, inPrice: supSpecificPrice, sum: supSum, daysUntil: 1, isPreferred: hasStorePref && sup === preferredSupplier };
                        if (supOrder > 0) allOrderSuppliers.add(sup);
                    });

                    // hasConflict: >1 поставщик с заказом > 0
                    const activeSuppliersCount = Object.keys(supplierOrders).filter(s => supplierOrders[s].order > 0).length;
                    let hasConflict = activeSuppliersCount > 1;

                    // Статус
                    let statusText = orderReason;
                    if (hasStorePref && order > 0) {
                        statusText += ` → ${preferredSupplier}`;
                    } else if (hasConflict && order > 0) {
                        const supNames = Object.keys(supplierPeriodMap).join('/');
                        statusText += ` | пересечение: ${supNames}`;
                    }

                    if (hasConflict) {
                        const supNames2 = Object.keys(supplierOrders).filter(s => supplierOrders[s].order > 0).join(', ');
                        conflictSummary.push({
                            tt: store.tt, code, name: p.nomenclature || code,
                            suppliers: supNames2, order
                        });
                    }

                    // Primary order for stats
                    const editKeyPrimary = `${store.tt}_${code}_${primarySupplier}`;
                    if (orderEdits[editKeyPrimary] !== undefined) order = orderEdits[editKeyPrimary];
                    else if (orderEdits[`${store.tt}_${code}`] !== undefined) order = orderEdits[`${store.tt}_${code}`];

                    const weekendAvgDisplay = weekendAvg || 0;
                    const sum = smartRound(order * inPrice);

                    results.push({
                        tt: store.tt, code, nomenclature: p.nomenclature || stockData?.name || '',
                        group: p.group || '', supplier: primarySupplier, currentStock, deliveredQty, effectiveStock,
                        sales: totalSales, daysPresent, effectiveDays,
                        weekendAvg: weekendAvgDisplay, weekdayAvg, avgSalesPerDay,
                        weekendCount, weekdayCount, daysUntil: forecastPeriod,
                        estimatedSales, inTransitQty,
                        rawOrder: rawOrder > 0 ? rawOrder : 0,
                        order, quant, inPrice, sum, shelf: p.shelf || 0,
                        status: statusText,
                        statusType: order > 0 ? 'order' : 'ok',
                        supplierOrders, hasConflict,
                        notInMatrix: false
                    });
                });
            });

            // Фильтрация
            let filtered = results;
            if (searchResults) {
                const s = searchResults.toLowerCase();
                filtered = filtered.filter(r => r.nomenclature?.toLowerCase().includes(s) || r.code?.includes(s) || r.group?.toLowerCase().includes(s) || (r.supplier || '').toLowerCase().includes(s));
            }
            if (filterTT) filtered = filtered.filter(r => r.tt === filterTT);
            if (filterGroup) filtered = filtered.filter(r => r.group === filterGroup);
            if (filterStatus === 'orders') filtered = filtered.filter(r => r.order > 0);

            // Группировка: ТТ → Группа товара → товары
            const groupedTT = {};
            filtered.forEach(r => {
                if (!groupedTT[r.tt]) groupedTT[r.tt] = {};
                const gr = r.group || 'Без группы';
                if (!groupedTT[r.tt][gr]) groupedTT[r.tt][gr] = [];
                groupedTT[r.tt][gr].push(r);
            });

            // Сортировка внутри каждой группы
            Object.keys(groupedTT).forEach(tt => {
                const groups = groupedTT[tt];
                const sortedGroups = Object.entries(groups).sort(([gA], [gB]) => gA.localeCompare(gB, 'ru'));
                groupedTT[tt] = Object.fromEntries(sortedGroups);
            });

            const stats = { total: filtered.length, toOrder: filtered.filter(r => r.order > 0).length, sum: filtered.reduce((s, r) => s + r.sum, 0) };
            const allGroups = getAllGroups();

            // Dynamic supplier columns — все поставщики с активными днями доставки + с ручными правками + привязанные товары
            const allScheduledSuppliers = new Set();
            Object.entries(deliverySchedule).forEach(function(entry) {
                var sup = entry[0], storeMap = entry[1];
                var hasActive = Object.values(storeMap).some(function(days) { return days && days.some(function(d) { return d; }); });
                if (hasActive) allScheduledSuppliers.add(sup);
            });
            // Добавляем поставщиков из ручных правок (даже если нет в графике)
            Object.keys(orderEdits).forEach(function(ek) {
                Object.keys(deliverySchedule).forEach(function(sup) {
                    if (ek.endsWith('_' + sup)) allScheduledSuppliers.add(sup);
                });
            });
            // Добавляем поставщиков, у которых есть привязанные товары (даже без активных дней доставки)
            Object.values(supplierAssortment).forEach(function(sups) {
                sups.forEach(function(sup) {
                    if (deliverySchedule[sup]) allScheduledSuppliers.add(sup);
                });
            });
            const supplierColumns = [...allOrderSuppliers].concat([...allScheduledSuppliers].filter(function(s) { return !allOrderSuppliers.has(s); })).sort();
            const hasWishes = storeWishes && storeWishes.length > 0;
            const colCount = 7 + supplierColumns.length + (hasWishes ? 1 : 0);

            // In-transit stats
            const inTransitCount = inTransitOrders.filter(o => o.status === 'in_transit').length;
            let nextDelivStr = '—';
            let minD = Infinity;
            inTransitOrders.filter(o => o.status === 'in_transit').forEach(o => {
                if (o.expectedDate) {
                    const exp = new Date(o.expectedDate);
                    exp.setHours(0,0,0,0);
                    const today = new Date(); today.setHours(0,0,0,0);
                    const diff = Math.ceil((exp - today) / 86400000);
                    if (diff >= 0 && diff < minD) { minD = diff; nextDelivStr = o.expectedDate; }
                }
            });

            // Сохраняем результаты расчёта заказа
            savedOrderResults = filtered;
            savedOrderStats = stats;

            // Баннер о пропущенных поставщиках (доставка сегодня)
            const skippedBanner = skippedTodayInfo.length > 0
                ? `<div class="bg-yellow-50 border border-yellow-300 text-yellow-800 rounded-lg px-4 py-3 text-sm font-medium">⏭ Пропущены (доставка сегодня): ${skippedTodayInfo.map(i => `<span class="font-semibold">${i.supplier}</span> → ${i.store}`).join(', ')}</div>`
                : '';

            // Баннер о конфликтах (пересечение продукции)
            const conflictBanner = conflictSummary.length > 0
                ? `<div class="bg-red-50 border border-red-300 text-red-800 rounded-lg px-4 py-3 text-sm">
                    <div class="font-semibold mb-1">⚠️ Пересечение поставщиков (${conflictSummary.length} поз.) — возможна перетарка:</div>
                    <div class="text-xs space-y-0.5 max-h-32 overflow-auto">
                        ${conflictSummary.map(c => `<div>• <b>${c.name}</b> (${c.code}) → ${c.tt}: <b>${c.suppliers}</b></div>`).join('')}
                    </div>
                    <div class="text-xs mt-1 opacity-80">Уберите заказ у одного из поставщиков вручную, чтобы избежать перетарки</div>
                   </div>`
                : '';

            // Информационная плашка о дне заказа
            const todayStr = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            const tomorrowStr = new Date(Date.now() + 86400000).toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });

            return `<div class="space-y-3">
                <div class="bg-sky-50 border border-sky-200 text-sky-800 rounded-lg px-4 py-2 text-sm">
                    📅 Заказ формируется: <b>сегодня (${todayStr})</b> → доставка <b>завтра (${tomorrowStr})</b>
                </div>
                ${skippedBanner}
                ${conflictBanner}
                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="flex justify-between items-center flex-wrap gap-3">
                        <div class="flex gap-3 items-center flex-wrap">
                            <div class="bg-sky-100 text-sky-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">ПОЗИЦИЙ</div><div class="text-lg font-bold">${stats.total}</div></div>
                            <div class="bg-emerald-100 text-emerald-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">К ЗАКАЗУ</div><div class="text-lg font-bold">${stats.toOrder}</div></div>
                            <div class="bg-blue-100 text-blue-800 rounded-md px-3 py-1.5" title="Заказов в пути"><div class="text-[10px] opacity-70">В ПУТИ</div><div class="text-lg font-bold">${inTransitCount}</div></div>
                            <div class="bg-violet-100 text-violet-800 rounded-md px-3 py-1.5 cursor-pointer hover:bg-violet-200 transition-colors" onclick="showOrderSumsByStore(this)" title="Нажмите для сумм по магазинам"><div class="text-[10px] opacity-70">СУММА</div><div class="text-lg font-bold">${stats.sum.toFixed(0)} ₽</div></div>
                            ${minD < Infinity ? `<div class="bg-amber-100 text-amber-800 rounded-md px-3 py-1.5"><div class="text-[10px] opacity-70">БЛИЖ. ДОСТАВКА</div><div class="text-sm font-bold">${nextDelivStr}</div></div>` : ''}
                        </div>
                        <div class="flex gap-2">
                            <input type="file" id="wishesImportInput" accept=".xlsx,.xls,.csv" onchange="importStoreWishes(this)" class="hidden">
                            <button onclick="event.stopPropagation();document.getElementById('wishesImportInput').click()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium ${storeWishes.length > 0 ? 'text-violet-700 bg-violet-100 border border-violet-300' : 'text-gray-600 bg-gray-50 border border-gray-200'} rounded-lg hover:bg-violet-200 transition-colors" title="Загрузить файл пожеланий магазинов">📋 Пожелания${storeWishes.length > 0 ? ' (' + storeWishes.length + ')' : ''}</button>
                            ${storeWishes.length > 0 ? '<button onclick="event.stopPropagation();clearStoreWishes()" class="btn inline-flex items-center gap-1.5 px-2 py-1.5 text-[10px] font-medium text-red-600 bg-red-50 border border-red-200 rounded-lg hover:bg-red-100" title="Очистить пожелания">✕</button>' : ''}
                            <button onclick="placeOrders()" class="btn inline-flex items-center gap-1.5 px-4 py-2 text-[13px] font-medium text-white bg-emerald-500 rounded-md hover:bg-emerald-600">${icons.order} Сформировать заказ</button>
                            <button onclick="exportOrder()" class="btn inline-flex items-center gap-1.5 px-4 py-2 text-[13px] font-medium text-white bg-blue-500 rounded-md hover:bg-blue-600">${icons.export} Экспорт</button>
                            <button onclick="debugOrderEditability()" class="btn inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-orange-700 bg-orange-50 border border-orange-200 rounded-lg hover:bg-orange-100" title="Показать почему ячейки заблокированы">🔍 Диагностика</button>

                        <select onchange="filterTT=this.value;render()" class="input bg-white"><option value="">Все ТТ</option>${stores.map(s => `<option value="${s.tt}" ${filterTT === s.tt ? 'selected' : ''}>${s.tt}</option>`).join('')}</select>
                        <select onchange="filterStatus=this.value;render()" class="input bg-white">
                            <option value="">Все статусы</option>
                            <option value="orders" ${filterStatus === 'orders' ? 'selected' : ''}>С заказом</option>

                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="table-container">
                        <table class="table-modern">
                            <thead>
                                <tr>
                                    <th class="text-left sticky left-0 bg-gray-50 z-20" style="min-width:160px">Наименование</th>

                                    <th class="text-center" style="min-width:70px">Группа</th>
