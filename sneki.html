                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Массовое редактирование</h3>
                  <button onClick={() => setShowMassEditModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="space-y-3">
                  <div className="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                    <label className="text-sm text-gray-700">Умножить заказы на:</label>
                    <input type="number" value={massMultiplyValue} onChange={e => setMassMultiplyValue(parseFloat(e.target.value) || 1)} className="input w-20 text-center" step="0.1" min="0.1" max="10" />
                    <button onClick={() => { massUpdateOrders('multiply', massMultiplyValue); setShowMassEditModal(false); }} className="btn btn-primary">Применить</button>
                  </div>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowMassEditModal(false)} className="btn btn-secondary flex-1">Закрыть</button>
                </div>
              </div>
            </div>
          )}

          {showAddProductModal && (
            <div className="modal-overlay" onClick={() => setShowAddProductModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800 flex items-center gap-2"><PlusIcon />Добавить товар</h3>
                  <button onClick={() => setShowAddProductModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="space-y-3">
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Код товара *</label>
                      <input type="text" value={newProduct.code} onChange={e => setNewProduct(prev => ({ ...prev, code: e.target.value }))} className="input w-full" placeholder="12345" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Наименование *</label>
                      <input type="text" value={newProduct.nomenclature} onChange={e => setNewProduct(prev => ({ ...prev, nomenclature: e.target.value }))} className="input w-full" placeholder="Наименование товара" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Группа</label>
                      <input type="text" value={newProduct.group} onChange={e => setNewProduct(prev => ({ ...prev, group: e.target.value }))} className="input w-full" placeholder="Название группы" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Упаковка</label>
                      <select value={newProduct.packaging} onChange={e => setNewProduct(prev => ({ ...prev, packaging: e.target.value }))} className="select w-full">
                        <option value="ШТ">ШТ</option>
                        <option value="КГ">КГ</option>
                      </select>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Код весовой</label>
                      <input type="text" value={newProduct.weightCode} onChange={e => setNewProduct(prev => ({ ...prev, weightCode: e.target.value }))} className="input w-full" placeholder="Код для весового товара" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 block mb-1">Входная цена</label>
                      <input type="number" value={newProduct.inPrice} onChange={e => setNewProduct(prev => ({ ...prev, inPrice: parseFloat(e.target.value) || 0 }))} className="input w-full" step="0.01" min="0" />
                    </div>
                  </div>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowAddProductModal(false)} className="btn btn-secondary flex-1">Отмена</button>
                  <button onClick={addNewProduct} className="btn btn-primary flex-1"><PlusIcon /><span>Добавить</span></button>
                </div>
              </div>
            </div>
          )}

          {/* Detail Modal - детализация расчёта */}
          {showDetailModal && selectedResult && (
            <div className="modal-overlay" onClick={() => setShowDetailModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Детализация расчёта</h3>
                  <button onClick={() => setShowDetailModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="space-y-2 text-sm">
                  <div className="bg-gray-50 rounded-lg p-3">
                    <div className="text-xs text-gray-500 mb-1">Товар</div>
                    <div className="font-medium">{selectedResult.nomenclature}</div>
                    <div className="text-xs text-gray-500">Код: {selectedResult.code}</div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-sky-50 rounded-lg p-3 border border-sky-200">
                      <div className="text-xs text-gray-500">Текущий остаток</div>
                      <div className="text-xl font-bold text-sky-700">{selectedResult.currentStock.toFixed(2)} {selectedResult.packaging}</div>
                    </div>
                    <div className="bg-violet-50 rounded-lg p-3 border border-violet-200">
                      <div className="text-xs text-gray-500">Продажи за период</div>
                      <div className="text-xl font-bold text-violet-700">{selectedResult.sales.toFixed(2)} {selectedResult.packaging}</div>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-amber-50 rounded-lg p-3 border border-amber-200">
                      <div className="text-xs text-gray-500">Дней на остатках</div>
                      <div className="text-xl font-bold text-amber-700">{selectedResult.daysPresent || '-'}</div>
                    </div>
                    <div className="bg-blue-50 rounded-lg p-3 border border-blue-200">
                      <div className="text-xs text-gray-500">Ср. продажи в день</div>
                      <div className="text-xl font-bold text-blue-700">{selectedResult.avgSalesPerDay?.toFixed(3) || '-'} {selectedResult.packaging}</div>
                    </div>
                  </div>
                  <div className="bg-emerald-50 rounded-lg p-3 border border-emerald-200">
                    <div className="text-xs text-gray-500 mb-1">К заказу</div>
                    <div className="text-2xl font-bold text-emerald-700">{selectedResult.order} {selectedResult.packaging}</div>
                    <div className="text-xs text-gray-500 mt-1">
                      {selectedResult.shelf != null 
                        ? `Полка: ${selectedResult.shelf}` 
                        : 'Полка: не учитывается'}
                    </div>
                    {(() => {
                      const avgSales = selectedResult.avgSalesPerDay || 0;
                      const stock = selectedResult.currentStock;
                      const shelf = selectedResult.shelf || 0;
                      const need = (shelf || 0) + (avgSales * period) - stock;
                      return (
                        <div className="mt-2 p-2 bg-white/60 rounded text-[10px] text-gray-600 font-mono">
                          <div>Полка + (Ср.прод × Период) - Остаток = К заказу</div>
                          <div>{shelf} + ({avgSales.toFixed(3)} × {period}) - {stock.toFixed(2)} = {need.toFixed(2)}</div>
                          {need <= 0 && <div className="text-emerald-600">Остаток достаточный → заказ = 0</div>}
                          {need > 0 && <div className="text-amber-600">Округл. до кванта → заказ = {selectedResult.order}</div>}
                        </div>
                      );
                    })()}
                  </div>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowDetailModal(false)} className="btn btn-secondary flex-1">Закрыть</button>
                </div>
              </div>
            </div>
          )}

          {/* Sum Modal - детализация суммы по ТТ */}
          {showSumModal && (
            <div className="modal-overlay" onClick={() => setShowSumModal(false)}>
              <div className="modal-content max-w-lg" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Сумма заказов по ТТ</h3>
                  <button onClick={() => setShowSumModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                <div className="space-y-2 max-h-96 overflow-auto">
                  {Object.entries(
                    filteredResults.filter(r => r.order > 0).reduce((acc, r) => {
                      if (!acc[r.tt]) acc[r.tt] = 0;
                      const product = Object.values(matrix).find(p => normCode(p.code) === r.code);
                      const price = product?.inPrice || 0;
                      acc[r.tt] += r.order * price;
                      return acc;
                    }, {})
                  ).sort((a, b) => b[1] - a[1]).map(([tt, sum]) => (
                    <div key={tt} className="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                      <span className="text-sm font-medium truncate flex-1 mr-2" title={tt}>{tt}</span>
                      <span className="text-sm font-bold text-emerald-700">{sum.toLocaleString('ru-RU')} ₽</span>
                    </div>
                  ))}
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowSumModal(false)} className="btn btn-secondary flex-1">Закрыть</button>
                </div>
              </div>
            </div>
          )}

          {/* Product Detail Modal - продажи товара по ТТ */}
          {showProductDetailModal && selectedProductAnalytics && (
            <div className="modal-overlay" onClick={() => setShowProductDetailModal(false)}>
              <div className="modal-content max-w-2xl" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-gray-800">Продажи по ТТ</h3>
                  <button onClick={() => setShowProductDetailModal(false)} className="p-1.5 rounded text-gray-400 hover:text-gray-600 hover:bg-gray-100"><CloseIcon /></button>
                </div>
                {(() => {
                  const product = Object.values(matrix).find(p => p.code === selectedProductAnalytics);
                  const productSales = sales.filter(s => s.code === selectedProductAnalytics);
                  const productStocks = stocks.filter(s => s.code === selectedProductAnalytics);
                  
                  return (
                    <div className="space-y-3">
                      <div className="bg-gray-50 rounded-lg p-3">
                        <div className="font-medium">{product?.nomenclature || 'Товар не найден'}</div>
                        <div className="text-xs text-gray-500">Код: {selectedProductAnalytics} | Группа: {product?.group || '-'}</div>
                      </div>
                      
                      <div className="grid grid-cols-3 gap-2">
                        <div className="bg-sky-50 rounded-lg p-2 text-center border border-sky-200">
                          <div className="text-[10px] text-sky-600">Всего продаж</div>
                          <div className="text-lg font-bold text-sky-700">{productSales.reduce((s, x) => s + x.quantity, 0).toFixed(1)}</div>
                        </div>
                        <div className="bg-emerald-50 rounded-lg p-2 text-center border border-emerald-200">
                          <div className="text-[10px] text-emerald-600">ТТ с продажами</div>
                          <div className="text-lg font-bold text-emerald-700">{new Set(productSales.map(s => s.tt)).size}</div>
                        </div>
                        <div className="bg-amber-50 rounded-lg p-2 text-center border border-amber-200">
                          <div className="text-[10px] text-amber-600">Остаток РЦ</div>
                          <div className="text-lg font-bold text-amber-700">{rcStocks[selectedProductAnalytics] || 0}</div>
                        </div>
                      </div>
                      
                      <div className="max-h-64 overflow-auto">
                        <table className="table-modern text-xs">
                          <thead>
                            <tr>
                              <th className="text-left bg-gray-50">ТТ</th>
                              <th className="text-right bg-gray-50">Продажи</th>
                              <th className="text-right bg-gray-50">Остаток</th>
                              <th className="text-right bg-gray-50">Дней</th>
                              <th className="text-right bg-gray-50">Ср/день</th>
                            </tr>
                          </thead>
                          <tbody>
                            {stores.map(store => {
                              const ttSales = productSales.filter(s => s.tt === store.tt);
                              const totalSales = ttSales.reduce((sum, s) => sum + s.quantity, 0);
                              const stockData = productStocks.find(s => s.tt === store.tt);
                              const days = stockData?.daysPresent || 0;
                              const avgPerDay = days > 0 ? totalSales / days : 0;
                              const currentStock = stockData?.currentStock || 0;
                              
                              return (
                                <tr key={store.tt} className={totalSales > 0 ? '' : 'bg-gray-50'}>
                                  <td className="truncate max-w-[200px]" title={store.tt}>{store.tt}</td>
                                  <td className="text-right font-medium">{totalSales.toFixed(1)}</td>
                                  <td className="text-right">{currentStock.toFixed(1)}</td>
                                  <td className="text-right text-gray-500">{days}</td>
                                  <td className="text-right">{avgPerDay.toFixed(2)}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  );
                })()}
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setShowProductDetailModal(false)} className="btn btn-secondary flex-1">Закрыть</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
