    const { useState, useCallback, useMemo, useEffect, useRef } = React;

    const load = (key, defaultValue) => {
      try {

    function createStyledSheet(data, headers, leftAlignCols) {
        leftAlignCols = leftAlignCols || [];
        const allData = [headers, ...data];
        const ws = XLSX.utils.aoa_to_sheet(allData);

        const range = XLSX.utils.decode_range(ws['!ref']);
        const numRows = range.e.r + 1;
        const numCols = range.e.c + 1;

        // Вычисляем ширину колонок по содержимому (с учётом кириллицы)
        const colWidths = new Array(numCols).fill(0);
        for (let c = 0; c < numCols; c++) {
            for (let r = 0; r < numRows; r++) {
                const cellAddress = XLSX.utils.encode_cell({ r: r, c: c });
                const cell = ws[cellAddress];
                if (cell && cell.v !== undefined) {
                    const cellText = String(cell.v);
                    const cyrillicCount = (cellText.match(/[а-яА-ЯёЁ]/g) || []).length;
                    const otherCount = cellText.length - cyrillicCount;
                    const estimatedWidth = Math.ceil(cyrillicCount * 1.5 + otherCount * 1.0) + 2;
                    colWidths[c] = Math.max(colWidths[c], estimatedWidth);
                }
            }
            colWidths[c] = Math.max(colWidths[c], 8);
            colWidths[c] = Math.min(colWidths[c], 60);
        }
        ws['!cols'] = colWidths.map(w => ({ wch: w }));

        // Высота строк 15 пунктов
        ws['!rows'] = [];
        for (let r = 0; r < numRows; r++) {
            ws['!rows'][r] = { hpt: 15 };
        }

        // Форматирование ячеек
        for (let r = 0; r < numRows; r++) {
            for (let c = 0; c < numCols; c++) {
                const cellAddress = XLSX.utils.encode_cell({ r: r, c: c });
                const cell = ws[cellAddress];
                if (cell) {
                    if (r === 0) {
                        // Шапка — светло-голубой фон
                        cell.s = {
                            fill: { fgColor: { rgb: "B8CCE4" } },
                            font: { bold: true, sz: 10 },
                            alignment: { horizontal: "center", vertical: "center", wrapText: false },
                            border: {
                                top: { style: "dotted", color: { rgb: "808080" } },
                                bottom: { style: "dotted", color: { rgb: "808080" } },
                                left: { style: "dotted", color: { rgb: "808080" } },
                                right: { style: "dotted", color: { rgb: "808080" } }
                            }
                        };
                    } else {
                        // Данные
                        const isLeftAlign = leftAlignCols.includes(c);
                        cell.s = {
                            font: { sz: 10 },
                            alignment: {
                                horizontal: isLeftAlign ? "left" : "center",
                                vertical: "center",
                                wrapText: false
                            },
                            border: {
                                top: { style: "dotted", color: { rgb: "808080" } },
                                bottom: { style: "dotted", color: { rgb: "808080" } },
                                left: { style: "dotted", color: { rgb: "808080" } },
                                right: { style: "dotted", color: { rgb: "808080" } }
                            }
                        };
                    }
                }
            }
        }

        return ws;
    }

          const packaging = String(r[3] || 'ШТ').toUpperCase();

          const weightCode = r[6] ? normCode(r[6]) : '';
          // Входная цена от РЦ - колонка 8
          const inPrice = parseFloat(String(r[8]).replace(',', '.')) || 0;
          // Выходная цена - колонка 9
          const outPrice = parseFloat(String(r[9]).replace(',', '.')) || 0;
          // Полка - колонка 10
          const shelf = parseFloat(String(r[10]).replace(',', '.')) || 0;
          const quant = 1;

          items.push({ code, nomenclature: name, group, packaging, weightCode, inPrice, outPrice, shelf, quant });
          if (shelf > 0) newShelf[code] = shelf;
        }
        
        console.log(`Парсинг ассортимента: ${items.length} товаров, пропущено ${skipped}`);
        return { items, newShelf, newQuants: {} };
      }, []);

      // Мэтчинг TT из файла с stores — умный поиск по ключевым словам
      const matchStoreTT = useCallback((fileTTName) => {
        if (!fileTTName || !stores.length) return fileTTName;
        const lower = fileTTName.toLowerCase();
        // 1) Точное совпадение
        for (const s of stores) {
          if (s.tt && s.tt.toLowerCase() === lower) return s.tt;
        }
        // 2) Вложение: полное название из файла содержит короткое TT
        for (const s of stores) {
          if (s.tt && lower.includes(s.tt.toLowerCase())) return s.tt;
        }
        // 3) Вложение наоборот: короткое TT содержит часть из файла
        for (const s of stores) {
          if (s.tt && s.tt.toLowerCase().includes(lower)) return s.tt;
        }
        // 4) Умный мэтчинг: извлекаем ключевые слова (город + улица) и сравниваем
        // Убираем "Основной склад (КРЫМ," и скобки
        const cleaned = lower.replace(/основной склад/g, '').replace(/крым/g, '').replace(/[()]/g, '').replace(/\s+/g, ' ').trim();
        for (const s of stores) {
          const sCleaned = (s.tt || '').toLowerCase().replace(/\s+/g, ' ').trim();
          // Сравниваем по совпадению слов: проверяем что ключевые слова из cleaned есть в sCleaned
          const fileWords = cleaned.split(/[\s,]+/).filter(w => w.length > 2);
          const storeWords = sCleaned.split(/[\s,]+/).filter(w => w.length > 2);
          const matches = fileWords.filter(fw => storeWords.some(sw => fw.includes(sw) || sw.includes(fw)));
          if (matches.length >= 2 && matches.length >= Math.min(fileWords.length, storeWords.length) * 0.5) return s.tt;
        }
        // 5) Пробуем tt2
        for (const s of stores) {
          const sTT2 = (s.tt2 || '').toLowerCase();
          if (sTT2 && (lower.includes(sTT2) || sTT2.includes(lower))) return s.tt;
        }
        return fileTTName;
      }, [stores]);

      // Parse sales file — формат: 2 столбца (код, кол-во), TT = строка-заголовок между блоками
      const parseSales = useCallback((json) => {
        const items = [];
        const foundTTs = new Set();
        let curTT = '';
        
        for (let i = 2; i < json.length; i++) {
          const r = json[i];
          if (!r || r.length === 0) continue;
          
          const c0Raw = r[0];
          const c0 = String(c0Raw || '').trim();
          
          // Пропускаем пустые и информационные строки
          if (!c0) continue;
          
          // TT detection — строка содержит "склад" и не является числом
          if (/склад|магазин|основной/i.test(c0) && !/^\d/.test(c0)) {
            curTT = matchStoreTT(c0);
            foundTTs.add(curTT);
            continue;
          }
          
          if (!curTT) continue;
          
          // Код товара в col0: может быть строка с ведущими нулями или число
          // Проверяем что c0 — это число (с нулями или без)
          const isCode = /^\d+$/.test(c0) || (typeof c0Raw === 'number' && c0Raw > 0);
          
          if (isCode) {
            const code = normCode(c0);
            const qty = parseFloat(String(r[1] || 0)) || 0;
            items.push({ tt: curTT, code, quantity: qty });
          }
        }
        
        console.log('=== PARSE SALES ===');
        console.log(`Товаров: ${items.length}, TT: ${foundTTs.size}`);
        console.log('TT:', [...foundTTs]);
        if (items.length > 0) console.log('Первые 5:', items.slice(0, 5));
        console.log('С qty>0:', items.filter(x => x.quantity > 0).length);
        const withQty = items.filter(x => x.quantity > 0);
        alert(`Продажи: ${withQty.length} с qty>0 из ${items.length} товаров\nTT: ${[...foundTTs].join(', ')}`);
        return { items, foundTTs };
      }, [matchStoreTT]);

      // Parse stocks file
      const parseStocks = useCallback((json) => {
        const items = [];
        const foundTTs = new Set();
        let curTT = '';
        let lastCol = 0;
        
        for (let i = 0; i < json.length; i++) { if (json[i]) lastCol = Math.max(lastCol, json[i].length - 1); }
        
        for (let i = 3; i < json.length; i++) {
          const r = json[i];
          if (!r || r.length < 3) continue;
          
          const c0 = String(r[0] || '').trim();
          const code = String(r[1] || '').trim();
          
          const isTT = /склад|магазин|основной/i.test(c0) && !/^\d/.test(code);
          const isProductCode = /^\d/.test(code) || code.length >= 5;
          
          if (isTT) {
            curTT = matchStoreTT(c0);
            foundTTs.add(curTT);
          }
          else if (isProductCode && curTT && c0) {
            let daysPresent = 0, totalDays = 0;
            for (let col = 2; col <= lastCol; col++) {
              const val = r[col];
              if (val !== undefined && val !== null && val !== '') { totalDays++; if ((parseFloat(String(val)) || 0) > 0) daysPresent++; }
            }
            items.push({ tt: curTT, code: normCode(code), productName: c0, currentStock: parseFloat(String(r[lastCol])) || 0, daysPresent, totalDays });
          }
        }
        
        console.log(`Парсинг остатков: ${items.length} записей, ${foundTTs.size} ТТ`);
        console.log('TT из файла → TT из матрицы:', [...foundTTs].map(tt => ({fileTT: tt, resolved: tt})));
        // Логируем первые 3 товара для проверки
        if (items.length > 0) console.log('Пример товаров:', items.slice(0, 3).map(i => ({tt: i.tt, code: i.code, days: i.daysPresent, stock: i.currentStock})));
        return { items, foundTTs };
      }, [matchStoreTT]);

      // File upload handler
      const handleFile = useCallback((file, type) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

            if (type === 'assortment') {
              const { items, newShelf, newQuants } = parseAssortment(json);
              if (items.length === 0) { alert('Не найдено товаров! Проверьте файл: в первой колонке должно быть "Да" для рабочих товаров.'); return; }
              
              setProducts(items);
              setShelfValues(prev => ({ ...prev, ...newShelf }));
              setQuants(prev => ({ ...prev, ...newQuants }));
              
              setMatrix(prev => {
                const storeList = stores.length > 0 ? stores.map(s => s.tt) : 
                  [...new Set(Object.values(prev).flatMap(p => Object.keys(p).filter(k => !['code','nomenclature','group','packaging','weightCode','inPrice','outPrice','vat','shelf','quant'].includes(k))))];
                
                const updated = {};
                items.forEach(p => {
                  if (prev[p.code]) { updated[p.code] = { ...prev[p.code], ...p }; }
                  else { updated[p.code] = { ...p }; storeList.forEach(tt => { updated[p.code][tt] = 'НЕТ'; }); }
                });
                return updated;
              });
              alert(`Загружено ${items.length} товаров`);
            }
            else if (type === 'sales') {
              const { items, foundTTs } = parseSales(json);
              setSales(items);
            }
            else if (type === 'stocks') {
              const { items, foundTTs } = parseStocks(json);
              setStocks(items);
              // НЕ добавляем новые ТТ автоматически - используем только те, что есть в списке магазинов
              alert(`Загружено ${items.length} остатков, найдено ${foundTTs.size} ТТ\n(расчёт только по магазинам из списка)`);
            }
            else if (type === 'stores') {
              // Парсинг справочника магазинов
              const parsedStores = [];
              for (let i = 1; i < json.length; i++) {
                const r = json[i];
                if (!r || r.length < 2 || !r[0]) continue;
                parsedStores.push({
                  tt: String(r[0] || '').trim(),
                  tt2: String(r[1] || '').trim(),
                  codeSabina: String(r[2] || '').trim(),
                  priority: parseInt(String(r[3])) || 0,
                  eranis: String(r[4] || '').trim(),
                  fiasCode: String(r[5] || '').trim(),
                  storeNumber: String(r[6] || '').trim(),
                  codeKanzler: String(r[7] || '').trim(),
                  codeAlliance: String(r[8] || '').trim(),
                  latitude: parseFloat(String(r[9])) || 0,
                  longitude: parseFloat(String(r[10])) || 0,
                  fridges: parseInt(String(r[11])) || 0,
                  doors: parseInt(String(r[12])) || 0,
                  phone: String(r[13] || '').trim(),
                  ttInFactory: String(r[14] || '').trim(),
                  storeNumberFactory: String(r[15] || '').trim(),
                  oldName: String(r[16] || '').trim(),
                  cranes: parseInt(String(r[17])) || 0,
                  priceType: String(r[18] || '').trim(),
                  fridgeCabinets: parseInt(String(r[19])) || 0
                });
              }
              setStores(parsedStores);
              save(KEYS.STORES, parsedStores);
              alert(`Загружено ${parsedStores.length} магазинов`);
            }
          } catch (err) { console.error('Parse error:', err); alert('Ошибка: ' + err.message); }
        };
        reader.readAsArrayBuffer(file);
      }, [stores, parseAssortment, parseSales, parseStocks]);

      // Parse RC input
      // Формат: Наименование \t Код \t Остаток (разделитель - табуляция)
      const parseRcInput = useCallback(() => {
        const lines = rcInputData.trim().split('\n');
        const newRc = {};
        const newProducts = [];
        let count = 0;
        let addedToMatrix = 0;
        
        lines.forEach(line => {
          // Разбиваем по табам, а не по пробелам
          const parts = line.split('\t').map(p => p.trim()).filter(p => p);
          
          // Пропускаем заголовки
          if (parts.length < 2) return;
          if (parts[0].toLowerCase().includes('склад') || parts[0].toLowerCase().includes('rc') || parts[0].toLowerCase().includes('наимен') || parts[0].toLowerCase().includes('код')) return;
          
          // Умный поиск кода и остатка в строке
          let code = '', name = parts[0], stock = 0;
          
          if (parts.length >= 3) {
            // Шаг 1: находим колонку с кодом — первое целое число >= 3 цифр (пропускаем «КГ», «ШТ» и прочие единицы)
            let codeCol = -1;
            for (let i = 1; i < parts.length; i++) {
              const v = String(parts[i]).trim();
              if (/^\d{3,}$/.test(v)) { codeCol = i; break; }
            }
            if (codeCol >= 0) code = normCode(parts[codeCol]);
            // Fallback: если код не найден, ищем двузначные и более
            if (!code) {
              for (let i = 1; i < parts.length; i++) {
                const v = String(parts[i]).trim();
                if (/^\d{1,}$/.test(v)) { code = normCode(v); break; }
              }
            }
            // Шаг 2: берём остаток ПО ПОЗИЦИИ — колонка сразу после единицы измерения
            // Формат: ... Код | Ед.изм | Остаток | Цены ...
            // Если ед.изм нет — остаток в следующей колонке после кода
            const isUnit = (v) => /^(КГ|кг|ШТ|шт|шт\.|уп|УП)$/.test(v);
            let stockCol = -1;
            if (codeCol >= 0 && codeCol + 1 < parts.length) {
              if (isUnit(String(parts[codeCol + 1]).trim()) && codeCol + 2 < parts.length) {
                stockCol = codeCol + 2; // Код → Ед.изм → Остаток
              } else if (!isUnit(String(parts[codeCol + 1]).trim())) {
                stockCol = codeCol + 1; // Код → Остаток (без ед.изм)
              }
            }
            if (stockCol >= 0) {
              const sv = String(parts[stockCol]).trim();
              // Пусто, «нет», нечисловое, или дубликат кода → остаток = 0
              const num = parseFloat(sv.replace(',', '.').replace(/\s/g, ''));
              if (!sv || /^нет$/i.test(sv) || isNaN(num) || sv.replace(/^0+/, '') === code.replace(/^0+/, '')) {
                stock = 0;
              } else {
                stock = num;
              }
            }
          } else if (parts.length === 2) {
            const isP0Num = /^\d+$/.test(String(parts[0]).trim());
            if (isP0Num) {
              code = normCode(parts[0]);
              stock = parseFloat(String(parts[1]).replace(',', '.').replace(/\s/g, '')) || 0;
            } else {
              for (let i = 0; i < parts.length; i++) { if (/^\d+$/.test(String(parts[i]).trim())) { code = normCode(parts[i]); break; } }
              for (let i = parts.length - 1; i >= 0; i--) { const v = parseFloat(String(parts[i]).replace(',', '.').replace(/\s/g, '')) || 0; if (v > 0) { stock = v; break; } }
            }
          }
          
          // Сохраняем ВСЕ найденные товары (включая с остатком 0)
          if (code && code !== '0') {
            newRc[code] = stock;
            count++;
            if (!matrix[code]) {
              if (name && !/^\d+$/.test(name.trim())) {
                const newProduct = { code, nomenclature: name, group: 'есть на РЦ', packaging: 'ШТ', weightCode: '', inPrice: 0, outPrice: 0, shelf: 0, quant: 1 };
                stores.forEach(s => { newProduct[s.tt] = 'НЕТ'; });
                newProducts.push(newProduct);
                addedToMatrix++;
              }
            }
          }
        });
        
        if (count > 0) {
          setRcStocks(newRc);
          if (newProducts.length > 0) {
            setMatrix(prev => { const updated = { ...prev }; newProducts.forEach(p => { updated[p.code] = p; }); return updated; });
            setProducts(prev => [...prev, ...newProducts]);
          }
          setShowRcModal(false);
          setRcInputData('');
          alert(`Загружено ${count} остатков РЦ${addedToMatrix > 0 ? `, добавлено в матрицу: ${addedToMatrix}` : ''}`);
        } else { alert('Ошибка формата. Используйте: Наименование(таб)Код(таб)Остаток'); }
      }, [rcInputData, matrix, stores]);

      // Create matrix
      const createMatrix = useCallback(() => {
        if (products.length === 0) { alert('Загрузите ассортимент!'); return; }
        const storeList = stores.map(s => s.tt);
        const storeTTSet2 = new Set(storeList);
        const ttCache2 = {};
        function resolveTT2(tt) {
          if (!tt || storeTTSet2.has(tt)) return tt;
          if (ttCache2[tt]) return ttCache2[tt];
          const lower = tt.toLowerCase();
          for (const s of stores) { const st = (s.tt||'').toLowerCase(); if (st && lower.includes(st)) { ttCache2[tt]=s.tt; return s.tt; } }
          const cleaned = lower.replace(/основной склад/g,'').replace(/крым/g,'').replace(/[()]/g,'').replace(/\s+/g,' ').trim();
          const fw = cleaned.split(/[\s,]+/).filter(w=>w.length>2);
          for (const s of stores) {
            const sw = (s.tt||'').toLowerCase().split(/[\s,]+/).filter(w=>w.length>2);
            let mc=0; for (const f of fw) { for (const w of sw) { if (f.includes(w)||w.includes(f)) { mc++; break; } } }
            if (mc>=2) { ttCache2[tt]=s.tt; return s.tt; }
          }
          ttCache2[tt]=tt; return tt;
        }
        const salesMap = new Map();
        sales.forEach(s => { const key = `${resolveTT2(s.tt)}_${s.code}`; salesMap.set(key, (salesMap.get(key) || 0) + s.quantity); });
        const newMatrix = {};
        products.forEach(p => {
          newMatrix[p.code] = { ...p };
          storeList.forEach(tt => { const key = `${tt}_${p.code}`; newMatrix[p.code][tt] = (salesMap.get(key) || 0) > 0 ? 'ДА' : 'НЕТ'; });
        });
        setMatrix(newMatrix);
        setTab('matrix');
        alert(`Матрица создана: ${Object.keys(newMatrix).length} × ${storeList.length} ТТ`);
      }, [products, stores, sales]);

      // Toggle matrix value
      const toggleMatrix = useCallback((code, tt) => {
        setMatrix(prev => ({ ...prev, [code]: { ...prev[code], [tt]: prev[code]?.[tt] === 'ДА' ? 'НЕТ' : 'ДА' } }));
      }, []);

      // Remove product from matrix
      const removeProductFromMatrix = useCallback((code) => {
        if (confirm(`Удалить товар "${matrix[code]?.nomenclature || code}" из матрицы?`)) {
          setMatrix(prev => {
            const updated = { ...prev };
            delete updated[code];
            return updated;
          });
          setProducts(prev => prev.filter(p => p.code !== code));
        }
      }, [matrix]);

      // Update product field
      const updateProduct = useCallback((code, field, value) => {
        setMatrix(prev => {
          const updated = { ...prev, [code]: { ...prev[code] } };
          if (value === undefined) {
            delete updated[code][field];
          } else {
            updated[code][field] = value;
          }
          return updated;
        });
      }, []);

      // Update shelf value
      const updateShelfValue = useCallback((code, tt, value) => {
        const key = `${code}_${tt}`;
        setShelfValues(prev => {
          if (value === '' || value === null) { const updated = { ...prev }; delete updated[key]; return updated; }
          return { ...prev, [key]: parseFloat(value) || 0 };
        });
      }, []);

      // Calculate order
      const calcOrder = useCallback((packaging, stock, avgDay, period, shelf, quant = 1) => {
        // shelf = null когда useShelf=false (не учитывать полку)
        // shelf = число когда useShelf=true (учитывать полку)
        const minStock = shelf != null ? shelf : 0;
        const need = minStock + (avgDay * period) - stock;
        if (need <= 0) return 0;
        // Округляем до кванта для всех товаров (КГ и ШТ)
        return Math.ceil(need / quant) * quant;
      }, []);

      // Run calculation
      const runCalculation = useCallback(() => {
        if (!Object.keys(matrix).length) { alert('Создайте матрицу!'); return; }
        if (stocks.length === 0) { alert('Загрузите остатки!'); return; }
        setLoading(true);
        setTimeout(() => {
          // Мэтчинг TT: строим карту длинное имя → короткое TT из stores
          const storeTTSet = new Set(stores.map(s => s.tt));
          const ttMatchCache = {};
          function resolveTT(rawTT) {
            if (!rawTT || storeTTSet.has(rawTT)) return rawTT;
            if (ttMatchCache[rawTT]) return ttMatchCache[rawTT];
            const lower = rawTT.toLowerCase();
            // Вложение: полное содержит короткое
            for (const s of stores) {
              const st = (s.tt || '').toLowerCase();
              if (st && lower.includes(st)) { ttMatchCache[rawTT] = s.tt; return s.tt; }
            }
            // Умный мэтчинг по ключевым словам
            const cleaned = lower.replace(/основной склад/g, '').replace(/крым/g, '').replace(/[()]/g, '').replace(/\s+/g, ' ').trim();
            const fileWords = cleaned.split(/[\s,]+/).filter(w => w.length > 2);
            for (const s of stores) {
              const stL = (s.tt || '').toLowerCase().replace(/\s+/g, ' ').trim();
              const stWords = stL.split(/[\s,]+/).filter(w => w.length > 2);
              let mc = 0;
              for (const fw of fileWords) { for (const sw of stWords) { if (fw.includes(sw) || sw.includes(fw)) { mc++; break; } } }
              if (mc >= 2) { ttMatchCache[rawTT] = s.tt; return s.tt; }
            }
            ttMatchCache[rawTT] = rawTT;
            return rawTT;
          }

          const stockMap = new Map();
          stocks.forEach(s => { stockMap.set(`${resolveTT(s.tt)}_${s.code}`, s); });
          // Логируем пример ключей для отладки
          const stockKeys = [...stockMap.keys()].slice(0, 5);
          console.log('[CALC] stockMap пример ключей:', stockKeys);
          console.log('[CALC] stores TT:', stores.map(s => s.tt).slice(0, 5));
          // Также строим карту по коду (для fallback поиска)
          const stockByCode = new Map();
          stocks.forEach(s => { const arr = stockByCode.get(s.code) || []; arr.push(s); stockByCode.set(s.code, arr); });
          const salesMap = new Map();
          sales.forEach(s => { const key = `${resolveTT(s.tt)}_${s.code}`; salesMap.set(key, (salesMap.get(key) || 0) + s.quantity); });
          const res = [];
          stores.forEach(store => {
            Object.entries(matrix).forEach(([code, p]) => {
              const inMatrix = p[store.tt] === 'ДА';
              const key = `${store.tt}_${code}`;
              let stockData = stockMap.get(key);
              // Fallback: если не нашли по точному ключу, ищем по коду + TT substring match
              if (!stockData) {
                const candidates = stockByCode.get(code);
                if (candidates && candidates.length === 1) { stockData = candidates[0]; }
                else if (candidates && candidates.length > 1) {
                  const stLower = store.tt.toLowerCase();
                  stockData = candidates.find(c => { const cTT = (c.tt || '').toLowerCase(); return cTT.includes(stLower) || stLower.includes(cTT); });
                  if (!stockData) stockData = candidates.find(c => { const cTT = (c.tt || '').toLowerCase(); const sTT = stLower; return [...sTT.split(/\s+/)].some(w => w.length > 2 && cTT.includes(w)); });
                }
                if (stockData && !stockMap.get(key)) {
                  console.log(`[STOCK FALLBACK] key="${key}" matched to tt="${stockData.tt}" code=${code} daysPresent=${stockData.daysPresent}`);
                }
              }
              const rcStock = rcStocks[code] || 0;
              const shelfVal = shelfValues[key];
              const shelf = useShelf ? (shelfVal !== undefined ? shelfVal : (p.packaging === 'КГ' ? 1 : 4)) : null;

              // ВСЕГДА ищем продажи из salesMap — независимо от статуса товара
              const salesQty = salesMap.get(key) || 0;

              // Исключаем только если товара нет в матрице (НЕТ/пусто)
              if (!inMatrix) { res.push({ tt: store.tt, code, nomenclature: p.nomenclature, group: p.group || '', currentStock: stockData?.currentStock || 0, sales: salesQty, daysPresent: stockData?.daysPresent || 0, shelf, order: 0, packaging: p.packaging, orderStatus: 'не в матрице', rcStock, manualEdit: false, avgSalesPerDay: 0 }); return; }

              // Товар в матрице — рассчитываем заказ независимо от наличия на РЦ
              const avgSales = stockData?.daysPresent > 0 ? salesQty / stockData.daysPresent : 0;
              // Получаем квант из группы для всех товаров (КГ и ШТ)
              const groupQuant = groupQuants[p.group || ''] || (p.packaging === 'КГ' ? 0.5 : 1);
              
              // Нет на точке (нет данных остатков или остаток = 0) — минимальный заказ
              if (!stockData || stockData.currentStock <= 0) {
                const minOrderQuant = groupQuants[p.group || ''] || (p.packaging === 'КГ' ? 0.5 : 1);
                const minOrder = minOrderQuant;
                const days = stockData?.daysPresent || 0;
                const avg = days > 0 ? salesQty / days : 0;
                res.push({ tt: store.tt, code, nomenclature: p.nomenclature, group: p.group || '', currentStock: stockData?.currentStock || 0, sales: salesQty, daysPresent: days, shelf, order: minOrder, packaging: p.packaging, orderStatus: `заказ ${minOrder}`, rcStock, manualEdit: true, avgSalesPerDay: avg });
                return;
              }

              // Передаём shelf (который null если useShelf=false), а не shelfVal
              const order = calcOrder(p.packaging, stockData.currentStock, avgSales, period, shelf, groupQuant);
              res.push({ tt: store.tt, code, nomenclature: p.nomenclature, group: p.group || '', currentStock: stockData.currentStock, sales: salesQty, possibleSales: avgSales * period, daysPresent: stockData.daysPresent, shelf, order, packaging: p.packaging, orderStatus: order > 0 ? `заказ ${order}` : 'достаточно', rcStock, manualEdit: false, avgSalesPerDay: avgSales });
            });
          });
          setResults(res);
          save(KEYS.RESULTS, res);
          setLoading(false);
          setTab('results');
          alert(`Готово! К заказу: ${res.filter(r => r.order > 0).length}`);
        }, 100);
      }, [matrix, stores, stocks, sales, rcStocks, period, useShelf, shelfValues, calcOrder, groupQuants]);

      // Update result order
      const updateResultOrder = useCallback((tt, code, newOrder) => {

        setResults(prev => {
          const updated = prev.map(r => r.tt === tt && r.code === code ? { ...r, order, manualEdit: true, orderStatus: order > 0 ? `заказ ${order}` : 'достаточно' } : r);
          // Отложенное сохранение чтобы не блокировать UI при вводе
          setTimeout(() => save(KEYS.RESULTS, updated), 0);
          return updated;
        });
      }, []);

      // Calculate RC
      const calcRc = useCallback(() => {
        const totalSalesMap = new Map();
        sales.forEach(s => { totalSalesMap.set(s.code, (totalSalesMap.get(s.code) || 0) + s.quantity); });
        const avgDaysMap = new Map();
        const daysCountMap = new Map();
        stocks.forEach(s => { if (s.daysPresent > 0) { avgDaysMap.set(s.code, (avgDaysMap.get(s.code) || 0) + s.daysPresent); daysCountMap.set(s.code, (daysCountMap.get(s.code) || 0) + 1); } });
        const res = [];
        Object.entries(matrix).forEach(([code, p]) => {
          const rcStock = rcStocks[code] || 0;
          const totalSales = totalSalesMap.get(code) || 0;
          const totalDays = avgDaysMap.get(code) || 0;
          const storeCount = daysCountMap.get(code) || 1;
          const avgDaysPresent = totalDays / storeCount;
          const avgSalesPerDay = avgDaysPresent > 0 ? totalSales / avgDaysPresent : 0;
          const daysForGroup = groupDays[p.group || ''] || 30;
          const monthlyNeed = avgSalesPerDay * daysForGroup;
          let autoOrder = 0;
          if (monthlyNeed > rcStock) { const need = monthlyNeed - rcStock; autoOrder = p.packaging === 'КГ' ? Math.ceil(need * 2) / 2 : Math.ceil(need); }
          const manualOrder = rcManualOrders[code];
          res.push({ code, nomenclature: p.nomenclature, group: p.group || '', packaging: p.packaging, rcStock, totalSales, avgSalesPerDay, monthlyNeed: monthlyNeed.toFixed(2), autoOrder, order: manualOrder !== undefined ? manualOrder : autoOrder, manualEdit: manualOrder !== undefined, inPrice: p.inPrice || 0, quant: p.quant || 1 });
        });
        setRcResults(res.sort((a, b) => (a.group || '').localeCompare(b.group || '', 'ru')));
        save(KEYS.RC_RESULTS, res.sort((a, b) => (a.group || '').localeCompare(b.group || '', 'ru')));
      }, [matrix, sales, stocks, rcStocks, rcManualOrders, groupDays]);

      // Update RC order
      const updateRcOrder = useCallback((code, value) => {
        const order = parseFloat(value) || 0;
        setRcManualOrders(prev => {

          if (order === 0 || value === '') { updated = { ...prev }; delete updated[code]; }
          else { updated = { ...prev, [code]: order }; }
          // Сохраняем rcResults с обновлённым заказом (отложенное сохранение)
          setRcResults(rcPrev => {
            const updatedRc = rcPrev.map(r => r.code === code ? { ...r, order, manualEdit: order !== 0, ...(order === 0 ? {} : { autoOrder: order }) } : r);
            setTimeout(() => save(KEYS.RC_RESULTS, updatedRc), 0);
            return updatedRc;
          });
          return updated;
        });
      }, []);

      // Export functions
      const exportExcel = useCallback(() => {
        if (results.length === 0) { alert('Нет данных!'); return; }
        const headers = ['№ Маг.', 'ТТ', 'Наименование', 'Код', 'Остаток', 'Продажи', 'Дней', 'Полка', 'Заказ', 'Упак', 'Статус', 'Ост. РЦ'];
        const storeNumMap = {};
        stores.forEach(s => { storeNumMap[s.tt] = s.storeNumber || s.tt2 || s.tt || ''; });
        const data = results.map(r => [storeNumMap[r.tt] || '', r.tt, r.nomenclature, r.code, r.currentStock.toFixed(2), r.sales.toFixed(2), r.daysPresent || '-', r.shelf ?? '', r.order, r.packaging, r.orderStatus, r.rcStock]);
        const ws = createStyledSheet(data, headers, [0, 1, 2]);

      const exportPrices = useCallback(() => {

        const headers = ['Группа', 'Наименование', 'Код', 'НДС %', 'Вх. цена', 'Выход РЦ', 'Полка', 'Доход', 'Доход с РЦ', 'Наценка %', 'Новая наценка %', 'Новая полка', 'Новый доход'];
        const R = v => Math.round(v * 100) / 100;

          const productMarkup = p.markup ?? groupMarkups[p.group || ''] ?? warehouseMarkup;

          const shelfPrice = R(rcOutput * (1 + productMarkup / 100));

          const incomeRC = R(shelfPrice - rcOutput);
          const calcMarkup = rcOutput > 0 ? R((shelfPrice / rcOutput - 1) * 100) : 0;
          const newMarkup = p.newMarkup ?? '';

          return [p.group || '', p.nomenclature || '', code, p.vat ?? vatRate, R(inPrice), rcOutput, shelfPrice, income, incomeRC, calcMarkup, newMarkup, newShelfPrice, newIncome];

      const exportByTT = useCallback((selectedTT) => {

        if (filtered.length === 0) { alert('Нет данных!'); return; }

        const data = filtered.map(r => [r.tt, r.code, r.nomenclature, r.group, r.currentStock.toFixed(2), r.sales.toFixed(2), r.daysPresent, r.shelf ?? '', r.order, r.packaging, r.orderStatus, r.rcStock]);

      const exportRcOrder = useCallback(() => {

        const headers = ['Код', 'Наименование', 'Группа', 'Упак', 'Ост. РЦ', 'Продажи', 'Ср.прод/день', 'Потр.', 'Заказ РЦ'];
        const data = rcResults.filter(r => r.order > 0).map(r => [r.code, r.nomenclature, r.group, r.packaging, r.rcStock, r.totalSales.toFixed(2), r.avgSalesPerDay.toFixed(2), r.monthlyNeed, r.order]);
        const ws = createStyledSheet(data, headers, [1, 2]);
        const wb = XLSX.utils.book_new();

        XLSX.writeFile(wb, `sneki_rc_order_${new Date().toISOString().slice(0, 10)}.xlsx`);
      }, [rcResults]);

      const exportAnalytics = useCallback(() => {
        const wb = XLSX.utils.book_new();
        
        // Фильтруем данные
        const filteredSales = sales.filter(s => {
          const product = Object.values(matrix).find(p => p.code === s.code);
          if (!product) return false;
          if (analyticsGroup && product.group !== analyticsGroup) return false;
          if (analyticsTT && s.tt !== analyticsTT) return false;
          return true;
        });

        // ABC анализ
        const productSalesMap = new Map();
        filteredSales.forEach(s => {
          productSalesMap.set(s.code, (productSalesMap.get(s.code) || 0) + s.quantity);
        });
        
        const abcData = Object.values(matrix)
          .map(p => ({
            code: p.code,
            name: p.nomenclature,
            group: p.group || '',
            sales: productSalesMap.get(p.code) || 0
          }))
          .filter(i => i.sales > 0)
          .sort((a, b) => b.sales - a.sales);
        
        let cumulative = 0;
        const totalSales = abcData.reduce((sum, i) => sum + i.sales, 0);
        const abcWithClass = abcData.map(item => {
          cumulative += item.sales;
          const pct = totalSales > 0 ? (cumulative / totalSales) * 100 : 0;
          return { ...item, cumulative, pct: pct.toFixed(1), abcClass: pct <= 80 ? 'A' : pct <= 95 ? 'B' : 'C' };
        });

        const abcHeaders = ['Ранг', 'Наименование', 'Код', 'Группа', 'Продажи', 'Накопительно', '% накопительно', 'ABC'];
        const abcRows = abcWithClass.map((i, idx) => [idx + 1, i.name, i.code, i.group, i.sales.toFixed(1), i.cumulative.toFixed(1), i.pct + '%', i.abcClass]);
        const wsABC = createStyledSheet(abcRows, abcHeaders, [1, 3]);
        XLSX.utils.book_append_sheet(wb, wsABC, 'ABC анализ');

        // Зависшие товары
        const stuckData = [];
        stocks.forEach(s => {
          if (s.currentStock > 0) {
            const hasSales = filteredSales.some(sale => sale.tt === s.tt && sale.code === s.code);
            if (!hasSales) {
              const product = Object.values(matrix).find(p => p.code === s.code);
              if (analyticsGroup && product?.group !== analyticsGroup) return;
              if (analyticsTT && s.tt !== analyticsTT) return;
              stuckData.push([
                s.tt,
                s.code,
                product?.nomenclature || s.code,
                product?.group || '',
                s.currentStock.toFixed(2),
                s.daysPresent || 0
              ]);
            }
          }
        });
        
        if (stuckData.length > 0) {
          const wsStuck = createStyledSheet(stuckData, ['ТТ', 'Код', 'Наименование', 'Группа', 'Остаток', 'Дней'], [0, 2, 3]);
          XLSX.utils.book_append_sheet(wb, wsStuck, 'Зависшие');
        }

        // Плохо продающиеся
        const lowData = [];
        const productAvgMap = new Map();
        filteredSales.forEach(s => {
          if (!productAvgMap.has(s.code)) productAvgMap.set(s.code, { total: 0, days: 0 });
          productAvgMap.get(s.code).total += s.quantity;
        });
        stocks.forEach(s => {
          if (productAvgMap.has(s.code) && s.daysPresent > 0) {
            const data = productAvgMap.get(s.code);
            if (s.daysPresent > data.days) data.days = s.daysPresent;

        });
        productAvgMap.forEach((data, code) => {

              data.days,
              avgPerDay.toFixed(3)

        if (lowData.length > 0) {

          XLSX.utils.book_append_sheet(wb, wsLow, 'Плохие продажи');

      }, [sales, matrix, stocks, analyticsGroup, analyticsTT]);

      // Reset — только продажи, остатки и остатки РЦ. Магазины, матрица, ассортимент и настройки остаются.

      // Add new product

      // Export weight table (КГ products)
      const exportWeightTable = useCallback(() => {

      // Import matrix from Excel
      const importMatrix = useCallback((file) => {

            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });

            if (json.length < 2) { alert('Пустой файл!'); return; }

            // Автоопределение формата (единый парсер)
            const headersRaw = json[0];
            const headers = headersRaw.map(h => String(h || '').trim().toLowerCase());

            let codeCol = -1, nameCol = -1, groupCol = -1;
            headers.forEach((h, i) => {
              if (h === 'код товара' || h === 'код') codeCol = i;
              if (h === 'наименование товара' || h === 'наименование' || h === 'наим') nameCol = i;
              if (h === 'группа') groupCol = i;
            });

            if (codeCol === -1) { alert('Не найдена колонка "Код товара"'); return; }

            // TT-колонки: после Код, кроме известных не-TT — сопоставляем с stores
            const knownNonTT = new Set(['группа', 'упак', 'вес. код', 'вес.код', 'упаковка', 'наименование товара', 'наименование', 'наим', 'код товара', 'код']);
            // Собираем ВСЕ строковые значения из каждого store для сопоставления
            const existingTTSet = new Set();
            const storeTTMap = {}; // name -> canonical tt
            stores.forEach(s => {
              const canonical = String(s.tt || '').trim();

                existingTTSet.add(canonical);

                  const val = v.trim();
                  existingTTSet.add(val);
                  if (!storeTTMap[val]) storeTTMap[val] = canonical;
                }
              });
            });
            const ttColumns = [];
            for (let c = codeCol + 1; c < headers.length; c++) {
              if (headers[c] && !knownNonTT.has(headers[c])) {
                const ttName = String(headersRaw[c] || '').trim();
                if (existingTTSet.has(ttName)) {
                  ttColumns.push({ col: c, name: ttName });
                }
              }
            }

            if (ttColumns.length === 0) {
              const storeTTs = [...existingTTSet].slice(0, 5).join(', ');
              const fileTTs = [];
              for (let c = codeCol + 1; c < headers.length; c++) {
                if (headers[c] && !knownNonTT.has(headers[c])) fileTTs.push(String(headersRaw[c] || '').trim());
              }
              alert(`Ни одна ТТ из файла не найдена в списке магазинов.\n\nМагазины в системе (${existingTTSet.size}):\n${storeTTs}${existingTTSet.size > 5 ? '...' : ''}\n\nТТ из файла (${fileTTs.length}):\n${fileTTs.slice(0, 5).join(', ')}${fileTTs.length > 5 ? '...' : ''}`);
              return;
            }

            // Батч-обновление матрицы
            const newMatrix = { ...matrix };
            let updated = 0, added = 0;

            for (let i = 1; i < json.length; i++) {
              const row = json[i];
              if (!row || !row[codeCol]) continue;
              const code = normCode(String(row[codeCol]));
              if (!code) continue;

              const nomenclature = nameCol >= 0 ? String(row[nameCol] || '').trim() : '';
              const group = groupCol >= 0 ? String(row[groupCol] || '').trim() : '';
              if (!nomenclature) continue;

              ttColumns.forEach(({ name: tt, col }) => {
                const val = String(row[col] || '').trim().toUpperCase();
                const inMatrix = (val === 'ДА' || val === 'YES' || val === '1') ? 'ДА' : 'НЕТ';

                if (!newMatrix[code]) {
                  // Добавляем новый товар из файла
                  const newEntry = {
                    code, nomenclature, group,
                    packaging: 'ШТ', weightCode: '', inPrice: 0, outPrice: 0,
                    shelf: 0, quant: 1
                  };
                  stores.forEach(s => { newEntry[s.tt] = 'НЕТ'; });
                  newEntry[tt] = inMatrix;
                  newMatrix[code] = newEntry;
                  added++;
                } else {
                  if (newMatrix[code][tt] !== inMatrix) updated++;
                  newMatrix[code] = { ...newMatrix[code], [tt]: inMatrix };
                }
              });
            }

            setMatrix(newMatrix);
            save(KEYS.MATRIX, newMatrix);

            console.log('[Matrix Import] codes in file:', [...new Set(Object.keys(marks))].slice(0, 10));
            console.log('[Matrix Import] codes in matrix:', Object.keys(newMatrix).slice(0, 10));
            console.log('[Matrix Import] ttColumns:', ttColumns.map(t => t.name));
            console.log('[Matrix Import] sample entry:', newMatrix[Object.keys(newMatrix)[0]]);

            const addedMsg = added > 0 ? `\nДобавлено новых товаров: ${added}` : '';
            alert(`Обновлено ${updated} значений матрицы${addedMsg}\nВсего товаров в матрице: ${Object.keys(newMatrix).length}`);
          } catch (err) { alert('Ошибка: ' + err.message); }
        };
        reader.readAsArrayBuffer(file);
      }, [matrix, stores]);

      // Mass update orders
      const massUpdateOrders = useCallback((action, value) => {
        if (action === 'clear') { setResults(prev => { const updated = prev.map(r => ({ ...r, order: 0, orderStatus: 'достаточно', manualEdit: false })); save(KEYS.RESULTS, updated); return updated; }); }
        else if (action === 'recalc') { 
          setResults(prev => { 
            const updated = prev.map(r => { 
              if (r.orderStatus === 'не в матрице') return r; 
              // Получаем квант из группы для всех товаров (КГ и ШТ)
              const product = matrix[r.code];
              const groupQuant = groupQuants[r.group || ''] || (r.packaging === 'КГ' ? 0.5 : 1);
              // r.shelf уже содержит null если useShelf=false
              const newOrder = calcOrder(r.packaging, r.currentStock, r.avgSalesPerDay, period, r.shelf, groupQuant); 
              return { ...r, order: newOrder, orderStatus: newOrder > 0 ? `заказ ${newOrder}` : 'достаточно', manualEdit: false }; 
            }); 
            save(KEYS.RESULTS, updated);
            return updated;
          }); 
        }
        else if (action === 'multiply' && value) { setResults(prev => { const updated = prev.map(r => { if (r.order === 0) return r; const newOrder = Math.round(r.order * value * (r.packaging === 'КГ' ? 2 : 1)) / (r.packaging === 'КГ' ? 2 : 1); return { ...r, order: newOrder, orderStatus: `заказ ${newOrder}`, manualEdit: true }; }); save(KEYS.RESULTS, updated); return updated; }); }
      }, [calcOrder, period, matrix, groupQuants]);

      // Get all groups
      const allGroups = useMemo(() => { const g = new Set(); Object.values(matrix).forEach(p => { if (p.group) g.add(p.group); }); return Array.from(g).sort((a, b) => a.localeCompare(b, 'ru')); }, [matrix]);

      // Filtered results
      const filteredResults = useMemo(() => {
        const search = searchResults.toLowerCase().trim();
        return results.filter(r => {
          if (search && !r.nomenclature?.toLowerCase().includes(search) && !r.code.includes(search)) return false;
          if (filterTT && !r.tt.toLowerCase().includes(filterTT.toLowerCase())) return false;
          if (filterGroup && r.group !== filterGroup) return false;
          if (filterStatus === 'orders' && r.order === 0) return false;
          if (filterStatus === 'noMatrix' && r.orderStatus !== 'не в матрице') return false;
          if (filterStatus === 'enough' && r.order !== 0) return false;
          return true;
        });
      }, [results, searchResults, filterTT, filterStatus, filterGroup]);

      // Grouped matrix
      const groupedMatrix = useMemo(() => {
        const g = {};
        const search = searchMatrix.toLowerCase().trim();
        Object.entries(matrix).forEach(([code, p]) => { if (search && !p.nomenclature?.toLowerCase().includes(search) && !code.includes(search)) return; const group = p.group || 'Без группы'; if (!g[group]) g[group] = []; g[group].push({ code, ...p }); });
        Object.keys(g).forEach(group => { g[group].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru')); });
        return g;
      }, [matrix, searchMatrix]);

      // Grouped results
      const groupedResults = useMemo(() => {
        const g = {};
        filteredResults.forEach(r => { if (!g[r.tt]) g[r.tt] = []; g[r.tt].push(r); });
        Object.keys(g).forEach(tt => { g[tt].sort((a, b) => { const gc = (a.group || '').localeCompare(b.group || '', 'ru'); return gc !== 0 ? gc : (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru'); }); });
        return g;
      }, [filteredResults]);

      // Filtered RC results
      const filteredRcResults = useMemo(() => {
        const search = searchRc.toLowerCase().trim();
        return rcResults.filter(r => {
          if (search && !r.nomenclature?.toLowerCase().includes(search) && !r.code.includes(search)) return false;
          if (filterRcGroup && r.group !== filterRcGroup) return false;
          return true;
        });
      }, [rcResults, searchRc, filterRcGroup]);

      // Grouped shelf
      const groupedShelf = useMemo(() => {
        const g = {};
        const search = searchShelf.toLowerCase().trim();
        Object.entries(matrix).forEach(([code, p]) => { if (search && !p.nomenclature?.toLowerCase().includes(search) && !code.includes(search)) return; const group = p.group || 'Без группы'; if (!g[group]) g[group] = []; g[group].push({ code, ...p }); });
        Object.keys(g).forEach(group => { g[group].sort((a, b) => (a.nomenclature || '').localeCompare(b.nomenclature || '', 'ru')); });
        return g;
      }, [matrix, searchShelf]);

      // Stats
      const stats = useMemo(() => ({ products: Object.keys(matrix).length, stores: stores.length, sales: sales.reduce((s, x) => s + x.quantity, 0), toOrder: results.filter(r => r.order > 0).length, orderSum: results.filter(r => r.order > 0).reduce((s, r) => s + r.order * (matrix[r.code]?.inPrice || 0), 0) }), [matrix, stores, sales, results]);

      // Price stats
      const priceStats = useMemo(() => {
        let currentRevenue = 0;
        let newRevenue = 0;
        let individualMarkups = 0;
        sales.forEach(s => {
          const product = matrix[s.code];
          if (!product) return;
          const inPrice = product.inPrice || 0;
          const productMarkup = product.markup ?? groupMarkups[product.group || ''] ?? warehouseMarkup;
          const rcOutput = Math.round(inPrice * (1 + warehouseMarkup / 100) * 100) / 100;
          const shelfPrice = Math.round(rcOutput * (1 + productMarkup / 100) * 100) / 100;
          currentRevenue += s.quantity * (product.outPrice || shelfPrice);
          newRevenue += s.quantity * shelfPrice;
        });
        Object.values(matrix).forEach(p => {
          if (p.markup !== undefined && p.markup !== null) individualMarkups++;
        });
        return { currentRevenue, newRevenue, diff: newRevenue - currentRevenue, activeMarkups: Object.keys(groupMarkups).length, individualMarkups };
      }, [sales, matrix, groupMarkups, warehouseMarkup]);

      const hasMatrix = Object.keys(matrix).length > 0;

      // Analytics data
      const analyticsData = useMemo(() => {
        // Фильтруем продажи по выбранным фильтрам
        const filteredSales = sales.filter(s => {
          const product = Object.values(matrix).find(p => p.code === s.code);
          if (!product) return false;
          if (analyticsGroup && product.group !== analyticsGroup) return false;
          if (analyticsTT && s.tt !== analyticsTT) return false;
          return true;
        });

        // Продажи по товарам
        const productSales = new Map();
        filteredSales.forEach(s => {
          if (!productSales.has(s.code)) productSales.set(s.code, 0);
          productSales.set(s.code, productSales.get(s.code) + s.quantity);
        });

        // Продажи по группам
        const groupSales = new Map();
        filteredSales.forEach(s => {
          const product = Object.values(matrix).find(p => p.code === s.code);
          const group = product?.group || 'Без группы';
          groupSales.set(group, (groupSales.get(group) || 0) + s.quantity);
        });

        // Продажи по ТТ
        const ttSales = new Map();
        filteredSales.forEach(s => {
          ttSales.set(s.tt, (ttSales.get(s.tt) || 0) + s.quantity);
        });

        // ABC-анализ
        const abcItems = Array.from(productSales.entries())
          .map(([code, sales]) => {
            const product = Object.values(matrix).find(p => p.code === code);
            return { code, name: product?.nomenclature || code, group: product?.group || '', sales };
          })
          .sort((a, b) => b.sales - a.sales);

        const totalSales = abcItems.reduce((sum, i) => sum + i.sales, 0);
        let cumulative = 0;
        const abcWithClass = abcItems.map(item => {
          cumulative += item.sales;
          const cumulativePercent = totalSales > 0 ? (cumulative / totalSales) * 100 : 0;
          const abcClass = cumulativePercent <= 80 ? 'A' : cumulativePercent <= 95 ? 'B' : 'C';
          return { ...item, cumulative, cumulativePercent, abcClass };
        });

        // Зависшие товары (остаток есть, продаж нет)
        const stuckItems = [];
        stocks.forEach(s => {
          if (s.currentStock > 0) {
            const hasSales = filteredSales.some(sale => sale.tt === s.tt && sale.code === s.code);
            if (!hasSales) {
              const product = Object.values(matrix).find(p => p.code === s.code);
              if (analyticsGroup && product?.group !== analyticsGroup) return;
              if (analyticsTT && s.tt !== analyticsTT) return;
              stuckItems.push({
                tt: s.tt,
                code: s.code,
                name: product?.nomenclature || s.code,
                group: product?.group || '',
                stock: s.currentStock,
                days: s.daysPresent || 0
              });
            }
          }
        });

        // Плохо продающиеся (< 0.5 в день в среднем)
        const lowSellers = [];
        const productAvgSales = new Map();
        filteredSales.forEach(s => {
          if (!productAvgSales.has(s.code)) productAvgSales.set(s.code, { total: 0, days: 0, tt: s.tt });
          const data = productAvgSales.get(s.code);
          data.total += s.quantity;
        });
        stocks.forEach(s => {
          if (productAvgSales.has(s.code)) {
            const data = productAvgSales.get(s.code);
            if (s.daysPresent > 0) {
              data.days = Math.max(data.days, s.daysPresent);
            }
          }
        });
        productAvgSales.forEach((data, code) => {
          const avgPerDay = data.days > 0 ? data.total / data.days : 0;
          if (avgPerDay > 0 && avgPerDay < 0.5) {
            const product = Object.values(matrix).find(p => p.code === code);
            lowSellers.push({
              code,
              name: product?.nomenclature || code,
              group: product?.group || '',
              totalSales: data.total,
              days: data.days,
              avgPerDay
            });
          }
        });
        lowSellers.sort((a, b) => a.avgPerDay - b.avgPerDay);

        return {
          productSales,
          groupSales,
          ttSales,
          abcItems: abcWithClass,
          stuckItems,
          lowSellers,
          totalSales,
          countA: abcWithClass.filter(i => i.abcClass === 'A').length,
          countB: abcWithClass.filter(i => i.abcClass === 'B').length,
          countC: abcWithClass.filter(i => i.abcClass === 'C').length
        };
      }, [sales, matrix, stocks, analyticsGroup, analyticsTT]);

      // Render charts when tab is analytics
      useEffect(() => {
        if (tab !== 'analytics' || !hasMatrix) return;

        // Destroy old charts
        Object.values(chartInstances.current).forEach(chart => chart?.destroy());
        chartInstances.current = {};

        const createChart = (ref, key, config) => {
          if (ref.current) {
            chartInstances.current[key] = new Chart(ref.current, config);
          }
        };

        const data = analyticsData;

        // Chart 1: Продажи по группам
        const groupData = Array.from(data.groupSales.entries()).sort((a, b) => b[1] - a[1]).slice(0, 10);
        createChart(chartRef1, 'chart1', {
          type: 'bar',
          data: {
            labels: groupData.map(g => g[0].length > 12 ? g[0].slice(0, 11) + '…' : g[0]),
            datasets: [{
              label: 'Продажи',
              data: groupData.map(g => g[1]),
              backgroundColor: ['#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6366f1']
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
              y: { beginAtZero: true },
              x: { ticks: { maxRotation: 45, minRotation: 25, font: { size: 9 } } }
            }
          }
        });

        // Chart 2: ABC распределение (pie)
        createChart(chartRef2, 'chart2', {
          type: 'doughnut',
          data: {
            labels: ['A (80% продаж)', 'B (15% продаж)', 'C (5% продаж)'],
            datasets: [{
              data: [data.countA, data.countB, data.countC],
              backgroundColor: ['#10b981', '#f59e0b', '#ef4444']
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
          }
        });

        // Chart 3: Топ-10 товаров
        const top10 = data.abcItems.slice(0, 10);
        createChart(chartRef3, 'chart3', {
          type: 'bar',
          data: {
            labels: top10.map(i => i.name.length > 18 ? i.name.slice(0, 17) + '…' : i.name),
            datasets: [{
              label: 'Продажи',
              data: top10.map(i => i.sales),
              backgroundColor: '#3b82f6'
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { beginAtZero: true } }
          }
        });

        // Chart 4: Продажи по ТТ
        const ttData = Array.from(data.ttSales.entries()).sort((a, b) => b[1] - a[1]).slice(0, 10);
        createChart(chartRef4, 'chart4', {
          type: 'bar',
          data: {
            labels: ttData.map(t => t[0].length > 12 ? t[0].slice(0, 11) + '…' : t[0]),
            datasets: [{
              label: 'Продажи',
              data: ttData.map(t => t[1]),
              backgroundColor: '#8b5cf6'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
              y: { beginAtZero: true },
              x: { ticks: { maxRotation: 45, minRotation: 25, font: { size: 9 } } }
            }
          }
        });

        return () => {
          Object.values(chartInstances.current).forEach(chart => chart?.destroy());
        };
      }, [tab, analyticsData, hasMatrix]);

      const tabs = [
        { id: 'upload', label: 'Загрузка', icon: <UploadIcon /> },
        { id: 'matrix', label: 'Матрица', disabled: !hasMatrix, icon: <GridIcon /> },
        { id: 'prices', label: 'Цены', disabled: !hasMatrix, icon: <DollarIcon /> },
        { id: 'shelf', label: 'Полка', disabled: !hasMatrix, icon: <RulerIcon /> },
        { id: 'results', label: 'Результаты', disabled: results.length === 0, icon: <TableIcon /> },
        { id: 'rc', label: 'Расчёт РЦ', disabled: results.length === 0, icon: <WarehouseIcon /> },
        { id: 'analytics', label: 'Аналитика', disabled: !hasMatrix, icon: <ChartIcon /> }
      ];

      return (
        <div className="bg-[#f5f7fa]">
          {/* Header */}
          <div className="bg-white border-b border-gray-200">
            <div className="px-3 py-2">
              <div className="flex items-center gap-2">
                <a href="index.html" className="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors"><ArrowLeftIcon /><span>Назад</span></a>
                <div className="flex items-center gap-2 px-2">
                  <div className="p-1.5 bg-sky-100 rounded-lg text-sky-600"><CookieIcon /></div>
                  <h1 className="text-base font-semibold text-gray-900">СНЕКИ — Расчёт заказа</h1>
                </div>
                <div className="flex gap-0.5 ml-2 bg-gray-100 rounded-lg p-0.5">
                  {tabs.map(t => (
                    <button key={t.id} onClick={() => !t.disabled && setTab(t.id)} className={`inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${tab === t.id ? 'bg-sky-600 text-white shadow-sm' : t.disabled ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-white hover:text-gray-900'}`} disabled={t.disabled}>
                      {t.icon}<span>{t.label}</span>
                    </button>
                  ))}
                </div>
                <div className="ml-auto flex gap-2">
                  <span className="bg-purple-100 text-purple-800 rounded-lg px-2 py-1 text-xs">{products.length} тов.</span>
                  <span className="bg-blue-100 text-blue-800 rounded-lg px-2 py-1 text-xs">{stores.length} ТТ</span>
                </div>
              </div>
            </div>
          </div>

          {/* Content */}
          <div className="px-3 py-3">
            {/* Upload Tab */}
            {tab === 'upload' && (
              <div className="space-y-2">
                <div className="grid grid-cols-1 md:grid-cols-4 gap-2">
                  <div onClick={() => fileInputRefs.assortment.current?.click()} className="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-gray-400 transition-colors">
                    <div className="flex flex-col items-center text-center">
                      <div className="p-3 bg-amber-50 rounded-lg text-amber-600 mb-3"><PackageIcon /></div>
                      <h3 className="font-medium text-gray-800 mb-1">Ассортимент</h3>
                      <p className="text-xs text-gray-400">Да | Группа | Код | Упак | Наим.</p>
                      <input ref={fileInputRefs.assortment} type="file" accept=".xlsx,.xls" onChange={e => e.target.files?.[0] && handleFile(e.target.files[0], 'assortment')} className="hidden" />
                      {products.length > 0 && <p className="mt-2 text-sm text-amber-600 font-medium">{products.length} товаров</p>}
                    </div>
                  </div>
                  <div onClick={() => fileInputRefs.sales.current?.click()} className="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-gray-400 transition-colors">
                    <div className="flex flex-col items-center text-center">
                      <div className="p-3 bg-emerald-50 rounded-lg text-emerald-600 mb-3"><SalesIcon /></div>
                      <h3 className="font-medium text-gray-800 mb-1">Продажи</h3>
                      <p className="text-xs text-gray-400">ТТ | Код | Кол-во</p>
                      <input ref={fileInputRefs.sales} type="file" accept=".xlsx,.xls" onChange={e => e.target.files?.[0] && handleFile(e.target.files[0], 'sales')} className="hidden" />
                      {sales.length > 0 && <p className="mt-2 text-sm text-emerald-600 font-medium">{sales.length} записей</p>}
                    </div>
                  </div>
                  <div onClick={() => fileInputRefs.stocks.current?.click()} className="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-gray-400 transition-colors">
                    <div className="flex flex-col items-center text-center">
                      <div className="p-3 bg-sky-50 rounded-lg text-sky-600 mb-3"><StockIcon /></div>
                      <h3 className="font-medium text-gray-800 mb-1">Остатки на ТТ</h3>
                      <p className="text-xs text-gray-400">ТТ | Код | ... | Ост.</p>
                      <input ref={fileInputRefs.stocks} type="file" accept=".xlsx,.xls" onChange={e => e.target.files?.[0] && handleFile(e.target.files[0], 'stocks')} className="hidden" />
                      {stocks.length > 0 && <p className="mt-2 text-sm text-sky-600 font-medium">{stocks.length} записей</p>}
                    </div>
                  </div>
                  <div onClick={() => setShowRcModal(true)} className="bg-white rounded-lg border border-gray-200 p-4 cursor-pointer hover:border-gray-400 transition-colors">
                    <div className="flex flex-col items-center text-center">
                      <div className="p-3 bg-orange-50 rounded-lg text-orange-600 mb-3"><WarehouseIcon /></div>
                      <h3 className="font-medium text-gray-800 mb-1">Остатки РЦ</h3>
                      <p className="text-xs text-gray-400">Ввести вручную</p>
                      {Object.keys(rcStocks).length > 0 && <p className="mt-2 text-sm text-orange-600 font-medium">{Object.keys(rcStocks).length} тов.</p>}
                    </div>
                  </div>
                </div>
                <div className="bg-white rounded-lg border border-gray-200 p-3">
                  <div className="flex flex-wrap items-center gap-3">
                    <button onClick={createMatrix} disabled={products.length === 0} className="btn btn-success">{hasMatrix ? <RefreshIcon /> : <GridIcon />}<span>{hasMatrix ? 'Обновить матрицу' : 'Создать матрицу'}</span></button>
                    <div className="flex items-center gap-2 bg-gray-50 px-3 py-2 rounded-md border border-gray-200">
                      <label className="text-sm text-gray-600">Период:</label>
                      <input type="number" value={period} onChange={e => setPeriod(parseInt(e.target.value) || 14)} className="input w-14 text-center" min="1" max="60" />
                      <span className="text-sm text-gray-500">дней</span>
                    </div>
                    <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-3 py-2 rounded-md border border-gray-200 hover:bg-gray-100 transition-colors">
                      <input type="checkbox" checked={useShelf} onChange={e => setUseShelf(e.target.checked)} className="w-4 h-4 rounded border-gray-300 text-amber-500" />
